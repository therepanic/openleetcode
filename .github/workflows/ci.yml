name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-26-intel, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.8.2"
          cabal-version: "3.12.1.0"

      - run: |
          cabal update
          cabal build all
          cabal test all

      - name: Collect executables (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts
          find dist-newstyle -type f -perm /111 \
            -not -name "*.so" -print0 \
            | while IFS= read -r -d '' f; do
                cp "$f" artifacts/
              done

      - name: Collect executables (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          find dist-newstyle -type f \( -perm -0100 -o -perm -0010 -o -perm -0001 \) \
            -not -name "*.dylib" -print0 \
            | while IFS= read -r -d '' f; do
                cp "$f" artifacts/
              done

      - name: Collect executables (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Get-ChildItem -Path dist-newstyle -Recurse -Filter "*.exe" |
            Copy-Item -Destination artifacts/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: artifacts/
          if-no-files-found: warn

  format-hs:
    name: Haskell format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.8.2"
          cabal-version: "3.12.1.0"

      - name: Install ormolu
        run: |
          cabal install ormolu --overwrite-policy=always
          echo "$HOME/.cabal/bin" >> "$GITHUB_PATH"

      - name: Check formatting
        run: |
          find . \
            -name '*.hs' \
            -not -path './dist-newstyle/*' \
            -exec ormolu --mode check {} +

  prettier:
    name: Prettier
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm install --global prettier

      - run: prettier --check . --ignore-path .prettierignore

  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check"
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"
