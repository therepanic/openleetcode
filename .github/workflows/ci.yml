name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
            artifact: openleetcode-linux-amd64

          - os: ubuntu-24.04-arm
            target: linux-arm64
            artifact: openleetcode-linux-arm64

          - os: windows-latest
            target: windows-amd64
            artifact: openleetcode-windows-amd64

          - os: macos-26-intel
            target: darwin-amd64
            artifact: openleetcode-darwin-amd64

          - os: macos-26
            target: darwin-arm64
            artifact: openleetcode-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.8.2"
          cabal-version: "3.12.1.0"

      - run: |
          cabal update
          cabal build all
          cabal test all

      - name: Collect executable
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          exe="$(find dist-newstyle \
            -type f \
            -path "*/x/openleetcode/build/openleetcode/openleetcode" \
            | head -n 1)"

          cp "$exe" "artifacts/${{ matrix.artifact }}"

      - name: Collect executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          $exe = Get-ChildItem -Path dist-newstyle -Recurse -Filter "openleetcode.exe" |
            Where-Object {
              $_.FullName -like "*\x\openleetcode\build\openleetcode\openleetcode.exe"
            } |
            Select-Object -First 1

          Copy-Item $exe.FullName "artifacts/${{ matrix.artifact }}.exe"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/*
          if-no-files-found: error

  format-hs:
    name: Haskell format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.8.2"
          cabal-version: "3.12.1.0"

      - name: Install ormolu
        run: |
          cabal install ormolu --overwrite-policy=always
          echo "$HOME/.cabal/bin" >> "$GITHUB_PATH"

      - name: Check formatting
        run: |
          find . \
            -name '*.hs' \
            -not -path './dist-newstyle/*' \
            -exec ormolu --mode check {} +

  prettier:
    name: Prettier
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --global prettier
      - run: prettier --check . --ignore-path .prettierignore

  ruff:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check"
      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"
