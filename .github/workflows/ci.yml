name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.8.2"
          cabal-version: "3.12.1.0"

      - name: Build
        run: |
          cabal update
          cabal build all

      - name: Test
        run: cabal test all

      - name: Install ormolu
        run: |
          cabal install ormolu --overwrite-policy=always --installdir="$HOME/.cabal/bin"
          echo "$HOME/.cabal/bin" >> "$GITHUB_PATH"

      - name: Check Haskell formatting
        run: |
          find . \
            -name '*.hs' \
            -not -path './dist-newstyle/*' \
            -not -path './runtimes/*' \
            -exec ormolu --mode check {} +

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Prettier
        run: npm install --global prettier

      - name: Check formatting with Prettier
        run: prettier --check . --ignore-path .prettierignore
