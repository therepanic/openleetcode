entry:
  id: 921
  title: minimum-add-to-make-parentheses-valid
  params:
    s:
      type: string
  call:
    cpp: "Solution().minAddToMakeValid({s})"
    rust: "Solution::min_add_to_make_valid({s})"
    python3: "Solution().minAddToMakeValid({s})"
    python2: "Solution().minAddToMakeValid({s})"
    ruby: "min_add_to_make_valid({s})"
    java: "new Solution().minAddToMakeValid({s})"
    csharp: "new Solution().MinAddToMakeValid({s})"
    kotlin: "Solution().minAddToMakeValid({s})"
    go: "minAddToMakeValid({s})"
    dart: "Solution().minAddToMakeValid({s})"
    swift: "Solution().minAddToMakeValid({s})"
    typescript: "minAddToMakeValid({s})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().minAddToMakeValid(s, {result})"
    checker: |
      class Checker:
          def minAddToMakeValid(self, s, result):
              if not isinstance(result, int):
                  return False
              balance = 0
              add = 0
              for ch in s:
                  if ch == '(':
                      balance += 1
                  else:
                      if balance == 0:
                          add += 1
                      else:
                          balance -= 1
              return result == add + balance

