entry:
  id: 781
  title: "rabbits-in-forest"
  params:
    answers:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().numRabbits({answers})"
    rust: "Solution::num_rabbits({answers})"
    python3: "Solution().numRabbits({answers})"
    python2: "Solution().numRabbits({answers})"
    ruby: "num_rabbits({answers})"
    java: "new Solution().numRabbits({answers})"
    csharp: "new Solution().NumRabbits({answers})"
    kotlin: "Solution().numRabbits({answers})"
    go: "numRabbits({answers})"
    dart: "Solution().numRabbits({answers})"
    swift: "Solution().numRabbits({answers})"
    typescript: "numRabbits({answers})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().numRabbits(answers, {result})"
    checker: |
      from collections import Counter
      from math import ceil

      class Checker:
          def numRabbits(self, answers, result):
              if not isinstance(result, int):
                  return False
              if not isinstance(answers, list):
                  return False
              if any(not isinstance(x, int) for x in answers):
                  return False
              total = 0
              counts = Counter(answers)
              for x, c in counts.items():
                  if x < 0:
                      return False
                  total += ceil(c / (x + 1)) * (x + 1)
              return result == total

seed: 781

