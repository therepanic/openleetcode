entry:
  id: 647
  title: palindromic-substrings
  params:
    s:
      type: string
  call:
    cpp: Solution().countSubstrings({s})
    rust: Solution::count_substrings({s})
    python3: Solution().countSubstrings({s})
    python2: Solution().countSubstrings({s})
    ruby: count_substrings({s})
    java: new Solution().countSubstrings({s})
    csharp: new Solution().CountSubstrings({s})
    kotlin: Solution().countSubstrings({s})
    go: countSubstrings({s})
    dart: Solution().countSubstrings({s})
    swift: Solution().countSubstrings({s})
    typescript: countSubstrings({s})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().countSubstrings(s, {result})"
    checker: |
      class Checker:
          def countSubstrings(self, s, result):
              if not isinstance(result, int):
                  return False
              total = 0
              n = len(s)
              for center in range(n):
                  left = center
                  right = center
                  while left >= 0 and right < n and s[left] == s[right]:
                      total += 1
                      left -= 1
                      right += 1
                  left = center
                  right = center + 1
                  while left >= 0 and right < n and s[left] == s[right]:
                      total += 1
                      left -= 1
                      right += 1
              return total == result
seed: 647
