judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().checkPerfectNumber(num, {result})"
    checker: |
      class Checker:
          def checkPerfectNumber(self, num, result):
              if num == 1:
                  expected = False
              else:
                  total = 1
                  i = 2
                  while i * i <= num:
                      if num % i == 0:
                          total += i
                          other = num // i
                          if other != i:
                              total += other
                      i += 1
                  expected = (num == total)
              return expected == result
