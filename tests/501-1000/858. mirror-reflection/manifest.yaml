entry:
  id: 858
  title: mirror-reflection
  params:
    p:
      type: int
    q:
      type: int
  call:
    cpp: "Solution().mirrorReflection({p}, {q})"
    rust: "Solution::mirror_reflection({p}, {q})"
    python3: "Solution().mirrorReflection({p}, {q})"
    python2: "Solution().mirrorReflection({p}, {q})"
    ruby: "mirror_reflection({p}, {q})"
    java: "new Solution().mirrorReflection({p}, {q})"
    csharp: "new Solution().MirrorReflection({p}, {q})"
    kotlin: "Solution().mirrorReflection({p}, {q})"
    go: "mirrorReflection({p}, {q})"
    dart: "Solution().mirrorReflection({p}, {q})"
    swift: "Solution().mirrorReflection({p}, {q})"
    typescript: "mirrorReflection({p}, {q})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().mirrorReflection(p, q, {result})"
    checker: |
      class Checker:
          def mirrorReflection(self, p, q, result):
              import math
              g = math.lcm(p, q)
              m = g // p
              n = g // q
              if m % 2 == 1 and n % 2 == 1:
                  expected = 1
              elif m % 2 == 1 and n % 2 == 0:
                  expected = 2
              else:
                  expected = 0
              return expected == result
seed: 858
