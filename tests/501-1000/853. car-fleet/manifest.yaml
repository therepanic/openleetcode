judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().carFleet(target, position, speed, {result})"
    checker: |
      class Checker:
          def carFleet(self, target, position, speed, result):
              if not isinstance(result, int):
                  return False
              cars = sorted(zip(position, speed), reverse=True)
              fleets = 0
              last_time = -1
              for p, s in cars:
                  t = (target - p) / s
                  if t > last_time:
                      fleets += 1
                      last_time = t
              return result == fleets
