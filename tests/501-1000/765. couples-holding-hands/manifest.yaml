entry:
  id: 765
  title: couples-holding-hands
  params:
    row:
      type: array
      items:
        type: int
  call:
    cpp: Solution().minSwapsCouples({row})
    rust: Solution::min_swaps_couples({row})
    python3: Solution().minSwapsCouples({row})
    python2: Solution().minSwapsCouples({row})
    ruby: min_swaps_couples({row})
    java: new Solution().minSwapsCouples({row})
    csharp: new Solution().MinSwapsCouples({row})
    kotlin: Solution().minSwapsCouples({row})
    go: minSwapsCouples({row})
    dart: Solution().minSwapsCouples({row})
    swift: Solution().minSwapsCouples({row})
    typescript: minSwapsCouples({row})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().min_swaps_couples(row, {result})
    checker:
      "class Checker:\n    def min_swaps_couples(self, row, result):\n    \
      \    if not isinstance(result, int):\n            return False\n        if not\
      \ isinstance(row, list) or len(row) % 2 != 0:\n            return False\n  \
      \      if len(row) < 4 or len(row) > 60:\n            return False\n       \
      \ expected = set(range(len(row)))\n        if set(row) != expected:\n      \
      \      return False\n\n        seats = list(row)\n        pos = {person: idx\
      \ for idx, person in enumerate(seats)}\n        swaps = 0\n\n        for i in\
      \ range(0, len(seats), 2):\n            first = seats[i]\n            partner\
      \ = first ^ 1\n            if seats[i + 1] == partner:\n                continue\n\
      \            partner_idx = pos[partner]\n            other = seats[i + 1]\n\
      \            seats[i + 1], seats[partner_idx] = seats[partner_idx], seats[i\
      \ + 1]\n            pos[partner] = i + 1\n            pos[other] = partner_idx\n\
      \            swaps += 1\n\n        return result == swaps\n"
seed: 765027
