entry:
  id: 567
  title: permutation-in-string
  params:
    s1:
      type: string
    s2:
      type: string
  call:
    cpp: "Solution().checkInclusion({s1}, {s2})"
    rust: "Solution::check_inclusion({s1}, {s2})"
    python3: "Solution().checkInclusion({s1}, {s2})"
    python2: "Solution().checkInclusion({s1}, {s2})"
    ruby: "check_inclusion({s1}, {s2})"
    java: "new Solution().checkInclusion({s1}, {s2})"
    csharp: "new Solution().CheckInclusion({s1}, {s2})"
    kotlin: "Solution().checkInclusion({s1}, {s2})"
    go: "checkInclusion({s1}, {s2})"
    dart: "Solution().checkInclusion({s1}, {s2})"
    swift: "Solution().checkInclusion({s1}, {s2})"
    typescript: "checkInclusion({s1}, {s2})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().checkInclusion(s1, s2, {result})"
    checker: |
      class Checker:
          def checkInclusion(self, s1, s2, result):
              if not isinstance(result, bool):
                  return False
              if not isinstance(s1, str) or not isinstance(s2, str):
                  return False
              if not (1 <= len(s1) <= 10000 and 1 <= len(s2) <= 10000):
                  return False
              if any(not ("a" <= ch <= "z") for ch in s1 + s2):
                  return False
              n1, n2 = len(s1), len(s2)
              if n2 < n1:
                  return result is False
              c1 = [0] * 26
              c2 = [0] * 26
              for i in range(n1):
                  c1[ord(s1[i]) - 97] += 1
                  c2[ord(s2[i]) - 97] += 1
              if c1 == c2:
                  return result is True
              for i in range(n1, n2):
                  c2[ord(s2[i]) - 97] += 1
                  c2[ord(s2[i - n1]) - 97] -= 1
                  if c1 == c2:
                      return result is True
              return result is False
seed: 567
tests:
  - name: example-1
    in:
      s1: "ab"
      s2: "eidbaooo"
    out: true
  - name: example-2
    in:
      s1: "ab"
      s2: "eidboaoo"
    out: false
  - name: single-char-match
