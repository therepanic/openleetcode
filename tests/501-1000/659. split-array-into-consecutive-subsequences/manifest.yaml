entry:
  id: 659
  title: split-array-into-consecutive-subsequences
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().isPossible({nums})"
    rust: "Solution::is_possible({nums})"
    python3: "Solution().isPossible({nums})"
    python2: "Solution().isPossible({nums})"
    ruby: "is_possible({nums})"
    java: "new Solution().isPossible({nums})"
    csharp: "new Solution().IsPossible({nums})"
    kotlin: "Solution().isPossible({nums})"
    go: "isPossible({nums})"
    dart: "Solution().isPossible({nums})"
    swift: "Solution().isPossible({nums})"
    typescript: "isPossible({nums})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().isPossible(nums, {result})"
    checker: |
      from collections import Counter, defaultdict

      class Checker:
          def _expected(self, nums):
              count = Counter(nums)
              subseq = defaultdict(int)

              for num in nums:
                  if count[num] == 0:
                      continue
                  if subseq[num - 1] > 0:
                      subseq[num - 1] -= 1
                      subseq[num] += 1
                  elif count[num + 1] > 0 and count[num + 2] > 0:
                      count[num + 1] -= 1
                      count[num + 2] -= 1
                      subseq[num + 2] += 1
                  else:
                      return False
                  count[num] -= 1

              return True

          def isPossible(self, nums, result):
              return result == self._expected(nums)
seed: 659
