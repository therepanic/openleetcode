entry:
  id: 883
  title: projection-area-of-3d-shapes
  params:
    grid:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().projectionArea({grid})"
    rust: "Solution::projection_area({grid})"
    python3: "Solution().projectionArea({grid})"
    python2: "Solution().projectionArea({grid})"
    ruby: "projection_area({grid})"
    java: "new Solution().projectionArea({grid})"
    csharp: "new Solution().ProjectionArea({grid})"
    kotlin: "Solution().projectionArea({grid})"
    go: "projectionArea({grid})"
    dart: "Solution().projectionArea({grid})"
    swift: "Solution().projectionArea({grid})"
    typescript: "projectionArea({grid})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 128
oracle:
  python3:
    call: "Checker().projectionArea(grid, {result})"
    checker: |
      class Checker:
          def projectionArea(self, grid, result):
              xy = sum(1 for row in grid for v in row if v > 0)
              yz = sum(max(row) for row in grid)
              zx = sum(max(col) for col in zip(*grid))
              return xy + yz + zx == result
seed: 883
