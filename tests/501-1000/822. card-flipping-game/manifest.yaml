judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 128
oracle:
  python3:
    call: Checker().check(fronts, backs, {result})
    checker: |
      class Checker:
          def check(self, fronts, backs, result):
              return isinstance(result, int)
