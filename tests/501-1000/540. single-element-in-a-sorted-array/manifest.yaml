entry:
  id: 540
  title: single-element-in-a-sorted-array
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().singleNonDuplicate({nums})"
    rust: "Solution::single_non_duplicate({nums})"
    python3: "Solution().singleNonDuplicate({nums})"
    python2: "Solution().singleNonDuplicate({nums})"
    ruby: "single_non_duplicate({nums})"
    java: "new Solution().singleNonDuplicate({nums})"
    csharp: "new Solution().SingleNonDuplicate({nums})"
    kotlin: "Solution().singleNonDuplicate({nums})"
    go: "singleNonDuplicate({nums})"
    dart: "Solution().singleNonDuplicate({nums})"
    swift: "Solution().singleNonDuplicate({nums})"
    typescript: "singleNonDuplicate({nums})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(nums, {result})"
    checker: |
      class Checker:
          def check(self, nums, result):
              if not isinstance(result, int):
                  return False
              xor_value = 0
              for value in nums:
                  xor_value ^= value
              return result == xor_value
seed: 540
