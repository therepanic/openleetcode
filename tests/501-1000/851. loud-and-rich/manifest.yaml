    out: [5, 5, 5, 3, 4, 5]
  - name: duplicate-depths
    in:
      richer:
        - [1, 0]
        - [2, 0]
        - [3, 1]
        - [4, 2]
        - [5, 2]
      quiet: [10, 9, 8, 7, 6, 5]
    out: [5, 3, 5, 3, 4, 5]
  - name: long-chain-seven
    in:
      richer:
        - [1, 0]
        - [2, 1]
        - [3, 2]
        - [4, 3]
        - [5, 4]
        - [6, 5]
      quiet: [6, 5, 4, 3, 2, 1, 0]
