entry:
  id: 851
  title: loud-and-rich
  params:
    richer:
      type: array
      items:
        type: array
        items:
          type: int
    quiet:
      type: array
      items:
        type: int
  call:
    cpp: Solution().loudAndRich({richer}, {quiet})
    rust: Solution::loud_and_rich({richer}, {quiet})
    python3: Solution().loudAndRich({richer}, {quiet})
    python2: Solution().loudAndRich({richer}, {quiet})
    ruby: loud_and_rich({richer}, {quiet})
    java: new Solution().loudAndRich({richer}, {quiet})
    csharp: new Solution().LoudAndRich({richer}, {quiet})
    kotlin: Solution().loudAndRich({richer}, {quiet})
    go: loudAndRich({richer}, {quiet})
    dart: Solution().loudAndRich({richer}, {quiet})
    swift: Solution().loudAndRich({richer}, {quiet})
    typescript: loudAndRich({richer}, {quiet})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().ok({result})
    checker: |
      class Checker:
          def ok(self, result):
              return True
seed: 851
tests:
  - name: example-one
    in:
      richer:
        - [1, 0]
        - [2, 1]
        - [3, 1]
        - [3, 7]
        - [4, 3]
        - [5, 3]
        - [6, 3]
      quiet: [3, 2, 5, 4, 6, 1, 7, 0]
    out: [5, 5, 2, 5, 4, 5, 6, 7]
  - name: example-two
    in:
      richer: []
      quiet: [0]
    out: [0]
  - name: two-node-chain
    in:
      richer:
        - [1, 0]
      quiet: [5, 3]
    out: [1, 1]
  - name: three-node-chain
    in:
      richer:
        - [1, 0]
        - [2, 1]
      quiet: [10, 7, 1]
    out: [2, 2, 2]
  - name: star-to-root
    in:
      richer:
        - [1, 0]
        - [2, 0]
        - [3, 0]
      quiet: [3, 2, 1, 0]
    out: [3, 1, 2, 3]
  - name: quiet-root
    in:
      richer:
        - [1, 0]
        - [2, 1]
        - [3, 2]
      quiet: [0, 1, 2, 3]
    out: [0, 1, 2, 3]
  - name: reverse-quiet
    in:
      richer:
        - [1, 0]
        - [2, 0]
        - [3, 1]
      quiet: [9, 6, 8, 1]
    out: [3, 3, 2, 3]
  - name: disconnected-pairs
    in:
      richer:
        - [1, 0]
        - [3, 2]
      quiet: [4, 1, 3, 0]
    out: [1, 1, 3, 3]
  - name: diamond
    in:
      richer:
        - [1, 0]
        - [2, 0]
        - [3, 1]
        - [3, 2]
      quiet: [8, 4, 2, 1]
    out: [3, 3, 3, 3]
  - name: leaf-minimum
    in:
      richer:
        - [1, 0]
        - [2, 0]
        - [3, 1]
        - [4, 1]
      quiet: [9, 7, 8, 6, 5]
    out: [4, 4, 2, 3, 4]
  - name: chain-five
    in:
      richer:
        - [1, 0]
        - [2, 1]
        - [3, 2]
        - [4, 3]
      quiet: [4, 3, 2, 1, 0]
    out: [4, 4, 4, 4, 4]
  - name: branching
    in:
      richer:
        - [2, 0]
        - [2, 1]
        - [3, 1]
        - [4, 2]
      quiet: [10, 9, 8, 7, 6]
    out: [4, 4, 4, 3, 4]
  - name: isolated-four
    in:
      richer: []
      quiet: [3, 1, 4, 2]
    out: [0, 1, 2, 3]
  - name: fan-in
    in:
      richer:
        - [4, 0]
        - [4, 1]
        - [4, 2]
        - [4, 3]
      quiet: [9, 8, 7, 6, 5]
    out: [4, 4, 4, 4, 4]
  - name: fan-out
    in:
      richer:
        - [1, 4]
        - [2, 4]
        - [3, 4]
        - [0, 4]
      quiet: [0, 1, 2, 3, 4]
    out: [0, 1, 2, 3, 0]
  - name: mixed-branch
    in:
      richer:
        - [1, 0]
        - [2, 0]
        - [3, 1]
        - [4, 1]
        - [5, 2]
      quiet: [6, 5, 4, 3, 2, 1]
    out: [5, 4, 5, 3, 4, 5]
  - name: one-sink
    in:
      richer:
        - [1, 0]
        - [2, 0]
        - [2, 1]
      quiet: [7, 2, 1]
    out: [2, 2, 2]
  - name: zigzag
    in:
      richer:
        - [1, 0]
        - [2, 1]
        - [3, 1]
        - [4, 2]
        - [5, 2]
