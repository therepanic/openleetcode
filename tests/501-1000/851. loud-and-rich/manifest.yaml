        - [5, 4]
        - [6, 5]
      quiet: [0, 1, 2, 3, 4, 5, 6]
    out: [0, 1, 2, 3, 4, 5, 6]
  - name: tie-break-by-quiet
    in:
      richer:
        - [1, 0]
        - [2, 0]
        - [3, 1]
        - [4, 2]
      quiet: [9, 4, 3, 2, 1]
    out: [4, 3, 4, 3, 4]
  - name: root-wins
    in:
      richer:
        - [1, 0]
        - [2, 1]
      quiet: [0, 10, 20]
    out: [0, 1, 2]
  - name: leaf-wins
    in:
      richer:
        - [1, 0]
        - [2, 0]
        - [3, 2]
      quiet: [9, 8, 1, 0]
    out: [3, 1, 3, 3]
  - name: branching-two-minima
    in:
      richer:
        - [2, 0]
        - [3, 0]
        - [4, 2]
        - [5, 3]
      quiet: [9, 8, 7, 6, 5, 4]
    out: [5, 1, 4, 5, 4, 5]
  - name: flat-six
