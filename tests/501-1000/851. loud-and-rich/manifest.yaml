        - [3, 1]
        - [3, 2]
        - [4, 2]
        - [5, 3]
      quiet: [12, 11, 10, 9, 8, 7]
    out: [5, 5, 5, 5, 4, 5]
  - name: criss-cross
    in:
      richer:
