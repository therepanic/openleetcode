        - [3, 1]
        - [4, 1]
        - [5, 2]
        - [5, 4]
      quiet: [10, 9, 8, 7, 6, 5]
    out: [5, 5, 5, 3, 5, 5]
  - name: two-components
    in:
      richer:
        - [1, 0]
        - [2, 1]
        - [4, 3]
