  - name: root-with-three-levels
    in:
      richer:
        - [1, 0]
        - [2, 0]
        - [3, 1]
        - [4, 1]
        - [5, 2]
        - [6, 2]
      quiet: [13, 12, 11, 10, 9, 8, 7]
    out: [6, 4, 6, 3, 4, 5, 6]
  - name: max-index-quietest
    in:
      richer:
        - [4, 3]
        - [3, 2]
        - [2, 1]
        - [1, 0]
      quiet: [9, 8, 7, 6, 0]
    out: [4, 4, 4, 4, 4]
