oracle:
  python3:
    call: Checker().findRedundantDirectedConnection(edges, {result})
    checker: |
      class Checker:
          def findRedundantDirectedConnection(self, edges, result):
              if not isinstance(result, list) or len(result) != 2:
                  return False
              if any(not isinstance(x, int) for x in result):
                  return False
              n = len(edges)
              if len(edges) != n:
                  return False
              if len(result) != 2:
                  return False
              u, v = result
              if u < 1 or u > n or v < 1 or v > n or u == v:
                  return False

              indeg = [0] * (n + 1)
              g = [[] for _ in range(n + 1)]
              removed = False
              for a, b in edges:
                  if not removed and a == u and b == v:
                      removed = True
                      continue
                  indeg[b] += 1
                  g[a].append(b)
                  if indeg[b] > 1:
                      return False

              roots = [i for i in range(1, n + 1) if indeg[i] == 0]
              if len(roots) != 1:
                  return False

              root = roots[0]
              seen = [False] * (n + 1)
              stack = [root]
              seen[root] = True
              count = 0
              while stack:
                  node = stack.pop()
                  count += 1
                  for nxt in g[node]:
                      if seen[nxt]:
                          return False
                      seen[nxt] = True
                      stack.append(nxt)
              return count == n and removed
