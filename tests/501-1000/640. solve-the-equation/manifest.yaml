entry:
  id: 640
  title: solve-the-equation
  params:
    equation:
      type: string
  call:
    cpp: Solution().solveEquation({equation})
    rust: Solution::solve_equation({equation})
    python3: Solution().solveEquation({equation})
    python2: Solution().solveEquation({equation})
    ruby: solve_equation({equation})
    java: new Solution().solveEquation({equation})
    csharp: new Solution().SolveEquation({equation})
    kotlin: Solution().solveEquation({equation})
    go: solveEquation({equation})
    dart: Solution().solveEquation({equation})
    swift: Solution().solveEquation({equation})
    typescript: solveEquation({equation})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().solveEquation(equation, {result})
    checker: |
      class Checker:
          def solveEquation(self, equation, result):
              left, right = equation.split("=")

              def parse_side(side):
                  coeff = 0
                  const = 0
                  num = ""
                  sign = 1
                  for char in side + "+":
                      if char in "+-":
                          if num:
                              const += sign * int(num)
                              num = ""
                          sign = 1 if char == "+" else -1
                      elif char.isdigit():
                          num += char
                      elif char == "x":
                          coeff += sign * (int(num) if num else 1)
                          num = ""
                  return coeff, const

              left_coeff, left_const = parse_side(left)
              right_coeff, right_const = parse_side(right)
              coeff = left_coeff - right_coeff
              const = right_const - left_const
              if coeff == 0:
                  expected = "No solution" if const != 0 else "Infinite solutions"
              else:
                  expected = "x={}".format(const / coeff)
              return result == expected
seed: 640
tests:
  - name: example_1
    in:
      equation: x+5-3+x=6+x-2
    out: x=2
  - name: example_2
    in:
      equation: x=x
    out: Infinite solutions
