judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(nums, {result})"
    checker: |
      import json

      class Checker:
          def check(self, nums, result):
              if not isinstance(result, str):
                  return False
              try:
                  decoded = json.loads(result)
                  if isinstance(decoded, str):
                      result = decoded
              except Exception:
                  pass
              if len(nums) == 1:
                  expected = str(nums[0])
              elif len(nums) == 2:
                  expected = str(nums[0]) + "/" + str(nums[1])
              else:
                  expected = str(nums[0]) + "/(" + "/".join(str(value) for value in nums[1:]) + ")"
              return result == expected
seed: 553
