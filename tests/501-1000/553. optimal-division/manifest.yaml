  call:
    cpp: "Solution().optimalDivision({nums})"
    rust: "Solution::optimal_division({nums})"
    python3: "Solution().optimalDivision({nums})"
    python2: "Solution().optimalDivision({nums})"
    ruby: "optimal_division({nums})"
    java: "new Solution().optimalDivision({nums})"
    csharp: "new Solution().OptimalDivision({nums})"
    kotlin: "Solution().optimalDivision({nums})"
