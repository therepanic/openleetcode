judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().repeatedStringMatch(a, b, {result})"
    checker: |
      class Checker:
          def repeatedStringMatch(self, a, b, result):
              if not isinstance(result, int):
                  return False
              if result < -1:
                  return False
              if len(a) == 0 or len(b) == 0:
                  return False
              if any(c < 'a' or c > 'z' for c in a + b):
                  return False
              repeat = a
              count = 1
              while len(repeat) < len(b) + len(a):
                  if b in repeat:
                      return result == count
                  repeat += a
                  count += 1
              if b in repeat:
                  return result == count
              return result == -1
