      type: string
  call:
    cpp: "Solution().repeatedStringMatch({a}, {b})"
    rust: "Solution::repeated_string_match({a}, {b})"
    python3: "Solution().repeatedStringMatch({a}, {b})"
    python2: "Solution().repeatedStringMatch({a}, {b})"
    ruby: "repeated_string_match({a}, {b})"
    java: "new Solution().repeatedStringMatch({a}, {b})"
    csharp: "new Solution().RepeatedStringMatch({a}, {b})"
    kotlin: "Solution().repeatedStringMatch({a}, {b})"
    go: "repeatedStringMatch({a}, {b})"
    dart: "Solution().repeatedStringMatch({a}, {b})"
    swift: "Solution().repeatedStringMatch({a}, {b})"
