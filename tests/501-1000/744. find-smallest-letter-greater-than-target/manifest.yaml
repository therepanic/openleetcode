entry:
  id: 744
  title: find-smallest-letter-greater-than-target
  params:
    letters:
      type: array
      items:
        type: char
    target:
      type: char
  call:
    cpp: "Solution().nextGreatestLetter({letters}, {target})"
    rust: "Solution::next_greatest_letter({letters}, {target})"
    python3: "Solution().nextGreatestLetter({letters}, {target})"
    python2: "Solution().nextGreatestLetter({letters}, {target})"
    ruby: "next_greatest_letter({letters}, {target})"
    java: "new Solution().nextGreatestLetter({letters}, {target})"
    csharp: "new Solution().NextGreatestLetter({letters}, {target})"
    kotlin: "Solution().nextGreatestLetter({letters}, {target})"
    go: "string(nextGreatestLetter({letters}, {target}))"
    dart: "Solution().nextGreatestLetter({letters}, {target})"
    swift: "Solution().nextGreatestLetter({letters}, {target})"
    typescript: "nextGreatestLetter({letters}, {target})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().nextGreatestLetter(letters, target, {result})"
    checker: |
      class Checker:
          def nextGreatestLetter(self, letters, target, result):
              if not isinstance(result, str) or len(result) != 1:
                  return False
              if not isinstance(letters, list) or len(letters) < 2:
                  return False
              prev = None
              distinct = set()
              for ch in letters:
                  if not isinstance(ch, str) or len(ch) != 1:
                      return False
                  if prev is not None and ch < prev:
                      return False
                  prev = ch
                  distinct.add(ch)
              if len(distinct) < 2:
                  return False
              expected = letters[0]
              for ch in letters:
                  if ch > target:
                      expected = ch
                      break
              return result == expected
seed: 744
