  title: spiral-matrix-iii
  params:
    rows:
      type: int
    cols:
      type: int
    rStart:
      type: int
    cStart:
      type: int
  call:
    cpp: "Solution().spiralMatrixIII({rows}, {cols}, {rStart}, {cStart})"
    rust: "Solution::spiral_matrix_iii({rows}, {cols}, {rStart}, {cStart})"
    python3: "Solution().spiralMatrixIII({rows}, {cols}, {rStart}, {cStart})"
    python2: "Solution().spiralMatrixIII({rows}, {cols}, {rStart}, {cStart})"
    ruby: "spiral_matrix_iii({rows}, {cols}, {rStart}, {cStart})"
    java: "new Solution().spiralMatrixIII({rows}, {cols}, {rStart}, {cStart})"
    csharp: "new Solution().SpiralMatrixIII({rows}, {cols}, {rStart}, {cStart})"
    kotlin: "Solution().spiralMatrixIII({rows}, {cols}, {rStart}, {cStart})"
    go: "spiralMatrixIII({rows}, {cols}, {rStart}, {cStart})"
    dart: "Solution().spiralMatrixIII({rows}, {cols}, {rStart}, {cStart})"
    swift: "Solution().spiralMatrixIII({rows}, {cols}, {rStart}, {cStart})"
    typescript: "spiralMatrixIII({rows}, {cols}, {rStart}, {cStart})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 128
oracle:
  python3:
    call: "Checker().spiralMatrixIII(rows, cols, rStart, cStart, {result})"
    checker: |
      class Checker:
          def spiralMatrixIII(self, rows, cols, rStart, cStart, result):
oracle:
  python3:
    call: "Checker().spiralMatrixIII(rows, cols, rStart, cStart, {result})"
    checker: |
      class Checker:
          def spiralMatrixIII(self, rows, cols, rStart, cStart, result):
              seen = []
              top = bottom = rStart
              left = right = cStart
              seen.append([rStart, cStart])
              while len(seen) < rows * cols:
                  right += 1
                  for i in range(left + 1, right + 1):
                      if 0 <= top < rows and 0 <= i < cols:
                          seen.append([top, i])
                          if len(seen) == rows * cols:
                              return seen == result
                  bottom += 1
                  for i in range(top + 1, bottom + 1):
                      if 0 <= right < cols and 0 <= i < rows:
                          seen.append([i, right])
                          if len(seen) == rows * cols:
                              return seen == result
                  left -= 1
                  for i in range(right - 1, left - 1, -1):
                      if 0 <= i < cols and 0 <= bottom < rows:
                          seen.append([bottom, i])
                          if len(seen) == rows * cols:
                              return seen == result
                  top -= 1
                  for i in range(bottom - 1, top - 1, -1):
                      if 0 <= i < rows and 0 <= left < cols:
                          seen.append([i, left])
                          if len(seen) == rows * cols:
                              return seen == result
              return seen == result
