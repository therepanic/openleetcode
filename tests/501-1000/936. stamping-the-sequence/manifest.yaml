entry:
  id: 936
  title: stamping-the-sequence
  params:
    stamp:
      type: string
    target:
      type: string
  call:
    cpp: Solution().movesToStamp({stamp}, {target})
    rust: Solution::moves_to_stamp({stamp}, {target})
    python3: Solution().movesToStamp({stamp}, {target})
    python2: Solution().movesToStamp({stamp}, {target})
    ruby: moves_to_stamp({stamp}, {target})
    java: new Solution().movesToStamp({stamp}, {target})
    csharp: new Solution().MovesToStamp({stamp}, {target})
    kotlin: Solution().movesToStamp({stamp}, {target})
    go: movesToStamp({stamp}, {target})
    dart: Solution().movesToStamp({stamp}, {target})
    swift: Solution().movesToStamp({stamp}, {target})
    typescript: movesToStamp({stamp}, {target})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 256
oracle:
  python3:
    call: Checker().movesToStamp(stamp, target, {result})
    checker:
      "class Checker:\n    def movesToStamp(self, stamp, target, result):\n\
      \        if not isinstance(result, list):\n            return False\n      \
      \  n = len(target)\n        m = len(stamp)\n        if len(result) > 10 * n:\n\
      \            return False\n        cur = ['?'] * n\n        for pos in result:\n\
      \            if not isinstance(pos, int) or pos < 0 or pos + m > n:\n      \
      \          return False\n            for j, ch in enumerate(stamp):\n      \
      \              cur[pos + j] = ch\n        return ''.join(cur) == target\n"
seed: 936
