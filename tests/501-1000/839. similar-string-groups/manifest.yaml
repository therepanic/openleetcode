entry:
  id: 839
  title: similar-string-groups
  params:
    strs:
      type: array
      items:
        type: string
  call:
    cpp: "Solution().numSimilarGroups({strs})"
    rust: "Solution::num_similar_groups({strs})"
    python3: "Solution().numSimilarGroups({strs})"
    python2: "Solution().numSimilarGroups({strs})"
    ruby: "num_similar_groups({strs})"
    java: "new Solution().numSimilarGroups({strs})"
    csharp: "new Solution().NumSimilarGroups({strs})"
    kotlin: "Solution().numSimilarGroups({strs})"
    go: "numSimilarGroups({strs})"
    dart: "Solution().numSimilarGroups({strs})"
    swift: "Solution().numSimilarGroups({strs})"
    typescript: "numSimilarGroups({strs})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().numSimilarGroups(strs, {result})"
    checker: |
      class Checker:
          def numSimilarGroups(self, strs, result):
              if not isinstance(result, int):
                  return False
              n = len(strs)
              parent = list(range(n))

              def find(x):
                  while parent[x] != x:
                      parent[x] = parent[parent[x]]
                      x = parent[x]
                  return x

              def union(a, b):
                  ra, rb = find(a), find(b)
                  if ra != rb:
                      parent[rb] = ra

              for i in range(n):
                  for j in range(i + 1, n):
                      diff = 0
                      for a, b in zip(strs[i], strs[j]):
                          if a != b:
                              diff += 1
                              if diff > 2:
                                  break
                      if diff == 0 or diff == 2:
                          union(i, j)
              expected = len({find(i) for i in range(n)})
              return result == expected

seed: 839

