entry:
  id: 797
  title: all-paths-from-source-to-target
  params:
    graph:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().allPathsSourceTarget({graph})"
    rust: "Solution::all_paths_source_target({graph})"
    python3: "Solution().allPathsSourceTarget({graph})"
    python2: "Solution().allPathsSourceTarget({graph})"
    ruby: "all_paths_source_target({graph})"
    java: "new Solution().allPathsSourceTarget({graph})"
    csharp: "new Solution().AllPathsSourceTarget({graph})"
    kotlin: "Solution().allPathsSourceTarget({graph})"
    go: "allPathsSourceTarget({graph})"
    dart: "Solution().allPathsSourceTarget({graph})"
    swift: "Solution().allPathsSourceTarget({graph})"
    typescript: "allPathsSourceTarget({graph})"
judge:
  type: ignore_order
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(graph, {result})"
    checker: |
      class Checker:
          def check(self, graph, result):
              target = len(graph) - 1
              expected = []

              def dfs(node, path):
                  if node == target:
                      expected.append(tuple(path))
                      return
                  for nxt in graph[node]:
                      dfs(nxt, path + [nxt])

              dfs(0, [0])

              try:
                  got = [tuple(path) for path in result]
              except TypeError:
                  return False

              if len(got) != len(expected):
                  return False
              if len(set(got)) != len(got):
                  return False
              if set(got) != set(expected):
                  return False
              for path in got:
                  if not path or path[0] != 0 or path[-1] != target:
                      return False
                  for a, b in zip(path, path[1:]):
                      if b not in graph[a]:
                          return False
              return True
