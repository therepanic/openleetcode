entry:
  id: 669
  title: trim-a-binary-search-tree
  params:
    root:
      type: tree_node
    low:
      type: int
    high:
      type: int
  call:
    cpp: "treeNodeToArray(Solution().trimBST({root}, {low}, {high}))"
    rust: "TreeNode::tree_node_to_array(Solution::trim_bst({root}, {low}, {high}))"
    python3: "tree_node_to_array(Solution().trimBST({root}, {low}, {high}))"
    python2: "tree_node_to_array(Solution().trimBST({root}, {low}, {high}))"
    ruby: "tree_node_to_array(trim_bst({root}, {low}, {high}))"
    java: "TreeNode.treeNodeToArray(new Solution().trimBST({root}, {low}, {high}))"
    csharp: "TreeNode.TreeNodeToArray(new Solution().TrimBST({root}, {low}, {high}))"
    kotlin: "treeNodeToArray(Solution().trimBST({root}, {low}, {high}))"
    go: "treeNodeToArray(trimBST({root}, {low}, {high}))"
    dart: "tree_node_to_array(Solution().trimBST({root}, {low}, {high}))"
    swift: "tree_node_to_array(Solution().trimBST({root}, {low}, {high}))"
    typescript: "treeNodeToArray(trimBST({root}, {low}, {high}))"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().trimBST(root, low, high, {result})"
    checker: |
      class Checker(object):
          def _build(self, arr):
              if arr is None:
                  return None
              values = list(arr)
              if not values:
                  return None
              root = [values[0], None, None]
              queue = [root]
              head = 0
              idx = 1
              while head < len(queue) and idx < len(values):
                  node = queue[head]
                  head += 1
                  if idx < len(values):
                      left_val = values[idx]
                      idx += 1
                      if left_val is not None:
                          node[1] = [left_val, None, None]
                          queue.append(node[1])
                  if idx < len(values):
                      right_val = values[idx]
                      idx += 1
                      if right_val is not None:
                          node[2] = [right_val, None, None]
                          queue.append(node[2])
              return root

          def _trim(self, node, low, high):
              if node is None:
                  return None
              if node[0] < low:
                  return self._trim(node[2], low, high)
              if node[0] > high:
                  return self._trim(node[1], low, high)
              return [node[0], self._trim(node[1], low, high), self._trim(node[2], low, high)]

          def _to_array(self, node):
              if node is None:
                  return None
              out = []
              queue = [node]
              head = 0
              while head < len(queue):
                  cur = queue[head]
                  head += 1
                  if cur is None:
                      out.append(None)
                      continue
                  out.append(cur[0])
                  queue.append(cur[1])
                  queue.append(cur[2])
              while out and out[-1] is None:
                  out.pop()
              return out

          def trimBST(self, root, low, high, result):
              expected = self._to_array(self._trim(self._build(root), low, high))
              return expected == result
