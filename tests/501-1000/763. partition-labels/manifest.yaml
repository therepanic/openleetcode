  title: partition-labels
  params:
    s:
      type: string
  call:
    cpp: "Solution().partitionLabels({s})"
    rust: "Solution::partition_labels({s})"
    python3: "Solution().partitionLabels({s})"
    python2: "Solution().partitionLabels({s})"
    ruby: "partition_labels({s})"
    java: "new Solution().partitionLabels({s})"
    csharp: "new Solution().PartitionLabels({s})"
    kotlin: "Solution().partitionLabels({s})"
    go: "partitionLabels({s})"
    dart: "Solution().partitionLabels({s})"
    swift: "Solution().partitionLabels({s})"
    typescript: "partitionLabels({s})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().partitionLabels(s, {result})"
    checker: |
      class Checker:
          def partitionLabels(self, s, result):
              if not isinstance(result, list):
                  return False
              total = 0
              for length in result:
                  if not isinstance(length, int) or length <= 0:
                      return False
                  total += length
              if total != len(s):
                  return False
              last = {}
              for i, ch in enumerate(s):
                  last[ch] = i
              expected = []
              start = 0
              end = 0
              for i, ch in enumerate(s):
                  if last[ch] > end:
                      end = last[ch]
                  if i == end:
                      expected.append(end - start + 1)
                      start = i + 1
              return result == expected
seed: 763
