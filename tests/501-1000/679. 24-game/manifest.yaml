entry:
  id: 679
  title: 24-game
  params:
    cards:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().judgePoint24({cards})"
    rust: "Solution::judge_point24({cards})"
    python3: "Solution().judgePoint24({cards})"
    python2: "Solution().judgePoint24({cards})"
    ruby: "judge_point24({cards})"
    java: "new Solution().judgePoint24({cards})"
    csharp: "new Solution().JudgePoint24({cards})"
    kotlin: "Solution().judgePoint24({cards})"
    go: "judgePoint24({cards})"
    dart: "Solution().judgePoint24({cards})"
    swift: "Solution().judgePoint24({cards})"
    typescript: "judgePoint24({cards})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().judgePoint24(cards, {result})"
    checker: |
      class Checker:
          def judgePoint24(self, cards, result):
              if not isinstance(result, bool):
                  return False

              EPS = 1e-6

              def dfs(nums):
                  if len(nums) == 1:
                      return abs(nums[0] - 24.0) < EPS

                  for i in range(len(nums)):
                      for j in range(len(nums)):
                          if i == j:
                              continue
                          next_nums = [nums[k] for k in range(len(nums)) if k != i and k != j]
                          a, b = nums[i], nums[j]
                          candidates = [a + b, a - b, b - a, a * b]
                          if abs(b) > EPS:
                              candidates.append(a / b)
                          if abs(a) > EPS:
                              candidates.append(b / a)

                          for val in candidates:
                              if dfs(next_nums + [val]):
                                  return True
                  return False

              return result == dfs([float(x) for x in cards])
