entry:
  id: 775
  title: global-and-local-inversions
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().isIdealPermutation({nums})"
    rust: "Solution::is_ideal_permutation({nums})"
    python3: "Solution().isIdealPermutation({nums})"
    python2: "Solution().isIdealPermutation({nums})"
    ruby: "is_ideal_permutation({nums})"
    java: "new Solution().isIdealPermutation({nums})"
    csharp: "new Solution().IsIdealPermutation({nums})"
    kotlin: "Solution().isIdealPermutation({nums})"
    go: "isIdealPermutation({nums})"
    dart: "Solution().isIdealPermutation({nums})"
    swift: "Solution().isIdealPermutation({nums})"
    typescript: "isIdealPermutation({nums})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().isIdealPermutation(nums, {result})"
    checker: |
      class Checker:
          def isIdealPermutation(self, nums, result):
              expected = True
              for i, num in enumerate(nums):
                  if abs(num - i) > 1:
                      expected = False
                      break
              return result == expected
seed: 775
