judge:
  type: exact

limits:
  time_ms: 2000
  memory_mb: 512

oracle:
  python3:
    call: "Checker().knightProbability(n, k, row, column, {result})"
    checker: |
      import math
      from functools import lru_cache

      class Checker:
          def knightProbability(self, n, k, row, column, result):
              if not isinstance(result, (int, float)):
                  return False
              if not math.isfinite(result):
                  return False
              if result < -1e-12 or result > 1.0 + 1e-12:
                  return False

              moves = ((1, 2), (2, 1), (-1, 2), (-2, 1), (1, -2), (2, -1), (-1, -2), (-2, -1))

              @lru_cache(None)
              def dp(steps, r, c):
                  if r < 0 or r >= n or c < 0 or c >= n:
                      return 0.0
                  if steps == 0:
                      return 1.0
                  total = 0.0
                  for dr, dc in moves:
                      total += dp(steps - 1, r + dr, c + dc)
                  return total / 8.0

              expected = dp(k, row, column)
              return abs(float(result) - expected) <= 1e-9 + 1e-12 * max(1.0, abs(expected))

seed: 688

