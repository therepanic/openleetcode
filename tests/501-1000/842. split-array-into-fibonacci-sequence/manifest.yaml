entry:
  id: 842
  title: split-array-into-fibonacci-sequence
  params:
    num:
      type: string
  call:
    cpp: Solution().splitIntoFibonacci({num})
    rust: Solution::split_into_fibonacci({num})
    python3: Solution().splitIntoFibonacci({num})
    python2: Solution().splitIntoFibonacci({num})
    ruby: split_into_fibonacci({num})
    java: new Solution().splitIntoFibonacci({num})
    csharp: new Solution().SplitIntoFibonacci({num})
    kotlin: Solution().splitIntoFibonacci({num})
    go: splitIntoFibonacci({num})
    dart: Solution().splitIntoFibonacci({num})
    swift: Solution().splitIntoFibonacci({num})
    typescript: splitIntoFibonacci({num})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().splitIntoFibonacci(num, {result})
    checker:
      "class Checker:\n    def _valid(self, num):\n        n = len(num)\n \
      \       def invalid(x):\n            return x[0] == '0' and len(x) > 1 or int(x)\
      \ >= (1 << 31)\n\n        def dfs(a0, a1, idx):\n            if idx == n:\n\
      \                return True\n            nxt = str(int(a0) + int(a1))\n   \
      \         if invalid(nxt):\n                return False\n            if not\
      \ num.startswith(nxt, idx):\n                return False\n            return\
      \ dfs(a1, nxt, idx + len(nxt))\n\n        for j in range(1, n):\n          \
      \  for i in range(j):\n                a0 = num[:i + 1]\n                a1\
      \ = num[i + 1:j + 1]\n                if invalid(a0) or invalid(a1):\n     \
      \               continue\n                if dfs(a0, a1, j + 1):\n         \
      \           return True\n        return False\n\n    def splitIntoFibonacci(self,\
      \ num, result):\n        if not isinstance(result, list):\n            return\
      \ False\n        if result:\n            if len(result) < 3:\n             \
      \   return False\n            if any((not isinstance(x, int)) or x < 0 or x\
      \ >= (1 << 31) for x in result):\n                return False\n           \
      \ pieces = []\n            for x in result:\n                s = str(x)\n  \
      \              if len(s) > 1 and s[0] == '0':\n                    return False\n\
      \                pieces.append(s)\n            if ''.join(pieces) != num:\n\
      \                return False\n            for i in range(len(result) - 2):\n\
      \                if result[i] + result[i + 1] != result[i + 2]:\n          \
      \          return False\n            return True\n        return not self._valid(num)\n"
seed: 842842
