  title: vowel-spellchecker
  params:
    wordlist:
      type: array
      items:
        type: string
    queries:
      type: array
      items:
        type: string
  call:
    cpp: Solution().spellchecker({wordlist}, {queries})
    rust: Solution::spellchecker({wordlist}, {queries})
    python3: Solution().spellchecker({wordlist}, {queries})
    python2: Solution().spellchecker({wordlist}, {queries})
    ruby: spellchecker({wordlist}, {queries})
    java: new Solution().spellchecker({wordlist}, {queries})
    csharp: new Solution().Spellchecker({wordlist}, {queries})
    kotlin: Solution().spellchecker({wordlist}, {queries})
    go: spellchecker({wordlist}, {queries})
    dart: Solution().spellchecker({wordlist}, {queries})
    swift: Solution().spellchecker({wordlist}, {queries})
    typescript: spellchecker({wordlist}, {queries})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check({result})
    checker: "class Checker:\n    def check(self, result):\n        return True\n"
