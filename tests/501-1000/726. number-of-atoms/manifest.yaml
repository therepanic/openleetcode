judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(formula, {result})"
    checker: |
      class Checker:
          def check(self, formula, result):
              if not isinstance(formula, str) or not isinstance(result, str):
                  return False
              i = 0
              n = len(formula)

              def parse():
                  nonlocal i
                  counts = {}
                  while i < n and formula[i] != ')':
                      if formula[i] == '(':
                          i += 1
                          inner = parse()
                          if inner is None or i >= n or formula[i] != ')':
                              return None
                          i += 1
                          mult = 0
                          while i < n and formula[i].isdigit():
                              mult = mult * 10 + int(formula[i])
                              i += 1
                          if mult == 0:
                              mult = 1
                          for atom, cnt in inner.items():
                              counts[atom] = counts.get(atom, 0) + cnt * mult
                          continue

                      if not formula[i].isupper():
                          return None
                      start = i
                      i += 1
                      while i < n and formula[i].islower():
                          i += 1
                      atom = formula[start:i]
                      mult = 0
                      while i < n and formula[i].isdigit():
                          mult = mult * 10 + int(formula[i])
                          i += 1
                      if mult == 0:
                          mult = 1
                      counts[atom] = counts.get(atom, 0) + mult
                  return counts

              counts = parse()
              if counts is None or i != n:
                  return False
              expected = "".join(
                  atom + (str(counts[atom]) if counts[atom] > 1 else "")
                  for atom in sorted(counts)
              )
              return result == expected
seed: 726
