entry:
  id: 726
  title: number-of-atoms
  params:
    formula:
      type: string
  call:
    cpp: "Solution().countOfAtoms({formula})"
    rust: "Solution::count_of_atoms({formula})"
    python3: "Solution().countOfAtoms({formula})"
    python2: "Solution().countOfAtoms({formula})"
    ruby: "count_of_atoms({formula})"
    java: "new Solution().countOfAtoms({formula})"
    csharp: "new Solution().CountOfAtoms({formula})"
    kotlin: "Solution().countOfAtoms({formula})"
    go: "countOfAtoms({formula})"
