judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().openLock(deadends, target, {result})"
    checker: |
      from collections import deque

      class Checker:
          def _neighbors(self, state):
              for i, ch in enumerate(state):
                  digit = ord(ch) - ord("0")
                  yield state[:i] + str((digit + 1) % 10) + state[i + 1:]
                  yield state[:i] + str((digit - 1) % 10) + state[i + 1:]

          def _expected(self, deadends, target):
              if target == "0000":
                  return 0
              dead = set(deadends)
              if "0000" in dead:
                  return -1

              queue = deque([("0000", 0)])
              seen = {"0000"}

              while queue:
                  state, dist = queue.popleft()
                  if state == target:
                      return dist
                  for nxt in self._neighbors(state):
                      if nxt in dead or nxt in seen:
                          continue
                      seen.add(nxt)
                      queue.append((nxt, dist + 1))
              return -1

          def openLock(self, deadends, target, result):
              if not isinstance(result, int):
                  return False
              return result == self._expected(deadends, target)
