entry:
  id: 561
  title: array-partition
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().arrayPairSum({nums})"
    rust: "Solution::array_pair_sum({nums})"
    python3: "Solution().arrayPairSum({nums})"
    python2: "Solution().arrayPairSum({nums})"
    ruby: "array_pair_sum({nums})"
    java: "new Solution().arrayPairSum({nums})"
    csharp: "new Solution().ArrayPairSum({nums})"
    kotlin: "Solution().arrayPairSum({nums})"
    go: "arrayPairSum({nums})"
    dart: "Solution().arrayPairSum({nums})"
    swift: "Solution().arrayPairSum({nums})"
    typescript: "arrayPairSum({nums})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().arrayPairSum(nums, {result})"
    checker: |
      class Checker:
          def arrayPairSum(self, nums, result):
              if not isinstance(result, int):
                  return False
              return result == sum(sorted(nums)[::2])
seed: 561
