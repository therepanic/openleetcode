entry:
  id: 835
  title: image-overlap
  params:
    img1:
      type: array
      items:
        type: array
        items:
          type: int
    img2:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().largestOverlap({img1}, {img2})
    rust: Solution::largest_overlap({img1}, {img2})
    python3: Solution().largestOverlap({img1}, {img2})
    python2: Solution().largestOverlap({img1}, {img2})
    ruby: largest_overlap({img1}, {img2})
    java: new Solution().largestOverlap({img1}, {img2})
    csharp: new Solution().LargestOverlap({img1}, {img2})
    kotlin: Solution().largestOverlap({img1}, {img2})
    go: largestOverlap({img1}, {img2})
    dart: Solution().largestOverlap({img1}, {img2})
    swift: Solution().largestOverlap({img1}, {img2})
    typescript: largestOverlap({img1}, {img2})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().largestOverlap(img1, img2, {result})
    checker: "class Checker:\n    def largestOverlap(self, img1, img2, result):\n        from collections import Counter\n        n = len(img1)\n        a = [(i, j) for i in range(n) for j in range(n) if img1[i][j]]\n        b = [(i, j) for i in range(n) for j in range(n) if img2[i][j]]\n        cnt = Counter((x1 - x2, y1 - y2) for x1, y1 in a for x2, y2 in b)\n        return result == max(cnt.values() or [0])\n"
seed: 835
