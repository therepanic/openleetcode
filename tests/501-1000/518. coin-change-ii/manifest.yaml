entry:
  id: 518
  title: coin-change-ii
  params:
    amount:
      type: int
    coins:
      type: array
      items:
        type: int
  call:
    cpp: Solution().change({amount}, {coins})
    rust: Solution::change({amount}, {coins})
    python3: Solution().change({amount}, {coins})
    python2: Solution().change({amount}, {coins})
    ruby: change({amount}, {coins})
    java: new Solution().change({amount}, {coins})
    csharp: new Solution().Change({amount}, {coins})
    kotlin: Solution().change({amount}, {coins})
    go: change({amount}, {coins})
    dart: Solution().change({amount}, {coins})
    swift: Solution().change({amount}, {coins})
    typescript: change({amount}, {coins})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(amount, coins, {result})
    checker: "class Checker:\n    def check(self, amount, coins, result):\n        if not isinstance(result, int):\n            return False\n        n = len(coins)\n        dp = [[0] * (amount + 1) for _ in range(n + 1)]\n        for i in range(n + 1):\n            dp[i][0] = 1\n        for i in range(1, n + 1):\n            c = coins[i - 1]\n            for j in range(1, amount + 1):\n                if c <= j:\n                    dp[i][j] = dp[i][j - c] + dp[i - 1][j]\n                else:\n                    dp[i][j] = dp[i - 1][j]\n        return result == dp[n][amount]\n"
seed: 518
