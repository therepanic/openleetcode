    python3: Solution().hitBricks({grid}, {hits})
    python2: Solution().hitBricks({grid}, {hits})
    ruby: hit_bricks({grid}, {hits})
    java: new Solution().hitBricks({grid}, {hits})
    csharp: new Solution().HitBricks({grid}, {hits})
    kotlin: Solution().hitBricks({grid}, {hits})
    go: hitBricks({grid}, {hits})
    dart: Solution().hitBricks({grid}, {hits})
    swift: Solution().hitBricks({grid}, {hits})
    typescript: hitBricks({grid}, {hits})

judge:
  type: "exact"

limits:
