  memory_mb: 256

oracle:
  python3:
    call: "Checker().check(grid, hits, {result})"
    checker: |
      class Checker:
          def check(self, grid, hits, result):
              rows = len(grid)
              cols = len(grid[0])
              work = [row[:] for row in grid]
              for r, c in hits:
                  if 0 <= r < rows and 0 <= c < cols:
                      work[r][c] -= 1

              parent = list(range(rows * cols + 1))
              size = [1] * (rows * cols + 1)
              roof = rows * cols

              def idx(r, c):
                  return r * cols + c

              def find(x):
                  while parent[x] != x:
                      parent[x] = parent[parent[x]]
                      x = parent[x]
                  return x

              def union(a, b):
                  ra = find(a)
                  rb = find(b)
                  if ra == rb:
                      return
                  if size[ra] < size[rb]:
                      ra, rb = rb, ra
                  parent[rb] = ra
                  size[ra] += size[rb]

              def roof_size():
                  return size[find(roof)]

              for r in range(rows):
                  for c in range(cols):
                      if work[r][c] != 1:
                          continue
                      if r == 0:
                          union(idx(r, c), roof)
                      if r > 0 and work[r - 1][c] == 1:
                          union(idx(r, c), idx(r - 1, c))
                      if c > 0 and work[r][c - 1] == 1:
                          union(idx(r, c), idx(r, c - 1))

              ans = [0] * len(hits)
              for i in range(len(hits) - 1, -1, -1):
                  r, c = hits[i]
                  if grid[r][c] == 0:
                      continue
                  prev = roof_size()
                  work[r][c] += 1
                  if work[r][c] != 1:
                      continue
                  cur = idx(r, c)
                  if r == 0:
                      union(cur, roof)
                  for dr, dc in ((1, 0), (-1, 0), (0, 1), (0, -1)):
                      nr, nc = r + dr, c + dc
                      if 0 <= nr < rows and 0 <= nc < cols and work[nr][nc] == 1:
                          union(cur, idx(nr, nc))
                  ans[i] = max(0, roof_size() - prev - 1)

              return result == ans

