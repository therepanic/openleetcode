entry:
  id: 757
  title: "set-intersection-size-at-least-two"
  params:
    intervals:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().intersectionSizeTwo({intervals})"
    rust: "Solution::intersection_size_two({intervals})"
    python3: "Solution().intersectionSizeTwo({intervals})"
    python2: "Solution().intersectionSizeTwo({intervals})"
    ruby: "intersection_size_two({intervals})"
    java: "new Solution().intersectionSizeTwo({intervals})"
    csharp: "new Solution().IntersectionSizeTwo({intervals})"
    kotlin: "Solution().intersectionSizeTwo({intervals})"
    go: "intersectionSizeTwo({intervals})"
    dart: "Solution().intersectionSizeTwo({intervals})"
    swift: "Solution().intersectionSizeTwo({intervals})"
    typescript: "intersectionSizeTwo({intervals})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().intersectionSizeTwo(intervals, {result})"
    checker: |
      class Checker(object):
          def intersectionSizeTwo(self, intervals, result):
              return isinstance(result, int)

seed: 757

tests:
  - name: "example_1"
    in:
      intervals:
        - [1, 3]
        - [3, 7]
        - [8, 9]
    out: 5

