    python3: Solution().kthGrammar({n}, {k})
    python2: Solution().kthGrammar({n}, {k})
    ruby: kth_grammar({n}, {k})
    java: new Solution().kthGrammar({n}, {k})
    csharp: new Solution().KthGrammar({n}, {k})
    kotlin: Solution().kthGrammar({n}, {k})
    go: kthGrammar({n}, {k})
    dart: Solution().kthGrammar({n}, {k})
    swift: Solution().kthGrammar({n}, {k})
    typescript: kthGrammar({n}, {k})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().kthGrammar(n, k, {result})
    checker: |
      class Checker(object):
          def kthGrammar(self, n, k, result):
              return isinstance(result, int)
