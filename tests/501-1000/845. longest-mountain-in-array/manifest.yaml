entry:
  id: 845
  title: longest-mountain-in-array
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: Solution().longestMountain({arr})
    rust: Solution::longest_mountain({arr})
    python3: Solution().longestMountain({arr})
    python2: Solution().longestMountain({arr})
    ruby: longest_mountain({arr})
    java: new Solution().longestMountain({arr})
    csharp: new Solution().LongestMountain({arr})
    kotlin: Solution().longestMountain({arr})
    go: longestMountain({arr})
    dart: Solution().longestMountain({arr})
    swift: Solution().longestMountain({arr})
    typescript: longestMountain({arr})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().longestMountain(arr, {result})
    checker: |
      class Checker:
          def longestMountain(self, arr, result):
              return result == Solution().longestMountain(arr)
seed: 845
