judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().buddyStrings(s, goal, {result})"
    checker: |
      from collections import Counter

      class Checker:
          def buddyStrings(self, s, goal, result):
              if len(s) != len(goal):
                  return result is False
              if s == goal:
                  return (len(set(s)) < len(s)) == result
              diffs = [i for i, (a, b) in enumerate(zip(s, goal)) if a != b]
              expected = len(diffs) == 2 and s[diffs[0]] == goal[diffs[1]] and s[diffs[1]] == goal[diffs[0]]
              return expected == result
