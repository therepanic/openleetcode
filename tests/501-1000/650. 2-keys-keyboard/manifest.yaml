entry:
  id: 650
  title: 2-keys-keyboard
  params:
    n:
      type: int
  call:
    cpp: Solution().minSteps({n})
    rust: Solution::min_steps({n})
    python3: Solution().minSteps({n})
    python2: Solution().minSteps({n})
    ruby: min_steps({n})
    java: new Solution().minSteps({n})
    csharp: new Solution().MinSteps({n})
    kotlin: Solution().minSteps({n})
    go: minSteps({n})
    dart: Solution().minSteps({n})
    swift: Solution().minSteps({n})
    typescript: minSteps({n})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().minSteps(n, {result})
    checker: |
      class Checker:
          def minSteps(self, n, result):
              if not isinstance(n, int) or not isinstance(result, int):
                  return False
              if n < 1 or n > 1000:
                  return False
              if n == 1:
                  return result == 0

              total = 0
              x = n
              d = 2
              while d * d <= x:
                  while x % d == 0:
                      total += d
                      x //= d
                  d += 1
              if x > 1:
                  total += x
              return result == total
seed: 650
