entry:
  id: 873
  title: length-of-longest-fibonacci-subsequence
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().lenLongestFibSubseq({arr})"
    rust: "Solution::len_longest_fib_subseq({arr})"
    python3: "Solution().lenLongestFibSubseq({arr})"
    python2: "Solution().lenLongestFibSubseq({arr})"
    ruby: "len_longest_fib_subseq({arr})"
    java: "new Solution().lenLongestFibSubseq({arr})"
    csharp: "new Solution().LenLongestFibSubseq({arr})"
    kotlin: "Solution().lenLongestFibSubseq({arr})"
    go: "lenLongestFibSubseq({arr})"
    dart: "Solution().lenLongestFibSubseq({arr})"
    swift: "Solution().lenLongestFibSubseq({arr})"
    typescript: "lenLongestFibSubseq({arr})"
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: "Checker().lenLongestFibSubseq(arr, {result})"
    checker: |
      class Checker:
          def lenLongestFibSubseq(self, arr, result: Any) -> bool:
              return isinstance(result, int)
seed: 873
