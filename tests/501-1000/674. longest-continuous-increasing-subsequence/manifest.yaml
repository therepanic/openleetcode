entry:
  id: 674
  title: longest-continuous-increasing-subsequence
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: Solution().findLengthOfLCIS({nums})
    rust: Solution::find_length_of_lcis({nums})
    python3: Solution().findLengthOfLCIS({nums})
    python2: Solution().findLengthOfLCIS({nums})
    ruby: find_length_of_lcis({nums})
    java: new Solution().findLengthOfLCIS({nums})
    csharp: new Solution().FindLengthOfLCIS({nums})
    kotlin: Solution().findLengthOfLCIS({nums})
    go: findLengthOfLCIS({nums})
    dart: Solution().findLengthOfLCIS({nums})
    swift: Solution().findLengthOfLCIS({nums})
    typescript: findLengthOfLCIS({nums})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().findLengthOfLCIS(nums, {result})
    checker: |
      class Checker:
          def findLengthOfLCIS(self, nums, result):
              if not isinstance(result, int):
                  return False
              if not isinstance(nums, list) or len(nums) == 0:
                  return False
              if any(not isinstance(x, int) for x in nums):
                  return False
              best = 1
              cur = 1
              for i in range(1, len(nums)):
                  if nums[i] > nums[i - 1]:
                      cur += 1
                  else:
                      if cur > best:
                          best = cur
                      cur = 1
              if cur > best:
                  best = cur
              return result == best
