oracle:
  python3:
    call: "Checker().printTree(root, {result})"
    checker: |
      from collections import deque

      class Checker:
          def _build_from_list(self, values):
              if not values:
                  return None
              nodes = [None if v is None else TreeNode(v) for v in values]
              kids = nodes[::-1]
              root = kids.pop()
              for node in nodes:
                  if node is not None:
                      if kids:
                          node.left = kids.pop()
                      if kids:
                          node.right = kids.pop()
              return root

          def _normalize(self, node):
              if node is None:
                  return None
              if isinstance(node, list):
                  return self._build_from_list(node)
              if isinstance(node, dict):
                  val = node.get("val", node.get("value"))
                  left = self._normalize(node.get("left"))
                  right = self._normalize(node.get("right"))
                  return TreeNode(val, left, right)
              if hasattr(node, "val"):
                  return node
              return None

          def _height(self, node):
              if node is None:
                  return -1
              return 1 + max(self._height(node.left), self._height(node.right))

          def _fill(self, node, row, col, height, matrix):
              if node is None:
                  return
              if row < 0 or row >= len(matrix) or col < 0 or col >= len(matrix[0]):
                  raise AssertionError("node placement out of bounds")
              if matrix[row][col] != str(node.val):
                  raise AssertionError("node value mismatch")
              gap = 2 ** (height - row - 1)
              if node.left is not None:
                  self._fill(node.left, row + 1, col - gap, height, matrix)
              if node.right is not None:
                  self._fill(node.right, row + 1, col + gap, height, matrix)

          def printTree(self, root, result):
              root = self._normalize(root)
              height = self._height(root)
              expected_rows = height + 1
              expected_cols = 2 ** (height + 1) - 1
              if len(result) != expected_rows:
                  return False
              for row in result:
                  if len(row) != expected_cols:
                      return False
              if root is None:
                  return expected_rows == 0 and expected_cols == 0
              try:
                  self._fill(root, 0, (expected_cols - 1) // 2, height, result)
              except AssertionError:
                  return False
              seen = [[False for _ in range(expected_cols)] for _ in range(expected_rows)]
              queue = deque([(root, 0, (expected_cols - 1) // 2)])
              while queue:
                  node, row, col = queue.popleft()
                  seen[row][col] = True
                  if node.left is not None:
                      queue.append((node.left, row + 1, col - 2 ** (height - row - 1)))
                  if node.right is not None:
                      queue.append((node.right, row + 1, col + 2 ** (height - row - 1)))
              for r in range(expected_rows):
                  for c in range(expected_cols):
                      if seen[r][c]:
                          continue
                      if result[r][c] != "":
                          return False
              return True
seed: 655
