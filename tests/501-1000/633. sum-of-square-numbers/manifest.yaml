oracle:
  python3:
    call: Checker().judgeSquareSum(c, {result})
    checker:
      "class Checker:\n    def judgeSquareSum(self, c, result):\n        if\
      \ not isinstance(result, bool):\n            return False\n        a = 0\n \
      \       b = int(c ** 0.5)\n        expected = False\n        while a <= b:\n\
      \            s = a * a + b * b\n            if s == c:\n                expected\
      \ = True\n                break\n            if s < c:\n                a +=\
      \ 1\n            else:\n                b -= 1\n        return result == expected\n"
seed: 633
