entry:
  id: 736
  title: "parse-lisp-expression"
  params:
    expression:
      type: string
  call:
    cpp: "Solution().evaluate({expression})"
    rust: "Solution::evaluate({expression})"
    python3: "Solution().evaluate({expression})"
    python2: "Solution().evaluate({expression})"
    ruby: "evaluate({expression})"
    java: "new Solution().evaluate({expression})"
    csharp: "new Solution().Evaluate({expression})"
    kotlin: "Solution().evaluate({expression})"
    go: "evaluate({expression})"
    dart: "Solution().evaluate({expression})"
    swift: "Solution().evaluate({expression})"
    typescript: "evaluate({expression})"

judge:
  type: exact

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().check(expression, {result})"
    checker: |
      class Checker:
          def check(self, expression, result):
              if not isinstance(expression, str) or not isinstance(result, int):
                  return False

              def is_number(token):
                  return token[0] == "-" or token[0].isdigit()

              def split_parts(src):
                  parts = []
                  depth = 0
                  start = 0
                  for i, ch in enumerate(src):
                      if ch == "(":
                          depth += 1
                      elif ch == ")":
                          depth -= 1
                      elif ch == " " and depth == 0:
                          parts.append(src[start:i])
                          start = i + 1
                  parts.append(src[start:])
                  return parts

              def lookup(name, scopes):
                  for scope in reversed(scopes):
                      if name in scope:
                          return scope[name]
                  return None

              def evaluate(expr, scopes):
                  if expr[0] != "(":
                      if is_number(expr):
                          return int(expr)
                      return lookup(expr, scopes)

                  parts = split_parts(expr[1:-1])
                  op = parts[0]
                  if op == "add":
                      return evaluate(parts[1], scopes) + evaluate(parts[2], scopes)
                  if op == "mult":
                      return evaluate(parts[1], scopes) * evaluate(parts[2], scopes)

                  local = {}
                  scopes.append(local)
                  i = 1
                  while i < len(parts) - 1:
                      local[parts[i]] = evaluate(parts[i + 1], scopes)
                      i += 2
                  value = evaluate(parts[-1], scopes)
                  scopes.pop()
                  return value

              return result == evaluate(expression, [])

