entry:
  id: 915
  title: partition-array-into-disjoint-intervals
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().partitionDisjoint({nums})"
    rust: "Solution::partition_disjoint({nums})"
    python3: "Solution().partitionDisjoint({nums})"
    python2: "Solution().partitionDisjoint({nums})"
    ruby: "partition_disjoint({nums})"
    java: "new Solution().partitionDisjoint({nums})"
    csharp: "new Solution().PartitionDisjoint({nums})"
    kotlin: "Solution().partitionDisjoint({nums})"
    go: "partitionDisjoint({nums})"
    dart: "Solution().partitionDisjoint({nums})"
    swift: "Solution().partitionDisjoint({nums})"
    typescript: "partitionDisjoint({nums})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 128
oracle:
  python3:
    call: "Checker().partitionDisjoint(nums, {result})"
    checker: |
      class Checker:
          def partitionDisjoint(self, nums, result):
              if not isinstance(result, int):
                  return False
              n = len(nums)
              if result < 1 or result >= n:
                  return False
              left = nums[:result]
              right = nums[result:]
              return max(left) <= min(right) and all(x <= y for x in left for y in right)
seed: 915
