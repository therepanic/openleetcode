oracle:
  python3:
    call: "Checker().check(n, {result})"
    checker: |
      class Checker:
          def _next_perm_value(self, n):
              digits = list(str(n))
              i = len(digits) - 2
              while i >= 0 and digits[i] >= digits[i + 1]:
                  i -= 1
              if i < 0:
                  return -1
              j = len(digits) - 1
              while digits[j] <= digits[i]:
                  j -= 1
              digits[i], digits[j] = digits[j], digits[i]
              digits[i + 1:] = reversed(digits[i + 1:])
              value = int("".join(digits))
              if value > 2147483647:
                  return -1
              return value

          def check(self, n, result):
              if not isinstance(result, int):
                  return False
              return result == self._next_perm_value(n)
