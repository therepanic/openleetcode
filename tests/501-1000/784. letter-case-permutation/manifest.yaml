entry:
  id: 784
  title: letter-case-permutation
  params:
    s:
      type: string
  call:
    cpp: Solution().letterCasePermutation({s})
    rust: Solution::letter_case_permutation({s})
    python3: Solution().letterCasePermutation({s})
    python2: Solution().letterCasePermutation({s})
    ruby: letter_case_permutation({s})
    java: new Solution().letterCasePermutation({s})
    csharp: new Solution().LetterCasePermutation({s})
    kotlin: Solution().letterCasePermutation({s})
    go: letterCasePermutation({s})
    dart: Solution().letterCasePermutation({s})
    swift: Solution().letterCasePermutation({s})
    typescript: letterCasePermutation({s})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: Checker().letterCasePermutation(s, {result})
    checker: |
      class Checker:
          def letterCasePermutation(self, s, result):
              if not isinstance(result, list):
                  return False
              if any(not isinstance(x, str) for x in result):
                  return False

              expected = set()

              def build(i: int, cur: str) -> None:
                  if i == len(s):
                      expected.add(cur)
                      return
                  ch = s[i]
                  if ch.isdigit():
                      build(i + 1, cur + ch)
                  elif ch.isalpha():
                      build(i + 1, cur + ch.lower())
                      build(i + 1, cur + ch.upper())
                  else:
                      return

              build(0, "")
              if len(expected) != len(result):
                  return False
              if len(set(result)) != len(result):
                  return False
              if set(result) != expected:
                  return False

              for cand in result:
                  if len(cand) != len(s):
                      return False
                  for a, b in zip(s, cand):
                      if a.isdigit():
                          if a != b:
                              return False
                      elif a.isalpha():
                          if a.lower() != b.lower():
                              return False
                      else:
                          return False
              return True
