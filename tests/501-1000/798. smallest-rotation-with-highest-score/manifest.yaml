entry:
  id: 798
  title: smallest-rotation-with-highest-score
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().bestRotation({nums})"
    rust: "Solution::best_rotation({nums})"
    python3: "Solution().bestRotation({nums})"
    python2: "Solution().bestRotation({nums})"
    ruby: "best_rotation({nums})"
    java: "new Solution().bestRotation({nums})"
    csharp: "new Solution().BestRotation({nums})"
    kotlin: "Solution().bestRotation({nums})"
    go: "bestRotation({nums})"
    dart: "Solution().bestRotation({nums})"
    swift: "Solution().bestRotation({nums})"
    typescript: "bestRotation({nums})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(nums, {result})"
    checker: |
      class Checker:
          def check(self, nums, result):
              n = len(nums)
              best = 0
              best_score = -1
              for k in range(n):
                  score = 0
                  for i in range(n):
                      if nums[(i + k) % n] <= i:
                          score += 1
                  if score > best_score:
                      best_score = score
                      best = k
              return int(result) == best
seed: 798
