entry:
  id: 600
  title: non-negative-integers-without-consecutive-ones
  params:
    n:
      type: int
  call:
    cpp: Solution().findIntegers({n})
    rust: Solution::find_integers({n})
    python3: Solution().findIntegers({n})
    python2: Solution().findIntegers({n})
    ruby: find_integers({n})
    java: new Solution().findIntegers({n})
    csharp: new Solution().FindIntegers({n})
    kotlin: Solution().findIntegers({n})
    go: findIntegers({n})
    dart: Solution().findIntegers({n})
    swift: Solution().findIntegers({n})
    typescript: findIntegers({n})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 256
oracle:
  python3:
    call: Checker().findIntegers(n, {result})
    checker:
      "from typing import Any\nclass Checker:\n    def findIntegers(self, n:\
      \ int, result: Any) -> bool:\n        if not isinstance(result, int):\n    \
      \        return False\n        f = [1, 2]\n        for _ in range(2, 30):\n\
      \            f.append(f[-1] + f[-2])\n        ans = 0\n        last_seen = 0\n\
      \        for i in range(29, -1, -1):\n            if (1 << i) & n:\n       \
      \         ans += f[i]\n                if last_seen:\n                    ans\
      \ -= 1\n                    break\n                last_seen = 1\n         \
      \   else:\n                last_seen = 0\n        return result == ans + 1\n"
seed: 600
