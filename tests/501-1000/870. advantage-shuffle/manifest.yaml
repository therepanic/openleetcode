  title: advantage-shuffle
  params:
    nums1:
      type: array
      items:
        type: int
    nums2:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().advantageCount({nums1}, {nums2})"
    rust: "Solution::advantage_count({nums1}, {nums2})"
    python3: "Solution().advantageCount({nums1}, {nums2})"
    python2: "Solution().advantageCount({nums1}, {nums2})"
    ruby: "advantage_count({nums1}, {nums2})"
    java: "new Solution().advantageCount({nums1}, {nums2})"
    csharp: "new Solution().AdvantageCount({nums1}, {nums2})"
    kotlin: "Solution().advantageCount({nums1}, {nums2})"
    go: "advantageCount({nums1}, {nums2})"
    dart: "Solution().advantageCount({nums1}, {nums2})"
    swift: "Solution().advantageCount({nums1}, {nums2})"
    typescript: "advantageCount({nums1}, {nums2})"
judge:
  type: exact
limits:
  time_ms: 1500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().advantageCount(nums1, nums2, {result})"
    checker: |
      from collections import Counter
      from typing import Any

      class Checker:
          def advantageCount(self, nums1: list[int], nums2: list[int], result: Any) -> bool:
              if not isinstance(result, list) or len(result) != len(nums1):
                  return False
              if Counter(result) != Counter(nums1):
                  return False
              actual = sum(1 for a, b in zip(result, nums2) if a > b)
              a = sorted(nums1)
              b = sorted(nums2)
              i = j = wins = 0
              n = len(a)
              while i < n and j < n:
                  if a[i] > b[j]:
                      wins += 1
                      i += 1
                      j += 1
                  else:
                      i += 1
              return actual == wins
