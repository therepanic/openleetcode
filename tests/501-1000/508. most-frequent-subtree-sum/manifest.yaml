  title: most-frequent-subtree-sum
  params:
    root:
      type: tree_node
  call:
    cpp: Solution().findFrequentTreeSum({root})
    rust: Solution::find_frequent_tree_sum({root})
    python3: Solution().findFrequentTreeSum({root})
    python2: Solution().findFrequentTreeSum({root})
    ruby: find_frequent_tree_sum({root})
    java: new Solution().findFrequentTreeSum({root})
    csharp: new Solution().FindFrequentTreeSum({root})
    kotlin: Solution().findFrequentTreeSum({root})
    go: findFrequentTreeSum({root})
    dart: Solution().findFrequentTreeSum({root})
    swift: Solution().findFrequentTreeSum({root})
    typescript: findFrequentTreeSum({root})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().findFrequentTreeSum(root, {result})
    checker:
      "from collections import Counter, deque\n\nclass Checker:\n    class Node:\n        __slots__ = (\"val\", \"left\", \"right\")\n\n        def __init__(self, val):\n            self.val = val\n            self.left = None\n            self.right = None\n\n    def _build_tree(self, arr):\n        if arr == [] or arr is None:\n            return None\n        vals = list(arr)\n        if not vals or vals[0] is None:\n            return None\n        root = self.Node(vals[0])\n        queue = deque([root])\n        i = 1\n        while queue and i < len(vals):\n            node = queue.popleft()\n            if i < len(vals):\n                left_val = vals[i]\n                i += 1\n                if left_val is not None:\n                    node.left = self.Node(left_val)\n                    queue.append(node.left)\n            if i < len(vals):\n                right_val = vals[i]\n                i += 1\n                if right_val is not None:\n                    node.right\
      \ = self.Node(right_val)\n                    queue.append(node.right)\n        return root\n\n    def findFrequentTreeSum(self, root_arr, result):\n        if not isinstance(result, list):\n            return False\n        root = self._build_tree(root_arr)\n        if root is None:\n            return result == []\n        sums = []\n\n        def dfs(node):\n            if node is None:\n                return 0\n            total = node.val + dfs(node.left) + dfs(node.right)\n            sums.append(total)\n            return total\n\n        dfs(root)\n        freq = Counter(sums)\n        max_freq = max(freq.values())\n        expected = Counter(k for k, v in freq.items() if v == max_freq)\n        return Counter(result) == expected\n"
