entry:
  id: 697
  title: degree-of-an-array
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: Solution().findShortestSubArray({nums})
    rust: Solution::find_shortest_sub_array({nums})
    python3: Solution().findShortestSubArray({nums})
    python2: Solution().findShortestSubArray({nums})
    ruby: find_shortest_sub_array({nums})
    java: new Solution().findShortestSubArray({nums})
    csharp: new Solution().FindShortestSubArray({nums})
    kotlin: Solution().findShortestSubArray({nums})
    go: findShortestSubArray({nums})
    dart: Solution().findShortestSubArray({nums})
    swift: Solution().findShortestSubArray({nums})
    typescript: findShortestSubArray({nums})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().findShortestSubArray(nums, {result})
    checker:
      "class Checker:\n    def findShortestSubArray(self, nums, result):\n\
      \        left = {}\n        right = {}\n        count = {}\n        for i, x\
      \ in enumerate(nums):\n            if x not in left:\n                left[x]\
      \ = i\n            right[x] = i\n            count[x] = count.get(x, 0) + 1\n\
      \n        degree = max(count.values())\n        expected = len(nums)\n     \
      \   for x, c in count.items():\n            if c == degree:\n              \
      \  expected = min(expected, right[x] - left[x] + 1)\n        return result ==\
      \ expected\n"
seed: 697
