entry:
  id: 704
  title: binary-search
  params:
    nums:
      type: array
      items:
        type: int
    target:
      type: int
  call:
    cpp: "Solution().search({nums}, {target})"
    rust: "Solution::search({nums}, {target})"
    python3: "Solution().search({nums}, {target})"
    python2: "Solution().search({nums}, {target})"
    ruby: "search({nums}, {target})"
    java: "new Solution().search({nums}, {target})"
    csharp: "new Solution().Search({nums}, {target})"
    kotlin: "Solution().search({nums}, {target})"
    go: "search({nums}, {target})"
    dart: "Solution().search({nums}, {target})"
    swift: "Solution().search({nums}, {target})"
    typescript: "search({nums}, {target})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().search(nums, target, {result})"
    checker: |
      class Checker:
          def search(self, nums, target, result):
              if not isinstance(result, int):
                  return False
              if result == -1:
                  return target not in nums
              if result < 0 or result >= len(nums):
                  return False
              return nums[result] == target
seed: 704
