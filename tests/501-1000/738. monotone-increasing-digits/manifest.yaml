judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 128

oracle:
  python3:
    call: "Checker().monotoneIncreasingDigits(n, {result})"
    checker: |
      class Checker:
          def monotoneIncreasingDigits(self, n, result):
              if not isinstance(result, int):
                  return False
              if result < 0 or result > n:
                  return False
              s = str(result)
              for i in range(1, len(s)):
                  if s[i - 1] > s[i]:
                      return False
              if result == n:
                  return True
              candidate = result + 1
              if candidate > n:
                  return True
              cs = str(candidate)
              for i in range(1, len(cs)):
                  if cs[i - 1] > cs[i]:
                      return True
              return False

