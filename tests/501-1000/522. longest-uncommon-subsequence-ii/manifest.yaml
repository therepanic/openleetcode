entry:
  id: 522
  title: longest-uncommon-subsequence-ii
  params:
    strs:
      type: array
      items:
        type: string
  call:
    cpp: Solution().findLUSlength({strs})
    rust: Solution::find_lu_slength({strs})
    python3: Solution().findLUSlength({strs})
    python2: Solution().findLUSlength({strs})
    ruby: find_lu_slength({strs})
    java: new Solution().findLUSlength({strs})
    csharp: new Solution().FindLUSlength({strs})
    kotlin: Solution().findLUSlength({strs})
    go: findLUSlength({strs})
    dart: Solution().findLUSlength({strs})
    swift: Solution().findLUSlength({strs})
    typescript: findLUSlength({strs})
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().findLUSlength(strs, {result})
    checker: "class Checker:\n    def _is_subsequence(self, s, t):\n        it = iter(t)\n        return all(c in it for c in s)\n\n    def findLUSlength(self, strs, result):\n        if not isinstance(result, int):\n            return False\n        expected = -1\n        for i, s in enumerate(strs):\n            if all(not self._is_subsequence(s, strs[j]) for j in range(len(strs)) if j != i):\n                expected = len(s)\n                break\n        return result == expected\n"
seed: 522
