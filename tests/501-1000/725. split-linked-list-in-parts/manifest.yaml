entry:
  id: 725
  title: split-linked-list-in-parts
  params:
    head:
      type: list_node
    k:
      type: int
  call:
    cpp: "([&]() { vector<ListNode*> parts = Solution().splitListToParts({head}, {k}); vector<vector<int>> out; for (auto node : parts) out.push_back(listNodeToArray(node)); return out; })()"
    rust: "Solution::split_list_to_parts({head}, {k}).into_iter().map(ListNode::list_node_to_array).collect::<Vec<_>>()"
    python3: "[list_node_to_array(node) for node in Solution().splitListToParts({head}, {k})]"
    python2: "[list_node_to_array(node) for node in Solution().splitListToParts({head}, {k})]"
    ruby: "split_list_to_parts({head}, {k}).map { |node| list_node_to_array(node) }"
    java: "java.util.Arrays.stream(new Solution().splitListToParts({head}, {k})).map(ListNode::listNodeToArray).collect(java.util.stream.Collectors.toList())"
    csharp: "System.Array.ConvertAll(new Solution().SplitListToParts({head}, {k}), ListNode.ListNodeToArray)"
    kotlin: "Solution().splitListToParts({head}, {k}).map { listNodeToArray(it) }"
    go: "func() [][]int { parts := splitListToParts({head}, {k}); out := make([][]int, len(parts)); for i, node := range parts { out[i] = listNodeToArray(node) }; return out }()"
    dart: "Solution().splitListToParts({head}, {k}).map((node) => list_node_to_array(node)).toList()"
    swift: "Solution().splitListToParts({head}, {k}).map { list_node_to_array($0) }"
    typescript: "splitListToParts({head}, {k}).map((node) => listNodeToArray(node))"
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().splitListToParts(head, k, {result})"
    checker: |
      class Checker:
          def splitListToParts(self, head, k, result) -> bool:
              if isinstance(head, list):
                  values = head[:]
                  for value in values:
                      if not isinstance(value, int):
                          return False
              else:
                  values = []
                  current = head
                  steps = 0
                  while current is not None and steps <= 1000:
                      if not isinstance(current.val, int):
                          return False
                      values.append(current.val)
                      current = current.next
                      steps += 1
                  if current is not None:
                      return False
              if not isinstance(result, list) or len(result) != k:
                  return False
              for part in result:
                  if not isinstance(part, list):
                      return False
                  for value in part:
                      if not isinstance(value, int):
                          return False
              base, extra = divmod(len(values), k)
              expected = []
              index = 0
              previous_size = None
              for i in range(k):
                  size = base + (1 if i < extra else 0)
                  part = values[index:index + size]
                  index += size
                  expected.append(part)
                  if previous_size is not None and previous_size < len(part):
                      return False
                  previous_size = len(part)
              if index != len(values):
                  return False
              flattened = []
              for part in result:
                  flattened.extend(part)
              return flattened == values and result == expected
