      type: array
      items:
        type: string
  call:
    cpp: "Solution().longestWord({words})"
    rust: "Solution::longest_word({words})"
    python3: "Solution().longestWord({words})"
    python2: "Solution().longestWord({words})"
    ruby: "longest_word({words})"
    java: "new Solution().longestWord({words})"
    csharp: "new Solution().LongestWord({words})"
    kotlin: "Solution().longestWord({words})"
    go: "longestWord({words})"
    dart: "Solution().longestWord({words})"
    swift: "Solution().longestWord({words})"
    typescript: "longestWord({words})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().longestWord(words, {result})"
    checker: |
      class Checker:
          def longestWord(self, words, result):
              if not isinstance(words, list):
                  return False
              if not isinstance(result, str):
                  return False
              seen = set()
              best = ""
              for word in sorted(words):
                  if len(word) == 1 or word[:-1] in seen:
                      seen.add(word)
                      if len(word) > len(best) or (len(word) == len(best) and word < best):
                          best = word
              return result == best
seed: 720
