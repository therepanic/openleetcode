entry:
  id: 557
  title: reverse-words-in-a-string-iii
  params:
    s:
      type: string
  call:
    cpp: "Solution().reverseWords({s})"
    rust: "Solution::reverse_words({s})"
    python3: "Solution().reverseWords({s})"
    python2: "Solution().reverseWords({s})"
    ruby: "reverse_words({s})"
    java: "new Solution().reverseWords({s})"
    csharp: "new Solution().ReverseWords({s})"
    kotlin: "Solution().reverseWords({s})"
    go: "reverseWords({s})"
    dart: "Solution().reverseWords({s})"
    swift: "Solution().reverseWords({s})"
    typescript: "reverseWords({s})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(s, {result})"
    checker: |
      class Checker:
          def check(self, s, result):
              if not isinstance(result, str):
                  return False
              expected = " ".join(word[::-1] for word in s.split(" "))
              return result == expected
seed: 557
