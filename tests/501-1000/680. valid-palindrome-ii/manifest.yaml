entry:
  id: 680
  title: valid-palindrome-ii
  params:
    s:
      type: string
  call:
    cpp: Solution().validPalindrome({s})
    rust: Solution::valid_palindrome({s})
    python3: Solution().validPalindrome({s})
    python2: Solution().validPalindrome({s})
    ruby: valid_palindrome({s})
    java: new Solution().validPalindrome({s})
    csharp: new Solution().ValidPalindrome({s})
    kotlin: Solution().validPalindrome({s})
    go: validPalindrome({s})
    dart: Solution().validPalindrome({s})
    swift: Solution().validPalindrome({s})
    typescript: validPalindrome({s})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().validPalindrome(s, {result})
    checker: |
      class Checker:
          def validPalindrome(self, s, result):
              def is_palindrome(l, r):
                  while l < r:
                      if s[l] != s[r]:
                          return False
                      l += 1
                      r -= 1
                  return True

              left = 0
              right = len(s) - 1
              while left < right:
                  if s[left] != s[right]:
                      return result == (is_palindrome(left + 1, right) or is_palindrome(left, right - 1))
                  left += 1
                  right -= 1
              return result is True
seed: 680
