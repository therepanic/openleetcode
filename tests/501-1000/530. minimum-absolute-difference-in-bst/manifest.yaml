entry:
  id: 530
  title: "minimum-absolute-difference-in-bst"
  params:
    root:
      type: tree_node
  call:
    cpp: "Solution().getMinimumDifference({root})"
    rust: "Solution::get_minimum_difference({root})"
    python3: "Solution().getMinimumDifference({root})"
    python2: "Solution().getMinimumDifference({root})"
    ruby: "get_minimum_difference({root})"
    java: "new Solution().getMinimumDifference({root})"
    csharp: "new Solution().GetMinimumDifference({root})"
    kotlin: "Solution().getMinimumDifference({root})"
    go: "getMinimumDifference({root})"
    dart: "Solution().getMinimumDifference({root})"
    swift: "Solution().getMinimumDifference({root})"
    typescript: "getMinimumDifference({root})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().getMinimumDifference(root, {result})"
    checker: |
      class Checker:
          def getMinimumDifference(self, root, result):
              if not isinstance(result, int):
                  return False
              vals = sorted(v for v in root if v is not None)
              if len(vals) < 2:
                  return False
              expected = min(b - a for a, b in zip(vals, vals[1:]))
              return result == expected
seed: 530
