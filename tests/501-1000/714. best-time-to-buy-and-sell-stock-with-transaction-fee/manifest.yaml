entry:
  id: 714
  title: best-time-to-buy-and-sell-stock-with-transaction-fee
  params:
    prices:
      type: array
      items:
        type: int
    fee:
      type: int
  call:
    cpp: "Solution().maxProfit({prices}, {fee})"
    rust: "Solution::max_profit({prices}, {fee})"
    python3: "Solution().maxProfit({prices}, {fee})"
    python2: "Solution().maxProfit({prices}, {fee})"
    ruby: "max_profit({prices}, {fee})"
    java: "new Solution().maxProfit({prices}, {fee})"
    csharp: "new Solution().MaxProfit({prices}, {fee})"
    kotlin: "Solution().maxProfit({prices}, {fee})"
    go: "maxProfit({prices}, {fee})"
    dart: "Solution().maxProfit({prices}, {fee})"
    swift: "Solution().maxProfit({prices}, {fee})"
    typescript: "maxProfit({prices}, {fee})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().maxProfit(prices, fee, {result})"
    checker: |
      class Checker:
          def maxProfit(self, prices, fee, result):
              if not isinstance(result, int):
                  return False
              if not isinstance(prices, list) or len(prices) < 1:
                  return False
              if not isinstance(fee, int) or fee < 0:
                  return False
              if any((not isinstance(p, int)) for p in prices):
                  return False
              if any(p < 1 or p >= 50000 for p in prices):
                  return False
              if fee >= 50000:
                  return False

              hold = -prices[0]
              cash = 0
              for price in prices[1:]:
                  prev_cash = cash
                  cash = max(cash, hold + price - fee)
                  hold = max(hold, prev_cash - price)

              return result == cash
seed: 714
