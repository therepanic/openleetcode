judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().predictPartyVictory(senate, {result})
    checker: |
      from collections import deque

      class Checker:
          def predictPartyVictory(self, senate, result):
              if result not in ("Radiant", "Dire"):
                  return False
              if not senate or any(ch not in "RD" for ch in senate):
                  return False

              r = deque()
              d = deque()
              n = len(senate)

              for i, ch in enumerate(senate):
                  if ch == "R":
                      r.append(i)
                  else:
                      d.append(i)

              while r and d:
                  r_idx = r.popleft()
                  d_idx = d.popleft()
                  if r_idx < d_idx:
                      r.append(r_idx + n)
                  else:
                      d.append(d_idx + n)

              expected = "Radiant" if r else "Dire"
              return result == expected
