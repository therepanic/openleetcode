entry:
  id: 517
  title: super-washing-machines
  params:
    machines:
      type: array
      items:
        type: int
  call:
    cpp: Solution().findMinMoves({machines})
    rust: Solution::find_min_moves({machines})
    python3: Solution().findMinMoves({machines})
    python2: Solution().findMinMoves({machines})
    ruby: find_min_moves({machines})
    java: new Solution().findMinMoves({machines})
    csharp: new Solution().FindMinMoves({machines})
    kotlin: Solution().findMinMoves({machines})
    go: findMinMoves({machines})
    dart: Solution().findMinMoves({machines})
    swift: Solution().findMinMoves({machines})
    typescript: findMinMoves({machines})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(machines, {result})
    checker: "class Checker:\n    def check(self, machines, result):\n        if not isinstance(result, int):\n            return False\n        n = len(machines)\n        total = sum(machines)\n        if total % n:\n            return result == -1\n        avg = total // n\n        res = float('-inf')\n        running = 0\n        for x in machines:\n            delta = x - avg\n            res = max(res, abs(running))\n            res = max(res, delta)\n            running += delta\n        return result == res\n"
seed: 517
