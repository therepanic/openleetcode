entry:
  id: 748
  title: shortest-completing-word
  params:
    licensePlate:
      type: string
    words:
      type: array
      items:
        type: string
  call:
    cpp: "Solution().shortestCompletingWord({licensePlate}, {words})"
    rust: "Solution::shortest_completing_word({licensePlate}, {words})"
    python3: "Solution().shortestCompletingWord({licensePlate}, {words})"
    python2: "Solution().shortestCompletingWord({licensePlate}, {words})"
    ruby: "shortest_completing_word({licensePlate}, {words})"
    java: "new Solution().shortestCompletingWord({licensePlate}, {words})"
    csharp: "new Solution().ShortestCompletingWord({licensePlate}, {words})"
    kotlin: "Solution().shortestCompletingWord({licensePlate}, {words})"
    go: "shortestCompletingWord({licensePlate}, {words})"
    dart: "Solution().shortestCompletingWord({licensePlate}, {words})"
    swift: "Solution().shortestCompletingWord({licensePlate}, {words})"
    typescript: "shortestCompletingWord({licensePlate}, {words})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().shortestCompletingWord(licensePlate, words, {result})"
    checker: |
      from collections import Counter

      class Checker:
          def shortestCompletingWord(self, licensePlate, words, result):
              if not isinstance(result, str):
                  return False
              if result not in words:
                  return False
              need = Counter(c for c in licensePlate.lower() if c.isalpha())
              counts = Counter(result)
              if any(counts.get(c, 0) < need[c] for c in need):
                  return False
              best = None
              for word in words:
                  word_counts = Counter(word)
                  if all(word_counts.get(c, 0) >= need[c] for c in need):
                      if best is None or len(word) < len(best):
                          best = word
              return result == best
seed: 748
