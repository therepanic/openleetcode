entry:
  id: 865
  title: smallest-subtree-with-all-the-deepest-nodes
  params:
    root:
      type: tree_node
  call:
    cpp: treeNodeToArray(Solution().subtreeWithAllDeepest({root}))
    rust: TreeNode::tree_node_to_array(Solution::subtree_with_all_deepest({root}))
    python3: tree_node_to_array(Solution().subtreeWithAllDeepest({root}))
    python2: tree_node_to_array(Solution().subtreeWithAllDeepest({root}))
    ruby: tree_node_to_array(subtree_with_all_deepest({root}))
    java: TreeNode.treeNodeToArray(new Solution().subtreeWithAllDeepest({root}))
    csharp: TreeNode.TreeNodeToArray(new Solution().SubtreeWithAllDeepest({root}))
    kotlin: treeNodeToArray(Solution().subtreeWithAllDeepest({root}))
    go: treeNodeToArray(subtreeWithAllDeepest({root}))
    dart: tree_node_to_array(Solution().subtreeWithAllDeepest({root}))
    swift: tree_node_to_array(Solution().subtreeWithAllDeepest({root}))
    typescript: treeNodeToArray(subtreeWithAllDeepest({root}))
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: Checker().ok({result})
    checker: |
      class Checker:
          def ok(self, result):
              return True
seed: 865
