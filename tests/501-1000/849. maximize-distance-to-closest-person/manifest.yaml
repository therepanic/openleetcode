entry:
  id: 849
  title: maximize-distance-to-closest-person
  params:
    seats:
      type: array
      items:
        type: int
  call:
    cpp: Solution().maxDistToClosest({seats})
    rust: Solution::max_dist_to_closest({seats})
    python3: Solution().maxDistToClosest({seats})
    python2: Solution().maxDistToClosest({seats})
    ruby: max_dist_to_closest({seats})
    java: new Solution().maxDistToClosest({seats})
    csharp: new Solution().MaxDistToClosest({seats})
    kotlin: Solution().maxDistToClosest({seats})
    go: maxDistToClosest({seats})
    dart: Solution().maxDistToClosest({seats})
    swift: Solution().maxDistToClosest({seats})
    typescript: maxDistToClosest({seats})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().maxDistToClosest(seats, {result})
    checker: "class Checker:\n    def maxDistToClosest(self, seats, result):\n        parts = \"\".join(str(x) for x in seats).split(\"1\")\n        lengths = [len(x) for x in parts]\n        expected = max(lengths[0], (max(lengths) + 1) // 2, lengths[-1])\n        return result == expected\n"
seed: 849
