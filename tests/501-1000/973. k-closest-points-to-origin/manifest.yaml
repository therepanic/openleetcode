      type: array
      items:
        type: array
        items:
          type: int
    k:
      type: int
  call:
    cpp: Solution().kClosest({points}, {k})
    rust: Solution::k_closest({points}, {k})
    python3: Solution().kClosest({points}, {k})
    python2: Solution().kClosest({points}, {k})
    ruby: k_closest({points}, {k})
    java: new Solution().kClosest({points}, {k})
    csharp: new Solution().KClosest({points}, {k})
    kotlin: Solution().kClosest({points}, {k})
    go: kClosest({points}, {k})
    dart: Solution().kClosest({points}, {k})
    swift: Solution().kClosest({points}, {k})
    typescript: kClosest({points}, {k})
judge:
  type: ignore_order
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().kClosest(points, k, {result})
    checker:
      "class Checker:\n    def kClosest(self, points, k, result):\n       \
      \ if not isinstance(result, list) or len(result) != k:\n            return False\n\
      \        pts = [tuple(p) for p in points]\n        res = [tuple(p) for p in\
      \ result]\n        counts = {}\n        for p in pts:\n            counts[p]\
      \ = counts.get(p, 0) + 1\n        for p in res:\n            if counts.get(p,\
      \ 0) == 0:\n                return False\n            counts[p] -= 1\n     \
      \   dists = sorted(x * x + y * y for x, y in pts)\n        threshold = dists[k\
      \ - 1]\n        for x, y in res:\n            if x * x + y * y > threshold:\n\
      \                return False\n        strict = sum(1 for x, y in pts if x *\
      \ x + y * y < threshold)\n        equal = sum(1 for x, y in res if x * x + y\
      \ * y == threshold)\n        need_equal = k - strict\n        return equal ==\
      \ need_equal\n"
seed: 973
