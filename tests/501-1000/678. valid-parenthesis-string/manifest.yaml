entry:
  id: 678
  title: valid-parenthesis-string
  params:
    s:
      type: string
  call:
    cpp: Solution().checkValidString({s})
    rust: Solution::check_valid_string({s})
    python3: Solution().checkValidString({s})
    python2: Solution().checkValidString({s})
    ruby: check_valid_string({s})
    java: new Solution().checkValidString({s})
    csharp: new Solution().CheckValidString({s})
    kotlin: Solution().checkValidString({s})
    go: checkValidString({s})
    dart: Solution().checkValidString({s})
    swift: Solution().checkValidString({s})
    typescript: checkValidString({s})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().checkValidString(s, {result})
    checker: |
      class Checker:
          def checkValidString(self, s, result):
              if not isinstance(result, bool):
                  return False
              low = 0
              high = 0
              for char in s:
                  if char == '(':
                      low += 1
                      high += 1
                  elif char == ')':
                      low = max(low - 1, 0)
                      high -= 1
                  else:
                      low = max(low - 1, 0)
                      high += 1
                  if high < 0:
                      return result is False
              expected = (low == 0)
              return result == expected
seed: 678
