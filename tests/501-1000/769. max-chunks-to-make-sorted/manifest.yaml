judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().maxChunksToSorted(arr, {result})
    checker: |
      class Checker:
          def maxChunksToSorted(self, arr, result):
              if not isinstance(result, int):
                  return False

              n = len(arr)
              if sorted(arr) != list(range(n)):
                  return False

              target = list(range(n))
              best = 0
              split_count = n - 1

              for mask in range(1 << split_count):
                  merged = []
                  start = 0
                  chunks = 0

                  for idx in range(split_count):
                      if (mask >> idx) & 1:
                          merged.extend(sorted(arr[start:idx + 1]))
                          chunks += 1
                          start = idx + 1

                  merged.extend(sorted(arr[start:]))
                  chunks += 1

                  if merged == target and chunks > best:
                      best = chunks

              return result == best
seed: 769
