  title: max-chunks-to-make-sorted
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: Solution().maxChunksToSorted({arr})
    rust: Solution::max_chunks_to_sorted({arr})
    python3: Solution().maxChunksToSorted({arr})
    python2: Solution().maxChunksToSorted({arr})
    ruby: max_chunks_to_sorted({arr})
    java: new Solution().maxChunksToSorted({arr})
