  id: 801
  title: minimum-swaps-to-make-sequences-increasing
  params:
    nums1:
      type: array
      items:
        type: int
    nums2:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().minSwap({nums1}, {nums2})"
    rust: "Solution::min_swap({nums1}, {nums2})"
    python3: "Solution().minSwap({nums1}, {nums2})"
    python2: "Solution().minSwap({nums1}, {nums2})"
    ruby: "min_swap({nums1}, {nums2})"
    java: "new Solution().minSwap({nums1}, {nums2})"
    csharp: "new Solution().MinSwap({nums1}, {nums2})"
    kotlin: "Solution().minSwap({nums1}, {nums2})"
    go: "minSwap({nums1}, {nums2})"
    dart: "Solution().minSwap({nums1}, {nums2})"
    swift: "Solution().minSwap({nums1}, {nums2})"
    typescript: "minSwap({nums1}, {nums2})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(nums1, nums2, {result})"
    checker: |
      class Checker:
          def check(self, nums1, nums2, result):
              n = len(nums1)
              inf = 10 ** 9
              keep = [inf] * n
              swap = [inf] * n
              keep[0] = 0
              swap[0] = 1
              for i in range(1, n):
                  inc = nums1[i] > nums1[i - 1] and nums2[i] > nums2[i - 1]
                  cross = nums1[i] > nums2[i - 1] and nums2[i] > nums1[i - 1]
                  if inc and cross:
                      keep[i] = min(keep[i - 1], swap[i - 1])
                      swap[i] = keep[i] + 1
                  elif inc:
                      keep[i] = keep[i - 1]
                      swap[i] = swap[i - 1] + 1
                  else:
                      keep[i] = swap[i - 1]
                      swap[i] = keep[i - 1] + 1
              return int(result) == min(keep[-1], swap[-1])
seed: 801
