    kotlin: "Solution().numDecodings({s})"
    go: "numDecodings({s})"
    dart: "Solution().numDecodings({s})"
    swift: "Solution().numDecodings({s})"
    typescript: "numDecodings({s})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().numDecodings(s, {result})"
    checker: |
      class Checker:
          def numDecodings(self, s, result):
              return isinstance(result, int) and result >= 0
