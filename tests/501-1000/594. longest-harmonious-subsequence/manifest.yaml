entry:
  id: 594
  title: longest-harmonious-subsequence
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().findLHS({nums})"
    rust: "Solution::find_lhs({nums})"
    python3: "Solution().findLHS({nums})"
    python2: "Solution().findLHS({nums})"
    ruby: "find_lhs({nums})"
    java: "new Solution().findLHS({nums})"
    csharp: "new Solution().FindLHS({nums})"
    kotlin: "Solution().findLHS({nums})"
    go: "findLHS({nums})"
    dart: "Solution().findLHS({nums})"
    swift: "Solution().findLHS({nums})"
    typescript: "findLHS({nums})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().findLHS(nums, {result})"
    checker: |
      from collections import Counter

      class Checker:
          def findLHS(self, nums, result):
              counts = Counter(nums)
              best = 0
              for x in counts:
                  if x + 1 in counts:
                      best = max(best, counts[x] + counts[x + 1])
              return result == best
seed: 594
