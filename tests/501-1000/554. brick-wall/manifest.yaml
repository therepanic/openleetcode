entry:
  id: 554
  title: brick-wall
  params:
    wall:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().leastBricks({wall})"
    rust: "Solution::least_bricks({wall})"
    python3: "Solution().leastBricks({wall})"
    python2: "Solution().leastBricks({wall})"
    ruby: "least_bricks({wall})"
    java: "new Solution().leastBricks(java.util.Arrays.stream({wall}).map(row -> java.util.Arrays.stream(row).boxed().collect(java.util.stream.Collectors.toList())).collect(java.util.stream.Collectors.toList()))"
    csharp: "new Solution().LeastBricks({wall})"
    kotlin: "Solution().leastBricks({wall}.map { it.toList() })"
    go: "leastBricks({wall})"
    dart: "Solution().leastBricks({wall})"
    swift: "Solution().leastBricks({wall})"
    typescript: "leastBricks({wall})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(wall, {result})"
    checker: |
      class Checker:
          def check(self, wall, result):
              if not isinstance(result, int):
                  return False
              edge_counts = {}
              for row in wall:
                  edge = 0
                  for brick in row[:-1]:
                      edge += brick
                      edge_counts[edge] = edge_counts.get(edge, 0) + 1
              best = 0
              for count in edge_counts.values():
                  if count > best:
                      best = count
              return result == len(wall) - best
