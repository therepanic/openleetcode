entry:
  id: 749
  title: contain-virus
  params:
    isInfected:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().containVirus({isInfected})
    rust: Solution::contain_virus({isInfected})
    python3: Solution().containVirus({isInfected})
    python2: Solution().containVirus({isInfected})
    ruby: contain_virus({isInfected})
    java: new Solution().containVirus({isInfected})
    csharp: new Solution().ContainVirus({isInfected})
    kotlin: Solution().containVirus({isInfected})
    go: containVirus({isInfected})
    dart: Solution().containVirus({isInfected})
    swift: Solution().containVirus({isInfected})
    typescript: containVirus({isInfected})

judge:
  type: "exact"

limits:
  time_ms: 1500
  memory_mb: 256

oracle:
  python3:
    call: Checker().containVirus(isInfected, {result})
    checker: |
      class Checker:
          def containVirus(self, isInfected, result):
              if not isinstance(result, int):
                  return False
              if not isinstance(isInfected, list) or not isInfected:
                  return False
              if not isinstance(isInfected[0], list) or not isInfected[0]:
                  return False

              rows = len(isInfected)
              cols = len(isInfected[0])
              grid = []
              for row in isInfected:
                  if not isinstance(row, list) or len(row) != cols:
                      return False
                  cur = []
                  for cell in row:
                      if not isinstance(cell, int) or cell not in (0, 1):
                          return False
                      cur.append(cell)
                  grid.append(cur)

              total_walls = 0
              directions = ((1, 0), (-1, 0), (0, 1), (0, -1))

              while True:
                  seen = [[False] * cols for _ in range(rows)]
                  regions = []
                  frontiers = []
                  walls_needed = []

                  for r in range(rows):
                      for c in range(cols):
                          if grid[r][c] != 1 or seen[r][c]:
                              continue
                          stack = [(r, c)]
                          seen[r][c] = True
                          region = []
                          frontier = set()
                          walls = 0
                          for cr, cc in stack:
                              region.append((cr, cc))
                              for dr, dc in directions:
                                  nr = cr + dr
                                  nc = cc + dc
                                  if nr < 0 or nr >= rows or nc < 0 or nc >= cols:
                                      continue
                                  if grid[nr][nc] == 1 and not seen[nr][nc]:
                                      seen[nr][nc] = True
                                      stack.append((nr, nc))
                                  elif grid[nr][nc] == 0:
                                      walls += 1
                                      frontier.add((nr, nc))
                          regions.append(region)
                          frontiers.append(frontier)
                          walls_needed.append(walls)

                  if not regions:
                      break

                  target = 0
                  for i in range(1, len(frontiers)):
                      if len(frontiers[i]) > len(frontiers[target]):
                          target = i

                  if len(frontiers[target]) == 0:
                      break

                  total_walls += walls_needed[target]

                  for r, c in regions[target]:
                      grid[r][c] = -1

                  for i in range(len(regions)):
                      if i == target:
                          continue
                      for r, c in frontiers[i]:
                          grid[r][c] = 1

              return result == total_walls

seed: 749

