judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(num1, num2, {result})"
    checker: |
      from typing import Any, Tuple

      class Checker:
          def parse(self, s: str) -> Tuple[int, int]:
              if not isinstance(s, str) or not s.endswith("i") or "+" not in s:
                  raise ValueError("invalid complex string")
              real_str, imag_str = s[:-1].split("+", 1)
              real = int(real_str)
              imag = int(imag_str)
              if real < -100 or real > 100 or imag < -100 or imag > 100:
                  raise ValueError("value out of range")
              return real, imag

          def check(self, num1: str, num2: str, result: Any) -> bool:
              if not isinstance(result, str):
                  return False
              try:
                  a, b = self.parse(num1)
                  c, d = self.parse(num2)
                  real, imag = self.parse(result)
              except Exception:
                  return False
              expected_real = a * c - b * d
              expected_imag = a * d + b * c
              return real == expected_real and imag == expected_imag
