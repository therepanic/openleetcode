judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().threeEqualParts(arr, {result})"
    checker: |
      class Checker:
          def threeEqualParts(self, arr, result):
              if not isinstance(result, list) or len(result) != 2:
                  return False
              n = len(arr)
              if result == [-1, -1]:
                  for i in range(n):
                      for j in range(i + 2, n):
                          a = arr[:i + 1]
                          b = arr[i + 1:j]
                          c = arr[j:]
                          def norm(x):
                              k = 0
                              while k < len(x) and x[k] == 0:
                                  k += 1
                              return x[k:]
                          if len(a) and len(b) and len(c) and norm(a) == norm(b) == norm(c):
                              return False
                  return True
              i, j = result
              if not (0 <= i < j - 1 < n):
                  return False
              a = arr[:i + 1]
              b = arr[i + 1:j]
              c = arr[j:]
              def norm(x):
                  k = 0
                  while k < len(x) and x[k] == 0:
                      k += 1
                  return x[k:]
              return len(a) > 0 and len(b) > 0 and len(c) > 0 and norm(a) == norm(b) == norm(c)
