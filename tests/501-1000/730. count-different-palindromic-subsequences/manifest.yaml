entry:
  id: 730
  title: "count-different-palindromic-subsequences"
  params:
    s:
      type: string
  call:
    cpp: "Solution().countPalindromicSubsequences({s})"
    rust: "Solution::count_palindromic_subsequences({s})"
    python3: "Solution().countPalindromicSubsequences({s})"
    python2: "Solution().countPalindromicSubsequences({s})"
    ruby: "count_palindromic_subsequences({s})"
    java: "new Solution().countPalindromicSubsequences({s})"
    csharp: "new Solution().CountPalindromicSubsequences({s})"
    kotlin: "Solution().countPalindromicSubsequences({s})"
    go: "countPalindromicSubsequences({s})"
    dart: "Solution().countPalindromicSubsequences({s})"
    swift: "Solution().countPalindromicSubsequences({s})"
    typescript: "countPalindromicSubsequences({s})"

judge:
  type: exact

limits:
  time_ms: 4000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().check(s, {result})"
    checker: |
      class Checker:
          def check(self, s, result):
              if not isinstance(result, int):
                  return False
              mod = 1000000007
              n = len(s)
              if n == 0:
                  return result == 0
              prev_same = [-1] * n
              next_same = [n] * n
              last_seen = {}
              for i, ch in enumerate(s):
                  prev_same[i] = last_seen.get(ch, -1)
                  last_seen[ch] = i
              last_seen.clear()
              for i in range(n - 1, -1, -1):
                  ch = s[i]
                  next_same[i] = last_seen.get(ch, n)
                  last_seen[ch] = i
              dp = [[0] * n for _ in range(n)]
              for i in range(n):
                  dp[i][i] = 1
              for length in range(2, n + 1):
                  for i in range(0, n - length + 1):
                      j = i + length - 1
                      if s[i] != s[j]:
                          val = dp[i + 1][j] + dp[i][j - 1]
                          if i + 1 <= j - 1:
                              val -= dp[i + 1][j - 1]
                      else:
                          low = next_same[i]
                          high = prev_same[j]
                          mid = dp[i + 1][j - 1] if i + 1 <= j - 1 else 0
                          if low > high:
                              val = 2 * mid + 2
                          elif low == high:
                              val = 2 * mid + 1
                          else:
                              inner = dp[low + 1][high - 1] if low + 1 <= high - 1 else 0
                              val = 2 * mid - inner
                      dp[i][j] = val % mod
              expected = dp[0][n - 1] % mod
              return result == expected

