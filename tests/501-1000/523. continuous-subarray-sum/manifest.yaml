entry:
  id: 523
  title: continuous-subarray-sum
  params:
    nums:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: Solution().checkSubarraySum({nums}, {k})
    rust: Solution::check_subarray_sum({nums}, {k})
    python3: Solution().checkSubarraySum({nums}, {k})
    python2: Solution().checkSubarraySum({nums}, {k})
    ruby: check_subarray_sum({nums}, {k})
    java: new Solution().checkSubarraySum({nums}, {k})
    csharp: new Solution().CheckSubarraySum({nums}, {k})
    kotlin: Solution().checkSubarraySum({nums}, {k})
    go: checkSubarraySum({nums}, {k})
    dart: Solution().checkSubarraySum({nums}, {k})
    swift: Solution().checkSubarraySum({nums}, {k})
    typescript: checkSubarraySum({nums}, {k})
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().checkSubarraySum(nums, k, {result})
    checker:
      "class Checker:\n    def checkSubarraySum(self, nums, k, result):\n \
      \       if not isinstance(result, bool):\n            return False\n       \
      \ n = len(nums)\n        expected = False\n        for i in range(n):\n    \
      \        s = 0\n            for j in range(i, n):\n                s += nums[j]\n\
      \                if j - i + 1 >= 2 and s % k == 0:\n                    expected\
      \ = True\n                    break\n            if expected:\n            \
      \    break\n        return result == expected\n"
seed: 523
