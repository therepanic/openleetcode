entry:
  id: 802
  title: "find-eventual-safe-states"
  params:
    graph:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().eventualSafeNodes({graph})
    rust: Solution::eventual_safe_nodes({graph})
    python3: Solution().eventualSafeNodes({graph})
    python2: Solution().eventualSafeNodes({graph})
    ruby: eventual_safe_nodes({graph})
    java: new Solution().eventualSafeNodes({graph})
    csharp: new Solution().EventualSafeNodes({graph})
    kotlin: Solution().eventualSafeNodes({graph})
    go: eventualSafeNodes({graph})
    dart: Solution().eventualSafeNodes({graph})
    swift: Solution().eventualSafeNodes({graph})
    typescript: eventualSafeNodes({graph})

judge:
  type: "exact"

limits:
  time_ms: 500
  memory_mb: 256

oracle:
  python3:
    call: "Checker().check(graph, {result})"
    checker: |
      class Checker:
          def check(self, graph, result):
              n = len(graph)
              state = [0] * n

              def dfs(node):
                  if state[node] != 0:
                      return state[node] == 2
                  state[node] = 1
                  for nxt in graph[node]:
                      if state[nxt] == 1 or not dfs(nxt):
                          return False
                  state[node] = 2
                  return True

              expected = [i for i in range(n) if dfs(i)]
              return result == expected

seed: 802

