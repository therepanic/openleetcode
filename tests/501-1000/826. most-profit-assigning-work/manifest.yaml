entry:
  id: 826
  title: most-profit-assigning-work
  params:
    difficulty:
      type: array
      items:
        type: int
    profit:
      type: array
      items:
        type: int
    worker:
      type: array
      items:
        type: int
  call:
    cpp: Solution().maxProfitAssignment({difficulty}, {profit}, {worker})
    rust: Solution::max_profit_assignment({difficulty}, {profit}, {worker})
    python3: Solution().maxProfitAssignment({difficulty}, {profit}, {worker})
    python2: Solution().maxProfitAssignment({difficulty}, {profit}, {worker})
    ruby: max_profit_assignment({difficulty}, {profit}, {worker})
    java: new Solution().maxProfitAssignment({difficulty}, {profit}, {worker})
    csharp: new Solution().MaxProfitAssignment({difficulty}, {profit}, {worker})
    kotlin: Solution().maxProfitAssignment({difficulty}, {profit}, {worker})
    go: maxProfitAssignment({difficulty}, {profit}, {worker})
    dart: Solution().maxProfitAssignment({difficulty}, {profit}, {worker})
    swift: Solution().maxProfitAssignment({difficulty}, {profit}, {worker})
    typescript: maxProfitAssignment({difficulty}, {profit}, {worker})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().maxProfitAssignment(difficulty, profit, worker, {result})
    checker:
      "class Checker:\n    def maxProfitAssignment(self, difficulty, profit,\
      \ worker, result):\n        if not isinstance(result, int) or len(difficulty)\
      \ != len(profit):\n            return False\n        best = 0\n        total\
      \ = 0\n        jobs = sorted(zip(difficulty, profit))\n        workers = sorted(worker)\n\
      \        i = 0\n        for ability in workers:\n            while i < len(jobs)\
      \ and jobs[i][0] <= ability:\n                best = max(best, jobs[i][1])\n\
      \                i += 1\n            total += best\n        return result ==\
      \ total\n"
seed: 826
