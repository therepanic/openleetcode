entry:
  id: 867
  title: transpose-matrix
  params:
    matrix:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().transpose({matrix})"
    rust: "Solution::transpose({matrix})"
    python3: "Solution().transpose({matrix})"
    python2: "Solution().transpose({matrix})"
    ruby: "transpose({matrix})"
    java: "new Solution().transpose({matrix})"
    csharp: "new Solution().Transpose({matrix})"
    kotlin: "Solution().transpose({matrix})"
    go: "transpose({matrix})"
    dart: "Solution().transpose({matrix})"
    swift: "Solution().transpose({matrix})"
    typescript: "transpose({matrix})"
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: "Checker().transpose(matrix, {result})"
    checker: |
      from typing import Any

      class Checker:
          def transpose(self, matrix: list[list[int]], result: Any) -> bool:
              if not isinstance(result, list):
                  return False
              if len(matrix) == 0 or len(matrix[0]) == 0:
                  return False
              rows = len(matrix)
              cols = len(matrix[0])
              if len(result) != cols:
                  return False
              for row in result:
                  if not isinstance(row, list) or len(row) != rows:
                      return False
              for i in range(cols):
                  for j in range(rows):
                      if result[i][j] != matrix[j][i]:
                          return False
              return True
seed: 867867
