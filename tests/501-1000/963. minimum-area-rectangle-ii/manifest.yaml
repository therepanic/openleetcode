  memory_mb: 256
oracle:
  python3:
    call: Checker().minAreaFreeRect(points, {result})
    checker:
      "class Checker:\n    def minAreaFreeRect(self, points, result):\n   \
      \     try:\n            value = float(result)\n        except Exception:\n \
      \           return False\n        from math import sqrt, inf, isclose\n    \
      \    ans = inf\n        seen = {}\n        for i, (x0, y0) in enumerate(points):\n\
      \            for x1, y1 in points[i + 1:]:\n                cx = (x0 + x1) /\
      \ 2.0\n                cy = (y0 + y1) / 2.0\n                d2 = (x0 - x1)\
      \ ** 2 + (y0 - y1) ** 2\n                for xx, yy in seen.get((cx, cy, d2),\
      \ []):\n                    area = sqrt(((x0 - xx) ** 2 + (y0 - yy) ** 2) *\
      \ ((x1 - xx) ** 2 + (y1 - yy) ** 2))\n                    ans = min(ans, area)\n\
      \                seen.setdefault((cx, cy, d2), []).append((x0, y0))\n      \
      \  expected = 0.0 if ans == inf else ans\n        return isclose(value, expected,\
      \ rel_tol=1e-9, abs_tol=1e-9)\n"
seed: 963
