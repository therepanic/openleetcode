entry:
  id: 789
  title: "escape-the-ghosts"
  params:
    ghosts:
      type: array
      items:
        type: array
        items:
          type: int
    target:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().escapeGhosts({ghosts}, {target})"
    rust: "Solution::escape_ghosts({ghosts}, {target})"
    python3: "Solution().escapeGhosts({ghosts}, {target})"
    python2: "Solution().escapeGhosts({ghosts}, {target})"
    ruby: "escape_ghosts({ghosts}, {target})"
    java: "new Solution().escapeGhosts({ghosts}, {target})"
    csharp: "new Solution().EscapeGhosts({ghosts}, {target})"
    kotlin: "Solution().escapeGhosts({ghosts}, {target})"
    go: "escapeGhosts({ghosts}, {target})"
    dart: "Solution().escapeGhosts({ghosts}, {target})"
    swift: "Solution().escapeGhosts({ghosts}, {target})"
    typescript: "escapeGhosts({ghosts}, {target})"
judge:
  type: "exact"
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: Checker().escapeGhosts(ghosts, target, {result})
    checker: |
      class Checker(object):
          def escapeGhosts(self, ghosts, target, result):
              return isinstance(result, bool)
seed: 789
tests:
  - name: "ex1"
    in:
      ghosts:
        - [1, 0]
        - [0, 3]
      target: [0, 1]
    out: true
  - name: "ex2"
    in:
      ghosts:
        - [1, 0]
      target: [2, 0]
    out: false
  - name: "ex3"
    in:
      ghosts:
        - [2, 0]
      target: [1, 0]
    out: false
  - name: "origin_unblocked_far_ghost"
    in:
      ghosts:
        - [10, 10]
      target: [0, 0]
    out: true
  - name: "origin_blocked_adjacent"
    in:
      ghosts:
        - [1, 0]
      target: [0, 0]
    out: true
  - name: "target_same_as_ghost"
    in:
      ghosts:
        - [3, 4]
      target: [3, 4]
    out: false
  - name: "single_ghost_far_away"
    in:
      ghosts:
        - [100, 100]
      target: [1, 1]
    out: true
  - name: "single_ghost_tie_on_distance"
    in:
      ghosts:
        - [2, 2]
      target: [1, 1]
    out: false
  - name: "single_ghost_behind_target"
    in:
      ghosts:
        - [5, 0]
      target: [3, 0]
    out: false
  - name: "single_ghost_off_axis_escape"
    in:
      ghosts:
        - [4, 0]
      target: [1, 2]
    out: true
  - name: "negative_coords_escape"
    in:
      ghosts:
        - [-5, -5]
      target: [-1, -2]
    out: true
  - name: "negative_coords_blocked"
    in:
      ghosts:
        - [-1, -1]
      target: [-2, -2]
    out: false
  - name: "multiple_ghosts_one_tie"
    in:
      ghosts:
        - [5, 5]
        - [7, 0]
        - [0, 8]
      target: [3, 3]
    out: false
  - name: "multiple_ghosts_all_far"
    in:
      ghosts:
        - [10, 10]
        - [9, 12]
        - [14, 1]
      target: [2, 2]
    out: true
  - name: "multiple_ghosts_one_close"
    in:
      ghosts:
        - [2, 3]
        - [100, 100]
        - [-100, -100]
      target: [1, 1]
    out: true
  - name: "duplicate_ghost_positions_blocked"
    in:
      ghosts:
        - [4, 4]
        - [4, 4]
        - [10, 10]
      target: [2, 2]
    out: false
  - name: "duplicate_ghost_positions_escape"
    in:
      ghosts:
        - [9, 9]
        - [9, 9]
        - [20, 20]
      target: [1, 1]
    out: true
  - name: "axis_aligned_escape"
    in:
      ghosts:
        - [0, 5]
        - [5, 0]
      target: [1, 1]
    out: true
  - name: "axis_aligned_blocked"
    in:
      ghosts:
        - [0, 2]
        - [2, 0]
      target: [1, 1]
    out: false
  - name: "diagonal_tie_blocked"
    in:
      ghosts:
        - [3, 3]
      target: [2, 2]
    out: false
  - name: "diagonal_escape"
    in:
      ghosts:
        - [5, 5]
      target: [2, 2]
    out: true
  - name: "mixed_sign_blocked"
    in:
      ghosts:
        - [-2, 3]
        - [4, -1]
      target: [1, 1]
    out: true
  - name: "mixed_sign_escape"
    in:
      ghosts:
        - [-10, 0]
        - [0, -10]
      target: [2, 2]
    out: true
  - name: "near_limit_escape_small_target"
    in:
      ghosts:
        - [10000, 10000]
        - [-10000, 10000]
        - [10000, -10000]
        - [-10000, -10000]
      target: [1, 0]
    out: true
  - name: "near_limit_blocked_small_target"
    in:
      ghosts:
        - [1, 0]
        - [10000, 10000]
        - [-10000, 10000]
        - [10000, -10000]
      target: [0, 0]
    out: true
  - name: "far_target_escape"
    in:
      ghosts:
        - [0, 0]
        - [1, 1]
      target: [10000, 10000]
    out: false
  - name: "far_target_blocked"
    in:
      ghosts:
        - [9999, 10000]
        - [10000, 9999]
      target: [10000, 10000]
    out: false
  - name: "ghost_at_origin_blocked"
    in:
      ghosts:
        - [0, 0]
      target: [3, 4]
    out: false
  - name: "large_distance_escape"
    in:
      ghosts:
        - [9990, 9990]
        - [5000, -5000]
      target: [10000, 10000]
    out: false
  - name: "large_distance_blocked"
    in:
      ghosts:
        - [9999, 9998]
        - [5000, 5000]
      target: [10000, 10000]
    out: false
  - name: "many_ghosts_escape"
    in:
      ghosts:
        - [20, 20]
        - [30, 40]
        - [50, 60]
        - [70, 80]
        - [90, 100]
      target: [1, 2]
    out: true
  - name: "many_ghosts_blocked"
    in:
      ghosts:
        - [2, 1]
        - [30, 40]
        - [50, 60]
        - [70, 80]
        - [90, 100]
      target: [1, 1]
    out: false
  - name: "symmetric_escape"
    in:
      ghosts:
        - [-3, -3]
        - [3, 3]
      target: [0, 2]
    out: true
  - name: "symmetric_blocked"
    in:
      ghosts:
        - [-1, 1]
        - [1, -1]
      target: [0, 0]
    out: true
  - name: "target_on_axis_escape"
    in:
      ghosts:
        - [4, 1]
        - [4, -1]
      target: [3, 0]
    out: false
  - name: "target_on_axis_blocked"
    in:
      ghosts:
        - [2, 0]
        - [10, 10]
      target: [1, 0]
    out: false
  - name: "single_ghost_same_manhattan_not_escape"
    in:
      ghosts:
        - [4, 0]
      target: [2, 2]
    out: false
  - name: "single_ghost_larger_manhattan_escape"
    in:
      ghosts:
        - [5, 0]
      target: [2, 2]
    out: true
  - name: "multi_ghost_min_equal_blocked"
    in:
      ghosts:
        - [2, 2]
        - [8, 0]
        - [0, 8]
      target: [1, 1]
    out: false
  - name: "multi_ghost_min_greater_escape"
    in:
      ghosts:
        - [3, 2]
        - [8, 0]
        - [0, 8]
      target: [1, 1]
    out: true
