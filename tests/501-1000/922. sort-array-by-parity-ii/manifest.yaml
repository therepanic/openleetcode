entry:
  id: 922
  title: sort-array-by-parity-ii
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().sortArrayByParityII({nums})"
    rust: "Solution::sort_array_by_parity_ii({nums})"
    python3: "Solution().sortArrayByParityII({nums})"
    python2: "Solution().sortArrayByParityII({nums})"
    ruby: "sort_array_by_parity_ii({nums})"
    java: "new Solution().sortArrayByParityII({nums})"
    csharp: "new Solution().SortArrayByParityII({nums})"
    kotlin: "Solution().sortArrayByParityII({nums})"
    go: "sortArrayByParityII({nums})"
    dart: "Solution().sortArrayByParityII({nums})"
    swift: "Solution().sortArrayByParityII({nums})"
    typescript: "sortArrayByParityII({nums})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().sortArrayByParityII(nums, {result})"
    checker: |
      class Checker:
          def sortArrayByParityII(self, nums, result):
              if len(nums) != len(result):
                  return False
              if sorted(nums) != sorted(result):
                  return False
              for i, x in enumerate(result):
                  if (x % 2) != (i % 2):
                      return False
              return True
seed: 922
