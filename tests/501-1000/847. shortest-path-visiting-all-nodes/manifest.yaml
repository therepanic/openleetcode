    python3: Solution().shortestPathLength({graph})
    python2: Solution().shortestPathLength({graph})
    ruby: shortest_path_length({graph})
    java: new Solution().shortestPathLength({graph})
    csharp: new Solution().ShortestPathLength({graph})
    kotlin: Solution().shortestPathLength({graph})
    go: shortestPathLength({graph})
    dart: Solution().shortestPathLength({graph})
    swift: Solution().shortestPathLength({graph})
    typescript: shortestPathLength({graph})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().shortestPathLength(graph, {result})
    checker: "from collections import deque\n\nclass Checker:\n    def shortestPathLength(self, graph, result):\n        n = len(graph)\n        if n == 1:\n            return result == 0\n        full = (1 << n) - 1\n        seen = [[False] * (1 << n) for _ in range(n)]\n        q = deque()\n        for i in range(n):\n            mask = 1 << i\n            q.append((i, mask, 0))\n            seen[i][mask] = True\n        while q:\n            node, mask, dist = q.popleft()\n            if mask == full:\n                return result == dist\n            for nei in graph[node]:\n                new_mask = mask | (1 << nei)\n                if not seen[nei][new_mask]:\n                    seen[nei][new_mask] = True\n                    q.append((nei, new_mask, dist + 1))\n        return False\n"
seed: 847
