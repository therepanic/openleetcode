entry:
  id: 926
  title: flip-string-to-monotone-increasing
  params:
    s:
      type: string
  call:
    cpp: "Solution().minFlipsMonoIncr({s})"
    rust: "Solution::min_flips_mono_incr({s})"
    python3: "Solution().minFlipsMonoIncr({s})"
    python2: "Solution().minFlipsMonoIncr({s})"
    ruby: "min_flips_mono_incr({s})"
    java: "new Solution().minFlipsMonoIncr({s})"
    csharp: "new Solution().MinFlipsMonoIncr({s})"
    kotlin: "Solution().minFlipsMonoIncr({s})"
    go: "minFlipsMonoIncr({s})"
    dart: "Solution().minFlipsMonoIncr({s})"
    swift: "Solution().minFlipsMonoIncr({s})"
    typescript: "minFlipsMonoIncr({s})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().minFlipsMonoIncr(s, {result})"
    checker: |
      class Checker:
          def minFlipsMonoIncr(self, s, result):
              ones = 0
              flips = 0
              best = 0
              for ch in s:
                  if ch == '1':
                      ones += 1
                  else:
                      flips += 1
                  if flips > ones:
                      flips = ones
                  best = max(best, 0)
              zeroes = 0
              ones = 0
              for ch in s:
                  if ch == '0':
                      zeroes += 1
              best = zeroes
              for ch in s:
                  if ch == '0':
                      zeroes -= 1
                  else:
                      ones += 1
                  if zeroes + ones < best:
                      best = zeroes + ones
              return result == best
seed: 926
