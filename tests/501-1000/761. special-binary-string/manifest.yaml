entry:
  id: 761
  title: special-binary-string
  params:
    s:
      type: string
  call:
    cpp: Solution().makeLargestSpecial({s})
    rust: Solution::make_largest_special({s})
    python3: Solution().makeLargestSpecial({s})
    python2: Solution().makeLargestSpecial({s})
    ruby: make_largest_special({s})
    java: new Solution().makeLargestSpecial({s})
    csharp: new Solution().MakeLargestSpecial({s})
    kotlin: Solution().makeLargestSpecial({s})
    go: makeLargestSpecial({s})
    dart: Solution().makeLargestSpecial({s})
    swift: Solution().makeLargestSpecial({s})
    typescript: makeLargestSpecial({s})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(s, {result})
    checker:
      "class Checker:\n    def check(self, s, result):\n        if not isinstance(s,\
      \ str) or not isinstance(result, str):\n            return False\n        if\
      \ len(s) < 2 or len(s) > 50 or len(s) % 2 != 0:\n            return False\n\
      \        if any(ch not in \"01\" for ch in s) or any(ch not in \"01\" for ch\
      \ in result):\n            return False\n        if not self._is_special(s)\
      \ or not self._is_special(result):\n            return False\n        if len(result)\
      \ != len(s):\n            return False\n        expected = self._canonical(s)\n\
      \        return expected is not None and result == expected\n\n    def _is_special(self,\
      \ s):\n        balance = 0\n        for ch in s:\n            balance += 1 if\
      \ ch == \"1\" else -1\n            if balance < 0:\n                return False\n\
      \        return balance == 0\n\n    def _canonical(self, s):\n        if not\
      \ s:\n            return \"\"\n        parts = []\n        balance = 0\n   \
      \     start = 0\n        for i, ch in enumerate(s):\n            balance +=\
      \ 1 if ch == \"1\" else -1\n            if balance < 0:\n                return\
      \ None\n            if balance == 0:\n                inner = self._canonical(s[start\
      \ + 1:i])\n                if inner is None:\n                    return None\n\
      \                parts.append(\"1\" + inner + \"0\")\n                start\
      \ = i + 1\n        if balance != 0 or start != len(s):\n            return None\n\
      \        parts.sort(reverse=True)\n        return \"\".join(parts)\n"
seed: 761
