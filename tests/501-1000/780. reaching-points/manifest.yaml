  memory_mb: 300
oracle:
  python3:
    call: Checker().reachingPoints(sx, sy, tx, ty, {result})
    checker: |
      class Checker:
          def reachingPoints(self, sx, sy, tx, ty, result):
              return isinstance(result, bool)
