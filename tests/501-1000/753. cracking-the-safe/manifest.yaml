  id: 753
  title: "cracking-the-safe"
  params:
    n:
      type: int
    k:
      type: int
  call:
    cpp: "Solution().crackSafe({n}, {k})"
    rust: "Solution::crack_safe({n}, {k})"
    python3: "Solution().crackSafe({n}, {k})"
    python2: "Solution().crackSafe({n}, {k})"
    ruby: "crack_safe({n}, {k})"
    java: "new Solution().crackSafe({n}, {k})"
    csharp: "new Solution().CrackSafe({n}, {k})"
    kotlin: "Solution().crackSafe({n}, {k})"
    go: "crackSafe({n}, {k})"
    dart: "Solution().crackSafe({n}, {k})"
    swift: "Solution().crackSafe({n}, {k})"
    typescript: "crackSafe({n}, {k})"

judge:
  type: "exact"

limits:
  time_ms: 2500
  memory_mb: 256

oracle:
  python3:
    call: "Checker().check(n, k, {result})"
    checker: |
      class Checker:
          def check(self, n, k, result):
              if not isinstance(result, str):
                  return False
              if n < 1 or n > 4 or k < 1 or k > 10:
                  return False
              if k ** n > 4096:
                  return False
              expected_length = (k ** n) + n - 1
              if len(result) != expected_length:
                  return False
              alphabet = set(str(i) for i in range(k))
              if any(ch not in alphabet for ch in result):
                  return False
              seen = set()
              for i in range(len(result) - n + 1):
                  window = result[i:i + n]
                  if window in seen:
                      return False
                  seen.add(window)
              return len(seen) == k ** n

