entry:
  id: 861
  title: score-after-flipping-matrix
  params:
    grid:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().matrixScore({grid})"
    rust: "Solution::matrix_score({grid})"
    python3: "Solution().matrixScore({grid})"
    python2: "Solution().matrixScore({grid})"
    ruby: "matrix_score({grid})"
    java: "new Solution().matrixScore({grid})"
    csharp: "new Solution().MatrixScore({grid})"
    kotlin: "Solution().matrixScore({grid})"
    go: "matrixScore({grid})"
    dart: "Solution().matrixScore({grid})"
    swift: "Solution().matrixScore({grid})"
    typescript: "matrixScore({grid})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().matrixScore(grid, {result})"
    checker: |
      class Checker:
          def matrixScore(self, grid, result):
              g = [row[:] for row in grid]
              rows = len(g)
              cols = len(g[0])
              for i in range(rows):
                  if g[i][0] == 0:
                      for j in range(cols):
                          g[i][j] ^= 1
              total = 0
              for j in range(cols):
                  ones = sum(g[i][j] for i in range(rows))
                  best = max(ones, rows - ones)
                  total += best * (1 << (cols - j - 1))
              return total == result
