entry:
  id: 506
  title: relative-ranks
  params:
    score:
      type: array
      items:
        type: int
  call:
    cpp: Solution().findRelativeRanks({score})
    rust: Solution::find_relative_ranks({score})
    python3: Solution().findRelativeRanks({score})
    python2: Solution().findRelativeRanks({score})
    ruby: find_relative_ranks({score})
    java: new Solution().findRelativeRanks({score})
    csharp: new Solution().FindRelativeRanks({score})
    kotlin: Solution().findRelativeRanks({score})
    go: findRelativeRanks({score})
    dart: Solution().findRelativeRanks({score})
    swift: Solution().findRelativeRanks({score})
    typescript: findRelativeRanks({score})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().findRelativeRanks(score, {result})
    checker: "class Checker:\n    def findRelativeRanks(self, score, result):\n        sorted_scores = sorted(score, reverse=True)\n        ranks = {}\n        for i, s in enumerate(sorted_scores):\n            ranks[s] = str(i + 1)\n        if sorted_scores:\n            ranks[sorted_scores[0]] = \"Gold Medal\"\n        if len(sorted_scores) > 1:\n            ranks[sorted_scores[1]] = \"Silver Medal\"\n        if len(sorted_scores) > 2:\n            ranks[sorted_scores[2]] = \"Bronze Medal\"\n        expected = [ranks[s] for s in score]\n        return expected == result\n"
seed: 506
