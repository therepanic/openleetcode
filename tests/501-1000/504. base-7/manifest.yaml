    num:
      type: int
  call:
    cpp: Solution().convertToBase7({num})
    rust: Solution::convert_to_base7({num})
    python3: Solution().convertToBase7({num})
    python2: Solution().convertToBase7({num})
    ruby: convert_to_base7({num})
    java: new Solution().convertToBase7({num})
    csharp: new Solution().ConvertToBase7({num})
    kotlin: Solution().convertToBase7({num})
    go: convertToBase7({num})
    dart: Solution().convertToBase7({num})
    swift: Solution().convertToBase7({num})
    typescript: convertToBase7({num})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().convertToBase7(num, {result})
    checker: "class Checker:\n    def convertToBase7(self, num, result):\n        if num == 0:\n            expected = \"0\"\n        else:\n            sign = \"-\" if num < 0 else \"\"\n            num = abs(num)\n            digits = \"\"\n            while num:\n                digits = str(num % 7) + digits\n                num //= 7\n            expected = sign + digits\n        return expected == result\n"
seed: 504
