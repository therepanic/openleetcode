    python3: Solution().sumOfDistancesInTree({n}, {edges})
    python2: Solution().sumOfDistancesInTree({n}, {edges})
    ruby: sum_of_distances_in_tree({n}, {edges})
    java: new Solution().sumOfDistancesInTree({n}, {edges})
    csharp: new Solution().SumOfDistancesInTree({n}, {edges})
    kotlin: Solution().sumOfDistancesInTree({n}, {edges})
