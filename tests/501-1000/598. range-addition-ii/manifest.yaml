entry:
  id: 598
  title: range-addition-ii
  params:
    m:
      type: int
    n:
      type: int
    ops:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().maxCount({m}, {n}, {ops})
    rust: Solution::max_count({m}, {n}, {ops})
    python3: Solution().maxCount({m}, {n}, {ops})
    python2: Solution().maxCount({m}, {n}, {ops})
    ruby: max_count({m}, {n}, {ops})
    java: new Solution().maxCount({m}, {n}, {ops})
    csharp: new Solution().MaxCount({m}, {n}, {ops})
    kotlin: Solution().maxCount({m}, {n}, {ops})
    go: maxCount({m}, {n}, {ops})
    dart: Solution().maxCount({m}, {n}, {ops})
    swift: Solution().maxCount({m}, {n}, {ops})
    typescript: maxCount({m}, {n}, {ops})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 256
oracle:
  python3:
    call: Checker().maxCount(m, n, ops, {result})
    checker:
      "from typing import Any, List\nclass Checker:\n    def maxCount(self,\
      \ m: int, n: int, ops: List[List[int]], result: Any) -> bool:\n        if not\
      \ isinstance(result, int):\n            return False\n        if not ops:\n\
      \            return result == m * n\n        min_m = min(op[0] for op in ops)\n\
      \        min_n = min(op[1] for op in ops)\n        return result == min_m *\
      \ min_n\n"
seed: 598
