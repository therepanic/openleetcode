entry:
  id: 912
  title: sort-an-array
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().sortArray({nums})"
    rust: "Solution::sort_array({nums})"
    python3: "Solution().sortArray({nums})"
    python2: "Solution().sortArray({nums})"
    ruby: "sort_array({nums})"
    java: "new Solution().sortArray({nums})"
    csharp: "new Solution().SortArray({nums})"
    kotlin: "Solution().sortArray({nums})"
    go: "sortArray({nums})"
    dart: "Solution().sortArray({nums})"
    swift: "Solution().sortArray({nums})"
    typescript: "sortArray({nums})"
judge:
  type: "exact"
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().sortArray(nums, {result})"
    checker: |
      class Checker:
          def sortArray(self, nums, result):
              if not isinstance(result, list) or len(result) != len(nums):
                  return False
              if any(result[i] > result[i + 1] for i in range(len(result) - 1)):
                  return False
              counts = {}
              for x in nums:
                  counts[x] = counts.get(x, 0) + 1
              for x in result:
                  if x not in counts:
                      return False
                  counts[x] -= 1
                  if counts[x] < 0:
                      return False
              return all(v == 0 for v in counts.values())
