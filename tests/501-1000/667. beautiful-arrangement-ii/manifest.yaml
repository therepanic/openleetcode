entry:
  id: 667
  title: beautiful-arrangement-ii
  params:
    n:
      type: int
    k:
      type: int
  call:
    cpp: "Solution().constructArray({n}, {k})"
    rust: "Solution::construct_array({n}, {k})"
    python3: "Solution().constructArray({n}, {k})"
    python2: "Solution().constructArray({n}, {k})"
    ruby: "construct_array({n}, {k})"
    java: "new Solution().constructArray({n}, {k})"
    csharp: "new Solution().ConstructArray({n}, {k})"
    kotlin: "Solution().constructArray({n}, {k})"
    go: "constructArray({n}, {k})"
    dart: "Solution().constructArray({n}, {k})"
    swift: "Solution().constructArray({n}, {k})"
    typescript: "constructArray({n}, {k})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().constructArray(n, k, {result})"
    checker: |
      class Checker:
          def constructArray(self, n, k, result):
              if not isinstance(result, list):
                  return False
              if len(result) != n:
                  return False
              if sorted(result) != list(range(1, n + 1)):
                  return False
              if n <= 1:
                  return False
              diffs = set()
              for i in range(1, n):
                  diffs.add(abs(result[i] - result[i - 1]))
              return len(diffs) == k
seed: 667
