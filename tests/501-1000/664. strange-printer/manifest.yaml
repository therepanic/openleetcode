entry:
  id: 664
  title: strange-printer
  params:
    s:
      type: string
  call:
    cpp: Solution().strangePrinter({s})
    rust: Solution::strange_printer({s})
    python3: Solution().strangePrinter({s})
    python2: Solution().strangePrinter({s})
    ruby: strange_printer({s})
    java: new Solution().strangePrinter({s})
    csharp: new Solution().StrangePrinter({s})
    kotlin: Solution().strangePrinter({s})
    go: strangePrinter({s})
    dart: Solution().strangePrinter({s})
    swift: Solution().strangePrinter({s})
    typescript: strangePrinter({s})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().strangePrinter({s}, {result})
    checker: |
      class Checker:
          def strangePrinter(self, s, result):
              if not isinstance(result, int):
                  return False
              if result < 1:
                  return False
              n = len(s)
              if n == 0:
                  return result == 0
              t = []
              for ch in s:
                  if not t or t[-1] != ch:
                      t.append(ch)
              m = len(t)
              dp = [[0] * m for _ in range(m)]
              for i in range(m):
                  dp[i][i] = 1
              for length in range(2, m + 1):
                  for i in range(m - length + 1):
                      j = i + length - 1
                      best = dp[i][j - 1] + 1
                      for k in range(i, j):
                          if t[k] == t[j]:
                              left = dp[i][k]
                              mid = 0 if k + 1 > j - 1 else dp[k + 1][j - 1]
                              cand = left + mid
                              if cand < best:
                                  best = cand
                      dp[i][j] = best
              return result == dp[0][m - 1]
