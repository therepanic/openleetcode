  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(preorder, postorder, {result})"
    checker: |
      from collections import deque
      from typing import Any, List, Optional

      class Checker:
          def _build_expected(self, preorder, postorder):
              idx = [0]

              def build(l, h):
                  if idx[0] >= len(preorder) or l > h:
                      return None
                  root = TreeNode(preorder[idx[0]])
                  idx[0] += 1
                  if l == h:
                      return root
                  if idx[0] >= len(preorder):
                      return root
                  i = l
                  while i <= h and postorder[i] != preorder[idx[0]]:
                      i += 1
                  if i <= h:
                      root.left = build(l, i)
                      root.right = build(i + 1, h - 1)
                  return root

              return build(0, len(postorder) - 1)

          def _from_bfs(self, arr):
              if not arr:
                  return None
              nodes = [None if v is None else TreeNode(v) for v in arr]
              q = deque([nodes[0]])
              i = 1
              while q and i < len(nodes):
                  node = q.popleft()
                  if node is None:
                      continue
                  if i < len(nodes):
                      node.left = nodes[i]
                      q.append(nodes[i])
                      i += 1
                  if i < len(nodes):
                      node.right = nodes[i]
                      q.append(nodes[i])
                      i += 1
              return nodes[0]

          def _normalize(self, result):
              if result is None:
                  return None
              if isinstance(result, list):
                  return self._from_bfs(result)
              if isinstance(result, dict):
                  def build(node):
                      if node is None:
                          return None
                      value = node.get("val", node.get("value"))
                      root = TreeNode(value)
                      root.left = build(node.get("left"))
                      root.right = build(node.get("right"))
                      return root
                  return build(result)
              if hasattr(result, "val"):
                  return result
              return None

          def _preorder(self, root):
              out = []
              def dfs(node):
                  if not node:
                      return
                  out.append(node.val)
                  dfs(node.left)
                  dfs(node.right)
              dfs(root)
              return out

          def _postorder(self, root):
              out = []
              def dfs(node):
                  if not node:
                      return
                  dfs(node.left)
                  dfs(node.right)
                  out.append(node.val)
              dfs(root)
              return out

          def _validate_distinct(self, root):
              seen = set()
              stack = [root]
              while stack:
                  node = stack.pop()
                  if not node:
                      continue
                  if node.val in seen:
                      return False
                  seen.add(node.val)
                  stack.append(node.left)
                  stack.append(node.right)
              return True

          def check(self, preorder, postorder, result):
              actual = self._normalize(result)
              if actual is None:
                  return False
              if not self._validate_distinct(actual):
                  return False
              return self._preorder(actual) == preorder and self._postorder(actual) == postorder
