    rust: "TreeNode::tree_node_to_array(Solution::construct_from_pre_post({preorder}, {postorder}))"
    python3: "tree_node_to_array(Solution().constructFromPrePost({preorder}, {postorder}))"
    python2: "tree_node_to_array(Solution().constructFromPrePost({preorder}, {postorder}))"
    ruby: "tree_node_to_array(construct_from_pre_post({preorder}, {postorder}))"
    java: "TreeNode.treeNodeToArray(new Solution().constructFromPrePost({preorder}, {postorder}))"
