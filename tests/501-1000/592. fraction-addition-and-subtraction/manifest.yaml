entry:
  id: 592
  title: fraction-addition-and-subtraction
  params:
    expression:
      type: string
  call:
    cpp: "Solution().fractionAddition({expression})"
    rust: "Solution::fraction_addition({expression})"
    python3: "Solution().fractionAddition({expression})"
    python2: "Solution().fractionAddition({expression})"
    ruby: "fraction_addition({expression})"
    java: "new Solution().fractionAddition({expression})"
    csharp: "new Solution().FractionAddition({expression})"
    kotlin: "Solution().fractionAddition({expression})"
    go: "fractionAddition({expression})"
    dart: "Solution().fractionAddition({expression})"
    swift: "Solution().fractionAddition({expression})"
    typescript: "fractionAddition({expression})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().fractionAddition(expression, {result})"
    checker: |
      class Checker:
          def fractionAddition(self, expression, result):
              def gcd(a, b):
                  while b:
                      a, b = b, a % b
                  return a

              parts = []
              i = 0
              while i < len(expression):
                  sign = 1
                  if expression[i] in "+-":
                      sign = -1 if expression[i] == "-" else 1
                      i += 1
                  j = i
                  while expression[j] != "/":
                      j += 1
                  num = int(expression[i:j]) * sign
                  i = j + 1
                  j = i
                  while j < len(expression) and expression[j] not in "+-":
                      j += 1
                  den = int(expression[i:j])
                  parts.append((num, den))
                  i = j

              common = 1
              for _, den in parts:
                  common = common * den // gcd(common, den)

              total = 0
              for num, den in parts:
                  total += num * (common // den)

              g = gcd(abs(total), common)
              expected = str(total // g) + "/" + str(common // g)
              return result == expected
seed: 592
