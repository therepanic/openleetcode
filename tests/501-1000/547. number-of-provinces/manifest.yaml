entry:
  id: 547
  title: number-of-provinces
  params:
    isConnected:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().findCircleNum({isConnected})
    rust: Solution::find_circle_num({isConnected})
    python3: Solution().findCircleNum({isConnected})
    python2: Solution().findCircleNum({isConnected})
    ruby: find_circle_num({isConnected})
    java: new Solution().findCircleNum({isConnected})
    csharp: new Solution().FindCircleNum({isConnected})
    kotlin: Solution().findCircleNum({isConnected})
    go: findCircleNum({isConnected})
    dart: Solution().findCircleNum({isConnected})
    swift: Solution().findCircleNum({isConnected})
    typescript: findCircleNum({isConnected})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(isConnected, {result})
    checker:
      "class Checker:\n    def check(self, isConnected, result):\n        if\
      \ not isinstance(result, int):\n            return False\n        n = len(isConnected)\n\
      \        seen = [False] * n\n        provinces = 0\n        for i in range(n):\n\
      \            if seen[i]:\n                continue\n            provinces +=\
      \ 1\n            stack = [i]\n            seen[i] = True\n            while\
      \ stack:\n                u = stack.pop()\n                row = isConnected[u]\n\
      \                for v in range(n):\n                    if row[v] and not seen[v]:\n\
      \                        seen[v] = True\n                        stack.append(v)\n\
      \        return result == provinces\n"
seed: 547
