entry:
  id: 652
  title: find-duplicate-subtrees
  params:
    root:
      type: tree_node
  call:
    cpp: Solution().findDuplicateSubtrees({root})
    rust: Solution::find_duplicate_subtrees({root})
    python3: Solution().findDuplicateSubtrees({root})
    python2: Solution().findDuplicateSubtrees({root})
    ruby: find_duplicate_subtrees({root})
    java: new Solution().findDuplicateSubtrees({root})
    csharp: new Solution().FindDuplicateSubtrees({root})
    kotlin: Solution().findDuplicateSubtrees({root})
    go: findDuplicateSubtrees({root})
    dart: Solution().findDuplicateSubtrees({root})
    swift: Solution().findDuplicateSubtrees({root})
    typescript: findDuplicateSubtrees({root})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().findDuplicateSubtrees(root, {result})
    checker: |
      class Checker:
          def findDuplicateSubtrees(self, root, result):
              from collections import defaultdict

              serial_to_count = defaultdict(int)

              def build_from_list(values):
                  if not values:
                      return None
                  nodes = [None if v is None else TreeNode(v) for v in values]
                  kids = nodes[::-1]
                  root_node = kids.pop()
                  for node in nodes:
                      if node is not None:
                          if kids:
                              node.left = kids.pop()
                          if kids:
                              node.right = kids.pop()
                  return root_node

              def normalize(node):
                  if node is None:
                      return None
                  if isinstance(node, list):
                      return build_from_list(node)
                  if isinstance(node, dict):
                      val = node.get("val", node.get("value"))
                      left = normalize(node.get("left"))
                      right = normalize(node.get("right"))
                      return TreeNode(val, left, right)
                  if hasattr(node, "val"):
                      return node
                  return None

              root = normalize(root)

              def dfs(node):
                  if node is None:
                      return "#"
                  left = dfs(node.left)
                  right = dfs(node.right)
                  serial = f"{node.val},{left},{right}"
                  serial_to_count[serial] += 1
                  return serial

              dfs(root)
              expected = {serial for serial, count in serial_to_count.items() if count >= 2}

              if not isinstance(result, list):
                  return False

              actual = set()
              seen_serials = set()
              for node in result:
                  node = normalize(node)
                  if node is None:
                      return False

                  def serialize(curr):
                      if curr is None:
                          return "#"
                      return f"{curr.val},{serialize(curr.left)},{serialize(curr.right)}"

                  serial = serialize(node)
                  if serial in seen_serials:
                      return False
                  seen_serials.add(serial)
                  actual.add(serial)

              return actual == expected
