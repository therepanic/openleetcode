entry:
  id: 796
  title: rotate-string
  params:
    s:
      type: string
    goal:
      type: string
  call:
    cpp: "Solution().rotateString({s}, {goal})"
    rust: "Solution::rotate_string({s}, {goal})"
    python3: "Solution().rotateString({s}, {goal})"
    python2: "Solution().rotateString({s}, {goal})"
    ruby: "rotate_string({s}, {goal})"
    java: "new Solution().rotateString({s}, {goal})"
    csharp: "new Solution().RotateString({s}, {goal})"
    kotlin: "Solution().rotateString({s}, {goal})"
    go: "rotateString({s}, {goal})"
    dart: "Solution().rotateString({s}, {goal})"
    swift: "Solution().rotateString({s}, {goal})"
    typescript: "rotateString({s}, {goal})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(s, goal, {result})"
    checker: |
      class Checker:
          def check(self, s, goal, result):
              expected = len(s) == len(goal) and goal in (s + s)
              return bool(result) == expected
seed: 796
