entry:
  id: 925
  title: long-pressed-name
  params:
    name:
      type: string
    typed:
      type: string
  call:
    cpp: "Solution().isLongPressedName({name}, {typed})"
    rust: "Solution::is_long_pressed_name({name}, {typed})"
    python3: "Solution().isLongPressedName({name}, {typed})"
    python2: "Solution().isLongPressedName({name}, {typed})"
    ruby: "is_long_pressed_name({name}, {typed})"
    java: "new Solution().isLongPressedName({name}, {typed})"
    csharp: "new Solution().IsLongPressedName({name}, {typed})"
    kotlin: "Solution().isLongPressedName({name}, {typed})"
    go: "isLongPressedName({name}, {typed})"
    dart: "Solution().isLongPressedName({name}, {typed})"
    swift: "Solution().isLongPressedName({name}, {typed})"
    typescript: "isLongPressedName({name}, {typed})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().isLongPressedName(name, typed, {result})"
    checker: |
      class Checker:
          def isLongPressedName(self, name, typed, result):
              i = j = 0
              while j < len(typed):
                  if i < len(name) and name[i] == typed[j]:
                      i += 1
                      j += 1
                  elif j > 0 and typed[j] == typed[j - 1]:
                      j += 1
                  else:
                      return result == False
              return result == (i == len(name))
seed: 925
