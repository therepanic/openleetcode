  title: delete-and-earn
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().deleteAndEarn({nums})"
    rust: "Solution::delete_and_earn({nums})"
    python3: "Solution().deleteAndEarn({nums})"
    python2: "Solution().deleteAndEarn({nums})"
    ruby: "delete_and_earn({nums})"
    java: "new Solution().deleteAndEarn({nums})"
    csharp: "new Solution().DeleteAndEarn({nums})"
    kotlin: "Solution().deleteAndEarn({nums})"
    go: "deleteAndEarn({nums})"
    dart: "Solution().deleteAndEarn({nums})"
    swift: "Solution().deleteAndEarn({nums})"
    typescript: "deleteAndEarn({nums})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().deleteAndEarn(nums, {result})"
    checker: |
      class Checker:
          def deleteAndEarn(self, nums, result):
              if not isinstance(result, int):
                  return False
              if not isinstance(nums, list):
                  return False
              if len(nums) < 1 or len(nums) > 20000:
                  return False
              if any((not isinstance(x, int)) for x in nums):
                  return False
              if any(x < 1 or x > 10000 for x in nums):
                  return False

              points = [0] * (max(nums) + 1)
              for num in nums:
                  points[num] += num

              take = 0
              skip = 0
              for value in points:
                  new_take = skip + value
                  new_skip = max(skip, take)
                  take = new_take
                  skip = new_skip

              return result == max(take, skip)
