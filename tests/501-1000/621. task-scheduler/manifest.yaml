entry:
  id: 621
  title: task-scheduler
  params:
    tasks:
      type: array
      items:
        type: char
    n:
      type: int
  call:
    cpp: Solution().leastInterval({tasks}, {n})
    rust: Solution::least_interval({tasks}, {n})
    python3: Solution().leastInterval({tasks}, {n})
    python2: Solution().leastInterval({tasks}, {n})
    ruby: least_interval({tasks}, {n})
    java: new Solution().leastInterval({tasks}, {n})
    csharp: new Solution().LeastInterval({tasks}, {n})
    kotlin: Solution().leastInterval({tasks}, {n})
    go: leastInterval({tasks}, {n})
    dart: Solution().leastInterval({tasks}, {n})
    swift: Solution().leastInterval({tasks}, {n})
    typescript: leastInterval({tasks}, {n})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: Checker().leastInterval(tasks, n, {result})
    checker:
      "from collections import Counter\n\nclass Checker:\n    def leastInterval(self,\
      \ tasks, n, result):\n        if not isinstance(result, int):\n            return\
      \ False\n        count = Counter(tasks)\n        f_max = max(count.values())\n\
      \        max_count = sum(1 for v in count.values() if v == f_max)\n        expected\
      \ = max(len(tasks), (f_max - 1) * (n + 1) + max_count)\n        return result\
      \ == expected\n"
seed: 621
