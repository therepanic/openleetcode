entry:
  id: 581
  title: shortest-unsorted-continuous-subarray
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: Solution().findUnsortedSubarray({nums})
    rust: Solution::find_unsorted_subarray({nums})
    python3: Solution().findUnsortedSubarray({nums})
    python2: Solution().findUnsortedSubarray({nums})
    ruby: find_unsorted_subarray({nums})
    java: new Solution().findUnsortedSubarray({nums})
    csharp: new Solution().FindUnsortedSubarray({nums})
    kotlin: Solution().findUnsortedSubarray({nums})
    go: findUnsortedSubarray({nums})
    dart: Solution().findUnsortedSubarray({nums})
    swift: Solution().findUnsortedSubarray({nums})
    typescript: findUnsortedSubarray({nums})
judge:
  type: exact
limits:
  time_ms: 800
  memory_mb: 128
oracle:
  python3:
    call: Checker().findUnsortedSubarray(nums, {result})
    checker: |
      class Checker:
          def findUnsortedSubarray(self, nums, result):
              sorted_nums = sorted(nums)
              start = len(nums)
              end = 0
              for i, (a, b) in enumerate(zip(nums, sorted_nums)):
                  if a != b:
                      start = min(start, i)
                      end = max(end, i)
              expected = end - start + 1 if end - start >= 0 else 0
              return isinstance(result, int) and result == expected
seed: 581
