    java: "new Solution().reachableNodes({edges}, {maxMoves}, {n})"
    csharp: "new Solution().ReachableNodes({edges}, {maxMoves}, {n})"
    kotlin: "Solution().reachableNodes({edges}, {maxMoves}, {n})"
    go: "reachableNodes({edges}, {maxMoves}, {n})"
    dart: "Solution().reachableNodes({edges}, {maxMoves}, {n})"
