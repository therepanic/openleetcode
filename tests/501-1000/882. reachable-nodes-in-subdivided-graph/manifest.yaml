judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().reachableNodes(edges, maxMoves, n, {result})"
    checker: |
      from heapq import heappop, heappush

      class Checker:
          def reachableNodes(self, edges, maxMoves, n, result):
              graph = [[] for _ in range(n)]
              dist = [maxMoves + 1] * n
              for u, v, cnt in edges:
                  graph[u].append((v, cnt))
                  graph[v].append((u, cnt))
              dist[0] = 0
              heap = [(0, 0)]
              while heap:
                  d, u = heappop(heap)
                  if d != dist[u] or d >= maxMoves:
                      continue
                  for v, w in graph[u]:
                      nd = d + w + 1
                      if nd < dist[v]:
                          dist[v] = nd
                          heappush(heap, (nd, v))
              reachable = sum(d <= maxMoves for d in dist)
              sub = 0
              for u, v, cnt in edges:
                  a = 0 if dist[u] > maxMoves else min(maxMoves - dist[u], cnt)
                  b = 0 if dist[v] > maxMoves else min(maxMoves - dist[v], cnt)
                  sub += min(a + b, cnt)
              return reachable + sub == result
