entry:
  id: 673
  title: number-of-longest-increasing-subsequence
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().findNumberOfLIS({nums})"
    rust: "Solution::find_number_of_lis({nums})"
    python3: "Solution().findNumberOfLIS({nums})"
    python2: "Solution().findNumberOfLIS({nums})"
    ruby: "find_number_of_lis({nums})"
    java: "new Solution().findNumberOfLIS({nums})"
    csharp: "new Solution().FindNumberOfLIS({nums})"
    kotlin: "Solution().findNumberOfLIS({nums})"
    go: "findNumberOfLIS({nums})"
    dart: "Solution().findNumberOfLIS({nums})"
    swift: "Solution().findNumberOfLIS({nums})"
    typescript: "findNumberOfLIS({nums})"
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().findNumberOfLIS(nums, {result})"
    checker: |
      class Checker:
          def findNumberOfLIS(self, nums, result):
              n = len(nums)
              if n == 0:
                  return result == 0

              lengths = [1] * n
              counts = [1] * n
              for i in range(n):
                  for j in range(i):
                      if nums[j] < nums[i]:
                          if lengths[j] + 1 > lengths[i]:
                              lengths[i] = lengths[j] + 1
                              counts[i] = counts[j]
                          elif lengths[j] + 1 == lengths[i]:
                              counts[i] += counts[j]

              max_length = max(lengths)
              expected = sum(counts[i] for i in range(n) if lengths[i] == max_length)
              return result == expected and isinstance(result, int)
