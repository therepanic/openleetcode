    typescript: "calPoints({operations})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().calPoints(operations, {result})"
    checker: |
      class Checker:
          def calPoints(self, operations, result):
              stack = []
              for op in operations:
                  if op == "C":
                      if not stack:
                          return False
                      stack.pop()
                  elif op == "D":
                      if not stack:
                          return False
                      stack.append(stack[-1] * 2)
                  elif op == "+":
                      if len(stack) < 2:
                          return False
                      stack.append(stack[-1] + stack[-2])
                  else:
                      try:
                          value = int(op)
                      except Exception:
                          return False
                      if value < -30000 or value > 30000:
                          return False
                      stack.append(value)
              return sum(stack) == result
