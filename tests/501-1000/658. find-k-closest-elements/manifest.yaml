entry:
  id: 658
  title: find-k-closest-elements
  params:
    arr:
      type: array
      items:
        type: int
    k:
      type: int
    x:
      type: int
  call:
    cpp: Solution().findClosestElements({arr}, {k}, {x})
    rust: Solution::find_closest_elements({arr}, {k}, {x})
    python3: Solution().findClosestElements({arr}, {k}, {x})
    python2: Solution().findClosestElements({arr}, {k}, {x})
    ruby: find_closest_elements({arr}, {k}, {x})
    java: new Solution().findClosestElements({arr}, {k}, {x})
    csharp: new Solution().FindClosestElements({arr}, {k}, {x})
    kotlin: Solution().findClosestElements({arr}, {k}, {x})
    go: findClosestElements({arr}, {k}, {x})
    dart: Solution().findClosestElements({arr}, {k}, {x})
    swift: Solution().findClosestElements({arr}, {k}, {x})
    typescript: findClosestElements({arr}, {k}, {x})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().findClosestElements(arr, k, x, {result})
    checker: |
      class Checker:
          def findClosestElements(self, arr, k, x, result):
              if not isinstance(result, list):
                  return False
              if len(result) != k:
                  return False
              if any(result[i] > result[i + 1] for i in range(len(result) - 1)):
                  return False
              expected = sorted(sorted(arr, key=lambda num: (abs(num - x), num))[:k])
              return result == expected
seed: 658
