entry:
  id: 628
  title: maximum-product-of-three-numbers
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: Solution().maximumProduct({nums})
    rust: Solution::maximum_product({nums})
    python3: Solution().maximumProduct({nums})
    python2: Solution().maximumProduct({nums})
    ruby: maximum_product({nums})
    java: new Solution().maximumProduct({nums})
    csharp: new Solution().MaximumProduct({nums})
    kotlin: Solution().maximumProduct({nums})
    go: maximumProduct({nums})
    dart: Solution().maximumProduct({nums})
    swift: Solution().maximumProduct({nums})
    typescript: maximumProduct({nums})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().maximumProduct(nums, {result})
    checker: |
      class Checker:
          def maximumProduct(self, nums, result):
              if not isinstance(nums, list):
                  return False
              if len(nums) < 3:
                  return False
              if not isinstance(result, int):
                  return False
              for value in nums:
                  if not isinstance(value, int):
                      return False
              nums = sorted(nums)
              expected = max(nums[-1] * nums[-2] * nums[-3], nums[-1] * nums[0] * nums[1])
              return result == expected
seed: 628
