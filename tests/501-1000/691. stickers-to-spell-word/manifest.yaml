entry:
  id: 691
  title: stickers-to-spell-word
  params:
    stickers:
      type: array
      items:
        type: string
    target:
      type: string
  call:
    cpp: Solution().minStickers({stickers}, {target})
    rust: Solution::min_stickers({stickers}, {target})
    python3: Solution().minStickers({stickers}, {target})
    python2: Solution().minStickers({stickers}, {target})
    ruby: min_stickers({stickers}, {target})
    java: new Solution().minStickers({stickers}, {target})
    csharp: new Solution().MinStickers({stickers}, {target})
    kotlin: Solution().minStickers({stickers}, {target})
    go: minStickers({stickers}, {target})
    dart: Solution().minStickers({stickers}, {target})
    swift: Solution().minStickers({stickers}, {target})
    typescript: minStickers({stickers}, {target})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(stickers, target, {result})
    checker: |
      class Checker:
          def check(self, stickers, target, result):
              if not isinstance(result, int):
                  return False

              from functools import lru_cache
              from collections import Counter

              target_counts = Counter(target)
              needed_chars = sorted(target_counts)
              if not needed_chars:
                  return result == 0

              sticker_counts = []
              for s in stickers:
                  counts = Counter(s)
                  sticker_counts.append(tuple(counts.get(ch, 0) for ch in needed_chars))

              @lru_cache(None)
              def dfs(state):
                  if all(x == 0 for x in state):
                      return 0
                  best = float("inf")
                  first = next(i for i, x in enumerate(state) if x > 0)
                  for sc in sticker_counts:
                      if sc[first] == 0:
                          continue
                      new_state = []
                      for need, have in zip(state, sc):
                          new_state.append(max(0, need - have))
                      cand = dfs(tuple(new_state))
                      if cand != float("inf"):
                          best = min(best, 1 + cand)
                  return best

              start = tuple(target_counts[ch] for ch in needed_chars)
              expected = dfs(start)
              if expected == float("inf"):
                  expected = -1
              return result == expected
seed: 691
