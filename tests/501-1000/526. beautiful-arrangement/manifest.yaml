  title: beautiful-arrangement
  params:
    n:
      type: int
  call:
    cpp: "Solution().countArrangement({n})"
    rust: "Solution::count_arrangement({n})"
    python3: "Solution().countArrangement({n})"
    python2: "Solution().countArrangement({n})"
    ruby: "count_arrangement({n})"
    java: "new Solution().countArrangement({n})"
    csharp: "new Solution().CountArrangement({n})"
    kotlin: "Solution().countArrangement({n})"
    go: "countArrangement({n})"
    dart: "Solution().countArrangement({n})"
    swift: "Solution().countArrangement({n})"
