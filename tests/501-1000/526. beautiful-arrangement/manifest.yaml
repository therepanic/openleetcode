judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().countArrangement(n, {result})"
    checker: |
      class Checker:
          def countArrangement(self, n, result):
              if not isinstance(result, int):
                  return False
              size = 1 << n
              dp = [0] * size
              dp[0] = 1
              for mask in range(size):
                  pos = mask.bit_count() + 1
                  if pos > n:
                      continue
                  cur = dp[mask]
                  if cur == 0:
                      continue
                  for v in range(1, n + 1):
                      bit = 1 << (v - 1)
                      if mask & bit == 0 and (v % pos == 0 or pos % v == 0):
                          dp[mask | bit] += cur
              return result == dp[-1]
seed: 526
