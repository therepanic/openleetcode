entry:
  id: 520
  title: detect-capital
  params:
    word:
      type: string
  call:
    cpp: Solution().detectCapitalUse({word})
    rust: Solution::detect_capital_use({word})
    python3: Solution().detectCapitalUse({word})
    python2: Solution().detectCapitalUse({word})
    ruby: detect_capital_use({word})
    java: new Solution().detectCapitalUse({word})
    csharp: new Solution().DetectCapitalUse({word})
    kotlin: Solution().detectCapitalUse({word})
    go: detectCapitalUse({word})
    dart: Solution().detectCapitalUse({word})
    swift: Solution().detectCapitalUse({word})
    typescript: detectCapitalUse({word})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().detectCapitalUse(word, {result})
    checker:
      "class Checker:\n    def detectCapitalUse(self, word, result):\n    \
      \    if not isinstance(result, bool):\n            return False\n        expected\
      \ = word.isupper() or word.islower() or (word[:1].isupper() and word[1:].islower())\n\
      \        return result == expected\n"
seed: 520
tests:
  - name: example_usa
    in:
      word: USA
    out: true
  - name: example_flag
    in:
      word: FlaG
    out: false
  - name: single_lower
    in:
      word: a
    out: true
  - name: single_upper
    in:
      word: Z
    out: true
  - name: all_lower_short
    in:
      word: hello
    out: true
  - name: all_upper_short
    in:
      word: HELLO
    out: true
  - name: title_case_short
