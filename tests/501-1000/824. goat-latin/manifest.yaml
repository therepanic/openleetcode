entry:
  id: 824
  title: goat-latin
  params:
    sentence:
      type: string
  call:
    cpp: Solution().toGoatLatin({sentence})
    rust: Solution::to_goat_latin({sentence})
    python3: Solution().toGoatLatin({sentence})
    python2: Solution().toGoatLatin({sentence})
    ruby: to_goat_latin({sentence})
    java: new Solution().toGoatLatin({sentence})
    csharp: new Solution().ToGoatLatin({sentence})
    kotlin: Solution().toGoatLatin({sentence})
    go: toGoatLatin({sentence})
    dart: Solution().toGoatLatin({sentence})
    swift: Solution().toGoatLatin({sentence})
    typescript: toGoatLatin({sentence})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 128
oracle:
  python3:
    call: Checker().check(sentence, {result})
    checker: |
      class Checker:
          def check(self, sentence, result):
              return isinstance(result, str)
seed: 824
tests:
  - name: ex1
    in:
      sentence: I speak Goat Latin
    out: Imaa peaksmaaa oatGmaaaa atinLmaaaaa
  - name: ex2
    in:
      sentence: The quick brown fox jumped over the lazy dog
    out: heTmaa uickqmaaa rownbmaaaa oxfmaaaaa umpedjmaaaaaa overmaaaaaaa hetmaaaaaaaa azylmaaaaaaaaa ogdmaaaaaaaaaa
