entry:
  id: 874
  title: walking-robot-simulation
  params:
    commands:
      type: array
      items:
        type: int
    obstacles:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().robotSim({commands}, {obstacles})"
    rust: "Solution::robot_sim({commands}, {obstacles})"
    python3: "Solution().robotSim({commands}, {obstacles})"
    python2: "Solution().robotSim({commands}, {obstacles})"
    ruby: "robot_sim({commands}, {obstacles})"
    java: "new Solution().robotSim({commands}, {obstacles})"
    csharp: "new Solution().RobotSim({commands}, {obstacles})"
    kotlin: "Solution().robotSim({commands}, {obstacles})"
    go: "robotSim({commands}, {obstacles})"
    dart: "Solution().robotSim({commands}, {obstacles})"
    swift: "Solution().robotSim({commands}, {obstacles})"
    typescript: "robotSim({commands}, {obstacles})"
judge:
  type: exact
limits:
  time_ms: 400
  memory_mb: 300
oracle:
  python3:
    call: "Checker().robotSim(commands, obstacles, {result})"
    checker: |
      class Checker:
          def robotSim(self, commands, obstacles, result: Any) -> bool:
              return isinstance(result, int)
seed: 874
tests:
  - name: ex1
    in:
      commands: [4, -1, 3]
      obstacles:
        elemType: int
        value: []
    out: 25
  - name: ex2
    in:
      commands: [4, -1, 4, -2, 4]
      obstacles:
        elemType: int
        value:
          - [2, 4]
    out: 65
  - name: ex3
