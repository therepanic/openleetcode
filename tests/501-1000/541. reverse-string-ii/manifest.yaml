entry:
  id: 541
  title: reverse-string-ii
  params:
    s:
      type: string
    k:
      type: int
  call:
    cpp: "Solution().reverseStr({s}, {k})"
    rust: "Solution::reverse_str({s}, {k})"
    python3: "Solution().reverseStr({s}, {k})"
    python2: "Solution().reverseStr({s}, {k})"
    ruby: "reverse_str({s}, {k})"
    java: "new Solution().reverseStr({s}, {k})"
    csharp: "new Solution().ReverseStr({s}, {k})"
    kotlin: "Solution().reverseStr({s}, {k})"
    go: "reverseStr({s}, {k})"
    dart: "Solution().reverseStr({s}, {k})"
    swift: "Solution().reverseStr({s}, {k})"
    typescript: "reverseStr({s}, {k})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(s, k, {result})"
    checker: |
      class Checker:
          def check(self, s, k, result):
              if not isinstance(result, str):
                  return False
              if len(result) != len(s):
                  return False
              pieces = []
              step = 2 * k
              for i in range(0, len(s), step):
                  block = s[i:i + step]
                  pieces.append(block[:k][::-1] + block[k:])
              return result == "".join(pieces)
seed: 541
