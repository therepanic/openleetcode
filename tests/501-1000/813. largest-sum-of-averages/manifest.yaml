entry:
  id: 813
  title: largest-sum-of-averages
  params:
    nums:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: Solution().largestSumOfAverages({nums}, {k})
    rust: Solution::largest_sum_of_averages({nums}, {k})
    python3: Solution().largestSumOfAverages({nums}, {k})
    python2: Solution().largestSumOfAverages({nums}, {k})
    ruby: largest_sum_of_averages({nums}, {k})
    java: new Solution().largestSumOfAverages({nums}, {k})
    csharp: new Solution().LargestSumOfAverages({nums}, {k})
    kotlin: Solution().largestSumOfAverages({nums}, {k})
    go: largestSumOfAverages({nums}, {k})
    dart: Solution().largestSumOfAverages({nums}, {k})
    swift: Solution().largestSumOfAverages({nums}, {k})
    typescript: largestSumOfAverages({nums}, {k})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(nums, k, {result})
    checker: |
      class Checker:
          def check(self, nums, k, result):
              n = len(nums)
              pref = [0.0]
              for x in nums:
                  pref.append(pref[-1] + x)
              dp = [[0.0] * (k + 1) for _ in range(n + 1)]
              for i in range(1, n + 1):
                  dp[i][1] = pref[i] / i
              for p in range(2, k + 1):
                  for i in range(p, n + 1):
                      best = 0.0
                      for j in range(p - 1, i):
                          cand = dp[j][p - 1] + (pref[i] - pref[j]) / (i - j)
                          if cand > best:
                              best = cand
                      dp[i][p] = best
              return abs(dp[n][k] - result) <= 1e-6
seed: 813
