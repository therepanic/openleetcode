entry:
  id: 509
  title: fibonacci-number
  params:
    n:
      type: int
  call:
    cpp: Solution().fib({n})
    rust: Solution::fib({n})
    python3: Solution().fib({n})
    python2: Solution().fib({n})
    ruby: fib({n})
    java: new Solution().fib({n})
    csharp: new Solution().Fib({n})
    kotlin: Solution().fib({n})
    go: fib({n})
    dart: Solution().fib({n})
    swift: Solution().fib({n})
    typescript: fib({n})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 128
oracle:
  python3:
    call: Checker().fib(n, {result})
    checker: |
      class Checker:
          def fib(self, n, result):
              def fibo(k):
                  a, b = 0, 1
                  for _ in range(k):
                      a, b = b, a + b
                  return a

              return isinstance(result, int) and result == fibo(n)
seed: 509
