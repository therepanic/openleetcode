entry:
  id: 890
  title: find-and-replace-pattern
  params:
    words:
      type: array
      items:
        type: string
    pattern:
      type: string
  call:
    cpp: Solution().findAndReplacePattern({words}, {pattern})
    rust: Solution::find_and_replace_pattern({words}, {pattern})
    python3: Solution().findAndReplacePattern({words}, {pattern})
    python2: Solution().findAndReplacePattern({words}, {pattern})
    ruby: find_and_replace_pattern({words}, {pattern})
    java: new Solution().findAndReplacePattern({words}, {pattern})
    csharp: new Solution().FindAndReplacePattern({words}, {pattern})
    kotlin: Solution().findAndReplacePattern({words}, {pattern})
    go: findAndReplacePattern({words}, {pattern})
    dart: Solution().findAndReplacePattern({words}, {pattern})
    swift: Solution().findAndReplacePattern({words}, {pattern})
    typescript: findAndReplacePattern({words}, {pattern})

judge:
  type: ignore_order

limits:
  time_ms: 1000
  memory_mb: 300

oracle:
  python3:
    call: "Checker().check(words, pattern, {result})"
    checker: |
      from collections import Counter

      class Checker(object):
          def check(self, words, pattern, result):
              if not isinstance(result, list):
                  return False
              expected = []
              pattern_signature = [pattern.index(c) for c in pattern]
              for word in words:
                  if len(word) != len(pattern):
                      return False
                  if [word.index(c) for c in word] == pattern_signature:
                      expected.append(word)
              return Counter(result) == Counter(expected)

seed: 890

