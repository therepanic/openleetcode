entry:
  id: 876
  title: middle-of-the-linked-list
  params:
    head:
      type: list_node
  call:
    cpp: "listNodeToArray(Solution().middleNode({head}))"
    rust: "ListNode::list_node_to_array(Solution::middle_node({head}))"
    python3: "list_node_to_array(Solution().middleNode({head}))"
    python2: "list_node_to_array(Solution().middleNode({head}))"
    ruby: "list_node_to_array(middle_node({head}))"
    java: "ListNode.listNodeToArray(new Solution().middleNode({head}))"
    csharp: "ListNode.ListNodeToArray(new Solution().MiddleNode({head}))"
    kotlin: "listNodeToArray(Solution().middleNode({head}))"
    go: "listNodeToArray(middleNode({head}))"
    dart: "list_node_to_array(Solution().middleNode({head}))"
    swift: "list_node_to_array(Solution().middleNode({head}))"
    typescript: "listNodeToArray(middleNode({head}))"
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: "Checker().middleNode(head, {result})"
    checker: |
      class Checker:
          def middleNode(self, head, result: Any) -> bool:
              return result is None or isinstance(result, list)
seed: 876
