judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(routes, source, target, {result})
    checker: |
      from collections import defaultdict, deque

      class Checker:
          def check(self, routes, source, target, result):
              if source == target:
                  return result == 0
              adj = defaultdict(set)
              for bus, locations in enumerate(routes):
                  for location in locations:
                      adj[location].add(bus)
              queue = deque(adj[target])
              visited = set()
              cost = 0
              while queue:
                  cost += 1
                  for _ in range(len(queue)):
                      node = queue.popleft()
                      if node in visited:
                          continue
                      visited.add(node)
                      if source in routes[node]:
                          return result == cost
                      for location in routes[node]:
                          for bus in adj[location]:
                              if bus not in visited:
                                  queue.append(bus)
              return result == -1
