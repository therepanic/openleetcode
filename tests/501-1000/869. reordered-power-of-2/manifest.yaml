judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: "Checker().reorderedPowerOf2(n, {result})"
    checker: |
      from typing import Any

      class Checker:
          def reorderedPowerOf2(self, n: int, result: Any) -> bool:
              if not isinstance(result, bool):
                  return False
              digits = sorted(str(n))
              powers = set()
              x = 1
              while x <= 10**9:
                  powers.add(tuple(sorted(str(x))))
                  x <<= 1
              return result == (tuple(digits) in powers)
seed: 869869
