entry:
  id: 869
  title: reordered-power-of-2
  params:
    n:
      type: int
  call:
    cpp: "Solution().reorderedPowerOf2({n})"
    rust: "Solution::reordered_power_of2({n})"
    python3: "Solution().reorderedPowerOf2({n})"
    python2: "Solution().reorderedPowerOf2({n})"
    ruby: "reordered_power_of2({n})"
    java: "new Solution().reorderedPowerOf2({n})"
    csharp: "new Solution().ReorderedPowerOf2({n})"
    kotlin: "Solution().reorderedPowerOf2({n})"
    go: "reorderedPowerOf2({n})"
    dart: "Solution().reorderedPowerOf2({n})"
    swift: "Solution().reorderedPowerOf2({n})"
