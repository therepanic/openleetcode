entry:
  id: 539
  title: minimum-time-difference
  params:
    timePoints:
      type: array
      items:
        type: string
  call:
    cpp: Solution().findMinDifference({timePoints})
    rust: Solution::find_min_difference({timePoints})
    python3: Solution().findMinDifference({timePoints})
    python2: Solution().findMinDifference({timePoints})
    ruby: find_min_difference({timePoints})
    java: new Solution().findMinDifference(java.util.Arrays.asList({timePoints}))
    csharp: new Solution().FindMinDifference({timePoints})
    kotlin: Solution().findMinDifference({timePoints}.toList())
    go: findMinDifference({timePoints})
    dart: Solution().findMinDifference({timePoints})
    swift: Solution().findMinDifference({timePoints})
    typescript: findMinDifference({timePoints})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(timePoints, {result})
    checker:
      "class Checker:\n    def check(self, timePoints, result):\n        if\
      \ not isinstance(result, int):\n            return False\n        mins = []\n\
      \        for tp in timePoints:\n            h, m = tp.split(':')\n         \
      \   mins.append(int(h) * 60 + int(m))\n        mins.sort()\n        best = 1440\
      \ + mins[0] - mins[-1]\n        for i in range(1, len(mins)):\n            best\
      \ = min(best, mins[i] - mins[i - 1])\n        return result == best\n"
seed: 539
