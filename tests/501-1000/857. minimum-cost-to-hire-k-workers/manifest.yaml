judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().mincostToHireWorkers(quality, wage, k, {result})"
    checker: |
      import heapq

      class Checker:
          def mincostToHireWorkers(self, quality, wage, k, result):
              workers = sorted((w / q, q) for w, q in zip(wage, quality))
              total = 0
              heap = []
              best = float('inf')
              for ratio, q in workers:
                  total += q
                  heapq.heappush(heap, -q)
                  if len(heap) > k:
                      total += heapq.heappop(heap)
                  if len(heap) == k:
                      best = min(best, ratio * total)
              return abs(best - result) <= 1e-5
seed: 857
