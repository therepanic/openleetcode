    python3: "Solution().mincostToHireWorkers({quality}, {wage}, {k})"
    python2: "Solution().mincostToHireWorkers({quality}, {wage}, {k})"
    ruby: "mincost_to_hire_workers({quality}, {wage}, {k})"
    java: "new Solution().mincostToHireWorkers({quality}, {wage}, {k})"
