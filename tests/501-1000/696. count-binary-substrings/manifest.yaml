  id: 696
  title: "count-binary-substrings"
  params:
    s:
      type: string
  call:
    cpp: "Solution().countBinarySubstrings({s})"
    rust: "Solution::count_binary_substrings({s})"
    python3: "Solution().countBinarySubstrings({s})"
    python2: "Solution().countBinarySubstrings({s})"
    ruby: "count_binary_substrings({s})"
    java: "new Solution().countBinarySubstrings({s})"
    csharp: "new Solution().CountBinarySubstrings({s})"
    kotlin: "Solution().countBinarySubstrings({s})"
    go: "countBinarySubstrings({s})"
    dart: "Solution().countBinarySubstrings({s})"
    swift: "Solution().countBinarySubstrings({s})"
    typescript: "countBinarySubstrings({s})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().countBinarySubstrings(s, {result})"
    checker: |
      class Checker:
          def countBinarySubstrings(self, s, result):
              if not isinstance(result, int):
                  return False
              groups = []
              cur = 1
              for i in range(1, len(s)):
                  if s[i] == s[i - 1]:
                      cur += 1
                  else:
                      groups.append(cur)
                      cur = 1
              groups.append(cur)
              expected = 0
              for i in range(len(groups) - 1):
                  expected += min(groups[i], groups[i + 1])
              return result == expected

