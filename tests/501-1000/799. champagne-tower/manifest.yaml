judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(poured, query_row, query_glass, {result})"
    checker: |
      class Checker:
          def check(self, poured, query_row, query_glass, result):
              tower = [[0.0] * 102 for _ in range(102)]
              tower[0][0] = float(poured)
              for r in range(query_row + 1):
                  for c in range(r + 1):
                      if tower[r][c] > 1.0:
                          excess = (tower[r][c] - 1.0) / 2.0
                          tower[r][c] = 1.0
                          tower[r + 1][c] += excess
                          tower[r + 1][c + 1] += excess
              expected = tower[query_row][query_glass]
              return abs(float(result) - expected) <= 1e-9
