      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().surfaceArea({grid})
    rust: Solution::surface_area({grid})
    python3: Solution().surfaceArea({grid})
    python2: Solution().surfaceArea({grid})
    ruby: surface_area({grid})
    java: new Solution().surfaceArea({grid})
    csharp: new Solution().SurfaceArea({grid})
    kotlin: Solution().surfaceArea({grid})
    go: surfaceArea({grid})
    dart: Solution().surfaceArea({grid})
    swift: Solution().surfaceArea({grid})
    typescript: surfaceArea({grid})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().surfaceArea(grid, {result})
    checker: |
      class Checker:
          def surfaceArea(self, grid, result):
              n = len(grid)
              area = 0
              for i in range(n):
                  for j in range(n):
                      v = grid[i][j]
                      if v:
                          area += v * 6 - (v - 1) * 2
                          if i + 1 < n:
                              area -= 2 * min(v, grid[i + 1][j])
                          if j + 1 < n:
                              area -= 2 * min(v, grid[i][j + 1])
              return area == result
