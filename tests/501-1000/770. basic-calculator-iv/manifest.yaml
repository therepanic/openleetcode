entry:
  id: 770
  title: "basic-calculator-iv"
  params:
    expression:
      type: string
    evalvars:
      type: array
      items:
        type: string
    evalints:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().basicCalculatorIV({expression}, {evalvars}, {evalints})"
    rust: "Solution::basic_calculator_iv({expression}, {evalvars}, {evalints})"
    python3: "Solution().basicCalculatorIV({expression}, {evalvars}, {evalints})"
    python2: "Solution().basicCalculatorIV({expression}, {evalvars}, {evalints})"
    ruby: "basic_calculator_iv({expression}, {evalvars}, {evalints})"
    java: "new Solution().basicCalculatorIV({expression}, {evalvars}, {evalints})"
    csharp: "new Solution().BasicCalculatorIV({expression}, {evalvars}, {evalints})"
    kotlin: "Solution().basicCalculatorIV({expression}, {evalvars}, {evalints})"
    go: "basicCalculatorIV({expression}, {evalvars}, {evalints})"
    dart: "Solution().basicCalculatorIV({expression}, {evalvars}, {evalints})"
    swift: "Solution().basicCalculatorIV({expression}, {evalvars}, {evalints})"
    typescript: "basicCalculatorIV({expression}, {evalvars}, {evalints})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(expression, evalvars, evalints, {result})"
    checker: |
      class Checker:
          def check(self, expression, evalvars, evalints, result):
              if not isinstance(expression, str):
                  return False
              if not isinstance(evalvars, list) or not all(isinstance(v, str) for v in evalvars):
                  return False
              if not isinstance(evalints, list) or not all(isinstance(v, int) for v in evalints):
                  return False
              if len(evalvars) != len(evalints):
                  return False
              if not isinstance(result, list) or not all(isinstance(v, str) for v in result):
                  return False

              from collections import defaultdict

              evalmap = dict(zip(evalvars, evalints))

              def combine(poly):
                  merged = defaultdict(int)
                  for key, value in poly.items():
                      if value != 0:
                          merged[key] += value
                  return {key: value for key, value in merged.items() if value != 0}

              def add(p1, p2):
                  merged = defaultdict(int, p1)
                  for key, value in p2.items():
                      merged[key] += value
                  return combine(merged)

              def sub(p1, p2):
                  merged = defaultdict(int, p1)
                  for key, value in p2.items():
                      merged[key] -= value
                  return combine(merged)

              def mul(p1, p2):
                  merged = defaultdict(int)
                  for key1, value1 in p1.items():
                      for key2, value2 in p2.items():
                          merged[tuple(sorted(key1 + key2))] += value1 * value2
                  return combine(merged)

              def parse_token(token):
                  if token.isdigit():
                      return {(): int(token)}
                  if token in evalmap:
                      return {(): evalmap[token]}
                  return {(token,): 1}

              tokens = []
              buffer = ""
              for ch in expression:
                  if ch.isalnum():
                      buffer += ch
                      continue
                  if buffer:
                      tokens.append(buffer)
                      buffer = ""
                  if ch in "+-*()":
                      tokens.append(ch)
              if buffer:
                  tokens.append(buffer)

              precedence = {
                  "+": 1,
                  "-": 1,
                  "*": 2
              }

              def apply_op(values, ops):
                  op = ops.pop()
                  right = values.pop()
                  left = values.pop()
                  if op == "+":
                      values.append(add(left, right))
                  elif op == "-":
                      values.append(sub(left, right))
                  else:
                      values.append(mul(left, right))

              values = []
              ops = []
              for token in tokens:
                  if token == "(":
                      ops.append(token)
                  elif token == ")":
                      while ops and ops[-1] != "(":
                          apply_op(values, ops)
                      if not ops:
                          return False
                      ops.pop()
                  elif token in precedence:
                      while ops and ops[-1] in precedence and precedence[ops[-1]] >= precedence[token]:
                          apply_op(values, ops)
                      ops.append(token)
                  else:
                      values.append(parse_token(token))

              while ops:
                  if ops[-1] == "(":
                      return False
                  apply_op(values, ops)

              poly = values[-1] if values else {}
              expected = []
              for variables, coefficient in sorted(poly.items(), key=lambda item: (-len(item[0]), item[0])):
                  if coefficient == 0:
                      continue
                  if variables:
                      expected.append(str(coefficient) + "*" + "*".join(variables))
                  else:
                      expected.append(str(coefficient))
              return result == expected
seed: 770
tests:
  - name: example_eval_single_var
    in:
      expression: "e + 8 - a + 5"
      evalvars:
        - "e"
      evalints:
        - 1
    out:
      - "-1*a"
      - "14"

  - name: example_eval_two_vars
    in:
      expression: "e - 8 + temperature - pressure"
      evalvars:
