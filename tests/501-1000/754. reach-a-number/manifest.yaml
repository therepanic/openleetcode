judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 128

oracle:
  python3:
    call: "Checker().check(target, {result})"
    checker: |
      class Checker:
          def check(self, target, result):
              if not isinstance(result, int):
                  return False
              if target == 0:
                  return False
              if result < 0:
                  return False

              target = abs(target)
              total = result * (result + 1) // 2
              if total < target:
                  return False
              if (total - target) % 2 != 0:
                  return False

              prev = (result - 1) * result // 2
              if result > 0 and prev >= target and (prev - target) % 2 == 0:
                  return False

              return True

seed: 754

