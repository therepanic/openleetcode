entry:
  id: 852
  title: peak-index-in-a-mountain-array
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: Solution().peakIndexInMountainArray({arr})
    rust: Solution::peak_index_in_mountain_array({arr})
    python3: Solution().peakIndexInMountainArray({arr})
    python2: Solution().peakIndexInMountainArray({arr})
    ruby: peak_index_in_mountain_array({arr})
    java: new Solution().peakIndexInMountainArray({arr})
    csharp: new Solution().PeakIndexInMountainArray({arr})
    kotlin: Solution().peakIndexInMountainArray({arr})
    go: peakIndexInMountainArray({arr})
    dart: Solution().peakIndexInMountainArray({arr})
    swift: Solution().peakIndexInMountainArray({arr})
    typescript: peakIndexInMountainArray({arr})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().peakIndexInMountainArray(arr, {result})"
    checker: |
      class Checker:
          def peakIndexInMountainArray(self, arr, result):
              if not isinstance(result, int):
                  return False
              l, r = 0, len(arr) - 1
              while l < r:
                  mid = (l + r) // 2
                  if arr[mid] < arr[mid + 1]:
                      l = mid + 1
                  else:
                      r = mid
              return result == l
