entry:
  id: 896
  title: monotonic-array
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: Solution().isMonotonic({nums})
    rust: Solution::is_monotonic({nums})
    python3: Solution().isMonotonic({nums})
    python2: Solution().isMonotonic({nums})
    ruby: is_monotonic({nums})
    java: new Solution().isMonotonic({nums})
    csharp: new Solution().IsMonotonic({nums})
    kotlin: Solution().isMonotonic({nums})
    go: isMonotonic({nums})
    dart: Solution().isMonotonic({nums})
    swift: Solution().isMonotonic({nums})
    typescript: isMonotonic({nums})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().isMonotonic(nums, {result})
    checker: |
      class Checker:
          def isMonotonic(self, nums, result):
              inc = True
              dec = True
              for i in range(1, len(nums)):
                  if nums[i] < nums[i - 1]:
                      inc = False
                  if nums[i] > nums[i - 1]:
                      dec = False
              return result == (inc or dec)
seed: 896
