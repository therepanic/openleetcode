entry:
  id: 884
  title: uncommon-words-from-two-sentences
  params:
    s1:
      type: string
    s2:
      type: string
  call:
    cpp: "Solution().uncommonFromSentences({s1}, {s2})"
    rust: "Solution::uncommon_from_sentences({s1}, {s2})"
    python3: "Solution().uncommonFromSentences({s1}, {s2})"
    python2: "Solution().uncommonFromSentences({s1}, {s2})"
    ruby: "uncommon_from_sentences({s1}, {s2})"
    java: "new Solution().uncommonFromSentences({s1}, {s2})"
    csharp: "new Solution().UncommonFromSentences({s1}, {s2})"
    kotlin: "Solution().uncommonFromSentences({s1}, {s2})"
    go: "uncommonFromSentences({s1}, {s2})"
    dart: "Solution().uncommonFromSentences({s1}, {s2})"
    swift: "Solution().uncommonFromSentences({s1}, {s2})"
    typescript: "uncommonFromSentences({s1}, {s2})"
judge:
  type: ignore_order
limits:
  time_ms: 1000
  memory_mb: 128
oracle:
  python3:
    call: "Checker().uncommonFromSentences(s1, s2, {result})"
    checker: |
      from collections import Counter

      class Checker:
          def uncommonFromSentences(self, s1, s2, result):
              expected = [w for w, c in Counter(s1.split() + s2.split()).items() if c == 1]
              return sorted(expected) == sorted(result)
seed: 884
tests:
  - name: ex1
    in:
      s1: this apple is sweet
      s2: this apple is sour
  - name: ex2
    in:
      s1: apple apple
      s2: banana
  - name: both_same_single_word
    in:
      s1: a
      s2: a
  - name: disjoint_single_words
    in:
      s1: a
      s2: b
  - name: repeated_only_one_side
    in:
      s1: a a a b
      s2: c c
  - name: mixed_overlap
    in:
      s1: red blue green
      s2: blue yellow
  - name: all_common
    in:
      s1: x y
      s2: x y
  - name: no_overlap_unique
    in:
      s1: aa bb cc
      s2: dd ee ff
  - name: one_sentence_longer
    in:
      s1: apple banana apple cherry
      s2: banana date egg fig
  - name: duplicate_across_both
    in:
      s1: one two two three
      s2: three four four five
  - name: identical_longer
    in:
      s1: "red blue green"
      s2: "red blue green"
  - name: one_unique_each
    in:
      s1: "alpha beta"
      s2: "gamma delta"
  - name: repeated_only_in_s1
    in:
      s1: "apple apple apple"
      s2: "banana"
  - name: repeated_only_in_s2
    in:
      s1: "banana"
      s2: "apple apple apple"
  - name: mixed_duplicates
    in:
      s1: "cat dog dog fish"
      s2: "cat bird bird owl"
  - name: shared_and_unique
    in:
      s1: "sun moon star"
      s2: "moon comet"
  - name: all_words_shared_once
    in:
      s1: "a b c"
      s2: "c b a"
  - name: all_words_unique_across_both
    in:
      s1: "aa bb cc dd"
      s2: "ee ff gg hh"
  - name: interleaved_duplicates
    in:
      s1: "a a b c c d"
      s2: "b e e f"
  - name: single_word_each_different
    in:
      s1: "hello"
      s2: "world"
  - name: single_word_each_same
    in:
      s1: "same"
      s2: "same"
  - name: one_side_has_none
    in:
      s1: "x x x"
      s2: "x"
  - name: many_shared_many_unique
    in:
      s1: "alpha beta gamma delta"
      s2: "beta delta epsilon zeta"
  - name: alternating_repeats
    in:
      s1: "p q p q r"
      s2: "r s s t"
  - name: short_sentence_with_repeats
    in:
      s1: "zz zz yy"
      s2: "xx"
  - name: different_lengths
    in:
      s1: "a bb ccc dddd eeeee"
      s2: "bb dddd fffff"
  - name: repeated_pair_on_both_sides
    in:
      s1: "k k l m"
      s2: "l l n o"
  - name: triple_overlap
    in:
      s1: "a b c d"
      s2: "b c e f"
  - name: unique_suffixes
    in:
      s1: "root branch leaf"
      s2: "branch bark trunk"
  - name: unique_prefixes
    in:
      s1: "alpha alpha beta"
      s2: "beta gamma gamma"
  - name: many_words_one_common
    in:
      s1: "h i j k l m"
      s2: "i"
  - name: many_words_two_common
    in:
      s1: "a b c d e f"
      s2: "c d"
  - name: two_unique_and_shared
    in:
      s1: "red red blue green"
      s2: "green yellow yellow"
  - name: longer_sentence_balance
    in:
      s1: "aa bb cc dd ee ff gg hh ii jj"
      s2: "bb dd ff hh jj kk ll mm nn oo"
  - name: max_length_like_1
    in:
      s1: "a a a a a a a a a a a a a a a a a a a a"
      s2: "b b b b b b b b b b"
  - name: max_length_like_2
    in:
      s1: "ab cd ef gh ij kl mn op qr st"
      s2: "cd gh kl op st uv wx yz"
  - name: chained_uniques
    in:
      s1: "a b b c c d d e"
      s2: "f g g h h i"
  - name: repeated_words_with_gap
    in:
      s1: "alpha alpha beta gamma gamma"
      s2: "beta delta delta"
  - name: all_unique_many
    in:
      s1: "p1 p2 p3 p4 p5 p6"
      s2: "q1 q2 q3 q4 q5 q6"
  - name: final_mix
    in:
      s1: "one one two three four"
      s2: "two five six six"
