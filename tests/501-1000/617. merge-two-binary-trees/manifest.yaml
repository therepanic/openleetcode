judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().mergeTrees(root1, root2, {result})"
    checker: |
      class Checker:
          def _build_tree(self, values):
              if not isinstance(values, list) or not values:
                  return None
              nodes = [None if v is None else type("Node", (), {"val": v, "left": None, "right": None})() for v in values]
              kids = nodes[::-1]
              root = kids.pop()
              for node in nodes:
                  if node is not None:
                      if kids:
                          node.left = kids.pop()
                      if kids:
                          node.right = kids.pop()
              return root

          def _serialize(self, node):
              if node is None:
                  return []
              out = []
              queue = [node]
              while queue:
                  cur = queue.pop(0)
                  if cur is None:
                      out.append(None)
                      continue
                  out.append(cur.val)
                  queue.append(cur.left)
                  queue.append(cur.right)
              while out and out[-1] is None:
                  out.pop()
              return out

          def _merge(self, a, b):
              if a is None:
                  return b
              if b is None:
                  return a
              a.val += b.val
              a.left = self._merge(a.left, b.left)
              a.right = self._merge(a.right, b.right)
              return a

          def mergeTrees(self, root1, root2, result):
              if not isinstance(result, list):
                  return False
              expected = self._serialize(self._merge(self._build_tree(root1), self._build_tree(root2)))
              return result == expected
