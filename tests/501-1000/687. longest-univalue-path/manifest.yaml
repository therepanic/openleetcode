entry:
  id: 687
  title: longest-univalue-path
  params:
    root:
      type: tree_node
  call:
    cpp: Solution().longestUnivaluePath({root})
    rust: Solution::longest_univalue_path({root})
    python3: Solution().longestUnivaluePath({root})
    python2: Solution().longestUnivaluePath({root})
    ruby: longest_univalue_path({root})
    java: new Solution().longestUnivaluePath({root})
    csharp: new Solution().LongestUnivaluePath({root})
    kotlin: Solution().longestUnivaluePath({root})
    go: longestUnivaluePath({root})
    dart: Solution().longestUnivaluePath({root})
    swift: Solution().longestUnivaluePath({root})
    typescript: longestUnivaluePath({root})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().longestUnivaluePath(root, {result})
    checker: |
      class Checker:
          class _Node:
              __slots__ = ("val", "left", "right")

              def __init__(self, val=0, left=None, right=None):
                  self.val = val
                  self.left = left
                  self.right = right

          def _build(self, root):
              if root is None:
                  return None
              if hasattr(root, "val"):
                  return root
              if not isinstance(root, list) or not root:
                  return None
              it = iter(root)
              first = next(it, None)
              if first is None:
                  return None
              head = self._Node(first)
              queue = [head]
              for node in queue:
                  left = next(it, None)
                  if left is not None:
                      node.left = self._Node(left)
                      queue.append(node.left)
                  right = next(it, None)
                  if right is not None:
                      node.right = self._Node(right)
                      queue.append(node.right)
              return head

          def longestUnivaluePath(self, root, result):
              root = self._build(root)

              ans = 0

              def dfs(node):
                  nonlocal ans
                  if node is None:
                      return 0
                  left = dfs(node.left)
                  right = dfs(node.right)
                  lp = 0
                  rp = 0
                  if node.left is not None and node.left.val == node.val:
                      lp = left + 1
                  if node.right is not None and node.right.val == node.val:
                      rp = right + 1
                  if lp + rp > ans:
                      ans = lp + rp
                  return lp if lp > rp else rp

              dfs(root)
              return isinstance(result, int) and result == ans
