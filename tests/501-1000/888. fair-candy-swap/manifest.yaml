entry:
  id: 888
  title: "fair-candy-swap"
  params:
    aliceSizes:
      type: array
      items:
        type: int
    bobSizes:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().fairCandySwap({aliceSizes}, {bobSizes})"
    rust: "Solution::fair_candy_swap({aliceSizes}, {bobSizes})"
    python3: "Solution().fairCandySwap({aliceSizes}, {bobSizes})"
    python2: "Solution().fairCandySwap({aliceSizes}, {bobSizes})"
    ruby: "fair_candy_swap({aliceSizes}, {bobSizes})"
    java: "new Solution().fairCandySwap({aliceSizes}, {bobSizes})"
    csharp: "new Solution().FairCandySwap({aliceSizes}, {bobSizes})"
    kotlin: "Solution().fairCandySwap({aliceSizes}, {bobSizes})"
    go: "fairCandySwap({aliceSizes}, {bobSizes})"
    dart: "Solution().fairCandySwap({aliceSizes}, {bobSizes})"
    swift: "Solution().fairCandySwap({aliceSizes}, {bobSizes})"
    typescript: "fairCandySwap({aliceSizes}, {bobSizes})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 300

oracle:
  python3:
    call: "Checker().fairCandySwap(aliceSizes, bobSizes, {result})"
    checker: |
      class Checker:
          def fairCandySwap(self, aliceSizes, bobSizes, result):
              if not isinstance(result, list) or len(result) != 2:
                  return False
              a, b = result
              if a not in aliceSizes or b not in bobSizes:
                  return False
              return sum(aliceSizes) - a + b == sum(bobSizes) - b + a

seed: 888

