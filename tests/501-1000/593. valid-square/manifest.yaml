        type: int
    p2:
      type: array
      items:
        type: int
    p3:
      type: array
      items:
        type: int
    p4:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().validSquare({p1}, {p2}, {p3}, {p4})"
    rust: "Solution::valid_square({p1}, {p2}, {p3}, {p4})"
    python3: "Solution().validSquare({p1}, {p2}, {p3}, {p4})"
    python2: "Solution().validSquare({p1}, {p2}, {p3}, {p4})"
    ruby: "valid_square({p1}, {p2}, {p3}, {p4})"
    java: "new Solution().validSquare({p1}, {p2}, {p3}, {p4})"
    csharp: "new Solution().ValidSquare({p1}, {p2}, {p3}, {p4})"
    kotlin: "Solution().validSquare({p1}, {p2}, {p3}, {p4})"
    go: "validSquare({p1}, {p2}, {p3}, {p4})"
    dart: "Solution().validSquare({p1}, {p2}, {p3}, {p4})"
