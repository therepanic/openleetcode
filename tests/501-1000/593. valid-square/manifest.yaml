judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().validSquare(p1, p2, p3, p4, {result})"
    checker: |
      class Checker:
          def validSquare(self, p1, p2, p3, p4, result):
              pts = [p1, p2, p3, p4]
              distances = set()
              for i in range(4):
                  for j in range(i + 1, 4):
                      dx = pts[i][0] - pts[j][0]
                      dy = pts[i][1] - pts[j][1]
                      distances.add(dx * dx + dy * dy)
              expected = len(distances) == 2 and 0 not in distances
              return result == expected
seed: 593
tests:
  - name: example-1
    in:
      p1: [0, 0]
      p2: [1, 1]
      p3: [1, 0]
      p4: [0, 1]
    out: true
  - name: example-2
    in:
      p1: [0, 0]
      p2: [1, 1]
      p3: [1, 0]
      p4: [0, 12]
    out: false
  - name: example-3
