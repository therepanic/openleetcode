entry:
  id: 846
  title: hand-of-straights
  params:
    hand:
      type: array
      items:
        type: int
    groupSize:
      type: int
  call:
    cpp: Solution().isNStraightHand({hand}, {groupSize})
    rust: Solution::is_n_straight_hand({hand}, {groupSize})
    python3: Solution().isNStraightHand({hand}, {groupSize})
    python2: Solution().isNStraightHand({hand}, {groupSize})
    ruby: is_n_straight_hand({hand}, {groupSize})
    java: new Solution().isNStraightHand({hand}, {groupSize})
    csharp: new Solution().IsNStraightHand({hand}, {groupSize})
    kotlin: Solution().isNStraightHand({hand}, {groupSize})
    go: isNStraightHand({hand}, {groupSize})
    dart: Solution().isNStraightHand({hand}, {groupSize})
    swift: Solution().isNStraightHand({hand}, {groupSize})
    typescript: isNStraightHand({hand}, {groupSize})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().isNStraightHand(hand, groupSize, {result})
    checker:
      "from collections import Counter\n\nclass Checker:\n    def isNStraightHand(self,\
      \ hand, groupSize, result):\n        if not isinstance(result, bool):\n    \
      \        return False\n        if groupSize <= 0 or len(hand) % groupSize !=\
      \ 0:\n            return result is False\n        cnt = Counter(hand)\n    \
      \    keys = sorted(cnt)\n        possible = True\n        for x in keys:\n \
      \           while cnt[x] > 0:\n                for y in range(x, x + groupSize):\n\
      \                    if cnt[y] <= 0:\n                        possible = False\n\
      \                        break\n                    cnt[y] -= 1\n          \
      \      if not possible:\n                    break\n            if not possible:\n\
      \                break\n        return result == possible\n"
seed: 846846
