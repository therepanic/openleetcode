limits:
  time_ms: 500
  memory_mb: 256
oracle:
  python3:
    call: "Checker().countPrimeSetBits(left, right, {result})"
    checker: |
      class Checker:
          def _is_prime(self, n):
              if n <= 1:
                  return False
              d = 2
              while d * d <= n:
                  if n % d == 0:
                      return False
                  d += 1
              return True

          def _expected(self, left, right):
              total = 0
              for value in range(left, right + 1):
                  if self._is_prime(value.bit_count()):
                      total += 1
              return total

          def countPrimeSetBits(self, left, right, result):
              return isinstance(result, int) and result == self._expected(left, right)
