entry:
  id: 713
  title: subarray-product-less-than-k
  params:
    nums:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: Solution().numSubarrayProductLessThanK({nums}, {k})
    rust: Solution::num_subarray_product_less_than_k({nums}, {k})
    python3: Solution().numSubarrayProductLessThanK({nums}, {k})
    python2: Solution().numSubarrayProductLessThanK({nums}, {k})
    ruby: num_subarray_product_less_than_k({nums}, {k})
    java: new Solution().numSubarrayProductLessThanK({nums}, {k})
    csharp: new Solution().NumSubarrayProductLessThanK({nums}, {k})
    kotlin: Solution().numSubarrayProductLessThanK({nums}, {k})
    go: numSubarrayProductLessThanK({nums}, {k})
    dart: Solution().numSubarrayProductLessThanK({nums}, {k})
    swift: Solution().numSubarrayProductLessThanK({nums}, {k})
    typescript: numSubarrayProductLessThanK({nums}, {k})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().numSubarrayProductLessThanK(nums, k, {result})
    checker: |
      class Checker:
          def numSubarrayProductLessThanK(self, nums, k, result):
              if not isinstance(result, int):
                  return False
              if not isinstance(nums, list) or not isinstance(k, int):
                  return False
              if any(not isinstance(x, int) or x < 1 or x > 1000 for x in nums):
                  return False
              n = len(nums)
              if not (1 <= n <= 30000):
                  return False
              if not (0 <= k <= 1000000):
                  return False
              if k <= 1:
                  return result == 0
              expected = 0
              left = 0
              product = 1
              for right, value in enumerate(nums):
                  product *= value
                  while left <= right and product >= k:
                      product //= nums[left]
                      left += 1
                  expected += right - left + 1
              return result == expected
seed: 713713
