entry:
  id: 672
  title: bulb-switcher-ii
  params:
    n:
      type: int
    presses:
      type: int
  call:
    cpp: "Solution().flipLights({n}, {presses})"
    rust: "Solution::flip_lights({n}, {presses})"
    python3: "Solution().flipLights({n}, {presses})"
    python2: "Solution().flipLights({n}, {presses})"
    ruby: "flip_lights({n}, {presses})"
    java: "new Solution().flipLights({n}, {presses})"
    csharp: "new Solution().FlipLights({n}, {presses})"
    kotlin: "Solution().flipLights({n}, {presses})"
    go: "flipLights({n}, {presses})"
    dart: "Solution().flipLights({n}, {presses})"
    swift: "Solution().flipLights({n}, {presses})"
    typescript: "flipLights({n}, {presses})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().flipLights(n, presses, result)"
    checker: |
      class Checker:
          def flipLights(self, n, presses, result):
              return isinstance(result, int) and result == Solution().flipLights(n, presses)
seed: 672
