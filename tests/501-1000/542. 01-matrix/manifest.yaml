entry:
  id: 542
  title: 01-matrix
  params:
    mat:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().updateMatrix({mat})"
    rust: "Solution::update_matrix({mat})"
    python3: "Solution().updateMatrix({mat})"
    python2: "Solution().updateMatrix({mat})"
    ruby: "update_matrix({mat})"
    java: "new Solution().updateMatrix({mat})"
    csharp: "new Solution().UpdateMatrix({mat})"
    kotlin: "Solution().updateMatrix({mat})"
    go: "updateMatrix({mat})"
    dart: "Solution().updateMatrix({mat})"
    swift: "Solution().updateMatrix({mat})"
    typescript: "updateMatrix({mat})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(mat, {result})"
    checker: |
      class Checker:
          def check(self, mat, result):
              if not isinstance(result, list) or len(result) != len(mat):
                  return False
              if not mat or not isinstance(result[0], list) or len(result[0]) != len(mat[0]):
                  return False
              rows = len(mat)
              cols = len(mat[0])
              for row in result:
                  if not isinstance(row, list) or len(row) != cols:
                      return False
                  for value in row:
                      if not isinstance(value, int) or value < 0:
                          return False
              from collections import deque
              q = deque()
              dist = [[10 ** 9] * cols for _ in range(rows)]
              for i in range(rows):
                  for j in range(cols):
                      if mat[i][j] == 0:
                          dist[i][j] = 0
                          q.append((i, j))
              while q:
                  i, j = q.popleft()
                  for di, dj in ((1, 0), (-1, 0), (0, 1), (0, -1)):
                      ni, nj = i + di, j + dj
                      if 0 <= ni < rows and 0 <= nj < cols and dist[ni][nj] > dist[i][j] + 1:
                          dist[ni][nj] = dist[i][j] + 1
                          q.append((ni, nj))
              return result == dist
