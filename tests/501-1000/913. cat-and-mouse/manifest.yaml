entry:
  id: 913
  title: cat-and-mouse
  params:
    graph:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().catMouseGame({graph})"
    rust: "Solution::cat_mouse_game({graph})"
    python3: "Solution().catMouseGame({graph})"
    python2: "Solution().catMouseGame({graph})"
    ruby: "cat_mouse_game({graph})"
    java: "new Solution().catMouseGame({graph})"
    csharp: "new Solution().CatMouseGame({graph})"
    kotlin: "Solution().catMouseGame({graph})"
    go: "catMouseGame({graph})"
    dart: "Solution().catMouseGame({graph})"
    swift: "Solution().catMouseGame({graph})"
    typescript: "catMouseGame({graph})"
judge:
  type: "exact"
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().catMouseGame(graph, {result})"
    checker: |
      from collections import deque

      class Checker:
          def catMouseGame(self, graph, result):
              n = len(graph)
              MOUSE, CAT = 0, 1
              MOUSE_WIN, CAT_WIN, DRAW = 1, 2, 0
              results = {}
              for i in range(1, n):
                  results[0, i, CAT] = results[0, i, MOUSE] = MOUSE_WIN
                  results[i, i, CAT] = results[i, i, MOUSE] = CAT_WIN
              degree = {}
              for mouse in range(1, n):
                  for cat in range(1, n):
                      degree[mouse, cat, MOUSE] = len(graph[mouse])
                      degree[mouse, cat, CAT] = len(graph[cat]) - int(0 in graph[cat])
              q = deque(results.keys())
              while q:
                  mouse, cat, turn = q.popleft()
                  cur = results[mouse, cat, turn]
                  if turn == MOUSE:
                      prev_states = [(mouse, prev_cat, CAT) for prev_cat in graph[cat]]
                  else:
                      prev_states = [(prev_mouse, cat, MOUSE) for prev_mouse in graph[mouse]]
                  for prev in prev_states:
                      if prev in results:
                          continue
                      pm, pc, pt = prev
                      if pc == 0:
                          continue
                      degree[prev] -= 1
                      mover_wins = (cur == MOUSE_WIN and pt == MOUSE) or (cur == CAT_WIN and pt == CAT)
                      if mover_wins or degree[prev] == 0:
                          results[prev] = cur
                          q.append(prev)
              return result == results.get((1, 2, MOUSE), DRAW)
