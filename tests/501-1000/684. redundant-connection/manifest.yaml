judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(edges, {result})"
    checker: |
      class Checker:
          def check(self, edges, result):
              if not isinstance(result, list) or len(result) != 2:
                  return False
              if any(not isinstance(x, int) for x in result):
                  return False
              a, b = result
              if a == b:
                  return False
              n = len(edges)
              if n < 3:
                  return False
              if not (1 <= a <= n and 1 <= b <= n):
                  return False

              parent = list(range(n + 1))

              def find(x):
                  while parent[x] != x:
                      parent[x] = parent[parent[x]]
                      x = parent[x]
                  return x

              def union(x, y):
                  rx = find(x)
                  ry = find(y)
                  if rx == ry:
                      return False
                  parent[ry] = rx
                  return True

              expected = None
              for u, v in edges:
                  if not union(u, v):
                      expected = [u, v]
              if expected is None:
                  return False
              return result == expected
