entry:
  id: 700
  title: search-in-a-binary-search-tree
  params:
    root:
      type: tree_node
    val:
      type: int
  call:
    cpp: "treeNodeToArray(Solution().searchBST({root}, {val}))"
    rust: "TreeNode::tree_node_to_array(Solution::search_bst({root}, {val}))"
    python3: "tree_node_to_array(Solution().searchBST({root}, {val}))"
    python2: "tree_node_to_array(Solution().searchBST({root}, {val}))"
    ruby: "tree_node_to_array(search_bst({root}, {val}))"
    java: "TreeNode.treeNodeToArray(new Solution().searchBST({root}, {val}))"
    csharp: "TreeNode.TreeNodeToArray(new Solution().SearchBST({root}, {val}))"
    kotlin: "treeNodeToArray(Solution().searchBST({root}, {val}))"
    go: "treeNodeToArray(searchBST({root}, {val}))"
    dart: "tree_node_to_array(Solution().searchBST({root}, {val}))"
    swift: "tree_node_to_array(Solution().searchBST({root}, {val}))"
    typescript: "treeNodeToArray(searchBST({root}, {val}))"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().searchBST(root, val, {result})"
    checker: |
      class Checker:
          def _is_nullish(self, node):
              return node is None or node == []

          def _has_tree_shape(self, node):
              return isinstance(node, (list, tuple, dict)) or hasattr(node, 'val')

          def _from_level_order(self, values):
              if not values:
                  return None
              nodes = [None if v is None else [v, None, None] for v in values]
              for i, node in enumerate(nodes):
                  if node is None:
                      continue
                  left = 2 * i + 1
                  right = 2 * i + 2
                  if left < len(nodes):
                      node[1] = nodes[left]
                  if right < len(nodes):
                      node[2] = nodes[right]
              return nodes[0]

          def _to_tree(self, node):
              if self._is_nullish(node):
                  return None
              if hasattr(node, 'val'):
                  return [
                      node.val,
                      self._to_tree(getattr(node, 'left', None)),
                      self._to_tree(getattr(node, 'right', None)),
                  ]
              if isinstance(node, dict) and 'val' in node:
                  return [
                      node['val'],
                      self._to_tree(node.get('left')),
                      self._to_tree(node.get('right')),
                  ]
              if isinstance(node, tuple):
                  node = list(node)
              if isinstance(node, list):
                  if not node:
                      return None
                  if len(node) == 3 and any(self._has_tree_shape(x) for x in node[1:]):
                      return [
                          node[0],
                          self._to_tree(node[1]),
                          self._to_tree(node[2]),
                      ]
                  if len(node) == 1 and not self._has_tree_shape(node[0]):
                      return [node[0], None, None]
                  if all(not self._has_tree_shape(x) for x in node):
                      return self._from_level_order(node)
                  return self._from_level_order(node)
              return [node, None, None]

          def _search(self, node, target):
              if node is None:
                  return None
              if node[0] == target:
                  return node
              if target < node[0]:
                  return self._search(node[1], target)
              return self._search(node[2], target)

          def searchBST(self, root, val, result):
              root_arr = self._to_tree(root)
              expected = self._search(root_arr, val)
              actual = self._to_tree(result)
              return expected == actual
