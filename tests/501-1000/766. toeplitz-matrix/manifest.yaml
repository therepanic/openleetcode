judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().isToeplitzMatrix(matrix, {result})"
    checker: |
      class Checker:
          def isToeplitzMatrix(self, matrix, result):
              if not isinstance(result, bool):
                  return False
              if not isinstance(matrix, list) or not matrix:
                  return False
              if not all(isinstance(row, list) and row for row in matrix):
                  return False
              cols = len(matrix[0])
              if not all(len(row) == cols for row in matrix):
                  return False
              for i in range(len(matrix) - 1):
                  for j in range(cols - 1):
                      if matrix[i][j] != matrix[i + 1][j + 1]:
                          return result is False
              return result is True
