    python3: "Solution().isToeplitzMatrix({matrix})"
    python2: "Solution().isToeplitzMatrix({matrix})"
    ruby: "is_toeplitz_matrix({matrix})"
    java: "new Solution().isToeplitzMatrix({matrix})"
    csharp: "new Solution().IsToeplitzMatrix({matrix})"
    kotlin: "Solution().isToeplitzMatrix({matrix})"
    go: "isToeplitzMatrix({matrix})"
