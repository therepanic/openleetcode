entry:
  id: 918
  title: maximum-sum-circular-subarray
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().maxSubarraySumCircular({nums})"
    rust: "Solution::max_subarray_sum_circular({nums})"
    python3: "Solution().maxSubarraySumCircular({nums})"
    python2: "Solution().maxSubarraySumCircular({nums})"
    ruby: "max_subarray_sum_circular({nums})"
    java: "new Solution().maxSubarraySumCircular({nums})"
    csharp: "new Solution().MaxSubarraySumCircular({nums})"
    kotlin: "Solution().maxSubarraySumCircular({nums})"
    go: "maxSubarraySumCircular({nums})"
    dart: "Solution().maxSubarraySumCircular({nums})"
    swift: "Solution().maxSubarraySumCircular({nums})"
    typescript: "maxSubarraySumCircular({nums})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().maxSubarraySumCircular(nums, {result})"
    checker: |
      class Checker:
          def maxSubarraySumCircular(self, nums, result):
              if not isinstance(result, int):
                  return False
              total = nums[0]
              max_sum = curr_max = nums[0]
              min_sum = curr_min = nums[0]
              for x in nums[1:]:
                  curr_max = max(curr_max + x, x)
                  max_sum = max(max_sum, curr_max)
                  curr_min = min(curr_min + x, x)
                  min_sum = min(min_sum, curr_min)
                  total += x
              circular = total - min_sum
              if circular == 0:
                  expected = max_sum
              else:
                  expected = max(max_sum, circular)
              return result == expected

seed: 918

