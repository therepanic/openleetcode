entry:
  id: 645
  title: set-mismatch
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().findErrorNums({nums})"
    rust: "Solution::find_error_nums({nums})"
    python3: "Solution().findErrorNums({nums})"
    python2: "Solution().findErrorNums({nums})"
    ruby: "find_error_nums({nums})"
    java: "new Solution().findErrorNums({nums})"
    csharp: "new Solution().FindErrorNums({nums})"
    kotlin: "Solution().findErrorNums({nums})"
    go: "findErrorNums({nums})"
    dart: "Solution().findErrorNums({nums})"
    swift: "Solution().findErrorNums({nums})"
    typescript: "findErrorNums({nums})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().findErrorNums(nums, {result})"
    checker: |
      class Checker:
          def findErrorNums(self, nums, result):
              if not isinstance(result, list) or len(result) != 2:
                  return False
              dup, missing = result
              if not isinstance(dup, int) or not isinstance(missing, int):
                  return False
              n = len(nums)
              if not (1 <= dup <= n and 1 <= missing <= n):
                  return False
              seen = set()
              duplicate = None
              total = 0
              for x in nums:
                  if x in seen:
                      duplicate = x
                  else:
                      seen.add(x)
                  total += x
              if duplicate != dup:
                  return False
              expected_missing = n * (n + 1) // 2 - (total - duplicate)
              return expected_missing == missing
seed: 645
