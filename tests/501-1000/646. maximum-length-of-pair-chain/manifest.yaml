entry:
  id: 646
  title: maximum-length-of-pair-chain
  params:
    pairs:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().findLongestChain({pairs})
    rust: Solution::find_longest_chain({pairs})
    python3: Solution().findLongestChain({pairs})
    python2: Solution().findLongestChain({pairs})
    ruby: find_longest_chain({pairs})
    java: new Solution().findLongestChain({pairs})
    csharp: new Solution().FindLongestChain({pairs})
    kotlin: Solution().findLongestChain({pairs})
    go: findLongestChain({pairs})
    dart: Solution().findLongestChain({pairs})
    swift: Solution().findLongestChain({pairs})
    typescript: findLongestChain({pairs})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: Checker().findLongestChain(pairs, {result})
    checker: |
      from typing import Any, List

      class Checker:
          def findLongestChain(self, pairs: List[List[int]], result: Any) -> bool:
              if not isinstance(result, int):
                  return False
              if not pairs:
                  return result == 0
              pairs = sorted(pairs, key=lambda x: x[1])
              prev = pairs[0]
              res = 1
              for cur in pairs[1:]:
                  if cur[0] > prev[1]:
                      res += 1
                      prev = cur
              return res == result
seed: 646
