entry:
  id: 794
  title: valid-tic-tac-toe-state
  params:
    board:
      type: array
      items:
        type: string
  call:
    cpp: Solution().validTicTacToe({board})
    rust: Solution::valid_tic_tac_toe({board})
    python3: Solution().validTicTacToe({board})
    python2: Solution().validTicTacToe({board})
    ruby: valid_tic_tac_toe({board})
    java: new Solution().validTicTacToe({board})
    csharp: new Solution().ValidTicTacToe({board})
    kotlin: Solution().validTicTacToe({board})
    go: validTicTacToe({board})
    dart: Solution().validTicTacToe({board})
    swift: Solution().validTicTacToe({board})
    typescript: validTicTacToe({board})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().validTicTacToe(board, {result})
    checker: |
      class Checker(object):
          def validTicTacToe(self, board, result):
              return isinstance(result, bool)
seed: 794
