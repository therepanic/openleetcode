entry:
  id: 792
  title: number-of-matching-subsequences
  params:
    s:
      type: string
    words:
      type: array
      items:
        type: string
  call:
    cpp: "Solution().numMatchingSubseq({s}, {words})"
    rust: "Solution::num_matching_subseq({s}, {words})"
    python3: "Solution().numMatchingSubseq({s}, {words})"
    python2: "Solution().numMatchingSubseq({s}, {words})"
    ruby: "num_matching_subseq({s}, {words})"
    java: "new Solution().numMatchingSubseq({s}, {words})"
    csharp: "new Solution().NumMatchingSubseq({s}, {words})"
    kotlin: "Solution().numMatchingSubseq({s}, {words})"
    go: "numMatchingSubseq({s}, {words})"
    dart: "Solution().numMatchingSubseq({s}, {words})"
    swift: "Solution().numMatchingSubseq({s}, {words})"
    typescript: "numMatchingSubseq({s}, {words})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().numMatchingSubseq(s, words, {result})
    checker: |
      class Checker(object):
          def numMatchingSubseq(self, s, words, result):
              return isinstance(result, int)
seed: 792
tests:
  - name: example-1
    in:
      s: abcde
      words:
        - a
        - bb
        - acd
        - ace
    out: 3
  - name: example-2
    in:
      s: dsahjpjauf
      words:
        - ahjpjau
        - ja
        - ahbwzgqnuk
        - tnmlanowax
    out: 2
  - name: single-char-match
    in:
      s: a
      words:
        - a
    out: 1
  - name: single-char-no-match
    in:
      s: a
      words:
        - b
    out: 0
  - name: repeated-single-letter
    in:
      s: aaaaa
      words:
        - a
        - aa
        - aaa
        - aaaa
        - aaaaa
        - aaaaaa
    out: 5
  - name: all-distinct-basic
    in:
      s: zyxwv
      words:
        - z
        - yx
        - zw
        - zyx
        - vw
    out: 4
  - name: empty-matches
    in:
      s: abc
      words:
        - d
        - ee
        - fff
        - gggg
    out: 0
  - name: duplicates-count-separately
    in:
      s: abcabc
      words:
        - abc
        - abc
        - abc
        - ac
        - ac
        - ca
    out: 6
  - name: prefix-subsequence
    in:
      s: abcd
      words:
        - ab
        - abc
        - abcd
        - a
        - bcd
        - d
    out: 6
  - name: interleaved-matches
    in:
      s: banana
      words:
        - ban
        - nan
        - ana
        - baa
        - bna
        - nanaa
    out: 5
  - name: requires-ordering
    in:
      s: abcde
      words:
        - ace
        - cae
        - eca
        - abde
        - edcba
    out: 2
  - name: repeated-characters-and-gaps
    in:
      s: aabccdeeff
      words:
        - abc
        - aabbcc
        - ace
        - aaccee
        - adef
        - aabccdeeff
    out: 5
  - name: words-longer-than-s
    in:
      s: abc
      words:
        - abcd
        - aabc
        - abcabc
        - cba
    out: 0
  - name: many-same-word
    in:
      s: abracadabra
      words:
        - aba
        - aba
        - aba
        - abra
        - cad
        - ra
    out: 6
  - name: mixed-lengths
    in:
      s: xyzxyz
      words:
        - x
        - yy
        - z
        - xy
        - yz
        - zx
        - xyz
        - xyy
        - xxz
    out: 9
  - name: all-letters-once
    in:
      s: abcdefghijklmnopqrstuvwxyz
      words:
        - abc
        - xyz
        - aceg
        - zyx
        - mnopq
        - aaaaa
    out: 4
  - name: sparse-subsequence
    in:
      s: axbyczdwevfugthsirjqkplomn
      words:
        - abcdef
        - aeiou
        - az
        - xwv
        - ajk
        - an
    out: 5
  - name: repeated-blocks
    in:
      s: abcabcabcabc
      words:
        - abcabc
        - acac
        - bcabca
        - ccc
        - abccba
    out: 5
  - name: high-duplication
    in:
      s: aabbaaabbb
      words:
        - ab
        - aab
        - abb
        - aaabbb
        - bbb
        - aaaab
    out: 6
  - name: edge-prefix-suffix
    in:
      s: qwerty
      words:
        - q
        - ry
        - qy
        - wy
        - qwe
        - ty
        - qwerty
    out: 7
  - name: impossible-reverse
    in:
      s: abcdef
      words:
        - fed
        - edc
        - cba
        - bdf
    out: 1
  - name: long-word-at-limit
    in:
      s: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      words:
        - aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
        - aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaab
        - aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
