entry:
  id: 782
  title: transform-to-chessboard
  params:
    board:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().movesToChessboard({board})"
    rust: "Solution::moves_to_chessboard({board})"
    python3: "Solution().movesToChessboard({board})"
    python2: "Solution().movesToChessboard({board})"
    ruby: "moves_to_chessboard({board})"
    java: "new Solution().movesToChessboard({board})"
    csharp: "new Solution().MovesToChessboard({board})"
    kotlin: "Solution().movesToChessboard({board})"
    go: "movesToChessboard({board})"
    dart: "Solution().movesToChessboard({board})"
    swift: "Solution().movesToChessboard({board})"
    typescript: "movesToChessboard({board})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().movesToChessboard(board, {result})
    checker: |
      class Checker(object):
          def movesToChessboard(self, board, result):
              return isinstance(result, int)
seed: 782
