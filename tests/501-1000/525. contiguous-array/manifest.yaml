entry:
  id: 525
  title: contiguous-array
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().findMaxLength({nums})"
    rust: "Solution::find_max_length({nums})"
    python3: "Solution().findMaxLength({nums})"
    python2: "Solution().findMaxLength({nums})"
    ruby: "find_max_length({nums})"
    java: "new Solution().findMaxLength({nums})"
    csharp: "new Solution().FindMaxLength({nums})"
    kotlin: "Solution().findMaxLength({nums})"
    go: "findMaxLength({nums})"
    dart: "Solution().findMaxLength({nums})"
    swift: "Solution().findMaxLength({nums})"
    typescript: "findMaxLength({nums})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().findMaxLength(nums, {result})"
    checker: |
      class Checker:
          def findMaxLength(self, nums, result):
              if not isinstance(result, int):
                  return False
              count = 0
              first = {0: -1}
              best = 0
              for i, x in enumerate(nums):
                  count += 1 if x == 1 else -1
                  if count in first:
                      best = max(best, i - first[count])
                  else:
                      first[count] = i
              return result == best
seed: 525
