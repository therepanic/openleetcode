entry:
  id: 712
  title: minimum-ascii-delete-sum-for-two-strings
  params:
    s1:
      type: string
    s2:
      type: string
  call:
    cpp: Solution().minimumDeleteSum({s1}, {s2})
    rust: Solution::minimum_delete_sum({s1}, {s2})
    python3: Solution().minimumDeleteSum({s1}, {s2})
    python2: Solution().minimumDeleteSum({s1}, {s2})
    ruby: minimum_delete_sum({s1}, {s2})
    java: new Solution().minimumDeleteSum({s1}, {s2})
    csharp: new Solution().MinimumDeleteSum({s1}, {s2})
    kotlin: Solution().minimumDeleteSum({s1}, {s2})
    go: minimumDeleteSum({s1}, {s2})
    dart: Solution().minimumDeleteSum({s1}, {s2})
    swift: Solution().minimumDeleteSum({s1}, {s2})
    typescript: minimumDeleteSum({s1}, {s2})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().minimumDeleteSum({s1}, {s2}, {result})
    checker: |
      class Checker:
          def minimumDeleteSum(self, s1, s2, result):
              if not isinstance(result, int):
                  return False
              n, m = len(s1), len(s2)
              dp = [[0] * (m + 1) for _ in range(n + 1)]
              for i in range(n):
                  for j in range(m):
                      if s1[i] == s2[j]:
                          dp[i + 1][j + 1] = dp[i][j] + ord(s1[i])
                      else:
                          dp[i + 1][j + 1] = max(dp[i][j + 1], dp[i + 1][j])
              expected = sum(ord(c) for c in s1) + sum(ord(c) for c in s2) - 2 * dp[n][m]
              return result == expected
seed: 712
