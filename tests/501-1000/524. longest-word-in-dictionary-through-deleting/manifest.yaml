entry:
  id: 524
  title: longest-word-in-dictionary-through-deleting
  params:
    s:
      type: string
    dictionary:
      type: array
      items:
        type: string
  call:
    cpp: "Solution().findLongestWord({s}, {dictionary})"
    rust: "Solution::find_longest_word({s}, {dictionary})"
    python3: "Solution().findLongestWord({s}, {dictionary})"
    python2: "Solution().findLongestWord({s}, {dictionary})"
    ruby: "find_longest_word({s}, {dictionary})"
    java: "new Solution().findLongestWord({s}, java.util.Arrays.asList({dictionary}))"
    csharp: "new Solution().FindLongestWord({s}, {dictionary})"
    kotlin: "Solution().findLongestWord({s}, {dictionary}.toList())"
    go: "findLongestWord({s}, {dictionary})"
    dart: "Solution().findLongestWord({s}, {dictionary})"
    swift: "Solution().findLongestWord({s}, {dictionary})"
    typescript: "findLongestWord({s}, {dictionary})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().findLongestWord(s, dictionary, {result})"
    checker: |
      class Checker:
          def findLongestWord(self, s, dictionary, result):
              if not isinstance(result, str):
                  return False
              if result not in dictionary and result != "":
                  return False

              def is_subsequence(word, source):
                  i = 0
                  for ch in source:
                      if i < len(word) and word[i] == ch:
                          i += 1
                  return i == len(word)

              if result != "" and not is_subsequence(result, s):
                  return False

              best = ""
              for word in dictionary:
                  if is_subsequence(word, s):
                      if len(word) > len(best) or (len(word) == len(best) and word < best):
                          best = word
              return result == best
seed: 524
tests:
  - name: example-1
    in:
      s: "abpcplea"
      dictionary: ["ale", "apple", "monkey", "plea"]
    out: "apple"
  - name: example-2
    in:
      s: "abpcplea"
      dictionary: ["a", "b", "c"]
    out: "a"
  - name: single-match
    in:
      s: "abc"
      dictionary: ["abc"]
    out: "abc"
  - name: no-match
    in:
      s: "abc"
      dictionary: ["d", "ef", "gh"]
    out: ""
  - name: prefer-longer-over-lexicographic
    in:
      s: "bab"
      dictionary: ["ba", "ab", "b"]
    out: "ab"
  - name: tie-lexicographic
    in:
      s: "abce"
      dictionary: ["abe", "abc"]
    out: "abc"
  - name: repeated-letters-form-word
    in:
      s: "aaaabaaa"
      dictionary: ["aaaaa", "aaaa", "aaab"]
    out: "aaaaa"
  - name: repeated-letters-insufficient
    in:
      s: "aab"
      dictionary: ["aaab", "aabb", "ab"]
    out: "ab"
  - name: exact-string-among-others
    in:
      s: "leetcode"
      dictionary: ["leet", "code", "leetcode", "leetcoded"]
    out: "leetcode"
  - name: empty-answer-with-near-misses
