      dictionary: ["ban", "bana", "banan", "banana", "anan"]
    out: "banana"
  - name: lexicographic-with-duplicates-in-dictionary
    in:
      s: "abdc"
      dictionary: ["abc", "adc", "abc", "adc"]
    out: "abc"
  - name: single-character-source
