    typescript: widthOfBinaryTree({root})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check({result})
    checker: |
      class Checker:
          def check(self, result):
              return isinstance(result, int) and result >= 1
