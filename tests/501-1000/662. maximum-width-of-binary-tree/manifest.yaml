    rust: Solution::width_of_binary_tree({root})
    python3: Solution().widthOfBinaryTree({root})
    python2: Solution().widthOfBinaryTree({root})
    ruby: width_of_binary_tree({root})
    java: new Solution().widthOfBinaryTree({root})
