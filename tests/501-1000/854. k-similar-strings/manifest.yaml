entry:
  id: 854
  title: k-similar-strings
  params:
    s1:
      type: string
    s2:
      type: string
  call:
    cpp: Solution().kSimilarity({s1}, {s2})
    rust: Solution::k_similarity({s1}, {s2})
    python3: Solution().kSimilarity({s1}, {s2})
    python2: Solution().kSimilarity({s1}, {s2})
    ruby: k_similarity({s1}, {s2})
    java: new Solution().kSimilarity({s1}, {s2})
    csharp: new Solution().KSimilarity({s1}, {s2})
    kotlin: Solution().kSimilarity({s1}, {s2})
    go: kSimilarity({s1}, {s2})
    dart: Solution().kSimilarity({s1}, {s2})
    swift: Solution().kSimilarity({s1}, {s2})
    typescript: kSimilarity({s1}, {s2})
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().kSimilarity(s1, s2, {result})"
    checker: |
      from collections import deque

      class Checker:
          def kSimilarity(self, s1, s2, result):
              if not isinstance(result, int):
                  return False
              q = deque([s1])
              seen = {s1}
              ans = 0
              while q:
                  for _ in range(len(q)):
                      s = q.popleft()
                      if s == s2:
                          return result == ans
                      i = 0
                      while s[i] == s2[i]:
                          i += 1
                      for j in range(i + 1, len(s)):
                          if s[i] == s2[j] and s[j] != s2[j]:
                              ns = s[:i] + s[j] + s[i + 1:j] + s[i] + s[j + 1:]
                              if ns not in seen:
                                  seen.add(ns)
                                  q.append(ns)
                  ans += 1
              return False
seed: 854
