      subRoot: [2, 4, 5]
    out: true
  - name: balanced-right-subtree
    in:
      root: [1, 2, 3, 4, 5, 6, 7]
      subRoot: [3, 6, 7]
    out: true
  - name: balanced-structure-mismatch
    in:
