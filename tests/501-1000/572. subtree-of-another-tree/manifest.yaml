      subRoot: [2, 4, 6]
    out: false
  - name: sparse-right-true
    in:
      root: [1, 2, 3, 4, null, null, 5]
      subRoot: [3, null, 5]
    out: true
  - name: sparse-left-true
    in:
      root: [1, 2, 3, 4, null, null, 5]
      subRoot: [2, 4]
    out: true
  - name: all-ones-small-true
