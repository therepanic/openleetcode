entry:
  id: 572
  title: subtree-of-another-tree
  params:
    root:
      type: tree_node
    subRoot:
      type: tree_node
  call:
    cpp: "Solution().isSubtree({root}, {subRoot})"
    rust: "Solution::is_subtree({root}, {subRoot})"
    python3: "Solution().isSubtree({root}, {subRoot})"
    python2: "Solution().isSubtree({root}, {subRoot})"
    ruby: "is_subtree({root}, {subRoot})"
    java: "new Solution().isSubtree({root}, {subRoot})"
    csharp: "new Solution().IsSubtree({root}, {subRoot})"
    kotlin: "Solution().isSubtree({root}, {subRoot})"
    go: "isSubtree({root}, {subRoot})"
    dart: "Solution().isSubtree({root}, {subRoot})"
    swift: "Solution().isSubtree({root}, {subRoot})"
    typescript: "isSubtree({root}, {subRoot})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().isSubtree(root, subRoot, {result})"
    checker: |
      class Checker:
          def isSubtree(self, root, subRoot, result):
              if not isinstance(result, bool):
                  return False

              def same(a, b):
                  if a is None and b is None:
                      return True
                  if a is None or b is None:
                      return False
                  return a.val == b.val and same(a.left, b.left) and same(a.right, b.right)

              def contains(a, b):
                  if a is None:
                      return False
                  return same(a, b) or contains(a.left, b) or contains(a.right, b)

              return result is contains(root, subRoot)
seed: 572
tests:
  - name: example-1
    in:
      root: [3, 4, 5, 1, 2]
      subRoot: [4, 1, 2]
    out: true
  - name: example-2
    in:
      root: [3, 4, 5, 1, 2, null, null, null, null, 0]
      subRoot: [4, 1, 2]
    out: false
  - name: single-node-equal
    in:
      root: [1]
      subRoot: [1]
    out: true
  - name: single-node-different
    in:
      root: [1]
      subRoot: [2]
    out: false
  - name: subtree-is-left-child
    in:
      root: [1, 2, 3]
      subRoot: [2]
    out: true
  - name: subtree-is-right-child
    in:
      root: [1, 2, 3]
      subRoot: [3]
    out: true
  - name: leaf-not-present
    in:
      root: [1, 2, 3]
      subRoot: [4]
    out: false
  - name: subroot-larger-than-root
    in:
      root: [1, 2]
      subRoot: [1, 2, 3]
    out: false
  - name: extra-child-makes-false
    in:
      root: [3, 4, 5, 1, 2]
      subRoot: [4, 1, 2, 0]
    out: false
  - name: leaf-with-left-descendant-match
    in:
      root: [3, 4, 5, 1, 2, null, null, null, null, 0]
      subRoot: [2, 0]
    out: true
  - name: duplicate-values-true
    in:
      root: [1, 1, 1, 1, null, 1, null]
      subRoot: [1, 1]
    out: true
  - name: duplicate-values-structure-false
    in:
      root: [1, 1, 1, 1, null, 1, null]
      subRoot: [1, null, 1]
    out: false
  - name: negatives-true
    in:
      root: [1, -1, -1, 2, null, 2, null]
      subRoot: [-1, 2]
    out: true
  - name: negatives-false
    in:
      root: [1, -1, -1, 2, null, 2, null]
      subRoot: [-1, null, 2]
    out: false
  - name: left-chain-true
    in:
      root: [1, 2, null, 3, null, 4]
      subRoot: [2, 3, null, 4]
    out: true
  - name: right-chain-true
    in:
      root: [1, null, 2, null, 3, null, 4]
      subRoot: [2, null, 3, null, 4]
    out: true
  - name: balanced-left-subtree
