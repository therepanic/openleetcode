judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().strWithout3a3b(a, b, {result})
    checker:
      "class Checker:\n    def strWithout3a3b(self, a, b, result):\n      \
      \  if not isinstance(result, str):\n            return False\n        if len(result)\
      \ != a + b:\n            return False\n        if result.count('a') != a or\
      \ result.count('b') != b:\n            return False\n        return 'aaa' not\
      \ in result and 'bbb' not in result\n"
