judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: Checker().primePalindrome(n, {result})
    checker:
      "from typing import Any\n\nclass Checker:\n    def primePalindrome(self,\
      \ n: int, result: Any) -> bool:\n        if not isinstance(result, int) or result\
      \ < n:\n            return False\n        def is_prime(x: int) -> bool:\n  \
      \          if x < 2:\n                return False\n            if x % 2 ==\
      \ 0:\n                return x == 2\n            d = 3\n            while d\
      \ * d <= x:\n                if x % d == 0:\n                    return False\n\
      \                d += 2\n            return True\n        def is_pal(x: int)\
      \ -> bool:\n            s = str(x)\n            return s == s[::-1]\n      \
      \  for x in range(n, result):\n            if is_pal(x) and is_prime(x):\n \
      \               return False\n        return is_pal(result) and is_prime(result)\n"
