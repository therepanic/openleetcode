  title: prime-palindrome
  params:
    n:
      type: int
  call:
    cpp: Solution().primePalindrome({n})
    rust: Solution::prime_palindrome({n})
    python3: Solution().primePalindrome({n})
    python2: Solution().primePalindrome({n})
    ruby: prime_palindrome({n})
    java: new Solution().primePalindrome({n})
    csharp: new Solution().PrimePalindrome({n})
    kotlin: Solution().primePalindrome({n})
