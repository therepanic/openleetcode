    csharp: "new Solution().AtMostNGivenDigitSet({digits}, {n})"
    kotlin: "Solution().atMostNGivenDigitSet({digits}, {n})"
    go: "atMostNGivenDigitSet({digits}, {n})"
    dart: "Solution().atMostNGivenDigitSet({digits}, {n})"
    swift: "Solution().atMostNGivenDigitSet({digits}, {n})"
    typescript: "atMostNGivenDigitSet({digits}, {n})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().atMostNGivenDigitSet(digits, n, {result})"
    checker: |
      class Checker:
          def atMostNGivenDigitSet(self, digits, n, result):
              return isinstance(result, int)
seed: 902
