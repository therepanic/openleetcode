entry:
  id: 914
  title: x-of-a-kind-in-a-deck-of-cards
  params:
    deck:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().hasGroupsSizeX({deck})"
    rust: "Solution::has_groups_size_x({deck})"
    python3: "Solution().hasGroupsSizeX({deck})"
    python2: "Solution().hasGroupsSizeX({deck})"
    ruby: "has_groups_size_x({deck})"
    java: "new Solution().hasGroupsSizeX({deck})"
    csharp: "new Solution().HasGroupsSizeX({deck})"
    kotlin: "Solution().hasGroupsSizeX({deck})"
    go: "hasGroupsSizeX({deck})"
    dart: "Solution().hasGroupsSizeX({deck})"
    swift: "Solution().hasGroupsSizeX({deck})"
    typescript: "hasGroupsSizeX({deck})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 128
oracle:
  python3:
    call: "Checker().hasGroupsSizeX(deck, {result})"
    checker: |
      class Checker:
          def hasGroupsSizeX(self, deck, result):
              counts = {}
              for x in deck:
                  counts[x] = counts.get(x, 0) + 1
              g = 0
              for c in counts.values():
                  while c:
                      g, c = c, g % c
              return bool(result) == (g >= 2)
seed: 914
