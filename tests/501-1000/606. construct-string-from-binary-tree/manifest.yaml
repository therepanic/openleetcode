entry:
  id: 606
  title: construct-string-from-binary-tree
  params:
    root:
      type: tree_node
  call:
    cpp: Solution().tree2str({root})
    rust: Solution::tree2str({root})
    python3: Solution().tree2str({root})
    python2: Solution().tree2str({root})
    ruby: tree2str({root})
    java: new Solution().tree2str({root})
    csharp: new Solution().Tree2str({root})
    kotlin: Solution().tree2str({root})
    go: tree2str({root})
    dart: Solution().tree2str({root})
    swift: Solution().tree2str({root})
    typescript: tree2str({root})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 256
oracle:
  python3:
    call: Checker().tree2str(root, {result})
    checker:
      "class Checker:\n    def tree2str(self, root, result):\n        if not\
      \ isinstance(result, str):\n            return False\n\n        def build(values):\n\
      \            if not isinstance(values, list) or not values:\n              \
      \  return None\n            nodes = [None if v is None else {\"val\": v, \"\
      left\": None, \"right\": None} for v in values]\n            kids = nodes[::-1]\n\
      \            root = kids.pop()\n            for node in nodes:\n           \
      \     if node is not None:\n                    if kids:\n                 \
      \       node[\"left\"] = kids.pop()\n                    if kids:\n        \
      \                node[\"right\"] = kids.pop()\n            return root\n\n \
      \       def ser(node):\n            if node is None:\n                return\
      \ \"\"\n            s = str(node[\"val\"])\n            if node[\"left\"] is\
      \ not None or node[\"right\"] is not None:\n                s += \"(\" + ser(node[\"\
      left\"]) + \")\"\n            if node[\"right\"] is not None:\n            \
      \    s += \"(\" + ser(node[\"right\"]) + \")\"\n            return s\n\n   \
      \     return result == ser(build(root))\n"
seed: 606
