judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().lemonadeChange(bills, {result})"
    checker: |
      class Checker:
          def lemonadeChange(self, bills, result):
              f = t = 0
              for bill in bills:
                  if bill == 5:
                      f += 1
                  elif bill == 10:
                      if f < 1:
                          return result is False
                      f -= 1
                      t += 1
                  else:
                      if f >= 1 and t >= 1:
                          f -= 1
                          t -= 1
                      elif f >= 3:
                          f -= 3
                      else:
                          return result is False
              return result is True
