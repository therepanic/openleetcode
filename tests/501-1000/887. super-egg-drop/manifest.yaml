  id: 887
  title: "super-egg-drop"
  params:
    k:
      type: int
    n:
      type: int
  call:
    cpp: "Solution().superEggDrop({k}, {n})"
    rust: "Solution::super_egg_drop({k}, {n})"
    python3: "Solution().superEggDrop({k}, {n})"
    python2: "Solution().superEggDrop({k}, {n})"
    ruby: "super_egg_drop({k}, {n})"
    java: "new Solution().superEggDrop({k}, {n})"
    csharp: "new Solution().SuperEggDrop({k}, {n})"
    kotlin: "Solution().superEggDrop({k}, {n})"
    go: "superEggDrop({k}, {n})"
    dart: "Solution().superEggDrop({k}, {n})"
    swift: "Solution().superEggDrop({k}, {n})"
    typescript: "superEggDrop({k}, {n})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 300

oracle:
  python3:
    call: "Checker().superEggDrop(k, n, {result})"
    checker: |
      class Checker:
          def superEggDrop(self, k, n, result):
              if not isinstance(result, int):
                  return False
              if k == 1:
                  return result == n
              def can(moves):
                  total = 0
                  cur = 1
                  for _ in range(k):
                      cur = cur * (moves - _)
                      cur //= (_ + 1)
                      total += cur
                      if total >= n:
                          return True
                  return total >= n
              lo, hi = 0, n
              while lo < hi:
                  mid = (lo + hi) // 2
                  if can(mid):
                      hi = mid
                  else:
                      lo = mid + 1
              return result == lo

