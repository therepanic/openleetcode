oracle:
  python3:
    call: Checker().check(root, {result})
    checker:
      "class Checker:\n    def check(self, root, result):\n        if not isinstance(result,\
      \ int):\n            return False\n        level = [0]\n        arr = root\n\
      \        leftmost = None\n        while level:\n            nxt = []\n     \
      \       vals = []\n            for idx in level:\n                if idx < len(arr)\
      \ and arr[idx] is not None:\n                    vals.append(arr[idx])\n   \
      \                 nxt.append(2 * idx + 1)\n                    nxt.append(2\
      \ * idx + 2)\n            if not vals:\n                break\n            leftmost\
      \ = vals[0]\n            level = nxt\n        return result == leftmost\n"
