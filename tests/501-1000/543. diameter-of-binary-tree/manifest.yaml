entry:
  id: 543
  title: diameter-of-binary-tree
  params:
    root:
      type: tree_node
  call:
    cpp: "Solution().diameterOfBinaryTree({root})"
    rust: "Solution::diameter_of_binary_tree({root})"
    python3: "Solution().diameterOfBinaryTree({root})"
    python2: "Solution().diameterOfBinaryTree({root})"
    ruby: "diameter_of_binary_tree({root})"
    java: "new Solution().diameterOfBinaryTree({root})"
    csharp: "new Solution().DiameterOfBinaryTree({root})"
    kotlin: "Solution().diameterOfBinaryTree({root})"
    go: "diameterOfBinaryTree({root})"
    dart: "Solution().diameterOfBinaryTree({root})"
    swift: "Solution().diameterOfBinaryTree({root})"
    typescript: "diameterOfBinaryTree({root})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(root, {result})"
    checker: |
      class Checker:
          def check(self, root, result):
              if not isinstance(result, int):
                  return False
              def diameter(tree):
                  ans = 0
                  def height(node):
                      nonlocal ans
                      if node is None:
                          return 0
                      left = height(node.left)
                      right = height(node.right)
                      ans = max(ans, left + right)
                      return 1 + max(left, right)
                  height(tree)
                  return ans
              return result == diameter(root)
seed: 543
