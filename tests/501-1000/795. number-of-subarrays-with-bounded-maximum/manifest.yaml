entry:
  id: 795
  title: number-of-subarrays-with-bounded-maximum
  params:
    nums:
      type: array
      items:
        type: int
    left:
      type: int
    right:
      type: int
  call:
    cpp: Solution().numSubarrayBoundedMax({nums}, {left}, {right})
    rust: Solution::num_subarray_bounded_max({nums}, {left}, {right})
    python3: Solution().numSubarrayBoundedMax({nums}, {left}, {right})
    python2: Solution().numSubarrayBoundedMax({nums}, {left}, {right})
    ruby: num_subarray_bounded_max({nums}, {left}, {right})
    java: new Solution().numSubarrayBoundedMax({nums}, {left}, {right})
    csharp: new Solution().NumSubarrayBoundedMax({nums}, {left}, {right})
    kotlin: Solution().numSubarrayBoundedMax({nums}, {left}, {right})
    go: numSubarrayBoundedMax({nums}, {left}, {right})
    dart: Solution().numSubarrayBoundedMax({nums}, {left}, {right})
    swift: Solution().numSubarrayBoundedMax({nums}, {left}, {right})
    typescript: numSubarrayBoundedMax({nums}, {left}, {right})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().numSubarrayBoundedMax(nums, left, right, {result})
    checker: |
      class Checker(object):
          def numSubarrayBoundedMax(self, nums, left, right, result):
              return isinstance(result, int)
seed: 795
