entry:
  id: 501
  title: find-mode-in-binary-search-tree
  params:
    root:
      type: tree_node
  call:
    cpp: Solution().findMode({root})
    rust: Solution::find_mode({root})
    python3: Solution().findMode({root})
    python2: Solution().findMode({root})
    ruby: find_mode({root})
    java: new Solution().findMode({root})
    csharp: new Solution().FindMode({root})
    kotlin: Solution().findMode({root})
    go: findMode({root})
    dart: Solution().findMode({root})
    swift: Solution().findMode({root})
    typescript: findMode({root})
judge:
  type: ignore_order
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().findMode(root, {result})
    checker:
      "from collections import Counter\n\nclass Checker:\n    def findMode(self,\
      \ root, result):\n        vals = [x for x in root if x is not None]\n      \
      \  counts = Counter(vals)\n        if not counts:\n            return result\
      \ == []\n        mx = max(counts.values())\n        expected = sorted({v for\
      \ v, c in counts.items() if c == mx})\n        if not isinstance(result, list):\n\
      \            return False\n        if sorted(result) != expected:\n        \
      \    return False\n        return len(result) == len(expected)\n"
seed: 501
