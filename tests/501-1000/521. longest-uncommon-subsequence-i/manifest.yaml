entry:
  id: 521
  title: longest-uncommon-subsequence-i
  params:
    a:
      type: string
    b:
      type: string
  call:
    cpp: Solution().findLUSlength({a}, {b})
    rust: Solution::find_lu_slength({a}, {b})
    python3: Solution().findLUSlength({a}, {b})
    python2: Solution().findLUSlength({a}, {b})
    ruby: find_lu_slength({a}, {b})
    java: new Solution().findLUSlength({a}, {b})
    csharp: new Solution().FindLUSlength({a}, {b})
    kotlin: Solution().findLUSlength({a}, {b})
    go: findLUSlength({a}, {b})
    dart: Solution().findLUSlength({a}, {b})
    swift: Solution().findLUSlength({a}, {b})
    typescript: findLUSlength({a}, {b})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().findLUSlength(a, b, {result})
    checker: "class Checker:\n    def findLUSlength(self, a, b, result):\n        expected = -1 if a == b else max(len(a), len(b))\n        return result == expected\n"
seed: 521
tests:
  - name: example_1
    in:
      a: aba
      b: cdc
    out: 3
  - name: example_2
    in:
      a: aaa
      b: bbb
    out: 3
  - name: example_3
    in:
      a: aaa
      b: aaa
    out: -1
  - name: one_vs_one_different
    in:
      a: a
      b: b
    out: 1
  - name: one_vs_one_same
    in:
      a: z
      b: z
    out: -1
  - name: short_vs_long
    in:
      a: abc
      b: abcd
    out: 4
  - name: long_vs_short
    in:
      a: abcdef
      b: abc
    out: 6
  - name: same_length_diff
    in:
      a: hello
      b: world
    out: 5
  - name: same_length_same
    in:
      a: leetcode
      b: leetcode
    out: -1
  - name: prefix_vs_extension
    in:
      a: code
      b: coding
    out: 6
  - name: extension_vs_prefix
    in:
      a: coding
      b: code
    out: 6
  - name: uppercase_like_values_not_allowed_but_strings_compare
    in:
      a: abcde
      b: abcdf
    out: 5
  - name: all_same_char_different_lengths
    in:
      a: aaaaa
      b: aaa
    out: 5
  - name: alternating_same_length
    in:
      a: ababab
      b: bababa
    out: 6
  - name: different_last_char
    in:
      a: aaaaaa
      b: aaaaab
    out: 6
  - name: different_first_char
    in:
      a: baaaaa
      b: aaaaaa
    out: 6
  - name: near_max_a
    in:
      a: abcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdefghijklmnopqr
      b: abcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdefghijklmnopq
    out: 96
  - name: near_max_b
    in:
      a: abcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdefghijklmnopq
      b: abcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdefghijklmnopqr
    out: 96
  - name: max_same
    in:
      a: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      b: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    out: -1
  - name: max_diff
    in:
      a: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      b: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
    out: 100
  - name: short_same_length_diff2
    in:
      a: yz
      b: xy
    out: 2
  - name: short_same_length_same2
    in:
      a: mn
      b: mn
    out: -1
  - name: mixed_case_sensitive_a
    in:
      a: abc
      b: Abc
    out: 3
  - name: mixed_case_sensitive_b
    in:
      a: Abc
      b: abc
    out: 3
  - name: almost_same_long
    in:
      a: qqqqqqqqqq
      b: qqqqqqqqqr
    out: 10
  - name: repeated_pattern_long
    in:
      a: abcabcabcabcabcabcabcabcabcabc
      b: abcabcabcabcabcabcabcabcabcabd
    out: 30
  - name: repeated_pattern_same
    in:
      a: abcabcabcabcabcabcabcabcabcabc
      b: abcabcabcabcabcabcabcabcabcabc
    out: -1
  - name: length_99_vs_100
    in:
      a: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      b: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    out: 100
  - name: length_100_vs_99
    in:
      a: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      b: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
    out: 100
  - name: diff_with_shared_prefix
    in:
      a: abcxyz
      b: abcxyy
    out: 6
  - name: diff_with_shared_suffix
    in:
      a: zzabc
      b: yyabc
    out: 5
  - name: exact_same_longer
    in:
      a: abcdefghijabcdefghij
      b: abcdefghijabcdefghij
    out: -1
  - name: exact_diff_longer
    in:
      a: abcdefghijabcdefghij
      b: abcdefghijabcdefghik
    out: 20
  - name: tiny_vs_tiny_diff
    in:
      a: c
      b: d
    out: 1
  - name: tiny_vs_tiny_same
    in:
      a: c
      b: c
    out: -1
