entry:
  id: 805
  title: "split-array-with-same-average"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: Solution().splitArraySameAverage({nums})
    rust: Solution::split_array_same_average({nums})
    python3: Solution().splitArraySameAverage({nums})
    python2: Solution().splitArraySameAverage({nums})
    ruby: split_array_same_average({nums})
    java: new Solution().splitArraySameAverage({nums})
    csharp: new Solution().SplitArraySameAverage({nums})
    kotlin: Solution().splitArraySameAverage({nums})
    go: splitArraySameAverage({nums})
    dart: Solution().splitArraySameAverage({nums})
    swift: Solution().splitArraySameAverage({nums})
    typescript: splitArraySameAverage({nums})

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().check(nums, {result})"
    checker: |
      class Checker:
          def check(self, nums, result):
              n = len(nums)
              total = sum(nums)
              nums = sorted(nums)

              possible = [set() for _ in range(n // 2 + 1)]
              possible[0].add(0)
              for x in nums:
                  for size in range(len(possible) - 1, 0, -1):
                      for prev in list(possible[size - 1]):
                          possible[size].add(prev + x)

              expected = False
              for size in range(1, n // 2 + 1):
                  if (total * size) % n == 0 and (total * size) // n in possible[size]:
                      expected = True
                      break
              return bool(result) == expected

seed: 805

