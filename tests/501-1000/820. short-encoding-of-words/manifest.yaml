entry:
  id: 820
  title: short-encoding-of-words
  params:
    words:
      type: array
      items:
        type: string
  call:
    cpp: Solution().minimumLengthEncoding({words})
    rust: Solution::minimum_length_encoding({words})
    python3: Solution().minimumLengthEncoding({words})
    python2: Solution().minimumLengthEncoding({words})
    ruby: minimum_length_encoding({words})
    java: new Solution().minimumLengthEncoding({words})
    csharp: new Solution().MinimumLengthEncoding({words})
    kotlin: Solution().minimumLengthEncoding({words})
    go: minimumLengthEncoding({words})
    dart: Solution().minimumLengthEncoding({words})
    swift: Solution().minimumLengthEncoding({words})
    typescript: minimumLengthEncoding({words})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().minimumLengthEncoding(words, {result})
    checker:
      "class Checker:\n    def minimumLengthEncoding(self, words, result):\n\
      \        if not isinstance(result, int):\n            return False\n       \
      \ words = list(set(words))\n        words.sort(key=len, reverse=True)\n    \
      \    seen = set()\n        total = 0\n        for word in words:\n         \
      \   if word in seen:\n                continue\n            total += len(word)\
      \ + 1\n            for i in range(len(word)):\n                seen.add(word[i:])\n\
      \        return result == total\n"
seed: 820
