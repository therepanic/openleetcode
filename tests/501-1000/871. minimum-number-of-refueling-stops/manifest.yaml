  memory_mb: 300
oracle:
  python3:
    call: "Checker().minRefuelStops(target, startFuel, stations, {result})"
    checker: |
      import heapq
      from typing import Any

      class Checker:
          def minRefuelStops(self, target: int, startFuel: int, stations: list[list[int]], result: Any) -> bool:
              if not isinstance(result, int):
                  return False
              arr = [list(s) for s in stations]
              arr.append([target, 0])
              fuel = startFuel
              heap = []
              stops = 0
              idx = 0
              while fuel < target:
                  while idx < len(arr) and arr[idx][0] <= fuel:
                      heapq.heappush(heap, -arr[idx][1])
                      idx += 1
                  if not heap:
                      expected = -1
                      return result == expected
                  fuel += -heapq.heappop(heap)
                  stops += 1
              return result == stops
