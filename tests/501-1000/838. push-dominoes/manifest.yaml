    python3: Solution().pushDominoes({dominoes})
    python2: Solution().pushDominoes({dominoes})
    ruby: push_dominoes({dominoes})
    java: new Solution().pushDominoes({dominoes})
    csharp: new Solution().PushDominoes({dominoes})
    kotlin: Solution().pushDominoes({dominoes})
    go: pushDominoes({dominoes})
    dart: Solution().pushDominoes({dominoes})
    swift: Solution().pushDominoes({dominoes})
    typescript: pushDominoes({dominoes})
judge:
  type: exact
limits:
