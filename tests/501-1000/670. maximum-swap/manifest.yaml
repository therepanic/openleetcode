judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().maximumSwap(num, {result})"
    checker: |
      class Checker:
          def maximumSwap(self, num, result):
              if not isinstance(result, int):
                  return False
              if num < 0 or num > 10**8:
                  return False
              digits = list(str(num))
              last_index = {int(d): i for i, d in enumerate(digits)}
              for i, d in enumerate(digits):
                  for x in range(9, int(d), -1):
                      if x in last_index and last_index[x] > i:
                          digits[i], digits[last_index[x]] = digits[last_index[x]], digits[i]
                          expected = int("".join(digits))
                          return result == expected
              return result == num
