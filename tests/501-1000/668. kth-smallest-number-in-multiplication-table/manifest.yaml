entry:
  id: 668
  title: kth-smallest-number-in-multiplication-table
  params:
    m:
      type: int
    n:
      type: int
    k:
      type: int
  call:
    cpp: Solution().findKthNumber({m}, {n}, {k})
    rust: Solution::find_kth_number({m}, {n}, {k})
    python3: Solution().findKthNumber({m}, {n}, {k})
    python2: Solution().findKthNumber({m}, {n}, {k})
    ruby: find_kth_number({m}, {n}, {k})
    java: new Solution().findKthNumber({m}, {n}, {k})
    csharp: new Solution().FindKthNumber({m}, {n}, {k})
    kotlin: Solution().findKthNumber({m}, {n}, {k})
    go: findKthNumber({m}, {n}, {k})
    dart: Solution().findKthNumber({m}, {n}, {k})
    swift: Solution().findKthNumber({m}, {n}, {k})
    typescript: findKthNumber({m}, {n}, {k})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().findKthNumber(m, n, k, result)
    checker: |
      class Checker:
          def findKthNumber(self, m, n, k, result):
              if not isinstance(result, int):
                  return False
              if result < 1 or result > m * n:
                  return False

              def count_le(x):
                  total = 0
                  for i in range(1, m + 1):
                      total += min(n, x // i)
                  return total

              def count_lt(x):
                  return count_le(x - 1)

              return count_le(result) >= k and count_lt(result) < k
seed: 668
