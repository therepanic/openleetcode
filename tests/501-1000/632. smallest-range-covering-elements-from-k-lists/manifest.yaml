entry:
  id: 632
  title: smallest-range-covering-elements-from-k-lists
  params:
    nums:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().smallestRange({nums})"
    rust: "Solution::smallest_range({nums})"
    python3: "Solution().smallestRange({nums})"
    python2: "Solution().smallestRange({nums})"
    ruby: "smallest_range({nums})"
    java: "new Solution().smallestRange(java.util.Arrays.stream({nums}).map(row -> java.util.Arrays.stream(row).boxed().collect(java.util.stream.Collectors.toList())).collect(java.util.stream.Collectors.toList()))"
    csharp: "new Solution().SmallestRange({nums})"
    kotlin: "Solution().smallestRange({nums}.map { it.toList() })"
    go: "smallestRange({nums})"
    dart: "Solution().smallestRange({nums})"
    swift: "Solution().smallestRange({nums})"
    typescript: "smallestRange({nums})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 300
oracle:
  python3:
    call: "Checker().smallestRange(nums, {result})"
    checker: |
      import heapq

      class Checker:
          def smallestRange(self, nums, result):
              if not isinstance(result, list) or len(result) != 2:
                  return False
              if not all(isinstance(x, int) for x in result):
                  return False
              if any(not isinstance(row, list) or len(row) == 0 for row in nums):
                  return False
              for row in nums:
                  if any(row[i] > row[i + 1] for i in range(len(row) - 1)):
                      return False

              expected = self.solve(nums)
              return result == expected

          def solve(self, nums):
              heap = []
              cur_max = -10**18
              for i, row in enumerate(nums):
                  heapq.heappush(heap, (row[0], i, 0))
                  if row[0] > cur_max:
                      cur_max = row[0]

              best = [heap[0][0], cur_max]
              while True:
                  cur_min, list_idx, idx = heapq.heappop(heap)
                  if cur_max - cur_min < best[1] - best[0] or (
                      cur_max - cur_min == best[1] - best[0] and cur_min < best[0]
                  ):
                      best = [cur_min, cur_max]
                  if idx + 1 == len(nums[list_idx]):
                      break
                  nxt = nums[list_idx][idx + 1]
                  heapq.heappush(heap, (nxt, list_idx, idx + 1))
                  if nxt > cur_max:
                      cur_max = nxt
              return best
