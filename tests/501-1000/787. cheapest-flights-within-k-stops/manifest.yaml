entry:
  id: 787
  title: cheapest-flights-within-k-stops
  params:
    n:
      type: int
    flights:
      type: array
      items:
        type: array
        items:
          type: int
    src:
      type: int
    dst:
      type: int
    k:
      type: int
  call:
    cpp: Solution().findCheapestPrice({n}, {flights}, {src}, {dst}, {k})
    rust: Solution::find_cheapest_price({n}, {flights}, {src}, {dst}, {k})
    python3: Solution().findCheapestPrice({n}, {flights}, {src}, {dst}, {k})
    python2: Solution().findCheapestPrice({n}, {flights}, {src}, {dst}, {k})
    ruby: find_cheapest_price({n}, {flights}, {src}, {dst}, {k})
    java: new Solution().findCheapestPrice({n}, {flights}, {src}, {dst}, {k})
    csharp: new Solution().FindCheapestPrice({n}, {flights}, {src}, {dst}, {k})
    kotlin: Solution().findCheapestPrice({n}, {flights}, {src}, {dst}, {k})
    go: findCheapestPrice({n}, {flights}, {src}, {dst}, {k})
    dart: Solution().findCheapestPrice({n}, {flights}, {src}, {dst}, {k})
    swift: Solution().findCheapestPrice({n}, {flights}, {src}, {dst}, {k})
    typescript: findCheapestPrice({n}, {flights}, {src}, {dst}, {k})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().findCheapestPrice(n, flights, src, dst, k, {result})
    checker: |
      class Checker(object):
          def findCheapestPrice(self, n, flights, src, dst, k, result):
              return isinstance(result, int)
seed: 787787
