entry:
  id: 850
  title: rectangle-area-ii
  params:
    rectangles:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().rectangleArea({rectangles})
    rust: Solution::rectangle_area({rectangles})
    python3: Solution().rectangleArea({rectangles})
    python2: Solution().rectangleArea({rectangles})
    ruby: rectangle_area({rectangles})
    java: new Solution().rectangleArea({rectangles})
    csharp: new Solution().RectangleArea({rectangles})
    kotlin: Solution().rectangleArea({rectangles})
    go: rectangleArea({rectangles})
    dart: Solution().rectangleArea({rectangles})
    swift: Solution().rectangleArea({rectangles})
    typescript: rectangleArea({rectangles})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().ok({result})
    checker: |
      class Checker:
          def ok(self, result):
              return True
seed: 850
