    dart: Solution().diStringMatch({s})
    swift: Solution().diStringMatch({s})
    typescript: diStringMatch({s})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().diStringMatch(s, {result})
    checker:
      "class Checker:\n    def diStringMatch(self, s, result):\n        if\
      \ not isinstance(result, list) or len(result) != len(s) + 1:\n            return\
      \ False\n        if sorted(result) != list(range(len(s) + 1)):\n           \
      \ return False\n        for i, ch in enumerate(s):\n            if ch == 'I'\
      \ and not (result[i] < result[i + 1]):\n                return False\n     \
      \       if ch == 'D' and not (result[i] > result[i + 1]):\n                return\
      \ False\n        return True\n"
