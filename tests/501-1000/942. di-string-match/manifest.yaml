    s:
      type: string
  call:
    cpp: Solution().diStringMatch({s})
    rust: Solution::di_string_match({s})
    python3: Solution().diStringMatch({s})
    python2: Solution().diStringMatch({s})
    ruby: di_string_match({s})
    java: new Solution().diStringMatch({s})
    csharp: new Solution().DiStringMatch({s})
    kotlin: Solution().diStringMatch({s})
