entry:
  id: 552
  title: student-attendance-record-ii
  params:
    n:
      type: int
  call:
    cpp: "Solution().checkRecord({n})"
    rust: "Solution::check_record({n})"
    python3: "Solution().checkRecord({n})"
    python2: "Solution().checkRecord({n})"
    ruby: "check_record({n})"
    java: "new Solution().checkRecord({n})"
    csharp: "new Solution().CheckRecord({n})"
    kotlin: "Solution().checkRecord({n})"
    go: "checkRecord({n})"
    dart: "Solution().checkRecord({n})"
    swift: "Solution().checkRecord({n})"
    typescript: "checkRecord({n})"
judge:
  type: "exact"
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(n, {result})"
    checker: |
      class Checker:
          def check(self, n, result):
              if not isinstance(result, int):
                  return False
              mod = 1000000007
              dp = [[0, 0, 0], [0, 0, 0]]
              dp[0][0] = 1
              for _ in range(n):
                  ndp = [[0, 0, 0], [0, 0, 0]]
                  for absences in range(2):
                      for lates in range(3):
                          cur = dp[absences][lates]
                          if cur == 0:
                              continue
                          ndp[absences][0] = (ndp[absences][0] + cur) % mod
                          if absences == 0:
                              ndp[1][0] = (ndp[1][0] + cur) % mod
                          if lates < 2:
                              ndp[absences][lates + 1] = (ndp[absences][lates + 1] + cur) % mod
                  dp = ndp
              expected = 0
              for row in dp:
                  for value in row:
                      expected = (expected + value) % mod
              return result == expected
seed: 552
