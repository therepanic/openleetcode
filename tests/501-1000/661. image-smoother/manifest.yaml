entry:
  id: 661
  title: image-smoother
  params:
    img:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().imageSmoother({img})
    rust: Solution::image_smoother({img})
    python3: Solution().imageSmoother({img})
    python2: Solution().imageSmoother({img})
    ruby: image_smoother({img})
    java: new Solution().imageSmoother({img})
    csharp: new Solution().ImageSmoother({img})
    kotlin: Solution().imageSmoother({img})
    go: imageSmoother({img})
    dart: Solution().imageSmoother({img})
    swift: Solution().imageSmoother({img})
    typescript: imageSmoother({img})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().imageSmoother(img, {result})
    checker: |
      class Checker:
          def imageSmoother(self, img, result):
              if not isinstance(result, list):
                  return False
              if not img or not img[0]:
                  return False
              m = len(img)
              n = len(img[0])
              if len(result) != m:
                  return False
              for row in result:
                  if not isinstance(row, list) or len(row) != n:
                      return False
                  for val in row:
                      if not isinstance(val, int):
                          return False
              expected = []
              for i in range(m):
                  row = []
                  for j in range(n):
                      s = 0
                      c = 0
                      for a in range(max(0, i - 1), min(m - 1, i + 1) + 1):
                          for b in range(max(0, j - 1), min(n - 1, j + 1) + 1):
                              s += img[a][b]
                              c += 1
                      row.append(s // c)
                  expected.append(row)
              return result == expected
