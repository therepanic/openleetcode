oracle:
  python3:
    call: "Checker().minCostClimbingStairs(cost, {result})"
    checker: |
      class Checker:
          def _expected(self, arr):
              prev2 = 0
              prev1 = 0
              for value in arr:
                  prev2, prev1 = prev1, min(prev1, prev2) + value
              return min(prev1, prev2)

          def _valid_cost(self, arr):
              return (
                  isinstance(arr, list)
                  and 2 <= len(arr) <= 1000
                  and all(isinstance(x, int) and 0 <= x <= 999 for x in arr)
              )

          def _recover_original(self, arr):
              if not isinstance(arr, list):
                  return None
              if len(arr) < 3 or len(arr) > 1001:
                  return None
              if any((not isinstance(x, int)) or x < 0 for x in arr):
                  return None
              if arr[-1] != 0:
                  return None

              original_len = len(arr) - 1
              original = [0] * original_len
              if arr[original_len - 1] > 999 or arr[original_len - 2] > 999:
                  return None

              original[original_len - 2] = arr[original_len - 2]
              original[original_len - 1] = arr[original_len - 1]

              for i in range(original_len - 3, -1, -1):
                  value = arr[i] - min(arr[i + 1], arr[i + 2])
                  if value < 0 or value > 999:
                      return None
                  original[i] = value

              replay = original[:] + [0]
              for i in range(len(replay) - 4, -1, -1):
                  replay[i] += min(replay[i + 1], replay[i + 2])
              if replay != arr:
                  return None

              return original

          def minCostClimbingStairs(self, cost, result):
              if not isinstance(result, int):
                  return False
              if not isinstance(cost, list):
                  return False

              candidates = []
              if self._valid_cost(cost):
                  candidates.append(cost)

              recovered = self._recover_original(cost)
              if recovered is not None:
                  candidates.append(recovered)

              if not candidates:
                  return False

              return any(result == self._expected(candidate) for candidate in candidates)
