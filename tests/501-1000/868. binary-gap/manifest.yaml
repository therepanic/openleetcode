judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: "Checker().binaryGap(n, {result})"
    checker: |
      from typing import Any

      class Checker:
          def binaryGap(self, n: int, result: Any) -> bool:
              if not isinstance(result, int):
                  return False
              bits = []
              x = n
              while x > 0:
                  bits.append(x & 1)
                  x >>= 1
              last = None
              best = 0
              for i, bit in enumerate(bits):
                  if bit == 1:
                      if last is not None:
                          best = max(best, i - last)
                      last = i
              return result == best
seed: 868868
