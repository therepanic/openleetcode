judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().kInversePairs(n, k, {result})
    checker:
      "class Checker:\n    def kInversePairs(self, n, k, result):\n       \
      \ if not isinstance(result, int):\n            return False\n        if n <\
      \ 1 or k < 0:\n            return False\n\n        mod = 10**9 + 7\n       \
      \ dp = [0] * (k + 1)\n        dp[0] = 1\n\n        for i in range(1, n + 1):\n\
      \            nxt = [0] * (k + 1)\n            window = 0\n            for j\
      \ in range(k + 1):\n                window = (window + dp[j]) % mod\n      \
      \          if j >= i:\n                    window = (window - dp[j - i]) % mod\n\
      \                nxt[j] = window\n            dp = nxt\n\n        expected =\
      \ dp[k]\n        return result % mod == expected\n"
