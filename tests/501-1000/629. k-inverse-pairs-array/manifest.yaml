    python2: Solution().kInversePairs({n}, {k})
    ruby: k_inverse_pairs({n}, {k})
    java: new Solution().kInversePairs({n}, {k})
    csharp: new Solution().KInversePairs({n}, {k})
    kotlin: Solution().kInversePairs({n}, {k})
