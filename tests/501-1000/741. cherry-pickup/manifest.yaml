entry:
  id: 741
  title: cherry-pickup
  params:
    grid:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().cherryPickup({grid})
    rust: Solution::cherry_pickup({grid})
    python3: Solution().cherryPickup({grid})
    python2: Solution().cherryPickup({grid})
    ruby: cherry_pickup({grid})
    java: new Solution().cherryPickup({grid})
    csharp: new Solution().CherryPickup({grid})
    kotlin: Solution().cherryPickup({grid})
    go: cherryPickup({grid})
    dart: Solution().cherryPickup({grid})
    swift: Solution().cherryPickup({grid})
    typescript: cherryPickup({grid})
judge:
  type: exact
limits:
  time_ms: 1500
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(grid, {result})
    checker: |
      class Checker(object):
          def check(self, grid, result):
              if not isinstance(result, int):
                  return False
              if not isinstance(grid, list) or not grid:
                  return False
              n = len(grid)
              if any(not isinstance(row, list) or len(row) != n for row in grid):
                  return False
              if grid[0][0] == -1 or grid[-1][-1] == -1:
                  return False
              for row in grid:
                  for val in row:
                      if val not in (-1, 0, 1):
                          return False

              neg_inf = -10 ** 9
              dp = [[neg_inf] * n for _ in range(n)]
              dp[0][0] = grid[0][0]
              for step in range(1, 2 * n - 1):
                  nxt = [[neg_inf] * n for _ in range(n)]
                  r_min = max(0, step - (n - 1))
                  r_max = min(n - 1, step)
                  for r1 in range(r_min, r_max + 1):
                      c1 = step - r1
                      if grid[r1][c1] == -1:
                          continue
                      for r2 in range(r_min, r_max + 1):
                          c2 = step - r2
                          if grid[r2][c2] == -1:
                              continue
                          best = dp[r1][r2]
                          if r1 > 0:
                              best = max(best, dp[r1 - 1][r2])
                          if r2 > 0:
                              best = max(best, dp[r1][r2 - 1])
                          if r1 > 0 and r2 > 0:
                              best = max(best, dp[r1 - 1][r2 - 1])
                          if best == neg_inf:
                              continue
                          cherries = grid[r1][c1]
                          if r1 != r2:
                              cherries += grid[r2][c2]
                          nxt[r1][r2] = best + cherries
                  dp = nxt
              expected = max(0, dp[n - 1][n - 1])
              return result == expected
seed: 741
