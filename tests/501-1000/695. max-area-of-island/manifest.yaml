entry:
  id: 695
  title: max-area-of-island
  params:
    grid:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().maxAreaOfIsland({grid})
    rust: Solution::max_area_of_island({grid})
    python3: Solution().maxAreaOfIsland({grid})
    python2: Solution().maxAreaOfIsland({grid})
    ruby: max_area_of_island({grid})
    java: new Solution().maxAreaOfIsland({grid})
    csharp: new Solution().MaxAreaOfIsland({grid})
    kotlin: Solution().maxAreaOfIsland({grid})
    go: maxAreaOfIsland({grid})
    dart: Solution().maxAreaOfIsland({grid})
    swift: Solution().maxAreaOfIsland({grid})
    typescript: maxAreaOfIsland({grid})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(grid, {result})
    checker: |
      class Checker:
          def check(self, grid, result):
              if not isinstance(result, int):
                  return False
              rows, cols = len(grid), len(grid[0])
              seen = set()

              def dfs(r, c):
                  if r < 0 or r >= rows or c < 0 or c >= cols:
                      return 0
                  if grid[r][c] != 1 or (r, c) in seen:
                      return 0
                  seen.add((r, c))
                  return 1 + dfs(r + 1, c) + dfs(r - 1, c) + dfs(r, c + 1) + dfs(r, c - 1)

              best = 0
              for r in range(rows):
                  for c in range(cols):
                      if grid[r][c] == 1 and (r, c) not in seen:
                          best = max(best, dfs(r, c))
              return best == result
seed: 695
