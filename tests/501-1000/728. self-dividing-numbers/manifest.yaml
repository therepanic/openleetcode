judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().selfDividingNumbers(left, right, {result})"
    checker: |
      class Checker:
          def selfDividingNumbers(self, left, right, result):
              if not isinstance(result, list):
                  return False
              if any(type(x) is not int for x in result):
                  return False

              def is_self_dividing(n):
                  value = n
                  while value > 0:
                      digit = value % 10
                      if digit == 0 or n % digit != 0:
                          return False
                      value //= 10
                  return True

              expected = [n for n in range(left, right + 1) if is_self_dividing(n)]
              return result == expected
seed: 728
