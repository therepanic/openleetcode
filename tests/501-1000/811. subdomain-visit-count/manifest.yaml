entry:
  id: 811
  title: subdomain-visit-count
  params:
    cpdomains:
      type: array
      items:
        type: string
  call:
    cpp: Solution().subdomainVisits({cpdomains})
    rust: Solution::subdomain_visits({cpdomains})
    python3: Solution().subdomainVisits({cpdomains})
    python2: Solution().subdomainVisits({cpdomains})
    ruby: subdomain_visits({cpdomains})
    java: new Solution().subdomainVisits({cpdomains})
    csharp: new Solution().SubdomainVisits({cpdomains})
    kotlin: Solution().subdomainVisits({cpdomains})
    go: subdomainVisits({cpdomains})
    dart: Solution().subdomainVisits({cpdomains})
    swift: Solution().subdomainVisits({cpdomains})
    typescript: subdomainVisits({cpdomains})
judge:
  type: ignore_order
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().subdomainVisits(cpdomains, {result})
    checker:
      "class Checker:\n    def subdomainVisits(self, cpdomains, result):\n\
      \        freq = {}\n        for entry in cpdomains:\n            cnt, dom =\
      \ entry.split()\n            cnt = int(cnt)\n            parts = dom.split('.')\n\
      \            for i in range(len(parts)):\n                sub = '.'.join(parts[i:])\n\
      \                freq[sub] = freq.get(sub, 0) + cnt\n        expected = [f\"\
      {c} {d}\" for d, c in freq.items()]\n        return sorted(expected) == sorted(result)\n"
seed: 811
