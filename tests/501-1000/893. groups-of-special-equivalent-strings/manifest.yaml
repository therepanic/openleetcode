entry:
  id: 893
  title: groups-of-special-equivalent-strings
  params:
    words:
      type: array
      items:
        type: string
  call:
    cpp: Solution().numSpecialEquivGroups({words})
    rust: Solution::num_special_equiv_groups({words})
    python3: Solution().numSpecialEquivGroups({words})
    python2: Solution().numSpecialEquivGroups({words})
    ruby: num_special_equiv_groups({words})
    java: new Solution().numSpecialEquivGroups({words})
    csharp: new Solution().NumSpecialEquivGroups({words})
    kotlin: Solution().numSpecialEquivGroups({words})
    go: numSpecialEquivGroups({words})
    dart: Solution().numSpecialEquivGroups({words})
    swift: Solution().numSpecialEquivGroups({words})
    typescript: numSpecialEquivGroups({words})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().numSpecialEquivGroups(words, {result})
    checker: |
      class Checker:
          def numSpecialEquivGroups(self, words, result):
              seen = set()
              for w in words:
                  seen.add(("".join(sorted(w[0::2])), "".join(sorted(w[1::2]))))
              return len(seen) == result
seed: 893
