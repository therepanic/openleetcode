  title: second-minimum-node-in-a-binary-tree
  params:
    root:
      type: tree_node
  call:
    cpp: "Solution().findSecondMinimumValue({root})"
    rust: "Solution::find_second_minimum_value({root})"
    python3: "Solution().findSecondMinimumValue({root})"
    python2: "Solution().findSecondMinimumValue({root})"
    ruby: "find_second_minimum_value({root})"
    java: "new Solution().findSecondMinimumValue({root})"
    csharp: "new Solution().FindSecondMinimumValue({root})"
    kotlin: "Solution().findSecondMinimumValue({root})"
    go: "findSecondMinimumValue({root})"
    dart: "Solution().findSecondMinimumValue({root})"
    swift: "Solution().findSecondMinimumValue({root})"
    typescript: "findSecondMinimumValue({root})"
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: "Checker().findSecondMinimumValue(root, {result})"
    checker: |
      class Checker:
          def _second_min(self, node):
              vals = []
              stack = [node]
              while stack:
                  cur = stack.pop()
                  if cur is None:
                      continue
                  if isinstance(cur, list):
                      vals.extend(v for v in cur if v is not None)
                      continue
                  if hasattr(cur, "val"):
                      vals.append(cur.val)
                      stack.append(getattr(cur, "left", None))
                      stack.append(getattr(cur, "right", None))
                  else:
                      vals.append(cur)
              if not vals:
                  return -1
              first = min(vals)
              second = min((v for v in vals if v > first), default=None)
              return -1 if second is None else second

          def findSecondMinimumValue(self, root, result):
              if not isinstance(result, int):
                  return False
              return result == self._second_min(root)
