entry:
  id: 563
  title: binary-tree-tilt
  params:
    root:
      type: tree_node
  call:
    cpp: "Solution().findTilt({root})"
    rust: "Solution::find_tilt({root})"
    python3: "Solution().findTilt({root})"
    python2: "Solution().findTilt({root})"
    ruby: "find_tilt({root})"
    java: "new Solution().findTilt({root})"
    csharp: "new Solution().FindTilt({root})"
    kotlin: "Solution().findTilt({root})"
    go: "findTilt({root})"
    dart: "Solution().findTilt({root})"
    swift: "Solution().findTilt({root})"
    typescript: "findTilt({root})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().findTilt(root, {result})"
    checker: |
      class Checker:
          def findTilt(self, root, result):
              if not isinstance(result, int):
                  return False
              total = 0
              def dfs(node):
                  nonlocal total
                  if node is None:
                      return 0
                  left = dfs(node.left)
                  right = dfs(node.right)
                  total += abs(left - right)
                  return left + right + node.val
              dfs(root)
              return total == result
seed: 563
