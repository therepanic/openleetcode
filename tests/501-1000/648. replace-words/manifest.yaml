entry:
  id: 648
  title: replace-words
  params:
    dictionary:
      type: array
      items:
        type: string
    sentence:
      type: string
  call:
    cpp: "Solution().replaceWords({dictionary}, {sentence})"
    rust: "Solution::replace_words({dictionary}, {sentence})"
    python3: "Solution().replaceWords({dictionary}, {sentence})"
    python2: "Solution().replaceWords({dictionary}, {sentence})"
    ruby: "replace_words({dictionary}, {sentence})"
    java: "new Solution().replaceWords({dictionary}, {sentence})"
    csharp: "new Solution().ReplaceWords({dictionary}, {sentence})"
    kotlin: "Solution().replaceWords({dictionary}, {sentence})"
    go: "replaceWords({dictionary}, {sentence})"
    dart: "Solution().replaceWords({dictionary}, {sentence})"
    swift: "Solution().replaceWords({dictionary}, {sentence})"
    typescript: "replaceWords({dictionary}, {sentence})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().replaceWords(dictionary, sentence, {result})"
    checker: |
      class Checker:
          def _replace(self, dictionary, sentence):
              trie = {}
              end = "*"
              for word in dictionary:
                  node = trie
                  for ch in word:
                      if ch not in node:
                          node[ch] = {}
                      node = node[ch]
                  node[end] = True
              out = []
              for word in sentence.split(" "):
                  node = trie
                  rep = word
                  for i, ch in enumerate(word):
                      if end in node:
                          rep = word[:i]
                          break
                      if ch not in node:
                          break
                      node = node[ch]
                  else:
                      if end in node:
                          rep = word
                  out.append(rep)
              return " ".join(out)

          def replaceWords(self, dictionary, sentence, result):
              return self._replace(dictionary, sentence) == result
seed: 648
