    goal:
      type: int
    k:
      type: int
  call:
    cpp: "Solution().numMusicPlaylists({n}, {goal}, {k})"
    rust: "Solution::num_music_playlists({n}, {goal}, {k})"
    python3: "Solution().numMusicPlaylists({n}, {goal}, {k})"
    python2: "Solution().numMusicPlaylists({n}, {goal}, {k})"
    ruby: "num_music_playlists({n}, {goal}, {k})"
    java: "new Solution().numMusicPlaylists({n}, {goal}, {k})"
    csharp: "new Solution().NumMusicPlaylists({n}, {goal}, {k})"
    kotlin: "Solution().numMusicPlaylists({n}, {goal}, {k})"
    go: "numMusicPlaylists({n}, {goal}, {k})"
    dart: "Solution().numMusicPlaylists({n}, {goal}, {k})"
