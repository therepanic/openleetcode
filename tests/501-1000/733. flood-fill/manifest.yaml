  memory_mb: 256
oracle:
  python3:
    call: Checker().floodFill(image, sr, sc, color, {result})
    checker: |
      class Checker:
          def floodFill(self, image, sr, sc, color, result):
              if not isinstance(image, list) or not image:
                  return False
              if not all(isinstance(row, list) and row for row in image):
                  return False
              m = len(image)
              n = len(image[0])
              if not all(len(row) == n for row in image):
                  return False
              if not isinstance(result, list) or len(result) != m:
                  return False
              for row in result:
                  if not isinstance(row, list) or len(row) != n:
                      return False
                  for val in row:
                      if not isinstance(val, int):
                          return False

              expected = [row[:] for row in image]
              old = expected[sr][sc]
              if old != color:
                  stack = [(sr, sc)]
                  while stack:
                      i, j = stack.pop()
                      if i < 0 or i >= m or j < 0 or j >= n or expected[i][j] != old:
                          continue
                      expected[i][j] = color
                      stack.append((i + 1, j))
                      stack.append((i - 1, j))
                      stack.append((i, j + 1))
                      stack.append((i, j - 1))

              return result == expected
