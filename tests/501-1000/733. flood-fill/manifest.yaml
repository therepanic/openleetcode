  title: flood-fill
  params:
    image:
      type: array
      items:
        type: array
        items:
          type: int
    sr:
      type: int
    sc:
      type: int
    color:
      type: int
  call:
    cpp: Solution().floodFill({image}, {sr}, {sc}, {color})
    rust: Solution::flood_fill({image}, {sr}, {sc}, {color})
    python3: Solution().floodFill({image}, {sr}, {sc}, {color})
    python2: Solution().floodFill({image}, {sr}, {sc}, {color})
    ruby: flood_fill({image}, {sr}, {sc}, {color})
    java: new Solution().floodFill({image}, {sr}, {sc}, {color})
    csharp: new Solution().FloodFill({image}, {sr}, {sc}, {color})
    kotlin: Solution().floodFill({image}, {sr}, {sc}, {color})
    go: floodFill({image}, {sr}, {sc}, {color})
    dart: Solution().floodFill({image}, {sr}, {sc}, {color})
    swift: Solution().floodFill({image}, {sr}, {sc}, {color})
    typescript: floodFill({image}, {sr}, {sc}, {color})
judge:
  type: exact
limits:
