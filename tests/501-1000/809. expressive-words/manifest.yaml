entry:
  id: 809
  title: expressive-words
  params:
    s:
      type: string
    words:
      type: array
      items:
        type: string
  call:
    cpp: Solution().expressiveWords({s}, {words})
    rust: Solution::expressive_words({s}, {words})
    python3: Solution().expressiveWords({s}, {words})
    python2: Solution().expressiveWords({s}, {words})
    ruby: expressive_words({s}, {words})
    java: new Solution().expressiveWords({s}, {words})
    csharp: new Solution().ExpressiveWords({s}, {words})
    kotlin: Solution().expressiveWords({s}, {words})
    go: expressiveWords({s}, {words})
    dart: Solution().expressiveWords({s}, {words})
    swift: Solution().expressiveWords({s}, {words})
    typescript: expressiveWords({s}, {words})
judge:
  type: ignore_order
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().expressiveWords(s, words, {result})
    checker:
      "class Checker:\n    def expressiveWords(self, s, words, result):\n \
      \       def encode(x):\n            chars, cnts = [], []\n            prev =\
      \ None\n            cnt = 0\n            for ch in x:\n                if ch\
      \ == prev:\n                    cnt += 1\n                else:\n          \
      \          if prev is not None:\n                        chars.append(prev)\n\
      \                        cnts.append(cnt)\n                    prev = ch\n \
      \                   cnt = 1\n            chars.append(prev)\n            cnts.append(cnt)\n\
      \            return chars, cnts\n\n        s_chars, s_cnts = encode(s)\n   \
      \     expected = 0\n        for w in words:\n            w_chars, w_cnts = encode(w)\n\
      \            if w_chars != s_chars:\n                continue\n            ok\
      \ = True\n            for sc, wc in zip(s_cnts, w_cnts):\n                if\
      \ sc < wc or (sc < 3 and sc != wc):\n                    ok = False\n      \
      \              break\n            if ok:\n                expected += 1\n  \
      \      return expected == result\n"
seed: 809
