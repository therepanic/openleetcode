entry:
  id: 689
  title: maximum-sum-of-3-non-overlapping-subarrays
  params:
    nums:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: Solution().maxSumOfThreeSubarrays({nums}, {k})
    rust: Solution::max_sum_of_three_subarrays({nums}, {k})
    python3: Solution().maxSumOfThreeSubarrays({nums}, {k})
    python2: Solution().maxSumOfThreeSubarrays({nums}, {k})
    ruby: max_sum_of_three_subarrays({nums}, {k})
    java: new Solution().maxSumOfThreeSubarrays({nums}, {k})
    csharp: new Solution().MaxSumOfThreeSubarrays({nums}, {k})
    kotlin: Solution().maxSumOfThreeSubarrays({nums}, {k})
    go: maxSumOfThreeSubarrays({nums}, {k})
    dart: Solution().maxSumOfThreeSubarrays({nums}, {k})
    swift: Solution().maxSumOfThreeSubarrays({nums}, {k})
    typescript: maxSumOfThreeSubarrays({nums}, {k})
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 512
oracle:
  python3:
    call: Checker().maxSumOfThreeSubarrays(nums, k, {result})
    checker: |
      class Checker:
          def maxSumOfThreeSubarrays(self, nums, k, result):
              if not isinstance(result, list) or len(result) != 3:
                  return False
              if any((not isinstance(x, int)) for x in result):
                  return False
              i, j, l = result
              if not (0 <= i < j < l):
                  return False
              if j - i < k or l - j < k:
                  return False
              n = len(nums)
              if l + k > n:
                  return False
              if k <= 0 or 3 * k > n:
                  return False

              sum1 = sum(nums[:k])
              sum2 = sum(nums[k:2 * k])
              sum3 = sum(nums[2 * k:3 * k])

              max1 = sum1
              max12 = sum1 + sum2
              max123 = sum1 + sum2 + sum3

              index1 = 0
              index12_1 = 0
              index12_2 = k
              ans = [0, k, 2 * k]

              for idx in range(1, n - 3 * k + 1):
                  sum1 = sum1 - nums[idx - 1] + nums[idx + k - 1]
                  sum2 = sum2 - nums[idx + k - 1] + nums[idx + 2 * k - 1]
                  sum3 = sum3 - nums[idx + 2 * k - 1] + nums[idx + 3 * k - 1]

                  if sum1 > max1:
                      max1 = sum1
                      index1 = idx

                  if max1 + sum2 > max12:
                      max12 = max1 + sum2
                      index12_1 = index1
                      index12_2 = idx + k

                  if max12 + sum3 > max123:
                      max123 = max12 + sum3
                      ans = [index12_1, index12_2, idx + 2 * k]

              return result == ans
seed: 689
