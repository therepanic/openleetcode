oracle:
  python3:
    call: Checker().check(ring, key, {result})
    checker:
      "from functools import lru_cache\n\nclass Checker:\n    def check(self,\
      \ ring, key, result):\n        if not isinstance(result, int):\n           \
      \ return False\n        positions = {}\n        for i, ch in enumerate(ring):\n\
      \            positions.setdefault(ch, []).append(i)\n        n = len(ring)\n\
      \n        @lru_cache(None)\n        def dp(pos, idx):\n            if idx ==\
      \ len(key):\n                return 0\n            best = 10 ** 18\n       \
      \     for j in positions[key[idx]]:\n                dist = abs(j - pos)\n \
      \               step = min(dist, n - dist)\n                best = min(best,\
      \ step + 1 + dp(j, idx + 1))\n            return best\n\n        return result\
      \ == dp(0, 0)\n"
