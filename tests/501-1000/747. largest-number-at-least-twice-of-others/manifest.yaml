entry:
  id: 747
  title: largest-number-at-least-twice-of-others
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().dominantIndex({nums})"
    rust: "Solution::dominant_index({nums})"
    python3: "Solution().dominantIndex({nums})"
    python2: "Solution().dominantIndex({nums})"
    ruby: "dominant_index({nums})"
    java: "new Solution().dominantIndex({nums})"
    csharp: "new Solution().DominantIndex({nums})"
    kotlin: "Solution().dominantIndex({nums})"
    go: "dominantIndex({nums})"
    dart: "Solution().dominantIndex({nums})"
    swift: "Solution().dominantIndex({nums})"
    typescript: "dominantIndex({nums})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().dominantIndex(nums, {result})"
    checker: |
      class Checker:
          def dominantIndex(self, nums, result):
              if not isinstance(nums, list):
                  return False
              if len(nums) < 2 or len(nums) > 50:
                  return False
              if not isinstance(result, int):
                  return False
              if any((not isinstance(x, int)) or x < 0 or x > 100 for x in nums):
                  return False
              max_value = max(nums)
              if nums.count(max_value) != 1:
                  return False
              max_index = nums.index(max_value)
              second = max(x for i, x in enumerate(nums) if i != max_index)
              expected = max_index if max_value >= 2 * second else -1
              return result == expected
seed: 747
