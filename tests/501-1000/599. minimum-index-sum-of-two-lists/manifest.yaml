entry:
  id: 599
  title: minimum-index-sum-of-two-lists
  params:
    list1:
      type: array
      items:
        type: string
    list2:
      type: array
      items:
        type: string
  call:
    cpp: Solution().findRestaurant({list1}, {list2})
    rust: Solution::find_restaurant({list1}, {list2})
    python3: Solution().findRestaurant({list1}, {list2})
    python2: Solution().findRestaurant({list1}, {list2})
    ruby: find_restaurant({list1}, {list2})
    java: new Solution().findRestaurant({list1}, {list2})
    csharp: new Solution().FindRestaurant({list1}, {list2})
    kotlin: Solution().findRestaurant({list1}, {list2})
    go: findRestaurant({list1}, {list2})
    dart: Solution().findRestaurant({list1}, {list2})
    swift: Solution().findRestaurant({list1}, {list2})
    typescript: findRestaurant({list1}, {list2})
judge:
  type: ignore_order
limits:
  time_ms: 200
  memory_mb: 256
oracle:
  python3:
    call: Checker().findRestaurant(list1, list2, {result})
    checker:
      "from typing import Any, List\nclass Checker:\n    def findRestaurant(self,\
      \ list1: List[str], list2: List[str], result: Any) -> bool:\n        if not\
      \ isinstance(result, list):\n            return False\n        pos1 = {s: i\
      \ for i, s in enumerate(list1)}\n        pos2 = {s: i for i, s in enumerate(list2)}\n\
      \        common = [s for s in list1 if s in pos2]\n        if not common:\n\
      \            return False\n        best = min(pos1[s] + pos2[s] for s in common)\n\
      \        expected = {s for s in common if pos1[s] + pos2[s] == best}\n     \
      \   return set(result) == expected and len(result) == len(expected)\n"
seed: 599
tests:
  - name: example-1
    in:
      list1:
        - Shogun
        - Tapioca Express
        - Burger King
        - KFC
      list2:
        - Piatti
        - The Grill at Torrey Pines
        - Hungry Hunter Steakhouse
        - Shogun
    out:
      - Shogun
