entry:
  id: 844
  title: backspace-string-compare
  params:
    s:
      type: string
    t:
      type: string
  call:
    cpp: Solution().backspaceCompare({s}, {t})
    rust: Solution::backspace_compare({s}, {t})
    python3: Solution().backspaceCompare({s}, {t})
    python2: Solution().backspaceCompare({s}, {t})
    ruby: backspace_compare({s}, {t})
    java: new Solution().backspaceCompare({s}, {t})
    csharp: new Solution().BackspaceCompare({s}, {t})
    kotlin: Solution().backspaceCompare({s}, {t})
    go: backspaceCompare({s}, {t})
    dart: Solution().backspaceCompare({s}, {t})
    swift: Solution().backspaceCompare({s}, {t})
    typescript: backspaceCompare({s}, {t})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().backspaceCompare(s, t, {result})
    checker:
      "class Checker:\n    def _reduce(self, text):\n        stack = []\n \
      \       for ch in text:\n            if ch == '#':\n                if stack:\n\
      \                    stack.pop()\n            else:\n                stack.append(ch)\n\
      \        return ''.join(stack)\n\n    def backspaceCompare(self, s, t, result):\n\
      \        if not isinstance(result, bool):\n            return False\n      \
      \  return result == (self._reduce(s) == self._reduce(t))\n"
seed: 844844
