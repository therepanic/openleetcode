judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().insertIntoBST(root, val, {result})"
    checker: |
      from collections import deque
      from typing import Any

      class Checker:
          def insertIntoBST(self, root: Any, val: int, result: Any) -> bool:
              def node_val(node):
                  if node is None:
                      return None
                  if isinstance(node, dict):
                      return node.get("val", node.get("value"))
                  return getattr(node, "val", getattr(node, "value", None))

              def node_left(node):
                  if node is None:
                      return None
                  if isinstance(node, dict):
                      return node.get("left")
                  return getattr(node, "left", None)

              def node_right(node):
                  if node is None:
                      return None
                  if isinstance(node, dict):
                      return node.get("right")
                  return getattr(node, "right", None)

              def is_tree_object(node):
                  return node is None or hasattr(node, "val") or isinstance(node, dict)

              def normalize_tree(obj):
                  if obj is None:
                      return None
                  if isinstance(obj, list):
                      if not obj or obj[0] is None:
                          return None
                      nodes = [None if x is None else {"val": x, "left": None, "right": None} for x in obj]
                      q = deque([0])
                      idx = 1
                      while q and idx < len(nodes):
                          cur = q.popleft()
                          if nodes[cur] is None:
                              continue
                          if idx < len(nodes):
                              if nodes[idx] is not None:
                                  nodes[cur]["left"] = idx
                                  q.append(idx)
                              idx += 1
                          if idx < len(nodes):
                              if nodes[idx] is not None:
                                  nodes[cur]["right"] = idx
                                  q.append(idx)
                              idx += 1

                      def rec(i):
                          if i is None:
                              return None
                          n = nodes[i]
                          if n is None:
                              return None
                          return {"val": n["val"], "left": rec(n["left"]), "right": rec(n["right"])}

                      return rec(0)
                  if is_tree_object(obj):
                      v = node_val(obj)
                      if v is None:
                          return None
                      return {
                          "val": v,
                          "left": normalize_tree(node_left(obj)),
                          "right": normalize_tree(node_right(obj)),
                      }
                  return None

              def inorder(node):
                  if node is None:
                      return []
                  return inorder(node["left"]) + [node["val"]] + inorder(node["right"])

              def validate_bst(node, lo, hi):
                  if node is None:
                      return True
                  v = node["val"]
                  if not (lo < v < hi):
                      return False
                  return validate_bst(node["left"], lo, v) and validate_bst(node["right"], v, hi)

              def values_set(node):
                  if node is None:
                      return set()
                  return {node["val"]} | values_set(node["left"]) | values_set(node["right"])

              def count(node):
                  if node is None:
                      return 0
                  return 1 + count(node["left"]) + count(node["right"])

              input_tree = normalize_tree(root)
              output_tree = normalize_tree(result)
              if output_tree is None:
                  return False
              if not validate_bst(output_tree, float("-inf"), float("inf")):
                  return False
              if input_tree is not None and not validate_bst(input_tree, float("-inf"), float("inf")):
                  return False

              input_values = values_set(input_tree)
              output_values = values_set(output_tree)
              if val in input_values:
                  return False
              if output_values != (input_values | {val}):
                  return False
              if count(output_tree) != count(input_tree) + 1:
                  return False
              if inorder(output_tree) != sorted(output_values):
                  return False
              return True
seed: 701
