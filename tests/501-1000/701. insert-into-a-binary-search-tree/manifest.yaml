    java: "TreeNode.treeNodeToArray(new Solution().insertIntoBST({root}, {val}))"
    csharp: "TreeNode.TreeNodeToArray(new Solution().InsertIntoBST({root}, {val}))"
    kotlin: "treeNodeToArray(Solution().insertIntoBST({root}, {val}))"
    go: "treeNodeToArray(insertIntoBST({root}, {val}))"
    dart: "tree_node_to_array(Solution().insertIntoBST({root}, {val}))"
