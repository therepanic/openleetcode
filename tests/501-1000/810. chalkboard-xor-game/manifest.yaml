entry:
  id: 810
  title: chalkboard-xor-game
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: Solution().xorGame({nums})
    rust: Solution::xor_game({nums})
    python3: Solution().xorGame({nums})
    python2: Solution().xorGame({nums})
    ruby: xor_game({nums})
    java: new Solution().xorGame({nums})
    csharp: new Solution().XorGame({nums})
    kotlin: Solution().xorGame({nums})
    go: xorGame({nums})
    dart: Solution().xorGame({nums})
    swift: Solution().xorGame({nums})
    typescript: xorGame({nums})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().xorGame(nums, {result})
    checker:
      "class Checker:\n    def xorGame(self, nums, result):\n        total\
      \ = 0\n        for value in nums:\n            total ^= value\n        expected\
      \ = (total == 0) or (len(nums) % 2 == 0)\n        return result == expected\n"
seed: 810
