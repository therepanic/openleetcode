      type: array
      items:
        type: int
  call:
    cpp: "Solution().pivotIndex({nums})"
    rust: "Solution::pivot_index({nums})"
    python3: "Solution().pivotIndex({nums})"
    python2: "Solution().pivotIndex({nums})"
    ruby: "pivot_index({nums})"
    java: "new Solution().pivotIndex({nums})"
    csharp: "new Solution().PivotIndex({nums})"
    kotlin: "Solution().pivotIndex({nums})"
    go: "pivotIndex({nums})"
    dart: "Solution().pivotIndex({nums})"
    swift: "Solution().pivotIndex({nums})"
