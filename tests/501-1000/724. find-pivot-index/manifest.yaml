judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().pivotIndex(nums, {result})"
    checker: |
      class Checker:
          def pivotIndex(self, nums, result):
              if not isinstance(result, int):
                  return False
              n = len(nums)
              if result < -1 or result >= n:
                  return False
              total = sum(nums)
              if result == -1:
                  left = 0
                  for x in nums:
                      if left == total - left - x:
                          return False
                      left += x
                  return True
              left = sum(nums[:result])
              right = total - left - nums[result]
              if left != right:
                  return False
              running = 0
              for i, x in enumerate(nums):
                  if i >= result:
                      break
                  if running == total - running - x:
                      return False
                  running += x
              return True
