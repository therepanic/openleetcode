entry:
  id: 546
  title: remove-boxes
  params:
    boxes:
      type: array
      items:
        type: int
  call:
    cpp: Solution().removeBoxes({boxes})
    rust: Solution::remove_boxes({boxes})
    python3: Solution().removeBoxes({boxes})
    python2: Solution().removeBoxes({boxes})
    ruby: remove_boxes({boxes})
    java: new Solution().removeBoxes({boxes})
    csharp: new Solution().RemoveBoxes({boxes})
    kotlin: Solution().removeBoxes({boxes})
    go: removeBoxes({boxes})
    dart: Solution().removeBoxes({boxes})
    swift: Solution().removeBoxes({boxes})
    typescript: removeBoxes({boxes})
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(boxes, {result})
    checker:
      "from functools import lru_cache\nfrom itertools import groupby\n\nclass\
      \ Checker:\n    def check(self, boxes, result):\n        if not isinstance(result,\
      \ int):\n            return False\n\n        groups = tuple((color, len(list(group)))\
      \ for color, group in groupby(boxes))\n\n        @lru_cache(None)\n        def\
      \ solve(state):\n            if not state:\n                return 0\n     \
      \       (left_color, left_len), rest = state[0], state[1:]\n            best\
      \ = left_len * left_len + solve(rest)\n            for idx, (color, length)\
      \ in enumerate(rest):\n                if color != left_color:\n           \
      \         continue\n                merged = ((left_color, left_len + length),)\
      \ + rest[idx + 1:]\n                best = max(best, solve(rest[:idx]) + solve(merged))\n\
      \            return best\n\n        return result == solve(groups)\n"
seed: 546
