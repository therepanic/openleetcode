entry:
  id: 743
  title: "network-delay-time"
  params:
    times:
      type: array
      items:
        type: array
        items:
          type: int
    n:
      type: int
    k:
      type: int
  call:
    cpp: "Solution().networkDelayTime({times}, {n}, {k})"
    rust: "Solution::network_delay_time({times}, {n}, {k})"
    python3: "Solution().networkDelayTime({times}, {n}, {k})"
    python2: "Solution().networkDelayTime({times}, {n}, {k})"
    ruby: "network_delay_time({times}, {n}, {k})"
    java: "new Solution().networkDelayTime({times}, {n}, {k})"
    csharp: "new Solution().NetworkDelayTime({times}, {n}, {k})"
    kotlin: "Solution().networkDelayTime({times}, {n}, {k})"
    go: "networkDelayTime({times}, {n}, {k})"
    dart: "Solution().networkDelayTime({times}, {n}, {k})"
    swift: "Solution().networkDelayTime({times}, {n}, {k})"
    typescript: "networkDelayTime({times}, {n}, {k})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().check(times, n, k, {result})"
    checker: |
      class Checker(object):
          def check(self, times, n, k, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              if not isinstance(n, int) or not isinstance(k, int):
                  return False
              if not (1 <= k <= n <= 100):
                  return False
              if not isinstance(times, list) or not (1 <= len(times) <= 6000):
                  return False

              seen = set()
              for edge in times:
                  if not isinstance(edge, list) or len(edge) != 3:
                      return False
                  u, v, w = edge
                  if any(not isinstance(x, int) or isinstance(x, bool) for x in edge):
                      return False
                  if not (1 <= u <= n and 1 <= v <= n):
                      return False
                  if u == v or not (0 <= w <= 100):
                      return False
                  pair = (u, v)
                  if pair in seen:
                      return False
                  seen.add(pair)

              inf = 10 ** 18
              dist = [inf] * (n + 1)
              dist[k] = 0

              for _ in range(n - 1):
                  changed = False
                  for u, v, w in times:
                      if dist[u] != inf and dist[u] + w < dist[v]:
                          dist[v] = dist[u] + w
                          changed = True
                  if not changed:
                      break

              best = 0
              for node in range(1, n + 1):
                  if dist[node] == inf:
                      return result == -1
                  if dist[node] > best:
                      best = dist[node]
              return result == best

seed: 743

