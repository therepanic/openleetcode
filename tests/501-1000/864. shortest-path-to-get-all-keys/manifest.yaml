entry:
  id: 864
  title: shortest-path-to-get-all-keys
  params:
    grid:
      type: array
      items:
        type: string
  call:
    cpp: "Solution().shortestPathAllKeys({grid})"
    rust: "Solution::shortest_path_all_keys({grid})"
    python3: "Solution().shortestPathAllKeys({grid})"
    python2: "Solution().shortestPathAllKeys({grid})"
    ruby: "shortest_path_all_keys({grid})"
    java: "new Solution().shortestPathAllKeys({grid})"
    csharp: "new Solution().ShortestPathAllKeys({grid})"
    kotlin: "Solution().shortestPathAllKeys({grid})"
    go: "shortestPathAllKeys({grid})"
    dart: "Solution().shortestPathAllKeys({grid})"
    swift: "Solution().shortestPathAllKeys({grid})"
    typescript: "shortestPathAllKeys({grid})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().shortestPathAllKeys(grid, {result})"
    checker: |
      from collections import deque
      class Checker:
          def shortestPathAllKeys(self, grid, result):
              if not isinstance(result, int):
                  return False
              m, n = len(grid), len(grid[0])
              start = None
              total = 0
              for i in range(m):
                  for j, ch in enumerate(grid[i]):
                      if ch == '@': start = (i, j)
                      if 'a' <= ch <= 'f': total += 1
              target = (1 << total) - 1
              q = deque([(start[0], start[1], 0)])
              seen = {(start[0], start[1], 0)}
              d = [(1,0),(-1,0),(0,1),(0,-1)]
              steps = 0
              while q:
                  for _ in range(len(q)):
                      r,c,mask = q.popleft()
                      if mask == target:
                          return result == steps
                      for dr,dc in d:
                          nr,nc = r+dr,c+dc
                          if not (0<=nr<m and 0<=nc<n):
                              continue
                          ch = grid[nr][nc]
                          if ch == '#':
                              continue
                          nmask = mask
                          if 'a' <= ch <= 'f': nmask |= 1 << (ord(ch)-97)
                          if 'A' <= ch <= 'F' and not (nmask & (1 << (ord(ch.lower())-97))):
                              continue
                          st = (nr,nc,nmask)
                          if st not in seen:
                              seen.add(st)
                              q.append(st)
                  steps += 1
              return result == -1

