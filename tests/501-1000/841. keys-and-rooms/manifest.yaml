entry:
  id: 841
  title: keys-and-rooms
  params:
    rooms:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().canVisitAllRooms({rooms})
    rust: Solution::can_visit_all_rooms({rooms})
    python3: Solution().canVisitAllRooms({rooms})
    python2: Solution().canVisitAllRooms({rooms})
    ruby: can_visit_all_rooms({rooms})
    java: new Solution().canVisitAllRooms({rooms})
    csharp: new Solution().CanVisitAllRooms({rooms})
    kotlin: Solution().canVisitAllRooms({rooms})
    go: canVisitAllRooms({rooms})
    dart: Solution().canVisitAllRooms({rooms})
    swift: Solution().canVisitAllRooms({rooms})
    typescript: canVisitAllRooms({rooms})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().canVisitAllRooms(rooms, {result})
    checker: "from collections import deque\n\nclass Checker:\n    def canVisitAllRooms(self, rooms, result):\n        seen = {0}\n        q = deque([0])\n        while q:\n            room = q.popleft()\n            for key in rooms[room]:\n                if key not in seen:\n                    seen.add(key)\n                    q.append(key)\n        return result == (len(seen) == len(rooms))\n"
seed: 841
