entry:
  id: 891
  title: "sum-of-subsequence-widths"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().sumSubseqWidths({nums})"
    rust: "Solution::sum_subseq_widths({nums})"
    python3: "Solution().sumSubseqWidths({nums})"
    python2: "Solution().sumSubseqWidths({nums})"
    ruby: "sum_subseq_widths({nums})"
    java: "new Solution().sumSubseqWidths({nums})"
    csharp: "new Solution().SumSubseqWidths({nums})"
    kotlin: "Solution().sumSubseqWidths({nums})"
    go: "sumSubseqWidths({nums})"
    dart: "Solution().sumSubseqWidths({nums})"
    swift: "Solution().sumSubseqWidths({nums})"
    typescript: "sumSubseqWidths({nums})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 300

oracle:
  python3:
    call: "Checker().sumSubseqWidths(nums, {result})"
    checker: |
      class Checker:
          def sumSubseqWidths(self, nums, result):
              if not isinstance(result, int):
                  return False
              MOD = 1_000_000_007
              nums = sorted(nums)
              n = len(nums)
              pow2 = [1] * n
              for i in range(1, n):
                  pow2[i] = (pow2[i - 1] * 2) % MOD
              ans = 0
              for i, x in enumerate(nums):
                  ans = (ans + x * (pow2[i] - pow2[n - 1 - i])) % MOD
              return ans == result % MOD

seed: 891

