entry:
  id: 551
  title: student-attendance-record-i
  params:
    s:
      type: string
  call:
    cpp: "Solution().checkRecord({s})"
    rust: "Solution::check_record({s})"
    python3: "Solution().checkRecord({s})"
    python2: "Solution().checkRecord({s})"
    ruby: "check_record({s})"
    java: "new Solution().checkRecord({s})"
    csharp: "new Solution().CheckRecord({s})"
    kotlin: "Solution().checkRecord({s})"
    go: "checkRecord({s})"
    dart: "Solution().checkRecord({s})"
    swift: "Solution().checkRecord({s})"
    typescript: "checkRecord({s})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(s, {result})"
    checker: |
      class Checker:
          def check(self, s, result):
              if not isinstance(result, bool):
                  return False
              return result == (s.count("A") < 2 and "LLL" not in s)
seed: 551
