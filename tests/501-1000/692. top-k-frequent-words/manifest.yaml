entry:
  id: 692
  title: top-k-frequent-words
  params:
    words:
      type: array
      items:
        type: string
    k:
      type: int
  call:
    cpp: "Solution().topKFrequent({words}, {k})"
    rust: "Solution::top_k_frequent({words}, {k})"
    python3: "Solution().topKFrequent({words}, {k})"
    python2: "Solution().topKFrequent({words}, {k})"
    ruby: "top_k_frequent({words}, {k})"
    java: "new Solution().topKFrequent({words}, {k})"
    csharp: "new Solution().TopKFrequent({words}, {k})"
    kotlin: "Solution().topKFrequent({words}, {k})"
    go: "topKFrequent({words}, {k})"
    dart: "Solution().topKFrequent({words}, {k})"
    swift: "Solution().topKFrequent({words}, {k})"
    typescript: "topKFrequent({words}, {k})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().topKFrequent(words, k, {result})"
    checker: |
      from collections import Counter

      class Checker:
          def topKFrequent(self, words, k, result):
              if not isinstance(result, list) or len(result) != k:
                  return False
              if any(not isinstance(word, str) for word in result):
                  return False
              counter = Counter(words)
              expected = sorted(counter.items(), key=lambda item: (-item[1], item[0]))
              return result == [word for word, _ in expected[:k]]
seed: 692
