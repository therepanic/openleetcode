entry:
  id: 904
  title: fruit-into-baskets
  params:
    fruits:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().totalFruit({fruits})"
    rust: "Solution::total_fruit({fruits})"
    python3: "Solution().totalFruit({fruits})"
    python2: "Solution().totalFruit({fruits})"
    ruby: "total_fruit({fruits})"
    java: "new Solution().totalFruit({fruits})"
    csharp: "new Solution().TotalFruit({fruits})"
    kotlin: "Solution().totalFruit({fruits})"
    go: "totalFruit({fruits})"
    dart: "Solution().totalFruit({fruits})"
    swift: "Solution().totalFruit({fruits})"
    typescript: "totalFruit({fruits})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().totalFruit(fruits, {result})"
    checker: |
      from collections import defaultdict

      class Checker:
          def totalFruit(self, fruits, result):
              if not isinstance(result, int):
                  return False
              start = 0
              max_len = 0
              fruit_count = defaultdict(int)
              for end in range(len(fruits)):
                  fruit_count[fruits[end]] += 1
                  while len(fruit_count) > 2:
                      fruit_count[fruits[start]] -= 1
                      if fruit_count[fruits[start]] == 0:
                          del fruit_count[fruits[start]]
                      start += 1
                  max_len = max(max_len, end - start + 1)
              return result == max_len
