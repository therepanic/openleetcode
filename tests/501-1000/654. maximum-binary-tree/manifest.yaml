oracle:
  python3:
    call: "Checker().constructMaximumBinaryTree(nums, {result})"
    checker: |
      class Checker:
          def constructMaximumBinaryTree(self, nums, result):
              class Node:
                  __slots__ = ("val", "left", "right")

                  def __init__(self, val):
                      self.val = val
                      self.left = None
                      self.right = None

              stack = []
              for num in nums:
                  current = Node(num)
                  while stack and stack[-1].val < num:
                      current.left = stack.pop()
                  if stack:
                      stack[-1].right = current
                  stack.append(current)

              expected = stack[0] if stack else None

              def serialize(root):
                  from collections import deque

                  if root is None:
                      return []
                  queue = deque([root])
                  out = []
                  while queue:
                      node = queue.popleft()
                      if node is None:
                          out.append(None)
                          continue
                      out.append(node.val)
                      queue.append(node.left)
                      queue.append(node.right)
                  while out and out[-1] is None:
                      out.pop()
                  return out

              return serialize(expected) == result
