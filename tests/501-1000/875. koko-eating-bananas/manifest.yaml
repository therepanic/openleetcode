entry:
  id: 875
  title: koko-eating-bananas
  params:
    piles:
      type: array
      items:
        type: int
    h:
      type: int
  call:
    cpp: "Solution().minEatingSpeed({piles}, {h})"
    rust: "Solution::min_eating_speed({piles}, {h})"
    python3: "Solution().minEatingSpeed({piles}, {h})"
    python2: "Solution().minEatingSpeed({piles}, {h})"
    ruby: "min_eating_speed({piles}, {h})"
    java: "new Solution().minEatingSpeed({piles}, {h})"
    csharp: "new Solution().MinEatingSpeed({piles}, {h})"
    kotlin: "Solution().minEatingSpeed({piles}, {h})"
    go: "minEatingSpeed({piles}, {h})"
    dart: "Solution().minEatingSpeed({piles}, {h})"
    swift: "Solution().minEatingSpeed({piles}, {h})"
    typescript: "minEatingSpeed({piles}, {h})"
judge:
  type: exact
limits:
  time_ms: 400
  memory_mb: 300
oracle:
  python3:
    call: "Checker().minEatingSpeed(piles, h, {result})"
    checker: |
      class Checker:
          def minEatingSpeed(self, piles, h, result: Any) -> bool:
              return isinstance(result, int)
