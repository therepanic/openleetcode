  title: can-place-flowers
  params:
    flowerbed:
      type: array
      items:
        type: int
    n:
      type: int
  call:
    cpp: Solution().canPlaceFlowers({flowerbed}, {n})
    rust: Solution::can_place_flowers({flowerbed}, {n})
    python3: Solution().canPlaceFlowers({flowerbed}, {n})
    python2: Solution().canPlaceFlowers({flowerbed}, {n})
    ruby: can_place_flowers({flowerbed}, {n})
    java: new Solution().canPlaceFlowers({flowerbed}, {n})
    csharp: new Solution().CanPlaceFlowers({flowerbed}, {n})
    kotlin: Solution().canPlaceFlowers({flowerbed}, {n})
    go: canPlaceFlowers({flowerbed}, {n})
    dart: Solution().canPlaceFlowers({flowerbed}, {n})
    swift: Solution().canPlaceFlowers({flowerbed}, {n})
    typescript: canPlaceFlowers({flowerbed}, {n})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 256
oracle:
  python3:
    call: Checker().canPlaceFlowers(flowerbed, n, {result})
    checker:
      "from typing import Any, List\nclass Checker:\n    def canPlaceFlowers(self,\
      \ flowerbed: List[int], n: int, result: Any) -> bool:\n        if not isinstance(result,\
      \ bool):\n            return False\n        fb = flowerbed[:]\n        if n\
      \ == 0:\n            return result is True\n        length = len(fb)\n     \
      \   for i in range(length):\n            if fb[i] == 0:\n                left\
      \ = (i == 0) or (fb[i - 1] == 0)\n                right = (i == length - 1)\
      \ or (fb[i + 1] == 0)\n                if left and right:\n                \
      \    fb[i] = 1\n                    n -= 1\n                    if n == 0:\n\
      \                        return result is True\n        return result is False\n"
seed: 605
