entry:
  id: 709
  title: to-lower-case
  params:
    s:
      type: string
  call:
    cpp: Solution().toLowerCase({s})
    rust: Solution::to_lower_case({s})
    python3: Solution().toLowerCase({s})
    python2: Solution().toLowerCase({s})
    ruby: to_lower_case({s})
    java: new Solution().toLowerCase({s})
    csharp: new Solution().ToLowerCase({s})
    kotlin: Solution().toLowerCase({s})
    go: toLowerCase({s})
    dart: Solution().toLowerCase({s})
    swift: Solution().toLowerCase({s})
    typescript: toLowerCase({s})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().toLowerCase(s, {result})
    checker:
      "class Checker:\n    def toLowerCase(self, s, result):\n        if not\
      \ isinstance(result, str):\n            return False\n        if len(result)\
      \ != len(s):\n            return False\n        for a, b in zip(s, result):\n\
      \            if not isinstance(a, str) or not isinstance(b, str):\n        \
      \        return False\n            if len(a) != 1 or len(b) != 1:\n        \
      \        return False\n        return result == s.lower()\n"
seed: 709
