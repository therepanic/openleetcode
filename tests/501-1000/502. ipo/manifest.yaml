entry:
  id: 502
  title: ipo
  params:
    k:
      type: int
    w:
      type: int
    profits:
      type: array
      items:
        type: int
    capital:
      type: array
      items:
        type: int
  call:
    cpp: Solution().findMaximizedCapital({k}, {w}, {profits}, {capital})
    rust: Solution::find_maximized_capital({k}, {w}, {profits}, {capital})
    python3: Solution().findMaximizedCapital({k}, {w}, {profits}, {capital})
    python2: Solution().findMaximizedCapital({k}, {w}, {profits}, {capital})
    ruby: find_maximized_capital({k}, {w}, {profits}, {capital})
    java: new Solution().findMaximizedCapital({k}, {w}, {profits}, {capital})
    csharp: new Solution().FindMaximizedCapital({k}, {w}, {profits}, {capital})
    kotlin: Solution().findMaximizedCapital({k}, {w}, {profits}, {capital})
    go: findMaximizedCapital({k}, {w}, {profits}, {capital})
    dart: Solution().findMaximizedCapital({k}, {w}, {profits}, {capital})
    swift: Solution().findMaximizedCapital({k}, {w}, {profits}, {capital})
    typescript: findMaximizedCapital({k}, {w}, {profits}, {capital})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().findMaximizedCapital(k, w, profits, capital, {result})
    checker:
      "import heapq\n\nclass Checker:\n    def findMaximizedCapital(self, k,\
      \ w, profits, capital, result):\n        projects = sorted(zip(capital, profits))\n\
      \        heap = []\n        i = 0\n        for _ in range(k):\n            while\
      \ i < len(projects) and projects[i][0] <= w:\n                heapq.heappush(heap,\
      \ -projects[i][1])\n                i += 1\n            if not heap:\n     \
      \           break\n            w -= heapq.heappop(heap)\n        return w ==\
      \ result\n"
seed: 502
