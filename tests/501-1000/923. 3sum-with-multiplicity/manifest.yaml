entry:
  id: 923
  title: 3sum-with-multiplicity
  params:
    arr:
      type: array
      items:
        type: int
    target:
      type: int
  call:
    cpp: "Solution().threeSumMulti({arr}, {target})"
    rust: "Solution::three_sum_multi({arr}, {target})"
    python3: "Solution().threeSumMulti({arr}, {target})"
    python2: "Solution().threeSumMulti({arr}, {target})"
    ruby: "three_sum_multi({arr}, {target})"
    java: "new Solution().threeSumMulti({arr}, {target})"
    csharp: "new Solution().ThreeSumMulti({arr}, {target})"
    kotlin: "Solution().threeSumMulti({arr}, {target})"
    go: "threeSumMulti({arr}, {target})"
    dart: "Solution().threeSumMulti({arr}, {target})"
    swift: "Solution().threeSumMulti({arr}, {target})"
    typescript: "threeSumMulti({arr}, {target})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().threeSumMulti(arr, target, {result})"
    checker: |
      class Checker:
          def threeSumMulti(self, arr, target, result):
              mod = 10 ** 9 + 7
              n = len(arr)
              count = 0
              for i in range(n):
                  for j in range(i + 1, n):
                      for k in range(j + 1, n):
                          if arr[i] + arr[j] + arr[k] == target:
                              count += 1
              return result == count % mod
seed: 923
