    python2: "Solution().possibleBipartition({n}, {dislikes})"
    ruby: "possible_bipartition({n}, {dislikes})"
    java: "new Solution().possibleBipartition({n}, {dislikes})"
    csharp: "new Solution().PossibleBipartition({n}, {dislikes})"
    kotlin: "Solution().possibleBipartition({n}, {dislikes})"
    go: "possibleBipartition({n}, {dislikes})"
    dart: "Solution().possibleBipartition({n}, {dislikes})"
