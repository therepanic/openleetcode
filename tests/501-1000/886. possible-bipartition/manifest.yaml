judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().possibleBipartition(n, dislikes, {result})"
    checker: |
      from collections import deque

      class Checker:
          def possibleBipartition(self, n, dislikes, result):
              graph = [[] for _ in range(n + 1)]
              for a, b in dislikes:
                  graph[a].append(b)
                  graph[b].append(a)
              color = [0] * (n + 1)
              for start in range(1, n + 1):
                  if color[start] != 0:
                      continue
                  color[start] = 1
                  q = deque([start])
                  while q:
                      node = q.popleft()
                      for nb in graph[node]:
                          if color[nb] == color[node]:
                              return result is False
                          if color[nb] == 0:
                              color[nb] = -color[node]
                              q.append(nb)
              return result is True

