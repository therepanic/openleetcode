entry:
  id: 721
  title: "accounts-merge"
  params:
    accounts:
      type: array
      items:
        type: array
        items:
          type: string
  call:
    cpp: "Solution().accountsMerge({accounts})"
    rust: "Solution::accounts_merge({accounts})"
    python3: "Solution().accountsMerge({accounts})"
    python2: "Solution().accountsMerge({accounts})"
    ruby: "accounts_merge({accounts})"
    java: "new Solution().accountsMerge({accounts})"
    csharp: "new Solution().AccountsMerge({accounts})"
    kotlin: "Solution().accountsMerge({accounts})"
    go: "accountsMerge({accounts})"
    dart: "Solution().accountsMerge({accounts})"
    swift: "Solution().accountsMerge({accounts})"
    typescript: "accountsMerge({accounts})"

judge:
  type: "exact"

limits:
  time_ms: 2500
  memory_mb: 512

oracle:
  python3:
    call: "Checker().accountsMerge(accounts, {result})"
    checker: |
      from collections import defaultdict
      import json

      class Checker:
          def accountsMerge(self, accounts, result):
              if isinstance(result, str):
                  try:
                      result = json.loads(result)
                  except Exception:
                      return False
              if not isinstance(accounts, list) or not isinstance(result, list):
                  return False

              try:
                  expected = self._canonical(self._merge(accounts))
                  actual = self._canonical(self._normalize_result(result))
              except Exception:
                  return False
              return expected == actual

          def _normalize_result(self, result):
              normalized = []
              for account in result:
                  if not isinstance(account, list) or len(account) < 2:
                      raise ValueError
                  if not all(isinstance(item, str) for item in account):
                      raise ValueError
                  name = account[0]
                  emails = account[1:]
                  if emails != sorted(emails):
                      raise ValueError
                  if len(set(emails)) != len(emails):
                      raise ValueError
                  normalized.append([name] + emails)
              return normalized

          def _merge(self, accounts):
              parent = {}
              owner = {}

              def find(x):
                  parent.setdefault(x, x)
                  if parent[x] != x:
                      parent[x] = find(parent[x])
                  return parent[x]

              def union(a, b):
                  ra = find(a)
                  rb = find(b)
                  if ra != rb:
                      parent[rb] = ra

              for account in accounts:
                  if not isinstance(account, list) or len(account) < 2:
                      raise ValueError
                  if not all(isinstance(item, str) for item in account):
                      raise ValueError
                  name = account[0]
                  emails = account[1:]
                  first = emails[0]
                  for email in emails:
                      if email in owner and owner[email] != name:
                          raise ValueError
                      owner[email] = name
                      find(email)
                      union(first, email)

              groups = defaultdict(list)
              for email in owner:
                  groups[find(email)].append(email)

              merged = []
              for root, emails in groups.items():
                  merged.append([owner[root]] + sorted(emails))
              return merged

          def _canonical(self, accounts):
              return sorted((account[0], tuple(account[1:])) for account in accounts)

