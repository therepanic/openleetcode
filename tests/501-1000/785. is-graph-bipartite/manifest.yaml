entry:
  id: 785
  title: is-graph-bipartite
  params:
    graph:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().isBipartite({graph})
    rust: Solution::is_bipartite({graph})
    python3: Solution().isBipartite({graph})
    python2: Solution().isBipartite({graph})
    ruby: is_bipartite({graph})
    java: new Solution().isBipartite({graph})
    csharp: new Solution().IsBipartite({graph})
    kotlin: Solution().isBipartite({graph})
    go: isBipartite({graph})
    dart: Solution().isBipartite({graph})
    swift: Solution().isBipartite({graph})
    typescript: isBipartite({graph})

judge:
  type: exact

limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().isBipartite(graph, {result})
    checker: |
      class Checker(object):
          def isBipartite(self, graph, result):
              return isinstance(result, bool)

seed: 785

tests:
  - name: example-1
    in:
      graph:
        - [1, 2, 3]
        - [0, 2]
        - [0, 1, 3]
        - [0, 2]
    out: false
  - name: example-2
    in:
      graph:
        - [1, 3]
        - [0, 2]
        - [1, 3]
        - [0, 2]
    out: true
  - name: single-node
    in:
      graph:
        - []
    out: true
  - name: two-nodes-edge
    in:
      graph:
        - [1]
        - [0]
    out: true
  - name: triangle
    in:
      graph:
        - [1, 2]
        - [0, 2]
        - [0, 1]
    out: false
  - name: path-4
    in:
      graph:
        - [1]
        - [0, 2]
        - [1, 3]
        - [2]
    out: true
  - name: square-with-diagonal
    in:
      graph:
        - [1, 3]
        - [0, 2, 3]
        - [1, 3]
        - [0, 1, 2]
    out: false
  - name: disconnected-two-edges
    in:
      graph:
        - [1]
        - [0]
        - [3]
        - [2]
    out: true
  - name: disconnected-edge-and-isolated
    in:
      graph:
        - [1]
        - [0]
        - []
        - []
    out: true
  - name: isolated-only
    in:
      graph:
        - []
        - []
        - []
    out: true
  - name: odd-cycle-5
    in:
      graph:
        - [1, 4]
        - [0, 2]
        - [1, 3]
        - [2, 4]
        - [0, 3]
    out: false
  - name: even-cycle-6
    in:
      graph:
        - [1, 5]
        - [0, 2]
        - [1, 3]
        - [2, 4]
        - [3, 5]
        - [0, 4]
    out: true
  - name: star-6
    in:
      graph:
        - [1, 2, 3, 4, 5]
        - [0]
        - [0]
        - [0]
        - [0]
        - [0]
    out: true
  - name: complete-bipartite-k23
    in:
      graph:
        - [2, 3, 4]
        - [2, 3, 4]
        - [0, 1]
        - [0, 1]
        - [0, 1]
    out: true
  - name: complete-graph-k4
    in:
      graph:
        - [1, 2, 3]
        - [0, 2, 3]
        - [0, 1, 3]
        - [0, 1, 2]
    out: false
  - name: cycle-4-plus-isolated
    in:
      graph:
        - [1, 3]
        - [0, 2]
        - [1, 3]
        - [0, 2]
        - []
    out: true
  - name: odd-cycle-plus-isolated
    in:
      graph:
        - [1, 2]
        - [0, 2]
        - [0, 1]
        - []
    out: false
  - name: two-components-one-bad
    in:
      graph:
        - [1, 2]
        - [0, 2]
        - [0, 1]
    out: false
  - name: two-components-both-good
    in:
      graph:
        - [1]
        - [0]
        - [3, 4]
        - [2]
        - [2]
    out: true
  - name: long-path-8
    in:
      graph:
        - [1]
        - [0, 2]
        - [1, 3]
        - [2, 4]
        - [3, 5]
        - [4, 6]
        - [5, 7]
        - [6]
    out: true
  - name: odd-cycle-7
    in:
      graph:
        - [1, 6]
        - [0, 2]
        - [1, 3]
        - [2, 4]
        - [3, 5]
        - [4, 6]
        - [0, 5]
