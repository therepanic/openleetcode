judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(root, {result})
    checker: |
      class Checker:
          def from_value(self, value):
              if value is None:
                  return None
              if isinstance(value, dict):
                  return {
                      "val": value.get("val"),
                      "left": self.from_value(value.get("left")),
                      "right": self.from_value(value.get("right")),
                  }
              if isinstance(value, list):
                  if not value:
                      return None
                  nodes = [None if v is None else {"val": v, "left": None, "right": None} for v in value]
                  kids = nodes[1:]
                  idx = 0
                  for node in nodes:
                      if node is not None:
                          if idx < len(kids):
                              node["left"] = kids[idx]
                              idx += 1
                          if idx < len(kids):
                              node["right"] = kids[idx]
                              idx += 1
                  return nodes[0]
              if hasattr(value, "val"):
                  return {
                      "val": value.val,
                      "left": self.from_value(getattr(value, "left", None)),
                      "right": self.from_value(getattr(value, "right", None)),
                  }
              return value

          def prune(self, node):
              if not node:
                  return None
              node["left"] = self.prune(node["left"])
              node["right"] = self.prune(node["right"])
              if node["val"] == 0 and node["left"] is None and node["right"] is None:
                  return None
              return node

          def to_array(self, root):
              if not root:
                  return []
              out = []
              q = [root]
              while q:
                  node = q.pop(0)
                  if node is None:
                      out.append(None)
                  else:
                      out.append(node["val"])
                      q.append(node["left"])
                      q.append(node["right"])
              while out and out[-1] is None:
                  out.pop()
              return out

          def check(self, root, result):
              return self.to_array(self.prune(self.from_value(root))) == self.to_array(self.from_value(result))
