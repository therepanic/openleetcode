      type: tree_node
  call:
    cpp: treeNodeToArray(Solution().pruneTree({root}))
    rust: TreeNode::tree_node_to_array(Solution::prune_tree({root}))
    python3: tree_node_to_array(Solution().pruneTree({root}))
    python2: tree_node_to_array(Solution().pruneTree({root}))
    ruby: tree_node_to_array(prune_tree({root}))
    java: TreeNode.treeNodeToArray(new Solution().pruneTree({root}))
    csharp: TreeNode.TreeNodeToArray(new Solution().PruneTree({root}))
    kotlin: treeNodeToArray(Solution().pruneTree({root}))
    go: treeNodeToArray(pruneTree({root}))
    dart: tree_node_to_array(Solution().pruneTree({root}))
    swift: tree_node_to_array(Solution().pruneTree({root}))
