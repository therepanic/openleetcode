entry:
  id: 808
  title: soup-servings
  params:
    n:
      type: int
  call:
    cpp: Solution().soupServings({n})
    rust: Solution::soup_servings({n})
    python3: Solution().soupServings({n})
    python2: Solution().soupServings({n})
    ruby: soup_servings({n})
    java: new Solution().soupServings({n})
    csharp: new Solution().SoupServings({n})
    kotlin: Solution().soupServings({n})
    go: soupServings({n})
    dart: Solution().soupServings({n})
    swift: Solution().soupServings({n})
    typescript: soupServings({n})
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().soupServings(n, {result})
    checker:
      "from functools import lru_cache\nimport math\n\nclass Checker:\n   \
      \ def soupServings(self, n, result):\n        if n > 5000:\n            return\
      \ abs(result - 1.0) <= 1e-5\n        units = math.ceil(n / 25)\n\n        @lru_cache(None)\n\
      \        def calc(a, b):\n            if a <= 0 and b <= 0:\n              \
      \  return 0.5\n            if a <= 0:\n                return 1.0\n        \
      \    if b <= 0:\n                return 0.0\n            return 0.25 * (calc(a\
      \ - 4, b) + calc(a - 3, b - 1) + calc(a - 2, b - 2) + calc(a - 1, b - 3))\n\n\
      \        expected = calc(units, units)\n        return abs(result - expected)\
      \ <= 1e-5\n"
seed: 808
