  title: "reorganize-string"
  params:
    s:
      type: string
  call:
    cpp: "Solution().reorganizeString({s})"
    rust: "Solution::reorganize_string({s})"
    python3: "Solution().reorganizeString({s})"
    python2: "Solution().reorganizeString({s})"
    ruby: "reorganize_string({s})"
    java: "new Solution().reorganizeString({s})"
    csharp: "new Solution().ReorganizeString({s})"
    kotlin: "Solution().reorganizeString({s})"
    go: "reorganizeString({s})"
    dart: "Solution().reorganizeString({s})"
    swift: "Solution().reorganizeString({s})"
    typescript: "reorganizeString({s})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 128

oracle:
  python3:
    call: "Checker().check(s, {result})"
    checker: |
      from collections import Counter

      class Checker:
          def check(self, s, result):
              if not isinstance(result, str):
                  return False

              n = len(s)
              counts = Counter(s)
              possible = max(counts.values()) <= (n + 1) // 2

              if result == "":
                  return not possible

              if not possible:
                  return False

              if len(result) != n:
                  return False

              if Counter(result) != counts:
                  return False

              for i in range(1, n):
                  if result[i] == result[i - 1]:
                      return False

              return True

