  title: falling-squares
  params:
    positions:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().fallingSquares({positions})"
    rust: "Solution::falling_squares({positions})"
    python3: "Solution().fallingSquares({positions})"
    python2: "Solution().fallingSquares({positions})"
    ruby: "falling_squares({positions})"
    java: "new Solution().fallingSquares({positions})"
    csharp: "new Solution().FallingSquares({positions})"
    kotlin: "Solution().fallingSquares({positions})"
    go: "fallingSquares({positions})"
    dart: "Solution().fallingSquares({positions})"
    swift: "Solution().fallingSquares({positions})"
    typescript: "fallingSquares({positions})"

judge:
  type: exact

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().fallingSquares(positions, result)"
    checker: |
      class Checker:
          def fallingSquares(self, positions, result):
              if not isinstance(result, list):
                  return False
              if len(result) != len(positions):
                  return False
              cur = []
              expected = []
              best = 0
              for left, side in positions:
                  right = left + side
                  height = 0
                  for l, r, h in cur:
                      if l < right and left < r:
                          if h > height:
                              height = h
                  height += side
                  cur.append((left, right, height))
                  if height > best:
                      best = height
                  expected.append(best)
              return expected == result

seed: 699

