entry:
  id: 643
  title: maximum-average-subarray-i
  params:
    nums:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: Solution().findMaxAverage({nums}, {k})
    rust: Solution::find_max_average({nums}, {k})
    python3: Solution().findMaxAverage({nums}, {k})
    python2: Solution().findMaxAverage({nums}, {k})
    ruby: find_max_average({nums}, {k})
    java: new Solution().findMaxAverage({nums}, {k})
    csharp: new Solution().FindMaxAverage({nums}, {k})
    kotlin: Solution().findMaxAverage({nums}, {k})
    go: findMaxAverage({nums}, {k})
    dart: Solution().findMaxAverage({nums}, {k})
    swift: Solution().findMaxAverage({nums}, {k})
    typescript: findMaxAverage({nums}, {k})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().findMaxAverage(nums, k, {result})
    checker: |
      class Checker:
          def findMaxAverage(self, nums, k, result):
              if not isinstance(result, (int, float)):
                  return False
              window_sum = sum(nums[:k])
              max_sum = window_sum
              for i in range(k, len(nums)):
                  window_sum = window_sum - nums[i - k] + nums[i]
                  if window_sum > max_sum:
                      max_sum = window_sum
              expected = max_sum / k
              return abs(result - expected) <= 1e-5
seed: 643
