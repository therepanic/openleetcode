entry:
  id: 812
  title: largest-triangle-area
  params:
    points:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().largestTriangleArea({points})
    rust: Solution::largest_triangle_area({points})
    python3: Solution().largestTriangleArea({points})
    python2: Solution().largestTriangleArea({points})
    ruby: largest_triangle_area({points})
    java: new Solution().largestTriangleArea({points})
    csharp: new Solution().LargestTriangleArea({points})
    kotlin: Solution().largestTriangleArea({points})
    go: largestTriangleArea({points})
    dart: Solution().largestTriangleArea({points})
    swift: Solution().largestTriangleArea({points})
    typescript: largestTriangleArea({points})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(points, {result})
    checker:
      "class Checker:\n    def check(self, points, result):\n        best =\
      \ 0.0\n        n = len(points)\n        for i in range(n):\n            x1,\
      \ y1 = points[i]\n            for j in range(i + 1, n):\n                x2,\
      \ y2 = points[j]\n                for k in range(j + 1, n):\n              \
      \      x3, y3 = points[k]\n                    area = abs(0.5 * (x1 * (y2 -\
      \ y3) + x2 * (y3 - y1) + x3 * (y1 - y2)))\n                    if area > best:\n\
      \                        best = area\n        return abs(best - result) <= 1e-5\n"
seed: 812
