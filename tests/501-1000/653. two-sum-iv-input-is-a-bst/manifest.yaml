entry:
  id: 653
  title: two-sum-iv-input-is-a-bst
  params:
    root:
      type: tree_node
    k:
      type: int
  call:
    cpp: Solution().findTarget({root}, {k})
    rust: Solution::find_target({root}, {k})
    python3: Solution().findTarget({root}, {k})
    python2: Solution().findTarget({root}, {k})
    ruby: find_target({root}, {k})
    java: new Solution().findTarget({root}, {k})
    csharp: new Solution().FindTarget({root}, {k})
    kotlin: Solution().findTarget({root}, {k})
    go: findTarget({root}, {k})
    dart: Solution().findTarget({root}, {k})
    swift: Solution().findTarget({root}, {k})
    typescript: findTarget({root}, {k})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check({root}, {k}, {result})
    checker: |
      class Checker:
          def check(self, root, k, result):
              seen = set()

              def dfs(node):
                  if not node:
                      return False
                  if k - node.val in seen:
                      return True
                  seen.add(node.val)
                  return dfs(node.left) or dfs(node.right)

              return dfs(root) == result
