  id: 637
  title: average-of-levels-in-binary-tree
  params:
    root:
      type: tree_node
  call:
    cpp: Solution().averageOfLevels({root})
    rust: Solution::average_of_levels({root})
    python3: Solution().averageOfLevels({root})
    python2: Solution().averageOfLevels({root})
    ruby: average_of_levels({root})
    java: new Solution().averageOfLevels({root})
    csharp: new Solution().AverageOfLevels({root})
    kotlin: Solution().averageOfLevels({root})
    go: averageOfLevels({root})
    dart: Solution().averageOfLevels({root})
    swift: Solution().averageOfLevels({root})
    typescript: averageOfLevels({root})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().averageOfLevels(root, {result})
    checker: |
      from collections import deque

      class Checker:
          def averageOfLevels(self, root_arr, result):
              if root_arr is None or root_arr == []:
                  return result == []
              if not isinstance(root_arr, list) or not isinstance(result, list):
                  return False
              if root_arr[0] is None:
                  return result == []

              expected = []
              queue = deque([root_arr[0]])
              idx = 1
              while queue:
                  level_sum = 0
                  count = 0
                  next_queue = deque()
                  while queue:
                      val = queue.popleft()
                      if val is None:
                          continue
                      if not isinstance(val, int):
                          return False
                      level_sum += val
                      count += 1
                      if idx < len(root_arr):
                          next_queue.append(root_arr[idx])
                          idx += 1
                      if idx < len(root_arr):
                          next_queue.append(root_arr[idx])
                          idx += 1
                  if count == 0:
                      break
                  expected.append(level_sum / count)
                  queue = next_queue
              if len(result) != len(expected):
                  return False
              for actual, exp in zip(result, expected):
                  if not isinstance(actual, (int, float)):
                      return False
                  if abs(float(actual) - exp) > 1e-5:
                      return False
              return True
