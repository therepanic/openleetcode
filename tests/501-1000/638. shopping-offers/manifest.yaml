    needs:
      type: array
      items:
        type: int
  call:
    cpp: Solution().shoppingOffers({price}, {special}, {needs})
    rust: Solution::shopping_offers({price}, {special}, {needs})
    python3: Solution().shoppingOffers({price}, {special}, {needs})
    python2: Solution().shoppingOffers({price}, {special}, {needs})
    ruby: shopping_offers({price}, {special}, {needs})
    java: new Solution().shoppingOffers({price}, {special}, {needs})
    csharp: new Solution().ShoppingOffers({price}, {special}, {needs})
    kotlin: Solution().shoppingOffers({price}, {special}, {needs})
    go: shoppingOffers({price}, {special}, {needs})
    dart: Solution().shoppingOffers({price}, {special}, {needs})
    swift: Solution().shoppingOffers({price}, {special}, {needs})
    typescript: shoppingOffers({price}, {special}, {needs})
judge:
  type: exact
limits:
