  memory_mb: 256
oracle:
  python3:
    call: Checker().shoppingOffers(price, special, needs, {result})
    checker: |
      class Checker:
          def shoppingOffers(self, price, special, needs, result):
              from functools import lru_cache

              p = len(price)

              @lru_cache(None)
              def dp(curr):
                  if all(x == 0 for x in curr):
                      return 0
                  best = sum(curr[i] * price[i] for i in range(p))
                  for offer in special:
                      if all(curr[i] >= offer[i] for i in range(p)):
                          nxt = tuple(curr[i] - offer[i] for i in range(p))
                          best = min(best, offer[-1] + dp(nxt))
                  return best

              return result == dp(tuple(needs))
