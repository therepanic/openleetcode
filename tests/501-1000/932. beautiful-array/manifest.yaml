entry:
  id: 932
  title: beautiful-array
  params:
    n:
      type: int
  call:
    cpp: Solution().beautifulArray({n})
    rust: Solution::beautiful_array({n})
    python3: Solution().beautifulArray({n})
    python2: Solution().beautifulArray({n})
    ruby: beautiful_array({n})
    java: new Solution().beautifulArray({n})
    csharp: new Solution().BeautifulArray({n})
    kotlin: Solution().beautifulArray({n})
    go: beautifulArray({n})
    dart: Solution().beautifulArray({n})
    swift: Solution().beautifulArray({n})
    typescript: beautifulArray({n})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 256
oracle:
  python3:
    call: Checker().beautifulArray(n, {result})
    checker:
      "class Checker:\n    def beautifulArray(self, n, result):\n        if\
      \ not isinstance(result, list) or len(result) != n:\n            return False\n\
      \        if sorted(result) != list(range(1, n + 1)):\n            return False\n\
      \        pos = {v: i for i, v in enumerate(result)}\n        for x in result:\n\
      \            for y in result:\n                s = x + y\n                if\
      \ s % 2:\n                    continue\n                z = s // 2\n       \
      \         if z == x or z == y or z not in pos:\n                    continue\n\
      \                i, j, k = pos[x], pos[z], pos[y]\n                if (i < j\
      \ < k) or (k < j < i):\n                    return False\n        return True\n"
seed: 932
