entry:
  id: 764
  title: largest-plus-sign
  params:
    n:
      type: int
    mines:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().orderOfLargestPlusSign({n}, {mines})
    rust: Solution::order_of_largest_plus_sign({n}, {mines})
    python3: Solution().orderOfLargestPlusSign({n}, {mines})
    python2: Solution().orderOfLargestPlusSign({n}, {mines})
    ruby: order_of_largest_plus_sign({n}, {mines})
    java: new Solution().orderOfLargestPlusSign({n}, {mines})
    csharp: new Solution().OrderOfLargestPlusSign({n}, {mines})
    kotlin: Solution().orderOfLargestPlusSign({n}, {mines})
    go: orderOfLargestPlusSign({n}, {mines})
    dart: Solution().orderOfLargestPlusSign({n}, {mines})
    swift: Solution().orderOfLargestPlusSign({n}, {mines})
    typescript: orderOfLargestPlusSign({n}, {mines})
judge:
  type: exact
limits:
  time_ms: 1500
  memory_mb: 256
oracle:
  python3:
    call: Checker().orderOfLargestPlusSign(n, mines, {result})
    checker: |
      class Checker(object):
          def orderOfLargestPlusSign(self, n, mines, result):
              if not isinstance(result, int):
                  return False
              if not isinstance(n, int) or n < 1 or n > 500:
                  return False
              if not isinstance(mines, list) or len(mines) < 1 or len(mines) > 5000:
                  return False
              seen = set()
              for cell in mines:
                  if not isinstance(cell, list) or len(cell) != 2:
                      return False
                  r, c = cell
                  if not isinstance(r, int) or not isinstance(c, int):
                      return False
                  if r < 0 or r >= n or c < 0 or c >= n:
                      return False
                  key = (r, c)
                  if key in seen:
                      return False
                  seen.add(key)
              best = 0
              for r in range(n):
                  for c in range(n):
                      if (r, c) in seen:
                          continue
                      max_order = min(r + 1, c + 1, n - r, n - c)
                      order = best + 1
                      while order <= max_order:
                          arm = order - 1
                          ok = True
                          for d in range(arm + 1):
                              if (r - d, c) in seen or (r + d, c) in seen or (r, c - d) in seen or (r, c + d) in seen:
                                  ok = False
                                  break
                          if not ok:
                              break
                          best = order
                          order += 1
              return result == best
