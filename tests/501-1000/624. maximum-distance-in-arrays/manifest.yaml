entry:
  id: 624
  title: maximum-distance-in-arrays
  params:
    arrays:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().maxDistance({arrays})"
    rust: "Solution::max_distance({arrays})"
    python3: "Solution().maxDistance({arrays})"
    python2: "Solution().maxDistance({arrays})"
    ruby: "max_distance({arrays})"
    java: "new Solution().maxDistance(java.util.Arrays.stream({arrays}).map(row -> java.util.Arrays.stream(row).boxed().collect(java.util.stream.Collectors.toList())).collect(java.util.stream.Collectors.toList()))"
    csharp: "new Solution().MaxDistance({arrays})"
    kotlin: "Solution().maxDistance({arrays}.map { it.toList() })"
    go: "maxDistance({arrays})"
    dart: "Solution().maxDistance({arrays})"
    swift: "Solution().maxDistance({arrays})"
    typescript: "maxDistance({arrays})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().maxDistance(arrays, {result})"
    checker: |
      class Checker:
          def maxDistance(self, arrays, result):
              if not arrays or len(arrays) < 2:
                  return False
              smallest = arrays[0][0]
              largest = arrays[0][-1]
              expected = 0
              for i in range(1, len(arrays)):
                  expected = max(expected, largest - arrays[i][0], arrays[i][-1] - smallest)
                  smallest = min(smallest, arrays[i][0])
                  largest = max(largest, arrays[i][-1])
              return expected == result
seed: 624
tests:
