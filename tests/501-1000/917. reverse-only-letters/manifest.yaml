entry:
  id: 917
  title: reverse-only-letters
  params:
    s:
      type: string
  call:
    cpp: "Solution().reverseOnlyLetters({s})"
    rust: "Solution::reverse_only_letters({s})"
    python3: "Solution().reverseOnlyLetters({s})"
    python2: "Solution().reverseOnlyLetters({s})"
    ruby: "reverse_only_letters({s})"
    java: "new Solution().reverseOnlyLetters({s})"
    csharp: "new Solution().ReverseOnlyLetters({s})"
    kotlin: "Solution().reverseOnlyLetters({s})"
    go: "reverseOnlyLetters({s})"
    dart: "Solution().reverseOnlyLetters({s})"
    swift: "Solution().reverseOnlyLetters({s})"
    typescript: "reverseOnlyLetters({s})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().reverseOnlyLetters(s, {result})"
    checker: |
      class Checker:
          def reverseOnlyLetters(self, s, result):
              if not isinstance(result, str):
                  return False
              letters = [ch for ch in s if ch.isalpha()]
              expected = []
              idx = len(letters) - 1
              for ch in s:
                  if ch.isalpha():
                      expected.append(letters[idx])
                      idx -= 1
                  else:
                      expected.append(ch)
              return ''.join(expected) == result

seed: 917

