entry:
  id: 587
  title: erect-the-fence
  params:
    trees:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().outerTrees({trees})"
    rust: "Solution::outer_trees({trees})"
    python3: "Solution().outerTrees({trees})"
    python2: "Solution().outerTrees({trees})"
    ruby: "outer_trees({trees})"
    java: "new Solution().outerTrees({trees})"
    csharp: "new Solution().OuterTrees({trees})"
    kotlin: "Solution().outerTrees({trees})"
    go: "outerTrees({trees})"
    dart: "Solution().outerTrees({trees})"
    swift: "Solution().outerTrees({trees})"
    typescript: "outerTrees({trees})"
judge:
  type: "ignore_order"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().outerTrees(trees, {result})"
    checker: |
      class Checker:
          def outerTrees(self, trees, result):
              try:
                  points = [tuple(p) for p in trees]
                  returned = [tuple(p) for p in result]
              except Exception:
                  return False

              if any(len(p) != 2 for p in returned):
                  return False
              if len(set(returned)) != len(returned):
                  return False

              all_points = set(points)
              if not set(returned).issubset(all_points):
                  return False

              expected = self.boundary_points(points)
              return set(returned) == expected

          def cross(self, o, a, b):
              return (a[0] - o[0]) * (b[1] - o[1]) - (a[1] - o[1]) * (b[0] - o[0])

          def on_segment(self, a, b, p):
              if self.cross(a, b, p) != 0:
                  return False
              return (
                  min(a[0], b[0]) <= p[0] <= max(a[0], b[0]) and
                  min(a[1], b[1]) <= p[1] <= max(a[1], b[1])
              )

          def boundary_points(self, points):
              pts = sorted(set(points))
              if len(pts) <= 2:
                  return set(pts)

              def build(seq):
                  hull = []
                  for p in seq:
                      while len(hull) >= 2 and self.cross(hull[-2], hull[-1], p) <= 0:
                          hull.pop()
                      hull.append(p)
                  return hull

              lower = build(pts)
              upper = build(reversed(pts))
              hull = lower[:-1] + upper[:-1]

              vertices = []
              seen = set()
              for p in hull:
                  if p not in seen:
                      vertices.append(p)
                      seen.add(p)

              if len(vertices) <= 2:
                  return set(pts)

              boundary = set()
              m = len(vertices)
              for p in pts:
                  for i in range(m):
                      if self.on_segment(vertices[i], vertices[(i + 1) % m], p):
                          boundary.add(p)
                          break
              return boundary
seed: 587
