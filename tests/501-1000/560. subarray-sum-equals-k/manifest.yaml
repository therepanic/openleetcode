entry:
  id: 560
  title: "subarray-sum-equals-k"
  params:
    nums:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: "Solution().subarraySum({nums}, {k})"
    rust: "Solution::subarray_sum({nums}, {k})"
    python3: "Solution().subarraySum({nums}, {k})"
    python2: "Solution().subarraySum({nums}, {k})"
    ruby: "subarray_sum({nums}, {k})"
    java: "new Solution().subarraySum({nums}, {k})"
    csharp: "new Solution().SubarraySum({nums}, {k})"
    kotlin: "Solution().subarraySum({nums}, {k})"
    go: "subarraySum({nums}, {k})"
    dart: "Solution().subarraySum({nums}, {k})"
    swift: "Solution().subarraySum({nums}, {k})"
    typescript: "subarraySum({nums}, {k})"

judge:
  type: "exact"

limits:
  time_ms: 400
  memory_mb: 256

oracle:
  python3:
    call: "Checker().subarraySum(nums, k, {result})"
    checker: |
      from typing import Any, List

      class Checker:
          def subarraySum(self, nums: List[int], k: int, result: Any) -> bool:
              if isinstance(result, bool) or not isinstance(result, int):
                  return False
              seen = {0: 1}
              total = 0
              expected = 0
              for num in nums:
                  total += num
                  expected += seen.get(total - k, 0)
                  seen[total] = seen.get(total, 0) + 1
              return result == expected

seed: 560

