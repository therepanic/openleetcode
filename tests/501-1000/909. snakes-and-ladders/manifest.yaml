judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().snakesAndLadders(board, {result})"
    checker: |
      from collections import deque
      class Checker:
          def snakesAndLadders(self, board, result):
              n = len(board)
              dist = [-1] * (n * n + 1)
              q = deque([1])
              dist[1] = 0
              while q:
                  x = q.popleft()
                  for i in range(1, 7):
                      t = x + i
                      if t > n * n:
                          break
                      row = (t - 1) // n
                      col = (t - 1) % n
                      v = board[n - 1 - row][(n - 1 - col) if (row % 2 == 1) else col]
                      y = v if v > 0 else t
                      if y == n * n:
                          expected = dist[x] + 1
                          return result == expected
                      if dist[y] == -1:
                          dist[y] = dist[x] + 1
                          q.append(y)
              return result == -1
