judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().nearestPalindromic(n, {result})"
    checker: |
      class Checker:
          def nearestPalindromic(self, n, result):
              if not isinstance(result, str):
                  return False
              x = int(n)
              length = len(n)
              candidates = set()
              candidates.add(10 ** (length - 1) - 1)
              candidates.add(10 ** length + 1)
              prefix = int(n[:(length + 1) // 2])
              half_len = (length + 1) // 2
              for delta in (-1, 0, 1):
                  cur = prefix + delta
                  if cur < 0:
                      continue
                  left = str(cur).zfill(half_len)
                  if length % 2 == 0:
                      pal = left + left[::-1]
                  else:
                      pal = left + left[:-1][::-1]
                  candidates.add(int(pal))
              candidates.discard(x)
              expected = str(min(candidates, key=lambda value: (abs(value - x), value)))
              return expected == result
