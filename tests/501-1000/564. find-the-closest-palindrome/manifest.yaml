  id: 564
  title: find-the-closest-palindrome
  params:
    n:
      type: string
  call:
    cpp: "Solution().nearestPalindromic({n})"
    rust: "Solution::nearest_palindromic({n})"
    python3: "Solution().nearestPalindromic({n})"
    python2: "Solution().nearestPalindromic({n})"
    ruby: "nearest_palindromic({n})"
    java: "new Solution().nearestPalindromic({n})"
    csharp: "new Solution().NearestPalindromic({n})"
    kotlin: "Solution().nearestPalindromic({n})"
    go: "nearestPalindromic({n})"
