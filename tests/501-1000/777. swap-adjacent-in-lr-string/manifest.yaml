entry:
  id: 777
  title: "swap-adjacent-in-lr-string"
  params:
    s:
      type: string
    t:
      type: string
  call:
    cpp: "Solution().canTransform({s}, {t})"
    rust: "Solution::can_transform({s}, {t})"
    python3: "Solution().canTransform({s}, {t})"
    python2: "Solution().canTransform({s}, {t})"
    ruby: "can_transform({s}, {t})"
    java: "new Solution().canTransform({s}, {t})"
    csharp: "new Solution().CanTransform({s}, {t})"
    kotlin: "Solution().canTransform({s}, {t})"
    go: "canTransform({s}, {t})"
    dart: "Solution().canTransform({s}, {t})"
    swift: "Solution().canTransform({s}, {t})"
    typescript: "canTransform({s}, {t})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().canTransform(s, t, {result})
    checker: |
      class Checker(object):
          def canTransform(self, s, t, result):
              return isinstance(result, bool)

seed: 777

tests:
  - name: "example_true"
    in:
      s: !!str "RXXLRXRXL"
      t: !!str "XRLXXRRLX"
    out: true

  - name: "example_false_single"
    in:
      s: !!str "X"
      t: !!str "L"
    out: false

  - name: "single_same_x"
    in:
      s: !!str "X"
      t: !!str "X"
    out: true

  - name: "single_same_l"
