  title: new-21-game
  params:
    n:
      type: int
    k:
      type: int
    maxPts:
      type: int
  call:
    cpp: "Solution().new21Game({n}, {k}, {maxPts})"
    rust: "Solution::new21_game({n}, {k}, {maxPts})"
    python3: "Solution().new21Game({n}, {k}, {maxPts})"
    python2: "Solution().new21Game({n}, {k}, {maxPts})"
    ruby: "new21_game({n}, {k}, {maxPts})"
    java: "new Solution().new21Game({n}, {k}, {maxPts})"
    csharp: "new Solution().New21Game({n}, {k}, {maxPts})"
    kotlin: "Solution().new21Game({n}, {k}, {maxPts})"
    go: "new21Game({n}, {k}, {maxPts})"
    dart: "Solution().new21Game({n}, {k}, {maxPts})"
    swift: "Solution().new21Game({n}, {k}, {maxPts})"
    typescript: "new21Game({n}, {k}, {maxPts})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().new21Game(n, k, maxPts, {result})"
    checker: |
      class Checker:
          def new21Game(self, n, k, maxPts, result):
              if not isinstance(result, (int, float)):
                  return False
              if k == 0 or n >= k - 1 + maxPts:
                  expected = 1.0
              else:
                  dp = [0.0] * maxPts
                  dp[0] = 1.0
                  window_sum = 1.0
                  expected = 0.0
                  for i in range(1, n + 1):
                      prob = window_sum / maxPts
                      if i < k:
                          window_sum += prob
                      else:
                          expected += prob
                      if i >= maxPts:
                          window_sum -= dp[i % maxPts]
                      dp[i % maxPts] = prob
              return abs(float(result) - expected) <= 1e-5

seed: 837

