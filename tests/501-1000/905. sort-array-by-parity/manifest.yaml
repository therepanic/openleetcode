entry:
  id: 905
  title: sort-array-by-parity
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().sortArrayByParity({nums})"
    rust: "Solution::sort_array_by_parity({nums})"
    python3: "Solution().sortArrayByParity({nums})"
    python2: "Solution().sortArrayByParity({nums})"
    ruby: "sort_array_by_parity({nums})"
    java: "new Solution().sortArrayByParity({nums})"
    csharp: "new Solution().SortArrayByParity({nums})"
    kotlin: "Solution().sortArrayByParity({nums})"
    go: "sortArrayByParity({nums})"
    dart: "Solution().sortArrayByParity({nums})"
    swift: "Solution().sortArrayByParity({nums})"
    typescript: "sortArrayByParity({nums})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().sortArrayByParity(nums, {result})"
    checker: |
      from collections import Counter

      class Checker:
          def sortArrayByParity(self, nums, result):
              if not isinstance(result, list) or len(result) != len(nums):
                  return False
              if Counter(nums) != Counter(result):
                  return False
              seen_odd = False
              for x in result:
                  if x % 2 == 0:
                      if seen_odd:
                          return False
                  else:
                      seen_odd = True
              return True
seed: 905
