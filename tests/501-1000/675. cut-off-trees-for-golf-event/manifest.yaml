entry:
  id: 675
  title: cut-off-trees-for-golf-event
  params:
    forest:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().cutOffTree({forest})
    rust: Solution::cut_off_tree({forest})
    python3: Solution().cutOffTree({forest})
    python2: Solution().cutOffTree({forest})
    ruby: cut_off_tree({forest})
    java: new Solution().cutOffTree({forest})
    csharp: new Solution().CutOffTree({forest})
    kotlin: Solution().cutOffTree({forest})
    go: cutOffTree({forest})
    dart: Solution().cutOffTree({forest})
    swift: Solution().cutOffTree({forest})
