  memory_mb: 256
oracle:
  python3:
    call: Checker().cutOffTree(forest, {result})
    checker: |
      from collections import deque
      import heapq

      class Checker:
          def cutOffTree(self, forest, result):
              if not isinstance(result, int):
                  return False
              if not isinstance(forest, list) or not forest or not isinstance(forest[0], list) or not forest[0]:
                  return False
              rows = len(forest)
              cols = len(forest[0])
              if any(not isinstance(row, list) or len(row) != cols for row in forest):
                  return False
              if forest[0][0] == 0:
                  return result == -1

              trees = []
              for r in range(rows):
                  for c in range(cols):
                      v = forest[r][c]
                      if not isinstance(v, int) or v < 0:
                          return False
                      if v > 1:
                          heapq.heappush(trees, (v, r, c))

              def bfs(sr, sc, tr, tc):
                  if sr == tr and sc == tc:
                      return 0
                  q = deque([(sr, sc, 0)])
                  seen = {(sr, sc)}
                  while q:
                      r, c, d = q.popleft()
                      for dr, dc in ((1, 0), (-1, 0), (0, 1), (0, -1)):
                          nr, nc = r + dr, c + dc
                          if 0 <= nr < rows and 0 <= nc < cols and forest[nr][nc] > 0 and (nr, nc) not in seen:
                              if nr == tr and nc == tc:
                                  return d + 1
                              seen.add((nr, nc))
                              q.append((nr, nc, d + 1))
                  return -1

              total = 0
              cr = cc = 0
              while trees:
                  _, tr, tc = heapq.heappop(trees)
                  dist = bfs(cr, cc, tr, tc)
                  if dist == -1:
                      return result == -1
                  total += dist
                  cr, cc = tr, tc
              return result == total
