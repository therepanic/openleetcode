entry:
  id: 771
  title: jewels-and-stones
  params:
    jewels:
      type: string
    stones:
      type: string
  call:
    cpp: Solution().numJewelsInStones({jewels}, {stones})
    rust: Solution::num_jewels_in_stones({jewels}, {stones})
    python3: Solution().numJewelsInStones({jewels}, {stones})
    python2: Solution().numJewelsInStones({jewels}, {stones})
    ruby: num_jewels_in_stones({jewels}, {stones})
    java: new Solution().numJewelsInStones({jewels}, {stones})
    csharp: new Solution().NumJewelsInStones({jewels}, {stones})
    kotlin: Solution().numJewelsInStones({jewels}, {stones})
    go: numJewelsInStones({jewels}, {stones})
    dart: Solution().numJewelsInStones({jewels}, {stones})
    swift: Solution().numJewelsInStones({jewels}, {stones})
    typescript: numJewelsInStones({jewels}, {stones})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().numJewelsInStones(jewels, stones, {result})
    checker: |
      class Checker(object):
          def numJewelsInStones(self, jewels, stones, result):
              return isinstance(result, int)
seed: 771
tests:
  - name: example1
    in:
      jewels: aA
      stones: aAAbbbb
    out: 3
  - name: example2
    in:
      jewels: z
      stones: ZZ
    out: 0
  - name: single_match
    in:
      jewels: a
      stones: a
    out: 1
  - name: single_miss
    in:
      jewels: a
      stones: b
    out: 0
  - name: case_sensitive_lower_upper
    in:
      jewels: a
      stones: Aaaaa
    out: 4
  - name: case_sensitive_upper_lower
    in:
      jewels: A
      stones: aAaAa
    out: 2
  - name: all_jewels_all_stones
    in:
      jewels: abc
      stones: abcabc
    out: 6
  - name: no_jewels_present
    in:
      jewels: xyz
      stones: ABCDEF
    out: 0
  - name: repeated_stones_single_jewel
    in:
      jewels: b
      stones: bbbbbbbbb
    out: 9
  - name: repeated_jewel_types
    in:
      jewels: az
      stones: zzaazzz
    out: 7
  - name: mixed_case_many
    in:
      jewels: aZ
      stones: aZaZaZ
    out: 6
  - name: punctuation_not_allowed_avoid
    in:
      jewels: m
      stones: mmmmmmmmmmmmmmmm
    out: 16
  - name: two_jewels_interleaved
    in:
      jewels: ab
      stones: ababababab
    out: 10
  - name: one_jewel_sparse
    in:
      jewels: q
      stones: xxxxxqxxxx
    out: 1
  - name: upper_and_lower_separate
    in:
      jewels: aB
      stones: AaBbAaBb
    out: 4
  - name: long_non_matching_upper
    in:
      jewels: c
      stones: DDDDDDDDDDDDDDDDDDDD
    out: 0
  - name: all_same_char_jewel
    in:
      jewels: x
      stones: xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    out: 50
  - name: max_len_jewels_subset
    in:
      jewels: abcdefghij
      stones: abcdefghijABCDEFGHIJ
    out: 10
  - name: max_len_stones_all_match
    in:
      jewels: ABCDEFGHIJ
      stones: ABCDEFGHIJABCDEFGHIJABCDEFGHIJABCDEFGHIJABCDE
    out: 45
  - name: max_len_stones_none_match
    in:
      jewels: abcdefghij
      stones: KLMNOPQRSTUVWXYZKLMNOPQRSTUVWXYZKLMNOPQRSTUVWX
    out: 0
  - name: alternating_case
    in:
      jewels: aBcDe
      stones: aBcDeABCDEabcde
    out: 10
  - name: jewel_at_both_ends
    in:
      jewels: z
      stones: zabcdefghijklmnopqrstuvwxy
    out: 1
  - name: many_duplicates_single_jewel
    in:
      jewels: p
      stones: pppppppppppppppppppppppppppppppppppppppppppppp
    out: 46
  - name: many_duplicates_two_jewels
    in:
      jewels: pq
      stones: pppppqqqqqpppppqqqqqpppppqqqqqpppppqqqqqpppppqqq
    out: 48
  - name: unique_jewels_all_present_once
    in:
      jewels: abcdefghijklmnopqrst
      stones: tsrqponmlkjihgfedcba
    out: 20
  - name: unique_jewels_some_present
    in:
      jewels: abcdef
      stones: xxaxxbxxcxx
    out: 3
  - name: high_mix_no_overlap
    in:
      jewels: ABCxyz
      stones: defGHIjklMNOpqrSTU
    out: 0
  - name: high_mix_overlap
    in:
      jewels: ABCxyz
      stones: ABCCBAxyzxyz
    out: 12
  - name: repeated_pattern_edge
    in:
      jewels: mNo
      stones: mNommNommNommNo
    out: 15
  - name: single_upper_jewel
    in:
      jewels: Q
      stones: qqqQQqQ
    out: 3
  - name: single_lower_jewel
    in:
      jewels: r
      stones: RRRrrrrR
    out: 4
  - name: long_jewels_short_stones
    in:
      jewels: abcdefghijKLMNOPQRST
      stones: KLMN
    out: 4
  - name: long_stones_short_jewels
    in:
      jewels: t
      stones: tttttttttttttttttttttttttttttttttttttttttttttttttt
    out: 50
  - name: all_letters_split_case
    in:
      jewels: aBc
      stones: AaBbCcabcABC
    out: 6
  - name: boundary_mixed_case_50
    in:
      jewels: ABCDEFGHIJ
      stones: ABCDEFGHIJabcdefghijABCDEFGHIJabcdefghijABCDE
    out: 25
  - name: boundary_single_last_match
    in:
      jewels: z
      stones: yyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyz
    out: 1
  - name: boundary_single_first_match
    in:
      jewels: z
      stones: zyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyy
    out: 1
  - name: generated-dense-jewel-alphabet
    in:
      jewels: abcxyz
      stones:
        gen: "str"
        len: 5000
        alphabet: "abcxyzABCXYZ"
  - name: generated-no-jewel-alphabet
    in:
      jewels: abcxyz
      stones:
        gen: "str"
        len: 5000
        alphabet: "mnopqrMNOPQR"
