entry:
  id: 910
  title: "smallest-range-ii"
  params:
    nums:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: "Solution().smallestRangeII({nums}, {k})"
    rust: "Solution::smallest_range_ii({nums}, {k})"
    python3: "Solution().smallestRangeII({nums}, {k})"
    python2: "Solution().smallestRangeII({nums}, {k})"
    ruby: "smallest_range_ii({nums}, {k})"
    java: "new Solution().smallestRangeII({nums}, {k})"
    csharp: "new Solution().SmallestRangeII({nums}, {k})"
    kotlin: "Solution().smallestRangeII({nums}, {k})"
    go: "smallestRangeII({nums}, {k})"
    dart: "Solution().smallestRangeII({nums}, {k})"
    swift: "Solution().smallestRangeII({nums}, {k})"
    typescript: "smallestRangeII({nums}, {k})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().smallestRangeII(nums, k, {result})"
    checker: |
      class Checker:
          def smallestRangeII(self, nums, k, result):
              nums = sorted(nums)
              ans = nums[-1] - nums[0]
              for i in range(len(nums) - 1):
                  high = max(nums[-1] - k, nums[i] + k)
                  low = min(nums[0] + k, nums[i + 1] - k)
                  ans = min(ans, high - low)
              return result == ans
seed: 12345
