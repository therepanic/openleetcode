  title: array-nesting
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().arrayNesting({nums})"
    rust: "Solution::array_nesting({nums})"
    python3: "Solution().arrayNesting({nums})"
    python2: "Solution().arrayNesting({nums})"
    ruby: "array_nesting({nums})"
    java: "new Solution().arrayNesting({nums})"
    csharp: "new Solution().ArrayNesting({nums})"
    kotlin: "Solution().arrayNesting({nums})"
    go: "arrayNesting({nums})"
    dart: "Solution().arrayNesting({nums})"
    swift: "Solution().arrayNesting({nums})"
    typescript: "arrayNesting({nums})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().arrayNesting(nums, {result})"
    checker: |
      class Checker:
          def arrayNesting(self, nums, result):
              if not isinstance(result, int):
                  return False
              seen = [False] * len(nums)
              best = 0
              for i in range(len(nums)):
                  if seen[i]:
                      continue
                  cur = i
                  count = 0
                  while not seen[cur]:
                      seen[cur] = True
                      cur = nums[cur]
                      count += 1
                  if count > best:
                      best = count
              return result == best
seed: 565
