entry:
  id: 768
  title: "max-chunks-to-make-sorted-ii"
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().maxChunksToSorted({arr})"
    rust: "Solution::max_chunks_to_sorted({arr})"
    python3: "Solution().maxChunksToSorted({arr})"
    python2: "Solution().maxChunksToSorted({arr})"
    ruby: "max_chunks_to_sorted({arr})"
    java: "new Solution().maxChunksToSorted({arr})"
    csharp: "new Solution().MaxChunksToSorted({arr})"
    kotlin: "Solution().maxChunksToSorted({arr})"
    go: "maxChunksToSorted({arr})"
    dart: "Solution().maxChunksToSorted({arr})"
    swift: "Solution().maxChunksToSorted({arr})"
    typescript: "maxChunksToSorted({arr})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().check(arr, {result})"
    checker: |
      from collections import Counter

      class Checker:
          def check(self, arr, result):
              diff = Counter()
              chunks = 0
              for left, right in zip(arr, sorted(arr)):
                  diff[left] += 1
                  if diff[left] == 0:
                      del diff[left]
                  diff[right] -= 1
                  if diff[right] == 0:
                      del diff[right]
                  if not diff:
                      chunks += 1
              return result == chunks

seed: 768

