entry:
  id: 840
  title: magic-squares-in-grid
  params:
    grid:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().numMagicSquaresInside({grid})
    rust: Solution::num_magic_squares_inside({grid})
    python3: Solution().numMagicSquaresInside({grid})
    python2: Solution().numMagicSquaresInside({grid})
    ruby: num_magic_squares_inside({grid})
    java: new Solution().numMagicSquaresInside({grid})
    csharp: new Solution().NumMagicSquaresInside({grid})
    kotlin: Solution().numMagicSquaresInside({grid})
    go: numMagicSquaresInside({grid})
    dart: Solution().numMagicSquaresInside({grid})
    swift: Solution().numMagicSquaresInside({grid})
    typescript: numMagicSquaresInside({grid})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().numMagicSquaresInside(grid, {result})
    checker: "class Checker:\n    def numMagicSquaresInside(self, grid, result):\n        def is_magic(r, c):\n            vals = [grid[i][j] for i in range(r, r + 3) for j in range(c, c + 3)]\n            if sorted(vals) != [1,2,3,4,5,6,7,8,9]:\n                return False\n            rows = [sum(grid[r + i][c:c + 3]) for i in range(3)]\n            cols = [grid[r][c + j] + grid[r + 1][c + j] + grid[r + 2][c + j] for j in range(3)]\n            d1 = grid[r][c] + grid[r + 1][c + 1] + grid[r + 2][c + 2]\n            d2 = grid[r][c + 2] + grid[r + 1][c + 1] + grid[r + 2][c]\n            return rows == [15,15,15] and cols == [15,15,15] and d1 == 15 and d2 == 15\n        expected = sum(is_magic(i, j) for i in range(len(grid) - 2) for j in range(len(grid[0]) - 2))\n        return result == expected\n"
seed: 840
