      type: string
  call:
    cpp: Solution().scoreOfParentheses({s})
    rust: Solution::score_of_parentheses({s})
    python3: Solution().scoreOfParentheses({s})
    python2: Solution().scoreOfParentheses({s})
    ruby: score_of_parentheses({s})
    java: new Solution().scoreOfParentheses({s})
    csharp: new Solution().ScoreOfParentheses({s})
    kotlin: Solution().scoreOfParentheses({s})
