    dart: Solution().scoreOfParentheses({s})
    swift: Solution().scoreOfParentheses({s})
    typescript: scoreOfParentheses({s})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().scoreOfParentheses(s, {result})"
    checker: |
      class Checker:
          def scoreOfParentheses(self, s, result):
              if not isinstance(result, int):
                  return False
              score_stack = [0]
              for ch in s:
                  if ch == "(":
                      score_stack.append(0)
                  else:
                      last_score = score_stack.pop()
                      score_stack[-1] += max(1, last_score * 2)
              return result == score_stack[-1]
