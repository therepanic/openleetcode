entry:
  id: 611
  title: "valid-triangle-number"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().triangleNumber({nums})"
    rust: "Solution::triangle_number({nums})"
    python3: "Solution().triangleNumber({nums})"
    python2: "Solution().triangleNumber({nums})"
    ruby: "triangle_number({nums})"
    java: "new Solution().triangleNumber({nums})"
    csharp: "new Solution().TriangleNumber({nums})"
    kotlin: "Solution().triangleNumber({nums})"
    go: "triangleNumber({nums})"
    dart: "Solution().triangleNumber({nums})"
    swift: "Solution().triangleNumber({nums})"
    typescript: "triangleNumber({nums})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().triangleNumber(nums, {result})"
    checker: |
      from typing import Any, List

      class Checker:
          def triangleNumber(self, nums: List[int], result: Any) -> bool:
              if not isinstance(result, int):
                  return False
              arr = sorted(nums)
              n = len(arr)
              expected = 0
              for i in range(n - 1, -1, -1):
                  left, right = 0, i - 1
                  while left < right:
                      if arr[left] + arr[right] > arr[i]:
                          expected += right - left
                          right -= 1
                      else:
                          left += 1
              return result == expected

seed: 611

