entry:
  id: 503
  title: next-greater-element-ii
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().nextGreaterElements({nums})"
    rust: "Solution::next_greater_elements({nums})"
    python3: "Solution().nextGreaterElements({nums})"
    python2: "Solution().nextGreaterElements({nums})"
    ruby: "next_greater_elements({nums})"
    java: "new Solution().nextGreaterElements({nums})"
    csharp: "new Solution().NextGreaterElements({nums})"
    kotlin: "Solution().nextGreaterElements({nums})"
    go: "nextGreaterElements({nums})"
    dart: "Solution().nextGreaterElements({nums})"
    swift: "Solution().nextGreaterElements({nums})"
    typescript: "nextGreaterElements({nums})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().nextGreaterElements(nums, {result})"
    checker: |
      class Checker:
          def nextGreaterElements(self, nums, result):
              expected = [next((x for x in nums[i + 1:] + nums[:i] if x > nums[i]), -1) for i in range(len(nums))]
              return expected == result
seed: 503
tests:
  - name: example-1
    in:
      nums: [1, 2, 1]
    out: [2, -1, 2]
  - name: example-2
    in:
      nums: [1, 2, 3, 4, 3]
    out: [2, 3, 4, -1, 4]
  - name: single-element
    in:
      nums: [1]
    out: [-1]
  - name: all-equal
    in:
      nums: [2, 2, 2]
    out: [-1, -1, -1]
  - name: strictly-decreasing
    in:
      nums: [5, 4, 3, 2, 1]
    out: [-1, 5, 5, 5, 5]
  - name: duplicates-around-wrap
    in:
      nums: [1, 1, 2, 1]
    out: [2, 2, -1, 2]
  - name: mixed-small
    in:
      nums: [2, 1, 2, 4, 3]
    out: [4, 2, 4, -1, 4]
  - name: with-negatives
    in:
      nums: [10, -1, 2, -1, 10]
    out: [-1, 2, 10, 10, -1]
  - name: descending-with-wrap
    in:
      nums: [9, 8, 7, 3, 2]
    out: [-1, 9, 9, 9, 9]
  - name: plateau-then-rise
    in:
