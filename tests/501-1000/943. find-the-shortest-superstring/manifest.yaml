entry:
  id: 943
  title: find-the-shortest-superstring
  params:
    words:
      type: array
      items:
        type: string
  call:
    cpp: Solution().shortestSuperstring({words})
    rust: Solution::shortest_superstring({words})
    python3: Solution().shortestSuperstring({words})
    python2: Solution().shortestSuperstring({words})
    ruby: shortest_superstring({words})
    java: new Solution().shortestSuperstring({words})
    csharp: new Solution().ShortestSuperstring({words})
    kotlin: Solution().shortestSuperstring({words})
    go: shortestSuperstring({words})
    dart: Solution().shortestSuperstring({words})
    swift: Solution().shortestSuperstring({words})
    typescript: shortestSuperstring({words})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().shortestSuperstring(words, {result})
    checker:
      "class Checker:\n    def shortestSuperstring(self, words, result):\n\
      \        if not isinstance(result, str):\n            return False\n       \
      \ for w in words:\n            if w not in result:\n                return False\n\
      \        n = len(words)\n        overlap = [[0] * n for _ in range(n)]\n   \
      \     for i in range(n):\n            for j in range(n):\n                if\
      \ i == j:\n                    continue\n                for k in range(1, min(len(words[i]),\
      \ len(words[j])) + 1):\n                    if words[i][-k:] == words[j][:k]:\n\
      \                        overlap[i][j] = k\n        dp = [[10**9] * n for _\
      \ in range(1 << n)]\n        for i in range(n):\n            dp[1 << i][i] =\
      \ len(words[i])\n        for mask in range(1 << n):\n            for i in range(n):\n\
      \                if dp[mask][i] >= 10**9:\n                    continue\n  \
      \              for j in range(n):\n                    if mask & (1 << j):\n\
      \                        continue\n                    nxt = mask | (1 << j)\n\
      \                    dp[nxt][j] = min(dp[nxt][j], dp[mask][i] + len(words[j])\
      \ - overlap[i][j])\n        best = min(dp[(1 << n) - 1])\n        return len(result)\
      \ == best\n"
seed: 943
