entry:
  id: 566
  title: reshape-the-matrix
  params:
    mat:
      type: array
      items:
        type: array
        items:
          type: int
    r:
      type: int
    c:
      type: int
  call:
    cpp: "Solution().matrixReshape({mat}, {r}, {c})"
    rust: "Solution::matrix_reshape({mat}, {r}, {c})"
    python3: "Solution().matrixReshape({mat}, {r}, {c})"
    python2: "Solution().matrixReshape({mat}, {r}, {c})"
    ruby: "matrix_reshape({mat}, {r}, {c})"
    java: "new Solution().matrixReshape({mat}, {r}, {c})"
    csharp: "new Solution().MatrixReshape({mat}, {r}, {c})"
    kotlin: "Solution().matrixReshape({mat}, {r}, {c})"
    go: "matrixReshape({mat}, {r}, {c})"
    dart: "Solution().matrixReshape({mat}, {r}, {c})"
    swift: "Solution().matrixReshape({mat}, {r}, {c})"
    typescript: "matrixReshape({mat}, {r}, {c})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().matrixReshape(mat, r, c, {result})"
    checker: |
      class Checker:
          def matrixReshape(self, mat, r, c, result):
              if not isinstance(result, list) or not result or not all(isinstance(row, list) for row in result):
                  return False
              m = len(mat)
              n = len(mat[0])
              if m * n != r * c:
                  expected = mat
              else:
                  flat = []
                  for row in mat:
                      flat.extend(row)
                  expected = []
                  index = 0
                  for _ in range(r):
                      expected.append(flat[index:index + c])
                      index += c
              return result == expected
