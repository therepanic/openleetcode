entry:
  id: 807
  title: max-increase-to-keep-city-skyline
  params:
    grid:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().maxIncreaseKeepingSkyline({grid})
    rust: Solution::max_increase_keeping_skyline({grid})
    python3: Solution().maxIncreaseKeepingSkyline({grid})
    python2: Solution().maxIncreaseKeepingSkyline({grid})
    ruby: max_increase_keeping_skyline({grid})
    java: new Solution().maxIncreaseKeepingSkyline({grid})
    csharp: new Solution().MaxIncreaseKeepingSkyline({grid})
    kotlin: Solution().maxIncreaseKeepingSkyline({grid})
    go: maxIncreaseKeepingSkyline({grid})
    dart: Solution().maxIncreaseKeepingSkyline({grid})
    swift: Solution().maxIncreaseKeepingSkyline({grid})
    typescript: maxIncreaseKeepingSkyline({grid})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().maxIncreaseKeepingSkyline(grid, {result})
    checker: |
      class Checker:
          def maxIncreaseKeepingSkyline(self, grid, result):
              n = len(grid)
              row_max = [max(row) for row in grid]
              col_max = [max(grid[r][c] for r in range(n)) for c in range(n)]
              expected = 0
              for r in range(n):
                  for c in range(n):
                      expected += min(row_max[r], col_max[c]) - grid[r][c]
              return result == expected
