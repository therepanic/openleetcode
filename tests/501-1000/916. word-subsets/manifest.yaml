entry:
  id: 916
  title: word-subsets
  params:
    words1:
      type: array
      items:
        type: string
    words2:
      type: array
      items:
        type: string
  call:
    cpp: "Solution().wordSubsets({words1}, {words2})"
    rust: "Solution::word_subsets({words1}, {words2})"
    python3: "Solution().wordSubsets({words1}, {words2})"
    python2: "Solution().wordSubsets({words1}, {words2})"
    ruby: "word_subsets({words1}, {words2})"
    java: "new Solution().wordSubsets({words1}, {words2})"
    csharp: "new Solution().WordSubsets({words1}, {words2})"
    kotlin: "Solution().wordSubsets({words1}, {words2})"
    go: "wordSubsets({words1}, {words2})"
    dart: "Solution().wordSubsets({words1}, {words2})"
    swift: "Solution().wordSubsets({words1}, {words2})"
    typescript: "wordSubsets({words1}, {words2})"
judge:
  type: "ignore_order"
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().wordSubsets(words1, words2, {result})"
    checker: |
      class Checker:
          def wordSubsets(self, words1, words2, result):
              need = [0] * 26
              for w in words2:
                  cnt = [0] * 26
                  for ch in w:
                      cnt[ord(ch) - 97] += 1
                  for i in range(26):
                      if cnt[i] > need[i]:
                          need[i] = cnt[i]
              got = []
              for w in words1:
                  cnt = [0] * 26
                  for ch in w:
                      cnt[ord(ch) - 97] += 1
                  if all(cnt[i] >= need[i] for i in range(26)):
                      got.append(w)
              return sorted(got) == sorted(result)
seed: 916
