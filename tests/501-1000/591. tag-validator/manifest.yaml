entry:
  id: 591
  title: tag-validator
  params:
    code:
      type: string
  call:
    cpp: "Solution().isValid({code})"
    rust: "Solution::is_valid({code})"
    python3: "Solution().isValid({code})"
    python2: "Solution().isValid({code})"
    ruby: "is_valid({code})"
    java: "new Solution().isValid({code})"
    csharp: "new Solution().IsValid({code})"
    kotlin: "Solution().isValid({code})"
    go: "isValid({code})"
    dart: "Solution().isValid({code})"
    swift: "Solution().isValid({code})"
    typescript: "isValid({code})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().isValid(code, {result})"
    checker: |
      import re

      class Checker:
          def isValid(self, code, result):
              tag_pat = r"<(/?)([A-Z]{1,9})>"
              open_cdata = "<![CDATA["
              close_cdata = "]]>"
              stack = []
              first_tag_seen = False
              i = 0
              n = len(code)

              while i <= n:
                  s = code.find("<", i)
                  if s == -1:
                      break
                  e = code.find(">", s + 1)
                  if e == -1:
                      return result is False

                  candidate = code[s:e + 1]
                  match = re.fullmatch(tag_pat, candidate)
                  if match:
                      closing, tag = match.groups()
                      if closing == "":
                          if not first_tag_seen and s != 0:
                              return result is False
                          stack.append(tag)
                          first_tag_seen = True
                      else:
                          if not stack or stack[-1] != tag:
                              return result is False
                          if len(stack) == 1 and e != n - 1:
                              return result is False
                          stack.pop()
                      i = e + 1
                  elif code.startswith(open_cdata, s):
                      k = code.find(close_cdata, s + len(open_cdata))
                      if k == -1:
                          return result is False
                      i = k + len(close_cdata)
                  else:
                      return result is False

              expected = (not stack) and first_tag_seen
              return result == expected
seed: 591
