entry:
  id: 693
  title: binary-number-with-alternating-bits
  params:
    n:
      type: int
  call:
    cpp: Solution().hasAlternatingBits({n})
    rust: Solution::has_alternating_bits({n})
    python3: Solution().hasAlternatingBits({n})
    python2: Solution().hasAlternatingBits({n})
    ruby: has_alternating_bits({n})
    java: new Solution().hasAlternatingBits({n})
    csharp: new Solution().HasAlternatingBits({n})
    kotlin: Solution().hasAlternatingBits({n})
    go: hasAlternatingBits({n})
    dart: Solution().hasAlternatingBits({n})
    swift: Solution().hasAlternatingBits({n})
    typescript: hasAlternatingBits({n})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().hasAlternatingBits(n, {result})
    checker: |
      class Checker:
          def hasAlternatingBits(self, n, result):
              x = n ^ (n >> 1)
              expected = (x & (x + 1)) == 0
              return result == expected
