entry:
  id: 532
  title: "k-diff-pairs-in-an-array"
  params:
    nums:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: "Solution().findPairs({nums}, {k})"
    rust: "Solution::find_pairs({nums}, {k})"
    python3: "Solution().findPairs({nums}, {k})"
    python2: "Solution().findPairs({nums}, {k})"
    ruby: "find_pairs({nums}, {k})"
    java: "new Solution().findPairs({nums}, {k})"
    csharp: "new Solution().FindPairs({nums}, {k})"
    kotlin: "Solution().findPairs({nums}, {k})"
    go: "findPairs({nums}, {k})"
    dart: "Solution().findPairs({nums}, {k})"
    swift: "Solution().findPairs({nums}, {k})"
    typescript: "findPairs({nums}, {k})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(nums, k, {result})"
    checker: |
      from typing import Any, List

      class Checker:
          def check(self, nums: List[int], k: int, result: Any) -> bool:
              if not isinstance(result, int):
                  return False
              if not isinstance(nums, list) or not (1 <= len(nums) <= 10000):
                  return False
              if not isinstance(k, int) or not (0 <= k <= 10000000):
                  return False
              counts = {}
              for num in nums:
                  if not isinstance(num, int) or num < -10000000 or num > 10000000:
                      return False
                  counts[num] = counts.get(num, 0) + 1
              expected = 0
              if k == 0:
                  for count in counts.values():
                      if count >= 2:
                          expected += 1
              else:
                  for num in counts:
                      if num + k in counts:
                          expected += 1
              return result == expected
seed: 532532
