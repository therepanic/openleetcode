entry:
  id: 823
  title: binary-trees-with-factors
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: Solution().numFactoredBinaryTrees({arr})
    rust: Solution::num_factored_binary_trees({arr})
    python3: Solution().numFactoredBinaryTrees({arr})
    python2: Solution().numFactoredBinaryTrees({arr})
    ruby: num_factored_binary_trees({arr})
    java: new Solution().numFactoredBinaryTrees({arr})
    csharp: new Solution().NumFactoredBinaryTrees({arr})
    kotlin: Solution().numFactoredBinaryTrees({arr})
    go: numFactoredBinaryTrees({arr})
    dart: Solution().numFactoredBinaryTrees({arr})
    swift: Solution().numFactoredBinaryTrees({arr})
    typescript: numFactoredBinaryTrees({arr})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 128
oracle:
  python3:
    call: Checker().check(arr, {result})
    checker: |
      class Checker:
          def check(self, arr, result):
              return isinstance(result, int)
