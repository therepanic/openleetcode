entry:
  id: 969
  title: pancake-sorting
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: Solution().pancakeSort({arr})
    rust: Solution::pancake_sort({arr})
    python3: Solution().pancakeSort({arr})
    python2: Solution().pancakeSort({arr})
    ruby: pancake_sort({arr})
    java: new Solution().pancakeSort({arr})
    csharp: new Solution().PancakeSort({arr})
    kotlin: Solution().pancakeSort({arr})
    go: pancakeSort({arr})
    dart: Solution().pancakeSort({arr})
    swift: Solution().pancakeSort({arr})
    typescript: pancakeSort({arr})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().pancakeSort(arr, {result})
    checker:
      "class Checker:\n    def pancakeSort(self, arr, result):\n        if\
      \ not isinstance(result, list):\n            return False\n        work = list(arr)\n\
      \        n = len(work)\n        for k in result:\n            if not isinstance(k,\
      \ int) or k < 1 or k > n:\n                return False\n            work[:k]\
      \ = reversed(work[:k])\n        return work == sorted(arr)\n"
seed: 969
