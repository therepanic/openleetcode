judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().pyramidTransition(bottom, allowed, {result})"
    checker: |
      class Checker:
          def pyramidTransition(self, bottom, allowed, result):
              if not isinstance(result, bool):
                  return False
              if not isinstance(bottom, str):
                  return False
              if not isinstance(allowed, list):
                  return False

              table = {}
              for triple in allowed:
                  if not isinstance(triple, str) or len(triple) != 3:
                      return False
                  key = triple[:2]
                  if key not in table:
                      table[key] = set()
                  table[key].add(triple[2])

              memo = {}

              def can_build(row):
                  if len(row) == 1:
                      return True
                  if row in memo:
                      return memo[row]

                  next_rows = [""]
                  for i in range(len(row) - 1):
                      tops = table.get(row[i:i + 2])
                      if not tops:
                          memo[row] = False
                          return False
                      built = []
                      for prefix in next_rows:
                          for ch in tops:
                              built.append(prefix + ch)
                      next_rows = built

                  for nxt in next_rows:
                      if can_build(nxt):
                          memo[row] = True
                          return True

                  memo[row] = False
                  return False

              expected = can_build(bottom)
              return result == expected
