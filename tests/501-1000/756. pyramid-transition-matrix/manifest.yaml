entry:
  id: 756
  title: pyramid-transition-matrix
  params:
    bottom:
      type: string
    allowed:
      type: array
      items:
        type: string
  call:
    cpp: "Solution().pyramidTransition({bottom}, {allowed})"
    rust: "Solution::pyramid_transition({bottom}, {allowed})"
    python3: "Solution().pyramidTransition({bottom}, {allowed})"
    python2: "Solution().pyramidTransition({bottom}, {allowed})"
    ruby: "pyramid_transition({bottom}, {allowed})"
    java: "new Solution().pyramidTransition({bottom}, {allowed})"
    csharp: "new Solution().PyramidTransition({bottom}, {allowed})"
    kotlin: "Solution().pyramidTransition({bottom}, {allowed})"
    go: "pyramidTransition({bottom}, {allowed})"
    dart: "Solution().pyramidTransition({bottom}, {allowed})"
    swift: "Solution().pyramidTransition({bottom}, {allowed})"
