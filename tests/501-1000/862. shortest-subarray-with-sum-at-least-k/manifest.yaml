entry:
  id: 862
  title: shortest-subarray-with-sum-at-least-k
  params:
    nums:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: "Solution().shortestSubarray({nums}, {k})"
    rust: "Solution::shortest_subarray({nums}, {k})"
    python3: "Solution().shortestSubarray({nums}, {k})"
    python2: "Solution().shortestSubarray({nums}, {k})"
    ruby: "shortest_subarray({nums}, {k})"
    java: "new Solution().shortestSubarray({nums}, {k})"
    csharp: "new Solution().ShortestSubarray({nums}, {k})"
    kotlin: "Solution().shortestSubarray({nums}, {k})"
    go: "shortestSubarray({nums}, {k})"
    dart: "Solution().shortestSubarray({nums}, {k})"
    swift: "Solution().shortestSubarray({nums}, {k})"
    typescript: "shortestSubarray({nums}, {k})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().shortestSubarray(nums, k, {result})"
    checker: |
      class Checker:
          def shortestSubarray(self, nums, k, result):
              if not isinstance(result, int):
                  return False
              n = len(nums)
              best = n + 1
              s = [0]
              for x in nums:
                  s.append(s[-1] + x)
              from collections import deque
              dq = deque()
              for i, cur in enumerate(s):
                  while dq and cur <= s[dq[-1]]:
                      dq.pop()
                  while dq and cur - s[dq[0]] >= k:
                      best = min(best, i - dq.popleft())
                  dq.append(i)
              exp = -1 if best == n + 1 else best
              return result == exp

