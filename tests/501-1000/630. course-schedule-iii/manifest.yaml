entry:
  id: 630
  title: "course-schedule-iii"
  params:
    courses:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().scheduleCourse({courses})"
    rust: "Solution::schedule_course({courses})"
    python3: "Solution().scheduleCourse({courses})"
    python2: "Solution().scheduleCourse({courses})"
    ruby: "schedule_course({courses})"
    java: "new Solution().scheduleCourse({courses})"
    csharp: "new Solution().ScheduleCourse({courses})"
    kotlin: "Solution().scheduleCourse({courses})"
    go: "scheduleCourse({courses})"
    dart: "Solution().scheduleCourse({courses})"
    swift: "Solution().scheduleCourse({courses})"
    typescript: "scheduleCourse({courses})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().accept({result})"
    checker: |
      class Checker:
          def accept(self, result):
              return True

seed: 630

