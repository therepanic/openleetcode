  title: sliding-puzzle
  params:
    board:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().slidingPuzzle({board})"
    rust: "Solution::sliding_puzzle({board})"
    python3: "Solution().slidingPuzzle({board})"
    python2: "Solution().slidingPuzzle({board})"
    ruby: "sliding_puzzle({board})"
    java: "new Solution().slidingPuzzle({board})"
    csharp: "new Solution().SlidingPuzzle({board})"
    kotlin: "Solution().slidingPuzzle({board})"
    go: "slidingPuzzle({board})"
    dart: "Solution().slidingPuzzle({board})"
    swift: "Solution().slidingPuzzle({board})"
    typescript: "slidingPuzzle({board})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().slidingPuzzle(board, {result})"
    checker: |
      class Checker:
          def slidingPuzzle(self, board, result):
              if not isinstance(result, int):
                  return False
              if result < -1 or result > 20:
                  return False
              if not isinstance(board, list) or len(board) != 2:
                  return False
              seen = set()
              for row in board:
                  if not isinstance(row, list) or len(row) != 3:
                      return False
                  for x in row:
                      if not isinstance(x, int) or x < 0 or x > 5:
                          return False
                      if x in seen:
                          return False
                      seen.add(x)
              return len(seen) == 6
seed: 773
