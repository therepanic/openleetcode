entry:
  id: 516
  title: longest-palindromic-subsequence
  params:
    s:
      type: string
  call:
    cpp: Solution().longestPalindromeSubseq({s})
    rust: Solution::longest_palindrome_subseq({s})
    python3: Solution().longestPalindromeSubseq({s})
    python2: Solution().longestPalindromeSubseq({s})
    ruby: longest_palindrome_subseq({s})
    java: new Solution().longestPalindromeSubseq({s})
    csharp: new Solution().LongestPalindromeSubseq({s})
    kotlin: Solution().longestPalindromeSubseq({s})
    go: longestPalindromeSubseq({s})
    dart: Solution().longestPalindromeSubseq({s})
    swift: Solution().longestPalindromeSubseq({s})
    typescript: longestPalindromeSubseq({s})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(s, {result})
    checker: "class Checker:\n    def check(self, s, result):\n        if not isinstance(result, int):\n            return False\n        n = len(s)\n        dp = [[0] * n for _ in range(n)]\n        for i in range(n - 1, -1, -1):\n            dp[i][i] = 1\n            for j in range(i + 1, n):\n                if s[i] == s[j]:\n                    dp[i][j] = dp[i + 1][j - 1] + 2\n                else:\n                    dp[i][j] = max(dp[i + 1][j], dp[i][j - 1])\n        return result == dp[0][n - 1]\n"
seed: 516
