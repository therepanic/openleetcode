entry:
  id: 698
  title: "partition-to-k-equal-sum-subsets"
  params:
    nums:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: "Solution().canPartitionKSubsets({nums}, {k})"
    rust: "Solution::can_partition_k_subsets({nums}, {k})"
    python3: "Solution().canPartitionKSubsets({nums}, {k})"
    python2: "Solution().canPartitionKSubsets({nums}, {k})"
    ruby: "can_partition_k_subsets({nums}, {k})"
    java: "new Solution().canPartitionKSubsets({nums}, {k})"
    csharp: "new Solution().CanPartitionKSubsets({nums}, {k})"
    kotlin: "Solution().canPartitionKSubsets({nums}, {k})"
    go: "canPartitionKSubsets({nums}, {k})"
    dart: "Solution().canPartitionKSubsets({nums}, {k})"
    swift: "Solution().canPartitionKSubsets({nums}, {k})"
    typescript: "canPartitionKSubsets({nums}, {k})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check({result})"
    checker: |
      class Checker:
          def check(self, result):
              return isinstance(result, bool)
seed: 698
tests:
  - name: "example_1"
    in:
      nums: [4, 3, 2, 3, 5, 2, 1]
      k: 4
    out: true
  - name: "example_2"
    in:
      nums: [1, 2, 3, 4]
      k: 3
    out: false
  - name: "single_element_true"
    in:
      nums: [7]
      k: 1
    out: true
  - name: "single_element_false"
    in:
