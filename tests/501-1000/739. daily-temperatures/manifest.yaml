entry:
  id: 739
  title: daily-temperatures
  params:
    temperatures:
      type: array
      items:
        type: int
  call:
    cpp: Solution().dailyTemperatures({temperatures})
    rust: Solution::daily_temperatures({temperatures})
    python3: Solution().dailyTemperatures({temperatures})
    python2: Solution().dailyTemperatures({temperatures})
    ruby: daily_temperatures({temperatures})
    java: new Solution().dailyTemperatures({temperatures})
    csharp: new Solution().DailyTemperatures({temperatures})
    kotlin: Solution().dailyTemperatures({temperatures})
    go: dailyTemperatures({temperatures})
    dart: Solution().dailyTemperatures({temperatures})
    swift: Solution().dailyTemperatures({temperatures})
    typescript: dailyTemperatures({temperatures})

judge:
  type: exact

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: Checker().check(temperatures, {result})
    checker: |
      class Checker(object):
          def check(self, temperatures, result):
              if not isinstance(result, list):
                  return False
              if len(result) != len(temperatures):
                  return False
              for value in result:
                  if not isinstance(value, int):
                      return False
                  if value < 0:
                      return False
              n = len(temperatures)
              nearest = [None] * 101
              for i in range(n - 1, -1, -1):
                  cur = temperatures[i]
                  best = None
                  for warmer in range(cur + 1, 101):
                      idx = nearest[warmer]
                      if idx is not None and (best is None or idx < best):
                          best = idx
                  expected = 0 if best is None else best - i
                  if result[i] != expected:
                      return False
                  nearest[cur] = i
              return True

seed: 739

