entry:
  id: 657
  title: robot-return-to-origin
  params:
    moves:
      type: string
  call:
    cpp: "Solution().judgeCircle({moves})"
    rust: "Solution::judge_circle({moves})"
    python3: "Solution().judgeCircle({moves})"
    python2: "Solution().judgeCircle({moves})"
    ruby: "judge_circle({moves})"
    java: "new Solution().judgeCircle({moves})"
    csharp: "new Solution().JudgeCircle({moves})"
    kotlin: "Solution().judgeCircle({moves})"
    go: "judgeCircle({moves})"
    dart: "Solution().judgeCircle({moves})"
    swift: "Solution().judgeCircle({moves})"
    typescript: "judgeCircle({moves})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().judgeCircle(moves, {result})"
    checker: |
      class Checker:
          def judgeCircle(self, moves, result):
              expected = moves.count('L') == moves.count('R') and moves.count('U') == moves.count('D')
              return isinstance(result, bool) and result == expected
seed: 657
