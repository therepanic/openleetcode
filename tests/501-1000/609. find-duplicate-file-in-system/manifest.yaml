entry:
  id: 609
  title: find-duplicate-file-in-system
  params:
    paths:
      type: array
      items:
        type: string
  call:
    cpp: "Solution().findDuplicate({paths})"
    rust: "Solution::find_duplicate({paths})"
    python3: "Solution().findDuplicate({paths})"
    python2: "Solution().findDuplicate({paths})"
    ruby: "find_duplicate({paths})"
    java: "new Solution().findDuplicate({paths})"
    csharp: "new Solution().FindDuplicate({paths})"
    kotlin: "Solution().findDuplicate({paths})"
    go: "findDuplicate({paths})"
    dart: "Solution().findDuplicate({paths})"
    swift: "Solution().findDuplicate({paths})"
    typescript: "findDuplicate({paths})"
judge:
  type: ignore_order
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().findDuplicate(paths, {result})"
    checker: |
      from typing import Any

      class Checker:
          def findDuplicate(self, paths, result):
              if not isinstance(result, list):
                  return False

              expected = {}
              for path in paths:
                  parts = path.split(" ")
                  if not parts:
                      return False
                  directory = parts[0]
                  for file in parts[1:]:
                      if "(" not in file or not file.endswith(")"):
                          return False
                      name, content = file.split("(", 1)
                      content = content[:-1]
                      full_path = directory + "/" + name
                      expected.setdefault(content, []).append(full_path)

              expected_groups = {
                  frozenset(group)
                  for group in expected.values()
                  if len(group) > 1
              }

              try:
                  actual_groups = []
                  seen_paths = set()
                  for group in result:
                      if not isinstance(group, list) or len(group) < 2:
                          return False
                      normalized = []
                      for path in group:
                          if not isinstance(path, str):
                              return False
                          if path in seen_paths:
                              return False
                          seen_paths.add(path)
                          normalized.append(path)
                      actual_groups.append(frozenset(normalized))
              except Exception:
                  return False

              if len(actual_groups) != len(set(actual_groups)):
                  return False
              return set(actual_groups) == expected_groups
seed: 609
tests:
  - name: example-1
    in:
      paths:
        - root/a 1.txt(abcd) 2.txt(efgh)
        - root/c 3.txt(abcd)
        - root/c/d 4.txt(efgh)
        - root 4.txt(efgh)
  - name: example-2
    in:
      paths:
        - root/a 1.txt(abcd) 2.txt(efgh)
        - root/c 3.txt(abcd)
        - root/c/d 4.txt(efgh)
  - name: single-directory-single-file
    in:
      paths:
        - root a.txt(x)
  - name: single-directory-two-unique-files
    in:
      paths:
        - root a.txt(x) b.txt(y)
  - name: two-directories-one-duplicate-group
    in:
      paths:
        - root/a 1.txt(abcd) 2.txt(efgh)
        - root/b 3.txt(abcd)
  - name: two-directories-two-duplicate-groups
    in:
      paths:
        - root/a 1.txt(abcd) 2.txt(efgh)
        - root/b 3.txt(abcd) 4.txt(efgh)
  - name: duplicate-with-root-directory
    in:
      paths:
        - root/a 1.txt(abcd)
        - root 2.txt(abcd)
  - name: all-unique-many-files
    in:
      paths:
        - root/a 1.txt(a) 2.txt(b) 3.txt(c)
        - root/b 4.txt(d) 5.txt(e)
        - root/c 6.txt(f)
  - name: duplicate-only-two-files
    in:
