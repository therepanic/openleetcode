entry:
  id: 636
  title: exclusive-time-of-functions
  params:
    n:
      type: int
    logs:
      type: array
      items:
        type: string
  call:
    cpp: Solution().exclusiveTime({n}, {logs})
    rust: Solution::exclusive_time({n}, {logs})
    python3: Solution().exclusiveTime({n}, {logs})
    python2: Solution().exclusiveTime({n}, {logs})
    ruby: exclusive_time({n}, {logs})
    java: new Solution().exclusiveTime({n}, {logs})
    csharp: new Solution().ExclusiveTime({n}, {logs})
    kotlin: Solution().exclusiveTime({n}, {logs})
    go: exclusiveTime({n}, {logs})
    dart: Solution().exclusiveTime({n}, {logs})
    swift: Solution().exclusiveTime({n}, {logs})
    typescript: exclusiveTime({n}, {logs})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: Checker().exclusiveTime(n, logs, {result})
    checker:
      "class Checker:\n    def exclusiveTime(self, n: int, logs: List[str], result: Any) -> bool:\n        if not isinstance(result,\
      \ list) or len(result) != n:\n            return False\n        if any(not isinstance(x, int) for x in result):\n  \
      \          return False\n\n        stack = []\n        expected = [0] * n\n\n        for log in logs:\n            try:\n\
      \                fid_s, kind, ts_s = log.split(\":\")\n                fid = int(fid_s)\n                ts = int(ts_s)\n\
      \            except Exception:\n                return False\n\n            if not (0 <= fid < n):\n               \
      \ return False\n\n            if kind == \"start\":\n                stack.append([fid, ts])\n            elif kind\
      \ == \"end\":\n                if not stack:\n                    return False\n                cur_fid, start_ts =\
      \ stack.pop()\n                if cur_fid != fid:\n                    return False\n                spent = ts - start_ts\
      \ + 1\n                expected[cur_fid] += spent\n                if stack:\n                    expected[stack[-1][0]]\
      \ -= spent\n            else:\n                return False\n\n        return result == expected\n"
seed: 636636
