entry:
  id: 575
  title: distribute-candies
  params:
    candyType:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().distributeCandies({candyType})"
    rust: "Solution::distribute_candies({candyType})"
    python3: "Solution().distributeCandies({candyType})"
    python2: "Solution().distributeCandies({candyType})"
    ruby: "distribute_candies({candyType})"
    java: "new Solution().distributeCandies({candyType})"
    csharp: "new Solution().DistributeCandies({candyType})"
    kotlin: "Solution().distributeCandies({candyType})"
    go: "distributeCandies({candyType})"
    dart: "Solution().distributeCandies({candyType})"
    swift: "Solution().distributeCandies({candyType})"
    typescript: "distributeCandies({candyType})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().distributeCandies(candyType, {result})"
    checker: |
      class Checker:
          def distributeCandies(self, candyType, result):
              if not isinstance(result, (int, float)):
                  return False
              if not isinstance(candyType, list):
                  return False
              n = len(candyType)
              if n < 2 or n > 10000 or n % 2 != 0:
                  return False
              for value in candyType:
                  if not isinstance(value, int) or value < -100000 or value > 100000:
                      return False
              expected = min(n // 2, len(set(candyType)))
              return result == expected
seed: 575
