entry:
  id: 907
  title: "sum-of-subarray-minimums"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().sumSubarrayMins({nums})"
    rust: "Solution::sum_subarray_mins({nums})"
    python3: "Solution().sumSubarrayMins({nums})"
    python2: "Solution().sumSubarrayMins({nums})"
    ruby: "sum_subarray_mins({nums})"
    java: "new Solution().sumSubarrayMins({nums})"
    csharp: "new Solution().SumSubarrayMins({nums})"
    kotlin: "Solution().sumSubarrayMins({nums})"
    go: "sumSubarrayMins({nums})"
    dart: "Solution().sumSubarrayMins({nums})"
    swift: "Solution().sumSubarrayMins({nums})"
    typescript: "sumSubarrayMins({nums})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().sumSubarrayMins(nums, {result})"
    checker: |
      class Checker:
          def sumSubarrayMins(self, nums, result):
              mod = 10**9 + 7
              stack = []
              res = [0] * len(nums)
              for i, x in enumerate(nums):
                  while stack and nums[stack[-1]] > x:
                      stack.pop()
                  j = stack[-1] if stack else -1
                  res[i] = (res[j] if j != -1 else 0) + (i - j) * x
                  stack.append(i)
              expected = sum(res) % mod
              return result == expected
seed: 12345
