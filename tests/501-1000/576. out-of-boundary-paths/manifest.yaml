    cpp: Solution().findPaths({m}, {n}, {maxMove}, {startRow}, {startColumn})
    rust: Solution::find_paths({m}, {n}, {maxMove}, {startRow}, {startColumn})
    python3: Solution().findPaths({m}, {n}, {maxMove}, {startRow}, {startColumn})
    python2: Solution().findPaths({m}, {n}, {maxMove}, {startRow}, {startColumn})
    ruby: find_paths({m}, {n}, {maxMove}, {startRow}, {startColumn})
    java: new Solution().findPaths({m}, {n}, {maxMove}, {startRow}, {startColumn})
    csharp: new Solution().FindPaths({m}, {n}, {maxMove}, {startRow}, {startColumn})
    kotlin: Solution().findPaths({m}, {n}, {maxMove}, {startRow}, {startColumn})
    go: findPaths({m}, {n}, {maxMove}, {startRow}, {startColumn})
    dart: Solution().findPaths({m}, {n}, {maxMove}, {startRow}, {startColumn})
    swift: Solution().findPaths({m}, {n}, {maxMove}, {startRow}, {startColumn})
    typescript: findPaths({m}, {n}, {maxMove}, {startRow}, {startColumn})
judge:
  type: exact
limits:
  time_ms: 1200
  memory_mb: 256
oracle:
  python3:
    call: Checker().findPaths(m, n, maxMove, startRow, startColumn, {result})
    checker: |
      class Checker:
          def findPaths(self, m, n, maxMove, startRow, startColumn, result):
              mod = 10**9 + 7
              dp = [[0] * n for _ in range(m)]
              for _ in range(maxMove):
                  ndp = [[0] * n for _ in range(m)]
                  for i in range(m):
                      for j in range(n):
                          val = 0
                          for di, dj in ((1, 0), (-1, 0), (0, 1), (0, -1)):
                              x = i + di
                              y = j + dj
                              if x < 0 or x >= m or y < 0 or y >= n:
                                  val += 1
                              else:
                                  val += dp[x][y]
                          ndp[i][j] = val % mod
                  dp = ndp
              return isinstance(result, int) and result == dp[startRow][startColumn]
seed: 576
