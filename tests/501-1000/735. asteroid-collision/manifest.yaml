entry:
  id: 735
  title: asteroid-collision
  params:
    asteroids:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().asteroidCollision({asteroids})"
    rust: "Solution::asteroid_collision({asteroids})"
    python3: "Solution().asteroidCollision({asteroids})"
    python2: "Solution().asteroidCollision({asteroids})"
    ruby: "asteroid_collision({asteroids})"
    java: "new Solution().asteroidCollision({asteroids})"
    csharp: "new Solution().AsteroidCollision({asteroids})"
    kotlin: "Solution().asteroidCollision({asteroids})"
    go: "asteroidCollision({asteroids})"
    dart: "Solution().asteroidCollision({asteroids})"
    swift: "Solution().asteroidCollision({asteroids})"
    typescript: "asteroidCollision({asteroids})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().asteroidCollision(asteroids, {result})"
    checker: |
      class Checker:
          def asteroidCollision(self, asteroids, result):
              if not isinstance(result, list):
                  return False
              if any(not isinstance(x, int) for x in result):
                  return False

              expected = []
              for a in asteroids:
                  while expected and a < 0 < expected[-1]:
                      if -a > expected[-1]:
                          expected.pop()
                          continue
                      if -a == expected[-1]:
                          expected.pop()
                      break
                  else:
                      expected.append(a)

              return result == expected
seed: 735
