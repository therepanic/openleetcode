entry:
  id: 1047
  title: "remove-all-adjacent-duplicates-in-string"
  params:
    s:
      type: string
  call:
    cpp: "Solution().removeDuplicates({s})"
    rust: "Solution::remove_duplicates({s})"
    python3: "Solution().removeDuplicates({s})"
    python2: "Solution().removeDuplicates({s})"
    ruby: "remove_duplicates({s})"
    java: "new Solution().removeDuplicates({s})"
    csharp: "new Solution().RemoveDuplicates({s})"
    kotlin: "Solution().removeDuplicates({s})"
    go: "removeDuplicates({s})"
    dart: "Solution().removeDuplicates({s})"
    swift: "Solution().removeDuplicates({s})"
    typescript: "removeDuplicates({s})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().removeDuplicates(s, {result})"
    checker: |
      class Checker:
          def removeDuplicates(self, s, result) -> bool:
              stack = []
              for ch in s:
                  if stack and stack[-1] == ch:
                      stack.pop()
                  else:
                      stack.append(ch)
              return result == "".join(stack)

seed: 1047

