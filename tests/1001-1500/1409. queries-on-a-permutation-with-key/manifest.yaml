entry:
  id: 1409
  title: "queries-on-a-permutation-with-key"
  params:
    queries:
      type: array
      items:
        type: int
    m:
      type: int
  call:
    cpp: "Solution().processQueries({queries}, {m})"
    rust: "Solution::process_queries({queries}, {m})"
    python3: "Solution().processQueries({queries}, {m})"
    python2: "Solution().processQueries({queries}, {m})"
    ruby: "process_queries({queries}, {m})"
    java: "new Solution().processQueries({queries}, {m})"
    csharp: "new Solution().ProcessQueries({queries}, {m})"
    kotlin: "Solution().processQueries({queries}, {m})"
    go: "processQueries({queries}, {m})"
    dart: "Solution().processQueries({queries}, {m})"
    swift: "Solution().processQueries({queries}, {m})"
    typescript: "processQueries({queries}, {m})"
judge:
  type: "exact"
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().processQueries(queries, m, {result})"
    checker: |
      class Checker:
          def processQueries(self, queries, m, result):
              if not isinstance(m, int) or not 1 <= m <= 1000:
                  return False
              if not isinstance(queries, list) or not 1 <= len(queries) <= m:
                  return False
              if not isinstance(result, list) or len(result) != len(queries):
                  return False
              last_seen = {}
              for index, (q, got) in enumerate(zip(queries, result)):
                  if not isinstance(q, int) or not 1 <= q <= m:
                      return False
                  if not isinstance(got, int):
                      return False
                  if q in last_seen:
                      newer = sum(1 for stamp in last_seen.values() if stamp > last_seen[q])
                      expected = newer
                  else:
                      unqueried_less = (q - 1) - sum(1 for value in last_seen if value < q)
                      expected = len(last_seen) + unqueried_less
                  if got != expected or not 0 <= got < m:
                      return False
                  last_seen[q] = index
              return True
seed: 1409
