entry:
  id: 1078
  title: occurrences-after-bigram
  params:
    text:
      type: string
    first:
      type: string
    second:
      type: string
  call:
    cpp: "Solution().findOcurrences({text}, {first}, {second})"
    rust: "Solution::find_ocurrences({text}, {first}, {second})"
    python3: "Solution().findOcurrences({text}, {first}, {second})"
    python2: "Solution().findOcurrences({text}, {first}, {second})"
    ruby: "find_ocurrences({text}, {first}, {second})"
    java: "new Solution().findOcurrences({text}, {first}, {second})"
    csharp: "new Solution().FindOcurrences({text}, {first}, {second})"
    kotlin: "Solution().findOcurrences({text}, {first}, {second})"
    go: "findOcurrences({text}, {first}, {second})"
    dart: "Solution().findOcurrences({text}, {first}, {second})"
    swift: "Solution().findOcurrences({text}, {first}, {second})"
    typescript: "findOcurrences({text}, {first}, {second})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check({result}, {text}, {first}, {second})"
    checker: |
      class Checker:
          def check(self, result, text=None, first=None, second=None):
              if not isinstance(result, list):
                  return False
              words = text.split()
              expected = []
              for i in range(len(words) - 2):
                  if words[i] == first and words[i + 1] == second:
                      expected.append(words[i + 2])
              return result == expected
seed: 1078
