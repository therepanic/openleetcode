entry:
  id: 1013
  title: partition array into three parts with equal sum
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().canThreePartsEqualSum({arr})"
    rust: "Solution::can_three_parts_equal_sum({arr})"
    python3: "Solution().canThreePartsEqualSum({arr})"
    python2: "Solution().canThreePartsEqualSum({arr})"
    ruby: "can_three_parts_equal_sum({arr})"
    java: "new Solution().canThreePartsEqualSum({arr})"
    csharp: "new Solution().CanThreePartsEqualSum({arr})"
    kotlin: "Solution().canThreePartsEqualSum({arr})"
    go: "canThreePartsEqualSum({arr})"
    dart: "Solution().canThreePartsEqualSum({arr})"
    swift: "Solution().canThreePartsEqualSum({arr})"
    typescript: "canThreePartsEqualSum({arr})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check({result})"
    checker: |
      class Checker:
          def check(self, result):
              return True
seed: 1013
