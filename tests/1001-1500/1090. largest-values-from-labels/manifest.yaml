    python3: "Solution().largestValsFromLabels({values}, {labels}, {numWanted}, {useLimit})"
    python2: "Solution().largestValsFromLabels({values}, {labels}, {numWanted}, {useLimit})"
    ruby: "largest_vals_from_labels({values}, {labels}, {numWanted}, {useLimit})"
    java: "new Solution().largestValsFromLabels({values}, {labels}, {numWanted}, {useLimit})"
    csharp: "new Solution().LargestValsFromLabels({values}, {labels}, {numWanted}, {useLimit})"
    kotlin: "Solution().largestValsFromLabels({values}, {labels}, {numWanted}, {useLimit})"
    go: "largestValsFromLabels({values}, {labels}, {numWanted}, {useLimit})"
    dart: "Solution().largestValsFromLabels({values}, {labels}, {numWanted}, {useLimit})"
    swift: "Solution().largestValsFromLabels({values}, {labels}, {numWanted}, {useLimit})"
    typescript: "largestValsFromLabels({values}, {labels}, {numWanted}, {useLimit})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().largestValsFromLabels(values, labels, numWanted, useLimit, {result})"
    checker: |
      class Checker:
          def largestValsFromLabels(self, values, labels, numWanted, useLimit, result):
              pairs = sorted(zip(values, labels), reverse=True)
              res = 0
              freq = {}
              for value, label in pairs:
                  if numWanted == 0:
                      break
                  if freq.get(label, 0) < useLimit:
                      res += value
                      freq[label] = freq.get(label, 0) + 1
                      numWanted -= 1
              return res == result
seed: 1090
