entry:
  id: 1319
  title: "number-of-operations-to-make-network-connected"
  params:
    n:
      type: int
    connections:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().makeConnected({n}, {connections})"
    rust: "Solution::make_connected({n}, {connections})"
    python3: "Solution().makeConnected({n}, {connections})"
    python2: "Solution().makeConnected({n}, {connections})"
    ruby: "make_connected({n}, {connections})"
    java: "new Solution().makeConnected({n}, {connections})"
    csharp: "new Solution().MakeConnected({n}, {connections})"
    kotlin: "Solution().makeConnected({n}, {connections})"
    go: "makeConnected({n}, {connections})"
    dart: "Solution().makeConnected({n}, {connections})"
    swift: "Solution().makeConnected({n}, {connections})"
    typescript: "makeConnected({n}, {connections})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 300
oracle:
  python3:
    call: "Checker().makeConnected(n, connections, {result})"
    checker: |
      class Checker:
          def makeConnected(self, n, connections, result):
              graph = [[] for _ in range(n)]
              for a, b in connections:
                  graph[a].append(b)
                  graph[b].append(a)
              components = 0
              seen = [False] * n
              for start in range(n):
                  if seen[start]:
                      continue
                  components += 1
                  seen[start] = True
                  stack = [start]
                  while stack:
                      node = stack.pop()
                      for neighbor in graph[node]:
                          if not seen[neighbor]:
                              seen[neighbor] = True
                              stack.append(neighbor)
              expected = -1 if len(connections) < n - 1 else components - 1
              return isinstance(result, int) and not isinstance(result, bool) and result == expected
seed: 1319
