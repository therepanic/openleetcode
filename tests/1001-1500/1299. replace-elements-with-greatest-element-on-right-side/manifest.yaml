entry:
  id: 1299
  title: "replace-elements-with-greatest-element-on-right-side"
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().replaceElements({arr})"
    rust: "Solution::replace_elements({arr})"
    python3: "Solution().replaceElements({arr})"
    python2: "Solution().replaceElements({arr})"
    ruby: "replace_elements({arr})"
    java: "new Solution().replaceElements({arr})"
    csharp: "new Solution().ReplaceElements({arr})"
    kotlin: "Solution().replaceElements({arr})"
    go: "replaceElements({arr})"
    dart: "Solution().replaceElements({arr})"
    swift: "Solution().replaceElements({arr})"
    typescript: "replaceElements({arr})"
judge:
  type: "exact"
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().replaceElements(arr, {result})"
    checker: |
      class Checker:
          def replaceElements(self, arr, result):
              if not isinstance(result, list) or len(result) != len(arr):
                  return False
              greatest_right = -1
              for i in range(len(arr) - 1, -1, -1):
                  if result[i] != greatest_right:
                      return False
                  greatest_right = max(greatest_right, arr[i])
              return True
seed: 1299
