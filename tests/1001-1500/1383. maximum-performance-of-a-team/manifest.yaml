entry:
  id: 1383
  title: "maximum-performance-of-a-team"
  params:
    n:
      type: int
    speed:
      type: array
      items:
        type: int
    efficiency:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: "Solution().maxPerformance({n}, {speed}, {efficiency}, {k})"
    rust: "Solution::max_performance({n}, {speed}, {efficiency}, {k})"
    python3: "Solution().maxPerformance({n}, {speed}, {efficiency}, {k})"
    python2: "Solution().maxPerformance({n}, {speed}, {efficiency}, {k})"
    ruby: "max_performance({n}, {speed}, {efficiency}, {k})"
    java: "new Solution().maxPerformance({n}, {speed}, {efficiency}, {k})"
    csharp: "new Solution().MaxPerformance({n}, {speed}, {efficiency}, {k})"
    kotlin: "Solution().maxPerformance({n}, {speed}, {efficiency}, {k})"
    go: "maxPerformance({n}, {speed}, {efficiency}, {k})"
    dart: "Solution().maxPerformance({n}, {speed}, {efficiency}, {k})"
    swift: "Solution().maxPerformance({n}, {speed}, {efficiency}, {k})"
    typescript: "maxPerformance({n}, {speed}, {efficiency}, {k})"
judge:
  type: "exact"
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().maxPerformance(n, speed, efficiency, k, {result})"
    checker: |
      class Checker:
          def maxPerformance(self, n, speed, efficiency, k, result):
              if type(result) is not int:
                  return False
              if type(n) is not int or n < 2 or n > 100000:
                  return False
              if type(k) is not int or k < 1 or k > n:
                  return False
              if len(speed) != n or len(efficiency) != n:
                  return False
              if any(type(x) is not int or x < 1 or x > 100000 for x in speed):
                  return False
              if any(type(x) is not int or x < 1 or x > 100000000 for x in efficiency):
                  return False
              mod = 1000000007
              if n <= 12:
                  from itertools import combinations
                  best = 0
                  for size in range(1, k + 1):
                      for chosen in combinations(range(n), size):
                          total_speed = sum(speed[i] for i in chosen)
                          team_efficiency = min(efficiency[i] for i in chosen)
                          best = max(best, total_speed * team_efficiency)
                  expected = best % mod
              else:
                  import heapq
                  total_speed = 0
                  weakest = []
                  best = 0
                  engineers = sorted(zip(efficiency, speed), key=lambda pair: pair[0], reverse=True)
                  for team_efficiency, engineer_speed in engineers:
                      heapq.heappush(weakest, engineer_speed)
                      total_speed += engineer_speed
                      if len(weakest) > k:
                          total_speed -= heapq.heappop(weakest)
                      candidate = total_speed * team_efficiency
                      if candidate > best:
                          best = candidate
                  expected = best % mod
              return result == expected
seed: 1383
