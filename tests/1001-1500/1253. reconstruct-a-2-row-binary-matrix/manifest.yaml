entry:
  id: 1253
  title: "reconstruct-a-2-row-binary-matrix"
  params:
    upper:
      type: int
    lower:
      type: int
    colsum:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().reconstructMatrix({upper}, {lower}, {colsum})"
    rust: "Solution::reconstruct_matrix({upper}, {lower}, {colsum})"
    python3: "Solution().reconstructMatrix({upper}, {lower}, {colsum})"
    python2: "Solution().reconstructMatrix({upper}, {lower}, {colsum})"
    ruby: "reconstruct_matrix({upper}, {lower}, {colsum})"
    java: "new Solution().reconstructMatrix({upper}, {lower}, {colsum})"
    csharp: "new Solution().ReconstructMatrix({upper}, {lower}, {colsum})"
    kotlin: "Solution().reconstructMatrix({upper}, {lower}, {colsum})"
    go: "reconstructMatrix({upper}, {lower}, {colsum})"
    dart: "Solution().reconstructMatrix({upper}, {lower}, {colsum})"
    swift: "Solution().reconstructMatrix({upper}, {lower}, {colsum})"
    typescript: "reconstructMatrix({upper}, {lower}, {colsum})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().reconstructMatrix(upper, lower, colsum, {result})"
    checker: |
      class Checker:
          def reconstructMatrix(self, upper, lower, colsum, result):
              double_columns = sum(value == 2 for value in colsum)
              single_columns = sum(value == 1 for value in colsum)
              top_single = upper - double_columns
              bottom_single = lower - double_columns
              feasible = (
                  upper + lower == sum(colsum)
                  and top_single >= 0
                  and bottom_single >= 0
                  and top_single + bottom_single == single_columns
              )
              if not feasible:
                  return result == []
              if type(result) is not list or len(result) != 2:
                  return False
              if any(type(row) is not list or len(row) != len(colsum) for row in result):
                  return False
              if any(type(value) is not int or value not in (0, 1) for row in result for value in row):
                  return False
              return (
                  sum(result[0]) == upper
                  and sum(result[1]) == lower
                  and all(result[0][i] + result[1][i] == colsum[i] for i in range(len(colsum))))

