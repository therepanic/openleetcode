entry:
  id: 1465
  title: "maximum-area-of-a-piece-of-cake-after-horizontal-and-vertical-cuts"
  params:
    h:
      type: int
    w:
      type: int
    horizontalCuts:
      type: array
      items:
        type: int
    verticalCuts:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().maxArea({h}, {w}, {horizontalCuts}, {verticalCuts})"
    rust: "Solution::max_area({h}, {w}, {horizontalCuts}, {verticalCuts})"
    python3: "Solution().maxArea({h}, {w}, {horizontalCuts}, {verticalCuts})"
    python2: "Solution().maxArea({h}, {w}, {horizontalCuts}, {verticalCuts})"
    ruby: "max_area({h}, {w}, {horizontalCuts}, {verticalCuts})"
    java: "new Solution().maxArea({h}, {w}, {horizontalCuts}, {verticalCuts})"
    csharp: "new Solution().MaxArea({h}, {w}, {horizontalCuts}, {verticalCuts})"
    kotlin: "Solution().maxArea({h}, {w}, {horizontalCuts}, {verticalCuts})"
    go: "maxArea({h}, {w}, {horizontalCuts}, {verticalCuts})"
    dart: "Solution().maxArea({h}, {w}, {horizontalCuts}, {verticalCuts})"
    swift: "Solution().maxArea({h}, {w}, {horizontalCuts}, {verticalCuts})"
    typescript: "maxArea({h}, {w}, {horizontalCuts}, {verticalCuts})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().maxArea(h, w, horizontalCuts, verticalCuts, {result})"
    checker: |
      class Checker:
          def maxArea(self, h, w, horizontalCuts, verticalCuts, result):
              hs = [0] + sorted(horizontalCuts) + [h]
              vs = [0] + sorted(verticalCuts) + [w]
              max_h = max(b - a for a, b in zip(hs, hs[1:]))
              max_w = max(b - a for a, b in zip(vs, vs[1:]))
              return result == (max_h * max_w) % (10 ** 9 + 7)

seed: 1465

