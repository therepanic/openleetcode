    csharp: "new Solution().MinNumberOfSemesters({n}, {relations}, {k})"
    kotlin: "Solution().minNumberOfSemesters({n}, {relations}, {k})"
    go: "minNumberOfSemesters({n}, {relations}, {k})"
    dart: "Solution().minNumberOfSemesters({n}, {relations}, {k})"
