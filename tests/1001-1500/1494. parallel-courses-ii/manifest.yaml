  memory_mb: 300
oracle:
  python3:
    call: "Checker().minNumberOfSemesters(n, relations, k, {result})"
    checker: |
      class Checker:
          def minNumberOfSemesters(self, n, relations, k, result):
              prerequisites = [0] * n
              for before, after in relations:
                  prerequisites[after - 1] |= 1 << (before - 1)
              full = (1 << n) - 1
              memo = {}
              def solve(done):
                  if done == full:
                      return 0
                  if done in memo:
                      return memo[done]
                  available = 0
                  for course in range(n):
                      bit = 1 << course
                      if not done & bit and prerequisites[course] & ~done == 0:
                          available |= bit
                  choices = []
                  sub = available
                  while sub:
                      if sub.bit_count() <= k:
                          choices.append(sub)
                      sub = (sub - 1) & available
                  best = 10 ** 9
                  for choice in choices:
                      best = min(best, 1 + solve(done | choice))
                  memo[done] = best
                  return best
              return result == solve(0)
