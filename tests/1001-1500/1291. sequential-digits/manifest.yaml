  title: "sequential-digits"
  params:
    low:
      type: int
    high:
      type: int
  call:
    cpp: "Solution().sequentialDigits({low}, {high})"
    rust: "Solution::sequential_digits({low}, {high})"
    python3: "Solution().sequentialDigits({low}, {high})"
    python2: "Solution().sequentialDigits({low}, {high})"
    ruby: "sequential_digits({low}, {high})"
    java: "new Solution().sequentialDigits({low}, {high})"
    csharp: "new Solution().SequentialDigits({low}, {high})"
    kotlin: "Solution().sequentialDigits({low}, {high})"
    go: "sequentialDigits({low}, {high})"
    dart: "Solution().sequentialDigits({low}, {high})"
    swift: "Solution().sequentialDigits({low}, {high})"
    typescript: "sequentialDigits({low}, {high})"

judge:
  type: "exact"

limits:
  time_ms: 300
  memory_mb: 300

oracle:
  python3:
    call: "Checker().sequentialDigits(low, high, {result})"
    checker: |
      class Checker:
          def sequentialDigits(self, low, high, result):
              if not isinstance(result, list) or result != sorted(result):
                  return False
              for value in result:
                  if not isinstance(value, int) or not low <= value <= high:
                      return False
                  digits = str(value)
                  if any(int(digits[i + 1]) != int(digits[i]) + 1 for i in range(len(digits) - 1)):
                      return False
              expected_count = 0
              for length in range(2, 10):
                  for start in range(1, 11 - length):
                      value = int("".join(str(digit) for digit in range(start, start + length)))
                      if low <= value <= high:
                          expected_count += 1
              return len(result) == expected_count

seed: 1291

