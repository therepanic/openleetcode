entry:
  id: 1250
  title: "check-if-it-is-a-good-array"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    python3: "Solution().isGoodArray({nums})"
    python2: "Solution().isGoodArray({nums})"
    cpp: "Solution().isGoodArray({nums})"
    rust: "Solution::is_good_array({nums})"
    ruby: "is_good_array({nums})"
    java: "new Solution().isGoodArray({nums})"
    csharp: "new Solution().IsGoodArray({nums})"
    kotlin: "Solution().isGoodArray({nums})"
    go: "isGoodArray({nums})"
    dart: "Solution().isGoodArray({nums})"
    swift: "Solution().isGoodArray({nums})"
    typescript: "isGoodArray({nums})"
judge:
  type: "exact"
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().isGoodArray(nums, {result})"
    checker: |
      from math import gcd

      class Checker:
          def isGoodArray(self, nums, result):
              if not isinstance(result, bool):
                  return False
              current = 0
              for value in nums:
                  current = gcd(current, value)
              return result == (current == 1)
seed: 1250
