entry:
  id: 1443
  title: minimum-time-to-collect-all-apples-in-a-tree
  params:
    n:
      type: int
    edges:
      type: array
      items:
        type: array
        items:
          type: int
    hasApple:
      type: array
      items:
        type: bool
  call:
    cpp: "Solution().minTime({n}, {edges}, {hasApple})"
    rust: "Solution::min_time({n}, {edges}, {hasApple})"
    python3: "Solution().minTime({n}, {edges}, {hasApple})"
    python2: "Solution().minTime({n}, {edges}, {hasApple})"
