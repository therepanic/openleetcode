    java: "new Solution().minTime({n}, {edges}, {hasApple})"
    csharp: "new Solution().MinTime({n}, {edges}, {hasApple})"
    kotlin: "Solution().minTime({n}, {edges}, {hasApple})"
    go: "minTime({n}, {edges}, {hasApple})"
    dart: "Solution().minTime({n}, {edges}, {hasApple})"
    swift: "Solution().minTime({n}, {edges}, {hasApple})"
    typescript: "minTime({n}, {edges}, {hasApple})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().minTime(n, edges, hasApple, {result})"
    checker: |
      class Checker:
          def minTime(self, n, edges, hasApple, result):
              if type(result) is not int:
                  return False
              graph = [[] for _ in range(n)]
              for edge in edges:
                  if len(edge) != 2:
                      return False
                  u, v = edge
                  if not (0 <= u < n and 0 <= v < n and u != v):
                      return False
                  graph[u].append(v)
                  graph[v].append(u)
              parent = [-2] * n
              parent[0] = -1
              order = [0]
              for u in order:
                  for v in graph[u]:
                      if v == parent[u]:
                          continue
                      if parent[v] != -2:
                          return False
                      parent[v] = u
                      order.append(v)
              if len(order) != n or len(hasApple) != n:
                  return False
              contains = list(hasApple)
              cost = 0
              for u in reversed(order[1:]):
                  if contains[u]:
                      cost += 2
                      contains[parent[u]] = True
              return result == cost
seed: 1443
