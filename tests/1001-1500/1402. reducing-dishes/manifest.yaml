      type: array
      items:
        type: int
  call:
    cpp: "Solution().maxSatisfaction({satisfaction})"
    rust: "Solution::max_satisfaction({satisfaction})"
    python3: "Solution().maxSatisfaction({satisfaction})"
    python2: "Solution().maxSatisfaction({satisfaction})"
    ruby: "max_satisfaction({satisfaction})"
    java: "new Solution().maxSatisfaction({satisfaction})"
    csharp: "new Solution().MaxSatisfaction({satisfaction})"
    kotlin: "Solution().maxSatisfaction({satisfaction})"
    go: "maxSatisfaction({satisfaction})"
    dart: "Solution().maxSatisfaction({satisfaction})"
    swift: "Solution().maxSatisfaction({satisfaction})"
