judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().maxSatisfaction(satisfaction, {result})"
    checker: |
      class Checker:
          def maxSatisfaction(self, satisfaction, result):
              values = sorted(satisfaction)
              neg_inf = -10**18
              dp = [neg_inf] * (len(values) + 1)
              dp[0] = 0
              for value in values:
                  for count in range(len(values), 0, -1):
                      if dp[count - 1] != neg_inf:
                          candidate = dp[count - 1] + count * value
                          if candidate > dp[count]:
                              dp[count] = candidate
              best = max(dp)
              return type(result) is int and result == best
