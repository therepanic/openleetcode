entry:
  id: 1268
  title: "search-suggestions-system"
  params:
    products:
      type: array
      items:
        type: string
    searchWord:
      type: string
  call:
    cpp: "Solution().suggestedProducts({products}, {searchWord})"
    rust: "Solution::suggested_products({products}, {searchWord})"
    python3: "Solution().suggestedProducts({products}, {searchWord})"
    python2: "Solution().suggestedProducts({products}, {searchWord})"
    ruby: "suggested_products({products}, {searchWord})"
    java: "new Solution().suggestedProducts({products}, {searchWord})"
    csharp: "new Solution().SuggestedProducts({products}, {searchWord})"
    kotlin: "Solution().suggestedProducts({products}, {searchWord})"
    go: "suggestedProducts({products}, {searchWord})"
    dart: "Solution().suggestedProducts({products}, {searchWord})"
    swift: "Solution().suggestedProducts({products}, {searchWord})"
    typescript: "suggestedProducts({products}, {searchWord})"
judge:
  type: exact
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().suggestedProducts(products, searchWord, {result})"
    checker: |
      class Checker:
          def suggestedProducts(self, products, searchWord, result):
              if not isinstance(result, list) or len(result) != len(searchWord):
                  return False
              for index in range(1, len(searchWord) + 1):
                  expected = sorted(
                      product for product in products
                      if product.startswith(searchWord[:index])
                  )[:3]
                  if result[index - 1] != expected:
                      return False
              return True
seed: 1268
