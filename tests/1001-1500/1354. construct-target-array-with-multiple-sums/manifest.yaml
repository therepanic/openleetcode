entry:
  id: 1354
  title: "construct-target-array-with-multiple-sums"
  params:
    target:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().isPossible({target})"
    rust: "Solution::is_possible({target})"
    python3: "Solution().isPossible({target})"
    python2: "Solution().isPossible({target})"
    ruby: "is_possible({target})"
    java: "new Solution().isPossible({target})"
    csharp: "new Solution().IsPossible({target})"
    kotlin: "Solution().isPossible({target})"
    go: "isPossible({target})"
    dart: "Solution().isPossible({target})"
    swift: "Solution().isPossible({target})"
    typescript: "isPossible({target})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().isPossible(target, {result})"
    checker: |
      import heapq

      class Checker:
          def isPossible(self, target, result):
              if type(result) is not bool:
                  return False
              total = sum(target)
              heap = [-value for value in target]
              heapq.heapify(heap)

              while True:
                  largest = -heapq.heappop(heap)
                  rest = total - largest
                  if largest == 1 or rest == 1:
                      return result is True
                  if rest == 0 or rest >= largest:
                      return result is False

                  previous = largest % rest
                  if previous == 0:
                      return result is False
                  total = rest + previous
                  heapq.heappush(heap, -previous)
seed: 1354
