entry:
  id: 1481
  title: "least-number-of-unique-integers-after-k-removals"
  params:
    arr:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: "Solution().findLeastNumOfUniqueInts({arr}, {k})"
    rust: "Solution::find_least_num_of_unique_ints({arr}, {k})"
    python3: "Solution().findLeastNumOfUniqueInts({arr}, {k})"
    python2: "Solution().findLeastNumOfUniqueInts({arr}, {k})"
    ruby: "find_least_num_of_unique_ints({arr}, {k})"
    java: "new Solution().findLeastNumOfUniqueInts({arr}, {k})"
    csharp: "new Solution().FindLeastNumOfUniqueInts({arr}, {k})"
    kotlin: "Solution().findLeastNumOfUniqueInts({arr}, {k})"
    go: "findLeastNumOfUniqueInts({arr}, {k})"
    dart: "Solution().findLeastNumOfUniqueInts({arr}, {k})"
    swift: "Solution().findLeastNumOfUniqueInts({arr}, {k})"
    typescript: "findLeastNumOfUniqueInts({arr}, {k})"
judge:
  type: exact
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().findLeastNumOfUniqueInts(arr, k, {result})"
    checker: |
      from collections import Counter
      class Checker:
          def findLeastNumOfUniqueInts(self, arr, k, result):
              counts = sorted(Counter(arr).values())
              remaining = len(counts)
              for count in counts:
                  if k < count: break
                  k -= count
                  remaining -= 1
              return result == remaining
seed: 1481
