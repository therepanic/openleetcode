entry:
  id: 1420
  title: "build-array-where-you-can-find-the-maximum-exactly-k-comparisons"
  params:
    n:
      type: int
    m:
      type: int
    k:
      type: int
  call:
    cpp: "Solution().numOfArrays({n}, {m}, {k})"
    rust: "Solution::num_of_arrays({n}, {m}, {k})"
    python3: "Solution().numOfArrays({n}, {m}, {k})"
    python2: "Solution().numOfArrays({n}, {m}, {k})"
    ruby: "num_of_arrays({n}, {m}, {k})"
    java: "new Solution().numOfArrays({n}, {m}, {k})"
    csharp: "new Solution().NumOfArrays({n}, {m}, {k})"
    kotlin: "Solution().numOfArrays({n}, {m}, {k})"
    go: "numOfArrays({n}, {m}, {k})"
    dart: "Solution().numOfArrays({n}, {m}, {k})"
    swift: "Solution().numOfArrays({n}, {m}, {k})"
    typescript: "numOfArrays({n}, {m}, {k})"
judge:
  type: "exact"
limits:
  time_ms: 10000
  memory_mb: 400
oracle:
  python3:
    call: "Checker().numOfArrays(n, m, k, {result})"
    checker: |
      class Checker:
          def numOfArrays(self, n, m, k, result):
              if not isinstance(n, int) or not isinstance(m, int) or not isinstance(k, int):
                  return False
              if not (1 <= n <= 50 and 1 <= m <= 100 and 0 <= k <= n):
                  return False
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              mod = 1000000007
              states = {(0, 0): 1}
              for _ in range(n):
                  next_states = {}
                  for (cost, maximum), ways in states.items():
                      for value in range(1, m + 1):
                          new_cost = cost + (value > maximum)
                          if new_cost <= k:
                              key = (new_cost, max(maximum, value))
                              next_states[key] = (next_states.get(key, 0) + ways) % mod
                  states = next_states
              expected = sum(ways for (cost, _), ways in states.items() if cost == k) % mod
              return result == expected
seed: 1420
