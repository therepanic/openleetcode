entry:
  id: 1332
  title: remove-palindromic-subsequences
  params:
    s:
      type: string
  call:
    cpp: "Solution().removePalindromeSub({s})"
    rust: "Solution::remove_palindrome_sub({s})"
    python3: "Solution().removePalindromeSub({s})"
    python2: "Solution().removePalindromeSub({s})"
    ruby: "remove_palindrome_sub({s})"
    java: "new Solution().removePalindromeSub({s})"
    csharp: "new Solution().RemovePalindromeSub({s})"
    kotlin: "Solution().removePalindromeSub({s})"
    go: "removePalindromeSub({s})"
    dart: "Solution().removePalindromeSub({s})"
    swift: "Solution().removePalindromeSub({s})"
    typescript: "removePalindromeSub({s})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().removePalindromeSub(s, {result})"
    checker: |
      class Checker:
          def removePalindromeSub(self, s, result):
              expected = 1 if s == s[::-1] else 2
              return type(result) is int and result == expected
seed: 1332
