entry:
  id: 1475
  title: "final-prices-with-a-special-discount-in-a-shop"
  params:
    prices:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().finalPrices({prices})"
    rust: "Solution::final_prices({prices})"
    python3: "Solution().finalPrices({prices})"
    python2: "Solution().finalPrices({prices})"
    ruby: "final_prices({prices})"
    java: "new Solution().finalPrices({prices})"
    csharp: "new Solution().FinalPrices({prices})"
    kotlin: "Solution().finalPrices({prices})"
    go: "finalPrices({prices})"
    dart: "Solution().finalPrices({prices})"
    swift: "Solution().finalPrices({prices})"
    typescript: "finalPrices({prices})"
judge:
  type: exact
limits:
  time_ms: 400
  memory_mb: 300
oracle:
  python3:
    call: "Checker().finalPrices(prices, {result})"
    checker: |
      class Checker:
          def finalPrices(self, prices, result):
              expected = []
              for i, value in enumerate(prices):
                  discount = next((prices[j] for j in range(i+1, len(prices)) if prices[j] <= value), 0)
                  expected.append(value - discount)
              return result == expected
seed: 1475
