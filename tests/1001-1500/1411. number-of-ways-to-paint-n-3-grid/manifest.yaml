entry:
  id: 1411
  title: "number-of-ways-to-paint-n-3-grid"
  params:
    n:
      type: int
  call:
    cpp: "Solution().numOfWays({n})"
    rust: "Solution::num_of_ways({n})"
    python3: "Solution().numOfWays({n})"
    python2: "Solution().numOfWays({n})"
    ruby: "num_of_ways({n})"
    java: "new Solution().numOfWays({n})"
    csharp: "new Solution().NumOfWays({n})"
    kotlin: "Solution().numOfWays({n})"
    go: "numOfWays({n})"
    dart: "Solution().numOfWays({n})"
    swift: "Solution().numOfWays({n})"
    typescript: "numOfWays({n})"
judge:
  type: "exact"
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().numOfWays(n, {result})"
    checker: |
      class Checker:
          def numOfWays(self, n, result):
              if not isinstance(n, int) or isinstance(n, bool) or not 1 <= n <= 5000:
                  return False
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              mod = 1000000007
              if n == 1:
                  expected = 12
              else:
                  previous, current = 12, 54
                  for _ in range(3, n + 1):
                      previous, current = current, (5 * current - 2 * previous) % mod
                  expected = current
              return result == expected
