entry:
  id: 1496
  title: "path-crossing"
  params:
    path:
      type: string
  call:
    cpp: "Solution().isPathCrossing({path})"
    rust: "Solution::is_path_crossing({path})"
    python3: "Solution().isPathCrossing({path})"
    python2: "Solution().isPathCrossing({path})"
    ruby: "is_path_crossing({path})"
    java: "new Solution().isPathCrossing({path})"
    csharp: "new Solution().IsPathCrossing({path})"
    kotlin: "Solution().isPathCrossing({path})"
    go: "isPathCrossing({path})"
    dart: "Solution().isPathCrossing({path})"
    swift: "Solution().isPathCrossing({path})"
    typescript: "isPathCrossing({path})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().isPathCrossing(path, {result})"
    checker: |
      class Checker:
          def isPathCrossing(self, path, result):
              x = y = 0
              seen = {(0, 0)}
              moves = {"N": (0, 1), "S": (0, -1), "E": (1, 0), "W": (-1, 0)}
              expected = False
              for step in path:
                  dx, dy = moves[step]
                  x += dx
                  y += dy
                  if (x, y) in seen:
                      expected = True
                      break
                  seen.add((x, y))
              return isinstance(result, bool) and result == expected

seed: 1496

