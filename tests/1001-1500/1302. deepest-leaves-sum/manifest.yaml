judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().deepestLeavesSum(root, {result})"
    checker: |
      class Checker:
          def deepestLeavesSum(self, root, result):
              if type(result) is not int:
                  return False
              deepest_depth = -1
              deepest_sum = 0
              stack = [(root, 0)]
              while stack:
                  node, depth = stack.pop()
                  if node.left is None and node.right is None:
                      if depth > deepest_depth:
                          deepest_depth = depth
                          deepest_sum = node.val
                      elif depth == deepest_depth:
                          deepest_sum += node.val
                  else:
                      if node.left is not None:
                          stack.append((node.left, depth + 1))
                      if node.right is not None:
                          stack.append((node.right, depth + 1))
              return result == deepest_sum
