entry:
  id: 1026
  title: "maximum-difference-between-node-and-ancestor"
  params:
    root:
      type: tree_node
  call:
    cpp: "Solution().maxAncestorDiff({root})"
    rust: "Solution::max_ancestor_diff({root})"
    python3: "Solution().maxAncestorDiff({root})"
    python2: "Solution().maxAncestorDiff({root})"
    ruby: "max_ancestor_diff({root})"
    java: "new Solution().maxAncestorDiff({root})"
    csharp: "new Solution().MaxAncestorDiff({root})"
    kotlin: "Solution().maxAncestorDiff({root})"
    go: "maxAncestorDiff({root})"
    dart: "Solution().maxAncestorDiff({root})"
    swift: "Solution().maxAncestorDiff({root})"
    typescript: "maxAncestorDiff({root})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().maxAncestorDiff(root, {result})"
    checker: |
      class Checker:
          def maxAncestorDiff(self, root, result):
              best = 0
              def dfs(node, mn, mx):
                  nonlocal best
                  if not node:
                      return
                  mn = min(mn, node.val)
                  mx = max(mx, node.val)
                  best = max(best, mx - mn)
                  dfs(node.left, mn, mx)
                  dfs(node.right, mn, mx)
              if root:
                  dfs(root, root.val, root.val)
              return result == best

seed: 1026

