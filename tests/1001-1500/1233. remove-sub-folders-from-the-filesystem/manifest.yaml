entry:
  id: 1233
  title: "remove-sub-folders-from-the-filesystem"
  params:
    folder:
      type: array
      items:
        type: string
  call:
    cpp: "Solution().removeSubfolders({folder})"
    rust: "Solution::remove_subfolders({folder})"
    python3: "Solution().removeSubfolders({folder})"
    python2: "Solution().removeSubfolders({folder})"
    ruby: "remove_subfolders({folder})"
    java: "new Solution().removeSubfolders({folder})"
    csharp: "new Solution().RemoveSubfolders({folder})"
    kotlin: "Solution().removeSubfolders({folder})"
    go: "removeSubfolders({folder})"
    dart: "Solution().removeSubfolders({folder})"
    swift: "Solution().removeSubfolders({folder})"
    typescript: "removeSubfolders({folder})"

judge:
  type: "ignore_order"

limits:
  time_ms: 500
  memory_mb: 300

oracle:
  python3:
    call: "Checker().removeSubfolders(folder, {result})"
    checker: |
      class Checker:
          def removeSubfolders(self, folder, result):
              if not isinstance(result, list):
                  return False
              if any(not isinstance(path, str) for path in result):
                  return False
              if len(result) != len(set(result)):
                  return False
              roots = []
              for path in sorted(folder):
                  if not roots or not path.startswith(roots[-1] + '/'):
                      roots.append(path)
              return set(result) == set(roots)

