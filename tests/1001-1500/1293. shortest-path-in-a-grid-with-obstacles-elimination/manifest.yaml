entry:
  id: 1293
  title: shortest-path-in-a-grid-with-obstacles-elimination
  params:
    grid:
      type: array
      items:
        type: array
        items:
          type: int
    k:
      type: int
  call:
    cpp: "Solution().shortestPath({grid}, {k})"
    rust: "Solution::shortest_path({grid}, {k})"
    python3: "Solution().shortestPath({grid}, {k})"
    python2: "Solution().shortestPath({grid}, {k})"
    ruby: "shortest_path({grid}, {k})"
    java: "new Solution().shortestPath({grid}, {k})"
    csharp: "new Solution().ShortestPath({grid}, {k})"
    kotlin: "Solution().shortestPath({grid}, {k})"
    go: "shortestPath({grid}, {k})"
    dart: "Solution().shortestPath({grid}, {k})"
    swift: "Solution().shortestPath({grid}, {k})"
    typescript: "shortestPath({grid}, {k})"
judge:
  type: exact
limits:
  time_ms: 1500
  memory_mb: 256
oracle:
  python3:
    call: "Checker().shortestPath(grid, k, {result})"
    checker: |
      class Checker:
          def shortestPath(self, grid, k, result):
              if not isinstance(grid, list) or not grid or not isinstance(k, int) or isinstance(k, bool) or k < 1:
                  return False
              rows, cols = len(grid), len(grid[0])
              if rows > 40 or cols < 1 or cols > 40 or k > rows * cols or any(not isinstance(row, list) or len(row) != cols for row in grid):
                  return False
              if any(cell not in (0, 1) for row in grid for cell in row) or grid[0][0] != 0 or grid[-1][-1] != 0:
                  return False
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              queue = [(0, 0, k, 0)]
              seen = {(0, 0, k)}
              head = 0
              while head < len(queue):
                  r, c, remaining, distance = queue[head]
                  head += 1
                  if r == rows - 1 and c == cols - 1:
                      return result == distance
                  for dr, dc in ((1, 0), (-1, 0), (0, 1), (0, -1)):
                      nr, nc = r + dr, c + dc
                      if 0 <= nr < rows and 0 <= nc < cols:
                          next_remaining = remaining - grid[nr][nc]
                          state = (nr, nc, next_remaining)
                          if next_remaining >= 0 and state not in seen:
                              seen.add(state)
                              queue.append((nr, nc, next_remaining, distance + 1))
              return result == -1
seed: 1293
