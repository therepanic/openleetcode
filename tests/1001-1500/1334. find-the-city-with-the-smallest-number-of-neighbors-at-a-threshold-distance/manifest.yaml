  memory_mb: 300
oracle:
  python3:
    call: "Checker().findTheCity(n, edges, distanceThreshold, {result})"
    checker: |
      import heapq

      class Checker:
          def findTheCity(self, n, edges, threshold, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              graph = [[] for _ in range(n)]
              for source, target, weight in edges:
                  graph[source].append((target, weight))
                  graph[target].append((source, weight))
              fewest = n
              answer = -1
              for city in range(n):
                  distance = [float("inf")] * n
                  distance[city] = 0
                  queue = [(0, city)]
                  while queue:
                      current_distance, node = heapq.heappop(queue)
                      if current_distance != distance[node]:
                          continue
                      for neighbor, weight in graph[node]:
                          candidate = current_distance + weight
                          if candidate <= threshold and candidate < distance[neighbor]:
                              distance[neighbor] = candidate
                              heapq.heappush(queue, (candidate, neighbor))
                  reachable = sum(value <= threshold for value in distance) - 1
                  if reachable <= fewest:
                      fewest = reachable
                      answer = city
              return result == answer
