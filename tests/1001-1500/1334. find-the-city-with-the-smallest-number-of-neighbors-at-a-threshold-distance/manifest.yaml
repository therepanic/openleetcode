entry:
  id: 1334
  title: "find-the-city-with-the-smallest-number-of-neighbors-at-a-threshold-distance"
  params:
    n:
      type: int
    edges:
      type: array
      items:
        type: array
        items:
          type: int
    distanceThreshold:
      type: int
  call:
    cpp: "Solution().findTheCity({n}, {edges}, {distanceThreshold})"
    rust: "Solution::find_the_city({n}, {edges}, {distanceThreshold})"
    python3: "Solution().findTheCity({n}, {edges}, {distanceThreshold})"
    python2: "Solution().findTheCity({n}, {edges}, {distanceThreshold})"
    ruby: "find_the_city({n}, {edges}, {distanceThreshold})"
    java: "new Solution().findTheCity({n}, {edges}, {distanceThreshold})"
    csharp: "new Solution().FindTheCity({n}, {edges}, {distanceThreshold})"
    kotlin: "Solution().findTheCity({n}, {edges}, {distanceThreshold})"
    go: "findTheCity({n}, {edges}, {distanceThreshold})"
    dart: "Solution().findTheCity({n}, {edges}, {distanceThreshold})"
    swift: "Solution().findTheCity({n}, {edges}, {distanceThreshold})"
    typescript: "findTheCity({n}, {edges}, {distanceThreshold})"
judge:
