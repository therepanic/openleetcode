entry:
  id: 1310
  title: xor-queries-of-a-subarray
  params:
    arr:
      type: array
      items:
        type: int
    queries:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().xorQueries({arr}, {queries})"
    rust: "Solution::xor_queries({arr}, {queries})"
    python3: "Solution().xorQueries({arr}, {queries})"
    python2: "Solution().xorQueries({arr}, {queries})"
    ruby: "xor_queries({arr}, {queries})"
    java: "new Solution().xorQueries({arr}, {queries})"
    csharp: "new Solution().XorQueries({arr}, {queries})"
    kotlin: "Solution().xorQueries({arr}, {queries})"
    go: "xorQueries({arr}, {queries})"
    dart: "Solution().xorQueries({arr}, {queries})"
    swift: "Solution().xorQueries({arr}, {queries})"
    typescript: "xorQueries({arr}, {queries})"
judge:
  type: exact
limits:
  time_ms: 5000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().xorQueries(arr, queries, {result})"
    checker: |
      class Checker:
          def xorQueries(self, arr, queries, result):
              if not isinstance(arr, list) or not 1 <= len(arr) <= 30000 or not isinstance(queries, list) or not 1 <= len(queries) <= 30000:
                  return False
              if any(not isinstance(x, int) or isinstance(x, bool) or x < 1 or x > 1000000000 for x in arr):
                  return False
              if not isinstance(result, list):
                  return False
              prefix = [0]
              for value in arr:
                  prefix.append(prefix[-1] ^ value)
              expected = []
              for query in queries:
                  if not isinstance(query, list) or len(query) != 2:
                      return False
                  a, b = query
                  if not isinstance(a, int) or not isinstance(b, int) or a < 0 or b < a or b >= len(arr):
                      return False
                  expected.append(prefix[b + 1] ^ prefix[a])
              return result == expected
