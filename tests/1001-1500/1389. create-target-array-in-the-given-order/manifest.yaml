entry:
  id: 1389
  title: "create-target-array-in-the-given-order"
  params:
    nums:
      type: array
      items:
        type: int
    index:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().createTargetArray({nums}, {index})"
    rust: "Solution::create_target_array({nums}, {index})"
    python3: "Solution().createTargetArray({nums}, {index})"
    python2: "Solution().createTargetArray({nums}, {index})"
    ruby: "create_target_array({nums}, {index})"
    java: "new Solution().createTargetArray({nums}, {index})"
    csharp: "new Solution().CreateTargetArray({nums}, {index})"
    kotlin: "Solution().createTargetArray({nums}, {index})"
    go: "createTargetArray({nums}, {index})"
    dart: "Solution().createTargetArray({nums}, {index})"
    swift: "Solution().createTargetArray({nums}, {index})"
    typescript: "createTargetArray({nums}, {index})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().createTargetArray(nums, index, {result})"
    checker: |
      class Checker:
          def createTargetArray(self, nums, index, result):
              if not isinstance(nums, list) or not isinstance(index, list):
                  return False
              if not 1 <= len(nums) <= 100 or len(nums) != len(index):
                  return False
              for i, (value, position) in enumerate(zip(nums, index)):
                  if isinstance(value, bool) or not isinstance(value, int) or not 0 <= value <= 100:
                      return False
                  if isinstance(position, bool) or not isinstance(position, int) or not 0 <= position <= i:
                      return False
              if not isinstance(result, list) or len(result) != len(nums):
                  return False
              if any(isinstance(value, bool) or not isinstance(value, int) for value in result):
                  return False
              remaining = list(result)
              for i in range(len(nums) - 1, -1, -1):
                  position = index[i]
                  if position >= len(remaining) or remaining[position] != nums[i]:
                      return False
                  remaining.pop(position)
              return not remaining
