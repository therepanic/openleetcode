entry:
  id: 1156
  title: "swap-for-longest-repeated-character-substring"
  params:
    text:
      type: string
  call:
    cpp: "Solution().maxRepOpt1({text})"
    rust: "Solution::max_rep_opt1({text})"
    python3: "Solution().maxRepOpt1({text})"
    python2: "Solution().maxRepOpt1({text})"
    ruby: "max_rep_opt1({text})"
    java: "new Solution().maxRepOpt1({text})"
    csharp: "new Solution().MaxRepOpt1({text})"
    kotlin: "Solution().maxRepOpt1({text})"
    go: "maxRepOpt1({text})"
    dart: "Solution().maxRepOpt1({text})"
    swift: "Solution().maxRepOpt1({text})"
    typescript: "maxRepOpt1({text})"
judge:
  type: "exact"
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().maxRepOpt1(text, {result})"
    checker: |
      from collections import Counter

      class Checker:
          def maxRepOpt1(self, text, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              counts = Counter(text)
              runs = []
              start = 0
              for index in range(1, len(text) + 1):
                  if index == len(text) or text[index] != text[start]:
                      runs.append((text[start], index - start))
                      start = index

              best = 0
              for index, (ch, length) in enumerate(runs):
                  # A run can gain one matching character from elsewhere.
                  best = max(best, min(counts[ch], length + 1))
                  # Exactly one intervening character permits joining two runs.
                  if (index + 2 < len(runs) and runs[index + 1][1] == 1
                          and runs[index + 2][0] == ch):
                      best = max(best, min(counts[ch], length + 1 + runs[index + 2][1]))
              return result == best
