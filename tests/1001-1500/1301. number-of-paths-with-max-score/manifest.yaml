entry:
  id: 1301
  title: "number-of-paths-with-max-score"
  params:
    board:
      type: array
      items:
        type: string
  call:
    cpp: "Solution().pathsWithMaxScore({board})"
    rust: "Solution::paths_with_max_score({board})"
    python3: "Solution().pathsWithMaxScore({board})"
    python2: "Solution().pathsWithMaxScore({board})"
    ruby: "paths_with_max_score({board})"
    java: "new Solution().pathsWithMaxScore({board})"
    csharp: "new Solution().PathsWithMaxScore({board})"
    kotlin: "Solution().pathsWithMaxScore({board})"
    go: "pathsWithMaxScore({board})"
    dart: "Solution().pathsWithMaxScore({board})"
    swift: "Solution().pathsWithMaxScore({board})"
    typescript: "pathsWithMaxScore({board})"

judge:
  type: "exact"

limits:
  time_ms: 2500
  memory_mb: 256

oracle:
  python3:
    call: "Checker().pathsWithMaxScore(board, {result})"
    checker: |
      class Checker:
          def pathsWithMaxScore(self, board, result):
              mod = 1000000007
              n = len(board)
              score = [[-1] * n for _ in range(n)]
              ways = [[0] * n for _ in range(n)]
              score[n - 1][n - 1] = 0
              ways[n - 1][n - 1] = 1
              for i in range(n - 1, -1, -1):
                  for j in range(n - 1, -1, -1):
                      if board[i][j] == 'X' or (i == n - 1 and j == n - 1):
                          continue
                      choices = []
                      for di, dj in ((1, 0), (0, 1), (1, 1)):
                          ni, nj = i + di, j + dj
                          if ni < n and nj < n and score[ni][nj] >= 0:
                              choices.append((score[ni][nj], ways[ni][nj]))
                      if choices:
                          best = max(value for value, _ in choices)
                          score[i][j] = best + (0 if board[i][j] == 'E' else int(board[i][j]))
                          ways[i][j] = sum(count for value, count in choices if value == best) % mod
              expected = [0, 0] if score[0][0] < 0 else [score[0][0], ways[0][0]]
              return result == expected

