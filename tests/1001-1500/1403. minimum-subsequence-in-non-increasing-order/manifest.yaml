entry:
  id: 1403
  title: "minimum-subsequence-in-non-increasing-order"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().minSubsequence({nums})"
    rust: "Solution::min_subsequence({nums})"
    python3: "Solution().minSubsequence({nums})"
    python2: "Solution().minSubsequence({nums})"
    ruby: "min_subsequence({nums})"
    java: "new Solution().minSubsequence({nums})"
    csharp: "new Solution().MinSubsequence({nums})"
    kotlin: "Solution().minSubsequence({nums})"
    go: "minSubsequence({nums})"
    dart: "Solution().minSubsequence({nums})"
    swift: "Solution().minSubsequence({nums})"
    typescript: "minSubsequence({nums})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().minSubsequence(nums, {result})"
    checker: |
      class Checker:
          def minSubsequence(self, nums, result):
              if not isinstance(result, list) or not result:
                  return False
              if any(not isinstance(value, int) for value in result):
                  return False
              if result != sorted(result, reverse=True):
                  return False
              available = list(nums)
              for value in result:
                  if value not in available:
                      return False
                  available.remove(value)
              chosen_sum = sum(result)
              if chosen_sum <= sum(available):
                  return False
              ordered = sorted(nums, reverse=True)
              minimum_size = None
              for size in range(1, len(ordered) + 1):
                  if sum(ordered[:size]) > sum(ordered[size:]):
                      minimum_size = size
                      break
              if len(result) != minimum_size:
                  return False
              return chosen_sum == sum(ordered[:minimum_size])

seed: 1403

