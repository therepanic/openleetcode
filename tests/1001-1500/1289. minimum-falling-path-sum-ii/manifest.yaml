  memory_mb: 300
oracle:
  python3:
    call: "Checker().minFallingPathSum(grid, {result})"
    checker: |
      class Checker:
          def minFallingPathSum(self, grid, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              previous = grid[0][:]
              for row in grid[1:]:
                  current = []
                  for col, value in enumerate(row):
                      best = min(previous[other] for other in range(len(row)) if other != col)
                      current.append(value + best)
                  previous = current
              return result == min(previous)
