entry:
  id: 1392
  title: "longest-happy-prefix"
  params:
    s:
      type: string
  call:
    cpp: "Solution().longestPrefix({s})"
    rust: "Solution::longest_prefix({s})"
    python3: "Solution().longestPrefix({s})"
    python2: "Solution().longestPrefix({s})"
    ruby: "longest_prefix({s})"
    java: "new Solution().longestPrefix({s})"
    csharp: "new Solution().LongestPrefix({s})"
    kotlin: "Solution().longestPrefix({s})"
    go: "longestPrefix({s})"
    dart: "Solution().longestPrefix({s})"
    swift: "Solution().longestPrefix({s})"
    typescript: "longestPrefix({s})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().longestPrefix(s, {result})"
    checker: |
      class Checker:
          def longestPrefix(self, s, result):
              prefix = [0] * len(s)
              matched = 0
              for i in range(1, len(s)):
                  while matched and s[i] != s[matched]:
                      matched = prefix[matched - 1]
                  if s[i] == s[matched]:
                      matched += 1
                  prefix[i] = matched
              return result == s[:prefix[-1]]

seed: 1392

