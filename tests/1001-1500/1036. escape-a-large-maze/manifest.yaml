judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().isEscapePossible(blocked, source, target, {result})"
    checker: |
      from collections import deque

      class Checker:
          def isEscapePossible(self, blocked, source, target, result):
              blocked_set = {tuple(p) for p in blocked}
              limit = len(blocked) * len(blocked) // 2

              def bfs(start, end):
                  start = tuple(start)
                  end = tuple(end)
                  q = deque([start])
                  seen = {start}
                  explored = 0
                  while q:
                      x, y = q.popleft()
                      if (x, y) == end:
                          return True
                      if explored > limit:
                          return True
                      for dx, dy in ((1, 0), (-1, 0), (0, 1), (0, -1)):
                          nx = x + dx
                          ny = y + dy
                          if 0 <= nx < 10 ** 6 and 0 <= ny < 10 ** 6:
                              pos = (nx, ny)
                              if pos not in seen and pos not in blocked_set:
                                  seen.add(pos)
                                  q.append(pos)
                      explored += 1
                  return False

              expected = bfs(source, target) and bfs(target, source)
              return expected == result
