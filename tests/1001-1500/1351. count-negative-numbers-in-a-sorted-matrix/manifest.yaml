entry:
  id: 1351
  title: count-negative-numbers-in-a-sorted-matrix
  params:
    grid:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().countNegatives({grid})"
    rust: "Solution::count_negatives({grid})"
    python3: "Solution().countNegatives({grid})"
    python2: "Solution().countNegatives({grid})"
    ruby: "count_negatives({grid})"
    java: "new Solution().countNegatives({grid})"
    csharp: "new Solution().CountNegatives({grid})"
    kotlin: "Solution().countNegatives({grid})"
    go: "countNegatives({grid})"
    dart: "Solution().countNegatives({grid})"
    swift: "Solution().countNegatives({grid})"
    typescript: "countNegatives({grid})"
judge:
  type: exact
limits:
  time_ms: 500
  memory_mb: 256
oracle:
  python3:
    call: "Checker().countNegatives(grid, {result})"
    checker: |
      class Checker:
          def countNegatives(self, grid, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              if not isinstance(grid, list) or not 1 <= len(grid) <= 100:
                  return False
              if not all(isinstance(row, list) for row in grid):
                  return False
              cols = len(grid[0])
              if not 1 <= cols <= 100 or any(len(row) != cols for row in grid):
                  return False
              if any(not isinstance(v, int) or isinstance(v, bool) or not -100 <= v <= 100 for row in grid for v in row):
                  return False
              if any(row[c] > row[c - 1] for row in grid for c in range(1, cols)):
                  return False
              if any(grid[r][c] > grid[r - 1][c] for r in range(1, len(grid)) for c in range(cols)):
                  return False
              return result == sum(v < 0 for row in grid for v in row)
