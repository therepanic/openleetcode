  memory_mb: 300

oracle:
  python3:
    call: "Checker().largest1BorderedSquare(grid, {result})"
    checker: |
      class Checker:
          def largest1BorderedSquare(self, grid, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              if not isinstance(grid, list) or not grid or not isinstance(grid[0], list) or not grid[0]:
                  return False
              rows, cols = len(grid), len(grid[0])
              if rows > 100 or cols > 100 or any(len(row) != cols for row in grid):
                  return False
              if any(cell not in (0, 1) for row in grid for cell in row):
                  return False
              horizontal = [[0] * cols for _ in range(rows)]
              vertical = [[0] * cols for _ in range(rows)]
              for r in range(rows):
                  for c in range(cols):
                      if grid[r][c] == 1:
                          horizontal[r][c] = 1 + (horizontal[r][c - 1] if c else 0)
                          vertical[r][c] = 1 + (vertical[r - 1][c] if r else 0)
              for size in range(min(rows, cols), 0, -1):
                  for bottom in range(size - 1, rows):
                      for right in range(size - 1, cols):
                          top = bottom - size + 1
                          left = right - size + 1
                          if (horizontal[bottom][right] >= size and
                                  horizontal[top][right] >= size and
                                  vertical[bottom][right] >= size and
                                  vertical[bottom][left] >= size):
                              return result == size * size
              return result == 0

