judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().numEquivDominoPairs(dominoes, {result})"
    checker: |
      class Checker:
          def numEquivDominoPairs(self, dominoes, result):
              if not isinstance(result, int):
                  return False
              count = 0
              seen = [0] * 100
              for pair in dominoes:
                  if not isinstance(pair, list) or len(pair) != 2:
                      return False
                  a, b = pair
                  if not isinstance(a, int) or not isinstance(b, int):
                      return False
                  if a < 1 or a > 9 or b < 1 or b > 9:
                      return False
                  key = a * 10 + b if a <= b else b * 10 + a
                  count += seen[key]
                  seen[key] += 1
              return result == count
