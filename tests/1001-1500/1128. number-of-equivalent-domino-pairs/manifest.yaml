      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().numEquivDominoPairs({dominoes})"
    rust: "Solution::num_equiv_domino_pairs({dominoes})"
    python3: "Solution().numEquivDominoPairs({dominoes})"
    python2: "Solution().numEquivDominoPairs({dominoes})"
    ruby: "num_equiv_domino_pairs({dominoes})"
    java: "new Solution().numEquivDominoPairs({dominoes})"
    csharp: "new Solution().NumEquivDominoPairs({dominoes})"
    kotlin: "Solution().numEquivDominoPairs({dominoes})"
    go: "numEquivDominoPairs({dominoes})"
    dart: "Solution().numEquivDominoPairs({dominoes})"
    swift: "Solution().numEquivDominoPairs({dominoes})"
    typescript: "numEquivDominoPairs({dominoes})"

judge:
  type: "exact"

limits:
  time_ms: 500
  memory_mb: 300

oracle:
  python3:
    call: "Checker().numEquivDominoPairs(dominoes, {result})"
    checker: |
      class Checker:
          def numEquivDominoPairs(self, dominoes, result):
              if not isinstance(result, int) or isinstance(result, bool) or result < 0:
                  return False
              counts = {}
              expected = 0
              for pair in dominoes:
                  key = tuple(sorted(pair))
                  previous = counts.get(key, 0)
                  expected += previous
                  counts[key] = previous + 1
              return result == expected

