oracle:
  python3:
    call: "Checker().distinctEchoSubstrings(text, {result})"
    checker: |
      class Checker:
          def distinctEchoSubstrings(self, text, result):
              if type(result) is not int:
                  return False
              n = len(text)
              suffixes = list(range(n))
              ranks = [ord(char) for char in text]
              width = 1
              while width < n:
                  suffixes.sort(key=lambda index: (ranks[index], ranks[index + width] if index + width < n else -1))
                  next_ranks = [0] * n
                  for position in range(1, n):
                      previous, current = suffixes[position - 1], suffixes[position]
                      previous_key = (ranks[previous], ranks[previous + width] if previous + width < n else -1)
                      current_key = (ranks[current], ranks[current + width] if current + width < n else -1)
                      next_ranks[current] = next_ranks[previous] + (current_key != previous_key)
                  ranks = next_ranks
                  if ranks[suffixes[-1]] == n - 1:
                      break
                  width *= 2
              positions = [0] * n
              for position, start in enumerate(suffixes):
                  positions[start] = position
              lcp = [0] * n
              common = 0
              for start in range(n):
                  position = positions[start]
                  if position == 0:
                      common = 0
                      continue
                  previous = suffixes[position - 1]
                  while start + common < n and previous + common < n and text[start + common] == text[previous + common]:
                      common += 1
                  lcp[position] = common
                  if common:
                      common -= 1
              logs = [0] * (n + 1)
              for length in range(2, n + 1):
                  logs[length] = logs[length // 2] + 1
              minimums = [lcp]
              size = 1
              while size * 2 <= n:
                  previous = minimums[-1]
                  minimums.append([min(previous[index], previous[index + size]) for index in range(n - size * 2 + 1)])
                  size *= 2
              def common_prefix(first, second):
                  if first == second:
                      return n - first
                  left, right = positions[first], positions[second]
                  if left > right:
                      left, right = right, left
                  left += 1
                  level = logs[right - left + 1]
                  return min(minimums[level][left], minimums[level][right - (1 << level) + 1])
              echoes = set()
              for half in range(1, n // 2 + 1):
                  full = 2 * half
                  components = [0] * n
                  component = 0
                  for position in range(1, n):
                      if lcp[position] < full:
                          component += 1
                      components[position] = component
                  for start in range(n - full + 1):
                      if common_prefix(start, start + half) >= half:
                          echoes.add((full, components[positions[start]]))
              return result == len(echoes)

