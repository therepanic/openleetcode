entry:
  id: 1487
  title: "making-file-names-unique"
  params:
    names:
      type: array
      items:
        type: string
  call:
    cpp: "Solution().getFolderNames({names})"
    rust: "Solution::get_folder_names({names})"
    python3: "Solution().getFolderNames({names})"
    python2: "Solution().getFolderNames({names})"
    ruby: "get_folder_names({names})"
    java: "new Solution().getFolderNames({names})"
    csharp: "new Solution().GetFolderNames({names})"
    kotlin: "Solution().getFolderNames({names})"
    go: "getFolderNames({names})"
    dart: "Solution().getFolderNames({names})"
    swift: "Solution().getFolderNames({names})"
    typescript: "getFolderNames({names})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().getFolderNames(names, {result})"
    checker: |
      class Checker:
          def getFolderNames(self, names, result):
              used = set()
              next_suffix = {}
              expected = []
              for name in names:
                  if name not in used:
                      chosen = name
                      next_suffix.setdefault(name, 1)
                  else:
                      suffix = next_suffix.get(name, 1)
                      chosen = name + "(" + str(suffix) + ")"
                      while chosen in used:
                          suffix += 1
                          chosen = name + "(" + str(suffix) + ")"
                      next_suffix[name] = suffix + 1
                      next_suffix.setdefault(chosen, 1)
                  used.add(chosen)
                  expected.append(chosen)
              return result == expected

seed: 1487

