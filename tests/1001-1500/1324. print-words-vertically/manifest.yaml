entry:
  id: 1324
  title: "print-words-vertically"
  params:
    s:
      type: string
  call:
    cpp: "Solution().printVertically({s})"
    rust: "Solution::print_vertically({s})"
    python3: "Solution().printVertically({s})"
    python2: "Solution().printVertically({s})"
    ruby: "print_vertically({s})"
    java: "new Solution().printVertically({s})"
    csharp: "new Solution().PrintVertically({s})"
    kotlin: "Solution().printVertically({s})"
    go: "printVertically({s})"
    dart: "Solution().printVertically({s})"
    swift: "Solution().printVertically({s})"
    typescript: "printVertically({s})"

judge:
  type: "exact"

limits:
  time_ms: 500
  memory_mb: 300

oracle:
  python3:
    call: "Checker().printVertically(s, {result})"
    checker: |
      class Checker:
          def printVertically(self, s, result):
              if not isinstance(result, list) or any(not isinstance(row, str) for row in result):
                  return False
              words = s.split(' ')
              expected = []
              for column in range(max(len(word) for word in words)):
                  row = ''.join(word[column] if column < len(word) else ' ' for word in words)
                  expected.append(row.rstrip())
              return result == expected

seed: 132400

