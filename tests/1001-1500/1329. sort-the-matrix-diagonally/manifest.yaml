entry:
  id: 1329
  title: sort-the-matrix-diagonally
  params:
    mat:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().diagonalSort({mat})"
    rust: "Solution::diagonal_sort({mat})"
    python3: "Solution().diagonalSort({mat})"
    python2: "Solution().diagonalSort({mat})"
    ruby: "diagonal_sort({mat})"
    java: "new Solution().diagonalSort({mat})"
    csharp: "new Solution().DiagonalSort({mat})"
    kotlin: "Solution().diagonalSort({mat})"
    go: "diagonalSort({mat})"
    dart: "Solution().diagonalSort({mat})"
    swift: "Solution().diagonalSort({mat})"
    typescript: "diagonalSort({mat})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().diagonalSort(mat, {result})"
    checker: |
      class Checker:
          def diagonalSort(self, mat, result):
              if not isinstance(result, list) or len(result) != len(mat):
                  return False
              if any(not isinstance(row, list) or len(row) != len(mat[0]) for row in result):
                  return False
              for start_col in range(len(mat[0])):
                  source = []
                  candidate = []
                  row = 0
                  col = start_col
                  while row < len(mat) and col < len(mat[0]):
                      source.append(mat[row][col])
                      candidate.append(result[row][col])
                      row += 1
                      col += 1
                  if candidate != sorted(source):
                      return False
              for start_row in range(1, len(mat)):
                  source = []
                  candidate = []
                  row = start_row
                  col = 0
                  while row < len(mat) and col < len(mat[0]):
                      source.append(mat[row][col])
                      candidate.append(result[row][col])
                      row += 1
                      col += 1
                  if candidate != sorted(source):
                      return False
              return True
