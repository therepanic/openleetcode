  memory_mb: 256
oracle:
  python3:
    call: "Checker().cherryPickup(grid, {result})"
    checker: |
      class Checker:
          def cherryPickup(self, grid, result):
              if type(result) is not int or not grid or not grid[0]:
                  return False
              rows, cols = len(grid), len(grid[0])
              dp = {(0, cols - 1): grid[0][0] + grid[0][cols - 1]}
              for row in range(1, rows):
                  nxt = {}
                  for (left, right), score in dp.items():
                      for nl in (left - 1, left, left + 1):
                          for nr in (right - 1, right, right + 1):
                              if 0 <= nl < cols and 0 <= nr < cols:
                                  gain = grid[row][nl]
                                  if nr != nl:
                                      gain += grid[row][nr]
                                  key = (min(nl, nr), max(nl, nr))
                                  nxt[key] = max(nxt.get(key, -1), score + gain)
                  dp = nxt
              return result == max(dp.values())
