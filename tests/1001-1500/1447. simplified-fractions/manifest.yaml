limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().simplifiedFractions(n, {result})"
    checker: |
      class Checker:
          def simplifiedFractions(self, n, result):
              import math
              if not isinstance(result, list):
                  return False
              expected = set()
              for denominator in range(2, n + 1):
                  for numerator in range(1, denominator):
                      if math.gcd(numerator, denominator) == 1:
                          expected.add(str(numerator) + "/" + str(denominator))
              if len(result) != len(set(result)):
                  return False
              for fraction in result:
                  if not isinstance(fraction, str) or fraction.count("/") != 1:
                      return False
                  numerator_text, denominator_text = fraction.split("/")
                  if not numerator_text.isdigit() or not denominator_text.isdigit():
                      return False
                  numerator = int(numerator_text)
                  denominator = int(denominator_text)
                  if denominator < 2 or denominator > n or numerator < 1 or numerator >= denominator:
                      return False
                  if math.gcd(numerator, denominator) != 1:
                      return False
              return set(result) == expected

