entry:
  id: 1486
  title: xor-operation-in-an-array
  params:
    n:
      type: int
    start_value:
      type: int
  call:
    cpp: "Solution().xorOperation({n}, {start_value})"
    rust: "Solution::xor_operation({n}, {start_value})"
    python3: "Solution().xorOperation({n}, {start_value})"
    python2: "Solution().xorOperation({n}, {start_value})"
    ruby: "xor_operation({n}, {start_value})"
    java: "new Solution().xorOperation({n}, {start_value})"
    csharp: "new Solution().XorOperation({n}, {start_value})"
    kotlin: "Solution().xorOperation({n}, {start_value})"
    go: "xorOperation({n}, {start_value})"
    dart: "Solution().xorOperation({n}, {start_value})"
    swift: "Solution().xorOperation({n}, {start_value})"
    typescript: "xorOperation({n}, {start_value})"
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 128
oracle:
  python3:
    call: "Checker().xorOperation(n, start_value, {result})"
    checker: |
      class Checker:
          def xorOperation(self, n, start_value, result):
              if type(result) is not int or not (1 <= n <= 1000) or not (0 <= start_value <= 1000):
                  return False
              expected = 0
              for index in range(n):
                  expected ^= start_value + 2 * index
              return result == expected
seed: 1486
