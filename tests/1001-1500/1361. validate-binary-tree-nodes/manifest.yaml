entry:
  id: 1361
  title: validate-binary-tree-nodes
  params:
    n:
      type: int
    leftChild:
      type: array
      items:
        type: int
    rightChild:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().validateBinaryTreeNodes({n}, {leftChild}, {rightChild})"
    rust: "Solution::validate_binary_tree_nodes({n}, {leftChild}, {rightChild})"
    python3: "Solution().validateBinaryTreeNodes({n}, {leftChild}, {rightChild})"
    python2: "Solution().validateBinaryTreeNodes({n}, {leftChild}, {rightChild})"
    ruby: "validate_binary_tree_nodes({n}, {leftChild}, {rightChild})"
    java: "new Solution().validateBinaryTreeNodes({n}, {leftChild}, {rightChild})"
    csharp: "new Solution().ValidateBinaryTreeNodes({n}, {leftChild}, {rightChild})"
    kotlin: "Solution().validateBinaryTreeNodes({n}, {leftChild}, {rightChild})"
    go: "validateBinaryTreeNodes({n}, {leftChild}, {rightChild})"
    dart: "Solution().validateBinaryTreeNodes({n}, {leftChild}, {rightChild})"
    swift: "Solution().validateBinaryTreeNodes({n}, {leftChild}, {rightChild})"
    typescript: "validateBinaryTreeNodes({n}, {leftChild}, {rightChild})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().validateBinaryTreeNodes(n, leftChild, rightChild, {result})"
    checker: |
      class Checker:
          def validateBinaryTreeNodes(self, n, leftChild, rightChild, result):
              if type(result) is not bool or n < 1 or len(leftChild) != n or len(rightChild) != n:
                  return False
              parent_count = [0] * n
              for node in range(n):
                  for child in (leftChild[node], rightChild[node]):
                      if child == -1:
                          continue
                      if child < 0 or child >= n:
                          return result is False
                      parent_count[child] += 1
                      if parent_count[child] > 1:
                          return result is False
              roots = [node for node, count in enumerate(parent_count) if count == 0]
              if len(roots) != 1:
                  return result is False
              seen = {roots[0]}
              stack = [roots[0]]
              while stack:
                  node = stack.pop()
                  for child in (leftChild[node], rightChild[node]):
                      if child != -1:
                          if child in seen:
                              return result is False
                          seen.add(child)
                          stack.append(child)
              return result is (len(seen) == n)
