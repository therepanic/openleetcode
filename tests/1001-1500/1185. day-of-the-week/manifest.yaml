  memory_mb: 256
oracle:
  python3:
    call: "Checker().dayOfTheWeek(day, month, year, {result})"
    checker: |
      class Checker:
          def dayOfTheWeek(self, day, month, year, result):
              names = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"]
              if not isinstance(result, str) or not (1971 <= year <= 2100):
                  return False
              month_days = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31]
              leap = year % 4 == 0 and (year % 100 != 0 or year % 400 == 0)
              if leap:
                  month_days[1] = 29
              if not (1 <= month <= 12 and 1 <= day <= month_days[month - 1]):
                  return False
              days_since_epoch = day - 1 + sum(month_days[:month - 1])
              for current_year in range(1971, year):
                  if current_year % 4 == 0 and (current_year % 100 != 0 or current_year % 400 == 0):
                      days_since_epoch += 366
                  else:
                      days_since_epoch += 365
              return result == names[(4 + days_since_epoch) % 7]
