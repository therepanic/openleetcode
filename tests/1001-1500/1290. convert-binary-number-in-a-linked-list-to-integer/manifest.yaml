entry:
  id: 1290
  title: "convert-binary-number-in-a-linked-list-to-integer"
  params:
    head:
      type: list_node
  call:
    cpp: "Solution().getDecimalValue({head})"
    rust: "Solution::get_decimal_value({head})"
    python3: "Solution().getDecimalValue({head})"
    python2: "Solution().getDecimalValue({head})"
    ruby: "get_decimal_value({head})"
    java: "new Solution().getDecimalValue({head})"
    csharp: "new Solution().GetDecimalValue({head})"
    kotlin: "Solution().getDecimalValue({head})"
    go: "getDecimalValue({head})"
    dart: "Solution().getDecimalValue({head})"
    swift: "Solution().getDecimalValue({head})"
    typescript: "getDecimalValue({head})"

judge:
  type: "exact"

limits:
  time_ms: 300
  memory_mb: 300

oracle:
  python3:
    call: "Checker().getDecimalValue(head, {result})"
    checker: |
      class Checker:
          def getDecimalValue(self, head, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              value = 0
              for bit in head:
                  if bit not in (0, 1):
                      return False
                  value = (value << 1) | bit
              return result == value

seed: 1290

