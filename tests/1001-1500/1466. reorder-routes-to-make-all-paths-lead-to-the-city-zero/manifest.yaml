entry:
  id: 1466
  title: "reorder-routes-to-make-all-paths-lead-to-the-city-zero"
  params:
    n:
      type: int
    connections:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().minReorder({n}, {connections})"
    rust: "Solution::min_reorder({n}, {connections})"
    python3: "Solution().minReorder({n}, {connections})"
    python2: "Solution().minReorder({n}, {connections})"
    ruby: "min_reorder({n}, {connections})"
    java: "new Solution().minReorder({n}, {connections})"
    csharp: "new Solution().MinReorder({n}, {connections})"
    kotlin: "Solution().minReorder({n}, {connections})"
    go: "minReorder({n}, {connections})"
    dart: "Solution().minReorder({n}, {connections})"
    swift: "Solution().minReorder({n}, {connections})"
    typescript: "minReorder({n}, {connections})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 512

oracle:
  python3:
    call: "Checker().minReorder(n, connections, {result})"
    checker: |
      class Checker:
          def minReorder(self, n, connections, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              graph = [[] for _ in range(n)]
              directed = set()
              for a, b in connections:
                  graph[a].append(b)
                  graph[b].append(a)
                  directed.add((a, b))
              seen = {0}
              stack = [0]
              expected = 0
              while stack:
                  node = stack.pop()
                  for nxt in graph[node]:
                      if nxt not in seen:
                          seen.add(nxt)
                          expected += int((node, nxt) in directed)
                          stack.append(nxt)
              return len(seen) == n and result == expected

