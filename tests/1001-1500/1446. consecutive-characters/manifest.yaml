entry:
  id: 1446
  title: "consecutive-characters"
  params:
    s:
      type: string
  call:
    cpp: "Solution().maxPower({s})"
    rust: "Solution::max_power({s})"
    python3: "Solution().maxPower({s})"
    python2: "Solution().maxPower({s})"
    ruby: "max_power({s})"
    java: "new Solution().maxPower({s})"
    csharp: "new Solution().MaxPower({s})"
    kotlin: "Solution().maxPower({s})"
    go: "maxPower({s})"
    dart: "Solution().maxPower({s})"
    swift: "Solution().maxPower({s})"
    typescript: "maxPower({s})"
judge:
  type: exact
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().maxPower(s, {result})"
    checker: |
      class Checker:
          def maxPower(self, s, result):
              best = run = 1
              for i in range(1, len(s)):
                  run = run + 1 if s[i] == s[i-1] else 1
                  best = max(best, run)
              return result == best
seed: 1446
