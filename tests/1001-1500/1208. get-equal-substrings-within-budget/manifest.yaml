entry:
  id: 1208
  title: "get-equal-substrings-within-budget"
  params:
    s:
      type: string
    t:
      type: string
    maxCost:
      type: int
  call:
    cpp: "Solution().equalSubstring({s}, {t}, {maxCost})"
    rust: "Solution::equal_substring({s}, {t}, {maxCost})"
    python3: "Solution().equalSubstring({s}, {t}, {maxCost})"
    python2: "Solution().equalSubstring({s}, {t}, {maxCost})"
    ruby: "equal_substring({s}, {t}, {maxCost})"
    java: "new Solution().equalSubstring({s}, {t}, {maxCost})"
    csharp: "new Solution().EqualSubstring({s}, {t}, {maxCost})"
    kotlin: "Solution().equalSubstring({s}, {t}, {maxCost})"
    go: "equalSubstring({s}, {t}, {maxCost})"
    dart: "Solution().equalSubstring({s}, {t}, {maxCost})"
    swift: "Solution().equalSubstring({s}, {t}, {maxCost})"
    typescript: "equalSubstring({s}, {t}, {maxCost})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().equalSubstring(s, t, maxCost, {result})"
    checker: |
      class Checker:
          def equalSubstring(self, s, t, maxCost, result):
              left = 0
              cost = 0
              best = 0
              for right in range(len(s)):
                  cost += abs(ord(s[right]) - ord(t[right]))
                  while cost > maxCost:
                      cost -= abs(ord(s[left]) - ord(t[left]))
                      left += 1
                  best = max(best, right - left + 1)
              return result == best

seed: 1208

