entry:
  id: 1425
  title: constrained-subsequence-sum
  params:
    nums:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: "Solution().constrainedSubsetSum({nums}, {k})"
    rust: "Solution::constrained_subset_sum({nums}, {k})"
    python3: "Solution().constrainedSubsetSum({nums}, {k})"
    python2: "Solution().constrainedSubsetSum({nums}, {k})"
    ruby: "constrained_subset_sum({nums}, {k})"
    java: "new Solution().constrainedSubsetSum({nums}, {k})"
    csharp: "new Solution().ConstrainedSubsetSum({nums}, {k})"
    kotlin: "Solution().constrainedSubsetSum({nums}, {k})"
    go: "constrainedSubsetSum({nums}, {k})"
    dart: "Solution().constrainedSubsetSum({nums}, {k})"
    swift: "Solution().constrainedSubsetSum({nums}, {k})"
    typescript: "constrainedSubsetSum({nums}, {k})"

judge:
  type: exact

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().constrainedSubsetSum(nums, k, {result})"
    checker: |
      class Checker:
          def constrainedSubsetSum(self, nums, k, result):
              if type(result) is not int or not nums or not (1 <= k <= len(nums)):
                  return False
              n = len(nums)
              size = 1
              while size < n:
                  size <<= 1
              tree = [-10**18] * (2 * size)
              answer = -10**18
              for i, value in enumerate(nums):
                  left = max(0, i - k)
                  right = i
                  best = 0
                  l = left + size
                  r = right + size
                  while l < r:
                      if l & 1:
                          best = max(best, tree[l])
                          l += 1
                      if r & 1:
                          r -= 1
                          best = max(best, tree[r])
                      l >>= 1
                      r >>= 1
                  current = value + max(0, best)
                  answer = max(answer, current)
                  p = i + size
                  tree[p] = current
                  p >>= 1
                  while p:
                      tree[p] = max(tree[2 * p], tree[2 * p + 1])
                      p >>= 1
              return result == answer

