entry:
  id: 1491
  title: "average-salary-excluding-the-minimum-and-maximum-salary"
  params:
    salary:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().average({salary})"
    rust: "Solution::average({salary})"
    python3: "Solution().average({salary})"
    python2: "Solution().average({salary})"
    ruby: "average({salary})"
    java: "new Solution().average({salary})"
    csharp: "new Solution().Average({salary})"
    kotlin: "Solution().average({salary})"
    go: "average({salary})"
    dart: "Solution().average({salary})"
    swift: "Solution().average({salary})"
    typescript: "average({salary})"
judge:
  type: exact
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().average(salary, {result})"
    checker: |
      class Checker:
          def average(self, salary, result):
              if not isinstance(result, (int, float)):
                  return False
              expected = (sum(salary) - min(salary) - max(salary)) / (len(salary) - 2)
              return abs(result - expected) <= 1e-5
seed: 1491
