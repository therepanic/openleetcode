entry:
  id: 1260
  title: "shift-2d-grid"
  params:
    grid:
      type: array
      items:
        type: array
        items:
          type: int
    k:
      type: int
  call:
    python3: "Solution().shiftGrid({grid}, {k})"
    python2: "Solution().shiftGrid({grid}, {k})"
    cpp: "Solution().shiftGrid({grid}, {k})"
    rust: "Solution::shift_grid({grid}, {k})"
    ruby: "shift_grid({grid}, {k})"
    java: "new Solution().shiftGrid({grid}, {k})"
    csharp: "new Solution().ShiftGrid({grid}, {k})"
    kotlin: "Solution().shiftGrid({grid}, {k})"
    go: "shiftGrid({grid}, {k})"
    dart: "Solution().shiftGrid({grid}, {k})"
    swift: "Solution().shiftGrid({grid}, {k})"
    typescript: "shiftGrid({grid}, {k})"
judge:
  type: "exact"
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().shiftGrid(grid, k, {result})"
    checker: |
      class Checker:
          def shiftGrid(self, grid, k, result):
              if not isinstance(result, list) or len(result) != len(grid):
                  return False
              width = len(grid[0])
              if any(not isinstance(row, list) or len(row) != width for row in result):
                  return False
              flat = [value for row in grid for value in row]
              shift = k % len(flat)
              expected = flat[-shift:] + flat[:-shift] if shift else flat
              return result == [expected[i:i + width] for i in range(0, len(expected), width)]
seed: 1260
