entry:
  id: 1375
  title: "number-of-times-binary-string-is-prefix-aligned"
  params:
    flips:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().numTimesAllBlue({flips})"
    rust: "Solution::num_times_all_blue({flips})"
    python3: "Solution().numTimesAllBlue({flips})"
    python2: "Solution().numTimesAllBlue({flips})"
    ruby: "num_times_all_blue({flips})"
    java: "new Solution().numTimesAllBlue({flips})"
    csharp: "new Solution().NumTimesAllBlue({flips})"
    kotlin: "Solution().numTimesAllBlue({flips})"
    go: "numTimesAllBlue({flips})"
    dart: "Solution().numTimesAllBlue({flips})"
    swift: "Solution().numTimesAllBlue({flips})"
    typescript: "numTimesAllBlue({flips})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().numTimesAllBlue(flips, {result})"
    checker: |
      class Checker:
          def numTimesAllBlue(self, flips, result):
              if type(result) is not int:
                  return False
              n = len(flips)
              bits = [False] * n
              first_zero = 0
              aligned = 0
              for step, position in enumerate(flips, 1):
                  if position < 1 or position > n or bits[position - 1]:
                      return False
                  bits[position - 1] = True
                  while first_zero < n and bits[first_zero]:
                      first_zero += 1
                  if first_zero == step:
                      aligned += 1
              return result == aligned

seed: 1375

