    cpp: "Solution().minTimeToVisitAllPoints({points})"
    rust: "Solution::min_time_to_visit_all_points({points})"
    python3: "Solution().minTimeToVisitAllPoints({points})"
    python2: "Solution().minTimeToVisitAllPoints({points})"
    ruby: "min_time_to_visit_all_points({points})"
    java: "new Solution().minTimeToVisitAllPoints({points})"
    csharp: "new Solution().MinTimeToVisitAllPoints({points})"
    kotlin: "Solution().minTimeToVisitAllPoints({points})"
    go: "minTimeToVisitAllPoints({points})"
    dart: "Solution().minTimeToVisitAllPoints({points})"
    swift: "Solution().minTimeToVisitAllPoints({points})"
    typescript: "minTimeToVisitAllPoints({points})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().minTimeToVisitAllPoints(points, {result})"
    checker: |
      class Checker:
          def minTimeToVisitAllPoints(self, points, result):
              if type(result) is not int or not 1 <= len(points) <= 100:
                  return False
              total = 0
              for previous, current in zip(points, points[1:]):
                  if len(previous) != 2 or len(current) != 2:
                      return False
                  total += max(abs(current[0] - previous[0]), abs(current[1] - previous[1]))
              return result == total
