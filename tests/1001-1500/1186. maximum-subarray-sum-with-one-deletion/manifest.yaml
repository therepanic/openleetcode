entry:
  id: 1186
  title: "maximum-subarray-sum-with-one-deletion"
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().maximumSum({arr})"
    rust: "Solution::maximum_sum({arr})"
    python3: "Solution().maximumSum({arr})"
    python2: "Solution().maximumSum({arr})"
    ruby: "maximum_sum({arr})"
    java: "new Solution().maximumSum({arr})"
    csharp: "new Solution().MaximumSum({arr})"
    kotlin: "Solution().maximumSum({arr})"
    go: "maximumSum({arr})"
    dart: "Solution().maximumSum({arr})"
    swift: "Solution().maximumSum({arr})"
    typescript: "maximumSum({arr})"

judge:
  type: "exact"

limits:
  time_ms: 700
  memory_mb: 300

oracle:
  python3:
    call: "Checker().maximumSum(arr, {result})"
    checker: |
      class Checker:
          def maximumSum(self, arr, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              size = len(arr)
              if size == 0:
                  return False
              if size == 1:
                  return result == arr[0]

              # Best non-empty subarray ending at each position.
              left = [0] * size
              left[0] = arr[0]
              for index in range(1, size):
                  left[index] = max(arr[index], left[index - 1] + arr[index])

              # Best non-empty subarray starting at each position.
              right = [0] * size
              right[-1] = arr[-1]
              for index in range(size - 2, -1, -1):
                  right[index] = max(arr[index], arr[index] + right[index + 1])

              best = max(left)
              for deleted_index in range(1, size - 1):
                  best = max(best, left[deleted_index - 1] + right[deleted_index + 1])
              return result == best

seed: 118600

