entry:
  id: 1192
  title: "critical-connections-in-a-network"
  params:
    n:
      type: int
    connections:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().criticalConnections({n}, {connections})"
    rust: "Solution::critical_connections({n}, {connections})"
    python3: "Solution().criticalConnections({n}, {connections})"
    python2: "Solution().criticalConnections({n}, {connections})"
    ruby: "critical_connections({n}, {connections})"
    java: "new Solution().criticalConnections({n}, {connections})"
    csharp: "new Solution().CriticalConnections({n}, {connections})"
    kotlin: "Solution().criticalConnections({n}, {connections})"
    go: "criticalConnections({n}, {connections})"
    dart: "Solution().criticalConnections({n}, {connections})"
    swift: "Solution().criticalConnections({n}, {connections})"
    typescript: "criticalConnections({n}, {connections})"

judge:
  type: "ignore_order"

limits:
  time_ms: 1000
  memory_mb: 400

oracle:
  python3:
    call: "Checker().criticalConnections(n, connections, {result})"
    checker: |
      class Checker:
          def criticalConnections(self, n, connections, result):
              if not isinstance(result, list):
                  return False
              actual = set()
              for edge in result:
                  if (not isinstance(edge, list) or len(edge) != 2 or
                          not all(isinstance(node, int) and not isinstance(node, bool)
                                  for node in edge)):
                      return False
                  u, v = edge
                  if not (0 <= u < n and 0 <= v < n and u != v):
                      return False
                  normalized = tuple(sorted((u, v)))
                  if normalized in actual:
                      return False
                  actual.add(normalized)
              original = {tuple(sorted((u, v))) for u, v in connections}
              if not actual.issubset(original):
                  return False
              graph = [[] for _ in range(n)]
              for u, v in connections:
                  graph[u].append(v)
                  graph[v].append(u)
              bridges = set()
              for edge in original:
                  start, target = edge
                  seen = {start}
                  stack = [start]
                  while stack:
                      node = stack.pop()
                      for neighbor in graph[node]:
                          if tuple(sorted((node, neighbor))) == edge or neighbor in seen:
                              continue
                          seen.add(neighbor)
                          stack.append(neighbor)
                  if target not in seen:
                      bridges.add(edge)
              return actual == bridges

seed: 1192

