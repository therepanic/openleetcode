    java: "TreeNode.treeNodeToArray(new Solution().removeLeafNodes({root}, {target}))"
    csharp: "TreeNode.TreeNodeToArray(new Solution().RemoveLeafNodes({root}, {target}))"
    kotlin: "treeNodeToArray(Solution().removeLeafNodes({root}, {target}))"
    go: "treeNodeToArray(removeLeafNodes({root}, {target}))"
    dart: "tree_node_to_array(Solution().removeLeafNodes({root}, {target}))"
