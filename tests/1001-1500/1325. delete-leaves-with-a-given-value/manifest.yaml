judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().removeLeafNodes(root, target, {result})"
    checker: |
      class Checker:
          def removeLeafNodes(self, root, target, result):
              if not isinstance(root, list) or not root or root[0] is None:
                  return False
              if not isinstance(result, list):
                  return False

              class Node:
                  def __init__(self, val):
                      self.val = val
                      self.left = None
                      self.right = None

              tree_root = Node(root[0])
              queue = [tree_root]
              read = 1
              for node in queue:
                  if read < len(root) and root[read] is not None:
                      node.left = Node(root[read])
                      queue.append(node.left)
                  read += 1
                  if read < len(root) and root[read] is not None:
                      node.right = Node(root[read])
                      queue.append(node.right)
                  read += 1

              def prune(node):
                  if node is None:
                      return None
                  node.left = prune(node.left)
                  node.right = prune(node.right)
                  if node.left is None and node.right is None and node.val == target:
                      return None
                  return node

              tree_root = prune(tree_root)
              if tree_root is None:
                  return result == []
              expected = []
              queue = [tree_root]
              while queue:
                  node = queue.pop(0)
                  if node is None:
                      expected.append(None)
                  else:
                      expected.append(node.val)
                      queue.append(node.left)
                      queue.append(node.right)
              while expected and expected[-1] is None:
                  expected.pop()
              return result == expected
seed: 1325
