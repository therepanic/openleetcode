entry:
  id: 1413
  title: "minimum-value-to-get-positive-step-by-step-sum"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().minStartValue({nums})"
    rust: "Solution::min_start_value({nums})"
    python3: "Solution().minStartValue({nums})"
    python2: "Solution().minStartValue({nums})"
    ruby: "min_start_value({nums})"
    java: "new Solution().minStartValue({nums})"
    csharp: "new Solution().MinStartValue({nums})"
    kotlin: "Solution().minStartValue({nums})"
    go: "minStartValue({nums})"
    dart: "Solution().minStartValue({nums})"
    swift: "Solution().minStartValue({nums})"
    typescript: "minStartValue({nums})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().minStartValue(nums, {result})"
    checker: |
      class Checker:
          def minStartValue(self, nums, result):
              prefix = 0
              lowest = 0
              for value in nums:
                  prefix += value
                  lowest = min(lowest, prefix)
              return result == max(1, 1 - lowest)

seed: 1413

