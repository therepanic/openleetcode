entry:
  id: 1330
  title: "reverse-subarray-to-maximize-array-value"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().maxValueAfterReverse({nums})"
    rust: "Solution::max_value_after_reverse({nums})"
    python3: "Solution().maxValueAfterReverse({nums})"
    python2: "Solution().maxValueAfterReverse({nums})"
    ruby: "max_value_after_reverse({nums})"
    java: "new Solution().maxValueAfterReverse({nums})"
    csharp: "new Solution().MaxValueAfterReverse({nums})"
    kotlin: "Solution().maxValueAfterReverse({nums})"
    go: "maxValueAfterReverse({nums})"
    dart: "Solution().maxValueAfterReverse({nums})"
    swift: "Solution().maxValueAfterReverse({nums})"
    typescript: "maxValueAfterReverse({nums})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().maxValueAfterReverse(nums, {result})"
    checker: |
      class Checker:
          def maxValueAfterReverse(self, nums, result):
              if not isinstance(result, int) or len(nums) < 2:
                  return False
              base = 0
              endpoint_gain = 0
              largest_lower = -10**18
              smallest_upper = 10**18
              for left, right in zip(nums, nums[1:]):
                  edge = abs(left - right)
                  base += edge
                  endpoint_gain = max(
                      endpoint_gain,
                      abs(nums[-1] - left) - edge,
                      abs(nums[0] - right) - edge,
                  )
                  largest_lower = max(largest_lower, min(left, right))
                  smallest_upper = min(smallest_upper, max(left, right))
              interior_gain = 2 * (largest_lower - smallest_upper)
              return result == base + max(0, endpoint_gain, interior_gain)
seed: 1330
