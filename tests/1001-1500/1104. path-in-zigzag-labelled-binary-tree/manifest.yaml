entry:
  id: 1104
  title: path-in-zigzag-labelled-binary-tree
  params:
    label:
      type: int
  call:
    cpp: Solution().pathInZigZagTree({label})
    rust: Solution::path_in_zig_zag_tree({label})
    python3: Solution().pathInZigZagTree({label})
    python2: Solution().pathInZigZagTree({label})
    ruby: path_in_zig_zag_tree({label})
    java: new Solution().pathInZigZagTree({label})
    csharp: new Solution().PathInZigZagTree({label})
    kotlin: Solution().pathInZigZagTree({label})
    go: pathInZigZagTree({label})
    dart: Solution().pathInZigZagTree({label})
    swift: Solution().pathInZigZagTree({label})
    typescript: pathInZigZagTree({label})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 128
oracle:
  python3:
    call: Checker().check(label, {result})
    checker:
      "class Checker(object):\n    def check(self, label, result):\n      \
      \  if not isinstance(result, list) or not result or result[-1] != label:\n \
      \           return False\n        if any((not isinstance(x, int) or x < 1) for\
      \ x in result):\n            return False\n        cur = label\n        exp\
      \ = []\n        while cur >= 1:\n            exp.append(cur)\n            if\
      \ cur == 1:\n                break\n            level = cur.bit_length()\n \
      \           low = 1 << (level - 1)\n            high = (low << 1) - 1\n    \
      \        cur = (low + high - cur) // 2\n        return result == exp[::-1]\n"
seed: 1104
