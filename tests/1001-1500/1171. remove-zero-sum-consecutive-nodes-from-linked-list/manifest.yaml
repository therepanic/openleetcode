judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().removeZeroSumSublists(head, {result})"
    checker: |
      class Checker:
          def removeZeroSumSublists(self, head, result):
              if not isinstance(head, list) or not isinstance(result, list):
                  return False
              if not 1 <= len(head) <= 1000:
                  return False
              if any(isinstance(value, bool) or not isinstance(value, int) or value < -1000 or value > 1000 for value in head):
                  return False
              if any(isinstance(value, bool) or not isinstance(value, int) for value in result):
                  return False

              # A final list cannot contain another removable zero-sum interval.
              seen_sums = set([0])
              total = 0
              for value in result:
                  total += value
                  if total in seen_sums:
                      return False
                  seen_sums.add(total)

              # Every removed gap between retained nodes must sum to zero. Dynamic
              # programming checks that some matching subsequence has that property.
              prefix = [0]
              for value in head:
                  prefix.append(prefix[-1] + value)
              if not result:
                  return prefix[-1] == 0

              previous = set()
              for index, value in enumerate(head):
                  if value == result[0] and prefix[index] == 0:
                      previous.add(index)
              if not previous:
                  return False

              for wanted in result[1:]:
                  current = set()
                  next_prefixes = dict()
                  for prior in previous:
                      total = prefix[prior + 1]
                      if total not in next_prefixes or prior < next_prefixes[total]:
                          next_prefixes[total] = prior
                  for index, value in enumerate(head):
                      if value == wanted and next_prefixes.get(prefix[index], index) < index:
                          current.add(index)
                  if not current:
                      return False
                  previous = current

              return any(prefix[index + 1] == prefix[-1] for index in previous)
