entry:
  id: 1344
  title: angle-between-hands-of-a-clock
  params:
    hour:
      type: int
    minutes:
      type: int
  call:
    cpp: "Solution().angleClock({hour}, {minutes})"
    rust: "Solution::angle_clock({hour}, {minutes})"
    python3: "Solution().angleClock({hour}, {minutes})"
    python2: "Solution().angleClock({hour}, {minutes})"
    ruby: "angle_clock({hour}, {minutes})"
    java: "new Solution().angleClock({hour}, {minutes})"
    csharp: "new Solution().AngleClock({hour}, {minutes})"
    kotlin: "Solution().angleClock({hour}, {minutes})"
    go: "angleClock({hour}, {minutes})"
    dart: "Solution().angleClock({hour}, {minutes})"
    swift: "Solution().angleClock({hour}, {minutes})"
    typescript: "angleClock({hour}, {minutes})"

judge:
  type: "exact"

limits:
  time_ms: 500
  memory_mb: 256

oracle:
  python3:
    call: "Checker().angleClock(hour, minutes, {result})"
    checker: |
      import math

      class Checker:
          def angleClock(self, hour, minutes, result):
              if not isinstance(result, (int, float)) or isinstance(result, bool):
                  return False
              if not math.isfinite(result):
                  return False
              hour_angle = (hour % 12) * 30.0 + minutes * 0.5
              minute_angle = minutes * 6.0
              difference = abs(hour_angle - minute_angle)
              expected = min(difference, 360.0 - difference)
              return abs(float(result) - expected) <= 1e-5

