judge:
  type: "exact"
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().nthUglyNumber(n, a, b, c, {result})"
    checker: |
      from math import gcd

      class Checker:
          def nthUglyNumber(self, n, a, b, c, result):
              if any(not isinstance(value, int) or isinstance(value, bool) for value in (n, a, b, c, result)):
                  return False
              if not (1 <= n <= 1000000000 and 1 <= a <= 1000000000 and 1 <= b <= 1000000000 and 1 <= c <= 1000000000):
                  return False
              if a * b * c > 1000000000000000000 or not (1 <= result <= 2000000000):
                  return False
              def lcm(x, y):
                  return x // gcd(x, y) * y
              ab, ac, bc = lcm(a, b), lcm(a, c), lcm(b, c)
              abc = lcm(ab, c)
              def count(limit):
                  return limit // a + limit // b + limit // c - limit // ab - limit // ac - limit // bc + limit // abc
              is_ugly = result % a == 0 or result % b == 0 or result % c == 0
              return is_ugly and count(result - 1) < n <= count(result)
seed: 1201
