entry:
  id: 1320
  title: "minimum-distance-to-type-a-word-using-two-fingers"
  params:
    word:
      type: string
  call:
    cpp: "Solution().minimumDistance({word})"
    rust: "Solution::minimum_distance({word})"
    python3: "Solution().minimumDistance({word})"
    python2: "Solution().minimumDistance({word})"
    ruby: "minimum_distance({word})"
    java: "new Solution().minimumDistance({word})"
    csharp: "new Solution().MinimumDistance({word})"
    kotlin: "Solution().minimumDistance({word})"
    go: "minimumDistance({word})"
    dart: "Solution().minimumDistance({word})"
    swift: "Solution().minimumDistance({word})"
    typescript: "minimumDistance({word})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 300

oracle:
  python3:
    call: "Checker().minimumDistance(word, {result})"
    checker: |
      class Checker:
          def minimumDistance(self, word, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              def distance(a, b):
                  return abs(a // 6 - b // 6) + abs(a % 6 - b % 6)
              states = [0] * 26
              for previous, current in zip(word, word[1:]):
                  previous = ord(previous) - ord('A')
                  current = ord(current) - ord('A')
                  updated = [cost + distance(previous, current) for cost in states]
                  updated[previous] = min(
                      updated[previous],
                      min(cost + distance(other, current) for other, cost in enumerate(states)),
                  )
                  states = updated
              return result == min(states)

seed: 132000

