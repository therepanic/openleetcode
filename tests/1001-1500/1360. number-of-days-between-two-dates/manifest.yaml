judge:
  type: "exact"
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().daysBetweenDates(date1, date2, {result})"
    checker: |
      class Checker:
          def _ordinal(self, date):
              year, month, day = map(int, date.split('-'))
              years_before = year - 1
              total = 365 * years_before + years_before // 4 - years_before // 100 + years_before // 400
              month_days = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31]
              total += sum(month_days[:month - 1]) + day
              if month > 2 and (year % 4 == 0 and (year % 100 != 0 or year % 400 == 0)):
                  total += 1
              return total

          def daysBetweenDates(self, date1, date2, result):
              return isinstance(result, int) and not isinstance(result, bool) and result == abs(self._ordinal(date1) - self._ordinal(date2))
