  id: 1360
  title: "number-of-days-between-two-dates"
  params:
    date1:
      type: string
    date2:
      type: string
  call:
    python3: "Solution().daysBetweenDates({date1}, {date2})"
    python2: "Solution().daysBetweenDates({date1}, {date2})"
    cpp: "Solution().daysBetweenDates({date1}, {date2})"
    rust: "Solution::days_between_dates({date1}, {date2})"
    ruby: "days_between_dates({date1}, {date2})"
    java: "new Solution().daysBetweenDates({date1}, {date2})"
    csharp: "new Solution().DaysBetweenDates({date1}, {date2})"
    kotlin: "Solution().daysBetweenDates({date1}, {date2})"
    go: "daysBetweenDates({date1}, {date2})"
    dart: "Solution().daysBetweenDates({date1}, {date2})"
