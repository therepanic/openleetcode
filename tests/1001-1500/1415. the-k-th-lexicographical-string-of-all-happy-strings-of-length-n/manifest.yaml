entry:
  id: 1415
  title: "the-k-th-lexicographical-string-of-all-happy-strings-of-length-n"
  params:
    n:
      type: int
    k:
      type: int
  call:
    cpp: "Solution().getHappyString({n}, {k})"
    rust: "Solution::get_happy_string({n}, {k})"
    python3: "Solution().getHappyString({n}, {k})"
    python2: "Solution().getHappyString({n}, {k})"
    ruby: "get_happy_string({n}, {k})"
    java: "new Solution().getHappyString({n}, {k})"
    csharp: "new Solution().GetHappyString({n}, {k})"
    kotlin: "Solution().getHappyString({n}, {k})"
    go: "getHappyString({n}, {k})"
    dart: "Solution().getHappyString({n}, {k})"
    swift: "Solution().getHappyString({n}, {k})"
    typescript: "getHappyString({n}, {k})"

judge:
  type: "exact"

limits:
  time_ms: 300
  memory_mb: 300

oracle:
  python3:
    call: "Checker().getHappyString(n, k, {result})"
    checker: |
      class Checker:
          def getHappyString(self, n, k, result):
              strings = []

              def build(prefix):
                  if len(prefix) == n:
                      strings.append(prefix)
                      return
                  for char in "abc":
                      if not prefix or prefix[-1] != char:
                          build(prefix + char)

              build("")
              expected = strings[k - 1] if 1 <= k <= len(strings) else ""
              return result == expected

seed: 1415

