entry:
  id: 1030
  title: matrix-cells-in-distance-order
  params:
    m:
      type: int
    n:
      type: int
    i:
      type: int
    j:
      type: int
  call:
    cpp: "Solution().allCellsDistOrder({m}, {n}, {i}, {j})"
    rust: "Solution::all_cells_dist_order({m}, {n}, {i}, {j})"
    python3: "Solution().allCellsDistOrder({m}, {n}, {i}, {j})"
    python2: "Solution().allCellsDistOrder({m}, {n}, {i}, {j})"
    ruby: "all_cells_dist_order({m}, {n}, {i}, {j})"
    java: "new Solution().allCellsDistOrder({m}, {n}, {i}, {j})"
    csharp: "new Solution().AllCellsDistOrder({m}, {n}, {i}, {j})"
    kotlin: "Solution().allCellsDistOrder({m}, {n}, {i}, {j})"
    go: "allCellsDistOrder({m}, {n}, {i}, {j})"
    dart: "Solution().allCellsDistOrder({m}, {n}, {i}, {j})"
    swift: "Solution().allCellsDistOrder({m}, {n}, {i}, {j})"
    typescript: "allCellsDistOrder({m}, {n}, {i}, {j})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(m, n, i, j, {result})"
    checker: |
      class Checker:
          def check(self, m, n, i, j, result):
              if not isinstance(result, list) or len(result) != m * n:
                  return False
              seen = set()
              prev = None
              for cell in result:
                  if not isinstance(cell, list) or len(cell) != 2:
                      return False
                  r, c = cell
                  if not (0 <= r < m and 0 <= c < n):
                      return False
                  if (r, c) in seen:
                      return False
                  seen.add((r, c))
                  key = (abs(r - i) + abs(c - j), r, c)
                  if prev is not None and prev > key:
                      return False
                  prev = key
              return len(seen) == m * n
seed: 1030
