entry:
  id: 1144
  title: "decrease-elements-to-make-array-zigzag"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().movesToMakeZigzag({nums})"
    rust: "Solution::moves_to_make_zigzag({nums})"
    python3: "Solution().movesToMakeZigzag({nums})"
    python2: "Solution().movesToMakeZigzag({nums})"
    ruby: "moves_to_make_zigzag({nums})"
    java: "new Solution().movesToMakeZigzag({nums})"
    csharp: "new Solution().MovesToMakeZigzag({nums})"
    kotlin: "Solution().movesToMakeZigzag({nums})"
    go: "movesToMakeZigzag({nums})"
    dart: "Solution().movesToMakeZigzag({nums})"
    swift: "Solution().movesToMakeZigzag({nums})"
    typescript: "movesToMakeZigzag({nums})"

judge:
  type: "exact"

limits:
  time_ms: 500
  memory_mb: 300

oracle:
  python3:
    call: "Checker().movesToMakeZigzag(nums, {result})"
    checker: |
      class Checker:
          def movesToMakeZigzag(self, nums, result):
              if not isinstance(result, int) or isinstance(result, bool) or result < 0:
                  return False
              costs = []
              for mode in (0, 1):
                  total = 0
                  for i, value in enumerate(nums):
                      if i % 2 != mode:
                          continue
                      left = nums[i - 1] if i else 10**9
                      right = nums[i + 1] if i + 1 < len(nums) else 10**9
                      limit = min(left, right) - 1
                      if value > limit:
                          total += value - limit
                  costs.append(total)
              return result == min(costs)

