entry:
  id: 1328
  title: "break-a-palindrome"
  params:
    palindrome:
      type: string
  call:
    cpp: "Solution().breakPalindrome({palindrome})"
    rust: "Solution::break_palindrome({palindrome})"
    python3: "Solution().breakPalindrome({palindrome})"
    python2: "Solution().breakPalindrome({palindrome})"
    ruby: "break_palindrome({palindrome})"
    java: "new Solution().breakPalindrome({palindrome})"
    csharp: "new Solution().BreakPalindrome({palindrome})"
    kotlin: "Solution().breakPalindrome({palindrome})"
    go: "breakPalindrome({palindrome})"
    dart: "Solution().breakPalindrome({palindrome})"
    swift: "Solution().breakPalindrome({palindrome})"
    typescript: "breakPalindrome({palindrome})"
judge:
  type: "exact"
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().breakPalindrome(palindrome, {result})"
    checker: |
      class Checker:
          def breakPalindrome(self, palindrome, result):
              if len(palindrome) == 1:
                  return result == ''
              if not isinstance(result, str) or len(result) != len(palindrome):
                  return False
              if result == result[::-1]:
                  return False
              for index in range(len(palindrome) // 2):
                  if palindrome[index] != 'a':
                      expected = palindrome[:index] + 'a' + palindrome[index + 1:]
                      return result == expected
              return result == palindrome[:-1] + 'b'
seed: 1328
