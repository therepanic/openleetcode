entry:
  id: 1131
  title: "maximum-of-absolute-value-expression"
  params:
    arr1:
      type: array
      items:
        type: int
    arr2:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().maxAbsValExpr({arr1}, {arr2})"
    rust: "Solution::max_abs_val_expr({arr1}, {arr2})"
    python3: "Solution().maxAbsValExpr({arr1}, {arr2})"
    python2: "Solution().maxAbsValExpr({arr1}, {arr2})"
    ruby: "max_abs_val_expr({arr1}, {arr2})"
    java: "new Solution().maxAbsValExpr({arr1}, {arr2})"
    csharp: "new Solution().MaxAbsValExpr({arr1}, {arr2})"
    kotlin: "Solution().maxAbsValExpr({arr1}, {arr2})"
    go: "maxAbsValExpr({arr1}, {arr2})"
    dart: "Solution().maxAbsValExpr({arr1}, {arr2})"
    swift: "Solution().maxAbsValExpr({arr1}, {arr2})"
    typescript: "maxAbsValExpr({arr1}, {arr2})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().maxAbsValExpr(arr1, arr2, {result})"
    checker: |
      class Checker:
          def maxAbsValExpr(self, arr1, arr2, result):
              if len(arr1) != len(arr2) or len(arr1) < 2:
                  return False
              best = 0
              for sign1 in (1, -1):
                  for sign2 in (1, -1):
                      values = [sign1 * arr1[i] + sign2 * arr2[i] + i for i in range(len(arr1))]
                      best = max(best, max(values) - min(values))
              return result == best

seed: 1131

