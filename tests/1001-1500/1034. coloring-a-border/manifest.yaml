entry:
  id: 1034
  title: coloring-a-border
  params:
    grid:
      type: array
      items:
        type: array
        items:
          type: int
    row:
      type: int
    col:
      type: int
    color:
      type: int
  call:
    cpp: Solution().colorBorder({grid}, {row}, {col}, {color})
    rust: Solution::color_border({grid}, {row}, {col}, {color})
    python3: Solution().colorBorder({grid}, {row}, {col}, {color})
    python2: Solution().colorBorder({grid}, {row}, {col}, {color})
    ruby: color_border({grid}, {row}, {col}, {color})
    java: new Solution().colorBorder({grid}, {row}, {col}, {color})
    csharp: new Solution().ColorBorder({grid}, {row}, {col}, {color})
    kotlin: Solution().colorBorder({grid}, {row}, {col}, {color})
    go: colorBorder({grid}, {row}, {col}, {color})
    dart: Solution().colorBorder({grid}, {row}, {col}, {color})
    swift: Solution().colorBorder({grid}, {row}, {col}, {color})
    typescript: colorBorder({grid}, {row}, {col}, {color})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(grid, row, col, color, {result})
    checker:
      "from collections import deque\n\nclass Checker:\n    def check(self,\
      \ grid, row, col, color, result):\n        if not isinstance(result, list):\n\
      \            return False\n        exp = [r[:] for r in grid]\n        rows,\
      \ cols = len(grid), len(grid[0])\n        start = grid[row][col]\n        q\
      \ = deque([(row, col)])\n        seen = {(row, col)}\n        border = []\n\
      \        while q:\n            r, c = q.popleft()\n            is_border = False\n\
      \            for dr, dc in [(-1, 0), (1, 0), (0, -1), (0, 1)]:\n           \
      \     nr, nc = r + dr, c + dc\n                if not (0 <= nr < rows and 0\
      \ <= nc < cols):\n                    is_border = True\n                elif\
      \ grid[nr][nc] != start:\n                    is_border = True\n           \
      \     elif (nr, nc) not in seen:\n                    seen.add((nr, nc))\n \
      \                   q.append((nr, nc))\n            if is_border:\n        \
      \        border.append((r, c))\n        for r, c in border:\n            exp[r][c]\
      \ = color\n        return result == exp\n"
seed: 1034
