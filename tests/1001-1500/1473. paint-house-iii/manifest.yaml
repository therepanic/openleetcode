limits:
  time_ms: 1000
  memory_mb: 512

oracle:
  python3:
    call: "Checker().minCost(houses, cost, m, n, target, {result})"
    checker: |
      class Checker:
          def minCost(self, houses, cost, m, n, target, result):
              inf = 10**18
              dp = [[inf] * (target + 1) for _ in range(n)]
              first = range(n) if houses[0] == 0 else [houses[0] - 1]
              for color in first:
                  dp[color][1] = 0 if houses[0] else cost[0][color]
              for i in range(1, m):
                  ndp = [[inf] * (target + 1) for _ in range(n)]
                  choices = range(n) if houses[i] == 0 else [houses[i] - 1]
                  for color in choices:
                      add = 0 if houses[i] else cost[i][color]
                      for groups in range(1, target + 1):
                          ndp[color][groups] = min(ndp[color][groups], dp[color][groups] + add)
                          if groups > 1:
                              ndp[color][groups] = min(
                                  ndp[color][groups],
                                  min((dp[old][groups - 1] for old in range(n) if old != color), default=inf) + add)
                  dp = ndp
              expected = min(dp[color][target] for color in range(n))
              expected = -1 if expected >= inf else expected
              return isinstance(result, int) and not isinstance(result, bool) and result == expected

