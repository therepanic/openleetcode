entry:
  id: 1442
  title: "count-triplets-that-can-form-two-arrays-of-equal-xor"
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().countTriplets({arr})"
    rust: "Solution::count_triplets({arr})"
    python3: "Solution().countTriplets({arr})"
    python2: "Solution().countTriplets({arr})"
    ruby: "count_triplets({arr})"
    java: "new Solution().countTriplets({arr})"
    csharp: "new Solution().CountTriplets({arr})"
    kotlin: "Solution().countTriplets({arr})"
    go: "countTriplets({arr})"
    dart: "Solution().countTriplets({arr})"
    swift: "Solution().countTriplets({arr})"
    typescript: "countTriplets({arr})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().countTriplets(arr, {result})"
    checker: |
      class Checker:
          def countTriplets(self, arr, result):
              expected = 0
              for i in range(len(arr) - 1):
                  left_xor = 0
                  for j in range(i, len(arr) - 1):
                      left_xor ^= arr[j]
                      right_xor = 0
                      for k in range(j + 1, len(arr)):
                          right_xor ^= arr[k]
                          if left_xor == right_xor:
                              expected += 1
              return isinstance(result, int) and not isinstance(result, bool) and result == expected

seed: 1442

