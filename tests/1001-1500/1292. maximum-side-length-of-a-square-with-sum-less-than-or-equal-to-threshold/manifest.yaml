entry:
  id: 1292
  title: "maximum-side-length-of-a-square-with-sum-less-than-or-equal-to-threshold"
  params:
    mat:
      type: array
      items:
        type: array
        items:
          type: int
    threshold:
      type: int
  call:
    cpp: "Solution().maxSideLength({mat}, {threshold})"
    rust: "Solution::max_side_length({mat}, {threshold})"
    python3: "Solution().maxSideLength({mat}, {threshold})"
    python2: "Solution().maxSideLength({mat}, {threshold})"
    ruby: "max_side_length({mat}, {threshold})"
    java: "new Solution().maxSideLength({mat}, {threshold})"
    csharp: "new Solution().MaxSideLength({mat}, {threshold})"
    kotlin: "Solution().maxSideLength({mat}, {threshold})"
    go: "maxSideLength({mat}, {threshold})"
    dart: "Solution().maxSideLength({mat}, {threshold})"
    swift: "Solution().maxSideLength({mat}, {threshold})"
    typescript: "maxSideLength({mat}, {threshold})"
judge:
  type: "exact"
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().maxSideLength(mat, threshold, {result})"
    checker: |
      class Checker:
          def maxSideLength(self, mat, threshold, result):
              if type(result) is not int:
                  return False
              rows, cols = len(mat), len(mat[0])
              prefix = [[0] * (cols + 1) for _ in range(rows + 1)]
              best = 0
              for row in range(rows):
                  for col in range(cols):
                      prefix[row + 1][col + 1] = (
                          mat[row][col] + prefix[row][col + 1]
                          + prefix[row + 1][col] - prefix[row][col]
                      )
              for side in range(1, min(rows, cols) + 1):
                  for row in range(side, rows + 1):
                      for col in range(side, cols + 1):
                          total = (
                              prefix[row][col] - prefix[row - side][col]
                              - prefix[row][col - side] + prefix[row - side][col - side]
                          )
                          if total <= threshold:
                              best = side
                              break
                      if best == side:
                          break
              return result == best
