entry:
  id: 1281
  title: "subtract-the-product-and-sum-of-digits-of-an-integer"
  params:
    n:
      type: int
  call:
    cpp: "Solution().subtractProductAndSum({n})"
    rust: "Solution::subtract_product_and_sum({n})"
    python3: "Solution().subtractProductAndSum({n})"
    python2: "Solution().subtractProductAndSum({n})"
    ruby: "subtract_product_and_sum({n})"
    java: "new Solution().subtractProductAndSum({n})"
    csharp: "new Solution().SubtractProductAndSum({n})"
    kotlin: "Solution().subtractProductAndSum({n})"
    go: "subtractProductAndSum({n})"
    dart: "Solution().subtractProductAndSum({n})"
    swift: "Solution().subtractProductAndSum({n})"
    typescript: "subtractProductAndSum({n})"

judge:
  type: "exact"

limits:
  time_ms: 300
  memory_mb: 300

oracle:
  python3:
    call: "Checker().subtractProductAndSum(n, {result})"
    checker: |
      class Checker:
          def subtractProductAndSum(self, n, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              if not isinstance(n, int) or isinstance(n, bool) or not 1 <= n <= 100000:
                  return False
              product = 1
              digit_sum = 0
              remaining = n
              while remaining:
                  digit = remaining % 10
                  product *= digit
                  digit_sum += digit
                  remaining //= 10
              return result == product - digit_sum

seed: 128100

