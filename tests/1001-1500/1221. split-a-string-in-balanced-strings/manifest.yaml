entry:
  id: 1221
  title: split-a-string-in-balanced-strings
  params:
    s:
      type: string
  call:
    cpp: "Solution().balancedStringSplit({s})"
    rust: "Solution::balanced_string_split({s})"
    python3: "Solution().balancedStringSplit({s})"
    python2: "Solution().balancedStringSplit({s})"
    ruby: "balanced_string_split({s})"
    java: "new Solution().balancedStringSplit({s})"
    csharp: "new Solution().BalancedStringSplit({s})"
    kotlin: "Solution().balancedStringSplit({s})"
    go: "balancedStringSplit({s})"
    dart: "Solution().balancedStringSplit({s})"
    swift: "Solution().balancedStringSplit({s})"
    typescript: "balancedStringSplit({s})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().balancedStringSplit(s, {result})"
    checker: |
      class Checker:
          def balancedStringSplit(self, s, result):
              if type(result) is not int or len(s) < 2 or len(s) > 1000:
                  return False
              balance = count = 0
              for ch in s:
                  if ch == 'L':
                      balance += 1
                  elif ch == 'R':
                      balance -= 1
                  else:
                      return False
                  if balance == 0:
                      count += 1
              return balance == 0 and result == count
seed: 1221
