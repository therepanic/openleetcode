entry:
  id: 1295
  title: "find-numbers-with-even-number-of-digits"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().findNumbers({nums})"
    rust: "Solution::find_numbers({nums})"
    python3: "Solution().findNumbers({nums})"
    python2: "Solution().findNumbers({nums})"
    ruby: "find_numbers({nums})"
    java: "new Solution().findNumbers({nums})"
    csharp: "new Solution().FindNumbers({nums})"
    kotlin: "Solution().findNumbers({nums})"
    go: "findNumbers({nums})"
    dart: "Solution().findNumbers({nums})"
    swift: "Solution().findNumbers({nums})"
    typescript: "findNumbers({nums})"

judge:
  type: "exact"

limits:
  time_ms: 500
  memory_mb: 256

oracle:
  python3:
    call: "Checker().findNumbers(nums, {result})"
    checker: |
      class Checker:
          def findNumbers(self, nums, result):
              if not isinstance(nums, list) or not 1 <= len(nums) <= 500:
                  return False
              if any(not isinstance(value, int) or isinstance(value, bool) or not 1 <= value <= 100000 for value in nums):
                  return False
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              expected = sum(10 <= value <= 99 or 1000 <= value <= 9999 or value == 100000 for value in nums)
              return result == expected

seed: 1295

