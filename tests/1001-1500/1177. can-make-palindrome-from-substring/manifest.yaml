entry:
  id: 1177
  title: "can-make-palindrome-from-substring"
  params:
    s:
      type: string
    queries:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().canMakePaliQueries({s}, {queries})"
    rust: "Solution::can_make_pali_queries({s}, {queries})"
    python3: "Solution().canMakePaliQueries({s}, {queries})"
    python2: "Solution().canMakePaliQueries({s}, {queries})"
    ruby: "can_make_pali_queries({s}, {queries})"
    java: "new Solution().canMakePaliQueries({s}, {queries})"
    csharp: "new Solution().CanMakePaliQueries({s}, {queries})"
    kotlin: "Solution().canMakePaliQueries({s}, {queries})"
    go: "canMakePaliQueries({s}, {queries})"
    dart: "Solution().canMakePaliQueries({s}, {queries})"
    swift: "Solution().canMakePaliQueries({s}, {queries})"
    typescript: "canMakePaliQueries({s}, {queries})"

judge:
  type: "exact"

limits:
  time_ms: 700
  memory_mb: 300

oracle:
  python3:
    call: "Checker().canMakePaliQueries(s, queries, {result})"
    checker: |
      class Checker:
          def canMakePaliQueries(self, s, queries, result):
              if not isinstance(result, list) or len(result) != len(queries):
                  return False
              expected = []
              for query in queries:
                  if not isinstance(query, list) or len(query) != 3:
                      return False
                  left, right, k = query
                  if left < 0 or right >= len(s) or left > right or k < 0:
                      return False
                  counts = [0] * 26
                  for ch in s[left:right + 1]:
                      counts[ord(ch) - ord('a')] += 1
                  odd = sum(count % 2 for count in counts)
                  expected.append(odd // 2 <= k)
              return result == expected

seed: 117700

tests:
