entry:
  id: 1094
  title: car-pooling
  params:
    trips:
      type: array
      items:
        type: array
        items:
          type: int
    capacity:
      type: int
  call:
    cpp: "Solution().carPooling({trips}, {capacity})"
    rust: "Solution::car_pooling({trips}, {capacity})"
    python3: "Solution().carPooling({trips}, {capacity})"
    python2: "Solution().carPooling({trips}, {capacity})"
    ruby: "car_pooling({trips}, {capacity})"
    java: "new Solution().carPooling({trips}, {capacity})"
    csharp: "new Solution().CarPooling({trips}, {capacity})"
    kotlin: "Solution().carPooling({trips}, {capacity})"
    go: "carPooling({trips}, {capacity})"
    dart: "Solution().carPooling({trips}, {capacity})"
    swift: "Solution().carPooling({trips}, {capacity})"
    typescript: "Solution().carPooling({trips}, {capacity})"
judge:
  type: "exact"
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().carPooling(trips, capacity, {result})"
    checker: |
      class Checker:
          def carPooling(self, trips, capacity, result):
              if not isinstance(result, bool):
                  return False
              events = []
              for trip in trips:
                  if not (isinstance(trip, list) and len(trip) == 3):
                      return False
                  num, start, end = trip
                  events.append((start, num))
                  events.append((end, -num))
              events.sort(key=lambda x: (x[0], x[1]))
              cur = 0
              ok = True
              for _, delta in events:
                  cur += delta
                  if cur > capacity:
                      ok = False
                      break
              return result == ok
seed: 12345
