entry:
  id: 1054
  title: distant-barcodes
  params:
    barcodes:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().rearrangeBarcodes({barcodes})"
    rust: "Solution::rearrange_barcodes({barcodes})"
    python3: "Solution().rearrangeBarcodes({barcodes})"
    python2: "Solution().rearrangeBarcodes({barcodes})"
    ruby: "rearrange_barcodes({barcodes})"
    java: "new Solution().rearrangeBarcodes({barcodes})"
    csharp: "new Solution().RearrangeBarcodes({barcodes})"
    kotlin: "Solution().rearrangeBarcodes({barcodes})"
    go: "rearrangeBarcodes({barcodes})"
    dart: "Solution().rearrangeBarcodes({barcodes})"
    swift: "Solution().rearrangeBarcodes({barcodes})"
    typescript: "rearrangeBarcodes({barcodes})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().rearrangeBarcodes(barcodes, {result})"
    checker: |
      from collections import Counter

      class Checker:
          def rearrangeBarcodes(self, barcodes, result):
              if not isinstance(result, list):
                  return False
              if len(result) != len(barcodes):
                  return False
              if Counter(result) != Counter(barcodes):
                  return False
              for i in range(1, len(result)):
                  if result[i] == result[i - 1]:
                      return False
              return True
seed: 1054
