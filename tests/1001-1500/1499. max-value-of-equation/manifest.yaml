entry:
  id: 1499
  title: "max-value-of-equation"
  params:
    points:
      type: array
      items:
        type: array
        items:
          type: int
    k:
      type: int
  call:
    cpp: "Solution().findMaxValueOfEquation({points}, {k})"
    rust: "Solution::find_max_value_of_equation({points}, {k})"
    python3: "Solution().findMaxValueOfEquation({points}, {k})"
    python2: "Solution().findMaxValueOfEquation({points}, {k})"
    ruby: "find_max_value_of_equation({points}, {k})"
    java: "new Solution().findMaxValueOfEquation({points}, {k})"
    csharp: "new Solution().FindMaxValueOfEquation({points}, {k})"
    kotlin: "Solution().findMaxValueOfEquation({points}, {k})"
    go: "findMaxValueOfEquation({points}, {k})"
    dart: "Solution().findMaxValueOfEquation({points}, {k})"
    swift: "Solution().findMaxValueOfEquation({points}, {k})"
    typescript: "findMaxValueOfEquation({points}, {k})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 512

oracle:
  python3:
    call: "Checker().findMaxValueOfEquation(points, k, {result})"
    checker: |
      class Checker:
          def findMaxValueOfEquation(self, points, k, result):
              expected = None
              for i in range(len(points)):
                  for j in range(i + 1, len(points)):
                      if points[j][0] - points[i][0] <= k:
                          value = points[i][1] + points[j][1] + points[j][0] - points[i][0]
                          expected = value if expected is None else max(expected, value)
              return isinstance(result, int) and not isinstance(result, bool) and result == expected

seed: 1499

