entry:
  id: 1284
  title: "minimum-number-of-flips-to-convert-binary-matrix-to-zero-matrix"
  params:
    mat:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().minFlips({mat})"
    rust: "Solution::min_flips({mat})"
    python3: "Solution().minFlips({mat})"
    python2: "Solution().minFlips({mat})"
    ruby: "min_flips({mat})"
    java: "new Solution().minFlips({mat})"
    csharp: "new Solution().MinFlips({mat})"
    kotlin: "Solution().minFlips({mat})"
    go: "minFlips({mat})"
    dart: "Solution().minFlips({mat})"
    swift: "Solution().minFlips({mat})"
    typescript: "minFlips({mat})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().minFlips(mat, {result})"
    checker: |
      from collections import deque

      class Checker:
          def minFlips(self, mat, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              rows, cols = len(mat), len(mat[0])
              start = 0
              for row in range(rows):
                  for col in range(cols):
                      start |= mat[row][col] << (row * cols + col)
              moves = []
              for row in range(rows):
                  for col in range(cols):
                      mask = 0
                      for dr, dc in ((0, 0), (1, 0), (-1, 0), (0, 1), (0, -1)):
                          rr, cc = row + dr, col + dc
                          if 0 <= rr < rows and 0 <= cc < cols:
                              mask |= 1 << (rr * cols + cc)
                      moves.append(mask)
              queue = deque([(start, 0)])
              seen = {start}
              while queue:
                  state, steps = queue.popleft()
                  if state == 0:
                      return result == steps
                  for move in moves:
                      nxt = state ^ move
                      if nxt not in seen:
                          seen.add(nxt)
                          queue.append((nxt, steps + 1))
              return result == -1

