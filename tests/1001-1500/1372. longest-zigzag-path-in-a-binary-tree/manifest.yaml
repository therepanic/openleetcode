  id: 1372
  title: "longest-zigzag-path-in-a-binary-tree"
  params:
    root:
      type: tree_node
  call:
    cpp: "Solution().longestZigZag({root})"
    rust: "Solution::longest_zig_zag({root})"
    python3: "Solution().longestZigZag({root})"
    python2: "Solution().longestZigZag({root})"
    ruby: "longest_zig_zag({root})"
    java: "new Solution().longestZigZag({root})"
    csharp: "new Solution().LongestZigZag({root})"
    kotlin: "Solution().longestZigZag({root})"
    go: "longestZigZag({root})"
    dart: "Solution().longestZigZag({root})"
    swift: "Solution().longestZigZag({root})"
    typescript: "longestZigZag({root})"

judge:
  type: "exact"

limits:
  time_ms: 500
  memory_mb: 400

oracle:
  python3:
    call: "Checker().longestZigZag(root, {result})"
    checker: |
      class Checker:
          def longestZigZag(self, root, result):
              if not isinstance(result, int) or isinstance(result, bool) or result < 0:
                  return False
              if isinstance(root, list):
                  class Node:
                      def __init__(self):
                          self.left = None
                          self.right = None
                  if not root or root[0] is None:
                      return result == 0
                  root_node = Node()
                  queue = [root_node]
                  index = 1
                  for node in queue:
                      if index < len(root) and root[index] is not None:
                          node.left = Node()
                          queue.append(node.left)
                      index += 1
                      if index < len(root) and root[index] is not None:
                          node.right = Node()
                          queue.append(node.right)
                      index += 1
                  root = root_node
              if root is None:
                  return result == 0
              # For every node, compute the best path that starts with each direction.
              order = []
              stack = [root]
              while stack:
                  node = stack.pop()
                  order.append(node)
                  if node.left is not None:
                      stack.append(node.left)
                  if node.right is not None:
                      stack.append(node.right)
              starts_left = {}
              starts_right = {}
              answer = 0
              for node in reversed(order):
                  left = 1 + starts_right[node.left] if node.left is not None else 0
                  right = 1 + starts_left[node.right] if node.right is not None else 0
                  starts_left[node] = left
                  starts_right[node] = right
                  answer = max(answer, left, right)
              return result == answer

