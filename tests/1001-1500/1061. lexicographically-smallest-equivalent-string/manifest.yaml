entry:
  id: 1061
  title: lexicographically-smallest-equivalent-string
  params:
    s1:
      type: string
    s2:
      type: string
    baseStr:
      type: string
  call:
    cpp: Solution().smallestEquivalentString({s1}, {s2}, {baseStr})
    rust: Solution::smallest_equivalent_string({s1}, {s2}, {baseStr})
    python3: Solution().smallestEquivalentString({s1}, {s2}, {baseStr})
    python2: Solution().smallestEquivalentString({s1}, {s2}, {baseStr})
    ruby: smallest_equivalent_string({s1}, {s2}, {baseStr})
    java: new Solution().smallestEquivalentString({s1}, {s2}, {baseStr})
    csharp: new Solution().SmallestEquivalentString({s1}, {s2}, {baseStr})
    kotlin: Solution().smallestEquivalentString({s1}, {s2}, {baseStr})
    go: smallestEquivalentString({s1}, {s2}, {baseStr})
    dart: Solution().smallestEquivalentString({s1}, {s2}, {baseStr})
    swift: Solution().smallestEquivalentString({s1}, {s2}, {baseStr})
    typescript: smallestEquivalentString({s1}, {s2}, {baseStr})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().smallestEquivalentString(s1, s2, baseStr, {result})
    checker:
      "class Checker:\n    def smallestEquivalentString(self, s1, s2, baseStr,\
      \ result):\n        return isinstance(result, str) and len(result) == len(baseStr)\n"
seed: 1061
tests:
  - name: ex1
    in:
      s1: parker
      s2: morris
      baseStr: parser
    out: makkek
  - name: ex2
    in:
      s1: hello
      s2: world
      baseStr: hold
    out: hdld
  - name: ex3
    in:
      s1: leetcode
      s2: programs
      baseStr: sourcecode
