entry:
  id: 1410
  title: html-entity-parser
  params:
    text:
      type: string
  call:
    cpp: "Solution().entityParser({text})"
    rust: "Solution::entity_parser({text})"
    python3: "Solution().entityParser({text})"
    python2: "Solution().entityParser({text})"
    ruby: "entity_parser({text})"
    java: "new Solution().entityParser({text})"
    csharp: "new Solution().EntityParser({text})"
    kotlin: "Solution().entityParser({text})"
    go: "entityParser({text})"
    dart: "Solution().entityParser({text})"
    swift: "Solution().entityParser({text})"
    typescript: "entityParser({text})"

judge:
  type: exact

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().entityParser(text, {result})"
    checker: |
      class Checker:
          def entityParser(self, text, result):
              replacements = {
                  "&quot;": '"',
                  "&apos;": "'",
                  "&amp;": "&",
                  "&gt;": ">",
                  "&lt;": "<",
                  "&frasl;": "/",
              }
              expected = []
              i = 0
              while i < len(text):
                  if text[i] != "&":
                      expected.append(text[i])
                      i += 1
                      continue
                  end = i + 1
                  while end < len(text) and text[end] not in ";&" and not text[end].isspace():
                      end += 1
                  if end < len(text) and text[end] == ";":
                      token = text[i:end + 1]
                      expected.append(replacements.get(token, token))
                      i = end + 1
                  else:
                      expected.append("&")
                      i += 1
              return result == "".join(expected)

seed: 1410

