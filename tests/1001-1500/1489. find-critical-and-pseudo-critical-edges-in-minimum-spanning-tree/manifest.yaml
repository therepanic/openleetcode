entry:
  id: 1489
  title: "find-critical-and-pseudo-critical-edges-in-minimum-spanning-tree"
  params:
    n:
      type: int
    edges:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().findCriticalAndPseudoCriticalEdges({n}, {edges})"
    rust: "Solution::find_critical_and_pseudo_critical_edges({n}, {edges})"
    python3: "Solution().findCriticalAndPseudoCriticalEdges({n}, {edges})"
    python2: "Solution().findCriticalAndPseudoCriticalEdges({n}, {edges})"
    ruby: "find_critical_and_pseudo_critical_edges({n}, {edges})"
    java: "new Solution().findCriticalAndPseudoCriticalEdges({n}, {edges})"
    csharp: "new Solution().FindCriticalAndPseudoCriticalEdges({n}, {edges})"
    kotlin: "Solution().findCriticalAndPseudoCriticalEdges({n}, {edges})"
    go: "findCriticalAndPseudoCriticalEdges({n}, {edges})"
    dart: "Solution().findCriticalAndPseudoCriticalEdges({n}, {edges})"
    swift: "Solution().findCriticalAndPseudoCriticalEdges({n}, {edges})"
    typescript: "findCriticalAndPseudoCriticalEdges({n}, {edges})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 512

oracle:
  python3:
    call: "Checker().findCriticalAndPseudoCriticalEdges(n, edges, {result})"
    checker: |
      class Checker:
          def findCriticalAndPseudoCriticalEdges(self, n, edges, result):
              if not isinstance(result, list) or len(result) != 2:
                  return False
              def mst(block=-1, force=-1):
                  parent = list(range(n))
                  def find(x):
                      while parent[x] != x:
                          parent[x] = parent[parent[x]]
                          x = parent[x]
                      return x
                  def join(a, b):
                      a, b = find(a), find(b)
                      if a == b:
                          return False
                      parent[a] = b
                      return True
                  total = 0
                  used = 0
                  if force >= 0:
                      a, b, w = edges[force]
                      if join(a, b):
                          total += w
                          used += 1
                  for i, (a, b, w) in sorted(enumerate(edges), key=lambda item: item[1][2]):
                      if i == block or i == force:
                          continue
                      if join(a, b):
                          total += w
                          used += 1
                  return total if used == n - 1 else None
              base = mst()
              critical = []
              pseudo = []
              for i in range(len(edges)):
                  if mst(block=i) != base:
                      critical.append(i)
                  elif mst(force=i) == base:
                      pseudo.append(i)
              try:
                  return sorted(result[0]) == critical and sorted(result[1]) == pseudo
              except (TypeError, ValueError):
                  return False

seed: 1489

