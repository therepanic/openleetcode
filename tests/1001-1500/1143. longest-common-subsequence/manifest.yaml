entry:
  id: 1143
  title: longest-common-subsequence
  params:
    text1:
      type: string
    text2:
      type: string
  call:
    cpp: "Solution().longestCommonSubsequence({text1}, {text2})"
    rust: "Solution::longest_common_subsequence({text1}, {text2})"
    python3: "Solution().longestCommonSubsequence({text1}, {text2})"
    python2: "Solution().longestCommonSubsequence({text1}, {text2})"
    ruby: "longest_common_subsequence({text1}, {text2})"
    java: "new Solution().longestCommonSubsequence({text1}, {text2})"
    csharp: "new Solution().LongestCommonSubsequence({text1}, {text2})"
    kotlin: "Solution().longestCommonSubsequence({text1}, {text2})"
    go: "longestCommonSubsequence({text1}, {text2})"
    dart: "Solution().longestCommonSubsequence({text1}, {text2})"
    swift: "Solution().longestCommonSubsequence({text1}, {text2})"
    typescript: "longestCommonSubsequence({text1}, {text2})"
judge:
  type: exact
limits:
  time_ms: 1500
  memory_mb: 256
oracle:
  python3:
    call: "Checker().longestCommonSubsequence(text1, text2, {result})"
    checker: |
      class Checker:
          def longestCommonSubsequence(self, text1, text2, result):
              if not isinstance(text1, str) or not isinstance(text2, str):
                  return False
              if not 1 <= len(text1) <= 1000 or not 1 <= len(text2) <= 1000:
                  return False
              if any(c < 'a' or c > 'z' for c in text1 + text2):
                  return False
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              previous = [0] * (len(text2) + 1)
              for first in text1:
                  current = [0]
                  for index, second in enumerate(text2, 1):
                      if first == second:
                          current.append(previous[index - 1] + 1)
                      else:
                          current.append(max(previous[index], current[-1]))
                  previous = current
              return result == previous[-1]
seed: 1143
