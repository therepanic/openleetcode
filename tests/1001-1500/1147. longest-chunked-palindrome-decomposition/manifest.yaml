entry:
  id: 1147
  title: longest-chunked-palindrome-decomposition
  params:
    text:
      type: string
  call:
    cpp: "Solution().longestDecomposition({text})"
    rust: "Solution::longest_decomposition({text})"
    python3: "Solution().longestDecomposition({text})"
    python2: "Solution().longestDecomposition({text})"
    ruby: "longest_decomposition({text})"
    java: "new Solution().longestDecomposition({text})"
    csharp: "new Solution().LongestDecomposition({text})"
    kotlin: "Solution().longestDecomposition({text})"
    go: "longestDecomposition({text})"
    dart: "Solution().longestDecomposition({text})"
    swift: "Solution().longestDecomposition({text})"
    typescript: "longestDecomposition({text})"
judge:
  type: exact
limits:
  time_ms: 5000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().longestDecomposition(text, {result})"
    checker: |
      class Checker:
          def longestDecomposition(self, text, result):
              if type(result) is not int:
                  return False
              left, right, chunks = 0, len(text) - 1, 0
              while left <= right:
                  for size in range(1, (right - left + 1) // 2 + 1):
                      if text[left:left + size] == text[right - size + 1:right + 1]:
                          chunks += 2
                          left += size
                          right -= size
                          break
                  else:
                      return result == chunks + 1
              return result == chunks
seed: 1147
