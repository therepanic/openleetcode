  title: "count-number-of-teams"
  params:
    rating:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().numTeams({rating})"
    rust: "Solution::num_teams({rating})"
    python3: "Solution().numTeams({rating})"
    python2: "Solution().numTeams({rating})"
    ruby: "num_teams({rating})"
    java: "new Solution().numTeams({rating})"
    csharp: "new Solution().NumTeams({rating})"
    kotlin: "Solution().numTeams({rating})"
    go: "numTeams({rating})"
    dart: "Solution().numTeams({rating})"
    swift: "Solution().numTeams({rating})"
    typescript: "numTeams({rating})"
judge:
  type: "exact"
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().numTeams(rating, {result})"
    checker: |
      class Checker:
          def numTeams(self, rating, result):
              if type(result) is not int:
                  return False
              total = 0
              for j in range(1, len(rating) - 1):
                  left_less = sum(rating[i] < rating[j] for i in range(j))
                  left_greater = j - left_less
                  right_less = sum(rating[k] < rating[j] for k in range(j + 1, len(rating)))
                  right_greater = len(rating) - 1 - j - right_less
                  total += left_less * right_greater + left_greater * right_less
              return result == total
