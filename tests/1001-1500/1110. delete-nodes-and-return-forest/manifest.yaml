    python3: "Solution().delNodes({root}, {to_delete})"
    python2: "Solution().delNodes({root}, {to_delete})"
    ruby: "del_nodes({root}, {to_delete})"
    java: "new Solution().delNodes({root}, {to_delete})"
    csharp: "new Solution().DelNodes({root}, {to_delete})"
    kotlin: "Solution().delNodes({root}, {to_delete})"
    go: "delNodes({root}, {to_delete})"
    dart: "Solution().delNodes({root}, {to_delete})"
    swift: "Solution().delNodes({root}, {to_delete})"
