judge:
  type: exact
limits:
  time_ms: 500
  memory_mb: 256
oracle:
  python3:
    call: "Checker().delNodes(root, to_delete, {result})"
    checker: |
      from collections import deque

      class Checker:
          def delNodes(self, root, to_delete, result):
              def normalize(node):
                  if node is None:
                      return None
                  if isinstance(node, list):
                      if not node:
                          return None
                      nodes = [None if v is None else {"val": v, "left": None, "right": None} for v in node]
                      kids = deque(nodes[1:])
                      for item in nodes:
                          if item is not None:
                              if kids:
                                  item["left"] = kids.popleft()
                              if kids:
                                  item["right"] = kids.popleft()
                      return nodes[0]
                  if isinstance(node, dict):
                      return {
                          "val": node.get("val"),
                          "left": normalize(node.get("left")),
                          "right": normalize(node.get("right")),
                      }
                  if hasattr(node, "val"):
                      return {
                          "val": node.val,
                          "left": normalize(getattr(node, "left", None)),
                          "right": normalize(getattr(node, "right", None)),
                      }
                  return None

              def serialize(node):
                  node = normalize(node)
                  if node is None:
                      return None
                  out = []
                  q = deque([node])
                  while q:
                      cur = q.popleft()
                      if cur is None:
                          out.append(None)
                          continue
                      out.append(cur["val"])
                      q.append(cur["left"])
                      q.append(cur["right"])
                  while out and out[-1] is None:
                      out.pop()
                  return tuple(out)

              def build_tree(arr):
                  if not arr:
                      return None
                  nodes = [None if v is None else {"val": v, "left": None, "right": None} for v in arr]
                  kids = deque(nodes[1:])
                  for node in nodes:
                      if node is not None:
                          if kids:
                              node["left"] = kids.popleft()
                          if kids:
                              node["right"] = kids.popleft()
                  return nodes[0]

              def clone_and_delete(node, deletes):
                  ans = []
                  st = set(deletes)

                  def dfs(cur, is_root):
                      if cur is None:
                          return None
                      deleted = cur["val"] in st
                      if is_root and not deleted:
                          ans.append(cur)
                      cur["left"] = dfs(cur["left"], deleted)
                      cur["right"] = dfs(cur["right"], deleted)
                      return None if deleted else cur

                  dfs(node, True)
                  return ans

              if not isinstance(result, list):
                  return False
              tree = build_tree(root)
              expected = clone_and_delete(tree, to_delete)
              got = [serialize(item) for item in result]
              exp = [serialize(item) for item in expected]
              return sorted(got, key=str) == sorted(exp, key=str)
seed: 1110
