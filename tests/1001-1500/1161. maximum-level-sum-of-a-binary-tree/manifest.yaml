entry:
  id: 1161
  title: maximum-level-sum-of-a-binary-tree
  params:
    root:
      type: tree_node
  call:
    cpp: "Solution().maxLevelSum({root})"
    rust: "Solution::max_level_sum({root})"
    python3: "Solution().maxLevelSum({root})"
    python2: "Solution().maxLevelSum({root})"
    ruby: "max_level_sum({root})"
    java: "new Solution().maxLevelSum({root})"
    csharp: "new Solution().MaxLevelSum({root})"
    kotlin: "Solution().maxLevelSum({root})"
    go: "maxLevelSum({root})"
    dart: "Solution().maxLevelSum({root})"
    swift: "Solution().maxLevelSum({root})"
    typescript: "maxLevelSum({root})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().maxLevelSum(root, {result})"
    checker: |
      class Checker:
          def maxLevelSum(self, root, result):
              if isinstance(result, bool) or not isinstance(result, int):
                  return False
              if not isinstance(root, list) or not root or root[0] is None:
                  return False
              if any(isinstance(value, bool) or not isinstance(value, int)
                     for value in root if value is not None):
                  return False
              current = [root[0]]
              position = 1
              best_level = 1
              best_sum = root[0]
              level = 1
              while current:
                  level_sum = sum(current)
                  if level_sum > best_sum:
                      best_sum = level_sum
                      best_level = level
                  next_level = []
                  for _ in current:
                      for _ in range(2):
                          if position < len(root) and root[position] is not None:
                              next_level.append(root[position])
                          position += 1
                  current = next_level
                  level += 1
              return result == best_level
