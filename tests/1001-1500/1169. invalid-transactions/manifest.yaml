entry:
  id: 1169
  title: "invalid-transactions"
  params:
    transactions:
      type: array
      items:
        type: string
  call:
    cpp: "Solution().invalidTransactions({transactions})"
    rust: "Solution::invalid_transactions({transactions})"
    python3: "Solution().invalidTransactions({transactions})"
    python2: "Solution().invalidTransactions({transactions})"
    ruby: "invalid_transactions({transactions})"
    java: "new Solution().invalidTransactions({transactions})"
    csharp: "new Solution().InvalidTransactions({transactions})"
    kotlin: "Solution().invalidTransactions({transactions})"
    go: "invalidTransactions({transactions})"
    dart: "Solution().invalidTransactions({transactions})"
    swift: "Solution().invalidTransactions({transactions})"
    typescript: "invalidTransactions({transactions})"

judge:
  type: "ignore_order"

limits:
  time_ms: 700
  memory_mb: 300

oracle:
  python3:
    call: "Checker().invalidTransactions(transactions, {result})"
    checker: |
      from collections import Counter

      class Checker:
          def invalidTransactions(self, transactions, result):
              if not isinstance(result, list) or any(not isinstance(x, str) for x in result):
                  return False
              parsed = []
              for raw in transactions:
                  parts = raw.split(',')
                  if len(parts) != 4:
                      return False
                  name, time, amount, city = parts
                  parsed.append((name, int(time), int(amount), city, raw))
              expected = []
              for i, (name, time, amount, city, raw) in enumerate(parsed):
                  bad = amount > 1000
                  if not bad:
                      for j, (name2, time2, amount2, city2, raw2) in enumerate(parsed):
                          if i != j and name == name2 and city != city2 and abs(time - time2) <= 60:
                              bad = True
                              break
                  if bad:
                      expected.append(raw)
              return Counter(result) == Counter(expected)

seed: 116900

