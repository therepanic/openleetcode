entry:
  id: 1455
  title: "check-if-a-word-occurs-as-a-prefix-of-any-word-in-a-sentence"
  params:
    sentence:
      type: string
    searchWord:
      type: string
  call:
    cpp: "Solution().isPrefixOfWord({sentence}, {searchWord})"
    rust: "Solution::is_prefix_of_word({sentence}, {searchWord})"
    python3: "Solution().isPrefixOfWord({sentence}, {searchWord})"
    python2: "Solution().isPrefixOfWord({sentence}, {searchWord})"
    ruby: "is_prefix_of_word({sentence}, {searchWord})"
    java: "new Solution().isPrefixOfWord({sentence}, {searchWord})"
    csharp: "new Solution().IsPrefixOfWord({sentence}, {searchWord})"
    kotlin: "Solution().isPrefixOfWord({sentence}, {searchWord})"
    go: "isPrefixOfWord({sentence}, {searchWord})"
    dart: "Solution().isPrefixOfWord({sentence}, {searchWord})"
    swift: "Solution().isPrefixOfWord({sentence}, {searchWord})"
    typescript: "isPrefixOfWord({sentence}, {searchWord})"
judge:
  type: exact
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().isPrefixOfWord(sentence, searchWord, {result})"
    checker: |
      class Checker:
          def isPrefixOfWord(self, sentence, searchWord, result):
              for index, word in enumerate(sentence.split(' '), 1):
                  if word.startswith(searchWord):
                      return result == index
              return result == -1
seed: 1455
