entry:
  id: 1093
  title: statistics-from-a-large-sample
  params:
    count:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().sampleStats({count})"
    rust: "Solution::sample_stats({count})"
    python3: "Solution().sampleStats({count})"
    python2: "Solution().sampleStats({count})"
    ruby: "sample_stats({count})"
    java: "new Solution().sampleStats({count})"
    csharp: "new Solution().SampleStats({count})"
    kotlin: "Solution().sampleStats({count})"
    go: "sampleStats({count})"
    dart: "Solution().sampleStats({count})"
    swift: "Solution().sampleStats({count})"
    typescript: "Solution().sampleStats({count})"
judge:
  type: "exact"
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().sampleStats(count, {result})"
    checker: |
      class Checker:
          def sampleStats(self, count, result):
              if not isinstance(result, list) or len(result) != 5:
                  return False
              total = sum(count)
              vals = []
              min_v = None
              max_v = None
              mode = 0
              mode_cnt = -1
              s = 0
              for i, c in enumerate(count):
                  if c:
                      if min_v is None:
                          min_v = i
                      max_v = i
                      s += i * c
                      if c > mode_cnt:
                          mode_cnt = c
                          mode = i
              if min_v is None:
                  return False
              def kth(k):
                  acc = 0
                  for i, c in enumerate(count):
                      acc += c
                      if acc >= k:
                          return i
              if total % 2:
                  median = float(kth(total // 2 + 1))
              else:
                  median = (kth(total // 2) + kth(total // 2 + 1)) / 2.0
              expected = [float(min_v), float(max_v), s / total, float(median), float(mode)]
              return all(abs(a - b) <= 1e-5 for a, b in zip(expected, result))
