entry:
  id: 1207
  title: "unique-number-of-occurrences"
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().uniqueOccurrences({arr})"
    rust: "Solution::unique_occurrences({arr})"
    python3: "Solution().uniqueOccurrences({arr})"
    python2: "Solution().uniqueOccurrences({arr})"
    ruby: "unique_occurrences({arr})"
    java: "new Solution().uniqueOccurrences({arr})"
    csharp: "new Solution().UniqueOccurrences({arr})"
    kotlin: "Solution().uniqueOccurrences({arr})"
    go: "uniqueOccurrences({arr})"
    dart: "Solution().uniqueOccurrences({arr})"
    swift: "Solution().uniqueOccurrences({arr})"
    typescript: "uniqueOccurrences({arr})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().uniqueOccurrences(arr, {result})"
    checker: |
      class Checker:
          def uniqueOccurrences(self, arr, result):
              if not isinstance(result, bool):
                  return False
              counts = {}
              for value in arr:
                  counts[value] = counts.get(value, 0) + 1
              frequencies = set()
              for count in counts.values():
                  if count in frequencies:
                      return result is False
                  frequencies.add(count)
              return result is True

seed: 1207

