entry:
  id: 1223
  title: "dice-roll-simulation"
  params:
    n:
      type: int
    rollMax:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().dieSimulator({n}, {rollMax})"
    rust: "Solution::die_simulator({n}, {rollMax})"
    python3: "Solution().dieSimulator({n}, {rollMax})"
    python2: "Solution().dieSimulator({n}, {rollMax})"
    ruby: "die_simulator({n}, {rollMax})"
    java: "new Solution().dieSimulator({n}, {rollMax})"
    csharp: "new Solution().DieSimulator({n}, {rollMax})"
    kotlin: "Solution().dieSimulator({n}, {rollMax})"
    go: "dieSimulator({n}, {rollMax})"
    dart: "Solution().dieSimulator({n}, {rollMax})"
    swift: "Solution().dieSimulator({n}, {rollMax})"
    typescript: "dieSimulator({n}, {rollMax})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 512

oracle:
  python3:
    call: "Checker().dieSimulator(n, rollMax, {result})"
    checker: |
      class Checker:
          def dieSimulator(self, n, rollMax, result):
              if not isinstance(n, int) or isinstance(n, bool) or n < 1 or n > 5000:
                  return False
              if not isinstance(rollMax, list) or len(rollMax) != 6:
                  return False
              if any(not isinstance(x, int) or isinstance(x, bool) or x < 1 or x > 15 for x in rollMax):
                  return False
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              mod = 1000000007
              last = [[0] * (limit + 1) for limit in rollMax]
              for face, limit in enumerate(rollMax):
                  last[face][1] = 1
              for _ in range(1, n):
                  total = sum(sum(row) for row in last) % mod
                  nxt = [[0] * (limit + 1) for limit in rollMax]
                  for face, limit in enumerate(rollMax):
                      other = (total - sum(last[face])) % mod
                      nxt[face][1] = other
                      for run in range(2, limit + 1):
                          nxt[face][run] = last[face][run - 1]
                  last = nxt
              expected = sum(sum(row) for row in last) % mod
              return result == expected

