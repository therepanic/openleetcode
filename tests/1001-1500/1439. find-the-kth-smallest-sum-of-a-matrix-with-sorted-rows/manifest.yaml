entry:
  id: 1439
  title: "find-the-kth-smallest-sum-of-a-matrix-with-sorted-rows"
  params:
    mat:
      type: array
      items:
        type: array
        items:
          type: int
    k:
      type: int
  call:
    cpp: "Solution().kthSmallest({mat}, {k})"
    rust: "Solution::kth_smallest({mat}, {k})"
    python3: "Solution().kthSmallest({mat}, {k})"
    python2: "Solution().kthSmallest({mat}, {k})"
    ruby: "kth_smallest({mat}, {k})"
    java: "new Solution().kthSmallest({mat}, {k})"
    csharp: "new Solution().KthSmallest({mat}, {k})"
    kotlin: "Solution().kthSmallest({mat}, {k})"
    go: "kthSmallest({mat}, {k})"
    dart: "Solution().kthSmallest({mat}, {k})"
    swift: "Solution().kthSmallest({mat}, {k})"
    typescript: "kthSmallest({mat}, {k})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 512

oracle:
  python3:
    call: "Checker().kthSmallest(mat, k, {result})"
    checker: |
      class Checker:
          def kthSmallest(self, mat, k, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              sums = [0]
              for row in mat:
                  sums = sorted(a + b for a in sums for b in row)[:k]
              return 1 <= k <= len(sums) and result == sums[k - 1]

seed: 1439

