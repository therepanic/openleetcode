entry:
  id: 1137
  title: n-th-tribonacci-number
  params:
    n:
      type: int
  call:
    cpp: "Solution().tribonacci({n})"
    rust: "Solution::tribonacci({n})"
    python3: "Solution().tribonacci({n})"
    python2: "Solution().tribonacci({n})"
    ruby: "tribonacci({n})"
    java: "new Solution().tribonacci({n})"
    csharp: "new Solution().Tribonacci({n})"
    kotlin: "Solution().tribonacci({n})"
    go: "tribonacci({n})"
    dart: "Solution().tribonacci({n})"
    swift: "Solution().tribonacci({n})"
    typescript: "tribonacci({n})"
judge:
  type: exact
limits:
  time_ms: 500
  memory_mb: 256
oracle:
  python3:
    call: "Checker().tribonacci(n, {result})"
    checker: |
      class Checker:
          def tribonacci(self, n, result):
              if not isinstance(n, int) or isinstance(n, bool) or n < 0 or n > 37:
                  return False
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              first, second, third = 0, 1, 1
              for _ in range(n):
                  first, second, third = second, third, first + second + third
              return result == first
seed: 1137
