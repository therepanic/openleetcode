entry:
  id: 1347
  title: "minimum-number-of-steps-to-make-two-strings-anagram"
  params:
    s:
      type: string
    t:
      type: string
  call:
    cpp: "Solution().minSteps({s}, {t})"
    rust: "Solution::min_steps({s}, {t})"
    python3: "Solution().minSteps({s}, {t})"
    python2: "Solution().minSteps({s}, {t})"
    ruby: "min_steps({s}, {t})"
    java: "new Solution().minSteps({s}, {t})"
    csharp: "new Solution().MinSteps({s}, {t})"
    kotlin: "Solution().minSteps({s}, {t})"
    go: "minSteps({s}, {t})"
    dart: "Solution().minSteps({s}, {t})"
    swift: "Solution().minSteps({s}, {t})"
    typescript: "minSteps({s}, {t})"
judge:
  type: exact
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().minSteps(s, t, {result})"
    checker: |
      from collections import Counter

      class Checker:
          def minSteps(self, s, t, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              return result == sum((Counter(t) - Counter(s)).values())
