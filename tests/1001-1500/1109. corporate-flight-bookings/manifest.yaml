judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 256
oracle:
  python3:
    call: Checker().corpFlightBookings(bookings, n, {result})
    checker:
      "class Checker:\n    def corpFlightBookings(self, bookings, n, result):\n\
      \        if not isinstance(result, list) or len(result) != n:\n            return\
      \ False\n        expected = [0] * n\n        for first, last, seats in bookings:\n\
      \            if not (1 <= first <= last <= n):\n                return False\n\
      \            for i in range(first - 1, last):\n                expected[i] +=\
      \ seats\n        return result == expected\n"
seed: 1109
