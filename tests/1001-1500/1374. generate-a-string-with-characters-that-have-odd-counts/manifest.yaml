entry:
  id: 1374
  title: "generate-a-string-with-characters-that-have-odd-counts"
  params:
    n:
      type: int
  call:
    cpp: "Solution().generateTheString({n})"
    rust: "Solution::generate_the_string({n})"
    python3: "Solution().generateTheString({n})"
    python2: "Solution().generateTheString({n})"
    ruby: "generate_the_string({n})"
    java: "new Solution().generateTheString({n})"
    csharp: "new Solution().GenerateTheString({n})"
    kotlin: "Solution().generateTheString({n})"
    go: "generateTheString({n})"
    dart: "Solution().generateTheString({n})"
    swift: "Solution().generateTheString({n})"
    typescript: "generateTheString({n})"

judge:
  type: "exact"

limits:
  time_ms: 300
  memory_mb: 300

oracle:
  python3:
    call: "Checker().generateTheString(n, {result})"
    checker: |
      from collections import Counter

      class Checker:
          def generateTheString(self, n, result):
              if not isinstance(result, str) or len(result) != n:
                  return False
              if any(not ("a" <= char <= "z") for char in result):
                  return False
              return all(count % 2 == 1 for count in Counter(result).values())

