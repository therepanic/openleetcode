entry:
  id: 1391
  title: "check-if-there-is-a-valid-path-in-a-grid"
  params:
    grid:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().hasValidPath({grid})"
    rust: "Solution::has_valid_path({grid})"
    python3: "Solution().hasValidPath({grid})"
    python2: "Solution().hasValidPath({grid})"
    ruby: "has_valid_path({grid})"
    java: "new Solution().hasValidPath({grid})"
    csharp: "new Solution().HasValidPath({grid})"
    kotlin: "Solution().hasValidPath({grid})"
    go: "hasValidPath({grid})"
    dart: "Solution().hasValidPath({grid})"
    swift: "Solution().hasValidPath({grid})"
    typescript: "hasValidPath({grid})"

judge:
  type: "exact"

limits:
  time_ms: 500
  memory_mb: 400

oracle:
  python3:
    call: "Checker().hasValidPath(grid, {result})"
    checker: |
      class Checker:
          def hasValidPath(self, grid, result):
              if not isinstance(result, bool):
                  return False
              dirs = {
                  1: ((0, -1), (0, 1)),
                  2: ((-1, 0), (1, 0)),
                  3: ((0, -1), (1, 0)),
                  4: ((0, 1), (1, 0)),
                  5: ((0, -1), (-1, 0)),
                  6: ((0, 1), (-1, 0)),
              }
              m, n = len(grid), len(grid[0])
              seen = {(0, 0)}
              queue = [(0, 0)]
              for r, c in queue:
                  for dr, dc in dirs[grid[r][c]]:
                      nr, nc = r + dr, c + dc
                      if not (0 <= nr < m and 0 <= nc < n) or (nr, nc) in seen:
                          continue
                      if any(nr + bdr == r and nc + bdc == c for bdr, bdc in dirs[grid[nr][nc]]):
                          seen.add((nr, nc))
                          queue.append((nr, nc))
              return result == ((m - 1, n - 1) in seen)

