        type: int
    d:
      type: int
  call:
    cpp: "Solution().maxJumps({arr}, {d})"
    rust: "Solution::max_jumps({arr}, {d})"
    python3: "Solution().maxJumps({arr}, {d})"
    python2: "Solution().maxJumps({arr}, {d})"
    ruby: "max_jumps({arr}, {d})"
    java: "new Solution().maxJumps({arr}, {d})"
    csharp: "new Solution().MaxJumps({arr}, {d})"
    kotlin: "Solution().maxJumps({arr}, {d})"
    go: "maxJumps({arr}, {d})"
    dart: "Solution().maxJumps({arr}, {d})"
    swift: "Solution().maxJumps({arr}, {d})"
    typescript: "maxJumps({arr}, {d})"
judge:
  type: "exact"
limits:
  time_ms: 700
  memory_mb: 300
oracle:
  python3:
    call: "Checker().maxJumps(arr, d, {result})"
    checker: |
      class Checker:
          def maxJumps(self, arr, d, result):
              if type(result) is not int:
                  return False
              n = len(arr)
              dp = [1] * n
              for i in sorted(range(n), key=lambda index: arr[index]):
                  for j in range(i - 1, max(-1, i - d - 1), -1):
                      if arr[j] >= arr[i]:
                          break
                      dp[i] = max(dp[i], dp[j] + 1)
                  for j in range(i + 1, min(n, i + d + 1)):
                      if arr[j] >= arr[i]:
                          break
                      dp[i] = max(dp[i], dp[j] + 1)
              return result == max(dp)
seed: 1340
