entry:
  id: 1452
  title: people-whose-list-of-favorite-companies-is-not-a-subset-of-another-list
  params:
    favoriteCompanies:
      type: array
      items:
        type: array
        items:
          type: string
  call:
    cpp: "Solution().peopleIndexes({favoriteCompanies})"
    rust: "Solution::people_indexes({favoriteCompanies})"
    python3: "Solution().peopleIndexes({favoriteCompanies})"
    python2: "Solution().peopleIndexes({favoriteCompanies})"
    ruby: "people_indexes({favoriteCompanies})"
    java: "new Solution().peopleIndexes({favoriteCompanies})"
    csharp: "new Solution().PeopleIndexes({favoriteCompanies})"
    kotlin: "Solution().peopleIndexes({favoriteCompanies})"
    go: "peopleIndexes({favoriteCompanies})"
    dart: "Solution().peopleIndexes({favoriteCompanies})"
    swift: "Solution().peopleIndexes({favoriteCompanies})"
    typescript: "peopleIndexes({favoriteCompanies})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().peopleIndexes(favoriteCompanies, {result})"
    checker: |
      class Checker:
          def peopleIndexes(self, companies, result):
              if not isinstance(result, list):
                  return False
              sets = [set(x) for x in companies]
              expected = [i for i, current in enumerate(sets)
                          if not any(i != j and current.issubset(other)
                                     for j, other in enumerate(sets))]
              return result == expected
seed: 1452
tests:
