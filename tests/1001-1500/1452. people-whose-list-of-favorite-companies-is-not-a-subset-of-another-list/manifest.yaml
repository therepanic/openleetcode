    in:
      favoriteCompanies:
        elemType: "string"
        value:
          - ["leetcode", "google", "facebook"]
          - ["google", "microsoft"]
          - ["google", "facebook"]
          - ["google"]
          - ["amazon"]
    out: [0, 1, 4]
