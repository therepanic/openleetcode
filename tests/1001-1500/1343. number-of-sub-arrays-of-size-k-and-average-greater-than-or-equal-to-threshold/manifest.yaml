entry:
  id: 1343
  title: "number-of-sub-arrays-of-size-k-and-average-greater-than-or-equal-to-threshold"
  params:
    arr:
      type: array
      items:
        type: int
    k:
      type: int
    threshold:
      type: int
  call:
    cpp: "Solution().numOfSubarrays({arr}, {k}, {threshold})"
    rust: "Solution::num_of_subarrays({arr}, {k}, {threshold})"
    python3: "Solution().numOfSubarrays({arr}, {k}, {threshold})"
    python2: "Solution().numOfSubarrays({arr}, {k}, {threshold})"
    ruby: "num_of_subarrays({arr}, {k}, {threshold})"
    java: "new Solution().numOfSubarrays({arr}, {k}, {threshold})"
    csharp: "new Solution().NumOfSubarrays({arr}, {k}, {threshold})"
    kotlin: "Solution().numOfSubarrays({arr}, {k}, {threshold})"
    go: "numOfSubarrays({arr}, {k}, {threshold})"
    dart: "Solution().numOfSubarrays({arr}, {k}, {threshold})"
    swift: "Solution().numOfSubarrays({arr}, {k}, {threshold})"
    typescript: "numOfSubarrays({arr}, {k}, {threshold})"
judge:
  type: "exact"
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().numOfSubarrays(arr, k, threshold, {result})"
    checker: |
      class Checker:
          def numOfSubarrays(self, arr, k, threshold, result):
              if type(result) is not int:
                  return False
              target = k * threshold
              window_sum = sum(arr[:k])
              expected = 1 if window_sum >= target else 0
              for right in range(k, len(arr)):
                  window_sum += arr[right] - arr[right - k]
                  if window_sum >= target:
                      expected += 1
              return result == expected
seed: 1343
