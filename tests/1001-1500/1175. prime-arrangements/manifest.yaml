judge:
  type: "exact"
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().numPrimeArrangements(n, {result})"
    checker: |
      class Checker:
          def numPrimeArrangements(self, n, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              is_prime = [False, False] + [True] * (n - 1)
              for divisor in range(2, int(n ** 0.5) + 1):
                  if is_prime[divisor]:
                      for multiple in range(divisor * divisor, n + 1, divisor):
                          is_prime[multiple] = False
              prime_count = sum(is_prime)
              expected = 1
              for factor in range(2, prime_count + 1):
                  expected = expected * factor % 1000000007
              for factor in range(2, n - prime_count + 1):
                  expected = expected * factor % 1000000007
              return result == expected
seed: 1175
