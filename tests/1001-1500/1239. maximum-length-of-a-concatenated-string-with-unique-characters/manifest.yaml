entry:
  id: 1239
  title: "maximum-length-of-a-concatenated-string-with-unique-characters"
  params:
    arr:
      type: array
      items:
        type: string
  call:
    cpp: "Solution().maxLength({arr})"
    rust: "Solution::max_length({arr})"
    python3: "Solution().maxLength({arr})"
    python2: "Solution().maxLength({arr})"
    ruby: "max_length({arr})"
    java: "new Solution().maxLength({arr})"
    csharp: "new Solution().MaxLength({arr})"
    kotlin: "Solution().maxLength({arr})"
    go: "maxLength({arr})"
    dart: "Solution().maxLength({arr})"
    swift: "Solution().maxLength({arr})"
    typescript: "maxLength({arr})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().maxLength(arr, {result})"
    checker: |
      class Checker:
          def maxLength(self, arr, result):
              masks = []
              for word in arr:
                  mask = 0
                  for ch in word:
                      bit = 1 << (ord(ch) - 97)
                      if mask & bit:
                          break
                      mask |= bit
                  else:
                      masks.append(mask)
              best = 0
              def dfs(i, used, length):
                  nonlocal best
                  best = max(best, length)
                  for j in range(i, len(masks)):
                      if not used & masks[j]:
                          dfs(j + 1, used | masks[j], length + masks[j].bit_count())
              dfs(0, 0, 0)
              return result == best

