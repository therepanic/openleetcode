entry:
  id: 1433
  title: check-if-a-string-can-break-another-string
  params:
    s1:
      type: string
    s2:
      type: string
  call:
    cpp: "Solution().checkIfCanBreak({s1}, {s2})"
    rust: "Solution::check_if_can_break({s1}, {s2})"
    python3: "Solution().checkIfCanBreak({s1}, {s2})"
    python2: "Solution().checkIfCanBreak({s1}, {s2})"
    ruby: "check_if_can_break({s1}, {s2})"
    java: "new Solution().checkIfCanBreak({s1}, {s2})"
    csharp: "new Solution().CheckIfCanBreak({s1}, {s2})"
    kotlin: "Solution().checkIfCanBreak({s1}, {s2})"
    go: "checkIfCanBreak({s1}, {s2})"
    dart: "Solution().checkIfCanBreak({s1}, {s2})"
    swift: "Solution().checkIfCanBreak({s1}, {s2})"
    typescript: "checkIfCanBreak({s1}, {s2})"
judge:
  type: exact
limits:
  time_ms: 500
  memory_mb: 256
oracle:
  python3:
    call: "Checker().checkIfCanBreak(s1, s2, {result})"
    checker: |
      class Checker:
          def checkIfCanBreak(self, s1, s2, result):
              if not isinstance(s1, str) or not isinstance(s2, str):
                  return False
              if len(s1) != len(s2) or not 1 <= len(s1) <= 100000:
                  return False
              if any(ch < 'a' or ch > 'z' for ch in s1 + s2):
                  return False
              if not isinstance(result, bool):
                  return False

              def can_break(first, second):
                  left = [0] * 26
                  right = [0] * 26
                  for ch in first:
                      left[ord(ch) - 97] += 1
                  for ch in second:
                      right[ord(ch) - 97] += 1
                  i = 0
                  j = 0
                  for _ in range(len(first)):
                      while left[i] == 0:
                          i += 1
                      while right[j] == 0:
                          j += 1
                      if i < j:
                          return False
                      left[i] -= 1
                      right[j] -= 1
                  return True

              expected = can_break(s1, s2) or can_break(s2, s1)
              return result == expected
