judge:
  type: "exact"

limits:
  time_ms: 500
  memory_mb: 256

oracle:
  python3:
    call: "Checker().findMinFibonacciNumbers(k, {result})"
    checker: |
      class Checker:
          def findMinFibonacciNumbers(self, k, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              fib = [1, 2]
              while fib[-1] < k:
                  fib.append(fib[-1] + fib[-2])
              remaining = k
              expected = 0
              for value in reversed(fib):
                  if value <= remaining:
                      remaining -= value
                      expected += 1
              return remaining == 0 and result == expected

