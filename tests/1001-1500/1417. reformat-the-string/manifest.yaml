entry:
  id: 1417
  title: "reformat-the-string"
  params:
    s:
      type: string
  call:
    cpp: "Solution().reformat({s})"
    rust: "Solution::reformat({s})"
    python3: "Solution().reformat({s})"
    python2: "Solution().reformat({s})"
    ruby: "reformat({s})"
    java: "new Solution().reformat({s})"
    csharp: "new Solution().Reformat({s})"
    kotlin: "Solution().reformat({s})"
    go: "reformat({s})"
    dart: "Solution().reformat({s})"
    swift: "Solution().reformat({s})"
    typescript: "reformat({s})"
judge:
  type: "exact"
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().reformat(s, {result})"
    checker: |
      from collections import Counter
      class Checker:
          def reformat(self, s, result):
              if not isinstance(result, str): return False
              d = [c for c in s if c.isdigit()]
              a = [c for c in s if c.isalpha()]
              if abs(len(d)-len(a)) >= 2: return result == ''
              if len(result) != len(s): return False
              if Counter(result) != Counter(s): return False
              return all(result[i].isdigit() != result[i+1].isdigit() for i in range(len(result)-1))
