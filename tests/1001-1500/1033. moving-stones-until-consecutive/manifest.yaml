entry:
  id: 1033
  title: moving-stones-until-consecutive
  params:
    a:
      type: int
    b:
      type: int
    c:
      type: int
  call:
    cpp: "Solution().numMovesStones({a}, {b}, {c})"
    rust: "Solution::num_moves_stones({a}, {b}, {c})"
    python3: "Solution().numMovesStones({a}, {b}, {c})"
    python2: "Solution().numMovesStones({a}, {b}, {c})"
    ruby: "num_moves_stones({a}, {b}, {c})"
    java: "new Solution().numMovesStones({a}, {b}, {c})"
    csharp: "new Solution().NumMovesStones({a}, {b}, {c})"
    kotlin: "Solution().numMovesStones({a}, {b}, {c})"
    go: "numMovesStones({a}, {b}, {c})"
    dart: "Solution().numMovesStones({a}, {b}, {c})"
    swift: "Solution().numMovesStones({a}, {b}, {c})"
    typescript: "numMovesStones({a}, {b}, {c})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(a, b, c, {result})"
    checker: |
      class Checker:
          def check(self, a, b, c, result):
              if not isinstance(result, list) or len(result) != 2:
                  return False
              x, y, z = sorted([a, b, c])
              exp = [0 if z - x == 2 else (1 if y - x <= 2 or z - y <= 2 else 2), z - x - 2]
              return result == exp
seed: 1033
