      type: tree_node
  call:
    cpp: "Solution().sumEvenGrandparent({root})"
    rust: "Solution::sum_even_grandparent({root})"
    python3: "Solution().sumEvenGrandparent({root})"
    python2: "Solution().sumEvenGrandparent({root})"
    ruby: "sum_even_grandparent({root})"
    java: "new Solution().sumEvenGrandparent({root})"
    csharp: "new Solution().SumEvenGrandparent({root})"
    kotlin: "Solution().sumEvenGrandparent({root})"
    go: "sumEvenGrandparent({root})"
    dart: "Solution().sumEvenGrandparent({root})"
    swift: "Solution().sumEvenGrandparent({root})"
