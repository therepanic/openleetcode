judge:
  type: exact
limits:
  time_ms: 400
  memory_mb: 300
oracle:
  python3:
    call: "Checker().sumEvenGrandparent(root, {result})"
    checker: |
      from collections import deque

      class Checker:
          def sumEvenGrandparent(self, root, result):
              if isinstance(result, bool) or not isinstance(result, int):
                  return False
              if isinstance(root, list):
                  if not root:
                      return result == 0
                  queue = deque([(root[0], None, None)])
                  index = 1
                  total = 0
                  while queue:
                      value, parent, grandparent = queue.popleft()
                      if grandparent is not None and grandparent % 2 == 0:
                          total += value
                      for _ in range(2):
                          if index >= len(root):
                              break
                          child = root[index]
                          index += 1
                          if child is not None:
                              queue.append((child, value, parent))
                  return result == total
              queue = deque([(root, None, None)])
              total = 0
              while queue:
                  node, parent, grandparent = queue.popleft()
                  if node is None:
                      continue
                  if grandparent is not None and grandparent % 2 == 0:
                      total += node.val
                  queue.append((node.left, node.val, parent))
                  queue.append((node.right, node.val, parent))
              return result == total
