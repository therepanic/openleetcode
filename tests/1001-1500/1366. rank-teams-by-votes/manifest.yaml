entry:
  id: 1366
  title: "rank-teams-by-votes"
  params:
    votes:
      type: array
      items:
        type: string
  call:
    cpp: "Solution().rankTeams({votes})"
    rust: "Solution::rank_teams({votes})"
    python3: "Solution().rankTeams({votes})"
    python2: "Solution().rankTeams({votes})"
    ruby: "rank_teams({votes})"
    java: "new Solution().rankTeams({votes})"
    csharp: "new Solution().RankTeams({votes})"
    kotlin: "Solution().rankTeams({votes})"
    go: "rankTeams({votes})"
    dart: "Solution().rankTeams({votes})"
    swift: "Solution().rankTeams({votes})"
    typescript: "rankTeams({votes})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().rankTeams(votes, {result})"
    checker: |
      class Checker:
          def rankTeams(self, votes, result):
              if not isinstance(result, str):
                  return False
              teams = list(votes[0])
              if len(result) != len(teams) or set(result) != set(teams):
                  return False
              counts = {team: [0] * len(teams) for team in teams}
              for vote in votes:
                  for place, team in enumerate(vote):
                      counts[team][place] += 1
              expected = ''.join(sorted(
                  teams,
                  key=lambda team: tuple([-count for count in counts[team]]) + (team,),
              ))
              return result == expected

