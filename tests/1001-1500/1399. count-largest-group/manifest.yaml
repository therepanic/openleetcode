judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().countLargestGroup(n, {result})"
    checker: |
      class Checker:
          def countLargestGroup(self, n, result):
              groups = {}
              for value in range(1, n + 1):
                  digit_sum = sum(int(digit) for digit in str(value))
                  groups[digit_sum] = groups.get(digit_sum, 0) + 1
              largest = max(groups.values())
              return result == sum(size == largest for size in groups.values())

