entry:
  id: 1037
  title: valid-boomerang
  params:
    points:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().isBoomerang({points})
    rust: Solution::is_boomerang({points})
    python3: Solution().isBoomerang({points})
    python2: Solution().isBoomerang({points})
    ruby: is_boomerang({points})
    java: new Solution().isBoomerang({points})
    csharp: new Solution().IsBoomerang({points})
    kotlin: Solution().isBoomerang({points})
    go: isBoomerang({points})
    dart: Solution().isBoomerang({points})
    swift: Solution().isBoomerang({points})
    typescript: isBoomerang({points})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().isBoomerang(points, {result})
    checker:
      "class Checker:\n    def isBoomerang(self, points, result):\n       \
      \ p1, p2, p3 = points\n        distinct = len({tuple(p1), tuple(p2), tuple(p3)})\
      \ == 3\n        area = (p2[0] - p1[0]) * (p3[1] - p1[1]) - (p2[1] - p1[1]) *\
      \ (p3[0] - p1[0])\n        expected = distinct and area != 0\n        return\
      \ expected == result\n"
seed: 1037
