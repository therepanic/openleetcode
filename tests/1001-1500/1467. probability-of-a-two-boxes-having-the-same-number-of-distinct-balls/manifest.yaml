entry:
  id: 1467
  title: "probability-of-a-two-boxes-having-the-same-number-of-distinct-balls"
  params:
    balls:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().getProbability({balls})"
    rust: "Solution::get_probability({balls})"
    python3: "Solution().getProbability({balls})"
    python2: "Solution().getProbability({balls})"
    ruby: "get_probability({balls})"
    java: "new Solution().getProbability({balls})"
    csharp: "new Solution().GetProbability({balls})"
    kotlin: "Solution().getProbability({balls})"
    go: "getProbability({balls})"
    dart: "Solution().getProbability({balls})"
    swift: "Solution().getProbability({balls})"
    typescript: "getProbability({balls})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 300
oracle:
  python3:
    call: "Checker().getProbability(balls, {result})"
    checker: |
      from itertools import product
      from math import comb, isfinite
      class Checker:
          def getProbability(self, balls, result):
              if isinstance(result, bool) or not isinstance(result, (int, float)) or not isfinite(result):
                  return False
              half = sum(balls) // 2
              total = comb(sum(balls), half)
              good = 0
              for allocation in product(*[range(count + 1) for count in balls]):
                  if sum(allocation) != half:
                      continue
                  left = sum(value > 0 for value in allocation)
                  right = sum(value < count for value, count in zip(allocation, balls))
                  if left == right:
                      ways = 1
                      for count, value in zip(balls, allocation):
                          ways *= comb(count, value)
                      good += ways
              return abs(result - good / total) <= 1e-5
