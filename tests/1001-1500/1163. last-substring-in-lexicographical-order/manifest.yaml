entry:
  id: 1163
  title: last-substring-in-lexicographical-order
  params:
    s:
      type: string
  call:
    cpp: "Solution().lastSubstring({s})"
    rust: "Solution::last_substring({s})"
    python3: "Solution().lastSubstring({s})"
    python2: "Solution().lastSubstring({s})"
    ruby: "last_substring({s})"
    java: "new Solution().lastSubstring({s})"
    csharp: "new Solution().LastSubstring({s})"
    kotlin: "Solution().lastSubstring({s})"
    go: "lastSubstring({s})"
    dart: "Solution().lastSubstring({s})"
    swift: "Solution().lastSubstring({s})"
    typescript: "lastSubstring({s})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().lastSubstring(s, {result})"
    checker: |
      class Checker:
          def lastSubstring(self, s, result):
              if type(s) is not str or type(result) is not str:
                  return False
              n = len(s)
              m = len(result)
              if m == 0 or m > n or s[n - m:] != result:
                  return False

              # Z-values compare the proposed suffix to every suffix of s.
              combined = result + "#" + s
              z = [0] * len(combined)
              left = right = 0
              for i in range(1, len(combined)):
                  if i <= right:
                      z[i] = min(right - i + 1, z[i - left])
                  while i + z[i] < len(combined) and combined[z[i]] == combined[i + z[i]]:
                      z[i] += 1
                  if i + z[i] - 1 > right:
                      left, right = i, i + z[i] - 1

              for start in range(n):
                  common = z[m + 1 + start]
                  suffix_len = n - start
                  if common == m:
                      if suffix_len > m:
                          return False
                  elif common < suffix_len and result[common] < s[start + common]:
                      return False
              return True
seed: 1163
