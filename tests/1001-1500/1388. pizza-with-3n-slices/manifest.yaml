entry:
  id: 1388
  title: pizza-with-3n-slices
  params:
    slices:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().maxSizeSlices({slices})"
    rust: "Solution::max_size_slices({slices})"
    python3: "Solution().maxSizeSlices({slices})"
    python2: "Solution().maxSizeSlices({slices})"
    ruby: "max_size_slices({slices})"
    java: "new Solution().maxSizeSlices({slices})"
    csharp: "new Solution().MaxSizeSlices({slices})"
    kotlin: "Solution().maxSizeSlices({slices})"
    go: "maxSizeSlices({slices})"
    dart: "Solution().maxSizeSlices({slices})"
    swift: "Solution().maxSizeSlices({slices})"
    typescript: "maxSizeSlices({slices})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().maxSizeSlices(slices, {result})"
    checker: |
      class Checker:
          def maxSizeSlices(self, slices, result):
              if not isinstance(slices, list) or len(slices) < 3 or len(slices) > 500 or len(slices) % 3 != 0:
                  return False
              if any(not isinstance(value, int) or isinstance(value, bool) or value < 1 or value > 1000 for value in slices):
                  return False
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              picks = len(slices) // 3
              def solve(values):
                  impossible = -10**18
                  rows = len(values)
                  dp = [[impossible] * (picks + 1) for _ in range(rows + 1)]
                  for row in range(rows + 1):
                      dp[row][0] = 0
                  for row in range(1, rows + 1):
                      limit = min(picks, (row + 1) // 2)
                      for count in range(1, limit + 1):
                          skip = dp[row - 1][count]
                          take = values[0] if row == 1 and count == 1 else (dp[row - 2][count - 1] + values[row - 1] if row > 1 else impossible)
                          dp[row][count] = max(skip, take)
                  return dp[rows][picks]
              expected = max(solve(slices[1:]), solve(slices[:-1]))
              return result == expected
