entry:
  id: 1053
  title: previous-permutation-with-one-swap
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().prevPermOpt1({arr})"
    rust: "Solution::prev_perm_opt1({arr})"
    python3: "Solution().prevPermOpt1({arr})"
    python2: "Solution().prevPermOpt1({arr})"
    ruby: "prev_perm_opt1({arr})"
    java: "new Solution().prevPermOpt1({arr})"
    csharp: "new Solution().PrevPermOpt1({arr})"
    kotlin: "Solution().prevPermOpt1({arr})"
    go: "prevPermOpt1({arr})"
    dart: "Solution().prevPermOpt1({arr})"
    swift: "Solution().prevPermOpt1({arr})"
    typescript: "prevPermOpt1({arr})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().prevPermOpt1(arr, {result})"
    checker: |
      class Checker:
          def prevPermOpt1(self, arr, result):
              n = len(arr)
              i = n - 2
              while i >= 0 and arr[i] <= arr[i + 1]:
                  i -= 1
              if i < 0:
                  return result == arr
              j = n - 1
              while arr[j] >= arr[i] or (j > i + 1 and arr[j] == arr[j - 1]):
                  j -= 1
              expected = arr[:]
              expected[i], expected[j] = expected[j], expected[i]
              return result == expected
seed: 1053
