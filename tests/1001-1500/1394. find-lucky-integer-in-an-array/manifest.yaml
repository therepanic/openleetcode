entry:
  id: 1394
  title: "find-lucky-integer-in-an-array"
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().findLucky({arr})"
    rust: "Solution::find_lucky({arr})"
    python3: "Solution().findLucky({arr})"
    python2: "Solution().findLucky({arr})"
    ruby: "find_lucky({arr})"
    java: "new Solution().findLucky({arr})"
    csharp: "new Solution().FindLucky({arr})"
    kotlin: "Solution().findLucky({arr})"
    go: "findLucky({arr})"
    dart: "Solution().findLucky({arr})"
    swift: "Solution().findLucky({arr})"
    typescript: "findLucky({arr})"
judge:
  type: exact
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().findLucky(arr, {result})"
    checker: |
      from collections import Counter
      class Checker:
          def findLucky(self, arr, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              frequencies = Counter(arr)
              lucky = [value for value, count in frequencies.items() if value == count]
              return result == (max(lucky) if lucky else -1)
seed: 1394
