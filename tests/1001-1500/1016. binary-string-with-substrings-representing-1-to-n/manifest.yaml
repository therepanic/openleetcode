entry:
  id: 1016
  title: binary-string-with-substrings-representing-1-to-n
  params:
    s:
      type: string
    n:
      type: int
  call:
    cpp: Solution().queryString({s}, {n})
    rust: Solution::query_string({s}, {n})
    python3: Solution().queryString({s}, {n})
    python2: Solution().queryString({s}, {n})
    ruby: query_string({s}, {n})
    java: new Solution().queryString({s}, {n})
    csharp: new Solution().QueryString({s}, {n})
    kotlin: Solution().queryString({s}, {n})
    go: queryString({s}, {n})
    dart: Solution().queryString({s}, {n})
    swift: Solution().queryString({s}, {n})
    typescript: queryString({s}, {n})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(s, n, {result})
    checker:
      "class Checker:\n    def check(self, s, n, result):\n        for num\
      \ in range(1, n + 1):\n            if bin(num)[2:] not in s:\n             \
      \   return False\n        return result is True\n"
seed: 1016
