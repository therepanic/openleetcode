entry:
  id: 1234
  title: "replace-the-substring-for-balanced-string"
  params:
    s:
      type: string
  call:
    cpp: "Solution().balancedString({s})"
    rust: "Solution::balanced_string({s})"
    python3: "Solution().balancedString({s})"
    python2: "Solution().balancedString({s})"
    ruby: "balanced_string({s})"
    java: "new Solution().balancedString({s})"
    csharp: "new Solution().BalancedString({s})"
    kotlin: "Solution().balancedString({s})"
    go: "balancedString({s})"
    dart: "Solution().balancedString({s})"
    swift: "Solution().balancedString({s})"
    typescript: "balancedString({s})"

judge:
  type: "exact"

limits:
  time_ms: 700
  memory_mb: 300

oracle:
  python3:
    call: "Checker().balancedString(s, {result})"
    checker: |
      class Checker:
          def balancedString(self, s, result):
              if not isinstance(result, int) or isinstance(result, bool) or len(s) < 4 or len(s) % 4 != 0:
                  return False
              target = len(s) // 4
              total = {ch: s.count(ch) for ch in 'QWER'}
              if all(total[ch] == target for ch in total):
                  return result == 0
              left = 0
              window = {ch: 0 for ch in 'QWER'}
              best = len(s)
              for right, ch in enumerate(s):
                  window[ch] += 1
                  while left <= right and all(total[x] - window[x] <= target for x in 'QWER'):
                      best = min(best, right - left + 1)
                      window[s[left]] -= 1
                      left += 1
              return result == best

