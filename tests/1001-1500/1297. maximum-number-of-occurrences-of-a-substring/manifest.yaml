entry:
  id: 1297
  title: maximum-number-of-occurrences-of-a-substring
  params:
    s:
      type: string
    maxLetters:
      type: int
    minSize:
      type: int
    maxSize:
      type: int
  call:
    cpp: "Solution().maxFreq({s}, {maxLetters}, {minSize}, {maxSize})"
    rust: "Solution::max_freq({s}, {maxLetters}, {minSize}, {maxSize})"
    python3: "Solution().maxFreq({s}, {maxLetters}, {minSize}, {maxSize})"
    python2: "Solution().maxFreq({s}, {maxLetters}, {minSize}, {maxSize})"
    ruby: "max_freq({s}, {maxLetters}, {minSize}, {maxSize})"
    java: "new Solution().maxFreq({s}, {maxLetters}, {minSize}, {maxSize})"
    csharp: "new Solution().MaxFreq({s}, {maxLetters}, {minSize}, {maxSize})"
    kotlin: "Solution().maxFreq({s}, {maxLetters}, {minSize}, {maxSize})"
    go: "maxFreq({s}, {maxLetters}, {minSize}, {maxSize})"
    dart: "Solution().maxFreq({s}, {maxLetters}, {minSize}, {maxSize})"
    swift: "Solution().maxFreq({s}, {maxLetters}, {minSize}, {maxSize})"
    typescript: "maxFreq({s}, {maxLetters}, {minSize}, {maxSize})"

judge:
  type: "exact"

limits:
  time_ms: 1500
  memory_mb: 256

oracle:
  python3:
    call: "Checker().maxFreq(s, maxLetters, minSize, maxSize, {result})"
    checker: |
      class Checker:
          def maxFreq(self, s, maxLetters, minSize, maxSize, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              if not (1 <= len(s) <= 100000 and 1 <= maxLetters <= 26):
                  return False
              if not (1 <= minSize <= maxSize <= min(26, len(s))):
                  return False
              if any(char < 'a' or char > 'z' for char in s):
                  return False
              counts = {}
              for start in range(len(s) - minSize + 1):
                  piece = s[start:start + minSize]
                  if len(set(piece)) <= maxLetters:
                      counts[piece] = counts.get(piece, 0) + 1
              return result == max(counts.values(), default=0)

seed: 1297

