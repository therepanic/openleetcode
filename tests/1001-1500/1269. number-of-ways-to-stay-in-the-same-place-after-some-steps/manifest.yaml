entry:
  id: 1269
  title: "number-of-ways-to-stay-in-the-same-place-after-some-steps"
  params:
    steps:
      type: int
    arrLen:
      type: int
  call:
    cpp: "Solution().numWays({steps}, {arrLen})"
    rust: "Solution::num_ways({steps}, {arrLen})"
    python3: "Solution().numWays({steps}, {arrLen})"
    python2: "Solution().numWays({steps}, {arrLen})"
    ruby: "num_ways({steps}, {arrLen})"
    java: "new Solution().numWays({steps}, {arrLen})"
    csharp: "new Solution().NumWays({steps}, {arrLen})"
    kotlin: "Solution().numWays({steps}, {arrLen})"
    go: "numWays({steps}, {arrLen})"
    dart: "Solution().numWays({steps}, {arrLen})"
    swift: "Solution().numWays({steps}, {arrLen})"
    typescript: "numWays({steps}, {arrLen})"

judge:
  type: "exact"

limits:
  time_ms: 700
  memory_mb: 300

oracle:
  python3:
    call: "Checker().numWays(steps, arrLen, {result})"
    checker: |
      from functools import lru_cache

      class Checker:
          def numWays(self, steps, arrLen, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              if not (1 <= steps <= 500 and 1 <= arrLen <= 1000000):
                  return False
              mod = 1000000007

              @lru_cache(None)
              def count(remaining, position):
                  if remaining == 0:
                      return int(position == 0)
                  total = count(remaining - 1, position)
                  if position > 0:
                      total += count(remaining - 1, position - 1)
                  if position + 1 < arrLen:
                      total += count(remaining - 1, position + 1)
                  return total % mod

              return result == count(steps, 0)

seed: 126900

