entry:
  id: 1441
  title: build-an-array-with-stack-operations
  params:
    target:
      type: array
      items:
        type: int
    n:
      type: int
  call:
    cpp: "Solution().buildArray({target}, {n})"
    rust: "Solution::build_array({target}, {n})"
    python3: "Solution().buildArray({target}, {n})"
    python2: "Solution().buildArray({target}, {n})"
    ruby: "build_array({target}, {n})"
    java: "new Solution().buildArray({target}, {n})"
    csharp: "new Solution().BuildArray({target}, {n})"
    kotlin: "Solution().buildArray({target}, {n})"
    go: "buildArray({target}, {n})"
    dart: "Solution().buildArray({target}, {n})"
    swift: "Solution().buildArray({target}, {n})"
    typescript: "buildArray({target}, {n})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().buildArray(target, n, {result})"
    checker: |
      class Checker:
          def buildArray(self, target, n, result):
              if not isinstance(target, list) or not isinstance(n, int):
                  return False
              if not isinstance(result, list) or any(op not in ("Push", "Pop") for op in result):
                  return False
              stack = []
              operation = 0
              for value in range(1, n + 1):
                  if stack == target:
                      return operation == len(result)
                  if operation >= len(result) or result[operation] != "Push":
                      return False
                  operation += 1
                  stack.append(value)
                  if len(stack) > len(target) or stack[-1] != target[len(stack) - 1]:
                      if operation >= len(result) or result[operation] != "Pop":
                          return False
                      operation += 1
                      stack.pop()
              return stack == target and operation == len(result)
