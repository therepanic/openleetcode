entry:
  id: 1338
  title: "reduce-array-size-to-the-half"
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().minSetSize({arr})"
    rust: "Solution::min_set_size({arr})"
    python3: "Solution().minSetSize({arr})"
    python2: "Solution().minSetSize({arr})"
    ruby: "min_set_size({arr})"
    java: "new Solution().minSetSize({arr})"
    csharp: "new Solution().MinSetSize({arr})"
    kotlin: "Solution().minSetSize({arr})"
    go: "minSetSize({arr})"
    dart: "Solution().minSetSize({arr})"
    swift: "Solution().minSetSize({arr})"
    typescript: "minSetSize({arr})"

judge:
  type: "exact"

limits:
  time_ms: 2500
  memory_mb: 256

oracle:
  python3:
    call: "Checker().minSetSize(arr, {result})"
    checker: |
      class Checker:
          def minSetSize(self, arr, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              frequencies = {}
              for value in arr:
                  frequencies[value] = frequencies.get(value, 0) + 1
              removed = 0
              for size, count in enumerate(sorted(frequencies.values(), reverse=True), 1):
                  removed += count
                  if removed >= len(arr) // 2:
                      return result == size
              return False

seed: 1338

