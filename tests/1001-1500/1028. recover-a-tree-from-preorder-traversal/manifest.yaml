  memory_mb: 300
oracle:
  python3:
    call: Checker().recoverFromPreorder(traversal, {result})
    checker: |
      class Checker:
          def _build(self, values):
              if not values:
                  return None
              nodes = [None if v is None else TreeNode(v) for v in values]
              kids = nodes[::-1]
              root = kids.pop()
              for node in nodes:
                  if node is not None:
                      if kids:
                          node.left = kids.pop()
                      if kids:
                          node.right = kids.pop()
              return root

          def _serialize(self, node, depth=0):
              if node is None:
                  return []
              return ["-" * depth + str(node.val)] + self._serialize(node.left, depth + 1) + self._serialize(node.right, depth + 1)

          def recoverFromPreorder(self, traversal, result):
              if not isinstance(result, list):
                  return False
              root = self._build(result)
              return "".join(self._serialize(root)) == traversal
