entry:
  id: 1331
  title: "rank-transform-of-an-array"
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().arrayRankTransform({arr})"
    rust: "Solution::array_rank_transform({arr})"
    python3: "Solution().arrayRankTransform({arr})"
    python2: "Solution().arrayRankTransform({arr})"
    ruby: "array_rank_transform({arr})"
    java: "new Solution().arrayRankTransform({arr})"
    csharp: "new Solution().ArrayRankTransform({arr})"
    kotlin: "Solution().arrayRankTransform({arr})"
    go: "arrayRankTransform({arr})"
    dart: "Solution().arrayRankTransform({arr})"
    swift: "Solution().arrayRankTransform({arr})"
    typescript: "arrayRankTransform({arr})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().arrayRankTransform(arr, {result})"
    checker: |
      class Checker:
          def arrayRankTransform(self, arr, result):
              if not isinstance(result, list) or len(result) != len(arr):
                  return False
              rank_by_value = {
                  value: rank
                  for rank, value in enumerate(sorted(set(arr)), start=1)
              }
              return result == [rank_by_value[value] for value in arr]
seed: 1331
