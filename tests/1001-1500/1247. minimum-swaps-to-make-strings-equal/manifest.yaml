entry:
  id: 1247
  title: "minimum-swaps-to-make-strings-equal"
  params:
    s1:
      type: string
    s2:
      type: string
  call:
    cpp: "Solution().minimumSwap({s1}, {s2})"
    rust: "Solution::minimum_swap({s1}, {s2})"
    python3: "Solution().minimumSwap({s1}, {s2})"
    python2: "Solution().minimumSwap({s1}, {s2})"
    ruby: "minimum_swap({s1}, {s2})"
    java: "new Solution().minimumSwap({s1}, {s2})"
    csharp: "new Solution().MinimumSwap({s1}, {s2})"
    kotlin: "Solution().minimumSwap({s1}, {s2})"
    go: "minimumSwap({s1}, {s2})"
    dart: "Solution().minimumSwap({s1}, {s2})"
    swift: "Solution().minimumSwap({s1}, {s2})"
    typescript: "minimumSwap({s1}, {s2})"
judge:
  type: "exact"
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().minimumSwap(s1, s2, {result})"
    checker: |
      class Checker:
          def minimumSwap(self, s1, s2, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              xy = 0
              yx = 0
              for left, right in zip(s1, s2):
                  if left == 'x' and right == 'y':
                      xy += 1
                  elif left == 'y' and right == 'x':
                      yx += 1
              if (xy + yx) % 2:
                  return result == -1
              return result == xy // 2 + yx // 2 + (2 if xy % 2 else 0)
seed: 1247
