entry:
  id: 1031
  title: maximum-sum-of-two-non-overlapping-subarrays
  params:
    nums:
      type: array
      items:
        type: int
    firstLen:
      type: int
    secondLen:
      type: int
  call:
    cpp: Solution().maxSumTwoNoOverlap({nums}, {firstLen}, {secondLen})
    rust: Solution::max_sum_two_no_overlap({nums}, {firstLen}, {secondLen})
    python3: Solution().maxSumTwoNoOverlap({nums}, {firstLen}, {secondLen})
    python2: Solution().maxSumTwoNoOverlap({nums}, {firstLen}, {secondLen})
    ruby: max_sum_two_no_overlap({nums}, {firstLen}, {secondLen})
    java: new Solution().maxSumTwoNoOverlap({nums}, {firstLen}, {secondLen})
    csharp: new Solution().MaxSumTwoNoOverlap({nums}, {firstLen}, {secondLen})
    kotlin: Solution().maxSumTwoNoOverlap({nums}, {firstLen}, {secondLen})
    go: maxSumTwoNoOverlap({nums}, {firstLen}, {secondLen})
    dart: Solution().maxSumTwoNoOverlap({nums}, {firstLen}, {secondLen})
    swift: Solution().maxSumTwoNoOverlap({nums}, {firstLen}, {secondLen})
    typescript: maxSumTwoNoOverlap({nums}, {firstLen}, {secondLen})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(nums, firstLen, secondLen, {result})
    checker:
      "class Checker:\n    def check(self, nums, firstLen, secondLen, result):\n\
      \        if not isinstance(result, int):\n            return False\n       \
      \ n = len(nums)\n        if firstLen + secondLen > n:\n            return False\n\
      \        pref = [0]\n        for x in nums:\n            pref.append(pref[-1]\
      \ + x)\n        best = 0\n        for a in range(n - firstLen + 1):\n      \
      \      sum1 = pref[a + firstLen] - pref[a]\n            for b in range(n - secondLen\
      \ + 1):\n                if b + secondLen <= a or a + firstLen <= b:\n     \
      \               best = max(best, sum1 + pref[b + secondLen] - pref[b])\n   \
      \     for a in range(n - secondLen + 1):\n            sum1 = pref[a + secondLen]\
      \ - pref[a]\n            for b in range(n - firstLen + 1):\n               \
      \ if b + firstLen <= a or a + secondLen <= b:\n                    best = max(best,\
      \ sum1 + pref[b + firstLen] - pref[b])\n        return result == best\n"
seed: 1031
