entry:
  id: 1404
  title: "number-of-steps-to-reduce-a-number-in-binary-representation-to-one"
  params:
    s:
      type: string
  call:
    cpp: "Solution().numSteps({s})"
    rust: "Solution::num_steps({s})"
    python3: "Solution().numSteps({s})"
    python2: "Solution().numSteps({s})"
    ruby: "num_steps({s})"
    java: "new Solution().numSteps({s})"
    csharp: "new Solution().NumSteps({s})"
    kotlin: "Solution().numSteps({s})"
    go: "numSteps({s})"
    dart: "Solution().numSteps({s})"
    swift: "Solution().numSteps({s})"
    typescript: "numSteps({s})"
judge:
  type: "exact"
limits:
  time_ms: 400
  memory_mb: 300
oracle:
  python3:
    call: "Checker().numSteps(s, {result})"
    checker: |
      class Checker:
          def numSteps(self, s, result):
              if not isinstance(result, int) or isinstance(result, bool) or result < 0:
                  return False
              value = int(s, 2)
              expected = 0
              while value > 1:
                  if value % 2 == 0:
                      value //= 2
                  else:
                      value += 1
                  expected += 1
              return result == expected

