    ruby: "kth_factor({n}, {k})"
    java: "new Solution().kthFactor({n}, {k})"
    csharp: "new Solution().KthFactor({n}, {k})"
    kotlin: "Solution().kthFactor({n}, {k})"
    go: "kthFactor({n}, {k})"
    dart: "Solution().kthFactor({n}, {k})"
    swift: "Solution().kthFactor({n}, {k})"
    typescript: "kthFactor({n}, {k})"
judge:
  type: exact
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().kthFactor(n, k, {result})"
    checker: |
      class Checker:
          def kthFactor(self, n, k, result):
              factors = [i for i in range(1, n+1) if n % i == 0]
              return result == (factors[k-1] if k <= len(factors) else -1)
