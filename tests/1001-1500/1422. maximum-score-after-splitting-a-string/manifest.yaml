entry:
  id: 1422
  title: maximum-score-after-splitting-a-string
  params:
    s:
      type: string
  call:
    cpp: "Solution().maxScore({s})"
    rust: "Solution::max_score({s})"
    python3: "Solution().maxScore({s})"
    python2: "Solution().maxScore({s})"
    ruby: "max_score({s})"
    java: "new Solution().maxScore({s})"
    csharp: "new Solution().MaxScore({s})"
    kotlin: "Solution().maxScore({s})"
    go: "maxScore({s})"
    dart: "Solution().maxScore({s})"
    swift: "Solution().maxScore({s})"
    typescript: "maxScore({s})"
judge:
  type: "exact"
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().maxScore(s, {result})"
    checker: |
      class Checker:
          def maxScore(self, s, result):
              if type(result) is not int:
                  return False
              best = 0
              for split in range(1, len(s)):
                  score = 0
                  for char in s[:split]:
                      score += char == '0'
                  for char in s[split:]:
                      score += char == '1'
                  best = max(best, score)
              return result == best
seed: 1422
