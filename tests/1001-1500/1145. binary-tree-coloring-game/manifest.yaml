entry:
  id: 1145
  title: "binary-tree-coloring-game"
  params:
    root:
      type: tree_node
    n:
      type: int
    x:
      type: int
  call:
    cpp: "Solution().btreeGameWinningMove({root}, {n}, {x})"
    rust: "Solution::btree_game_winning_move({root}, {n}, {x})"
    python3: "Solution().btreeGameWinningMove({root}, {n}, {x})"
    python2: "Solution().btreeGameWinningMove({root}, {n}, {x})"
    ruby: "btree_game_winning_move({root}, {n}, {x})"
    java: "new Solution().btreeGameWinningMove({root}, {n}, {x})"
    csharp: "new Solution().BtreeGameWinningMove({root}, {n}, {x})"
    kotlin: "Solution().btreeGameWinningMove({root}, {n}, {x})"
    go: "btreeGameWinningMove({root}, {n}, {x})"
    dart: "Solution().btreeGameWinningMove({root}, {n}, {x})"
    swift: "Solution().btreeGameWinningMove({root}, {n}, {x})"
    typescript: "btreeGameWinningMove({root}, {n}, {x})"
judge:
  type: exact
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().btreeGameWinningMove(root, n, x, {result})"
    checker: |
      class Checker:
          def btreeGameWinningMove(self, root, n, x, result):
              if type(result) is not bool or not root or root[0] is None:
                  return False
              children = {}
              queue = [root[0]]
              index = 1
              while queue:
                  value = queue.pop(0)
                  children[value] = []
                  for _ in range(2):
                      if index >= len(root):
                          break
                      child = root[index]
                      index += 1
                      if child is not None:
                          children[value].append(child)
                          queue.append(child)
              if x not in children or len(children) != n:
                  return False
              def count(value):
                  return 1 + sum(count(child) for child in children[value])
              child_sizes = [count(child) for child in children[x]]
              parent_size = n - 1 - sum(child_sizes)
              expected = max(child_sizes + [parent_size]) > n // 2
              return result is expected
