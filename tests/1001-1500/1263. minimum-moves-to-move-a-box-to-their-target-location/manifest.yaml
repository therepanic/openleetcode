entry:
  id: 1263
  title: "minimum-moves-to-move-a-box-to-their-target-location"
  params:
    grid:
      type: array
      items:
        type: array
        items:
          type: char
  call:
    cpp: "Solution().minPushBox({grid})"
    rust: "Solution::min_push_box({grid})"
    python3: "Solution().minPushBox({grid})"
    python2: "Solution().minPushBox({grid})"
    ruby: "min_push_box({grid})"
    java: "new Solution().minPushBox({grid})"
    csharp: "new Solution().MinPushBox({grid})"
    kotlin: "Solution().minPushBox({grid})"
    go: "minPushBox({grid})"
    dart: "Solution().minPushBox({grid})"
    swift: "Solution().minPushBox({grid})"
    typescript: "minPushBox({grid})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 300
oracle:
  python3:
    call: "Checker().minPushBox(grid, {result})"
    checker: |
      from collections import deque

      class Checker:
          def minPushBox(self, grid, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              rows, cols = len(grid), len(grid[0])
              positions = {
                  cell: (r, c)
                  for r, row in enumerate(grid)
                  for c, cell in enumerate(row)
                  if cell in "SBT"
              }
              player, box, target = positions["S"], positions["B"], positions["T"]
              queue = deque([(player, box, 0)])
              seen = {(player, box)}
              while queue:
                  player, box, pushes = queue.popleft()
                  if box == target:
                      return result == pushes
                  for dr, dc in ((1, 0), (-1, 0), (0, 1), (0, -1)):
                      nxt = (player[0] + dr, player[1] + dc)
                      if not (0 <= nxt[0] < rows and 0 <= nxt[1] < cols) or grid[nxt[0]][nxt[1]] == "#":
                          continue
                      if nxt == box:
                          moved = (box[0] + dr, box[1] + dc)
                          if not (0 <= moved[0] < rows and 0 <= moved[1] < cols) or grid[moved[0]][moved[1]] == "#":
                              continue
                          state = (box, moved)
                          if state not in seen:
                              seen.add(state)
                              queue.append((box, moved, pushes + 1))
                      elif (nxt, box) not in seen:
                          seen.add((nxt, box))
                          queue.append((nxt, box, pushes))
              return result == -1
