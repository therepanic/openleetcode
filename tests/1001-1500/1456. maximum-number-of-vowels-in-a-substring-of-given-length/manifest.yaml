entry:
  id: 1456
  title: "maximum-number-of-vowels-in-a-substring-of-given-length"
  params:
    s:
      type: string
    k:
      type: int
  call:
    cpp: "Solution().maxVowels({s}, {k})"
    rust: "Solution::max_vowels({s}, {k})"
    python3: "Solution().maxVowels({s}, {k})"
    python2: "Solution().maxVowels({s}, {k})"
    ruby: "max_vowels({s}, {k})"
    java: "new Solution().maxVowels({s}, {k})"
    csharp: "new Solution().MaxVowels({s}, {k})"
    kotlin: "Solution().maxVowels({s}, {k})"
    go: "maxVowels({s}, {k})"
    dart: "Solution().maxVowels({s}, {k})"
    swift: "Solution().maxVowels({s}, {k})"
    typescript: "maxVowels({s}, {k})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().maxVowels(s, k, {result})"
    checker: |
      class Checker:
          def maxVowels(self, s, k, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              vowels = set("aeiou")
              window = sum(ch in vowels for ch in s[:k])
              expected = window
              for right in range(k, len(s)):
                  window += s[right] in vowels
                  window -= s[right - k] in vowels
                  expected = max(expected, window)
              return result == expected

seed: 1456

