judge:
  type: exact

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().balanceBST(root, {result})"
    checker: |
      from collections import Counter

      class Checker:
          def parse(self, values):
              if not isinstance(values, list) or not values or values[0] is None:
                  return None
              root = [values[0], None, None]
              queue = [root]
              pos = 1
              for node in queue:
                  for side in (1, 2):
                      if pos >= len(values):
                          break
                      value = values[pos]
                      pos += 1
                      if value is not None:
                          if not isinstance(value, int):
                              return None
                          child = [value, None, None]
                          node[side] = child
                          queue.append(child)
              if pos != len(values):
                  return None
              return root

          def inspect(self, node, low, high, values):
              if node is None:
                  return 0
              value = node[0]
              if value <= low or value >= high:
                  return -1
              values.append(value)
              left_height = self.inspect(node[1], low, value, values)
              right_height = self.inspect(node[2], value, high, values)
              if left_height < 0 or right_height < 0 or abs(left_height - right_height) > 1:
                  return -1
              return max(left_height, right_height) + 1

          def collect(self, node, low, high, values):
              if node is None:
                  return True
              value = node[0]
              if value <= low or value >= high:
                  return False
              values.append(value)
              return (self.collect(node[1], low, value, values)
                      and self.collect(node[2], value, high, values))

          def balanceBST(self, root, result):
              source = self.parse(root)
              candidate = self.parse(result)
              if source is None or candidate is None:
                  return False
              source_values = []
              candidate_values = []
              if not self.collect(source, float("-inf"), float("inf"), source_values):
                  return False
              if self.inspect(candidate, float("-inf"), float("inf"), candidate_values) < 0:
                  return False
              return Counter(source_values) == Counter(candidate_values)

