    python3: "tree_node_to_array(Solution().balanceBST({root}))"
    python2: "tree_node_to_array(Solution().balanceBST({root}))"
    ruby: "tree_node_to_array(balance_bst({root}))"
    java: "TreeNode.treeNodeToArray(new Solution().balanceBST({root}))"
    csharp: "TreeNode.TreeNodeToArray(new Solution().BalanceBST({root}))"
    kotlin: "treeNodeToArray(Solution().balanceBST({root}))"
    go: "treeNodeToArray(balanceBST({root}))"
    dart: "tree_node_to_array(Solution().balanceBST({root}))"
