  memory_mb: 300
oracle:
  python3:
    call: "Checker().palindromePartition(s, k, {result})"
    checker: |
      class Checker:
          def palindromePartition(self, s, k, result):
              n = len(s)
              changes = [[0] * n for _ in range(n)]
              for length in range(2, n + 1):
                  for left in range(n - length + 1):
                      right = left + length - 1
                      changes[left][right] = changes[left + 1][right - 1] + (s[left] != s[right]) if length > 2 else (s[left] != s[right])
              best = [[n + 1] * (n + 1) for _ in range(k + 1)]
              best[0][0] = 0
              for parts in range(1, k + 1):
                  for end in range(parts, n + 1):
                      best[parts][end] = min(best[parts - 1][split] + changes[split][end - 1] for split in range(parts - 1, end))
              return result == best[k][n]
