entry:
  id: 1397
  title: find-all-good-strings
  params:
    n:
      type: int
    s1:
      type: string
    s2:
      type: string
    evil:
      type: string
  call:
    cpp: "Solution().findGoodStrings({n}, {s1}, {s2}, {evil})"
    rust: "Solution::find_good_strings({n}, {s1}, {s2}, {evil})"
    python3: "Solution().findGoodStrings({n}, {s1}, {s2}, {evil})"
    python2: "Solution().findGoodStrings({n}, {s1}, {s2}, {evil})"
    ruby: "find_good_strings({n}, {s1}, {s2}, {evil})"
    java: "new Solution().findGoodStrings({n}, {s1}, {s2}, {evil})"
    csharp: "new Solution().FindGoodStrings({n}, {s1}, {s2}, {evil})"
    kotlin: "Solution().findGoodStrings({n}, {s1}, {s2}, {evil})"
    go: "findGoodStrings({n}, {s1}, {s2}, {evil})"
    dart: "Solution().findGoodStrings({n}, {s1}, {s2}, {evil})"
    swift: "Solution().findGoodStrings({n}, {s1}, {s2}, {evil})"
    typescript: "findGoodStrings({n}, {s1}, {s2}, {evil})"
judge:
  type: exact
limits:
  time_ms: 1500
  memory_mb: 256
oracle:
  python3:
    call: "Checker().findGoodStrings(n, s1, s2, evil, {result})"
    checker: |
      class Checker:
          def findGoodStrings(self, n, s1, s2, evil, result):
              if not isinstance(n, int) or not 1 <= n <= 500:
                  return False
              if not all(isinstance(value, str) and len(value) == n for value in (s1, s2)):
                  return False
              if not isinstance(evil, str) or not 1 <= len(evil) <= n:
                  return False
              if not all(all('a' <= char <= 'z' for char in value) for value in (s1, s2, evil)) or s1 > s2:
                  return False
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              mod = 1000000007
              m = len(evil)
              lps = [0] * m
              for i in range(1, m):
                  j = lps[i - 1]
                  while j and evil[i] != evil[j]:
                      j = lps[j - 1]
                  if evil[i] == evil[j]:
                      j += 1
                  lps[i] = j

              transitions = [[0] * 26 for _ in range(m)]
              for state in range(m):
                  for code in range(26):
                      char = chr(ord('a') + code)
                      j = state
                      while j and char != evil[j]:
                          j = lps[j - 1]
                      if char == evil[j]:
                          j += 1
                      transitions[state][code] = j

              def count_at_most(bound):
                  less = [0] * m
                  equal = [1] + [0] * (m - 1)
                  for pos, limit_char in enumerate(bound):
                      limit = ord(limit_char) - ord('a')
                      next_less = [0] * m
                      next_equal = [0] * m
                      for state, ways in enumerate(less):
                          if not ways:
                              continue
                          for code in range(26):
                              next_state = transitions[state][code]
                              if next_state < m:
                                  next_less[next_state] = (next_less[next_state] + ways) % mod
                      for state, ways in enumerate(equal):
                          if not ways:
                              continue
                          for code in range(limit):
                              next_state = transitions[state][code]
                              if next_state < m:
                                  next_less[next_state] = (next_less[next_state] + ways) % mod
                          next_state = transitions[state][limit]
                          if next_state < m:
                              next_equal[next_state] = (next_equal[next_state] + ways) % mod
                      less, equal = next_less, next_equal
                  return (sum(less) + sum(equal)) % mod

              def predecessor(value):
                  chars = list(value)
                  index = len(chars) - 1
                  while chars[index] == 'a':
                      chars[index] = 'z'
                      index -= 1
                  if index < 0:
                      return None
                  chars[index] = chr(ord(chars[index]) - 1)
                  return ''.join(chars)

              lower = predecessor(s1)
              below_lower = 0 if lower is None else count_at_most(lower)
              expected = (count_at_most(s2) - below_lower) % mod
              return result == expected
seed: 1397
