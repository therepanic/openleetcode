entry:
  id: 1408
  title: "string-matching-in-an-array"
  params:
    words:
      type: array
      items:
        type: string
  call:
    cpp: "Solution().stringMatching({words})"
    rust: "Solution::string_matching({words})"
    python3: "Solution().stringMatching({words})"
    python2: "Solution().stringMatching({words})"
    ruby: "string_matching({words})"
    java: "new Solution().stringMatching({words})"
    csharp: "new Solution().StringMatching({words})"
    kotlin: "Solution().stringMatching({words})"
    go: "stringMatching({words})"
    dart: "Solution().stringMatching({words})"
    swift: "Solution().stringMatching({words})"
    typescript: "stringMatching({words})"

judge:
  type: "ignore_order"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().stringMatching(words, {result})"
    checker: |
      class Checker:
          def stringMatching(self, words, result):
              if not isinstance(result, list) or any(not isinstance(x, str) for x in result):
                  return False
              expected = []
              for i, word in enumerate(words):
                  if any(i != j and word in other for j, other in enumerate(words)):
                      expected.append(word)
              return len(result) == len(expected) and len(set(result)) == len(result) and set(result) == set(expected)

seed: 1408

