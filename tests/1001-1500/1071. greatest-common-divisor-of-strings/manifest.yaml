entry:
  id: 1071
  title: greatest-common-divisor-of-strings
  params:
    str1:
      type: string
    str2:
      type: string
  call:
    cpp: Solution().gcdOfStrings({str1}, {str2})
    rust: Solution::gcd_of_strings({str1}, {str2})
    python3: Solution().gcdOfStrings({str1}, {str2})
    python2: Solution().gcdOfStrings({str1}, {str2})
    ruby: gcd_of_strings({str1}, {str2})
    java: new Solution().gcdOfStrings({str1}, {str2})
    csharp: new Solution().GcdOfStrings({str1}, {str2})
    kotlin: Solution().gcdOfStrings({str1}, {str2})
    go: gcdOfStrings({str1}, {str2})
    dart: Solution().gcdOfStrings({str1}, {str2})
    swift: Solution().gcdOfStrings({str1}, {str2})
    typescript: gcdOfStrings({str1}, {str2})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().gcdOfStrings(str1, str2, {result})
    checker:
      "class Checker:\n    def gcdOfStrings(self, str1, str2, result):\n  \
      \      return isinstance(result, str) and len(result) <= min(len(str1), len(str2))\n"
seed: 1071
tests:
  - name: ex1
    in:
      str1: ABCABC
      str2: ABC
    out: ABC
  - name: ex2
    in:
      str1: ABABAB
      str2: ABAB
    out: AB
  - name: ex3
    in:
      str1: LEET
      str2: CODE
    out: ""
  - name: same_strings
    in:
      str1: AAAA
      str2: AAAA
    out: AAAA
  - name: one_is_prefix
    in:
      str1: XYZXYZXYZ
      str2: XYZXYZ
    out: XYZ
  - name: coprime_lengths_match
    in:
      str1: ababab
      str2: abab
    out: ab
  - name: mismatch_same_length
    in:
      str1: ABCD
      str2: ABCE
    out: ""
  - name: repeated_single_char
    in:
      str1: BBBBBBBB
      str2: BBBB
    out: BBBB
  - name: no_common_base
    in:
      str1: ABCDEF
      str2: ABC
    out: ""
  - name: long_common_base
    in:
      str1: abcabcabcabcabcabc
      str2: abcabcabc
    out: abcabcabc
  - name: short_same
    in:
      str1: A
      str2: A
    out: A
  - name: short_diff
    in:
      str1: A
      str2: B
    out: ""
  - name: partial_repeat
    in:
      str1: zzzzzz
      str2: zz
    out: zz
  - name: unequal_but_compatible
    in:
      str1: abababab
      str2: abab
    out: abab
  - name: incompatible_repeat
    in:
      str1: ababab
      str2: aba
    out: ""
  - name: large_same_pattern
    in:
      str1: abcabcabcabc
      str2: abcabc
    out: abcabc
  - name: shifted_incompatible
    in:
      str1: ABCABCABC
      str2: ABCABD
    out: ""
  - name: all_x
    in:
      str1: XXXXXXXXXX
      str2: XXXXX
    out: XXXXX
  - name: all_y
    in:
      str1: YYYYYYYY
      str2: YY
    out: YY
  - name: mixed_case_like
    in:
      str1: abababababab
      str2: ababab
    out: ababab
  - name: prime_lengths_incompatible
    in:
      str1: aaaaa
      str2: aaaab
    out: ""
  - name: edge_len_two
    in:
      str1: CC
      str2: C
    out: C
  - name: edge_len_three
    in:
      str1: DDD
      str2: DD
    out: D
  - name: alternating_compatible
    in:
      str1: ababababab
      str2: abababab
    out: ab
  - name: alternating_incompatible
    in:
      str1: ababababab
      str2: ababababa
    out: ""
  - name: common_three
    in:
      str1: kikikiki
      str2: kiki
    out: kiki
  - name: common_four
    in:
      str1: mnopmnop
      str2: mnop
    out: mnop
  - name: common_five
    in:
      str1: qqqqqqqqq
      str2: qqq
    out: qqq
  - name: incompatible_symbols
    in:
      str1: XYZXYZ
      str2: XYZZYX
    out: ""
  - name: long_repeat_a
    in:
      str1: aaaaaaaaaaaa
      str2: aaaaaa
    out: aaaaaa
  - name: long_repeat_b
    in:
      str1: bbbbbbbbbbbbbbbb
      str2: bbbbbbbb
    out: bbbbbbbb
  - name: long_repeat_c
    in:
      str1: cccccccccc
      str2: ccccc
    out: ccccc
  - name: long_repeat_d
    in:
      str1: dddddddddddddd
      str2: dddddd
    out: dd
  - name: long_repeat_e
    in:
      str1: eeeeeeee
      str2: eeee
    out: eeee
  - name: long_repeat_f
    in:
      str1: ffffff
      str2: fff
    out: fff
