entry:
  id: 1367
  title: linked-list-in-binary-tree
  params:
    head:
      type: list_node
    root:
      type: tree_node
  call:
    cpp: "Solution().isSubPath({head}, {root})"
    rust: "Solution::is_sub_path({head}, {root})"
    python3: "Solution().isSubPath({head}, {root})"
    python2: "Solution().isSubPath({head}, {root})"
    ruby: "is_sub_path({head}, {root})"
    java: "new Solution().isSubPath({head}, {root})"
    csharp: "new Solution().IsSubPath({head}, {root})"
    kotlin: "Solution().isSubPath({head}, {root})"
    go: "isSubPath({head}, {root})"
    dart: "Solution().isSubPath({head}, {root})"
    swift: "Solution().isSubPath({head}, {root})"
    typescript: "isSubPath({head}, {root})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().isSubPath(head, root, {result})"
    checker: |
      class Checker:
          def isSubPath(self, head, root, result):
              if type(result) is not bool:
                  return False

              if isinstance(head, list):
                  pattern = head
              else:
                  pattern = []
                  while head is not None:
                      pattern.append(head.val)
                      head = head.next

              if isinstance(root, list):
                  if not root or root[0] is None:
                      return result is False
                  children = [[] for _ in root]
                  pending = [0]
                  position = 1
                  for parent in pending:
                      for _ in range(2):
                          if position < len(root):
                              if root[position] is not None:
                                  children[parent].append(position)
                                  pending.append(position)
                              position += 1

                  def starts_here(index, offset):
                      if root[index] != pattern[offset]:
                          return False
                      if offset == len(pattern) - 1:
                          return True
                      return any(starts_here(child, offset + 1) for child in children[index])

                  expected = any(starts_here(index, 0) for index in pending)
              else:
                  def starts_here(node, offset):
                      if node is None or node.val != pattern[offset]:
                          return False
                      if offset == len(pattern) - 1:
                          return True
                      return starts_here(node.left, offset + 1) or starts_here(node.right, offset + 1)

                  def search(node):
                      if node is None:
                          return False
                      return starts_here(node, 0) or search(node.left) or search(node.right)

                  expected = search(root)
              return result == expected
