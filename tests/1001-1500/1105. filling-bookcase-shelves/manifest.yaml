      items:
        type: array
        items:
          type: int
    shelfWidth:
      type: int
  call:
    cpp: Solution().minHeightShelves({books}, {shelfWidth})
    rust: Solution::min_height_shelves({books}, {shelfWidth})
    python3: Solution().minHeightShelves({books}, {shelfWidth})
    python2: Solution().minHeightShelves({books}, {shelfWidth})
    ruby: min_height_shelves({books}, {shelfWidth})
    java: new Solution().minHeightShelves({books}, {shelfWidth})
    csharp: new Solution().MinHeightShelves({books}, {shelfWidth})
    kotlin: Solution().minHeightShelves({books}, {shelfWidth})
    go: minHeightShelves({books}, {shelfWidth})
    dart: Solution().minHeightShelves({books}, {shelfWidth})
    swift: Solution().minHeightShelves({books}, {shelfWidth})
    typescript: minHeightShelves({books}, {shelfWidth})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 128
oracle:
  python3:
    call: Checker().check(books, shelfWidth, {result})
    checker:
      "class Checker(object):\n    def check(self, books, shelfWidth, result):\n\
      \        if not isinstance(result, int) or result <= 0:\n            return\
      \ False\n        n = len(books)\n        dp = [float('inf')] * (n + 1)\n   \
      \     dp[0] = 0\n        for i in range(1, n + 1):\n            dp[i] = dp[i\
      \ - 1] + books[i - 1][1]\n            height = 0\n            width = 0\n  \
      \          for j in range(i - 1, -1, -1):\n                height = max(height,\
      \ books[j][1])\n                width += books[j][0]\n                if width\
      \ > shelfWidth:\n                    break\n                dp[i] = min(dp[i],\
      \ dp[j] + height)\n        return dp[n] == result\n"
seed: 1105
