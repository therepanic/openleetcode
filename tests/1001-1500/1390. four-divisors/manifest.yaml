judge:
  type: "exact"
limits:
  time_ms: 700
  memory_mb: 300
oracle:
  python3:
    call: "Checker().sumFourDivisors(nums, {result})"
    checker: |
      class Checker:
          def sumFourDivisors(self, nums, result):
              total = 0
              for x in nums:
                  divisors = []
                  d = 1
                  while d * d <= x:
                      if x % d == 0:
                          divisors.append(d)
                          if d * d != x:
                              divisors.append(x // d)
                      d += 1
                  if len(divisors) == 4:
                      total += sum(divisors)
              return result == total
seed: 1390
