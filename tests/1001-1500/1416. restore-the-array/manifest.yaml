entry:
  id: 1416
  title: restore-the-array
  params:
    s:
      type: string
    k:
      type: int
  call:
    cpp: "Solution().numberOfArrays({s}, {k})"
    rust: "Solution::number_of_arrays({s}, {k})"
    python3: "Solution().numberOfArrays({s}, {k})"
    python2: "Solution().numberOfArrays({s}, {k})"
    ruby: "number_of_arrays({s}, {k})"
    java: "new Solution().numberOfArrays({s}, {k})"
    csharp: "new Solution().NumberOfArrays({s}, {k})"
    kotlin: "Solution().numberOfArrays({s}, {k})"
    go: "numberOfArrays({s}, {k})"
    dart: "Solution().numberOfArrays({s}, {k})"
    swift: "Solution().numberOfArrays({s}, {k})"
    typescript: "numberOfArrays({s}, {k})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().numberOfArrays(s, k, {result})"
    checker: |
      class Checker:
          def numberOfArrays(self, s, k, result):
              if type(result) is not int:
                  return False
              mod = 1000000007
              ways = [0] * (len(s) + 1)
              ways[len(s)] = 1
              width = len(str(k))
              for start in range(len(s) - 1, -1, -1):
                  if s[start] == '0':
                      continue
                  value = 0
                  for end in range(start, min(len(s), start + width)):
                      value = value * 10 + ord(s[end]) - 48
                      if value > k:
                          break
                      ways[start] = (ways[start] + ways[end + 1]) % mod
              return result == ways[0]
seed: 1416
