entry:
  id: 1311
  title: get-watched-videos-by-your-friends
  params:
    watchedVideos:
      type: array
      items:
        type: array
        items:
          type: string
    friends:
      type: array
      items:
        type: array
        items:
          type: int
    id:
      type: int
    level:
      type: int
  call:
    cpp: "Solution().watchedVideosByFriends({watchedVideos}, {friends}, {id}, {level})"
    rust: "Solution::watched_videos_by_friends({watchedVideos}, {friends}, {id}, {level})"
    python3: "Solution().watchedVideosByFriends({watchedVideos}, {friends}, {id}, {level})"
    python2: "Solution().watchedVideosByFriends({watchedVideos}, {friends}, {id}, {level})"
    ruby: "watched_videos_by_friends({watchedVideos}, {friends}, {id}, {level})"
    java: "new Solution().watchedVideosByFriends({watchedVideos}, {friends}, {id}, {level})"
    csharp: "new Solution().WatchedVideosByFriends({watchedVideos}, {friends}, {id}, {level})"
    kotlin: "Solution().watchedVideosByFriends({watchedVideos}, {friends}, {id}, {level})"
    go: "watchedVideosByFriends({watchedVideos}, {friends}, {id}, {level})"
    dart: "Solution().watchedVideosByFriends({watchedVideos}, {friends}, {id}, {level})"
    swift: "Solution().watchedVideosByFriends({watchedVideos}, {friends}, {id}, {level})"
    typescript: "watchedVideosByFriends({watchedVideos}, {friends}, {id}, {level})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().watchedVideosByFriends(watchedVideos, friends, id, level, {result})"
    checker: |
      class Checker:
          def watchedVideosByFriends(self, watchedVideos, friends, ident, level, result):
              from collections import Counter, deque
              seen = {ident}
              queue = deque([(ident, 0)])
              people = []
              while queue:
                  person, distance = queue.popleft()
                  if distance == level:
                      people.append(person)
                      continue
                  for friend in friends[person]:
                      if friend not in seen:
                          seen.add(friend)
                          queue.append((friend, distance + 1))
              frequencies = Counter(
                  video for person in people for video in watchedVideos[person]
              )
              return result == sorted(frequencies, key=lambda video: (frequencies[video], video))
seed: 1311
