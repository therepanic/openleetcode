entry:
  id: 1011
  title: capacity to ship packages within d days
  params:
    weights:
      type: array
      items:
        type: int
    days:
      type: int
  call:
    cpp: "Solution().shipWithinDays({weights}, {days})"
    rust: "Solution::ship_within_days({weights}, {days})"
    python3: "Solution().shipWithinDays({weights}, {days})"
    python2: "Solution().shipWithinDays({weights}, {days})"
    ruby: "ship_within_days({weights}, {days})"
    java: "new Solution().shipWithinDays({weights}, {days})"
    csharp: "new Solution().ShipWithinDays({weights}, {days})"
    kotlin: "Solution().shipWithinDays({weights}, {days})"
    go: "shipWithinDays({weights}, {days})"
    dart: "Solution().shipWithinDays({weights}, {days})"
    swift: "Solution().shipWithinDays({weights}, {days})"
    typescript: "shipWithinDays({weights}, {days})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check({result})"
    checker: |
      class Checker:
          def check(self, result):
              return True
