entry:
  id: 1125
  title: smallest-sufficient-team
  params:
    req_skills:
      type: array
      items:
        type: string
    people:
      type: array
      items:
        type: array
        items:
          type: string
  call:
    cpp: "Solution().smallestSufficientTeam({req_skills}, {people})"
    rust: "Solution::smallest_sufficient_team({req_skills}, {people})"
    python3: "Solution().smallestSufficientTeam({req_skills}, {people})"
    python2: "Solution().smallestSufficientTeam({req_skills}, {people})"
    ruby: "smallest_sufficient_team({req_skills}, {people})"
    java: "new Solution().smallestSufficientTeam({req_skills}, java.util.Arrays.stream({people}).map(row -> java.util.Arrays.asList(row)).collect(java.util.stream.Collectors.toList()))"
    csharp: "new Solution().SmallestSufficientTeam({req_skills}, {people})"
    kotlin: "Solution().smallestSufficientTeam({req_skills}, {people}.map { it.toList() })"
    go: "smallestSufficientTeam({req_skills}, {people})"
    dart: "Solution().smallestSufficientTeam({req_skills}, {people})"
    swift: "Solution().smallestSufficientTeam({req_skills}, {people})"
    typescript: "smallestSufficientTeam({req_skills}, {people})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().smallestSufficientTeam(req_skills, people, {result})"
    checker: |
      class Checker:
          def smallestSufficientTeam(self, req_skills, people, result):
              if not isinstance(result, list):
                  return False
              if any(type(index) is not int for index in result):
                  return False
              if len(set(result)) != len(result):
                  return False
              if any(index < 0 or index >= len(people) for index in result):
                  return False

              skill_index = {skill: i for i, skill in enumerate(req_skills)}
              full = (1 << len(req_skills)) - 1

              def person_mask(skills):
                  mask = 0
                  for skill in skills:
                      if skill in skill_index:
                          mask |= 1 << skill_index[skill]
                  return mask

              masks = [person_mask(skills) for skills in people]
              covered = 0
              for index in result:
                  covered |= masks[index]
              if covered != full:
                  return False

              best = {0: 0}
              for mask in masks:
                  next_best = dict(best)
                  for covered_mask, size in best.items():
                      combined = covered_mask | mask
                      candidate = size + 1
                      if candidate < next_best.get(combined, len(people) + 1):
                          next_best[combined] = candidate
                  best = next_best
              return len(result) == best.get(full)
seed: 1125
