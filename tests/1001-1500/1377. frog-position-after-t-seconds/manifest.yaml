    python3: "Solution().frogPosition({n}, {edges}, {t}, {target})"
    python2: "Solution().frogPosition({n}, {edges}, {t}, {target})"
    ruby: "frog_position({n}, {edges}, {t}, {target})"
    java: "new Solution().frogPosition({n}, {edges}, {t}, {target})"
    csharp: "new Solution().FrogPosition({n}, {edges}, {t}, {target})"
    kotlin: "Solution().frogPosition({n}, {edges}, {t}, {target})"
    go: "frogPosition({n}, {edges}, {t}, {target})"
    dart: "Solution().frogPosition({n}, {edges}, {t}, {target})"
