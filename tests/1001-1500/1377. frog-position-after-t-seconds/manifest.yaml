judge:
  type: "exact"
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().frogPosition(n, edges, t, target, {result})"
    checker: |
      import math

      class Checker:
          def frogPosition(self, n, edges, t, target, result):
              if not isinstance(result, (int, float)) or not math.isfinite(result):
                  return False
              graph = [[] for _ in range(n + 1)]
              for a, b in edges:
                  graph[a].append(b)
                  graph[b].append(a)
              mass = {1: 1.0}
              visited = {1: frozenset((1,))}
              for _ in range(t):
                  next_mass = {}
                  next_visited = {}
                  for vertex, probability in mass.items():
                      seen = visited[vertex]
                      choices = [u for u in graph[vertex] if u not in seen]
                      if not choices:
                          next_mass[vertex] = next_mass.get(vertex, 0.0) + probability
                          next_visited[vertex] = seen
                      else:
                          share = probability / len(choices)
                          for child in choices:
                              next_mass[child] = next_mass.get(child, 0.0) + share
                              next_visited[child] = seen | frozenset((child,))
                  mass, visited = next_mass, next_visited
              expected = mass.get(target, 0.0)
              return abs(float(result) - expected) <= 1e-5
