entry:
  id: 1190
  title: reverse-substrings-between-each-pair-of-parentheses
  params:
    s:
      type: string
  call:
    cpp: "Solution().reverseParentheses({s})"
    rust: "Solution::reverse_parentheses({s})"
    python3: "Solution().reverseParentheses({s})"
    python2: "Solution().reverseParentheses({s})"
    ruby: "reverse_parentheses({s})"
    java: "new Solution().reverseParentheses({s})"
    csharp: "new Solution().ReverseParentheses({s})"
    kotlin: "Solution().reverseParentheses({s})"
    go: "reverseParentheses({s})"
    dart: "Solution().reverseParentheses({s})"
    swift: "Solution().reverseParentheses({s})"
    typescript: "reverseParentheses({s})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().reverseParentheses(s, {result})"
    checker: |
      class Checker:
          def reverseParentheses(self, s, result):
              parts = [[]]
              for char in s:
                  if char == '(':
                      parts.append([])
                  elif char == ')':
                      if len(parts) == 1:
                          return False
                      parts[-1].reverse()
                      parts[-2].extend(parts.pop())
                  elif 'a' <= char <= 'z':
                      parts[-1].append(char)
                  else:
                      return False
              return len(parts) == 1 and result == ''.join(parts[0])
seed: 1190
