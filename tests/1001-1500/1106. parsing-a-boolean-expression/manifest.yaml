  - name: complex_19
    in:
      expression: "!(!(t))"
    out: true
  - name: complex_20
    in:
      expression: "&(!(!(t)),|(!(f),f),!(|(f,f)))"
    out: true
  - name: complex_21
    in:
      expression: "|(&(t,|(f,!(f))),!(&(t,t,t)),&(t,t))"
    out: true
  - name: complex_22
    in:
      expression: "!(|(!(f),&(t,f),|(f,f,f)))"
    out: false
  - name: complex_23
    in:
      expression: "&(|(t,f),|(f,f,t),!(f),!(|(f)))"
