entry:
  id: 1339
  title: "maximum-product-of-splitted-binary-tree"
  params:
    root:
      type: tree_node
  call:
    cpp: "Solution().maxProduct({root})"
    rust: "Solution::max_product({root})"
    python3: "Solution().maxProduct({root})"
    python2: "Solution().maxProduct({root})"
    ruby: "max_product({root})"
    java: "new Solution().maxProduct({root})"
    csharp: "new Solution().MaxProduct({root})"
    kotlin: "Solution().maxProduct({root})"
    go: "maxProduct({root})"
    dart: "Solution().maxProduct({root})"
    swift: "Solution().maxProduct({root})"
    typescript: "maxProduct({root})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 300

oracle:
  python3:
    call: "Checker().maxProduct(root, {result})"
    checker: |
      class Checker:
          def maxProduct(self, root, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              nodes = []
              queue = []
              if not root or root[0] is None:
                  return False
              nodes.append([root[0], None, None])
              queue.append(0)
              cursor = 1
              for parent in queue:
                  for child_slot in (1, 2):
                      if cursor == len(root):
                          break
                      value = root[cursor]
                      cursor += 1
                      if value is not None:
                          nodes.append([value, None, None])
                          child = len(nodes) - 1
                          nodes[parent][child_slot] = child
                          queue.append(child)
              sums = [0] * len(nodes)
              for index in range(len(nodes) - 1, -1, -1):
                  value, left, right = nodes[index]
                  sums[index] = value + (sums[left] if left is not None else 0) + (sums[right] if right is not None else 0)
              total = sums[0]
              return result == max(subtotal * (total - subtotal) for subtotal in sums) % 1000000007

