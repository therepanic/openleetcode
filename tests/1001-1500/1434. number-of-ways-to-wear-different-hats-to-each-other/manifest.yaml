entry:
  id: 1434
  title: number-of-ways-to-wear-different-hats-to-each-other
  params:
    hats:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().numberWays({hats})"
    rust: "Solution::number_ways({hats})"
    python3: "Solution().numberWays({hats})"
    python2: "Solution().numberWays({hats})"
    ruby: "number_ways({hats})"
    java: "new Solution().numberWays({hats})"
    csharp: "new Solution().NumberWays({hats})"
    kotlin: "Solution().numberWays({hats})"
    go: "numberWays({hats})"
    dart: "Solution().numberWays({hats})"
    swift: "Solution().numberWays({hats})"
    typescript: "numberWays({hats})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().numberWays(hats, {result})"
    checker: |
      class Checker:
          def numberWays(self, hats, result):
              if type(result) is not int:
                  return False
              n = len(hats)
              if not 1 <= n <= 10:
                  return False
              for choices in hats:
                  if not 1 <= len(choices) <= 40 or len(set(choices)) != len(choices):
                      return False
                  if any(hat < 1 or hat > 40 for hat in choices):
                      return False
              mod = 1000000007
              liked_by_hat = [[] for _ in range(41)]
              for person, choices in enumerate(hats):
                  for hat in choices:
                      liked_by_hat[hat].append(person)
              dp = [0] * (1 << n)
              dp[0] = 1
              for hat in range(1, 41):
                  updated = dp[:]
                  for mask, count in enumerate(dp):
                      if count:
                          for person in liked_by_hat[hat]:
                              bit = 1 << person
                              if not mask & bit:
                                  updated[mask | bit] = (updated[mask | bit] + count) % mod
                  dp = updated
              expected = dp[(1 << n) - 1]
              return 0 <= result < mod and result == expected
