entry:
  id: 1029
  title: two-city-scheduling
  params:
    costs:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().twoCitySchedCost({costs})
    rust: Solution::two_city_sched_cost({costs})
    python3: Solution().twoCitySchedCost({costs})
    python2: Solution().twoCitySchedCost({costs})
    ruby: two_city_sched_cost({costs})
    java: new Solution().twoCitySchedCost({costs})
    csharp: new Solution().TwoCitySchedCost({costs})
    kotlin: Solution().twoCitySchedCost({costs})
    go: twoCitySchedCost({costs})
    dart: Solution().twoCitySchedCost({costs})
    swift: Solution().twoCitySchedCost({costs})
    typescript: twoCitySchedCost({costs})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: Checker().twoCitySchedCost(costs, {result})
    checker:
      "class Checker:\n    def twoCitySchedCost(self, costs, result):\n   \
      \     n = len(costs) // 2\n        best = 10 ** 18\n        from itertools import\
      \ combinations\n        for choose in combinations(range(len(costs)), n):\n\
      \            choose = set(choose)\n            total = 0\n            for i,\
      \ (a, b) in enumerate(costs):\n                total += a if i in choose else\
      \ b\n            if total < best:\n                best = total\n        return\
      \ result == best\n"
seed: 1029
