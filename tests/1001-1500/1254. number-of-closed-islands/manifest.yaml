entry:
  id: 1254
  title: "number-of-closed-islands"
  params:
    grid:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().closedIsland({grid})"
    rust: "Solution::closed_island({grid})"
    python3: "Solution().closedIsland({grid})"
    python2: "Solution().closedIsland({grid})"
    ruby: "closed_island({grid})"
    java: "new Solution().closedIsland({grid})"
    csharp: "new Solution().ClosedIsland({grid})"
    kotlin: "Solution().closedIsland({grid})"
    go: "closedIsland({grid})"
    dart: "Solution().closedIsland({grid})"
    swift: "Solution().closedIsland({grid})"
    typescript: "closedIsland({grid})"
judge:
  type: "exact"
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().closedIsland(grid, {result})"
    checker: |
      class Checker:
          def closedIsland(self, grid, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              if not isinstance(grid, list) or not grid or not grid[0]:
                  return False
              rows, cols = len(grid), len(grid[0])
              if any(not isinstance(row, list) or len(row) != cols for row in grid):
                  return False
              if any(cell not in (0, 1) for row in grid for cell in row):
                  return False
              seen = set()
              closed_count = 0
              for row in range(rows):
                  for col in range(cols):
                      if grid[row][col] != 0 or (row, col) in seen:
                          continue
                      component = [(row, col)]
                      seen.add((row, col))
                      touches_border = False
                      for r, c in component:
                          if r == 0 or c == 0 or r == rows - 1 or c == cols - 1:
                              touches_border = True
                          for dr, dc in ((1, 0), (-1, 0), (0, 1), (0, -1)):
                              nr, nc = r + dr, c + dc
                              if 0 <= nr < rows and 0 <= nc < cols and grid[nr][nc] == 0 and (nr, nc) not in seen:
                                  seen.add((nr, nc))
                                  component.append((nr, nc))
                      if not touches_border:
                          closed_count += 1
              return result == closed_count
seed: 1254
