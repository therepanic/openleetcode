entry:
  id: 1038
  title: binary-search-tree-to-greater-sum-tree
  params:
    root:
      type: tree_node
  call:
    cpp: Solution().bstToGst({root})
    rust: Solution::bst_to_gst({root})
    python3: Solution().bstToGst({root})
    python2: Solution().bstToGst({root})
    ruby: bst_to_gst({root})
    java: new Solution().bstToGst({root})
    csharp: new Solution().BstToGst({root})
    kotlin: Solution().bstToGst({root})
    go: bstToGst({root})
    dart: Solution().bstToGst({root})
    swift: Solution().bstToGst({root})
    typescript: bstToGst({root})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().bstToGst(root, {result})
    checker:
      "class Checker:\n    def _from_level(self, values):\n        if not values:\n\
      \            return None\n        nodes = [None if v is None else TreeNode(v)\
      \ for v in values]\n        kids = nodes[::-1]\n        root = kids.pop()\n\
      \        for node in nodes:\n            if node is not None:\n            \
      \    if kids:\n                    node.left = kids.pop()\n                if\
      \ kids:\n                    node.right = kids.pop()\n        return root\n\n\
      \    def _normalize(self, node):\n        if node is None:\n            return\
      \ None\n        if hasattr(node, \"val\"):\n            return node\n      \
      \  if isinstance(node, list):\n            return self._from_level(node)\n \
      \       if isinstance(node, dict):\n            return TreeNode(\n         \
      \       node.get(\"val\", node.get(\"value\")),\n                self._normalize(node.get(\"\
      left\")),\n                self._normalize(node.get(\"right\")),\n         \
      \   )\n        return None\n\n    def bstToGst(self, root, result):\n      \
      \  def inorder_vals(node, vals):\n            if node is None:\n           \
      \     return\n            inorder_vals(node.left, vals)\n            vals.append(node.val)\n\
      \            inorder_vals(node.right, vals)\n\n        def reverse_inorder_assign(node,\
      \ acc):\n            if node is None:\n                return\n            reverse_inorder_assign(node.right,\
      \ acc)\n            acc[0] += node.val\n            node.val = acc[0]\n    \
      \        reverse_inorder_assign(node.left, acc)\n\n        expected_root = self._normalize(root)\n\
      \        actual_root = self._normalize(result)\n        reverse_inorder_assign(expected_root,\
      \ [0])\n\n        expected = []\n        inorder_vals(expected_root, expected)\n\
      \        actual = []\n        inorder_vals(actual_root, actual)\n        return\
      \ expected == actual\n"
seed: 1038
