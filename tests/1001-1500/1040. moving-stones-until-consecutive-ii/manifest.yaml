entry:
  id: 1040
  title: moving-stones-until-consecutive-ii
  params:
    stones:
      type: array
      items:
        type: int
  call:
    cpp: Solution().numMovesStonesII({stones})
    rust: Solution::num_moves_stones_ii({stones})
    python3: Solution().numMovesStonesII({stones})
    python2: Solution().numMovesStonesII({stones})
    ruby: num_moves_stones_ii({stones})
    java: new Solution().numMovesStonesII({stones})
    csharp: new Solution().NumMovesStonesII({stones})
    kotlin: Solution().numMovesStonesII({stones})
    go: numMovesStonesII({stones})
    dart: Solution().numMovesStonesII({stones})
    swift: Solution().numMovesStonesII({stones})
    typescript: numMovesStonesII({stones})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().numMovesStonesII(stones, {result})
    checker:
      "class Checker:\n    def numMovesStonesII(self, stones, result):\n  \
      \      if not isinstance(result, list) or len(result) != 2:\n            return\
      \ False\n        if any((not isinstance(x, int)) for x in result):\n       \
      \     return False\n        stones = sorted(stones)\n        n = len(stones)\n\
      \        max_moves = max(stones[-1] - stones[1] - (n - 2), stones[-2] - stones[0]\
      \ - (n - 2))\n        min_moves = n\n        left = 0\n        for right in\
      \ range(n):\n            while stones[right] - stones[left] + 1 > n:\n     \
      \           left += 1\n            current_window_size = right - left + 1\n\
      \            if current_window_size == n - 1 and stones[right] - stones[left]\
      \ + 1 == n - 1:\n                min_moves = min(min_moves, 2)\n           \
      \ else:\n                min_moves = min(min_moves, n - current_window_size)\n\
      \        return result == [min_moves, max_moves]\n"
seed: 1040
