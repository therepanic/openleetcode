entry:
  id: 1497
  title: check-if-array-pairs-are-divisible-by-k
  params:
    arr:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: "Solution().canArrange({arr}, {k})"
    rust: "Solution::can_arrange({arr}, {k})"
    python3: "Solution().canArrange({arr}, {k})"
    python2: "Solution().canArrange({arr}, {k})"
    ruby: "can_arrange({arr}, {k})"
    java: "new Solution().canArrange({arr}, {k})"
    csharp: "new Solution().CanArrange({arr}, {k})"
    kotlin: "Solution().canArrange({arr}, {k})"
    go: "canArrange({arr}, {k})"
    dart: "Solution().canArrange({arr}, {k})"
    swift: "Solution().canArrange({arr}, {k})"
    typescript: "canArrange({arr}, {k})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().canArrange(arr, k, {result})"
    checker: |
      class Checker:
          def canArrange(self, arr, k, result):
              if type(result) is not bool or len(arr) % 2 != 0 or k < 1:
                  return False
              counts = [0] * k
              for value in arr:
                  counts[value % k] += 1
              if counts[0] % 2:
                  return result is False
              for rem in range(1, (k + 1) // 2):
                  if counts[rem] != counts[k - rem]:
                      return result is False
              if k % 2 == 0 and counts[k // 2] % 2:
                  return result is False
              return result is True
