entry:
  id: 1262
  title: "greatest-sum-divisible-by-three"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().maxSumDivThree({nums})"
    rust: "Solution::max_sum_div_three({nums})"
    python3: "Solution().maxSumDivThree({nums})"
    python2: "Solution().maxSumDivThree({nums})"
    ruby: "max_sum_div_three({nums})"
    java: "new Solution().maxSumDivThree({nums})"
    csharp: "new Solution().MaxSumDivThree({nums})"
    kotlin: "Solution().maxSumDivThree({nums})"
    go: "maxSumDivThree({nums})"
    dart: "Solution().maxSumDivThree({nums})"
    swift: "Solution().maxSumDivThree({nums})"
    typescript: "maxSumDivThree({nums})"
judge:
  type: "exact"
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().maxSumDivThree(nums, {result})"
    checker: |
      class Checker:
          def maxSumDivThree(self, nums, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              total = sum(nums)
              remainder_one = sorted(x for x in nums if x % 3 == 1)
              remainder_two = sorted(x for x in nums if x % 3 == 2)
              remove = 0
              if total % 3 == 1:
                  choices = []
                  if remainder_one:
                      choices.append(remainder_one[0])
                  if len(remainder_two) >= 2:
                      choices.append(remainder_two[0] + remainder_two[1])
                  remove = min(choices) if choices else total
              elif total % 3 == 2:
                  choices = []
                  if remainder_two:
                      choices.append(remainder_two[0])
                  if len(remainder_one) >= 2:
                      choices.append(remainder_one[0] + remainder_one[1])
                  remove = min(choices) if choices else total
              return result == total - remove
