entry:
  id: 1307
  title: "verbal-arithmetic-puzzle"
  params:
    words:
      type: array
      items:
        type: string
    result:
      type: string
  call:
    cpp: "Solution().isSolvable({words}, {result})"
    rust: "Solution::is_solvable({words}, {result})"
    python3: "Solution().isSolvable({words}, {result})"
    python2: "Solution().isSolvable({words}, {result})"
    ruby: "is_solvable({words}, {result})"
    java: "new Solution().isSolvable({words}, {result})"
    csharp: "new Solution().IsSolvable({words}, {result})"
    kotlin: "Solution().isSolvable({words}, {result})"
    go: "isSolvable({words}, {result})"
    dart: "Solution().isSolvable({words}, {result})"
    swift: "Solution().isSolvable({words}, {result})"
    typescript: "isSolvable({words}, {result})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 300

oracle:
  python3:
    call: "Checker().isSolvable(words, result, {result})"
    checker: |
      class Checker:
          def isSolvable(self, words, result, answer):
              if type(answer) is not bool:
                  return False
              letters = set(''.join(words) + result)
              if len(letters) > 10:
                  return False
              if max(map(len, words)) > len(result):
                  return answer is False
              leading = {word[0] for word in words + [result] if len(word) > 1}
              assigned = {}
              used = set()
              width = max(len(result), max(map(len, words)))

              def solve_column(column, carry):
                  if column == width:
                      return carry == 0

                  def add_word(index, total):
                      if index == len(words):
                          digit = total % 10
                          next_carry = total // 10
                          letter = result[-1 - column] if column < len(result) else None
                          if letter is None:
                              return digit == 0 and solve_column(column + 1, next_carry)
                          if letter in assigned:
                              return assigned[letter] == digit and solve_column(column + 1, next_carry)
                          if digit in used or (digit == 0 and letter in leading):
                              return False
                          assigned[letter] = digit
                          used.add(digit)
                          found = solve_column(column + 1, next_carry)
                          used.remove(digit)
                          del assigned[letter]
                          return found

                      word = words[index]
                      if column >= len(word):
                          return add_word(index + 1, total)
                      letter = word[-1 - column]
                      if letter in assigned:
                          return add_word(index + 1, total + assigned[letter])
                      for digit in range(10):
                          if digit in used or (digit == 0 and letter in leading):
                              continue
                          assigned[letter] = digit
                          used.add(digit)
                          if add_word(index + 1, total + digit):
                              return True
                          used.remove(digit)
                          del assigned[letter]
                      return False

                  return add_word(0, carry)

              return solve_column(0, 0) is answer

seed: 1307

