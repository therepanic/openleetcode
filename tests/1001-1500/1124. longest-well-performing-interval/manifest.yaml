entry:
  id: 1124
  title: longest-well-performing-interval
  params:
    hours:
      type: array
      items:
        type: int
  call:
    python3: Solution().longestWPI({hours})
    python2: Solution().longestWPI({hours})
    cpp: Solution().longestWPI({hours})
    rust: Solution::longest_wpi({hours})
    ruby: longest_wpi({hours})
    java: new Solution().longestWPI({hours})
    csharp: new Solution().LongestWPI({hours})
    kotlin: Solution().longestWPI({hours})
    go: longestWPI({hours})
    dart: Solution().longestWPI({hours})
    swift: Solution().longestWPI({hours})
    typescript: longestWPI({hours})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().longestWPI(hours, {result})
    checker:
      "class Checker:\n    def longestWPI(self, hours, result):\n        if\
      \ not isinstance(hours, list):\n            return False\n        if not isinstance(result,\
      \ int):\n            return False\n        score = 0\n        best = 0\n   \
      \     seen_at = {0: -1}\n        for i, h in enumerate(hours):\n           \
      \ if not isinstance(h, int) or h < 0 or h > 16:\n                return False\n\
      \            score += 1 if h > 8 else -1\n            if score > 0:\n      \
      \          best = i + 1\n            elif score - 1 in seen_at:\n          \
      \      best = max(best, i - seen_at[score - 1])\n            if score not in\
      \ seen_at:\n                seen_at[score] = i\n        return result == best\n"
seed: 1124
