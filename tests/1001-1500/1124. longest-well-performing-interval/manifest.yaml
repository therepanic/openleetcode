entry:
  id: 1124
  title: longest-well-performing-interval
  params:
    hours:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().longestWPI({hours})"
    rust: "Solution::longest_wpi({hours})"
    python3: "Solution().longestWPI({hours})"
    python2: "Solution().longestWPI({hours})"
    ruby: "longest_wpi({hours})"
    java: "new Solution().longestWPI({hours})"
    csharp: "new Solution().LongestWPI({hours})"
    kotlin: "Solution().longestWPI({hours})"
    go: "longestWPI({hours})"
    dart: "Solution().longestWPI({hours})"
    swift: "Solution().longestWPI({hours})"
    typescript: "longestWPI({hours})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().longestWPI(hours, {result})"
    checker: |
      class Checker:
          def longestWPI(self, hours, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              if not isinstance(hours, list) or not 1 <= len(hours) <= 10000:
                  return False
              if any(not isinstance(h, int) or isinstance(h, bool) or not 0 <= h <= 16 for h in hours):
                  return False
              prefix = [0]
              for hour in hours:
                  prefix.append(prefix[-1] + (1 if hour > 8 else -1))
              decreasing = []
              for index, value in enumerate(prefix):
                  if not decreasing or value < prefix[decreasing[-1]]:
                      decreasing.append(index)
              best = 0
              for right in range(len(prefix) - 1, -1, -1):
                  while decreasing and prefix[right] > prefix[decreasing[-1]]:
                      best = max(best, right - decreasing.pop())
              return result == best
seed: 1124
