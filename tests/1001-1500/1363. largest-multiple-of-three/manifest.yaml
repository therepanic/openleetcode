oracle:
  python3:
    call: "Checker().largestMultipleOfThree(digits, {result})"
    checker: |
      class Checker:
          def largestMultipleOfThree(self, digits, result):
              if not isinstance(result, str):
                  return False
              if result != '0' and result.startswith('0'):
                  return False
              if any(char < '0' or char > '9' for char in result):
                  return False
              available = [0] * 10
              used = [0] * 10
              for digit in digits:
                  available[digit] += 1
              for char in result:
                  used[ord(char) - ord('0')] += 1
              if any(used[digit] > available[digit] for digit in range(10)):
                  return False
              if sum(digit * used[digit] for digit in range(10)) % 3 != 0:
                  return False

              counts = available[:]
              remainder = sum(digit * counts[digit] for digit in range(10)) % 3
              def remove(group, amount):
                  for digit in group:
                      take = min(amount, counts[digit])
                      counts[digit] -= take
                      amount -= take
                  return amount == 0
              if remainder == 1:
                  if not remove((1, 4, 7), 1):
                      remove((2, 5, 8), 2)
              elif remainder == 2:
                  if not remove((2, 5, 8), 1):
                      remove((1, 4, 7), 2)
              expected = ''.join(str(digit) * counts[digit] for digit in range(9, -1, -1))
              if expected.startswith('0'):
                  expected = '0'
              return result == expected
