judge:
  type: exact
limits:
  time_ms: 1500
  memory_mb: 256
oracle:
  python3:
    call: "Checker().circularPermutation(n, start_value, {result})"
    checker: |
      class Checker:
          def circularPermutation(self, n, start_value, result):
              if type(n) is not int or not 1 <= n <= 16:
                  return False
              if type(start_value) is not int or not 0 <= start_value < (1 << n):
                  return False
              if not isinstance(result, list) or len(result) != (1 << n):
                  return False
              if not all(type(value) is int for value in result):
                  return False
              if result[0] != start_value or set(result) != set(range(1 << n)):
                  return False
              return all(
                  (result[index] ^ result[(index + 1) % len(result)]).bit_count() == 1
                  for index in range(len(result))
              )
