entry:
  id: 1477
  title: "find-two-non-overlapping-sub-arrays-each-with-target-sum"
  params:
    arr:
      type: array
      items:
        type: int
    target:
      type: int
  call:
    cpp: "Solution().minSumOfLengths({arr}, {target})"
    rust: "Solution::min_sum_of_lengths({arr}, {target})"
    python3: "Solution().minSumOfLengths({arr}, {target})"
    python2: "Solution().minSumOfLengths({arr}, {target})"
    ruby: "min_sum_of_lengths({arr}, {target})"
    java: "new Solution().minSumOfLengths({arr}, {target})"
    csharp: "new Solution().MinSumOfLengths({arr}, {target})"
    kotlin: "Solution().minSumOfLengths({arr}, {target})"
    go: "minSumOfLengths({arr}, {target})"
    dart: "Solution().minSumOfLengths({arr}, {target})"
    swift: "Solution().minSumOfLengths({arr}, {target})"
    typescript: "minSumOfLengths({arr}, {target})"
judge:
  type: "exact"
limits:
  time_ms: 900
  memory_mb: 256
oracle:
  python3:
    call: "Checker().minSumOfLengths(arr, target, {result})"
    checker: |
      class Checker:
          def minSumOfLengths(self, arr, target, result):
              n = len(arr)
              best_before = [n + 1] * n
              left = 0
              current = 0
              answer = n + 1
              for right, value in enumerate(arr):
                  current += value
                  while left <= right and current > target:
                      current -= arr[left]
                      left += 1
                  best_before[right] = best_before[right - 1] if right else n + 1
                  if current == target:
                      length = right - left + 1
                      if left and best_before[left - 1] <= n:
                          answer = min(answer, best_before[left - 1] + length)
                      best_before[right] = min(best_before[right], length)
              expected = -1 if answer == n + 1 else answer
              return result == expected
