entry:
  id: 1449
  title: "form-largest-integer-with-digits-that-add-up-to-target"
  params:
    cost:
      type: array
      items:
        type: int
    target:
      type: int
  call:
    cpp: "Solution().largestNumber({cost}, {target})"
    rust: "Solution::largest_number({cost}, {target})"
    python3: "Solution().largestNumber({cost}, {target})"
    python2: "Solution().largestNumber({cost}, {target})"
    ruby: "largest_number({cost}, {target})"
    java: "new Solution().largestNumber({cost}, {target})"
    csharp: "new Solution().LargestNumber({cost}, {target})"
    kotlin: "Solution().largestNumber({cost}, {target})"
    go: "largestNumber({cost}, {target})"
    dart: "Solution().largestNumber({cost}, {target})"
    swift: "Solution().largestNumber({cost}, {target})"
    typescript: "largestNumber({cost}, {target})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 512

oracle:
  python3:
    call: "Checker().largestNumber(cost, target, {result})"
    checker: |
      class Checker:
          def largestNumber(self, cost, target, result):
              if len(cost) != 9:
                  return False
              best = [None] * (target + 1)
              best[0] = ""
              for total in range(1, target + 1):
                  choices = []
                  for digit, c in enumerate(cost, 1):
                      if total >= c and best[total - c] is not None:
                          choices.append(str(digit) + best[total - c])
                  if choices:
                      best[total] = max(choices, key=lambda s: (len(s), s))
              if best[target] is None:
                  return isinstance(result, str) and result == "0"
              if not isinstance(result, str):
                  return False
              return result == best[target]

seed: 1449

