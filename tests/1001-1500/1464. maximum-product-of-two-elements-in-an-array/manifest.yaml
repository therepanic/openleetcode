entry:
  id: 1464
  title: "maximum-product-of-two-elements-in-an-array"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().maxProduct({nums})"
    rust: "Solution::max_product({nums})"
    python3: "Solution().maxProduct({nums})"
    python2: "Solution().maxProduct({nums})"
    ruby: "max_product({nums})"
    java: "new Solution().maxProduct({nums})"
    csharp: "new Solution().MaxProduct({nums})"
    kotlin: "Solution().maxProduct({nums})"
    go: "maxProduct({nums})"
    dart: "Solution().maxProduct({nums})"
    swift: "Solution().maxProduct({nums})"
    typescript: "maxProduct({nums})"
judge:
  type: exact
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().maxProduct(nums, {result})"
    checker: |
      class Checker:
          def maxProduct(self, nums, result):
              largest = max(nums)
              second = max(value for value in nums if value != largest)
              if nums.count(largest) >= 2:
                  second = largest
              return result == (largest - 1) * (second - 1)
seed: 1464
