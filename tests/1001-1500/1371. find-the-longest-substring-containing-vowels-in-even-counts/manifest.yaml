entry:
  id: 1371
  title: "find-the-longest-substring-containing-vowels-in-even-counts"
  params:
    s:
      type: string
  call:
    cpp: "Solution().findTheLongestSubstring({s})"
    rust: "Solution::find_the_longest_substring({s})"
    python3: "Solution().findTheLongestSubstring({s})"
    python2: "Solution().findTheLongestSubstring({s})"
    ruby: "find_the_longest_substring({s})"
    java: "new Solution().findTheLongestSubstring({s})"
    csharp: "new Solution().FindTheLongestSubstring({s})"
    kotlin: "Solution().findTheLongestSubstring({s})"
    go: "findTheLongestSubstring({s})"
    dart: "Solution().findTheLongestSubstring({s})"
    swift: "Solution().findTheLongestSubstring({s})"
    typescript: "findTheLongestSubstring({s})"
judge:
  type: "exact"
limits:
  time_ms: 2000
  memory_mb: 300
oracle:
  python3:
    call: "Checker().findTheLongestSubstring(s, {result})"
    checker: |
      class Checker:
          def findTheLongestSubstring(self, s, result):
              if isinstance(result, bool) or not isinstance(result, int):
                  return False
              if result < 0 or result > len(s):
                  return False
              vowel_index = {'a': 0, 'e': 1, 'i': 2, 'o': 3, 'u': 4}
              prefix_masks = [0]
              for char in s:
                  next_mask = prefix_masks[-1]
                  if char in vowel_index:
                      next_mask ^= 1 << vowel_index[char]
                  prefix_masks.append(next_mask)
              earliest = {}
              expected = 0
              for end, mask in enumerate(prefix_masks):
                  if mask not in earliest:
                      earliest[mask] = end
                  else:
                      expected = max(expected, end - earliest[mask])
              return result == expected
