entry:
  id: 1282
  title: "group-the-people-given-the-group-size-they-belong-to"
  params:
    groupSizes:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().groupThePeople({groupSizes})"
    rust: "Solution::group_the_people({groupSizes})"
    python3: "Solution().groupThePeople({groupSizes})"
    python2: "Solution().groupThePeople({groupSizes})"
    ruby: "group_the_people({groupSizes})"
    java: "new Solution().groupThePeople({groupSizes})"
    csharp: "new Solution().GroupThePeople({groupSizes})"
    kotlin: "Solution().groupThePeople({groupSizes})"
    go: "groupThePeople({groupSizes})"
    dart: "Solution().groupThePeople({groupSizes})"
    swift: "Solution().groupThePeople({groupSizes})"
    typescript: "groupThePeople({groupSizes})"

judge:
  type: "exact"

limits:
  time_ms: 700
  memory_mb: 300

oracle:
  python3:
    call: "Checker().groupThePeople(groupSizes, {result})"
    checker: |
      class Checker:
          def groupThePeople(self, groupSizes, result):
              if not isinstance(result, list):
                  return False
              n = len(groupSizes)
              seen = []
              for group in result:
                  if not isinstance(group, list) or not group:
                      return False
                  first = group[0]
                  if type(first) is not int or first < 0 or first >= n:
                      return False
                  size = groupSizes[first]
                  if size != len(group) or any(type(person) is not int or person < 0 or person >= n or groupSizes[person] != size for person in group):
                      return False
                  seen.extend(group)
              return sorted(seen) == list(range(n)) and len(seen) == len(set(seen))

seed: 128200

