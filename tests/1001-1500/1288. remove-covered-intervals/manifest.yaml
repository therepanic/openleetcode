    python2: "Solution().removeCoveredIntervals({intervals})"
    ruby: "remove_covered_intervals({intervals})"
    java: "new Solution().removeCoveredIntervals({intervals})"
    csharp: "new Solution().RemoveCoveredIntervals({intervals})"
    kotlin: "Solution().removeCoveredIntervals({intervals})"
    go: "removeCoveredIntervals({intervals})"
    dart: "Solution().removeCoveredIntervals({intervals})"
    swift: "Solution().removeCoveredIntervals({intervals})"
    typescript: "removeCoveredIntervals({intervals})"
judge:
  type: "exact"
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().removeCoveredIntervals(intervals, {result})"
    checker: |
      class Checker:
          def removeCoveredIntervals(self, intervals, result):
              if not isinstance(result, int):
                  return False
              kept = 0
              rightmost = -1
              for left, right in sorted(intervals, key=lambda interval: (interval[0], -interval[1])):
                  if right > rightmost:
                      kept += 1
                      rightmost = right
              return result == kept
