entry:
  id: 1027
  title: "longest-arithmetic-subsequence"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().longestArithSeqLength({nums})"
    rust: "Solution::longest_arith_seq_length({nums})"
    python3: "Solution().longestArithSeqLength({nums})"
    python2: "Solution().longestArithSeqLength({nums})"
    ruby: "longest_arith_seq_length({nums})"
    java: "new Solution().longestArithSeqLength({nums})"
    csharp: "new Solution().LongestArithSeqLength({nums})"
    kotlin: "Solution().longestArithSeqLength({nums})"
    go: "longestArithSeqLength({nums})"
    dart: "Solution().longestArithSeqLength({nums})"
    swift: "Solution().longestArithSeqLength({nums})"
    typescript: "longestArithSeqLength({nums})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().longestArithSeqLength(nums, {result})"
    checker: |
      class Checker:
          def longestArithSeqLength(self, nums, result):
              n = len(nums)
              if n <= 2:
                  return result == n
              dp = [{} for _ in range(n)]
              best = 2
              for i in range(n):
                  for j in range(i):
                      d = nums[i] - nums[j]
                      dp[i][d] = dp[j].get(d, 1) + 1
                      if dp[i][d] > best:
                          best = dp[i][d]
              return result == best

seed: 1027

