entry:
  id: 1451
  title: "rearrange-words-in-a-sentence"
  params:
    text:
      type: string
  call:
    cpp: "Solution().arrangeWords({text})"
    rust: "Solution::arrange_words({text})"
    python3: "Solution().arrangeWords({text})"
    python2: "Solution().arrangeWords({text})"
    ruby: "arrange_words({text})"
    java: "new Solution().arrangeWords({text})"
    csharp: "new Solution().ArrangeWords({text})"
    kotlin: "Solution().arrangeWords({text})"
    go: "arrangeWords({text})"
    dart: "Solution().arrangeWords({text})"
    swift: "Solution().arrangeWords({text})"
    typescript: "arrangeWords({text})"
judge:
  type: exact
limits:
  time_ms: 400
  memory_mb: 300
oracle:
  python3:
    call: "Checker().arrangeWords(text, {result})"
    checker: |
      class Checker:
          def arrangeWords(self, text, result):
              words = text.split()
              expected = sorted((word.lower() for word in words), key=len)
              expected = " ".join(expected)
              expected = expected[0].upper() + expected[1:]
              return result == expected
seed: 1451
