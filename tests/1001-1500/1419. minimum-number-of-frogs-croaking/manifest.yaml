limits:
  time_ms: 500
  memory_mb: 256
oracle:
  python3:
    call: "Checker().minNumberOfFrogs(croakOfFrogs, {result})"
    checker: |
      class Checker:
          def minNumberOfFrogs(self, text, result):
              if not isinstance(text, str) or not isinstance(result, int) or isinstance(result, bool):
                  return False
              order = {'c': 0, 'r': 1, 'o': 2, 'a': 3, 'k': 4}
              stages = [0] * 5
              active = 0
              maximum = 0
              for char in text:
                  if char not in order:
                      return result == -1
                  stage = order[char]
                  if stage == 0:
                      stages[0] += 1
                      active += 1
                      maximum = max(maximum, active)
                  else:
                      if stages[stage - 1] <= stages[stage]:
                          return result == -1
                      stages[stage] += 1
                      if stage == 4:
                          active -= 1
              expected = maximum if active == 0 and stages[0] == stages[1] == stages[2] == stages[3] == stages[4] else -1
              return result == expected
seed: 1419
