entry:
  id: 1317
  title: "convert-integer-to-the-sum-of-two-no-zero-integers"
  params:
    n:
      type: int
  call:
    cpp: "Solution().getNoZeroIntegers({n})"
    rust: "Solution::get_no_zero_integers({n})"
    python3: "Solution().getNoZeroIntegers({n})"
    python2: "Solution().getNoZeroIntegers({n})"
    ruby: "get_no_zero_integers({n})"
    java: "new Solution().getNoZeroIntegers({n})"
    csharp: "new Solution().GetNoZeroIntegers({n})"
    kotlin: "Solution().getNoZeroIntegers({n})"
    go: "getNoZeroIntegers({n})"
    dart: "Solution().getNoZeroIntegers({n})"
    swift: "Solution().getNoZeroIntegers({n})"
    typescript: "getNoZeroIntegers({n})"

judge:
  type: "exact"

limits:
  time_ms: 500
  memory_mb: 300

oracle:
  python3:
    call: "Checker().getNoZeroIntegers(n, {result})"
    checker: |
      class Checker:
          def getNoZeroIntegers(self, n, result):
              if not isinstance(result, list) or len(result) != 2:
                  return False
              a, b = result
              if not isinstance(a, int) or not isinstance(b, int) or a <= 0 or b <= 0:
                  return False
              return a + b == n and '0' not in str(a) and '0' not in str(b)

