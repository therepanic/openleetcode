entry:
  id: 1218
  title: "longest-arithmetic-subsequence-of-given-difference"
  params:
    arr:
      type: array
      items:
        type: int
    difference:
      type: int
  call:
    cpp: "Solution().longestSubsequence({arr}, {difference})"
    rust: "Solution::longest_subsequence({arr}, {difference})"
    python3: "Solution().longestSubsequence({arr}, {difference})"
    python2: "Solution().longestSubsequence({arr}, {difference})"
    ruby: "longest_subsequence({arr}, {difference})"
    java: "new Solution().longestSubsequence({arr}, {difference})"
    csharp: "new Solution().LongestSubsequence({arr}, {difference})"
    kotlin: "Solution().longestSubsequence({arr}, {difference})"
    go: "longestSubsequence({arr}, {difference})"
    dart: "Solution().longestSubsequence({arr}, {difference})"
    swift: "Solution().longestSubsequence({arr}, {difference})"
    typescript: "longestSubsequence({arr}, {difference})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().longestSubsequence(arr, difference, {result})"
    checker: |
      class Checker:
          def longestSubsequence(self, arr, difference, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              longest_ending_at = {}
              answer = 0
              for value in arr:
                  predecessor = value - difference
                  longest_ending_at[value] = longest_ending_at.get(predecessor, 0) + 1
                  if longest_ending_at[value] > answer:
                      answer = longest_ending_at[value]
              return result == answer

seed: 1218

