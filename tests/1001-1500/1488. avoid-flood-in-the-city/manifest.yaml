entry:
  id: 1488
  title: "avoid-flood-in-the-city"
  params:
    rains:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().avoidFlood({rains})"
    rust: "Solution::avoid_flood({rains})"
    python3: "Solution().avoidFlood({rains})"
    python2: "Solution().avoidFlood({rains})"
    ruby: "avoid_flood({rains})"
    java: "new Solution().avoidFlood({rains})"
    csharp: "new Solution().AvoidFlood({rains})"
    kotlin: "Solution().avoidFlood({rains})"
    go: "avoidFlood({rains})"
    dart: "Solution().avoidFlood({rains})"
    swift: "Solution().avoidFlood({rains})"
    typescript: "avoidFlood({rains})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 300
oracle:
  python3:
    call: "Checker().avoidFlood(rains, {result})"
    checker: |
      class Checker:
          def avoidFlood(self, rains, result):
              if not isinstance(result, list):
                  return False
              if result == []:
                  size = len(rains)
                  tree = [0] * (size + 1)

                  def update(index, delta):
                      index += 1
                      while index <= size:
                          tree[index] += delta
                          index += index & -index

                  def prefix(end):
                      total = 0
                      while end > 0:
                          total += tree[end]
                          end -= end & -end
                      return total

                  def kth(order):
                      index = 0
                      bit = 1 << (size.bit_length() - 1)
                      while bit:
                          next_index = index + bit
                          if next_index <= size and tree[next_index] < order:
                              index = next_index
                              order -= tree[next_index]
                          bit >>= 1
                      return index

                  available = 0
                  last_rain = {}
                  for day, lake in enumerate(rains):
                      if lake == 0:
                          update(day, 1)
                          available += 1
                      elif lake in last_rain:
                          before = prefix(last_rain[lake] + 1)
                          if available <= before:
                              return True
                          update(kth(before + 1), -1)
                          available -= 1
                          last_rain[lake] = day
                      else:
                          last_rain[lake] = day
                  return False
              if len(result) != len(rains):
                  return False
              full = set()
              for day, lake in enumerate(rains):
                  selected = result[day]
                  if lake > 0:
                      if selected != -1 or lake in full:
                          return False
                      full.add(lake)
                  else:
                      if selected <= 0:
                          return False
                      full.discard(selected)
              return True
seed: 1488
