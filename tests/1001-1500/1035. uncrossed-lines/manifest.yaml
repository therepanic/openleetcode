judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().maxUncrossedLines(nums1, nums2, {result})"
    checker: |
      class Checker:
          def maxUncrossedLines(self, nums1, nums2, result):
              m = len(nums1)
              n = len(nums2)
              dp = [[0] * (n + 1) for _ in range(m + 1)]
              for i in range(1, m + 1):
                  a = nums1[i - 1]
                  for j in range(1, n + 1):
                      if a == nums2[j - 1]:
                          dp[i][j] = dp[i - 1][j - 1] + 1
                      else:
                          dp[i][j] = max(dp[i - 1][j], dp[i][j - 1])
              return dp[m][n] == result
