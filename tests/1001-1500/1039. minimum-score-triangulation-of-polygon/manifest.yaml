      type: array
      items:
        type: int
  call:
    cpp: Solution().minScoreTriangulation({values})
    rust: Solution::min_score_triangulation({values})
    python3: Solution().minScoreTriangulation({values})
    python2: Solution().minScoreTriangulation({values})
    ruby: min_score_triangulation({values})
    java: new Solution().minScoreTriangulation({values})
    csharp: new Solution().MinScoreTriangulation({values})
    kotlin: Solution().minScoreTriangulation({values})
    go: minScoreTriangulation({values})
    dart: Solution().minScoreTriangulation({values})
    swift: Solution().minScoreTriangulation({values})
    typescript: minScoreTriangulation({values})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().minScoreTriangulation(values, {result})
    checker:
      "class Checker:\n    def minScoreTriangulation(self, values, result):\n\
      \        n = len(values)\n        dp = [[0] * n for _ in range(n)]\n       \
      \ for i in range(n - 1, -1, -1):\n            for j in range(i + 2, n):\n  \
      \              best = None\n                for k in range(i + 1, j):\n    \
      \                cand = dp[i][k] + values[i] * values[k] * values[j] + dp[k][j]\n\
      \                    if best is None or cand < best:\n                     \
      \   best = cand\n                dp[i][j] = 0 if best is None else best\n  \
      \      return dp[0][n - 1] == result\n"
seed: 1039
