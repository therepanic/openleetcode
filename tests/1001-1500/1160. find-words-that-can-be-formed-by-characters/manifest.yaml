entry:
  id: 1160
  title: "find-words-that-can-be-formed-by-characters"
  params:
    words:
      type: array
      items:
        type: string
    chars:
      type: string
  call:
    cpp: "Solution().countCharacters({words}, {chars})"
    rust: "Solution::count_characters({words}, {chars})"
    python3: "Solution().countCharacters({words}, {chars})"
    python2: "Solution().countCharacters({words}, {chars})"
    ruby: "count_characters({words}, {chars})"
    java: "new Solution().countCharacters({words}, {chars})"
    csharp: "new Solution().CountCharacters({words}, {chars})"
    kotlin: "Solution().countCharacters({words}, {chars})"
    go: "countCharacters({words}, {chars})"
    dart: "Solution().countCharacters({words}, {chars})"
    swift: "Solution().countCharacters({words}, {chars})"
    typescript: "countCharacters({words}, {chars})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().countCharacters(words, chars, {result})"
    checker: |
      class Checker:
          def countCharacters(self, words, chars, result):
              available = {}
              for c in chars:
                  available[c] = available.get(c, 0) + 1
              expected = 0
              for word in words:
                  needed = {}
                  for c in word:
                      needed[c] = needed.get(c, 0) + 1
                  if all(needed[c] <= available.get(c, 0) for c in needed):
                      expected += len(word)
              return result == expected

seed: 1160

