entry:
  id: 1373
  title: "maximum-sum-bst-in-binary-tree"
  params:
    root:
      type: tree_node
  call:
    cpp: "Solution().maxSumBST({root})"
    rust: "Solution::max_sum_bst({root})"
    python3: "Solution().maxSumBST({root})"
    python2: "Solution().maxSumBST({root})"
    ruby: "max_sum_bst({root})"
    java: "new Solution().maxSumBST({root})"
    csharp: "new Solution().MaxSumBST({root})"
    kotlin: "Solution().maxSumBST({root})"
    go: "maxSumBST({root})"
    dart: "Solution().maxSumBST({root})"
    swift: "Solution().maxSumBST({root})"
    typescript: "maxSumBST({root})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().maxSumBST(root, {result})"
    checker: |
      class Checker:
          def maxSumBST(self, root, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False

              if isinstance(root, list):
                  class Node:
                      def __init__(self, value):
                          self.val = value
                          self.left = None
                          self.right = None

                  serialized_nodes = [None if value is None else Node(value) for value in root]
                  child = 1
                  for node in serialized_nodes:
                      if node is not None:
                          if child < len(serialized_nodes):
                              node.left = serialized_nodes[child]
                          child += 1
                          if child < len(serialized_nodes):
                              node.right = serialized_nodes[child]
                          child += 1
                  root = serialized_nodes[0] if serialized_nodes else None

              nodes = []
              stack = [root] if root is not None else []
              while stack:
                  node = stack.pop()
                  nodes.append(node)
                  if node.left is not None:
                      stack.append(node.left)
                  if node.right is not None:
                      stack.append(node.right)

              best = 0
              for candidate in nodes:
                  total = 0
                  previous = None
                  valid = True
                  traversal = []
                  current = candidate
                  while traversal or current is not None:
                      while current is not None:
                          traversal.append(current)
                          current = current.left
                      current = traversal.pop()
                      if previous is not None and current.val <= previous:
                          valid = False
                          break
                      previous = current.val
                      total += current.val
                      current = current.right
                  if valid and total > best:
                      best = total
              return result == best

seed: 1373

