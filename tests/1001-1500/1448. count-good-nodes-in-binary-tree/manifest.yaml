entry:
  id: 1448
  title: "count-good-nodes-in-binary-tree"
  params:
    root:
      type: tree_node
  call:
    cpp: "Solution().goodNodes({root})"
    rust: "Solution::good_nodes({root})"
    python3: "Solution().goodNodes({root})"
    python2: "Solution().goodNodes({root})"
    ruby: "good_nodes({root})"
    java: "new Solution().goodNodes({root})"
    csharp: "new Solution().GoodNodes({root})"
    kotlin: "Solution().goodNodes({root})"
    go: "goodNodes({root})"
    dart: "Solution().goodNodes({root})"
    swift: "Solution().goodNodes({root})"
    typescript: "goodNodes({root})"
judge:
  type: "exact"
limits:
  time_ms: 900
  memory_mb: 300
oracle:
  python3:
    call: "Checker().goodNodes(root, {result})"
    checker: |
      class Checker:
          def goodNodes(self, root, result):
              class Node:
                  def __init__(self, value):
                      self.val = value
                      self.left = None
                      self.right = None
              nodes = [Node(value) if value is not None else None for value in root]
              child = 1
              for node in nodes:
                  if node is not None:
                      if child < len(nodes):
                          node.left = nodes[child]
                          child += 1
                      if child < len(nodes):
                          node.right = nodes[child]
                          child += 1
              root = nodes[0]
              def visit(node, path_max):
                  if node is None:
                      return 0
                  good = 1 if node.val >= path_max else 0
                  next_max = max(path_max, node.val)
                  return good + visit(node.left, next_max) + visit(node.right, next_max)
              return result == visit(root, root.val)
seed: 1448
