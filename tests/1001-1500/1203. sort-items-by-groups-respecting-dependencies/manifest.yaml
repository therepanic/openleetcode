entry:
  id: 1203
  title: sort-items-by-groups-respecting-dependencies
  params:
    n:
      type: int
    m:
      type: int
    group:
      type: array
      items:
        type: int
    beforeItems:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().sortItems({n}, {m}, {group}, {beforeItems})"
    rust: "Solution::sort_items({n}, {m}, {group}, {beforeItems})"
    python3: "Solution().sortItems({n}, {m}, {group}, {beforeItems})"
    python2: "Solution().sortItems({n}, {m}, {group}, {beforeItems})"
    ruby: "sort_items({n}, {m}, {group}, {beforeItems})"
    java: "new Solution().sortItems({n}, {m}, {group}, {beforeItems})"
    csharp: "new Solution().SortItems({n}, {m}, {group}, {beforeItems})"
    kotlin: "Solution().sortItems({n}, {m}, {group}, {beforeItems})"
    go: "sortItems({n}, {m}, {group}, {beforeItems})"
    dart: "Solution().sortItems({n}, {m}, {group}, {beforeItems})"
    swift: "Solution().sortItems({n}, {m}, {group}, {beforeItems})"
    typescript: "sortItems({n}, {m}, {group}, {beforeItems})"
judge:
  type: exact
limits:
  time_ms: 5000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().sortItems(n, m, group, beforeItems, {result})"
    checker: |
      class Checker:
          def sortItems(self, n, m, group, beforeItems, result):
              if not isinstance(result, list) or result == [] or len(result) != n:
                  return False
              if sorted(result) != list(range(n)):
                  return False
              position = [0] * n
              for index, item in enumerate(result):
                  position[item] = index
              for item, predecessors in enumerate(beforeItems):
                  for before in predecessors:
                      if position[before] >= position[item]:
                          return False
              first = [n] * m
              last = [-1] * m
              count = [0] * m
              for item, item_group in enumerate(group):
                  if 0 <= item_group < m:
                      index = position[item]
                      first[item_group] = min(first[item_group], index)
                      last[item_group] = max(last[item_group], index)
                      count[item_group] += 1
              for item_group in range(m):
                  if count[item_group] and last[item_group] - first[item_group] + 1 != count[item_group]:
                      return False
              return True
seed: 1203
