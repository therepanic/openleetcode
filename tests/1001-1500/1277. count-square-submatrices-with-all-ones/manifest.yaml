entry:
  id: 1277
  title: "count-square-submatrices-with-all-ones"
  params:
    matrix:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().countSquares({matrix})"
    rust: "Solution::count_squares({matrix})"
    python3: "Solution().countSquares({matrix})"
    python2: "Solution().countSquares({matrix})"
    ruby: "count_squares({matrix})"
    java: "new Solution().countSquares({matrix})"
    csharp: "new Solution().CountSquares({matrix})"
    kotlin: "Solution().countSquares({matrix})"
    go: "countSquares({matrix})"
    dart: "Solution().countSquares({matrix})"
    swift: "Solution().countSquares({matrix})"
    typescript: "countSquares({matrix})"
judge:
  type: "exact"
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().countSquares(matrix, {result})"
    checker: |
      class Checker:
          def countSquares(self, matrix, result):
              rows = len(matrix)
              cols = len(matrix[0]) if rows else 0
              total = 0
              previous = [0] * (cols + 1)
              for row in range(rows):
                  current = [0] * (cols + 1)
                  for col in range(1, cols + 1):
                      if matrix[row][col - 1] == 1:
                          current[col] = min(
                              previous[col], current[col - 1], previous[col - 1]
                          ) + 1
                          total += current[col]
                  previous = current
              return result == total
seed: 1277
