entry:
  id: 1353
  title: "maximum-number-of-events-that-can-be-attended"
  params:
    events:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().maxEvents({events})"
    rust: "Solution::max_events({events})"
    python3: "Solution().maxEvents({events})"
    python2: "Solution().maxEvents({events})"
    ruby: "max_events({events})"
    java: "new Solution().maxEvents({events})"
    csharp: "new Solution().MaxEvents({events})"
    kotlin: "Solution().maxEvents({events})"
    go: "maxEvents({events})"
    dart: "Solution().maxEvents({events})"
    swift: "Solution().maxEvents({events})"
    typescript: "maxEvents({events})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().maxEvents(events, {result})"
    checker: |
      class Checker:
          def maxEvents(self, events, result):
              if isinstance(result, bool) or not isinstance(result, int):
                  return False
              parent = {}

              def find(day):
                  trail = []
                  while day in parent:
                      trail.append(day)
                      day = parent[day]
                  for seen in trail:
                      parent[seen] = day
                  return day

              attended = 0
              for start, end in sorted(events, key=lambda event: event[1]):
                  day = find(start)
                  if day <= end:
                      attended += 1
                      parent[day] = find(day + 1)
              return result == attended
