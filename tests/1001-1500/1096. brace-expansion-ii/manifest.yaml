entry:
  id: 1096
  title: brace-expansion-ii
  params:
    expression:
      type: string
  call:
    cpp: Solution().braceExpansionII({expression})
    rust: Solution::brace_expansion_ii({expression})
    python3: Solution().braceExpansionII({expression})
    python2: Solution().braceExpansionII({expression})
    ruby: brace_expansion_ii({expression})
    java: new Solution().braceExpansionII({expression})
    csharp: new Solution().BraceExpansionII({expression})
    kotlin: Solution().braceExpansionII({expression})
    go: braceExpansionII({expression})
    dart: Solution().braceExpansionII({expression})
    swift: Solution().braceExpansionII({expression})
    typescript: braceExpansionII({expression})

judge:
  type: exact

limits:
  time_ms: 1000
  memory_mb: 128

oracle:
  python3:
    call: Checker().check(expression, {result})
    checker: |
      class Checker(object):
          def check(self, expression, result):
              stack = []
              res = []
              cur = []
              for ch in expression:
                  if ch.isalpha():
                      cur = [c + ch for c in (cur or [''])]
                  elif ch == '{':
                      stack.append(res)
                      stack.append(cur)
                      res, cur = [], []
                  elif ch == '}':
                      pre = stack.pop()
                      pre_res = stack.pop()
                      cur = [p + c for c in res + cur for p in (pre or [''])]
                      res = pre_res
                  elif ch == ',':
                      res += cur
                      cur = []
              expected = sorted(set(res + cur))
              return result == expected

seed: 1096

