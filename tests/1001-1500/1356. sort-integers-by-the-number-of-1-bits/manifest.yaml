entry:
  id: 1356
  title: "sort-integers-by-the-number-of-1-bits"
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().sortByBits({arr})"
    rust: "Solution::sort_by_bits({arr})"
    python3: "Solution().sortByBits({arr})"
    python2: "Solution().sortByBits({arr})"
    ruby: "sort_by_bits({arr})"
    java: "new Solution().sortByBits({arr})"
    csharp: "new Solution().SortByBits({arr})"
    kotlin: "Solution().sortByBits({arr})"
    go: "sortByBits({arr})"
    dart: "Solution().sortByBits({arr})"
    swift: "Solution().sortByBits({arr})"
    typescript: "sortByBits({arr})"

judge:
  type: "exact"

limits:
  time_ms: 300
  memory_mb: 300

oracle:
  python3:
    call: "Checker().sortByBits(arr, {result})"
    checker: |
      class Checker:
          def sortByBits(self, arr, result):
              if not isinstance(result, list) or len(result) != len(arr):
                  return False
              if sorted(result) != sorted(arr):
                  return False
              def ones(value):
                  total = 0
                  while value:
                      total += value & 1
                      value >>= 1
                  return total
              for index in range(1, len(result)):
                  if (ones(result[index - 1]), result[index - 1]) > (ones(result[index]), result[index]):
                      return False
              return True

seed: 1356001

