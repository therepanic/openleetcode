judge:
  type: exact
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().distanceBetweenBusStops(distance, start_value, destination, {result})"
    checker: |
      class Checker:
          def distanceBetweenBusStops(self, distance, start_value, destination, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              lo, hi = sorted((start_value, destination))
              direct = sum(distance[lo:hi])
              return result == min(direct, sum(distance) - direct)
