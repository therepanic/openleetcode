entry:
  id: 1048
  title: "longest-string-chain"
  params:
    words:
      type: array
      items:
        type: string
  call:
    cpp: "Solution().longestStrChain({words})"
    rust: "Solution::longest_str_chain({words})"
    python3: "Solution().longestStrChain({words})"
    python2: "Solution().longestStrChain({words})"
    ruby: "longest_str_chain({words})"
    java: "new Solution().longestStrChain({words})"
    csharp: "new Solution().LongestStrChain({words})"
    kotlin: "Solution().longestStrChain({words})"
    go: "longestStrChain({words})"
    dart: "Solution().longestStrChain({words})"
    swift: "Solution().longestStrChain({words})"
    typescript: "longestStrChain({words})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().longestStrChain(words, {result})"
    checker: |
      class Checker:
          def longestStrChain(self, words, result) -> bool:
              words = sorted(words, key=len)
              dp = {}
              best = 0
              for word in words:
                  cur = 1
                  for i in range(len(word)):
                      pred = word[:i] + word[i + 1:]
                      if pred in dp and dp[pred] + 1 > cur:
                          cur = dp[pred] + 1
                  dp[word] = cur
                  if cur > best:
                      best = cur
              return result == best

seed: 1048

