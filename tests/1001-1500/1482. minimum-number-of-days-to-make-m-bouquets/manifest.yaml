entry:
  id: 1482
  title: "minimum-number-of-days-to-make-m-bouquets"
  params:
    bloomDay:
      type: array
      items:
        type: int
    m:
      type: int
    k:
      type: int
  call:
    cpp: "Solution().minDays({bloomDay}, {m}, {k})"
    rust: "Solution::min_days({bloomDay}, {m}, {k})"
    python3: "Solution().minDays({bloomDay}, {m}, {k})"
    python2: "Solution().minDays({bloomDay}, {m}, {k})"
    ruby: "min_days({bloomDay}, {m}, {k})"
    java: "new Solution().minDays({bloomDay}, {m}, {k})"
    csharp: "new Solution().MinDays({bloomDay}, {m}, {k})"
    kotlin: "Solution().minDays({bloomDay}, {m}, {k})"
    go: "minDays({bloomDay}, {m}, {k})"
    dart: "Solution().minDays({bloomDay}, {m}, {k})"
    swift: "Solution().minDays({bloomDay}, {m}, {k})"
    typescript: "minDays({bloomDay}, {m}, {k})"
judge:
  type: "exact"
limits:
  time_ms: 900
  memory_mb: 256
oracle:
  python3:
    call: "Checker().minDays(bloomDay, m, k, {result})"
    checker: |
      class Checker:
          def minDays(self, bloomDay, m, k, result):
              if m * k > len(bloomDay):
                  return result == -1
              low = min(bloomDay)
              high = max(bloomDay)
              while low < high:
                  day = (low + high) // 2
                  bouquets = 0
                  run = 0
                  for bloom in bloomDay:
                      if bloom <= day:
                          run += 1
                          if run == k:
                              bouquets += 1
                              run = 0
                      else:
                          run = 0
                  if bouquets >= m:
                      high = day
                  else:
                      low = day + 1
              return result == low
seed: 1482
