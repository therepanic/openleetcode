  title: "max-dot-product-of-two-subsequences"
  params:
    nums1:
      type: array
      items:
        type: int
    nums2:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().maxDotProduct({nums1}, {nums2})"
    rust: "Solution::max_dot_product({nums1}, {nums2})"
    python3: "Solution().maxDotProduct({nums1}, {nums2})"
    python2: "Solution().maxDotProduct({nums1}, {nums2})"
    ruby: "max_dot_product({nums1}, {nums2})"
    java: "new Solution().maxDotProduct({nums1}, {nums2})"
    csharp: "new Solution().MaxDotProduct({nums1}, {nums2})"
    kotlin: "Solution().maxDotProduct({nums1}, {nums2})"
    go: "maxDotProduct({nums1}, {nums2})"
    dart: "Solution().maxDotProduct({nums1}, {nums2})"
    swift: "Solution().maxDotProduct({nums1}, {nums2})"
    typescript: "maxDotProduct({nums1}, {nums2})"
judge:
  type: "exact"
limits:
  time_ms: 900
  memory_mb: 256
oracle:
  python3:
    call: "Checker().maxDotProduct(nums1, nums2, {result})"
    checker: |
      class Checker:
          def maxDotProduct(self, nums1, nums2, result):
              n = len(nums1)
              m = len(nums2)
              neg = -10 ** 18
              dp = [[neg] * (m + 1) for _ in range(n + 1)]
              for i in range(n - 1, -1, -1):
                  for j in range(m - 1, -1, -1):
                      product = nums1[i] * nums2[j]
                      dp[i][j] = max(product, product + dp[i + 1][j + 1], dp[i + 1][j], dp[i][j + 1])
              return result == dp[0][0]
seed: 1458
