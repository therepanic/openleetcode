entry:
  id: 1359
  title: "count-all-valid-pickup-and-delivery-options"
  params:
    n:
      type: int
  call:
    cpp: "Solution().countOrders({n})"
    rust: "Solution::count_orders({n})"
    python3: "Solution().countOrders({n})"
    python2: "Solution().countOrders({n})"
    ruby: "count_orders({n})"
    java: "new Solution().countOrders({n})"
    csharp: "new Solution().CountOrders({n})"
    kotlin: "Solution().countOrders({n})"
    go: "countOrders({n})"
    dart: "Solution().countOrders({n})"
    swift: "Solution().countOrders({n})"
    typescript: "countOrders({n})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().countOrders(n, {result})"
    checker: |
      class Checker:
          def countOrders(self, n, result):
              if not isinstance(n, int) or not 1 <= n <= 500:
                  return False
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              modulo = 10 ** 9 + 7
              factorial = 1
              for value in range(2, 2 * n + 1):
                  factorial = factorial * value % modulo
              expected = factorial * pow(pow(2, n, modulo), modulo - 2, modulo) % modulo
              return result == expected

