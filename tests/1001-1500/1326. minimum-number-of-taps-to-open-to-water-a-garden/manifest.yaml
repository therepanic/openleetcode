entry:
  id: 1326
  title: "minimum-number-of-taps-to-open-to-water-a-garden"
  params:
    n:
      type: int
    ranges:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().minTaps({n}, {ranges})"
    rust: "Solution::min_taps({n}, {ranges})"
    python3: "Solution().minTaps({n}, {ranges})"
    python2: "Solution().minTaps({n}, {ranges})"
    ruby: "min_taps({n}, {ranges})"
    java: "new Solution().minTaps({n}, {ranges})"
    csharp: "new Solution().MinTaps({n}, {ranges})"
    kotlin: "Solution().minTaps({n}, {ranges})"
    go: "minTaps({n}, {ranges})"
    dart: "Solution().minTaps({n}, {ranges})"
    swift: "Solution().minTaps({n}, {ranges})"
    typescript: "minTaps({n}, {ranges})"
judge:
  type: "exact"
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().minTaps(n, ranges, {result})"
    checker: |
      class Checker:
          def minTaps(self, n, ranges, result):
              if isinstance(result, bool) or not isinstance(result, int):
                  return False
              if n < 1 or len(ranges) != n + 1:
                  return False

              intervals = []
              for position, radius in enumerate(ranges):
                  if radius < 0 or radius > 100:
                      return False
                  intervals.append((max(0, position - radius), min(n, position + radius)))
              intervals.sort()

              covered = 0
              taps = 0
              index = 0
              while covered < n:
                  furthest = covered
                  while index < len(intervals) and intervals[index][0] <= covered:
                      furthest = max(furthest, intervals[index][1])
                      index += 1
                  if furthest == covered:
                      return result == -1
                  covered = furthest
                  taps += 1
              return result == taps
