entry:
  id: 1018
  title: "binary-prefix-divisible-by-5"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().prefixesDivBy5({nums})"
    rust: "Solution::prefixes_div_by5({nums})"
    python3: "Solution().prefixesDivBy5({nums})"
    python2: "Solution().prefixesDivBy5({nums})"
    ruby: "prefixes_div_by5({nums})"
    java: "new Solution().prefixesDivBy5({nums})"
    csharp: "new Solution().PrefixesDivBy5({nums})"
    kotlin: "Solution().prefixesDivBy5({nums})"
    go: "prefixesDivBy5({nums})"
    dart: "Solution().prefixesDivBy5({nums})"
    swift: "Solution().prefixesDivBy5({nums})"
    typescript: "prefixesDivBy5({nums})"
judge:
  type: "exact"
limits:
  time_ms: 200
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(nums, {result})"
    checker: |
      class Checker:
          def check(self, nums, result):
              expected = []
              val = 0
              for bit in nums:
                  val = (val * 2 + bit) % 5
                  expected.append(val == 0)
              return result == expected
seed: 1018
tests:
