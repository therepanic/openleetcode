  title: number-of-burgers-with-no-waste-of-ingredients
  params:
    tomatoSlices:
      type: int
    cheeseSlices:
      type: int
  call:
    cpp: "Solution().numOfBurgers({tomatoSlices}, {cheeseSlices})"
    rust: "Solution::num_of_burgers({tomatoSlices}, {cheeseSlices})"
    python3: "Solution().numOfBurgers({tomatoSlices}, {cheeseSlices})"
    python2: "Solution().numOfBurgers({tomatoSlices}, {cheeseSlices})"
    ruby: "num_of_burgers({tomatoSlices}, {cheeseSlices})"
    java: "new Solution().numOfBurgers({tomatoSlices}, {cheeseSlices})"
    csharp: "new Solution().NumOfBurgers({tomatoSlices}, {cheeseSlices})"
    kotlin: "Solution().numOfBurgers({tomatoSlices}, {cheeseSlices})"
    go: "numOfBurgers({tomatoSlices}, {cheeseSlices})"
    dart: "Solution().numOfBurgers({tomatoSlices}, {cheeseSlices})"
    swift: "Solution().numOfBurgers({tomatoSlices}, {cheeseSlices})"
    typescript: "numOfBurgers({tomatoSlices}, {cheeseSlices})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().numOfBurgers(tomatoSlices, cheeseSlices, {result})"
    checker: |
      class Checker:
          def numOfBurgers(self, tomatoSlices, cheeseSlices, result):
              if not isinstance(result, list):
                  return False
              feasible = (
                  tomatoSlices % 2 == 0
                  and 2 * cheeseSlices <= tomatoSlices <= 4 * cheeseSlices
              )
              if not feasible:
                  return result == []
              if len(result) != 2 or not all(isinstance(x, int) and x >= 0 for x in result):
                  return False
              jumbo, small = result
              return (
                  jumbo + small == cheeseSlices
                  and 4 * jumbo + 2 * small == tomatoSlices
              )
seed: 1276
