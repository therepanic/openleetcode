entry:
  id: 1431
  title: "kids-with-the-greatest-number-of-candies"
  params:
    candies:
      type: array
      items:
        type: int
    extraCandies:
      type: int
  call:
    cpp: "Solution().kidsWithCandies({candies}, {extraCandies})"
    rust: "Solution::kids_with_candies({candies}, {extraCandies})"
    python3: "Solution().kidsWithCandies({candies}, {extraCandies})"
    python2: "Solution().kidsWithCandies({candies}, {extraCandies})"
    ruby: "kids_with_candies({candies}, {extraCandies})"
    java: "new Solution().kidsWithCandies({candies}, {extraCandies})"
    csharp: "new Solution().KidsWithCandies({candies}, {extraCandies})"
    kotlin: "Solution().kidsWithCandies({candies}, {extraCandies})"
    go: "kidsWithCandies({candies}, {extraCandies})"
    dart: "Solution().kidsWithCandies({candies}, {extraCandies})"
    swift: "Solution().kidsWithCandies({candies}, {extraCandies})"
    typescript: "kidsWithCandies({candies}, {extraCandies})"
judge:
  type: exact
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().kidsWithCandies(candies, extraCandies, {result})"
    checker: |
      class Checker:
          def kidsWithCandies(self, candies, extra, result):
              if not isinstance(result, list) or len(result) != len(candies):
                  return False
              if any(type(item) is not bool for item in result):
                  return False
              highest = max(candies)
              return result == [count + extra >= highest for count in candies]
seed: 1431
