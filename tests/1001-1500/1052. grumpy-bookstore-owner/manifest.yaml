    grumpy:
      type: array
      items:
        type: int
    minutes:
      type: int
  call:
    cpp: "Solution().maxSatisfied({customers}, {grumpy}, {minutes})"
    rust: "Solution::max_satisfied({customers}, {grumpy}, {minutes})"
    python3: "Solution().maxSatisfied({customers}, {grumpy}, {minutes})"
    python2: "Solution().maxSatisfied({customers}, {grumpy}, {minutes})"
    ruby: "max_satisfied({customers}, {grumpy}, {minutes})"
    java: "new Solution().maxSatisfied({customers}, {grumpy}, {minutes})"
    csharp: "new Solution().MaxSatisfied({customers}, {grumpy}, {minutes})"
    kotlin: "Solution().maxSatisfied({customers}, {grumpy}, {minutes})"
    go: "maxSatisfied({customers}, {grumpy}, {minutes})"
    dart: "Solution().maxSatisfied({customers}, {grumpy}, {minutes})"
    swift: "Solution().maxSatisfied({customers}, {grumpy}, {minutes})"
    typescript: "maxSatisfied({customers}, {grumpy}, {minutes})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().maxSatisfied(customers, grumpy, minutes, {result})"
    checker: |
      class Checker:
          def maxSatisfied(self, customers, grumpy, minutes, result):
              base = sum(c for c, g in zip(customers, grumpy) if not g)
              gain = sum(c for c, g in zip(customers[:minutes], grumpy[:minutes]) if g)
              best = gain
              cur = gain
              n = len(customers)
              for i in range(minutes, n):
                  if grumpy[i]:
                      cur += customers[i]
                  if grumpy[i - minutes]:
                      cur -= customers[i - minutes]
                  if cur > best:
                      best = cur
              return result == base + best
