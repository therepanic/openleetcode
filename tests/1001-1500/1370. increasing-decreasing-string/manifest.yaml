entry:
  id: 1370
  title: increasing-decreasing-string
  params:
    s:
      type: string
  call:
    cpp: "Solution().sortString({s})"
    rust: "Solution::sort_string({s})"
    python3: "Solution().sortString({s})"
    python2: "Solution().sortString({s})"
    ruby: "sort_string({s})"
    java: "new Solution().sortString({s})"
    csharp: "new Solution().SortString({s})"
    kotlin: "Solution().sortString({s})"
    go: "sortString({s})"
    dart: "Solution().sortString({s})"
    swift: "Solution().sortString({s})"
    typescript: "sortString({s})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().sortString(s, {result})"
    checker: |
      class Checker:
          def sortString(self, s, result):
              if not isinstance(result, str) or len(result) != len(s):
                  return False
              remaining = [0] * 26
              for ch in s:
                  remaining[ord(ch) - ord('a')] += 1
              expected = []
              while any(remaining):
                  for index in range(26):
                      if remaining[index]:
                          expected.append(chr(ord('a') + index))
                          remaining[index] -= 1
                  for index in range(25, -1, -1):
                      if remaining[index]:
                          expected.append(chr(ord('a') + index))
                          remaining[index] -= 1
              return result == ''.join(expected)

