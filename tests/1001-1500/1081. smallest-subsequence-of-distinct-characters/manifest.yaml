entry:
  id: 1081
  title: smallest-subsequence-of-distinct-characters
  params:
    s:
      type: string
  call:
    cpp: "Solution().smallestSubsequence({s})"
    rust: "Solution::smallest_subsequence({s})"
    python3: "Solution().smallestSubsequence({s})"
    python2: "Solution().smallestSubsequence({s})"
    ruby: "smallest_subsequence({s})"
    java: "new Solution().smallestSubsequence({s})"
    csharp: "new Solution().SmallestSubsequence({s})"
    kotlin: "Solution().smallestSubsequence({s})"
    go: "smallestSubsequence({s})"
    dart: "Solution().smallestSubsequence({s})"
    swift: "Solution().smallestSubsequence({s})"
    typescript: "smallestSubsequence({s})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().smallestSubsequence(s, {result})"
    checker: |
      class Checker:
          def smallestSubsequence(self, s, result):
              last = {}
              for i, ch in enumerate(s):
                  last[ch] = i
              stack = []
              seen = set()
              for i, ch in enumerate(s):
                  if ch in seen:
                      continue
                  while stack and stack[-1] > ch and last[stack[-1]] > i:
                      seen.remove(stack.pop())
                  stack.append(ch)
                  seen.add(ch)
              return "".join(stack) == result
seed: 1081
