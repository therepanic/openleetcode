entry:
  id: 1365
  title: "how-many-numbers-are-smaller-than-the-current-number"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    python3: "Solution().smallerNumbersThanCurrent({nums})"
    python2: "Solution().smallerNumbersThanCurrent({nums})"
    cpp: "Solution().smallerNumbersThanCurrent({nums})"
    rust: "Solution::smaller_numbers_than_current({nums})"
    ruby: "smaller_numbers_than_current({nums})"
    java: "new Solution().smallerNumbersThanCurrent({nums})"
    csharp: "new Solution().SmallerNumbersThanCurrent({nums})"
    kotlin: "Solution().smallerNumbersThanCurrent({nums})"
    go: "smallerNumbersThanCurrent({nums})"
    dart: "Solution().smallerNumbersThanCurrent({nums})"
    swift: "Solution().smallerNumbersThanCurrent({nums})"
    typescript: "smallerNumbersThanCurrent({nums})"
judge:
  type: "exact"
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().smallerNumbersThanCurrent(nums, {result})"
    checker: |
      class Checker:
          def smallerNumbersThanCurrent(self, nums, result):
              if not isinstance(result, list) or len(result) != len(nums):
                  return False
              for index, value in enumerate(nums):
                  if not isinstance(result[index], int):
                      return False
                  if result[index] != sum(1 for other in nums if other < value):
                      return False
              return True
seed: 1365
