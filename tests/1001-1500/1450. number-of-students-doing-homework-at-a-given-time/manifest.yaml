  title: number-of-students-doing-homework-at-a-given-time
  params:
    startTime:
      type: array
      items:
        type: int
    endTime:
      type: array
      items:
        type: int
    queryTime:
      type: int
  call:
    cpp: "Solution().busyStudent({startTime}, {endTime}, {queryTime})"
    rust: "Solution::busy_student({startTime}, {endTime}, {queryTime})"
    python3: "Solution().busyStudent({startTime}, {endTime}, {queryTime})"
    python2: "Solution().busyStudent({startTime}, {endTime}, {queryTime})"
    ruby: "busy_student({startTime}, {endTime}, {queryTime})"
    java: "new Solution().busyStudent({startTime}, {endTime}, {queryTime})"
    csharp: "new Solution().BusyStudent({startTime}, {endTime}, {queryTime})"
    kotlin: "Solution().busyStudent({startTime}, {endTime}, {queryTime})"
    go: "busyStudent({startTime}, {endTime}, {queryTime})"
    dart: "Solution().busyStudent({startTime}, {endTime}, {queryTime})"
    swift: "Solution().busyStudent({startTime}, {endTime}, {queryTime})"
    typescript: "busyStudent({startTime}, {endTime}, {queryTime})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().busyStudent(startTime, endTime, queryTime, {result})"
    checker: |
      class Checker:
          def busyStudent(self, startTime, endTime, queryTime, result):
              expected = sum(start <= queryTime <= end for start, end in zip(startTime, endTime))
              return type(result) is int and result == expected
