entry:
  id: 1051
  title: height-checker
  params:
    heights:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().heightChecker({heights})"
    rust: "Solution::height_checker({heights})"
    python3: "Solution().heightChecker({heights})"
    python2: "Solution().heightChecker({heights})"
    ruby: "height_checker({heights})"
    java: "new Solution().heightChecker({heights})"
    csharp: "new Solution().HeightChecker({heights})"
    kotlin: "Solution().heightChecker({heights})"
    go: "heightChecker({heights})"
    dart: "Solution().heightChecker({heights})"
    swift: "Solution().heightChecker({heights})"
    typescript: "heightChecker({heights})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().heightChecker(heights, {result})"
    checker: |
      class Checker:
          def heightChecker(self, heights, result):
              expected = sum(a != b for a, b in zip(heights, sorted(heights)))
              return result == expected
seed: 1051
