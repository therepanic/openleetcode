entry:
  id: 1470
  title: "shuffle-the-array"
  params:
    nums:
      type: array
      items:
        type: int
    n:
      type: int
  call:
    cpp: "Solution().shuffle({nums}, {n})"
    rust: "Solution::shuffle({nums}, {n})"
    python3: "Solution().shuffle({nums}, {n})"
    python2: "Solution().shuffle({nums}, {n})"
    ruby: "shuffle({nums}, {n})"
    java: "new Solution().shuffle({nums}, {n})"
    csharp: "new Solution().Shuffle({nums}, {n})"
    kotlin: "Solution().shuffle({nums}, {n})"
    go: "shuffle({nums}, {n})"
    dart: "Solution().shuffle({nums}, {n})"
    swift: "Solution().shuffle({nums}, {n})"
    typescript: "shuffle({nums}, {n})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().shuffle(nums, n, {result})"
    checker: |
      class Checker:
          def shuffle(self, nums, n, result):
              if not isinstance(result, list) or len(result) != 2 * n:
                  return False
              expected = []
              for index in range(n):
                  expected.extend((nums[index], nums[n + index]))
              return result == expected

seed: 1470

