entry:
  id: 1387
  title: "sort-integers-by-the-power-value"
  params:
    lo:
      type: int
    hi:
      type: int
    k:
      type: int
  call:
    cpp: "Solution().getKth({lo}, {hi}, {k})"
    rust: "Solution::get_kth({lo}, {hi}, {k})"
    python3: "Solution().getKth({lo}, {hi}, {k})"
    python2: "Solution().getKth({lo}, {hi}, {k})"
    ruby: "get_kth({lo}, {hi}, {k})"
    java: "new Solution().getKth({lo}, {hi}, {k})"
    csharp: "new Solution().GetKth({lo}, {hi}, {k})"
    kotlin: "Solution().getKth({lo}, {hi}, {k})"
    go: "getKth({lo}, {hi}, {k})"
    dart: "Solution().getKth({lo}, {hi}, {k})"
    swift: "Solution().getKth({lo}, {hi}, {k})"
    typescript: "getKth({lo}, {hi}, {k})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().getKth(lo, hi, k, {result})"
    checker: |
      class Checker:
          def getKth(self, lo, hi, k, result):
              def power(x):
                  steps = 0
                  while x != 1:
                      x = x // 2 if x % 2 == 0 else 3 * x + 1
                      steps += 1
                  return steps
              expected = sorted(range(lo, hi + 1), key=lambda x: (power(x), x))[k - 1]
              return result == expected

