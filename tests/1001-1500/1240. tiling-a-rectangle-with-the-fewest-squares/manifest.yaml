  memory_mb: 256
oracle:
  python3:
    call: "Checker().tilingRectangle(n, m, {result})"
    checker: |
      class Checker:
          def tilingRectangle(self, n, m, result):
              if type(result) is not int or not (1 <= n <= 13 and 1 <= m <= 13):
                  return False
              width, height = sorted((n, m))
              best = [width * height]
              skyline = [0] * width

              def search(used):
                  if used >= best[0]:
                      return
                  level = min(skyline)
                  if level == height:
                      best[0] = used
                      return
                  start = skyline.index(level)
                  end = start
                  while end < width and skyline[end] == level:
                      end += 1
                  for side in range(min(end - start, height - level), 0, -1):
                      for column in range(start, start + side):
                          skyline[column] += side
                      search(used + 1)
                      for column in range(start, start + side):
                          skyline[column] -= side

              search(0)
              return result == best[0]
