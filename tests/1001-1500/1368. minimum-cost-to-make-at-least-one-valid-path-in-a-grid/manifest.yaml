entry:
  id: 1368
  title: "minimum-cost-to-make-at-least-one-valid-path-in-a-grid"
  params:
    grid:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().minCost({grid})"
    rust: "Solution::min_cost({grid})"
    python3: "Solution().minCost({grid})"
    python2: "Solution().minCost({grid})"
    ruby: "min_cost({grid})"
    java: "new Solution().minCost({grid})"
    csharp: "new Solution().MinCost({grid})"
    kotlin: "Solution().minCost({grid})"
    go: "minCost({grid})"
    dart: "Solution().minCost({grid})"
    swift: "Solution().minCost({grid})"
    typescript: "minCost({grid})"
judge:
  type: exact
limits:
  time_ms: 700
  memory_mb: 300
oracle:
  python3:
    call: "Checker().minCost(grid, {result})"
    checker: |
      from collections import deque

      class Checker:
          def minCost(self, grid, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              rows, cols = len(grid), len(grid[0])
              distance = [[rows * cols + 1] * cols for _ in range(rows)]
              distance[0][0] = 0
              queue = deque([(0, 0)])
              directions = ((0, 1), (0, -1), (1, 0), (-1, 0))
              while queue:
                  row, col = queue.popleft()
                  for sign, (dr, dc) in enumerate(directions, 1):
                      next_row, next_col = row + dr, col + dc
                      if not (0 <= next_row < rows and 0 <= next_col < cols):
                          continue
                      next_cost = distance[row][col] + (grid[row][col] != sign)
                      if next_cost < distance[next_row][next_col]:
                          distance[next_row][next_col] = next_cost
                          if grid[row][col] == sign:
                              queue.appendleft((next_row, next_col))
                          else:
                              queue.append((next_row, next_col))
              return result == distance[rows - 1][cols - 1]
