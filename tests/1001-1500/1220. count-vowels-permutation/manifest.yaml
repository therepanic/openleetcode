judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().countVowelPermutation(n, {result})"
    checker: |
      class Checker:
          def countVowelPermutation(self, n, result):
              if not isinstance(n, int) or isinstance(n, bool) or n < 1 or n > 20000:
                  return False
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              mod = 1000000007
              counts = [1, 1, 1, 1, 1]
              transitions = ((1, 2, 4), (0, 2), (1, 3), (2,), (2, 3))
              for _ in range(1, n):
                  counts = [sum(counts[index] for index in sources) % mod for sources in transitions]
              return result == sum(counts) % mod
