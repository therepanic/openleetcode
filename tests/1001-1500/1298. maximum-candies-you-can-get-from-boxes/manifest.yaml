      type: array
      items:
        type: array
        items:
          type: int
    initialBoxes:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().maxCandies({status}, {candies}, {keys}, {containedBoxes}, {initialBoxes})"
    rust: "Solution::max_candies({status}, {candies}, {keys}, {containedBoxes}, {initialBoxes})"
    python3: "Solution().maxCandies({status}, {candies}, {keys}, {containedBoxes}, {initialBoxes})"
    python2: "Solution().maxCandies({status}, {candies}, {keys}, {containedBoxes}, {initialBoxes})"
    ruby: "max_candies({status}, {candies}, {keys}, {containedBoxes}, {initialBoxes})"
    java: "new Solution().maxCandies({status}, {candies}, {keys}, {containedBoxes}, {initialBoxes})"
    csharp: "new Solution().MaxCandies({status}, {candies}, {keys}, {containedBoxes}, {initialBoxes})"
    kotlin: "Solution().maxCandies({status}, {candies}, {keys}, {containedBoxes}, {initialBoxes})"
    go: "maxCandies({status}, {candies}, {keys}, {containedBoxes}, {initialBoxes})"
    dart: "Solution().maxCandies({status}, {candies}, {keys}, {containedBoxes}, {initialBoxes})"
    swift: "Solution().maxCandies({status}, {candies}, {keys}, {containedBoxes}, {initialBoxes})"
    typescript: "maxCandies({status}, {candies}, {keys}, {containedBoxes}, {initialBoxes})"
judge:
  type: exact
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().maxCandies(status, candies, keys, containedBoxes, initialBoxes, {result})"
    checker: |
      from collections import deque
      class Checker:
          def maxCandies(self, status, candies, keys, containedBoxes, initialBoxes, result):
              owned = set(initialBoxes)
              open_boxes = set(i for i, value in enumerate(status) if value)
              opened = set()
              queue = deque(initialBoxes)
              total = 0
              while queue:
                  box = queue.popleft()
                  if box in opened or box not in open_boxes:
                      continue
                  opened.add(box)
                  total += candies[box]
                  for key in keys[box]:
                      open_boxes.add(key)
                      if key in owned:
                          queue.append(key)
                  for child in containedBoxes[box]:
                      owned.add(child)
                      if child in open_boxes:
                          queue.append(child)
              return result == total
