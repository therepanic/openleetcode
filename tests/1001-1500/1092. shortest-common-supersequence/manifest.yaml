entry:
  id: 1092
  title: shortest-common-supersequence
  params:
    str1:
      type: string
    str2:
      type: string
  call:
    cpp: "Solution().shortestCommonSupersequence({str1}, {str2})"
    rust: "Solution::shortest_common_supersequence({str1}, {str2})"
    python3: "Solution().shortestCommonSupersequence({str1}, {str2})"
    python2: "Solution().shortestCommonSupersequence({str1}, {str2})"
    ruby: "shortest_common_supersequence({str1}, {str2})"
    java: "new Solution().shortestCommonSupersequence({str1}, {str2})"
    csharp: "new Solution().ShortestCommonSupersequence({str1}, {str2})"
    kotlin: "Solution().shortestCommonSupersequence({str1}, {str2})"
    go: "shortestCommonSupersequence({str1}, {str2})"
    dart: "Solution().shortestCommonSupersequence({str1}, {str2})"
    swift: "Solution().shortestCommonSupersequence({str1}, {str2})"
    typescript: "Solution().shortestCommonSupersequence({str1}, {str2})"
judge:
  type: "exact"
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().shortestCommonSupersequence(str1, str2, {result})"
    checker: |
      class Checker:
          def shortestCommonSupersequence(self, str1, str2, result):
              if not isinstance(result, str):
                  return False
              def is_subseq(a, b):
                  it = iter(b)
                  return all(ch in it for ch in a)
              if not is_subseq(str1, result) or not is_subseq(str2, result):
                  return False
              m, n = len(str1), len(str2)
              dp = [[0] * (n + 1) for _ in range(m + 1)]
              for i in range(1, m + 1):
                  for j in range(1, n + 1):
                      if str1[i - 1] == str2[j - 1]:
                          dp[i][j] = dp[i - 1][j - 1] + 1
                      else:
                          dp[i][j] = dp[i - 1][j] if dp[i - 1][j] > dp[i][j - 1] else dp[i][j - 1]
              expected_len = m + n - dp[m][n]
              return len(result) == expected_len
seed: 12345
