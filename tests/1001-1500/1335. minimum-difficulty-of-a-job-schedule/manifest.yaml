  memory_mb: 300
oracle:
  python3:
    call: "Checker().minDifficulty(jobDifficulty, d, {result})"
    checker: |
      class Checker:
          def minDifficulty(self, jobs, days, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              n = len(jobs)
              if days > n:
                  return result == -1
              previous = [10**9] * (n + 1)
              previous[0] = 0
              for day in range(1, days + 1):
                  current = [10**9] * (n + 1)
                  for end in range(day, n + 1):
                      maximum = 0
                      for start in range(end - 1, day - 2, -1):
                          maximum = max(maximum, jobs[start])
                          current[end] = min(current[end], previous[start] + maximum)
                  previous = current
              return result == previous[n]
