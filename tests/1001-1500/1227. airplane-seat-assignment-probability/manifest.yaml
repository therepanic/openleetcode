judge:
  type: "exact"
limits:
  time_ms: 500
  memory_mb: 256
oracle:
  python3:
    call: "Checker().nthPersonGetsNthSeat(n, {result})"
    checker: |
      import math

      class Checker:
          def nthPersonGetsNthSeat(self, n, result):
              if not isinstance(n, int) or isinstance(n, bool) or not 1 <= n <= 100000:
                  return False
              if not isinstance(result, (int, float)) or isinstance(result, bool):
                  return False
              value = float(result)
              if not math.isfinite(value):
                  return False
              expected = 1.0 if n == 1 else 0.5
              return value == expected
