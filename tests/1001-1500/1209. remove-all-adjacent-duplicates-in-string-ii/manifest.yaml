entry:
  id: 1209
  title: remove-all-adjacent-duplicates-in-string-ii
  params:
    s:
      type: string
    k:
      type: int
  call:
    cpp: "Solution().removeDuplicates({s}, {k})"
    rust: "Solution::remove_duplicates({s}, {k})"
    python3: "Solution().removeDuplicates({s}, {k})"
    python2: "Solution().removeDuplicates({s}, {k})"
    ruby: "remove_duplicates({s}, {k})"
    java: "new Solution().removeDuplicates({s}, {k})"
    csharp: "new Solution().RemoveDuplicates({s}, {k})"
    kotlin: "Solution().removeDuplicates({s}, {k})"
    go: "removeDuplicates({s}, {k})"
    dart: "Solution().removeDuplicates({s}, {k})"
    swift: "Solution().removeDuplicates({s}, {k})"
    typescript: "removeDuplicates({s}, {k})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().removeDuplicates(s, k, {result})"
    checker: |
      class Checker:
          def removeDuplicates(self, s, k, result):
              if (
                  not isinstance(s, str)
                  or not isinstance(k, int)
                  or not isinstance(result, str)
                  or not 1 <= len(s) <= 100000
                  or not 2 <= k <= 10000
                  or any(ch < 'a' or ch > 'z' for ch in s)
              ):
                  return False
              runs = []
              for ch in s:
                  if runs and runs[-1][0] == ch:
                      runs[-1][1] += 1
                  else:
                      runs.append([ch, 1])
                  if runs[-1][1] == k:
                      runs.pop()
              expected = ''.join(ch * count for ch, count in runs)
              return result == expected
seed: 1209
