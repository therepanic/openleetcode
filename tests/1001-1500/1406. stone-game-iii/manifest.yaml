judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().stoneGameIII(stoneValue, {result})"
    checker: |
      class Checker:
          def stoneGameIII(self, values, result):
              if not isinstance(values, list) or not 1 <= len(values) <= 50000:
                  return False
              if any(not isinstance(value, int) or isinstance(value, bool) or value < -1000 or value > 1000 for value in values):
                  return False
              if result not in ('Alice', 'Bob', 'Tie'):
                  return False
              dp = [0] * (len(values) + 3)
              for index in range(len(values) - 1, -1, -1):
                  total = 0
                  best = -10**18
                  for take in range(1, 4):
                      if index + take > len(values):
                          break
                      total += values[index + take - 1]
                      best = max(best, total - dp[index + take])
                  dp[index] = best
              expected = 'Alice' if dp[0] > 0 else 'Bob' if dp[0] < 0 else 'Tie'
              return result == expected
