entry:
  id: 1103
  title: distribute-candies-to-people
  params:
    candies:
      type: int
    num_people:
      type: int
  call:
    cpp: Solution().distributeCandies({candies}, {num_people})
    rust: Solution::distribute_candies({candies}, {num_people})
    python3: Solution().distributeCandies({candies}, {num_people})
    python2: Solution().distributeCandies({candies}, {num_people})
    ruby: distribute_candies({candies}, {num_people})
    java: new Solution().distributeCandies({candies}, {num_people})
    csharp: new Solution().DistributeCandies({candies}, {num_people})
    kotlin: Solution().distributeCandies({candies}, {num_people})
    go: distributeCandies({candies}, {num_people})
    dart: Solution().distributeCandies({candies}, {num_people})
    swift: Solution().distributeCandies({candies}, {num_people})
    typescript: distributeCandies({candies}, {num_people})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 128
oracle:
  python3:
    call: Checker().check(candies, num_people, {result})
    checker:
      "class Checker(object):\n    def check(self, candies, num_people, result):\n\
      \        if not isinstance(result, list) or len(result) != num_people:\n   \
      \         return False\n        if any((not isinstance(x, int)) for x in result):\n\
      \            return False\n        if sum(result) != candies:\n            return\
      \ False\n        exp = [0] * num_people\n        give = 1\n        i = 0\n \
      \       while candies > 0:\n            exp[i % num_people] += min(give, candies)\n\
      \            candies -= give\n            give += 1\n            i += 1\n  \
      \      return exp == result\n"
seed: 1103
