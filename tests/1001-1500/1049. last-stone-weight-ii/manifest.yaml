entry:
  id: 1049
  title: "last-stone-weight-ii"
  params:
    stones:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().lastStoneWeightII({stones})"
    rust: "Solution::last_stone_weight_ii({stones})"
    python3: "Solution().lastStoneWeightII({stones})"
    python2: "Solution().lastStoneWeightII({stones})"
    ruby: "last_stone_weight_ii({stones})"
    java: "new Solution().lastStoneWeightII({stones})"
    csharp: "new Solution().LastStoneWeightII({stones})"
    kotlin: "Solution().lastStoneWeightII({stones})"
    go: "lastStoneWeightII({stones})"
    dart: "Solution().lastStoneWeightII({stones})"
    swift: "Solution().lastStoneWeightII({stones})"
    typescript: "lastStoneWeightII({stones})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().lastStoneWeightII(stones, {result})"
    checker: |
      class Checker:
          def lastStoneWeightII(self, stones, result) -> bool:
              total = sum(stones)
              target = total // 2
              dp = [0] * (target + 1)
              for s in stones:
                  for i in range(target, s - 1, -1):
                      cand = dp[i - s] + s
                      if cand > dp[i]:
                          dp[i] = cand
              expected = total - 2 * dp[target]
              return result == expected

seed: 1049

