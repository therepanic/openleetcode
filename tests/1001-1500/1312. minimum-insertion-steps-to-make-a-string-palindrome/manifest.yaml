entry:
  id: 1312
  title: "minimum-insertion-steps-to-make-a-string-palindrome"
  params:
    s:
      type: string
  call:
    cpp: "Solution().minInsertions({s})"
    rust: "Solution::min_insertions({s})"
    python3: "Solution().minInsertions({s})"
    python2: "Solution().minInsertions({s})"
    ruby: "min_insertions({s})"
    java: "new Solution().minInsertions({s})"
    csharp: "new Solution().MinInsertions({s})"
    kotlin: "Solution().minInsertions({s})"
    go: "minInsertions({s})"
    dart: "Solution().minInsertions({s})"
    swift: "Solution().minInsertions({s})"
    typescript: "minInsertions({s})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 300

oracle:
  python3:
    call: "Checker().minInsertions(s, {result})"
    checker: |
      class Checker:
          def minInsertions(self, s, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              dp = [0] * len(s)
              for left in range(len(s) - 2, -1, -1):
                  diagonal = 0
                  for right in range(left + 1, len(s)):
                      previous = dp[right]
                      if s[left] == s[right]:
                          dp[right] = diagonal
                      else:
                          dp[right] = min(dp[right], dp[right - 1]) + 1
                      diagonal = previous
              return result == dp[-1]

