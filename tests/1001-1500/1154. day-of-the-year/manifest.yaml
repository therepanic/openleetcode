entry:
  id: 1154
  title: day-of-the-year
  params:
    date:
      type: string
  call:
    cpp: "Solution().dayOfYear({date})"
    rust: "Solution::day_of_year({date})"
    python3: "Solution().dayOfYear({date})"
    python2: "Solution().dayOfYear({date})"
    ruby: "day_of_year({date})"
    java: "new Solution().dayOfYear({date})"
    csharp: "new Solution().DayOfYear({date})"
    kotlin: "Solution().dayOfYear({date})"
    go: "dayOfYear({date})"
    dart: "Solution().dayOfYear({date})"
    swift: "Solution().dayOfYear({date})"
    typescript: "dayOfYear({date})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().dayOfYear(date, {result})"
    checker: |
      class Checker:
          def dayOfYear(self, date, result):
              if (
                  type(result) is not int
                  or not isinstance(date, str)
                  or len(date) != 10
                  or date[4] != "-"
                  or date[7] != "-"
                  or not (date[:4] + date[5:7] + date[8:]).isdigit()
              ):
                  return False
              y, m, d = int(date[:4]), int(date[5:7]), int(date[8:])
              leap = y % 400 == 0 or (y % 4 == 0 and y % 100 != 0)
              days = [31, 29 if leap else 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31]
              if not (1900 <= y <= 2019 and 1 <= m <= 12 and 1 <= d <= days[m-1]):
                  return False
              return result == d + sum(days[:m-1])
seed: 1154
