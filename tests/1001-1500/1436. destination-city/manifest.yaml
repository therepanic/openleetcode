entry:
  id: 1436
  title: "destination-city"
  params:
    paths:
      type: array
      items:
        type: array
        items:
          type: string
  call:
    cpp: "Solution().destCity({paths})"
    rust: "Solution::dest_city({paths})"
    python3: "Solution().destCity({paths})"
    python2: "Solution().destCity({paths})"
    ruby: "dest_city({paths})"
    java: "new Solution().destCity({paths})"
    csharp: "new Solution().DestCity({paths})"
    kotlin: "Solution().destCity({paths})"
    go: "destCity({paths})"
    dart: "Solution().destCity({paths})"
    swift: "Solution().destCity({paths})"
    typescript: "destCity({paths})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().destCity(paths, {result})"
    checker: |
      class Checker:
          def destCity(self, paths, result):
              if not isinstance(result, str) or not isinstance(paths, list) or not paths:
                  return False
              departures = set()
              arrivals = set()
              for path in paths:
                  if not isinstance(path, list) or len(path) != 2:
                      return False
                  source, target = path
                  if not isinstance(source, str) or not isinstance(target, str):
                      return False
                  departures.add(source)
                  arrivals.add(target)
              candidates = arrivals - departures
              return len(candidates) == 1 and result in candidates

seed: 1436

