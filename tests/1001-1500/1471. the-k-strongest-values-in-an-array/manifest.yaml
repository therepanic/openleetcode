entry:
  id: 1471
  title: "the-k-strongest-values-in-an-array"
  params:
    arr:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: "Solution().getStrongest({arr}, {k})"
    rust: "Solution::get_strongest({arr}, {k})"
    python3: "Solution().getStrongest({arr}, {k})"
    python2: "Solution().getStrongest({arr}, {k})"
    ruby: "get_strongest({arr}, {k})"
    java: "new Solution().getStrongest({arr}, {k})"
    csharp: "new Solution().GetStrongest({arr}, {k})"
    kotlin: "Solution().getStrongest({arr}, {k})"
    go: "getStrongest({arr}, {k})"
    dart: "Solution().getStrongest({arr}, {k})"
    swift: "Solution().getStrongest({arr}, {k})"
    typescript: "getStrongest({arr}, {k})"
judge:
  type: "ignore_order"
limits:
  time_ms: 700
  memory_mb: 256
oracle:
  python3:
    call: "Checker().getStrongest(arr, k, {result})"
    checker: |
      class Checker:
          def getStrongest(self, arr, k, result):
              center = sorted(arr)[(len(arr) - 1) // 2]
              expected = sorted(arr, key=lambda value: (abs(value - center), value), reverse=True)[:k]
              return sorted(result) == sorted(expected)
seed: 1471
tests:
  - name: "official-one"
    in:
      arr: [1, 2, 3, 4, 5]
      k: 2
    out: [5, 1]
  - name: "official-two"
    in:
      arr: [1, 1, 3, 5, 5]
      k: 2
    out: [5, 5]
  - name: "official-three"
    in:
      arr: [6, 7, 11, 7, 6, 8]
      k: 5
    out: [11, 8, 6, 6, 7]
