entry:
  id: 1401
  title: "circle-and-rectangle-overlapping"
  params:
    radius:
      type: int
    xCenter:
      type: int
    yCenter:
      type: int
    x1:
      type: int
    y1:
      type: int
    x2:
      type: int
    y2:
      type: int
  call:
    cpp: "Solution().checkOverlap({radius}, {xCenter}, {yCenter}, {x1}, {y1}, {x2}, {y2})"
    rust: "Solution::check_overlap({radius}, {xCenter}, {yCenter}, {x1}, {y1}, {x2}, {y2})"
    python3: "Solution().checkOverlap({radius}, {xCenter}, {yCenter}, {x1}, {y1}, {x2}, {y2})"
    python2: "Solution().checkOverlap({radius}, {xCenter}, {yCenter}, {x1}, {y1}, {x2}, {y2})"
    ruby: "check_overlap({radius}, {xCenter}, {yCenter}, {x1}, {y1}, {x2}, {y2})"
    java: "new Solution().checkOverlap({radius}, {xCenter}, {yCenter}, {x1}, {y1}, {x2}, {y2})"
    csharp: "new Solution().CheckOverlap({radius}, {xCenter}, {yCenter}, {x1}, {y1}, {x2}, {y2})"
    kotlin: "Solution().checkOverlap({radius}, {xCenter}, {yCenter}, {x1}, {y1}, {x2}, {y2})"
    go: "checkOverlap({radius}, {xCenter}, {yCenter}, {x1}, {y1}, {x2}, {y2})"
    dart: "Solution().checkOverlap({radius}, {xCenter}, {yCenter}, {x1}, {y1}, {x2}, {y2})"
    swift: "Solution().checkOverlap({radius}, {xCenter}, {yCenter}, {x1}, {y1}, {x2}, {y2})"
    typescript: "checkOverlap({radius}, {xCenter}, {yCenter}, {x1}, {y1}, {x2}, {y2})"
judge:
  type: exact
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().checkOverlap(radius, xCenter, yCenter, x1, y1, x2, y2, {result})"
    checker: |
      class Checker:
          def checkOverlap(self, radius, xCenter, yCenter, x1, y1, x2, y2, result):
              if not isinstance(result, bool):
                  return False
              if xCenter < x1:
                  dx = x1 - xCenter
              elif xCenter > x2:
                  dx = xCenter - x2
              else:
                  dx = 0
              if yCenter < y1:
                  dy = y1 - yCenter
              elif yCenter > y2:
                  dy = yCenter - y2
              else:
                  dy = 0
              return result == (dx * dx + dy * dy <= radius * radius)
seed: 1401
