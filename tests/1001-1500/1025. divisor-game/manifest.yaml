entry:
  id: 1025
  title: "divisor-game"
  params:
    N:
      type: int
  call:
    cpp: "Solution().divisorGame({N})"
    rust: "Solution::divisor_game({N})"
    python3: "Solution().divisorGame({N})"
    python2: "Solution().divisorGame({N})"
    ruby: "divisor_game({N})"
    java: "new Solution().divisorGame({N})"
    csharp: "new Solution().DivisorGame({N})"
    kotlin: "Solution().divisorGame({N})"
    go: "divisorGame({N})"
    dart: "Solution().divisorGame({N})"
    swift: "Solution().divisorGame({N})"
    typescript: "divisorGame({N})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().divisorGame(N, {result})"
    checker: |
      class Checker:
          def divisorGame(self, N, result):
              return result == (N % 2 == 0)

seed: 1025

