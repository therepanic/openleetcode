  title: number-of-dice-rolls-with-target-sum
  params:
    n:
      type: int
    k:
      type: int
    target:
      type: int
  call:
    cpp: "Solution().numRollsToTarget({n}, {k}, {target})"
    rust: "Solution::num_rolls_to_target({n}, {k}, {target})"
    python3: "Solution().numRollsToTarget({n}, {k}, {target})"
    python2: "Solution().numRollsToTarget({n}, {k}, {target})"
    ruby: "num_rolls_to_target({n}, {k}, {target})"
    java: "new Solution().numRollsToTarget({n}, {k}, {target})"
    csharp: "new Solution().NumRollsToTarget({n}, {k}, {target})"
    kotlin: "Solution().numRollsToTarget({n}, {k}, {target})"
    go: "numRollsToTarget({n}, {k}, {target})"
    dart: "Solution().numRollsToTarget({n}, {k}, {target})"
    swift: "Solution().numRollsToTarget({n}, {k}, {target})"
    typescript: "numRollsToTarget({n}, {k}, {target})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().numRollsToTarget(n, k, target, {result})"
    checker: |
      import math

      class Checker:
          def numRollsToTarget(self, n, k, target, result):
              if any(isinstance(x, bool) or not isinstance(x, int) for x in (n, k, target, result)):
                  return False
              if not (1 <= n <= 30 and 1 <= k <= 30 and 1 <= target <= 1000):
                  return False
              mod = 1000000007
              total = 0
              for excluded in range((target - n) // k + 1):
                  remaining = target - n - excluded * k
                  if remaining < 0:
                      break
                  ways = (math.comb(n, excluded) *
                          math.comb(remaining + n - 1, n - 1))
                  total = (total - ways if excluded % 2 else total + ways) % mod
              return result == total
seed: 1155
