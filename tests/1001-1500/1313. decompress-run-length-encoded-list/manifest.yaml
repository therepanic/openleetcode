entry:
  id: 1313
  title: decompress-run-length-encoded-list
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().decompressRLElist({nums})"
    rust: "Solution::decompress_rl_elist({nums})"
    python3: "Solution().decompressRLElist({nums})"
    python2: "Solution().decompressRLElist({nums})"
    ruby: "decompress_rl_elist({nums})"
    java: "new Solution().decompressRLElist({nums})"
    csharp: "new Solution().DecompressRLElist({nums})"
    kotlin: "Solution().decompressRLElist({nums})"
    go: "decompressRLElist({nums})"
    dart: "Solution().decompressRLElist({nums})"
    swift: "Solution().decompressRLElist({nums})"
    typescript: "decompressRLElist({nums})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().decompressRLElist(nums, {result})"
    checker: |
      class Checker:
          def decompressRLElist(self, nums, result):
              if not isinstance(result, list):
                  return False
              expected = []
              for index in range(0, len(nums), 2):
                  expected.extend([nums[index + 1]] * nums[index])
              return result == expected
