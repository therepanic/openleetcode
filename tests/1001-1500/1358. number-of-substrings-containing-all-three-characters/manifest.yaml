entry:
  id: 1358
  title: "number-of-substrings-containing-all-three-characters"
  params:
    s:
      type: string
  call:
    cpp: "Solution().numberOfSubstrings({s})"
    rust: "Solution::number_of_substrings({s})"
    python3: "Solution().numberOfSubstrings({s})"
    python2: "Solution().numberOfSubstrings({s})"
    ruby: "number_of_substrings({s})"
    java: "new Solution().numberOfSubstrings({s})"
    csharp: "new Solution().NumberOfSubstrings({s})"
    kotlin: "Solution().numberOfSubstrings({s})"
    go: "numberOfSubstrings({s})"
    dart: "Solution().numberOfSubstrings({s})"
    swift: "Solution().numberOfSubstrings({s})"
    typescript: "numberOfSubstrings({s})"

judge:
  type: "exact"

limits:
  time_ms: 500
  memory_mb: 300

oracle:
  python3:
    call: "Checker().numberOfSubstrings(s, {result})"
    checker: |
      class Checker:
          def numberOfSubstrings(self, s, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              counts = [0, 0, 0]
              left = 0
              expected = 0
              for right, ch in enumerate(s):
                  counts[ord(ch) - ord('a')] += 1
                  while counts[0] and counts[1] and counts[2]:
                      expected += len(s) - right
                      counts[ord(s[left]) - ord('a')] -= 1
                      left += 1
              return result == expected

seed: 1358

