oracle:
  python3:
    call: "Checker().tictactoe(moves, {result})"
    checker: |
      class Checker:
          def tictactoe(self, moves, result):
              if not isinstance(result, str) or not (1 <= len(moves) <= 9):
                  return False

              board = [[None] * 3 for _ in range(3)]
              lines = [
                  ((0, 0), (0, 1), (0, 2)),
                  ((1, 0), (1, 1), (1, 2)),
                  ((2, 0), (2, 1), (2, 2)),
                  ((0, 0), (1, 0), (2, 0)),
                  ((0, 1), (1, 1), (2, 1)),
                  ((0, 2), (1, 2), (2, 2)),
                  ((0, 0), (1, 1), (2, 2)),
                  ((0, 2), (1, 1), (2, 0)),
              ]

              for turn, move in enumerate(moves):
                  if not isinstance(move, list) or len(move) != 2:
                      return False
                  row, col = move
                  if not isinstance(row, int) or not isinstance(col, int):
                      return False
                  if not (0 <= row < 3 and 0 <= col < 3) or board[row][col] is not None:
                      return False
                  player = "A" if turn % 2 == 0 else "B"
                  board[row][col] = player
                  for line in lines:
                      if all(board[r][c] == player for r, c in line):
                          return turn == len(moves) - 1 and result == player

              return result == ("Draw" if len(moves) == 9 else "Pending")
