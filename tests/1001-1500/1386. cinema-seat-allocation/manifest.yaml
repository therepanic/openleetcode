entry:
  id: 1386
  title: "cinema-seat-allocation"
  params:
    n:
      type: int
    reservedSeats:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().maxNumberOfFamilies({n}, {reservedSeats})"
    rust: "Solution::max_number_of_families({n}, {reservedSeats})"
    python3: "Solution().maxNumberOfFamilies({n}, {reservedSeats})"
    python2: "Solution().maxNumberOfFamilies({n}, {reservedSeats})"
    ruby: "max_number_of_families({n}, {reservedSeats})"
    java: "new Solution().maxNumberOfFamilies({n}, {reservedSeats})"
    csharp: "new Solution().MaxNumberOfFamilies({n}, {reservedSeats})"
    kotlin: "Solution().maxNumberOfFamilies({n}, {reservedSeats})"
    go: "maxNumberOfFamilies({n}, {reservedSeats})"
    dart: "Solution().maxNumberOfFamilies({n}, {reservedSeats})"
    swift: "Solution().maxNumberOfFamilies({n}, {reservedSeats})"
    typescript: "maxNumberOfFamilies({n}, {reservedSeats})"

judge:
  type: "exact"

limits:
  time_ms: 400
  memory_mb: 300

oracle:
  python3:
    call: "Checker().maxNumberOfFamilies(n, reservedSeats, {result})"
    checker: |
      class Checker:
          def maxNumberOfFamilies(self, n, reservedSeats, result):
              if not isinstance(result, int) or isinstance(result, bool) or result < 0:
                  return False
              rows = {}
              for row, seat in reservedSeats:
                  rows.setdefault(row, set()).add(seat)
              expected = (n - len(rows)) * 2
              blocks = ((2, 3, 4, 5), (4, 5, 6, 7), (6, 7, 8, 9))
              for seats in rows.values():
                  usable = [all(seat not in seats for seat in block) for block in blocks]
                  expected += (2 if usable[0] and usable[2] else 1 if any(usable) else 0)
              return result == expected

seed: 1386001

