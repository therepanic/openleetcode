  id: 1224
  title: "maximum-equal-frequency"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().maxEqualFreq({nums})"
    rust: "Solution::max_equal_freq({nums})"
    python3: "Solution().maxEqualFreq({nums})"
    python2: "Solution().maxEqualFreq({nums})"
    ruby: "max_equal_freq({nums})"
    java: "new Solution().maxEqualFreq({nums})"
    csharp: "new Solution().MaxEqualFreq({nums})"
    kotlin: "Solution().maxEqualFreq({nums})"
    go: "maxEqualFreq({nums})"
    dart: "Solution().maxEqualFreq({nums})"
    swift: "Solution().maxEqualFreq({nums})"
    typescript: "maxEqualFreq({nums})"

judge:
  type: "exact"

limits:
  time_ms: 700
  memory_mb: 300

oracle:
  python3:
    call: "Checker().maxEqualFreq(nums, {result})"
    checker: |
      from collections import defaultdict

      class Checker:
          def maxEqualFreq(self, nums, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False

              counts = defaultdict(int)
              frequency_counts = defaultdict(int)
              best = 0
              for length, value in enumerate(nums, 1):
                  old = counts[value]
                  if old:
                      frequency_counts[old] -= 1
                      if frequency_counts[old] == 0:
                          del frequency_counts[old]
                  counts[value] = old + 1
                  current = old + 1
                  frequency_counts[current] += 1

                  if len(frequency_counts) == 1:
                      only_frequency, value_count = next(iter(frequency_counts.items()))
                      if only_frequency == 1 or value_count == 1:
                          best = length
                  elif len(frequency_counts) == 2:
                      low, high = sorted(frequency_counts)
                      if (low == 1 and frequency_counts[low] == 1) or (
                          high == low + 1 and frequency_counts[high] == 1
                      ):
                          best = length
              return result == best

