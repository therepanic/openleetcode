judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().sufficientSubset(root, limit, {result})"
    checker: |
      class Checker:
          def sufficientSubset(self, root, limit, result):
              def normalize(node):
                  if node is None:
                      return None
                  if isinstance(node, list):
                      if not node:
                          return None
                      nodes = [None if x is None else TreeNode(x) for x in node]
                      kids = nodes[::-1]
                      root = kids.pop()
                      for item in nodes:
                          if item is not None:
                              if kids:
                                  item.left = kids.pop()
                              if kids:
                                  item.right = kids.pop()
                      return root
                  if isinstance(node, dict):
                      return TreeNode(
                          node.get("val", node.get("value")),
                          normalize(node.get("left")),
                          normalize(node.get("right")),
                      )
                  return node

              def serialize(node):
                  if node is None:
                      return None
                  out = []
                  queue = [node]
                  while queue:
                      cur = queue.pop(0)
                      if cur is None:
                          out.append(None)
                      else:
                          out.append(cur.val)
                          queue.append(cur.left)
                          queue.append(cur.right)
                  while out and out[-1] is None:
                      out.pop()
                  return out

              expected = normalize(root)
              actual = normalize(result)

              def dfs(node, path_sum):
                  if not node:
                      return False
                  curr = path_sum + node.val
                  if not node.left and not node.right:
                      return curr >= limit
                  left_good = dfs(node.left, curr)
                  right_good = dfs(node.right, curr)
                  if not left_good:
                      node.left = None
                  if not right_good:
                      node.right = None
                  return left_good or right_good

              return serialize(expected if dfs(expected, 0) else None) == serialize(actual)
seed: 1080
