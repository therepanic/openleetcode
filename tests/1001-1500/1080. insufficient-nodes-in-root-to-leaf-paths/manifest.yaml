entry:
  id: 1080
  title: insufficient-nodes-in-root-to-leaf-paths
  params:
    root:
      type: tree_node
    limit:
      type: int
  call:
    cpp: "Solution().sufficientSubset({root}, {limit})"
    rust: "Solution::sufficient_subset({root}, {limit})"
    python3: "Solution().sufficientSubset({root}, {limit})"
    python2: "Solution().sufficientSubset({root}, {limit})"
    ruby: "sufficient_subset({root}, {limit})"
    java: "new Solution().sufficientSubset({root}, {limit})"
    csharp: "new Solution().SufficientSubset({root}, {limit})"
    kotlin: "Solution().sufficientSubset({root}, {limit})"
    go: "sufficientSubset({root}, {limit})"
    dart: "Solution().sufficientSubset({root}, {limit})"
    swift: "Solution().sufficientSubset({root}, {limit})"
