judge:
  type: "exact"
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().maximum69Number(num, {result})"
    checker: |
      class Checker:
          def maximum69Number(self, num, result):
              digits = str(num)
              first_six = digits.find("6")
              if first_six >= 0:
                  expected = int(digits[:first_six] + "9" + digits[first_six + 1:])
              else:
                  expected = num
              return type(result) is int and result == expected
