entry:
  id: 1333
  title: filter-restaurants-by-vegan-friendly-price-and-distance
  params:
    restaurants:
      type: array
      items:
        type: array
        items:
          type: int
    veganFriendly:
      type: int
    maxPrice:
      type: int
    maxDistance:
      type: int
  call:
    cpp: "Solution().filterRestaurants({restaurants}, {veganFriendly}, {maxPrice}, {maxDistance})"
    rust: "Solution::filter_restaurants({restaurants}, {veganFriendly}, {maxPrice}, {maxDistance})"
    python3: "Solution().filterRestaurants({restaurants}, {veganFriendly}, {maxPrice}, {maxDistance})"
    python2: "Solution().filterRestaurants({restaurants}, {veganFriendly}, {maxPrice}, {maxDistance})"
    ruby: "filter_restaurants({restaurants}, {veganFriendly}, {maxPrice}, {maxDistance})"
    java: "new Solution().filterRestaurants({restaurants}, {veganFriendly}, {maxPrice}, {maxDistance})"
    csharp: "new Solution().FilterRestaurants({restaurants}, {veganFriendly}, {maxPrice}, {maxDistance})"
    kotlin: "Solution().filterRestaurants({restaurants}, {veganFriendly}, {maxPrice}, {maxDistance})"
    go: "filterRestaurants({restaurants}, {veganFriendly}, {maxPrice}, {maxDistance})"
    dart: "Solution().filterRestaurants({restaurants}, {veganFriendly}, {maxPrice}, {maxDistance})"
    swift: "Solution().filterRestaurants({restaurants}, {veganFriendly}, {maxPrice}, {maxDistance})"
    typescript: "filterRestaurants({restaurants}, {veganFriendly}, {maxPrice}, {maxDistance})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().filterRestaurants(restaurants, veganFriendly, maxPrice, maxDistance, {result})"
    checker: |
      class Checker:
          def filterRestaurants(self, restaurants, veganFriendly, maxPrice, maxDistance, result):
              if not isinstance(restaurants, list) or not 1 <= len(restaurants) <= 10000:
                  return False
              if veganFriendly not in (0, 1) or not isinstance(maxPrice, int) or not isinstance(maxDistance, int):
                  return False
              if not isinstance(result, list):
                  return False
              rows = []
              ids = set()
              for row in restaurants:
                  if not isinstance(row, list) or len(row) != 5:
                      return False
                  rid, rating, vegan, price, distance = row
                  if rid in ids or not all(isinstance(value, int) and not isinstance(value, bool) for value in row):
                      return False
                  ids.add(rid)
                  if vegan not in (0, 1):
                      return False
                  if veganFriendly == 0 or vegan == 1:
                      if price <= maxPrice and distance <= maxDistance:
                          rows.append((rating, rid))
              expected = [rid for rating, rid in sorted(rows, reverse=True)]
              return result == expected
seed: 1333
