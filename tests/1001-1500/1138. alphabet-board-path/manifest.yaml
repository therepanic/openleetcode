judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().alphabetBoardPath(target, {result})"
    checker: |
      class Checker:
          def alphabetBoardPath(self, target, result):
              if not isinstance(result, str): return False
              pos = {chr(97+i): (i//5, i%5) for i in range(26)}
              valid = set(pos.values())
              r = c = 0
              made = []
              steps = 0
              for ch in result:
                  if ch == '!':
                      if (r, c) not in valid: return False
                      made.append(chr(97 + r*5 + c))
                  elif ch in 'UDLR':
                      nr, nc = r, c
                      if ch == 'U': nr -= 1
                      elif ch == 'D': nr += 1
                      elif ch == 'L': nc -= 1
                      else: nc += 1
                      if (nr, nc) not in valid: return False
                      r, c = nr, nc
                      steps += 1
                  else: return False
              if ''.join(made) != target: return False
              prev = (0, 0)
              minimum = len(target)
              for ch in target:
                  cur = pos[ch]
                  minimum += abs(prev[0]-cur[0]) + abs(prev[1]-cur[1])
                  prev = cur
              return steps + len(made) == minimum
