      type: string
  call:
    cpp: "Solution().alphabetBoardPath({target})"
    rust: "Solution::alphabet_board_path({target})"
    python3: "Solution().alphabetBoardPath({target})"
    python2: "Solution().alphabetBoardPath({target})"
    ruby: "alphabet_board_path({target})"
    java: "new Solution().alphabetBoardPath({target})"
    csharp: "new Solution().AlphabetBoardPath({target})"
    kotlin: "Solution().alphabetBoardPath({target})"
    go: "alphabetBoardPath({target})"
    dart: "Solution().alphabetBoardPath({target})"
    swift: "Solution().alphabetBoardPath({target})"
