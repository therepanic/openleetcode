entry:
  id: 1043
  title: partition-array-for-maximum-sum
  params:
    arr:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: Solution().maxSumAfterPartitioning({arr}, {k})
    rust: Solution::max_sum_after_partitioning({arr}, {k})
    python3: Solution().maxSumAfterPartitioning({arr}, {k})
    python2: Solution().maxSumAfterPartitioning({arr}, {k})
    ruby: max_sum_after_partitioning({arr}, {k})
    java: new Solution().maxSumAfterPartitioning({arr}, {k})
    csharp: new Solution().MaxSumAfterPartitioning({arr}, {k})
    kotlin: Solution().maxSumAfterPartitioning({arr}, {k})
    go: maxSumAfterPartitioning({arr}, {k})
    dart: Solution().maxSumAfterPartitioning({arr}, {k})
    swift: Solution().maxSumAfterPartitioning({arr}, {k})
    typescript: maxSumAfterPartitioning({arr}, {k})
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().maxSumAfterPartitioning(arr, k, {result})
    checker:
      "class Checker:\n    def maxSumAfterPartitioning(self, arr, k, result):\n\
      \        if not isinstance(result, int):\n            return False\n       \
      \ n = len(arr)\n        dp = [0] * (n + 1)\n        for i in range(1, n + 1):\n\
      \            curr = 0\n            for j in range(1, k + 1):\n             \
      \   if i < j:\n                    break\n                curr = max(curr, arr[i\
      \ - j])\n                dp[i] = max(dp[i], dp[i - j] + curr * j)\n        return\
      \ result == dp[n]\n"
seed: 1043
