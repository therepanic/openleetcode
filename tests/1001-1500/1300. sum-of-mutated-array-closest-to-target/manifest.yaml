entry:
  id: 1300
  title: "sum-of-mutated-array-closest-to-target"
  params:
    arr:
      type: array
      items:
        type: int
    target:
      type: int
  call:
    cpp: "Solution().findBestValue({arr}, {target})"
    rust: "Solution::find_best_value({arr}, {target})"
    python3: "Solution().findBestValue({arr}, {target})"
    python2: "Solution().findBestValue({arr}, {target})"
    ruby: "find_best_value({arr}, {target})"
    java: "new Solution().findBestValue({arr}, {target})"
    csharp: "new Solution().FindBestValue({arr}, {target})"
    kotlin: "Solution().findBestValue({arr}, {target})"
    go: "findBestValue({arr}, {target})"
    dart: "Solution().findBestValue({arr}, {target})"
    swift: "Solution().findBestValue({arr}, {target})"
    typescript: "findBestValue({arr}, {target})"

judge:
  type: "exact"

limits:
  time_ms: 700
  memory_mb: 300

oracle:
  python3:
    call: "Checker().findBestValue(arr, target, {result})"
    checker: |
      class Checker:
          def findBestValue(self, arr, target, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              maximum = max(arr)
              if result < 0 or result > maximum:
                  return False

              def mutated_sum(value):
                  return sum(min(item, value) for item in arr)

              # The sum is monotone, so only the caps bracketing target can be optimal.
              low, high = 0, maximum
              while low < high:
                  mid = (low + high) // 2
                  if mutated_sum(mid) < target:
                      low = mid + 1
                  else:
                      high = mid
              lower = max(0, low - 1)
              expected = min((lower, low), key=lambda value: (abs(mutated_sum(value) - target), value))
              return result == expected

seed: 130000

