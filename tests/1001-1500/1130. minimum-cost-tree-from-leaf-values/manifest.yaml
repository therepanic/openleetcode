entry:
  id: 1130
  title: "minimum-cost-tree-from-leaf-values"
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().mctFromLeafValues({arr})"
    rust: "Solution::mct_from_leaf_values({arr})"
    python3: "Solution().mctFromLeafValues({arr})"
    python2: "Solution().mctFromLeafValues({arr})"
    ruby: "mct_from_leaf_values({arr})"
    java: "new Solution().mctFromLeafValues({arr})"
    csharp: "new Solution().MctFromLeafValues({arr})"
    kotlin: "Solution().mctFromLeafValues({arr})"
    go: "mctFromLeafValues({arr})"
    dart: "Solution().mctFromLeafValues({arr})"
    swift: "Solution().mctFromLeafValues({arr})"
    typescript: "mctFromLeafValues({arr})"

judge:
  type: "exact"

limits:
  time_ms: 500
  memory_mb: 300

oracle:
  python3:
    call: "Checker().mctFromLeafValues(arr, {result})"
    checker: |
      class Checker:
          def mctFromLeafValues(self, arr, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              n = len(arr)
              if n < 2 or n > 40 or any(not isinstance(x, int) or isinstance(x, bool) or x < 1 or x > 15 for x in arr):
                  return False
              mx = [[0] * n for _ in range(n)]
              for i in range(n):
                  mx[i][i] = arr[i]
                  for j in range(i + 1, n):
                      mx[i][j] = max(mx[i][j - 1], arr[j])
              dp = [[0] * n for _ in range(n)]
              for width in range(2, n + 1):
                  for left in range(n - width + 1):
                      right = left + width - 1
                      best = 2 ** 63 - 1
                      for split in range(left, right):
                          best = min(best, dp[left][split] + dp[split + 1][right] + mx[left][split] * mx[split + 1][right])
                      dp[left][right] = best
              return result == dp[0][n - 1]

seed: 113000

