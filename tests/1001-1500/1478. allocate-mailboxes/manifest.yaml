entry:
  id: 1478
  title: allocate-mailboxes
  params:
    houses:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: "Solution().minDistance({houses}, {k})"
    rust: "Solution::min_distance({houses}, {k})"
    python3: "Solution().minDistance({houses}, {k})"
    python2: "Solution().minDistance({houses}, {k})"
    ruby: "min_distance({houses}, {k})"
    java: "new Solution().minDistance({houses}, {k})"
    csharp: "new Solution().MinDistance({houses}, {k})"
    kotlin: "Solution().minDistance({houses}, {k})"
    go: "minDistance({houses}, {k})"
    dart: "Solution().minDistance({houses}, {k})"
    swift: "Solution().minDistance({houses}, {k})"
    typescript: "minDistance({houses}, {k})"
judge:
  type: exact
limits:
  time_ms: 5000
  memory_mb: 512
oracle:
  python3:
    call: "Checker().minDistance(houses, k, {result})"
    checker: |
      class Checker:
          def minDistance(self, houses, k, result):
              if type(result) is not int or len(houses) < 1 or not (1 <= k <= len(houses)):
                  return False
              a = sorted(houses)
              n = len(a)
              cost = [[0] * n for _ in range(n)]
              for i in range(n):
                  for j in range(i, n):
                      mid = (i + j) // 2
                      cost[i][j] = sum(abs(a[x] - a[mid]) for x in range(i, j + 1))
              inf = 10 ** 30
              dp = [[inf] * (n + 1) for _ in range(k + 1)]
              dp[0][0] = 0
              for boxes in range(1, k + 1):
                  for used in range(1, n + 1):
                      dp[boxes][used] = min(dp[boxes - 1][start] + cost[start][used - 1] for start in range(used))
              return result == dp[k][n]
