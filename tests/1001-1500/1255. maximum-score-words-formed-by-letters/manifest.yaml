entry:
  id: 1255
  title: maximum-score-words-formed-by-letters
  params:
    words:
      type: array
      items:
        type: string
    letters:
      type: array
      items:
        type: char
    score:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().maxScoreWords({words}, {letters}, {score})"
    rust: "Solution::max_score_words({words}, {letters}, {score})"
    python3: "Solution().maxScoreWords({words}, {letters}, {score})"
    python2: "Solution().maxScoreWords({words}, {letters}, {score})"
    ruby: "max_score_words({words}, {letters}, {score})"
    java: "new Solution().maxScoreWords({words}, {letters}, {score})"
    csharp: "new Solution().MaxScoreWords({words}, {letters}, {score})"
    kotlin: "Solution().maxScoreWords({words}, {letters}, {score})"
    go: "maxScoreWords({words}, {letters}, {score})"
    dart: "Solution().maxScoreWords({words}, {letters}, {score})"
    swift: "Solution().maxScoreWords({words}, {letters}, {score})"
    typescript: "maxScoreWords({words}, {letters}, {score})"

judge:
  type: exact

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().maxScoreWords(words, letters, score, {result})"
    checker: |
      class Checker:
          def maxScoreWords(self, words, letters, score, result):
              available = [0] * 26
              for letter in letters:
                  available[ord(letter) - ord('a')] += 1

              word_counts = []
              word_scores = []
              for word in words:
                  counts = [0] * 26
                  total = 0
                  for letter in word:
                      index = ord(letter) - ord('a')
                      counts[index] += 1
                      total += score[index]
                  word_counts.append(counts)
                  word_scores.append(total)

              def search(index, remaining):
                  if index == len(words):
                      return 0
                  best = search(index + 1, remaining)
                  counts = word_counts[index]
                  if all(counts[i] <= remaining[i] for i in range(26)):
                      next_remaining = [remaining[i] - counts[i] for i in range(26)]
                      best = max(best, word_scores[index] + search(index + 1, next_remaining))
                  return best

              return type(result) is int and result == search(0, available)

