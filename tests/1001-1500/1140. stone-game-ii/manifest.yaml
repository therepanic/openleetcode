      type: array
      items:
        type: int
  call:
    cpp: "Solution().stoneGameII({piles})"
    rust: "Solution::stone_game_ii({piles})"
    python3: "Solution().stoneGameII({piles})"
    python2: "Solution().stoneGameII({piles})"
    ruby: "stone_game_ii({piles})"
    java: "new Solution().stoneGameII({piles})"
    csharp: "new Solution().StoneGameII({piles})"
    kotlin: "Solution().stoneGameII({piles})"
    go: "stoneGameII({piles})"
    dart: "Solution().stoneGameII({piles})"
    swift: "Solution().stoneGameII({piles})"
    typescript: "stoneGameII({piles})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().stoneGameII(piles, {result})"
    checker: |
      class Checker:
          def stoneGameII(self, piles, result):
              if isinstance(result, bool) or not isinstance(result, int):
                  return False
              total = sum(piles)
              memo = {}

              def advantage(index, m):
                  if index == len(piles):
                      return 0
                  key = (index, m)
                  if key not in memo:
                      taken = 0
                      best = -total
                      for x in range(1, min(2 * m, len(piles) - index) + 1):
                          taken += piles[index + x - 1]
                          best = max(best, taken - advantage(index + x, max(m, x)))
                      memo[key] = best
                  return memo[key]

              expected = (total + advantage(0, 1)) // 2
              return result == expected

