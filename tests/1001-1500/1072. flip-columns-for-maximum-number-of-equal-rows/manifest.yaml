entry:
  id: 1072
  title: flip-columns-for-maximum-number-of-equal-rows
  params:
    matrix:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().maxEqualRowsAfterFlips({matrix})"
    rust: "Solution::max_equal_rows_after_flips({matrix})"
    python3: "Solution().maxEqualRowsAfterFlips({matrix})"
    python2: "Solution().maxEqualRowsAfterFlips({matrix})"
    ruby: "max_equal_rows_after_flips({matrix})"
    java: "new Solution().maxEqualRowsAfterFlips({matrix})"
    csharp: "new Solution().MaxEqualRowsAfterFlips({matrix})"
    kotlin: "Solution().maxEqualRowsAfterFlips({matrix})"
    go: "maxEqualRowsAfterFlips({matrix})"
    dart: "Solution().maxEqualRowsAfterFlips({matrix})"
    swift: "Solution().maxEqualRowsAfterFlips({matrix})"
    typescript: "maxEqualRowsAfterFlips({matrix})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().maxEqualRowsAfterFlips(matrix, {result})"
    checker: |
      class Checker:
          def maxEqualRowsAfterFlips(self, matrix, result):
              return isinstance(result, int) and 0 <= result <= len(matrix)
seed: 1072
tests:
  - name: ex1
    in:
      matrix:
        elemType: "int"
        value:
          - [0, 1]
          - [1, 1]
    out: 1
  - name: ex2
    in:
      matrix:
        elemType: "int"
        value:
          - [0, 1]
          - [1, 0]
    out: 2
  - name: all_zero
    in:
      matrix:
        elemType: "int"
        value:
          - [0, 0, 0]
          - [0, 0, 0]
          - [0, 0, 0]
    out: 3
  - name: all_one
    in:
      matrix:
        elemType: "int"
        value:
          - [1, 1, 1]
          - [1, 1, 1]
    out: 2
  - name: single_row
    in:
      matrix:
        elemType: "int"
        value:
          - [1, 0, 1, 0, 1]
    out: 1
  - name: single_col
    in:
