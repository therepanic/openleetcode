entry:
  id: 1074
  title: number-of-submatrices-that-sum-to-target
  params:
    matrix:
      type: array
      items:
        type: array
        items:
          type: int
    target:
      type: int
  call:
    cpp: Solution().numSubmatrixSumTarget({matrix}, {target})
    rust: Solution::num_submatrix_sum_target({matrix}, {target})
    python3: Solution().numSubmatrixSumTarget({matrix}, {target})
    python2: Solution().numSubmatrixSumTarget({matrix}, {target})
    ruby: num_submatrix_sum_target({matrix}, {target})
    java: new Solution().numSubmatrixSumTarget({matrix}, {target})
    csharp: new Solution().NumSubmatrixSumTarget({matrix}, {target})
    kotlin: Solution().numSubmatrixSumTarget({matrix}, {target})
    go: numSubmatrixSumTarget({matrix}, {target})
    dart: Solution().numSubmatrixSumTarget({matrix}, {target})
    swift: Solution().numSubmatrixSumTarget({matrix}, {target})
    typescript: numSubmatrixSumTarget({matrix}, {target})
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().numSubmatrixSumTarget(matrix, target, {result})
    checker:
      "class Checker:\n    def numSubmatrixSumTarget(self, matrix, target,\
      \ result):\n        if not isinstance(result, int):\n            return False\n\
      \        grid = [row[:] for row in matrix]\n        m, n = len(grid), len(grid[0])\n\
      \        for r in range(m):\n            for c in range(1, n):\n           \
      \     grid[r][c] += grid[r][c - 1]\n        ans = 0\n        for c1 in range(n):\n\
      \            for c2 in range(c1, n):\n                seen = {0: 1}\n      \
      \          cur = 0\n                for r in range(m):\n                   \
      \ cur += grid[r][c2] - (grid[r][c1 - 1] if c1 > 0 else 0)\n                \
      \    ans += seen.get(cur - target, 0)\n                    seen[cur] = seen.get(cur,\
      \ 0) + 1\n        return result == ans\n"
seed: 1074
