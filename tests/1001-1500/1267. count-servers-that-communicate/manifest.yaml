entry:
  id: 1267
  title: "count-servers-that-communicate"
  params:
    grid:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().countServers({grid})"
    rust: "Solution::count_servers({grid})"
    python3: "Solution().countServers({grid})"
    python2: "Solution().countServers({grid})"
    ruby: "count_servers({grid})"
    java: "new Solution().countServers({grid})"
    csharp: "new Solution().CountServers({grid})"
    kotlin: "Solution().countServers({grid})"
    go: "countServers({grid})"
    dart: "Solution().countServers({grid})"
    swift: "Solution().countServers({grid})"
    typescript: "countServers({grid})"
judge:
  type: "exact"
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().countServers(grid, {result})"
    checker: |
      class Checker:
          def countServers(self, grid, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              row_counts = [sum(row) for row in grid]
              col_counts = [sum(grid[row][col] for row in range(len(grid)))
                            for col in range(len(grid[0]))]
              expected = sum(
                  cell
                  for row, values in enumerate(grid)
                  for col, cell in enumerate(values)
                  if cell and (row_counts[row] > 1 or col_counts[col] > 1)
              )
              return result == expected
seed: 1267
