entry:
  id: 1438
  title: "longest-continuous-subarray-with-absolute-diff-less-than-or-equal-to-limit"
  params:
    nums:
      type: array
      items:
        type: int
    limit:
      type: int
  call:
    cpp: "Solution().longestSubarray({nums}, {limit})"
    rust: "Solution::longest_subarray({nums}, {limit})"
    python3: "Solution().longestSubarray({nums}, {limit})"
    python2: "Solution().longestSubarray({nums}, {limit})"
    ruby: "longest_subarray({nums}, {limit})"
    java: "new Solution().longestSubarray({nums}, {limit})"
    csharp: "new Solution().LongestSubarray({nums}, {limit})"
    kotlin: "Solution().longestSubarray({nums}, {limit})"
    go: "longestSubarray({nums}, {limit})"
    dart: "Solution().longestSubarray({nums}, {limit})"
    swift: "Solution().longestSubarray({nums}, {limit})"
    typescript: "longestSubarray({nums}, {limit})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 300
oracle:
  python3:
    call: "Checker().longestSubarray(nums, limit, {result})"
    checker: |
      import heapq

      class Checker:
          def longestSubarray(self, nums, limit, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              min_heap = []
              max_heap = []
              left = 0
              best = 0
              for right, value in enumerate(nums):
                  heapq.heappush(min_heap, (value, right))
                  heapq.heappush(max_heap, (-value, right))
                  while -max_heap[0][0] - min_heap[0][0] > limit:
                      left += 1
                      while min_heap[0][1] < left:
                          heapq.heappop(min_heap)
                      while max_heap[0][1] < left:
                          heapq.heappop(max_heap)
                  best = max(best, right - left + 1)
              return result == best
seed: 1438
