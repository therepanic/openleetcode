  title: "number-of-steps-to-reduce-a-number-to-zero"
  params:
    num:
      type: int
  call:
    cpp: "Solution().numberOfSteps({num})"
    rust: "Solution::number_of_steps({num})"
    python3: "Solution().numberOfSteps({num})"
    python2: "Solution().numberOfSteps({num})"
    ruby: "number_of_steps({num})"
    java: "new Solution().numberOfSteps({num})"
    csharp: "new Solution().NumberOfSteps({num})"
    kotlin: "Solution().numberOfSteps({num})"
    go: "numberOfSteps({num})"
    dart: "Solution().numberOfSteps({num})"
    swift: "Solution().numberOfSteps({num})"
