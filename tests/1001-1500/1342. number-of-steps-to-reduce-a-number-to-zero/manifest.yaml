judge:
  type: exact
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().numberOfSteps(num, {result})"
    checker: |
      class Checker:
          def numberOfSteps(self, num, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              steps = 0
              current = num
              while current > 0:
                  if current % 2 == 0:
                      current //= 2
                  else:
                      current -= 1
                  steps += 1
              return result == steps
