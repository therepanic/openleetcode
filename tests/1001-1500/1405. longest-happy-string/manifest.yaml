entry:
  id: 1405
  title: "longest-happy-string"
  params:
    a:
      type: int
    b:
      type: int
    c:
      type: int
  call:
    cpp: "Solution().longestDiverseString({a}, {b}, {c})"
    rust: "Solution::longest_diverse_string({a}, {b}, {c})"
    python3: "Solution().longestDiverseString({a}, {b}, {c})"
    python2: "Solution().longestDiverseString({a}, {b}, {c})"
    ruby: "longest_diverse_string({a}, {b}, {c})"
    java: "new Solution().longestDiverseString({a}, {b}, {c})"
    csharp: "new Solution().LongestDiverseString({a}, {b}, {c})"
    kotlin: "Solution().longestDiverseString({a}, {b}, {c})"
    go: "longestDiverseString({a}, {b}, {c})"
    dart: "Solution().longestDiverseString({a}, {b}, {c})"
    swift: "Solution().longestDiverseString({a}, {b}, {c})"
    typescript: "longestDiverseString({a}, {b}, {c})"
judge:
  type: "exact"
limits:
  time_ms: 700
  memory_mb: 300
oracle:
  python3:
    call: "Checker().longestDiverseString(a, b, c, {result})"
    checker: |
      class Checker:
          def longestDiverseString(self, a, b, c, result):
              if not isinstance(result, str):
                  return False
              if any(ch not in "abc" for ch in result):
                  return False
              counts = [result.count("a"), result.count("b"), result.count("c")]
              if counts[0] > a or counts[1] > b or counts[2] > c:
                  return False
              if "aaa" in result or "bbb" in result or "ccc" in result:
                  return False
              total = a + b + c
              largest = max(a, b, c)
              optimum = min(total, 3 * (total - largest) + 2)
              return len(result) == optimum
