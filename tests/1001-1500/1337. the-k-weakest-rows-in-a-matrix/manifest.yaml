entry:
  id: 1337
  title: "the-k-weakest-rows-in-a-matrix"
  params:
    mat:
      type: array
      items:
        type: array
        items:
          type: int
    k:
      type: int
  call:
    cpp: "Solution().kWeakestRows({mat}, {k})"
    rust: "Solution::k_weakest_rows({mat}, {k})"
    python3: "Solution().kWeakestRows({mat}, {k})"
    python2: "Solution().kWeakestRows({mat}, {k})"
    ruby: "k_weakest_rows({mat}, {k})"
    java: "new Solution().kWeakestRows({mat}, {k})"
    csharp: "new Solution().KWeakestRows({mat}, {k})"
    kotlin: "Solution().kWeakestRows({mat}, {k})"
    go: "kWeakestRows({mat}, {k})"
    dart: "Solution().kWeakestRows({mat}, {k})"
    swift: "Solution().kWeakestRows({mat}, {k})"
    typescript: "kWeakestRows({mat}, {k})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().kWeakestRows(mat, k, {result})"
    checker: |
      class Checker:
          def kWeakestRows(self, mat, k, result):
              if not isinstance(result, list) or len(result) != k:
                  return False
              expected = sorted(range(len(mat)), key=lambda i: (sum(mat[i]), i))[:k]
              return result == expected

seed: 1337

