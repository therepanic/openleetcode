  - name: "alphabet-rotation-corpus"
    in:
      words:
        [
          "abcd",
          "bcde",
          "cdef",
          "defg",
          "efgh",
          "fghi",
          "ghij",
          "hijk",
          "ijkl",
          "jklm",
          "klmn",
          "lmno",
          "mnop",
          "nopq",
          "opqr",
          "pqrs",
          "qrst",
          "rstu",
          "stuv",
          "tuvw",
          "uvwx",
          "vwxy",
          "wxyz",
          "xyza",
          "yzab",
          "zabc",
        ]
      puzzles: ["abcdefg", "ghijklm", "tuvwxyz", "zabcdef"]
