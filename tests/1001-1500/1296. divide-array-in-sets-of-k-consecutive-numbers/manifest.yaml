entry:
  id: 1296
  title: divide-array-in-sets-of-k-consecutive-numbers
  params:
    nums:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: "Solution().isPossibleDivide({nums}, {k})"
    rust: "Solution::is_possible_divide({nums}, {k})"
    python3: "Solution().isPossibleDivide({nums}, {k})"
    python2: "Solution().isPossibleDivide({nums}, {k})"
    ruby: "is_possible_divide({nums}, {k})"
    java: "new Solution().isPossibleDivide({nums}, {k})"
    csharp: "new Solution().IsPossibleDivide({nums}, {k})"
    kotlin: "Solution().isPossibleDivide({nums}, {k})"
    go: "isPossibleDivide({nums}, {k})"
    dart: "Solution().isPossibleDivide({nums}, {k})"
    swift: "Solution().isPossibleDivide({nums}, {k})"
    typescript: "isPossibleDivide({nums}, {k})"
judge:
  type: "exact"
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().isPossibleDivide(nums, k, {result})"
    checker: |
      class Checker:
          def isPossibleDivide(self, nums, k, result):
              if type(result) is not bool:
                  return False
              if not isinstance(nums, list) or not 1 <= len(nums) <= 100000:
                  return False
              if not isinstance(k, int) or isinstance(k, bool) or not 1 <= k <= len(nums):
                  return False
              if any(not isinstance(value, int) or isinstance(value, bool) or not 1 <= value <= 1000000000 for value in nums):
                  return False
              if len(nums) % k != 0:
                  return result is False
              counts = {}
              for value in nums:
                  counts[value] = counts.get(value, 0) + 1
              for start in sorted(counts):
                  needed = counts[start]
                  if needed == 0:
                      continue
                  for value in range(start, start + k):
                      if counts.get(value, 0) < needed:
                          return result is False
                      counts[value] -= needed
              return result is True
seed: 1296
