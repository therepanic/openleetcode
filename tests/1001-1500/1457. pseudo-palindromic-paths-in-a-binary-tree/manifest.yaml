  id: 1457
  title: pseudo-palindromic-paths-in-a-binary-tree
  params:
    root:
      type: tree_node
  call:
    cpp: "Solution().pseudoPalindromicPaths({root})"
    rust: "Solution::pseudo_palindromic_paths({root})"
