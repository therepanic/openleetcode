judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().pseudoPalindromicPaths(root, {result})"
    checker: |
      class Checker:
          def pseudoPalindromicPaths(self, root, result):
              if type(result) is not int:
                  return False
              values = root if isinstance(root, list) else None
              if not values or values[0] is None:
                  return result == 0
              nodes = [None if value is None else [value, None, None] for value in values]
              queue = [nodes[0]]
              position = 1
              while queue and position < len(nodes):
                  node = queue.pop(0)
                  if node is None:
                      continue
                  node[1] = nodes[position]
                  position += 1
                  if position < len(nodes):
                      node[2] = nodes[position]
                      position += 1
                  if node[1] is not None:
                      queue.append(node[1])
                  if node[2] is not None:
                      queue.append(node[2])
              answer = 0
              def visit(node, mask):
                  nonlocal answer
                  if node is None:
                      return
                  mask ^= 1 << node[0]
                  if node[1] is None and node[2] is None:
                      answer += int(mask & (mask - 1) == 0)
                      return
                  visit(node[1], mask)
                  visit(node[2], mask)
              visit(nodes[0], 0)
              return result == answer
