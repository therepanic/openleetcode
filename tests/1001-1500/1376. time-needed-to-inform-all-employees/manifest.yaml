entry:
  id: 1376
  title: time-needed-to-inform-all-employees
  params:
    n:
      type: int
    headID:
      type: int
    manager:
      type: array
      items:
        type: int
    informTime:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().numOfMinutes({n}, {headID}, {manager}, {informTime})"
    rust: "Solution::num_of_minutes({n}, {headID}, {manager}, {informTime})"
    python3: "Solution().numOfMinutes({n}, {headID}, {manager}, {informTime})"
    python2: "Solution().numOfMinutes({n}, {headID}, {manager}, {informTime})"
    ruby: "num_of_minutes({n}, {headID}, {manager}, {informTime})"
    java: "new Solution().numOfMinutes({n}, {headID}, {manager}, {informTime})"
    csharp: "new Solution().NumOfMinutes({n}, {headID}, {manager}, {informTime})"
    kotlin: "Solution().numOfMinutes({n}, {headID}, {manager}, {informTime})"
    go: "numOfMinutes({n}, {headID}, {manager}, {informTime})"
    dart: "Solution().numOfMinutes({n}, {headID}, {manager}, {informTime})"
    swift: "Solution().numOfMinutes({n}, {headID}, {manager}, {informTime})"
    typescript: "numOfMinutes({n}, {headID}, {manager}, {informTime})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().numOfMinutes(n, headID, manager, informTime, {result})"
    checker: |
      class Checker:
          def numOfMinutes(self, n, headID, manager, informTime, result):
              if not isinstance(n, int) or not 1 <= n <= 100000 or not isinstance(headID, int) or not 0 <= headID < n:
                  return False
              if not isinstance(manager, list) or not isinstance(informTime, list) or len(manager) != n or len(informTime) != n:
                  return False
              if manager[headID] != -1 or any(not isinstance(value, int) or value < -1 or value >= n for value in manager):
                  return False
              if any(not isinstance(value, int) or value < 0 or value > 1000 for value in informTime):
                  return False
              if sum(value == -1 for value in manager) != 1:
                  return False
              children = [[] for _ in range(n)]
              for employee, parent in enumerate(manager):
                  if parent != -1:
                      children[parent].append(employee)
              if any(not children[employee] and informTime[employee] != 0 for employee in range(n)):
                  return False
              visited = set()
              stack = [headID]
              while stack:
                  employee = stack.pop()
                  if employee in visited:
                      return False
                  visited.add(employee)
                  stack.extend(children[employee])
              if len(visited) != n:
                  return False
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              def time(employee):
                  total = 0
                  seen = set()
                  while manager[employee] != -1:
                      if employee in seen:
                          return None
                      seen.add(employee)
                      total += informTime[manager[employee]]
                      employee = manager[employee]
                  return total
              values = [time(employee) for employee in range(n)]
              if any(value is None for value in values):
                  return False
              return result == max(values)
