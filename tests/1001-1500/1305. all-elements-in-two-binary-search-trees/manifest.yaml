entry:
  id: 1305
  title: "all-elements-in-two-binary-search-trees"
  params:
    root1:
      type: tree_node
    root2:
      type: tree_node
  call:
    cpp: "Solution().getAllElements({root1}, {root2})"
    rust: "Solution::get_all_elements({root1}, {root2})"
    python3: "Solution().getAllElements({root1}, {root2})"
    python2: "Solution().getAllElements({root1}, {root2})"
    ruby: "get_all_elements({root1}, {root2})"
    java: "new Solution().getAllElements({root1}, {root2})"
    csharp: "new Solution().GetAllElements({root1}, {root2})"
    kotlin: "Solution().getAllElements({root1}, {root2})"
    go: "getAllElements({root1}, {root2})"
    dart: "Solution().getAllElements({root1}, {root2})"
    swift: "Solution().getAllElements({root1}, {root2})"
    typescript: "getAllElements({root1}, {root2})"

judge:
  type: "exact"

limits:
  time_ms: 700
  memory_mb: 300

oracle:
  python3:
    call: "Checker().getAllElements(root1, root2, {result})"
    checker: |
      class Checker:
          def getAllElements(self, root1, root2, result):
              if not isinstance(result, list) or any(not isinstance(value, int) for value in result):
                  return False
              def inorder(values):
                  if not values:
                      return []
                  nodes = [[values[0], None, None]]
                  queue = [0]
                  cursor = 1
                  for parent in queue:
                      if cursor == len(values):
                          break
                      left = values[cursor]
                      cursor += 1
                      if left is not None:
                          nodes.append([left, None, None])
                          nodes[parent][1] = len(nodes) - 1
                          queue.append(len(nodes) - 1)
                      if cursor == len(values):
                          break
                      right = values[cursor]
                      cursor += 1
                      if right is not None:
                          nodes.append([right, None, None])
                          nodes[parent][2] = len(nodes) - 1
                          queue.append(len(nodes) - 1)
                  def visit(index):
                      if index is None:
                          return []
                      return visit(nodes[index][1]) + [nodes[index][0]] + visit(nodes[index][2])
                  return visit(0)
              return result == sorted(inorder(root1) + inorder(root2))

seed: 130500

