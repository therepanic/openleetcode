  call:
    cpp: "Solution().checkIfPrerequisite({numCourses}, {prerequisites}, {queries})"
    rust: "Solution::check_if_prerequisite({numCourses}, {prerequisites}, {queries})"
    python3: "Solution().checkIfPrerequisite({numCourses}, {prerequisites}, {queries})"
    python2: "Solution().checkIfPrerequisite({numCourses}, {prerequisites}, {queries})"
    ruby: "check_if_prerequisite({numCourses}, {prerequisites}, {queries})"
    java: "new Solution().checkIfPrerequisite({numCourses}, {prerequisites}, {queries})"
    csharp: "new Solution().CheckIfPrerequisite({numCourses}, {prerequisites}, {queries})"
    kotlin: "Solution().checkIfPrerequisite({numCourses}, {prerequisites}, {queries})"
    go: "checkIfPrerequisite({numCourses}, {prerequisites}, {queries})"
    dart: "Solution().checkIfPrerequisite({numCourses}, {prerequisites}, {queries})"
    swift: "Solution().checkIfPrerequisite({numCourses}, {prerequisites}, {queries})"
    typescript: "checkIfPrerequisite({numCourses}, {prerequisites}, {queries})"
judge:
  type: "exact"
limits:
  time_ms: 900
  memory_mb: 300
oracle:
  python3:
    call: "Checker().checkIfPrerequisite(numCourses, prerequisites, queries, {result})"
    checker: |
      class Checker:
          def checkIfPrerequisite(self, numCourses, prerequisites, queries, result):
              graph = [[] for _ in range(numCourses)]
              for source, target in prerequisites:
                  graph[source].append(target)
              answer = []
              for source, target in queries:
                  seen = [False] * numCourses
                  stack = [source]
                  while stack:
                      node = stack.pop()
                      if node == target:
                          break
                      if seen[node]:
                          continue
                      seen[node] = True
                      stack.extend(graph[node])
                  answer.append(seen[target])
              return result == answer
