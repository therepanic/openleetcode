entry:
  id: 1189
  title: "maximum-number-of-balloons"
  params:
    text:
      type: string
  call:
    cpp: "Solution().maxNumberOfBalloons({text})"
    rust: "Solution::max_number_of_balloons({text})"
    python3: "Solution().maxNumberOfBalloons({text})"
    python2: "Solution().maxNumberOfBalloons({text})"
    ruby: "max_number_of_balloons({text})"
    java: "new Solution().maxNumberOfBalloons({text})"
    csharp: "new Solution().MaxNumberOfBalloons({text})"
    kotlin: "Solution().maxNumberOfBalloons({text})"
    go: "maxNumberOfBalloons({text})"
    dart: "Solution().maxNumberOfBalloons({text})"
    swift: "Solution().maxNumberOfBalloons({text})"
    typescript: "maxNumberOfBalloons({text})"
judge:
  type: exact
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().maxNumberOfBalloons(text, {result})"
    checker: |
      class Checker:
          def maxNumberOfBalloons(self, text, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              return result == min(
                  text.count('b'), text.count('a'), text.count('l') // 2,
                  text.count('o') // 2, text.count('n')
              )
