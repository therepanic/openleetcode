  title: "cells-with-odd-values-in-a-matrix"
  params:
    m:
      type: int
    n:
      type: int
    indices:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().oddCells({m}, {n}, {indices})"
    rust: "Solution::odd_cells({m}, {n}, {indices})"
    python3: "Solution().oddCells({m}, {n}, {indices})"
    python2: "Solution().oddCells({m}, {n}, {indices})"
    ruby: "odd_cells({m}, {n}, {indices})"
    java: "new Solution().oddCells({m}, {n}, {indices})"
    csharp: "new Solution().OddCells({m}, {n}, {indices})"
    kotlin: "Solution().oddCells({m}, {n}, {indices})"
    go: "oddCells({m}, {n}, {indices})"
    dart: "Solution().oddCells({m}, {n}, {indices})"
    swift: "Solution().oddCells({m}, {n}, {indices})"
    typescript: "oddCells({m}, {n}, {indices})"

judge:
  type: "exact"

limits:
  time_ms: 500
  memory_mb: 300

oracle:
  python3:
    call: "Checker().oddCells(m, n, indices, {result})"
    checker: |
      class Checker:
          def oddCells(self, m, n, indices, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              row_parity = [0] * m
              col_parity = [0] * n
              for row, col in indices:
                  row_parity[row] ^= 1
                  col_parity[col] ^= 1
              odd_rows = sum(row_parity)
              odd_cols = sum(col_parity)
              expected = odd_rows * (n - odd_cols) + (m - odd_rows) * odd_cols
              return result == expected

seed: 125200

