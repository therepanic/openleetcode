  memory_mb: 256
oracle:
  python3:
    call: Checker().shortestAlternatingPaths(n, redEdges, blueEdges, {result})
    checker:
      "import collections\nclass Checker:\n    def shortestAlternatingPaths(self,\
      \ n, redEdges, blueEdges, result):\n        if not isinstance(result, list)\
      \ or len(result) != n:\n            return False\n        RED, BLUE = 0, 1\n\
      \        graph = [[[] for _ in range(n)] for _ in range(2)]\n        for u,\
      \ v in redEdges:\n            graph[RED][u].append(v)\n        for u, v in blueEdges:\n\
      \            graph[BLUE][u].append(v)\n        dist = [[-1] * n for _ in range(2)]\n\
      \        q = collections.deque([(0, RED), (0, BLUE)])\n        dist[RED][0]\
      \ = 0\n        dist[BLUE][0] = 0\n        while q:\n            node, last =\
      \ q.popleft()\n            nxt = 1 - last\n            for nei in graph[nxt][node]:\n\
      \                if dist[nxt][nei] == -1:\n                    dist[nxt][nei]\
      \ = dist[last][node] + 1\n                    q.append((nei, nxt))\n       \
      \ expected = []\n        for i in range(n):\n            a, b = dist[RED][i],\
      \ dist[BLUE][i]\n            if a == -1 or (b != -1 and b < a):\n          \
      \      expected.append(b)\n            else:\n                expected.append(a)\n\
      \        return result == expected\n"
seed: 1129
