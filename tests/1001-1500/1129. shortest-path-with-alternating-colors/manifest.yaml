  call:
    cpp: "Solution().shortestAlternatingPaths({n}, {redEdges}, {blueEdges})"
    rust: "Solution::shortest_alternating_paths({n}, {redEdges}, {blueEdges})"
    python3: "Solution().shortestAlternatingPaths({n}, {redEdges}, {blueEdges})"
    python2: "Solution().shortestAlternatingPaths({n}, {redEdges}, {blueEdges})"
    ruby: "shortest_alternating_paths({n}, {redEdges}, {blueEdges})"
    java: "new Solution().shortestAlternatingPaths({n}, {redEdges}, {blueEdges})"
    csharp: "new Solution().ShortestAlternatingPaths({n}, {redEdges}, {blueEdges})"
    kotlin: "Solution().shortestAlternatingPaths({n}, {redEdges}, {blueEdges})"
    go: "shortestAlternatingPaths({n}, {redEdges}, {blueEdges})"
    dart: "Solution().shortestAlternatingPaths({n}, {redEdges}, {blueEdges})"
