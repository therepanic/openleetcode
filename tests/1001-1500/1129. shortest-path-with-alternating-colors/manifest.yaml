judge:
  type: exact
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().shortestAlternatingPaths(n, redEdges, blueEdges, {result})"
    checker: |
      from collections import deque
      class Checker:
          def shortestAlternatingPaths(self, n, redEdges, blueEdges, result):
              if not isinstance(result, list) or len(result) != n:
                  return False
              graph = [[] for _ in range(n)]
              for u, v in redEdges:
                  graph[u].append((v, 0))
              for u, v in blueEdges:
                  graph[u].append((v, 1))
              dist = [[-1, -1] for _ in range(n)]
              q = deque([(0, 0), (0, 1)])
              dist[0] = [0, 0]
              while q:
                  u, previous = q.popleft()
                  for v, color in graph[u]:
                      if color != previous and dist[v][color] == -1:
                          dist[v][color] = dist[u][previous] + 1
                          q.append((v, color))
              expected = [0 if i == 0 else (min(x for x in dist[i] if x >= 0) if any(x >= 0 for x in dist[i]) else -1) for i in range(n)]
              return result == expected
seed: 1129
