entry:
  id: 1385
  title: "find-the-distance-value-between-two-arrays"
  params:
    arr1:
      type: array
      items:
        type: int
    arr2:
      type: array
      items:
        type: int
    d:
      type: int
  call:
    cpp: "Solution().findTheDistanceValue({arr1}, {arr2}, {d})"
    rust: "Solution::find_the_distance_value({arr1}, {arr2}, {d})"
    python3: "Solution().findTheDistanceValue({arr1}, {arr2}, {d})"
    python2: "Solution().findTheDistanceValue({arr1}, {arr2}, {d})"
    ruby: "find_the_distance_value({arr1}, {arr2}, {d})"
    java: "new Solution().findTheDistanceValue({arr1}, {arr2}, {d})"
    csharp: "new Solution().FindTheDistanceValue({arr1}, {arr2}, {d})"
    kotlin: "Solution().findTheDistanceValue({arr1}, {arr2}, {d})"
    go: "findTheDistanceValue({arr1}, {arr2}, {d})"
    dart: "Solution().findTheDistanceValue({arr1}, {arr2}, {d})"
    swift: "Solution().findTheDistanceValue({arr1}, {arr2}, {d})"
    typescript: "findTheDistanceValue({arr1}, {arr2}, {d})"
judge:
  type: "exact"
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().findTheDistanceValue(arr1, arr2, d, {result})"
    checker: |
      class Checker:
          def findTheDistanceValue(self, arr1, arr2, d, result):
              if type(result) is not int:
                  return False
              expected = 0
              for x in arr1:
                  if all(abs(x - y) > d for y in arr2):
                      expected += 1
              return result == expected
seed: 1385
