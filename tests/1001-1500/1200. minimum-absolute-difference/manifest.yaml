entry:
  id: 1200
  title: minimum-absolute-difference
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().minimumAbsDifference({arr})"
    rust: "Solution::minimum_abs_difference({arr})"
    python3: "Solution().minimumAbsDifference({arr})"
    python2: "Solution().minimumAbsDifference({arr})"
    ruby: "minimum_abs_difference({arr})"
    java: "new Solution().minimumAbsDifference({arr})"
    csharp: "new Solution().MinimumAbsDifference({arr})"
    kotlin: "Solution().minimumAbsDifference({arr})"
    go: "minimumAbsDifference({arr})"
    dart: "Solution().minimumAbsDifference({arr})"
    swift: "Solution().minimumAbsDifference({arr})"
    typescript: "minimumAbsDifference({arr})"
judge:
  type: exact
limits:
  time_ms: 1500
  memory_mb: 256
oracle:
  python3:
    call: "Checker().minimumAbsDifference(arr, {result})"
    checker: |
      class Checker:
          def minimumAbsDifference(self, arr, result):
              if type(arr) is not list or type(result) is not list:
                  return False
              if not 2 <= len(arr) <= 100000:
                  return False
              if any(type(value) is not int or value < -1000000 or value > 1000000 for value in arr):
                  return False
              if len(set(arr)) != len(arr):
                  return False
              ordered = sorted(arr)
              minimum_gap = min(ordered[index + 1] - ordered[index] for index in range(len(ordered) - 1))
              expected = [[ordered[index], ordered[index + 1]] for index in range(len(ordered) - 1) if ordered[index + 1] - ordered[index] == minimum_gap]
              return result == expected
seed: 1200
tests:
