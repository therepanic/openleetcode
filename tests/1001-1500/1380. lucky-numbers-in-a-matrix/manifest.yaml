entry:
  id: 1380
  title: "lucky-numbers-in-a-matrix"
  params:
    matrix:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().luckyNumbers({matrix})"
    rust: "Solution::lucky_numbers({matrix})"
    python3: "Solution().luckyNumbers({matrix})"
    python2: "Solution().luckyNumbers({matrix})"
    ruby: "lucky_numbers({matrix})"
    java: "new Solution().luckyNumbers({matrix})"
    csharp: "new Solution().LuckyNumbers({matrix})"
    kotlin: "Solution().luckyNumbers({matrix})"
    go: "luckyNumbers({matrix})"
    dart: "Solution().luckyNumbers({matrix})"
    swift: "Solution().luckyNumbers({matrix})"
    typescript: "luckyNumbers({matrix})"

judge:
  type: "ignore_order"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().luckyNumbers(matrix, {result})"
    checker: |
      class Checker:
          def luckyNumbers(self, matrix, result):
              if not isinstance(result, list):
                  return False
              if any(type(value) is not int for value in result):
                  return False
              row_mins = [min(row) for row in matrix]
              col_maxes = [max(matrix[row][col] for row in range(len(matrix))) for col in range(len(matrix[0]))]
              expected = []
              for row_index, row in enumerate(matrix):
                  for col_index, value in enumerate(row):
                      if value == row_mins[row_index] and value == col_maxes[col_index]:
                          expected.append(value)
              return len(result) == len(set(result)) and set(result) == set(expected)

seed: 1380

