entry:
  id: 1460
  title: "make-two-arrays-equal-by-reversing-subarrays"
  params:
    target:
      type: array
      items:
        type: int
    arr:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().canBeEqual({target}, {arr})"
    rust: "Solution::can_be_equal({target}, {arr})"
    python3: "Solution().canBeEqual({target}, {arr})"
    python2: "Solution().canBeEqual({target}, {arr})"
    ruby: "can_be_equal({target}, {arr})"
    java: "new Solution().canBeEqual({target}, {arr})"
    csharp: "new Solution().CanBeEqual({target}, {arr})"
    kotlin: "Solution().canBeEqual({target}, {arr})"
    go: "canBeEqual({target}, {arr})"
    dart: "Solution().canBeEqual({target}, {arr})"
    swift: "Solution().canBeEqual({target}, {arr})"
    typescript: "canBeEqual({target}, {arr})"
judge:
  type: exact
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().canBeEqual(target, arr, {result})"
    checker: |
      from collections import Counter
      class Checker:
          def canBeEqual(self, target, arr, result):
              return isinstance(result, bool) and result == (Counter(target) == Counter(arr))
seed: 1460
