entry:
  id: 1283
  title: "find-the-smallest-divisor-given-a-threshold"
  params:
    nums:
      type: array
      items:
        type: int
    threshold:
      type: int
  call:
    cpp: "Solution().smallestDivisor({nums}, {threshold})"
    rust: "Solution::smallest_divisor({nums}, {threshold})"
    python3: "Solution().smallestDivisor({nums}, {threshold})"
    python2: "Solution().smallestDivisor({nums}, {threshold})"
    ruby: "smallest_divisor({nums}, {threshold})"
    java: "new Solution().smallestDivisor({nums}, {threshold})"
    csharp: "new Solution().SmallestDivisor({nums}, {threshold})"
    kotlin: "Solution().smallestDivisor({nums}, {threshold})"
    go: "smallestDivisor({nums}, {threshold})"
    dart: "Solution().smallestDivisor({nums}, {threshold})"
    swift: "Solution().smallestDivisor({nums}, {threshold})"
    typescript: "smallestDivisor({nums}, {threshold})"

judge:
  type: "exact"

limits:
  time_ms: 2500
  memory_mb: 256

oracle:
  python3:
    call: "Checker().smallestDivisor(nums, threshold, {result})"
    checker: |
      class Checker:
          def smallestDivisor(self, nums, threshold, result):
              if isinstance(result, bool) or not isinstance(result, int):
                  return False
              if result < 1 or result > max(nums):
                  return False
              total = sum((value + result - 1) // result for value in nums)
              if total > threshold:
                  return False
              if result == 1:
                  return True
              previous_total = sum(
                  (value + result - 2) // (result - 1) for value in nums
              )
              return previous_total > threshold

seed: 1283

