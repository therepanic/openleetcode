entry:
  id: 1248
  title: "count-number-of-nice-subarrays"
  params:
    nums:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    python3: "Solution().numberOfSubarrays({nums}, {k})"
    python2: "Solution().numberOfSubarrays({nums}, {k})"
    cpp: "Solution().numberOfSubarrays({nums}, {k})"
    rust: "Solution::number_of_subarrays({nums}, {k})"
    ruby: "number_of_subarrays({nums}, {k})"
    java: "new Solution().numberOfSubarrays({nums}, {k})"
    csharp: "new Solution().NumberOfSubarrays({nums}, {k})"
    kotlin: "Solution().numberOfSubarrays({nums}, {k})"
    go: "numberOfSubarrays({nums}, {k})"
    dart: "Solution().numberOfSubarrays({nums}, {k})"
    swift: "Solution().numberOfSubarrays({nums}, {k})"
    typescript: "numberOfSubarrays({nums}, {k})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 512

oracle:
  python3:
    call: "Checker().numberOfSubarrays(nums, k, {result})"
    checker: |
      class Checker:
          def numberOfSubarrays(self, nums, k, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              if not isinstance(nums, list) or not (1 <= len(nums) <= 50000):
                  return False
              if not isinstance(k, int) or not (1 <= k <= len(nums)):
                  return False
              prefix = 0
              seen = {0: 1}
              expected = 0
              for value in nums:
                  prefix += value % 2
                  expected += seen.get(prefix - k, 0)
                  seen[prefix] = seen.get(prefix, 0) + 1
              return result == expected

seed: 1248

