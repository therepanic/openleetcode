judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 300
oracle:
  python3:
    call: "Checker().matrixBlockSum(mat, k, {result})"
    checker: |
      class Checker:
          def matrixBlockSum(self, mat, k, result):
              rows, cols = len(mat), len(mat[0])
              if not isinstance(result, list) or len(result) != rows:
                  return False
              if any(not isinstance(row, list) or len(row) != cols for row in result):
                  return False
              prefix = [[0] * (cols + 1) for _ in range(rows + 1)]
              for i in range(rows):
                  for j in range(cols):
                      prefix[i + 1][j + 1] = mat[i][j] + prefix[i][j + 1] + prefix[i + 1][j] - prefix[i][j]
              for i in range(rows):
                  for j in range(cols):
                      top, left = max(0, i - k), max(0, j - k)
                      bottom, right = min(rows, i + k + 1), min(cols, j + k + 1)
                      expected = prefix[bottom][right] - prefix[top][right] - prefix[bottom][left] + prefix[top][left]
                      if result[i][j] != expected:
                          return False
              return True
