          type: int
    k:
      type: int
  call:
    cpp: "Solution().matrixBlockSum({mat}, {k})"
    rust: "Solution::matrix_block_sum({mat}, {k})"
    python3: "Solution().matrixBlockSum({mat}, {k})"
    python2: "Solution().matrixBlockSum({mat}, {k})"
    ruby: "matrix_block_sum({mat}, {k})"
    java: "new Solution().matrixBlockSum({mat}, {k})"
    csharp: "new Solution().MatrixBlockSum({mat}, {k})"
    kotlin: "Solution().matrixBlockSum({mat}, {k})"
    go: "matrixBlockSum({mat}, {k})"
    dart: "Solution().matrixBlockSum({mat}, {k})"
