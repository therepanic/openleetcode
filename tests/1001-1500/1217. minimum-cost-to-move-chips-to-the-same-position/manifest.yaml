entry:
  id: 1217
  title: "minimum-cost-to-move-chips-to-the-same-position"
  params:
    position:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().minCostToMoveChips({position})"
    rust: "Solution::min_cost_to_move_chips({position})"
    python3: "Solution().minCostToMoveChips({position})"
    python2: "Solution().minCostToMoveChips({position})"
    ruby: "min_cost_to_move_chips({position})"
    java: "new Solution().minCostToMoveChips({position})"
    csharp: "new Solution().MinCostToMoveChips({position})"
    kotlin: "Solution().minCostToMoveChips({position})"
    go: "minCostToMoveChips({position})"
    dart: "Solution().minCostToMoveChips({position})"
    swift: "Solution().minCostToMoveChips({position})"
    typescript: "minCostToMoveChips({position})"

judge:
  type: "exact"

limits:
  time_ms: 500
  memory_mb: 300

oracle:
  python3:
    call: "Checker().minCostToMoveChips(position, {result})"
    checker: |
      class Checker:
          def minCostToMoveChips(self, position, result):
              if not isinstance(result, int) or isinstance(result, bool) or not position:
                  return False
              even = sum(value % 2 == 0 for value in position)
              odd = len(position) - even
              return result == min(even, odd)

seed: 121700

