entry:
  id: 1498
  title: "number-of-subsequences-that-satisfy-the-given-sum-condition"
  params:
    nums:
      type: array
      items:
        type: int
    target:
      type: int
  call:
    cpp: "Solution().numSubseq({nums}, {target})"
    rust: "Solution::num_subseq({nums}, {target})"
    python3: "Solution().numSubseq({nums}, {target})"
    python2: "Solution().numSubseq({nums}, {target})"
    ruby: "num_subseq({nums}, {target})"
    java: "new Solution().numSubseq({nums}, {target})"
    csharp: "new Solution().NumSubseq({nums}, {target})"
    kotlin: "Solution().numSubseq({nums}, {target})"
    go: "numSubseq({nums}, {target})"
    dart: "Solution().numSubseq({nums}, {target})"
    swift: "Solution().numSubseq({nums}, {target})"
    typescript: "numSubseq({nums}, {target})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().numSubseq(nums, target, {result})"
    checker: |
      class Checker:
          def numSubseq(self, nums, target, result):
              mod = 10 ** 9 + 7
              if len(nums) <= 20:
                  expected = 0
                  for mask in range(1, 1 << len(nums)):
                      chosen = [nums[index] for index in range(len(nums)) if mask & (1 << index)]
                      if min(chosen) + max(chosen) <= target:
                          expected += 1
                  expected %= mod
              else:
                  values = sorted(nums)
                  powers = [1] * len(values)
                  for index in range(1, len(values)):
                      powers[index] = (powers[index - 1] * 2) % mod
                  expected = 0
                  for right, maximum in enumerate(values):
                      limit = target - maximum
                      low, high = 0, right
                      while low < high:
                          middle = (low + high) // 2
                          if values[middle] <= limit:
                              low = middle + 1
                          else:
                              high = middle
                      low_count = low
                      valid_with_smaller_min = powers[right] - powers[right - low_count]
                      if 2 * maximum <= target:
                          valid_with_smaller_min += 1
                      expected = (expected + valid_with_smaller_min) % mod
              return result == expected

