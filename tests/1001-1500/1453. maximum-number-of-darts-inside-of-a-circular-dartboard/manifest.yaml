entry:
  id: 1453
  title: "maximum-number-of-darts-inside-of-a-circular-dartboard"
  params:
    darts:
      type: array
      items:
        type: array
        items:
          type: int
    r:
      type: int
  call:
    cpp: "Solution().numPoints({darts}, {r})"
    rust: "Solution::num_points({darts}, {r})"
    python3: "Solution().numPoints({darts}, {r})"
    python2: "Solution().numPoints({darts}, {r})"
    ruby: "num_points({darts}, {r})"
    java: "new Solution().numPoints({darts}, {r})"
    csharp: "new Solution().NumPoints({darts}, {r})"
    kotlin: "Solution().numPoints({darts}, {r})"
    go: "numPoints({darts}, {r})"
    dart: "Solution().numPoints({darts}, {r})"
    swift: "Solution().numPoints({darts}, {r})"
    typescript: "numPoints({darts}, {r})"
judge:
  type: "exact"
limits:
  time_ms: 1200
  memory_mb: 300
oracle:
  python3:
    call: "Checker().numPoints(darts, r, {result})"
    checker: |
      class Checker:
          def numPoints(self, darts, r, result):
              from math import hypot, sqrt
              centers = [(float(x), float(y)) for x, y in darts]
              for i, (x1, y1) in enumerate(darts):
                  for x2, y2 in darts[i + 1:]:
                      dx = x2 - x1
                      dy = y2 - y1
                      distance = hypot(dx, dy)
                      if distance > 2 * r:
                          continue
                      mx = (x1 + x2) / 2.0
                      my = (y1 + y2) / 2.0
                      h = sqrt(max(0.0, r * r - distance * distance / 4.0))
                      centers.append((mx - dy / distance * h, my + dx / distance * h))
                      centers.append((mx + dy / distance * h, my - dx / distance * h))
              expected = max(
                  sum((x - cx) ** 2 + (y - cy) ** 2 <= r * r + 1e-7 for x, y in darts)
                  for cx, cy in centers
              )
              return result == expected
