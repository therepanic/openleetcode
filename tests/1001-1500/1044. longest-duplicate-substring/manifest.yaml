entry:
  id: 1044
  title: longest-duplicate-substring
  params:
    s:
      type: string
  call:
    cpp: Solution().longestDupSubstring({s})
    rust: Solution::longest_dup_substring({s})
    python3: Solution().longestDupSubstring({s})
    python2: Solution().longestDupSubstring({s})
    ruby: longest_dup_substring({s})
    java: new Solution().longestDupSubstring({s})
    csharp: new Solution().LongestDupSubstring({s})
    kotlin: Solution().longestDupSubstring({s})
    go: longestDupSubstring({s})
    dart: Solution().longestDupSubstring({s})
    swift: Solution().longestDupSubstring({s})
    typescript: longestDupSubstring({s})
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: Checker().longestDupSubstring(s, {result})
    checker:
      "class Checker:\n    def longestDupSubstring(self, s, result):\n    \
      \    if not isinstance(result, str):\n            return False\n        n =\
      \ len(s)\n        if result == \"\":\n            best = 0\n        else:\n\
      \            if s.find(result) == -1:\n                return False\n      \
      \      second = s.find(result, s.find(result) + 1)\n            if second ==\
      \ -1:\n                return False\n            best = len(result)\n\n    \
      \    base1, base2 = 131, 31\n        mod1, mod2 = 10**9 + 5, 10**9 + 7\n\n \
      \       def build(base, mod):\n            h = [0] * (n + 1)\n            p\
      \ = [1] * (n + 1)\n            for i, ch in enumerate(s):\n                h[i\
      \ + 1] = (h[i] * base + ord(ch)) % mod\n                p[i + 1] = (p[i] * base)\
      \ % mod\n            return h, p\n\n        def get(h, p, l, r, mod):\n    \
      \        return (h[r] - h[l] * p[r - l]) % mod\n\n        h1, p1 = build(base1,\
      \ mod1)\n        h2, p2 = build(base2, mod2)\n\n        def exists(L):\n   \
      \         seen = set()\n            for i in range(n - L + 1):\n           \
      \     key = (get(h1, p1, i, i + L, mod1), get(h2, p2, i, i + L, mod2))\n   \
      \             if key in seen:\n                    return True\n           \
      \     seen.add(key)\n            return False\n\n        lo, hi = 0, n\n   \
      \     while lo < hi:\n            mid = (lo + hi + 1) // 2\n            if exists(mid):\n\
      \                lo = mid\n            else:\n                hi = mid - 1\n\
      \        return len(result) == lo\n"
seed: 1044
