entry:
  id: 1318
  title: minimum-flips-to-make-a-or-b-equal-to-c
  params:
    a:
      type: int
    b:
      type: int
    c:
      type: int
  call:
    cpp: "Solution().minFlips({a}, {b}, {c})"
    rust: "Solution::min_flips({a}, {b}, {c})"
    python3: "Solution().minFlips({a}, {b}, {c})"
    python2: "Solution().minFlips({a}, {b}, {c})"
    ruby: "min_flips({a}, {b}, {c})"
    java: "new Solution().minFlips({a}, {b}, {c})"
    csharp: "new Solution().MinFlips({a}, {b}, {c})"
    kotlin: "Solution().minFlips({a}, {b}, {c})"
    go: "minFlips({a}, {b}, {c})"
    dart: "Solution().minFlips({a}, {b}, {c})"
    swift: "Solution().minFlips({a}, {b}, {c})"
    typescript: "minFlips({a}, {b}, {c})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().minFlips(a, b, c, {result})"
    checker: |
      class Checker:
          def minFlips(self, a, b, c, result):
              if type(result) is not int:
                  return False
              flips = 0
              while a or b or c:
                  abit = a & 1
                  bbit = b & 1
                  cbit = c & 1
                  if cbit:
                      if not (abit or bbit):
                          flips += 1
                  else:
                      flips += abit + bbit
                  a >>= 1
                  b >>= 1
                  c >>= 1
              return result == flips
