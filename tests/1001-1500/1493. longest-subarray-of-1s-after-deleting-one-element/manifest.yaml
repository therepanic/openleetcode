entry:
  id: 1493
  title: "longest-subarray-of-1s-after-deleting-one-element"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().longestSubarray({nums})"
    rust: "Solution::longest_subarray({nums})"
    python3: "Solution().longestSubarray({nums})"
    python2: "Solution().longestSubarray({nums})"
    ruby: "longest_subarray({nums})"
    java: "new Solution().longestSubarray({nums})"
    csharp: "new Solution().LongestSubarray({nums})"
    kotlin: "Solution().longestSubarray({nums})"
    go: "longestSubarray({nums})"
    dart: "Solution().longestSubarray({nums})"
    swift: "Solution().longestSubarray({nums})"
    typescript: "longestSubarray({nums})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().longestSubarray(nums, {result})"
    checker: |
      class Checker:
          def longestSubarray(self, nums, result):
              runs = []
              index = 0
              while index < len(nums):
                  if nums[index] == 1:
                      start = index
                      while index < len(nums) and nums[index] == 1:
                          index += 1
                      runs.append((start, index - start))
                  else:
                      index += 1

              if not runs:
                  expected = 0
              elif len(runs) == 1 and runs[0][0] == 0 and runs[0][1] == len(nums):
                  expected = len(nums) - 1
              else:
                  expected = max(length for _, length in runs)
                  for (left_start, left_length), (right_start, right_length) in zip(runs, runs[1:]):
                      if right_start == left_start + left_length + 1:
                          expected = max(expected, left_length + right_length)
              return result == expected

seed: 1493

