entry:
  id: 1423
  title: "maximum-points-you-can-obtain-from-cards"
  params:
    cardPoints:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: "Solution().maxScore({cardPoints}, {k})"
    rust: "Solution::max_score({cardPoints}, {k})"
    python3: "Solution().maxScore({cardPoints}, {k})"
    python2: "Solution().maxScore({cardPoints}, {k})"
    ruby: "max_score({cardPoints}, {k})"
    java: "new Solution().maxScore({cardPoints}, {k})"
    csharp: "new Solution().MaxScore({cardPoints}, {k})"
    kotlin: "Solution().maxScore({cardPoints}, {k})"
    go: "maxScore({cardPoints}, {k})"
    dart: "Solution().maxScore({cardPoints}, {k})"
    swift: "Solution().maxScore({cardPoints}, {k})"
    typescript: "maxScore({cardPoints}, {k})"
judge:
  type: exact
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().maxScore(cardPoints, k, {result})"
    checker: |
      class Checker:
          def maxScore(self, cards, k, result):
              if not isinstance(cards, list) or not isinstance(k, int):
                  return False
              if not cards or not (1 <= k <= len(cards)):
                  return False
              if any(not isinstance(x, int) or isinstance(x, bool) or x < 1 or x > 10000 for x in cards):
                  return False
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              prefix = [0]
              for value in cards:
                  prefix.append(prefix[-1] + value)
              n = len(cards)
              best = 0
              for left_count in range(k + 1):
                  right_count = k - left_count
                  left_sum = prefix[left_count]
                  right_start = n - right_count
                  right_sum = prefix[n] - prefix[right_start]
                  best = max(best, left_sum + right_sum)
              return result == best
seed: 1423
