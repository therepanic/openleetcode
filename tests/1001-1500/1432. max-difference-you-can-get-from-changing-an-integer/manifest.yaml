entry:
  id: 1432
  title: "max-difference-you-can-get-from-changing-an-integer"
  params:
    num:
      type: int
  call:
    cpp: "Solution().maxDiff({num})"
    rust: "Solution::max_diff({num})"
    python3: "Solution().maxDiff({num})"
    python2: "Solution().maxDiff({num})"
    ruby: "max_diff({num})"
    java: "new Solution().maxDiff({num})"
    csharp: "new Solution().MaxDiff({num})"
    kotlin: "Solution().maxDiff({num})"
    go: "maxDiff({num})"
    dart: "Solution().maxDiff({num})"
    swift: "Solution().maxDiff({num})"
    typescript: "maxDiff({num})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().maxDiff(num, {result})"
    checker: |
      class Checker:
          def maxDiff(self, num, result):
              if not isinstance(num, int) or isinstance(num, bool) or not 1 <= num <= 100000000:
                  return False
              if isinstance(result, bool):
                  return False
              try:
                  result = int(result)
              except (TypeError, ValueError):
                  return False

              text = str(num)
              high_digit = next((digit for digit in text if digit != "9"), None)
              if high_digit is None:
                  high_text = text
              else:
                  high_text = text.replace(high_digit, "9")

              if text[0] != "1":
                  low_text = text.replace(text[0], "1")
              else:
                  low_digit = next((digit for digit in text[1:] if digit not in "01"), None)
                  low_text = text if low_digit is None else text.replace(low_digit, "0")

              return result == int(high_text) - int(low_text)

