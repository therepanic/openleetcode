entry:
  id: 1249
  title: minimum-remove-to-make-valid-parentheses
  params:
    s:
      type: string
  call:
    cpp: "Solution().minRemoveToMakeValid({s})"
    rust: "Solution::min_remove_to_make_valid({s})"
    python3: "Solution().minRemoveToMakeValid({s})"
    python2: "Solution().minRemoveToMakeValid({s})"
    ruby: "min_remove_to_make_valid({s})"
    java: "new Solution().minRemoveToMakeValid({s})"
    csharp: "new Solution().MinRemoveToMakeValid({s})"
    kotlin: "Solution().minRemoveToMakeValid({s})"
    go: "minRemoveToMakeValid({s})"
    dart: "Solution().minRemoveToMakeValid({s})"
    swift: "Solution().minRemoveToMakeValid({s})"
    typescript: "minRemoveToMakeValid({s})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().minRemoveToMakeValid(s, {result})"
    checker: |
      class Checker:
          def minRemoveToMakeValid(self, s, result):
              if not isinstance(result, str):
                  return False

              source_index = 0
              for char in result:
                  source_index = s.find(char, source_index)
                  if source_index == -1:
                      return False
                  source_index += 1

              if ''.join(char for char in s if char.isalpha()) != ''.join(char for char in result if char.isalpha()):
                  return False

              balance = 0
              for char in result:
                  if char == '(':
                      balance += 1
                  elif char == ')':
                      balance -= 1
                      if balance < 0:
                          return False
              if balance != 0:
                  return False

              unmatched_open = 0
              removals = 0
              for char in s:
                  if char == '(':
                      unmatched_open += 1
                  elif char == ')':
                      if unmatched_open:
                          unmatched_open -= 1
                      else:
                          removals += 1
              removals += unmatched_open
              return len(s) - len(result) == removals
seed: 1249
