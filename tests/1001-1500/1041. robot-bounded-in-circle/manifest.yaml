entry:
  id: 1041
  title: robot-bounded-in-circle
  params:
    instructions:
      type: string
  call:
    cpp: Solution().isRobotBounded({instructions})
    rust: Solution::is_robot_bounded({instructions})
    python3: Solution().isRobotBounded({instructions})
    python2: Solution().isRobotBounded({instructions})
    ruby: is_robot_bounded({instructions})
    java: new Solution().isRobotBounded({instructions})
    csharp: new Solution().IsRobotBounded({instructions})
    kotlin: Solution().isRobotBounded({instructions})
    go: isRobotBounded({instructions})
    dart: Solution().isRobotBounded({instructions})
    swift: Solution().isRobotBounded({instructions})
    typescript: isRobotBounded({instructions})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().isRobotBounded(instructions, {result})
    checker:
      "class Checker:\n    def isRobotBounded(self, instructions, result):\n\
      \        if not isinstance(result, bool):\n            return False\n      \
      \  directions = [(0, 1), (1, 0), (0, -1), (-1, 0)]\n        x = y = dir_index\
      \ = 0\n        for instr in instructions:\n            if instr == 'G':\n  \
      \              x += directions[dir_index][0]\n                y += directions[dir_index][1]\n\
      \            elif instr == 'L':\n                dir_index = (dir_index - 1)\
      \ % 4\n            elif instr == 'R':\n                dir_index = (dir_index\
      \ + 1) % 4\n        expected = (x == 0 and y == 0) or dir_index != 0\n     \
      \   return result == expected\n"
seed: 1041
