entry:
  id: 1418
  title: "display-table-of-food-orders-in-a-restaurant"
  params:
    orders:
      type: array
      items:
        type: array
        items:
          type: string
  call:
    cpp: "Solution().displayTable({orders})"
    rust: "Solution::display_table({orders})"
    python3: "Solution().displayTable({orders})"
    python2: "Solution().displayTable({orders})"
    ruby: "display_table({orders})"
    java: "new Solution().displayTable({orders})"
    csharp: "new Solution().DisplayTable({orders})"
    kotlin: "Solution().displayTable({orders})"
    go: "displayTable({orders})"
    dart: "Solution().displayTable({orders})"
    swift: "Solution().displayTable({orders})"
    typescript: "displayTable({orders})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().displayTable(orders, {result})"
    checker: |
      class Checker:
          def displayTable(self, orders, result):
              foods = sorted({order[2] for order in orders})
              tables = {}
              for _, table, food in orders:
                  tables.setdefault(int(table), {})
                  tables[int(table)][food] = tables[int(table)].get(food, 0) + 1
              expected = [["Table"] + foods]
              for table in sorted(tables):
                  expected.append([str(table)] + [str(tables[table].get(food, 0)) for food in foods])
              return result == expected

seed: 1418

tests:
