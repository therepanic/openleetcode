        elemType: "string"
        value:
          - ["David", "3", "Ceviche"]
          - ["Corina", "10", "Beef Burrito"]
          - ["David", "3", "Fried Chicken"]
          - ["Carla", "5", "Water"]
          - ["Carla", "5", "Ceviche"]
