entry:
  id: 1345
  title: "jump-game-iv"
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().minJumps({arr})"
    rust: "Solution::min_jumps({arr})"
    python3: "Solution().minJumps({arr})"
    python2: "Solution().minJumps({arr})"
    ruby: "min_jumps({arr})"
    java: "new Solution().minJumps({arr})"
    csharp: "new Solution().MinJumps({arr})"
    kotlin: "Solution().minJumps({arr})"
    go: "minJumps({arr})"
    dart: "Solution().minJumps({arr})"
    swift: "Solution().minJumps({arr})"
    typescript: "minJumps({arr})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 300

oracle:
  python3:
    call: "Checker().minJumps(arr, {result})"
    checker: |
      from collections import deque, defaultdict

      class Checker:
          def minJumps(self, arr, result):
              if not isinstance(result, int) or isinstance(result, bool) or not arr:
                  return False
              n = len(arr)
              groups = defaultdict(list)
              for index, value in enumerate(arr):
                  groups[value].append(index)
              distance = [-1] * n
              distance[0] = 0
              queue = deque([0])
              while queue:
                  index = queue.popleft()
                  if index == n - 1:
                      break
                  neighbors = []
                  if index > 0:
                      neighbors.append(index - 1)
                  if index + 1 < n:
                      neighbors.append(index + 1)
                  neighbors.extend(groups[arr[index]])
                  groups[arr[index]] = []
                  for nxt in neighbors:
                      if distance[nxt] == -1:
                          distance[nxt] = distance[index] + 1
                          queue.append(nxt)
              return result == distance[-1]

seed: 134500

