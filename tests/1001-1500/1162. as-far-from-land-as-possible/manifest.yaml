  memory_mb: 256
oracle:
  python3:
    call: "Checker().maxDistance(grid, {result})"
    checker: |
      class Checker:
          def maxDistance(self, grid, result):
              if type(result) is not int or not isinstance(grid, list):
                  return False
              n = len(grid)
              if n < 1 or any(not isinstance(row, list) or len(row) != n for row in grid):
                  return False
              if any(cell not in (0, 1) for row in grid for cell in row):
                  return False
              land_count = sum(cell for row in grid for cell in row)
              if land_count == 0 or land_count == n * n:
                  return result == -1
              inf = 2 * n
              dist = [[0 if grid[r][c] else inf for c in range(n)] for r in range(n)]
              for r in range(n):
                  for c in range(n):
                      if r:
                          dist[r][c] = min(dist[r][c], dist[r - 1][c] + 1)
                      if c:
                          dist[r][c] = min(dist[r][c], dist[r][c - 1] + 1)
              for r in range(n - 1, -1, -1):
                  for c in range(n - 1, -1, -1):
                      if r + 1 < n:
                          dist[r][c] = min(dist[r][c], dist[r + 1][c] + 1)
                      if c + 1 < n:
                          dist[r][c] = min(dist[r][c], dist[r][c + 1] + 1)
              return result == max(dist[r][c] for r in range(n) for c in range(n) if grid[r][c] == 0)
