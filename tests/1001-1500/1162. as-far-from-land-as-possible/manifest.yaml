entry:
  id: 1162
  title: as-far-from-land-as-possible
  params:
    grid:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().maxDistance({grid})"
    rust: "Solution::max_distance({grid})"
    python3: "Solution().maxDistance({grid})"
    python2: "Solution().maxDistance({grid})"
    ruby: "max_distance({grid})"
    java: "new Solution().maxDistance({grid})"
    csharp: "new Solution().MaxDistance({grid})"
    kotlin: "Solution().maxDistance({grid})"
    go: "maxDistance({grid})"
    dart: "Solution().maxDistance({grid})"
    swift: "Solution().maxDistance({grid})"
    typescript: "maxDistance({grid})"
judge:
  type: exact
limits:
