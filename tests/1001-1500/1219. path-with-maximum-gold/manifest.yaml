judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().getMaximumGold(grid, {result})"
    checker: |
      class Checker:
          def getMaximumGold(self, grid, result):
              if type(result) is not int or not grid or not grid[0]:
                  return False
              rows = len(grid)
              cols = len(grid[0])
              if any(len(row) != cols for row in grid):
                  return False
              best = 0
              def dfs(r, c, seen, total):
                  nonlocal best
                  if total > best:
                      best = total
                  for dr, dc in ((1, 0), (-1, 0), (0, 1), (0, -1)):
                      nr, nc = r + dr, c + dc
                      if (0 <= nr < rows and 0 <= nc < cols and
                              grid[nr][nc] > 0 and (nr, nc) not in seen):
                          dfs(nr, nc, seen | {(nr, nc)}, total + grid[nr][nc])
              for r in range(rows):
                  for c in range(cols):
                      if grid[r][c] > 0:
                          dfs(r, c, {(r, c)}, grid[r][c])
              return result == best
