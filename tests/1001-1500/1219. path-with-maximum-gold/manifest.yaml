  call:
    cpp: "Solution().getMaximumGold({grid})"
    rust: "Solution::get_maximum_gold({grid})"
    python3: "Solution().getMaximumGold({grid})"
    python2: "Solution().getMaximumGold({grid})"
    ruby: "get_maximum_gold({grid})"
    java: "new Solution().getMaximumGold({grid})"
    csharp: "new Solution().GetMaximumGold({grid})"
    kotlin: "Solution().getMaximumGold({grid})"
    go: "getMaximumGold({grid})"
    dart: "Solution().getMaximumGold({grid})"
    swift: "Solution().getMaximumGold({grid})"
