entry:
  id: 1073
  title: adding-two-negabinary-numbers
  params:
    arr1:
      type: array
      items:
        type: int
    arr2:
      type: array
      items:
        type: int
  call:
    cpp: Solution().addNegabinary({arr1}, {arr2})
    rust: Solution::add_negabinary({arr1}, {arr2})
    python3: Solution().addNegabinary({arr1}, {arr2})
    python2: Solution().addNegabinary({arr1}, {arr2})
    ruby: add_negabinary({arr1}, {arr2})
    java: new Solution().addNegabinary({arr1}, {arr2})
    csharp: new Solution().AddNegabinary({arr1}, {arr2})
    kotlin: Solution().addNegabinary({arr1}, {arr2})
    go: addNegabinary({arr1}, {arr2})
    dart: Solution().addNegabinary({arr1}, {arr2})
    swift: Solution().addNegabinary({arr1}, {arr2})
    typescript: addNegabinary({arr1}, {arr2})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().addNegabinary(arr1, arr2, {result})
    checker:
      "class Checker:\n    def addNegabinary(self, arr1, arr2, result):\n \
      \       if not isinstance(result, list) or not result:\n            return False\n\
      \        if result[0] == 0 and len(result) > 1:\n            return False\n\
      \        if any(x not in (0, 1) for x in result):\n            return False\n\
      \        a = list(arr1)\n        b = list(arr2)\n        carry = 0\n       \
      \ expected = []\n        while carry or a or b:\n            if a:\n       \
      \         carry += a.pop()\n            if b:\n                carry += b.pop()\n\
      \            expected.append(carry & 1)\n            carry = -(carry >> 1)\n\
      \        while len(expected) > 1 and expected[-1] == 0:\n            expected.pop()\n\
      \        return result == expected[::-1]\n"
seed: 1073
