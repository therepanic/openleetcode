entry:
  id: 1017
  title: "convert-to-base-2"
  params:
    n:
      type: int
  call:
    cpp: "Solution().baseNeg2({n})"
    rust: "Solution::base_neg2({n})"
    python3: "Solution().baseNeg2({n})"
    python2: "Solution().baseNeg2({n})"
    ruby: "base_neg2({n})"
    java: "new Solution().baseNeg2({n})"
    csharp: "new Solution().BaseNeg2({n})"
    kotlin: "Solution().baseNeg2({n})"
    go: "baseNeg2({n})"
    dart: "Solution().baseNeg2({n})"
    swift: "Solution().baseNeg2({n})"
    typescript: "baseNeg2({n})"
judge:
  type: "exact"
limits:
  time_ms: 200
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(n, {result})"
    checker: |
      class Checker:
          def check(self, n, result):
              if n == 0:
                  return result == "0"
              digits = []
              while n:
                  n, r = divmod(n, -2)
                  if r < 0:
                      n += 1
                      r += 2
                  digits.append(str(r))
              return ''.join(reversed(digits)) == result
