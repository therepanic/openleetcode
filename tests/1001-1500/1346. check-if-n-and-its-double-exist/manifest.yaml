entry:
  id: 1346
  title: "check-if-n-and-its-double-exist"
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().checkIfExist({arr})"
    rust: "Solution::check_if_exist({arr})"
    python3: "Solution().checkIfExist({arr})"
    python2: "Solution().checkIfExist({arr})"
    ruby: "check_if_exist({arr})"
    java: "new Solution().checkIfExist({arr})"
    csharp: "new Solution().CheckIfExist({arr})"
    kotlin: "Solution().checkIfExist({arr})"
    go: "checkIfExist({arr})"
    dart: "Solution().checkIfExist({arr})"
    swift: "Solution().checkIfExist({arr})"
    typescript: "checkIfExist({arr})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().checkIfExist(arr, {result})"
    checker: |
      class Checker:
          def checkIfExist(self, arr, result):
              expected = any(i != j and arr[i] == 2 * arr[j]
                             for i in range(len(arr))
                             for j in range(len(arr)))
              return result == expected

seed: 1346

