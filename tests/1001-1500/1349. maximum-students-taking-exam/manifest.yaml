limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().maxStudents(seats, {result})"
    checker: |
      class Checker:
          def maxStudents(self, seats, result):
              m, n = len(seats), len(seats[0])
              masks = []
              for row in seats:
                  allowed = []
                  for mask in range(1 << n):
                      if mask & (mask << 1):
                          continue
                      if any(row[c] == '#' and (mask >> c) & 1 for c in range(n)):
                          continue
                      allowed.append(mask)
                  masks.append(allowed)
              dp = {0: 0}
              for r in range(m):
                  nxt = {}
                  for mask in masks[r]:
                      best = 0
                      for prev, value in dp.items():
                          if mask & (prev << 1) or mask & (prev >> 1):
                              continue
                          best = max(best, value + mask.bit_count())
                      nxt[mask] = best
                  dp = nxt
              return result == max(dp.values(), default=0)

seed: 1349

