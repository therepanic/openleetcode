entry:
  id: 1480
  title: "running-sum-of-1d-array"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().runningSum({nums})"
    rust: "Solution::running_sum({nums})"
    python3: "Solution().runningSum({nums})"
    python2: "Solution().runningSum({nums})"
    ruby: "running_sum({nums})"
    java: "new Solution().runningSum({nums})"
    csharp: "new Solution().RunningSum({nums})"
    kotlin: "Solution().runningSum({nums})"
    go: "runningSum({nums})"
    dart: "Solution().runningSum({nums})"
    swift: "Solution().runningSum({nums})"
    typescript: "runningSum({nums})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().runningSum(nums, {result})"
    checker: |
      class Checker:
          def runningSum(self, nums, result):
              total = 0
              expected = []
              for value in nums:
                  total += value
                  expected.append(total)
              return result == expected

seed: 1480

