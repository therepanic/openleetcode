entry:
  id: 1461
  title: "check-if-a-string-contains-all-binary-codes-of-size-k"
  params:
    s:
      type: string
    k:
      type: int
  call:
    cpp: "Solution().hasAllCodes({s}, {k})"
    rust: "Solution::has_all_codes({s}, {k})"
    python3: "Solution().hasAllCodes({s}, {k})"
    python2: "Solution().hasAllCodes({s}, {k})"
    ruby: "has_all_codes({s}, {k})"
    java: "new Solution().hasAllCodes({s}, {k})"
    csharp: "new Solution().HasAllCodes({s}, {k})"
    kotlin: "Solution().hasAllCodes({s}, {k})"
    go: "hasAllCodes({s}, {k})"
    dart: "Solution().hasAllCodes({s}, {k})"
    swift: "Solution().hasAllCodes({s}, {k})"
    typescript: "hasAllCodes({s}, {k})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().hasAllCodes(s, k, {result})"
    checker: |
      class Checker:
          def hasAllCodes(self, s, k, result):
              required = {format(value, '0{}b'.format(k)) for value in range(1 << k)}
              present = {s[index:index + k] for index in range(len(s) - k + 1)}
              return result == required.issubset(present)

seed: 1461

