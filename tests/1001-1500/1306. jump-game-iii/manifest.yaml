        type: int
    start_value:
      type: int
  call:
    cpp: "Solution().canReach({arr}, {start_value})"
    rust: "Solution::can_reach({arr}, {start_value})"
    python3: "Solution().canReach({arr}, {start_value})"
    python2: "Solution().canReach({arr}, {start_value})"
    ruby: "can_reach({arr}, {start_value})"
    java: "new Solution().canReach({arr}, {start_value})"
    csharp: "new Solution().CanReach({arr}, {start_value})"
    kotlin: "Solution().canReach({arr}, {start_value})"
    go: "canReach({arr}, {start_value})"
    dart: "Solution().canReach({arr}, {start_value})"
    swift: "Solution().canReach({arr}, {start_value})"
    typescript: "canReach({arr}, {start_value})"

judge:
  type: "exact"

limits:
  time_ms: 2500
  memory_mb: 256

oracle:
  python3:
    call: "Checker().canReach(arr, start_value, {result})"
    checker: |
      from collections import deque

      class Checker:
          def canReach(self, arr, start_value, result):
              if not isinstance(result, bool):
                  return False
              queue = deque([start_value])
              seen = {start_value}
              while queue:
                  index = queue.popleft()
                  if arr[index] == 0:
                      return result is True
                  for next_index in (index + arr[index], index - arr[index]):
                      if 0 <= next_index < len(arr) and next_index not in seen:
                          seen.add(next_index)
                          queue.append(next_index)
              return result is False

seed: 1306

