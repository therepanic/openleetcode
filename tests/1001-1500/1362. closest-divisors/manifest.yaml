  memory_mb: 256
oracle:
  python3:
    call: "Checker().closestDivisors(num, {result})"
    checker: |
      from math import isqrt

      class Checker:
          def closestDivisors(self, num, result):
              if not isinstance(num, int) or isinstance(num, bool) or not 1 <= num <= 1000000000:
                  return False
              if not isinstance(result, list) or len(result) != 2:
                  return False
              a, b = result
              if not all(isinstance(value, int) and not isinstance(value, bool) and value > 0 for value in result):
                  return False
              if a * b not in (num + 1, num + 2):
                  return False
              best_difference = None
              for candidate in (num + 1, num + 2):
                  for d in range(isqrt(candidate), 0, -1):
                      if candidate % d == 0:
                          difference = candidate // d - d
                          if best_difference is None or difference < best_difference:
                              best_difference = difference
                          break
              return abs(a - b) == best_difference
