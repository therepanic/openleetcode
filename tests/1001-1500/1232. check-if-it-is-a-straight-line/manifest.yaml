entry:
  id: 1232
  title: check-if-it-is-a-straight-line
  params:
    coordinates:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().checkStraightLine({coordinates})"
    rust: "Solution::check_straight_line({coordinates})"
    python3: "Solution().checkStraightLine({coordinates})"
    python2: "Solution().checkStraightLine({coordinates})"
    ruby: "check_straight_line({coordinates})"
    java: "new Solution().checkStraightLine({coordinates})"
    csharp: "new Solution().CheckStraightLine({coordinates})"
    kotlin: "Solution().checkStraightLine({coordinates})"
    go: "checkStraightLine({coordinates})"
    dart: "Solution().checkStraightLine({coordinates})"
    swift: "Solution().checkStraightLine({coordinates})"
    typescript: "checkStraightLine({coordinates})"
judge:
  type: exact
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().checkStraightLine(coordinates, {result})"
    checker: |
      class Checker:
          def checkStraightLine(self, coordinates, result):
              if type(result) is not bool or len(coordinates) < 2:
                  return False
              x0, y0 = coordinates[0]
              x1, y1 = coordinates[1]
              dx, dy = x1 - x0, y1 - y0
              expected = True
              for x, y in coordinates[2:]:
                  if (x - x0) * dy != (y - y0) * dx:
                      expected = False
                      break
              return result == expected
seed: 1232
