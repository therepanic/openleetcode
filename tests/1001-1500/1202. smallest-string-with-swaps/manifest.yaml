entry:
  id: 1202
  title: smallest-string-with-swaps
  params:
    s:
      type: string
    pairs:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().smallestStringWithSwaps({s}, {pairs})"
    rust: "Solution::smallest_string_with_swaps({s}, {pairs})"
    python3: "Solution().smallestStringWithSwaps({s}, {pairs})"
    python2: "Solution().smallestStringWithSwaps({s}, {pairs})"
    ruby: "smallest_string_with_swaps({s}, {pairs})"
    java: "new Solution().smallestStringWithSwaps({s}, {pairs})"
    csharp: "new Solution().SmallestStringWithSwaps({s}, {pairs})"
    kotlin: "Solution().smallestStringWithSwaps({s}, {pairs})"
    go: "smallestStringWithSwaps({s}, {pairs})"
    dart: "Solution().smallestStringWithSwaps({s}, {pairs})"
    swift: "Solution().smallestStringWithSwaps({s}, {pairs})"
    typescript: "smallestStringWithSwaps({s}, {pairs})"
judge:
  type: exact
limits:
  time_ms: 1500
  memory_mb: 256
oracle:
  python3:
    call: "Checker().smallestStringWithSwaps(s, pairs, {result})"
    checker: |
      class Checker:
          def smallestStringWithSwaps(self, s, pairs, result):
              if not isinstance(s, str) or not isinstance(pairs, list) or not isinstance(result, str):
                  return False
              if len(result) != len(s):
                  return False
              parent = list(range(len(s)))

              def find(x):
                  while parent[x] != x:
                      parent[x] = parent[parent[x]]
                      x = parent[x]
                  return x

              for pair in pairs:
                  if not isinstance(pair, list) or len(pair) != 2:
                      return False
                  a, b = pair
                  if not isinstance(a, int) or not isinstance(b, int):
                      return False
                  if not 0 <= a < len(s) or not 0 <= b < len(s):
                      return False
                  ra, rb = find(a), find(b)
                  if ra != rb:
                      parent[ra] = rb

              components = {}
              for index in range(len(s)):
                  components.setdefault(find(index), []).append(index)
              expected = list(s)
              for indices in components.values():
                  for index, char in zip(sorted(indices), sorted(s[index] for index in indices)):
                      expected[index] = char
              return result == ''.join(expected)
