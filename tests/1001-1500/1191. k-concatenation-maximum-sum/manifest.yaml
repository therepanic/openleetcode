  params:
    arr:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: "Solution().kConcatenationMaxSum({arr}, {k})"
    rust: "Solution::k_concatenation_max_sum({arr}, {k})"
    python3: "Solution().kConcatenationMaxSum({arr}, {k})"
    python2: "Solution().kConcatenationMaxSum({arr}, {k})"
    ruby: "k_concatenation_max_sum({arr}, {k})"
    java: "new Solution().kConcatenationMaxSum({arr}, {k})"
    csharp: "new Solution().KConcatenationMaxSum({arr}, {k})"
    kotlin: "Solution().kConcatenationMaxSum({arr}, {k})"
    go: "kConcatenationMaxSum({arr}, {k})"
    dart: "Solution().kConcatenationMaxSum({arr}, {k})"
    swift: "Solution().kConcatenationMaxSum({arr}, {k})"
    typescript: "kConcatenationMaxSum({arr}, {k})"

judge:
  type: "exact"

limits:
  time_ms: 700
  memory_mb: 300

oracle:
  python3:
    call: "Checker().kConcatenationMaxSum(arr, k, {result})"
    checker: |
      class Checker:
          def kConcatenationMaxSum(self, arr, k, result):
              if not isinstance(result, int) or isinstance(result, bool) or not arr or k < 1:
                  return False
              def kadane(values):
                  best = 0
                  current = 0
                  for value in values:
                      current = max(0, current + value)
                      best = max(best, current)
                  return best
              mod = 1000000007
              if k <= 3:
                  expected = kadane(arr * k) % mod
              else:
                  expected = max((max(0, sum(arr) * (k - 1)) % mod) + kadane(arr), kadane(arr * 2))
              return result == expected

seed: 119100

