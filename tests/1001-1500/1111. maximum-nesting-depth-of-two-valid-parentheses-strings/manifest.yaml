entry:
  id: 1111
  title: maximum-nesting-depth-of-two-valid-parentheses-strings
  params:
    seq:
      type: string
  call:
    cpp: Solution().maxDepthAfterSplit({seq})
    rust: Solution::max_depth_after_split({seq})
    python3: Solution().maxDepthAfterSplit({seq})
    python2: Solution().maxDepthAfterSplit({seq})
    ruby: max_depth_after_split({seq})
    java: new Solution().maxDepthAfterSplit({seq})
    csharp: new Solution().MaxDepthAfterSplit({seq})
    kotlin: Solution().maxDepthAfterSplit({seq})
    go: maxDepthAfterSplit({seq})
    dart: Solution().maxDepthAfterSplit({seq})
    swift: Solution().maxDepthAfterSplit({seq})
    typescript: maxDepthAfterSplit({seq})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 256
oracle:
  python3:
    call: Checker().maxDepthAfterSplit(seq, {result})
    checker:
      "class Checker:\n    def maxDepthAfterSplit(self, seq, result):\n   \
      \     if not isinstance(result, list) or len(result) != len(seq):\n        \
      \    return False\n        if any(x not in (0, 1) for x in result):\n      \
      \      return False\n        a = []\n        b = []\n        da = 0\n      \
      \  db = 0\n        depth = 0\n        max_depth = 0\n        for ch, bit in\
      \ zip(seq, result):\n            if ch == \"(\":\n                depth += 1\n\
      \                max_depth = max(max_depth, depth)\n            else:\n    \
      \            depth -= 1\n            if depth < 0:\n                return False\n\
      \            if bit == 0:\n                a.append(ch)\n                da\
      \ += 1 if ch == \"(\" else -1\n                if da < 0:\n                \
      \    return False\n            else:\n                b.append(ch)\n       \
      \         db += 1 if ch == \"(\" else -1\n                if db < 0:\n     \
      \               return False\n        if depth != 0 or da != 0 or db != 0:\n\
      \            return False\n\n        def vps_depth(s):\n            d = 0\n\
      \            mx = 0\n            for ch in s:\n                if ch == \"(\"\
      :\n                    d += 1\n                    mx = max(mx, d)\n       \
      \         else:\n                    d -= 1\n                    if d < 0:\n\
      \                        return -1\n            return mx if d == 0 else -1\n\
      \n        da_depth = vps_depth(a)\n        db_depth = vps_depth(b)\n       \
      \ if da_depth < 0 or db_depth < 0:\n            return False\n        return\
      \ max(da_depth, db_depth) == (max_depth + 1) // 2\n"
seed: 1111
