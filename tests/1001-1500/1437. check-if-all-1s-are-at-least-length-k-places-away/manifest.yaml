entry:
  id: 1437
  title: "check-if-all-1s-are-at-least-length-k-places-away"
  params:
    nums:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: "Solution().kLengthApart({nums}, {k})"
    rust: "Solution::k_length_apart({nums}, {k})"
    python3: "Solution().kLengthApart({nums}, {k})"
    python2: "Solution().kLengthApart({nums}, {k})"
    ruby: "k_length_apart({nums}, {k})"
    java: "new Solution().kLengthApart({nums}, {k})"
    csharp: "new Solution().KLengthApart({nums}, {k})"
    kotlin: "Solution().kLengthApart({nums}, {k})"
    go: "kLengthApart({nums}, {k})"
    dart: "Solution().kLengthApart({nums}, {k})"
    swift: "Solution().kLengthApart({nums}, {k})"
    typescript: "kLengthApart({nums}, {k})"

judge:
  type: "exact"

limits:
  time_ms: 700
  memory_mb: 256

oracle:
  python3:
    call: "Checker().kLengthApart(nums, k, {result})"
    checker: |
      class Checker:
          def kLengthApart(self, nums, k, result):
              one_positions = [i for i, value in enumerate(nums) if value == 1]
              distances = [b - a for a, b in zip(one_positions, one_positions[1:])]
              expected = not distances or min(distances) > k
              return isinstance(result, bool) and result == expected

seed: 1437

