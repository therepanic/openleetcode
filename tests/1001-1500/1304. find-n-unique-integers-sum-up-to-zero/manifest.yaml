entry:
  id: 1304
  title: "find-n-unique-integers-sum-up-to-zero"
  params:
    n:
      type: int
  call:
    cpp: "Solution().sumZero({n})"
    rust: "Solution::sum_zero({n})"
    python3: "Solution().sumZero({n})"
    python2: "Solution().sumZero({n})"
    ruby: "sum_zero({n})"
    java: "new Solution().sumZero({n})"
    csharp: "new Solution().SumZero({n})"
    kotlin: "Solution().sumZero({n})"
    go: "sumZero({n})"
    dart: "Solution().sumZero({n})"
    swift: "Solution().sumZero({n})"
    typescript: "sumZero({n})"
judge:
  type: "exact"
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().sumZero(n, {result})"
    checker: |
      class Checker:
          def sumZero(self, n, result):
              if not isinstance(result, list) or len(result) != n:
                  return False
              if any(isinstance(value, bool) or not isinstance(value, int) for value in result):
                  return False
              return len(set(result)) == n and sum(result) == 0
seed: 1304
