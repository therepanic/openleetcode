    startTime:
      type: array
      items:
        type: int
    endTime:
      type: array
      items:
        type: int
    profit:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().jobScheduling({startTime}, {endTime}, {profit})"
    rust: "Solution::job_scheduling({startTime}, {endTime}, {profit})"
    python3: "Solution().jobScheduling({startTime}, {endTime}, {profit})"
    python2: "Solution().jobScheduling({startTime}, {endTime}, {profit})"
    ruby: "job_scheduling({startTime}, {endTime}, {profit})"
    java: "new Solution().jobScheduling({startTime}, {endTime}, {profit})"
    csharp: "new Solution().JobScheduling({startTime}, {endTime}, {profit})"
    kotlin: "Solution().jobScheduling({startTime}, {endTime}, {profit})"
    go: "jobScheduling({startTime}, {endTime}, {profit})"
    dart: "Solution().jobScheduling({startTime}, {endTime}, {profit})"
    swift: "Solution().jobScheduling({startTime}, {endTime}, {profit})"
    typescript: "jobScheduling({startTime}, {endTime}, {profit})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().jobScheduling(startTime, endTime, profit, {result})"
    checker: |
      from bisect import bisect_left
      class Checker:
          def jobScheduling(self, startTime, endTime, profit, result):
              jobs = sorted(zip(startTime, endTime, profit))
              starts = [job[0] for job in jobs]
              dp = [0] * (len(jobs) + 1)
              for i in range(len(jobs) - 1, -1, -1):
                  nxt = bisect_left(starts, jobs[i][1], i + 1)
                  dp[i] = max(dp[i + 1], jobs[i][2] + dp[nxt])
              return result == dp[0]

