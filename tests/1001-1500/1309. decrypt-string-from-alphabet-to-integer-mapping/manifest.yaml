entry:
  id: 1309
  title: "decrypt-string-from-alphabet-to-integer-mapping"
  params:
    s:
      type: string
  call:
    cpp: "Solution().freqAlphabets({s})"
    rust: "Solution::freq_alphabets({s})"
    python3: "Solution().freqAlphabets({s})"
    python2: "Solution().freqAlphabets({s})"
    ruby: "freq_alphabets({s})"
    java: "new Solution().freqAlphabets({s})"
    csharp: "new Solution().FreqAlphabets({s})"
    kotlin: "Solution().freqAlphabets({s})"
    go: "freqAlphabets({s})"
    dart: "Solution().freqAlphabets({s})"
    swift: "Solution().freqAlphabets({s})"
    typescript: "freqAlphabets({s})"
judge:
  type: "exact"
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().freqAlphabets(s, {result})"
    checker: |
      class Checker:
          def freqAlphabets(self, s, result):
              decoded = []
              index = 0
              while index < len(s):
                  if index + 2 < len(s) and s[index + 2] == '#':
                      decoded.append(chr(ord('a') + int(s[index:index + 2]) - 1))
                      index += 3
                  else:
                      decoded.append(chr(ord('a') + int(s[index]) - 1))
                      index += 1
              return isinstance(result, str) and result == ''.join(decoded)
seed: 1309
