  title: "element-appearing-more-than-25-in-sorted-array"
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().findSpecialInteger({arr})"
    rust: "Solution::find_special_integer({arr})"
    python3: "Solution().findSpecialInteger({arr})"
    python2: "Solution().findSpecialInteger({arr})"
    ruby: "find_special_integer({arr})"
    java: "new Solution().findSpecialInteger({arr})"
    csharp: "new Solution().FindSpecialInteger({arr})"
    kotlin: "Solution().findSpecialInteger({arr})"
    go: "findSpecialInteger({arr})"
    dart: "Solution().findSpecialInteger({arr})"
    swift: "Solution().findSpecialInteger({arr})"
    typescript: "findSpecialInteger({arr})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().findSpecialInteger(arr, {result})"
    checker: |
      class Checker:
          def findSpecialInteger(self, arr, result):
              if any(arr[i] > arr[i + 1] for i in range(len(arr) - 1)):
                  return False
              counts = {}
              for value in arr:
                  counts[value] = counts.get(value, 0) + 1
              winners = [value for value, count in counts.items() if count * 4 > len(arr)]
              return len(winners) == 1 and result == winners[0]

seed: 1287

