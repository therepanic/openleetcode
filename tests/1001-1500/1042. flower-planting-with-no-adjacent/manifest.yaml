entry:
  id: 1042
  title: flower-planting-with-no-adjacent
  params:
    n:
      type: int
    paths:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().gardenNoAdj({n}, {paths})"
    rust: "Solution::garden_no_adj({n}, {paths})"
    python3: "Solution().gardenNoAdj({n}, {paths})"
    python2: "Solution().gardenNoAdj({n}, {paths})"
    ruby: "garden_no_adj({n}, {paths})"
    java: "new Solution().gardenNoAdj({n}, {paths})"
    csharp: "new Solution().GardenNoAdj({n}, {paths})"
    kotlin: "Solution().gardenNoAdj({n}, {paths})"
    go: "gardenNoAdj({n}, {paths})"
    dart: "Solution().gardenNoAdj({n}, {paths})"
    swift: "Solution().gardenNoAdj({n}, {paths})"
    typescript: "gardenNoAdj({n}, {paths})"
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().gardenNoAdj(n, paths, {result})"
    checker: |
      class Checker:
          def gardenNoAdj(self, n, paths, result):
              if not isinstance(result, list) or len(result) != n:
                  return False
              if any((not isinstance(x, int)) or x < 1 or x > 4 for x in result):
                  return False
              for u, v in paths:
                  if result[u - 1] == result[v - 1]:
                      return False
              return True
seed: 1042
