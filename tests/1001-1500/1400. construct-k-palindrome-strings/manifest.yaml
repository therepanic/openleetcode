entry:
  id: 1400
  title: "construct-k-palindrome-strings"
  params:
    s:
      type: string
    k:
      type: int
  call:
    cpp: "Solution().canConstruct({s}, {k})"
    rust: "Solution::can_construct({s}, {k})"
    python3: "Solution().canConstruct({s}, {k})"
    python2: "Solution().canConstruct({s}, {k})"
    ruby: "can_construct({s}, {k})"
    java: "new Solution().canConstruct({s}, {k})"
    csharp: "new Solution().CanConstruct({s}, {k})"
    kotlin: "Solution().canConstruct({s}, {k})"
    go: "canConstruct({s}, {k})"
    dart: "Solution().canConstruct({s}, {k})"
    swift: "Solution().canConstruct({s}, {k})"
    typescript: "canConstruct({s}, {k})"

judge:
  type: "exact"

limits:
  time_ms: 300
  memory_mb: 300

oracle:
  python3:
    call: "Checker().canConstruct(s, k, {result})"
    checker: |
      class Checker:
          def canConstruct(self, s, k, result):
              if not isinstance(result, bool):
                  return False
              counts = {}
              for ch in s:
                  counts[ch] = counts.get(ch, 0) + 1
              minimum = sum(value % 2 for value in counts.values())
              maximum = len(s)
              expected = minimum <= k <= maximum
              return result == expected

seed: 1400001

