entry:
  id: 1187
  title: "make-array-strictly-increasing"
  params:
    arr1:
      type: array
      items:
        type: int
    arr2:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().makeArrayIncreasing({arr1}, {arr2})"
    rust: "Solution::make_array_increasing({arr1}, {arr2})"
    python3: "Solution().makeArrayIncreasing({arr1}, {arr2})"
    python2: "Solution().makeArrayIncreasing({arr1}, {arr2})"
    ruby: "make_array_increasing({arr1}, {arr2})"
    java: "new Solution().makeArrayIncreasing({arr1}, {arr2})"
    csharp: "new Solution().MakeArrayIncreasing({arr1}, {arr2})"
    kotlin: "Solution().makeArrayIncreasing({arr1}, {arr2})"
    go: "makeArrayIncreasing({arr1}, {arr2})"
    dart: "Solution().makeArrayIncreasing({arr1}, {arr2})"
    swift: "Solution().makeArrayIncreasing({arr1}, {arr2})"
    typescript: "makeArrayIncreasing({arr1}, {arr2})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 400

oracle:
  python3:
    call: "Checker().makeArrayIncreasing(arr1, arr2, {result})"
    checker: |
      class Checker:
          def makeArrayIncreasing(self, arr1, arr2, result):
              from bisect import bisect_right

              if not isinstance(result, int) or isinstance(result, bool):
                  return False

              replacements = sorted(set(arr2))
              states = {-1: 0}
              for value in arr1:
                  next_states = {}
                  for previous, operations in states.items():
                      if value > previous:
                          old = next_states.get(value)
                          if old is None or operations < old:
                              next_states[value] = operations
                      replacement_index = bisect_right(replacements, previous)
                      if replacement_index < len(replacements):
                          replacement = replacements[replacement_index]
                          candidate = operations + 1
                          old = next_states.get(replacement)
                          if old is None or candidate < old:
                              next_states[replacement] = candidate
                  states = next_states
                  if not states:
                      break

              expected = min(states.values()) if states else -1
              return result == expected

seed: 1187

