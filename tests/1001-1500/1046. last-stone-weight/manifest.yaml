entry:
  id: 1046
  title: "last-stone-weight"
  params:
    stones:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().lastStoneWeight({stones})"
    rust: "Solution::last_stone_weight({stones})"
    python3: "Solution().lastStoneWeight({stones})"
    python2: "Solution().lastStoneWeight({stones})"
    ruby: "last_stone_weight({stones})"
    java: "new Solution().lastStoneWeight({stones})"
    csharp: "new Solution().LastStoneWeight({stones})"
    kotlin: "Solution().lastStoneWeight({stones})"
    go: "lastStoneWeight({stones})"
    dart: "Solution().lastStoneWeight({stones})"
    swift: "Solution().lastStoneWeight({stones})"
    typescript: "lastStoneWeight({stones})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().lastStoneWeight(stones, {result})"
    checker: |
      class Checker:
          def lastStoneWeight(self, stones, result) -> bool:
              import heapq

              h = [-x for x in stones]
              heapq.heapify(h)
              while len(h) > 1:
                  a = heapq.heappop(h)
                  b = heapq.heappop(h)
                  if a != b:
                      heapq.heappush(h, a - b)
              expected = -h[0] if h else 0
              return result == expected

seed: 1046

