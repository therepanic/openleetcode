entry:
  id: 1444
  title: "number-of-ways-of-cutting-a-pizza"
  params:
    pizza:
      type: array
      items:
        type: string
    k:
      type: int
  call:
    cpp: "Solution().ways({pizza}, {k})"
    rust: "Solution::ways({pizza}, {k})"
    python3: "Solution().ways({pizza}, {k})"
    python2: "Solution().ways({pizza}, {k})"
    ruby: "ways({pizza}, {k})"
    java: "new Solution().ways({pizza}, {k})"
    csharp: "new Solution().Ways({pizza}, {k})"
    kotlin: "Solution().ways({pizza}, {k})"
    go: "ways({pizza}, {k})"
    dart: "Solution().ways({pizza}, {k})"
    swift: "Solution().ways({pizza}, {k})"
    typescript: "ways({pizza}, {k})"
judge:
  type: "exact"
limits:
  time_ms: 5000
  memory_mb: 300
oracle:
  python3:
    call: "Checker().ways(pizza, k, {result})"
    checker: |
      class Checker:
          def ways(self, pizza, k, result):
              if type(result) is not int or not (1 <= k <= 10):
                  return False
              rows = len(pizza)
              cols = len(pizza[0])
              if not (1 <= rows <= 50 and 1 <= cols <= 50):
                  return False
              if any(len(row) != cols or any(ch not in 'A.' for ch in row) for row in pizza):
                  return False

              def has_apple(top, left, bottom, right):
                  return any(pizza[r][c] == 'A'
                             for r in range(top, bottom)
                             for c in range(left, right))

              memo = {}
              def count(top, left, pieces):
                  key = (top, left, pieces)
                  if key in memo:
                      return memo[key]
                  if not has_apple(top, left, rows, cols):
                      return 0
                  if pieces == 1:
                      return 1
                  total = 0
                  for cut in range(top + 1, rows):
                      if has_apple(top, left, cut, cols):
                          total += count(cut, left, pieces - 1)
                  for cut in range(left + 1, cols):
                      if has_apple(top, left, rows, cut):
                          total += count(top, cut, pieces - 1)
                  memo[key] = total % 1000000007
                  return memo[key]

              return result == count(0, 0, k)
