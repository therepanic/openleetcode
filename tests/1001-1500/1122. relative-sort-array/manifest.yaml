entry:
  id: 1122
  title: relative-sort-array
  params:
    arr1:
      type: array
      items:
        type: int
    arr2:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().relativeSortArray({arr1}, {arr2})"
    rust: "Solution::relative_sort_array({arr1}, {arr2})"
    python3: "Solution().relativeSortArray({arr1}, {arr2})"
    python2: "Solution().relativeSortArray({arr1}, {arr2})"
    ruby: "relative_sort_array({arr1}, {arr2})"
    java: "new Solution().relativeSortArray({arr1}, {arr2})"
    csharp: "new Solution().RelativeSortArray({arr1}, {arr2})"
    kotlin: "Solution().relativeSortArray({arr1}, {arr2})"
    go: "relativeSortArray({arr1}, {arr2})"
    dart: "Solution().relativeSortArray({arr1}, {arr2})"
    swift: "Solution().relativeSortArray({arr1}, {arr2})"
    typescript: "relativeSortArray({arr1}, {arr2})"
judge:
  type: "exact"
limits:
  time_ms: 200
  memory_mb: 256
oracle:
  python3:
    call: "Checker().ok({result})"
    checker: |
      class Checker:
          def ok(self, result):
              return True
seed: 1122
tests:
  - name: ex1
    in:
      arr1: [2, 3, 1, 3, 2, 4, 6, 7, 9, 2, 19]
      arr2: [2, 1, 4, 3, 9, 6]
    out: [2, 2, 2, 1, 4, 3, 3, 9, 6, 7, 19]
  - name: ex2
    in:
      arr1: [28, 6, 22, 8, 44, 17]
      arr2: [22, 28, 8, 6]
    out: [22, 28, 8, 6, 17, 44]
  - name: single_elem_ordered
    in:
      arr1: [5]
      arr2: [5]
    out: [5]
  - name: two_elems_reverse
    in:
      arr1: [2, 1]
      arr2: [1]
    out: [1, 2]
  - name: all_same_value
    in:
      arr1: [3, 3, 3, 3]
      arr2: [3]
    out: [3, 3, 3, 3]
  - name: no_tail_elements
    in:
      arr1: [4, 4, 1, 1, 2, 2]
      arr2: [2, 1, 4]
    out: [2, 2, 1, 1, 4, 4]
  - name: already_sorted_by_rule
    in:
      arr1: [7, 7, 3, 3, 1, 2, 8]
      arr2: [7, 3]
    out: [7, 7, 3, 3, 1, 2, 8]
  - name: zeros_and_ones
    in:
      arr1: [0, 1, 0, 1, 2, 3]
      arr2: [1, 0]
    out: [1, 1, 0, 0, 2, 3]
  - name: max_value_present
    in:
      arr1: [1000, 0, 999, 1000, 1]
      arr2: [1000, 1]
    out: [1000, 1000, 1, 0, 999]
  - name: ascending_tail
    in:
      arr1: [8, 9, 1, 2, 3, 4]
      arr2: [3, 1]
    out: [3, 1, 2, 4, 8, 9]
  - name: duplicates_in_keys
    in:
      arr1: [5, 6, 5, 6, 7, 8, 5]
      arr2: [6, 5]
    out: [6, 6, 5, 5, 5, 7, 8]
  - name: tail_only
    in:
      arr1: [10, 20, 30, 1, 2, 3]
      arr2: [30, 20]
    out: [30, 20, 1, 2, 3, 10]
  - name: many_of_one_key
    in:
      arr1: [4, 4, 4, 4, 2, 1, 3]
      arr2: [4, 2]
    out: [4, 4, 4, 4, 2, 1, 3]
  - name: mixed_small
    in:
      arr1: [9, 8, 7, 6, 5, 4, 3, 2, 1]
      arr2: [2, 4, 6, 8]
    out: [2, 4, 6, 8, 1, 3, 5, 7, 9]
  - name: one_key_many_tail
    in:
      arr1: [11, 11, 12, 13, 10, 14, 15]
      arr2: [11]
    out: [11, 11, 10, 12, 13, 14, 15]
  - name: key_at_end
    in:
      arr1: [1, 2, 3, 4, 5]
      arr2: [5, 4]
    out: [5, 4, 1, 2, 3]
  - name: key_at_start
    in:
      arr1: [9, 1, 1, 2, 3, 9]
      arr2: [9]
    out: [9, 9, 1, 1, 2, 3]
  - name: repeats_and_gaps
    in:
      arr1: [6, 2, 6, 2, 6, 1, 0]
      arr2: [2, 6]
    out: [2, 2, 6, 6, 6, 0, 1]
  - name: sparse_keys
    in:
      arr1: [100, 50, 25, 75, 50, 25, 0]
      arr2: [25, 100]
    out: [25, 25, 100, 0, 50, 50, 75]
  - name: two_keys_all_consumed
    in:
      arr1: [3, 1, 2, 2, 1, 3]
      arr2: [1, 2, 3]
    out: [1, 1, 2, 2, 3, 3]
  - name: tail_sorted_with_duplicates
    in:
      arr1: [5, 1, 4, 4, 2, 7, 7, 6]
      arr2: [7, 5]
    out: [7, 7, 5, 1, 2, 4, 4, 6]
  - name: low_values
    in:
      arr1: [0, 0, 1, 2, 2, 3]
      arr2: [2, 0]
    out: [2, 2, 0, 0, 1, 3]
  - name: mid_range
    in:
      arr1: [14, 13, 12, 11, 10, 9, 8]
      arr2: [12, 10, 14]
    out: [12, 10, 14, 8, 9, 11, 13]
  - name: repeated_tail_values
    in:
      arr1: [7, 4, 5, 4, 6, 5, 4]
      arr2: [5, 7]
    out: [5, 5, 7, 4, 4, 4, 6]
  - name: all_tail_sorted
    in:
      arr1: [8, 6, 7, 5, 3, 0, 9]
      arr2: [8, 6]
    out: [8, 6, 0, 3, 5, 7, 9]
  - name: many_duplicates_tail
    in:
      arr1: [2, 2, 2, 3, 3, 1, 1, 0]
      arr2: [3, 2]
    out: [3, 3, 2, 2, 2, 0, 1, 1]
  - name: key_with_single_tail
    in:
      arr1: [12, 11, 10]
      arr2: [12, 10]
    out: [12, 10, 11]
  - name: permutation_like
    in:
      arr1: [4, 1, 3, 2]
      arr2: [3, 4]
    out: [3, 4, 1, 2]
  - name: boundary_1000_key
    in:
      arr1: [1000, 999, 1000, 998, 997, 996]
      arr2: [1000, 996]
    out: [1000, 1000, 996, 997, 998, 999]
  - name: boundary_0_key
    in:
      arr1: [0, 2, 1, 0, 3]
      arr2: [0, 3]
    out: [0, 0, 3, 1, 2]
  - name: alternating_keys
    in:
      arr1: [1, 2, 1, 2, 1, 2, 3]
      arr2: [2, 1]
    out: [2, 2, 2, 1, 1, 1, 3]
  - name: varied_tail_order
    in:
      arr1: [20, 3, 17, 8, 9, 1, 4]
      arr2: [8, 20, 3]
    out: [8, 20, 3, 1, 4, 9, 17]
  - name: small_unsorted_tail
    in:
      arr1: [6, 1, 5, 2, 4, 3]
      arr2: [5, 6]
    out: [5, 6, 1, 2, 3, 4]
  - name: arr2_length_one
    in:
      arr1: [7, 8, 7, 6, 5, 4]
      arr2: [7]
    out: [7, 7, 4, 5, 6, 8]
  - name: mixed_high_low
    in:
      arr1: [100, 1, 99, 2, 98, 3, 97]
      arr2: [99, 97]
    out: [99, 97, 1, 2, 3, 98, 100]
  - name: final_tail_sort
    in:
      arr1: [3, 5, 7, 5, 3, 8, 9, 1]
      arr2: [5, 3]
    out: [5, 5, 3, 3, 1, 7, 8, 9]
