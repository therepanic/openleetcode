entry:
  id: 1424
  title: "diagonal-traverse-ii"
  params:
    nums:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().findDiagonalOrder({nums})"
    rust: "Solution::find_diagonal_order({nums})"
    python3: "Solution().findDiagonalOrder({nums})"
    python2: "Solution().findDiagonalOrder({nums})"
    ruby: "find_diagonal_order({nums})"
    java: "new Solution().findDiagonalOrder({nums})"
    csharp: "new Solution().FindDiagonalOrder({nums})"
    kotlin: "Solution().findDiagonalOrder({nums})"
    go: "findDiagonalOrder({nums})"
    dart: "Solution().findDiagonalOrder({nums})"
    swift: "Solution().findDiagonalOrder({nums})"
    typescript: "findDiagonalOrder({nums})"
judge:
  type: "exact"
limits:
  time_ms: 700
  memory_mb: 300
oracle:
  python3:
    call: "Checker().findDiagonalOrder(nums, {result})"
    checker: |
      class Checker:
          def findDiagonalOrder(self, nums, result):
              groups = {}
              for row_index, row in enumerate(nums):
                  for column_index, value in enumerate(row):
                      groups.setdefault(row_index + column_index, []).append((row_index, value))
              expected = []
              for diagonal in sorted(groups):
                  expected.extend(value for _, value in reversed(groups[diagonal]))
              return result == expected
seed: 1424
