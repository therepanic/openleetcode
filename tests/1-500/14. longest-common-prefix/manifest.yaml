"entry":
  "id": 14
  "title": "longest-common-prefix"
  "call":
    "cpp": "Solution().longestCommonPrefix(lv(vector<string>{ {strs} }))"
    "rust": "Solution::longest_common_prefix(vec![{strs}])"
    "python3": "Solution().longestCommonPrefix([{strs}])"
    "python2": "Solution().longestCommonPrefix([{strs}])"
    "ruby": "longest_common_prefix([{strs}])"
    "java": "new Solution().longestCommonPrefix(new String[]{ {strs} })"
    "csharp": "new Solution().LongestCommonPrefix(new string[]{ {strs} })"
    "kotlin": "Solution().longestCommonPrefix(arrayOf({strs}))"
    "go": "longestCommonPrefix([]string{ {strs} })"
    "dart": "Solution().longestCommonPrefix([{strs}])"
    "swift": "Solution().longestCommonPrefix([{strs}])"
    "typescript": "longestCommonPrefix([{strs}])"
"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().longestCommonPrefix([{strs}], {result})"
    "checker":
      "import json\n\nclass Checker:\n    def longestCommonPrefix(self, strs,\
      \ result):\n        try:\n            result = json.loads(result) if isinstance(result,\
      \ str) else result\n        except Exception:\n            return False\n  \
      \      if not strs:\n            return result == \"\"\n        prefix = min(strs,\
      \ key=len)\n        for s in strs:\n            while not s.startswith(prefix):\n\
      \                prefix = prefix[:-1]\n        return result == prefix\n"
"seed": 42
