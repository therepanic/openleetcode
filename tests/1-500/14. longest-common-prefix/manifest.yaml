entry:
  id: 14
  title: longest-common-prefix
  params:
    strs:
      type: array
      items:
        type: string
  call:
    cpp: Solution().longestCommonPrefix({strs})
    rust: Solution::longest_common_prefix({strs})
    python3: Solution().longestCommonPrefix({strs})
    python2: Solution().longestCommonPrefix({strs})
    ruby: longest_common_prefix({strs})
    java: new Solution().longestCommonPrefix({strs})
    csharp: new Solution().LongestCommonPrefix({strs})
    kotlin: Solution().longestCommonPrefix({strs})
    go: longestCommonPrefix({strs})
    dart: Solution().longestCommonPrefix({strs})
    swift: Solution().longestCommonPrefix({strs})
    typescript: longestCommonPrefix({strs})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().longestCommonPrefix(strs, {result})"
    checker: |
      class Checker:
          def longestCommonPrefix(self, strs, result):
              if not isinstance(result, str):
                  return False
              if not strs:
                  return result == ""
              prefix = strs[0]
              for s in strs[1:]:
                  i = 0
                  limit = min(len(prefix), len(s))
                  while i < limit and prefix[i] == s[i]:
                      i += 1
                  prefix = prefix[:i]
                  if not prefix:
                      break
              return result == prefix
seed: 14
