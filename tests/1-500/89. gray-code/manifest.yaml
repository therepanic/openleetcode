entry:
  id: 89
  title: gray-code
  params:
    n:
      type: int
  call:
    cpp: "Solution().grayCode({n})"
    rust: "Solution::gray_code({n})"
    python3: "Solution().grayCode({n})"
    python2: "Solution().grayCode({n})"
    ruby: "gray_code({n})"
    java: "new Solution().grayCode({n})"
    csharp: "new Solution().GrayCode({n})"
    kotlin: "Solution().grayCode({n})"
    go: "grayCode({n})"
    dart: "Solution().grayCode({n})"
    swift: "Solution().grayCode({n})"
    typescript: "grayCode({n})"
judge:
  type: ignore_order
limits:
  time_ms: 500
  memory_mb: 256
oracle:
  python3:
    call: "Checker().grayCode(n, {result})"
    checker: |
      class Checker:
          def grayCode(self, n, result):
              if not isinstance(n, int) or n < 1 or n > 16:
                  return False
              if not isinstance(result, list):
                  return False
              size = 1 << n
              if len(result) != size:
                  return False
              if any((not isinstance(v, int)) or v < 0 or v >= size for v in result):
                  return False
              if result[0] != 0:
                  return False
              if len(set(result)) != size:
                  return False
              def one_bit(a, b):
                  x = a ^ b
                  return x != 0 and (x & (x - 1)) == 0
              for i in range(size - 1):
                  if not one_bit(result[i], result[i + 1]):
                      return False
              return one_bit(result[0], result[-1])
seed: 89
