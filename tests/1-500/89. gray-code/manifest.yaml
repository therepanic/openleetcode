"oracle":
  "python3":
    "call": "Checker().check(n, {result})"
    "checker": |
      import json

      class Checker:
          def check(self, n, result):
              try:
                  result = json.loads(result) if isinstance(result, str) else result
              except Exception:
                  return False

              for i, x in enumerate(result):
                  if isinstance(x, float) and x.is_integer():
                      result[i] = int(x)

              if len(result) != (1 << n):
                  return False
              if sorted(result) != list(range(1 << n)):
                  return False

              for i in range(len(result)):
                  curr = result[i]
                  nxt = result[(i + 1) % len(result)]
                  diff = curr ^ nxt
                  if diff == 0 or (diff & (diff - 1)) != 0:
                      return False
              return True
