"oracle":
  "python3":
    "call": "Checker().check({n}, {result})"
    "checker":
      "import json\nclass Checker:\n    def check(self, n, result):\n   \
      \     try:\n            result = json.loads(result) if isinstance(result, str)\
      \ else result\n        except Exception:\n            return False\n       \
      \ if len(result) != (1 << n): return False\n        if sorted(result) != list(range(1\
      \ << n)):\n            return False\n        for i in range(len(result)):\n\
      \            curr = result[i]\n            nxt = result[(i + 1) % len(result)]\n\
      \            diff = curr ^ nxt\n            if diff == 0 or (diff & (diff -\
      \ 1)) != 0: return False\n        return True\n"
"seed": 42
