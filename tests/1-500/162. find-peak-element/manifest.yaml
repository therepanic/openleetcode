oracle:
  python3:
    call: "Checker().findPeakElement(nums, {result})"
    checker: |
      class Checker:
          def findPeakElement(self, nums, result):
              if not isinstance(nums, list) or not nums:
                  return False
              if not isinstance(result, int):
                  return False
              if result < 0 or result >= len(nums):
                  return False
              if any((not isinstance(x, int)) for x in nums):
                  return False
              left_ok = result == 0 or nums[result] > nums[result - 1]
              right_ok = result == len(nums) - 1 or nums[result] > nums[result + 1]
              return left_ok and right_ok
