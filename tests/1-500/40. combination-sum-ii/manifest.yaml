entry:
  id: 40
  title: combination-sum-ii
  call:
    cpp: Solution().combinationSum2({candidates}, {target})
    rust: Solution::combination_sum2({candidates}, {target})
    python3: Solution().combinationSum2({candidates}, {target})
    python2: Solution().combinationSum2({candidates}, {target})
    ruby: combination_sum2({candidates}, {target})
    java: new Solution().combinationSum2({candidates}, {target})
    csharp: new Solution().CombinationSum2({candidates}, {target})
    kotlin: Solution().combinationSum2({candidates}, {target})
    go: combinationSum2({candidates}, {target})
    dart: Solution().combinationSum2({candidates}, {target})
    swift: Solution().combinationSum2({candidates}, {target})
    typescript: combinationSum2({candidates}, {target})
  params:
    candidates:
      type: array
      items:
        type: int
    target:
      type: int
judge:
  type: ignore_order
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().combinationSum2({candidates}, {target}, {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, result):\n        if isinstance(result, str):\n           \
      \ try:\n                result = json.loads(result)\n            except Exception:\n                pass\n        return
      result\n\n    def combinationSum2(self, candidates, target, result):\n        result = self._norm(result)\n        if
      not isinstance(result, list): return False\n        for combo in result:\n            if sum(combo) != target: return
      False\n        from collections import Counter\n        cand_counts = Counter(candidates)\n        for combo in result:\n\
      \            combo_counts = Counter(combo)\n            for num, count in combo_counts.items():\n                if
      count > cand_counts[num]: return False\n        seen = set()\n        for combo in result:\n            s = tuple(sorted(combo))\n\
      \            if s in seen: return False\n            seen.add(s)\n        return True\n"
seed: 42
