entry:
  id: 40
  title: combination-sum-ii
  params:
    candidates:
      type: array
      items:
        type: int
    target:
      type: int
  call:
    cpp: Solution().combinationSum2({candidates}, {target})
    rust: Solution::combination_sum2({candidates}, {target})
    python3: Solution().combinationSum2({candidates}, {target})
    python2: Solution().combinationSum2({candidates}, {target})
    ruby: combination_sum2({candidates}, {target})
    java: new Solution().combinationSum2({candidates}, {target})
    csharp: new Solution().CombinationSum2({candidates}, {target})
    kotlin: Solution().combinationSum2({candidates}, {target})
    go: combinationSum2({candidates}, {target})
    dart: Solution().combinationSum2({candidates}, {target})
    swift: Solution().combinationSum2({candidates}, {target})
    typescript: combinationSum2({candidates}, {target})

judge:
  type: exact

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: Checker().combinationSum2(candidates, target, {result})
    checker: |
      class Checker:
          def combinationSum2(self, candidates, target, result) -> bool:
              if not isinstance(result, list):
                  return False

              def normalize_combo(combo):
                  if not isinstance(combo, list):
                      return None
                  if any((not isinstance(x, int)) for x in combo):
                      return None
                  if any(combo[i] > combo[i + 1] for i in range(len(combo) - 1)):
                      return None
                  return tuple(combo)

              seen = set()
              normalized = []
              for combo in result:
                  norm = normalize_combo(combo)
                  if norm is None:
                      return False
                  if sum(norm) != target:
                      return False
                  used = {}
                  for x in norm:
                      used[x] = used.get(x, 0) + 1
                  for x, cnt in used.items():
                      if cnt > candidates.count(x):
                          return False
                  if norm in seen:
                      return False
                  seen.add(norm)
                  normalized.append(norm)

              expected = []
              n = len(candidates)
              candidates = sorted(candidates)

              def backtrack(start, remaining, path):
                  if remaining == 0:
                      expected.append(tuple(path))
                      return
                  prev = None
                  for i in range(start, n):
                      x = candidates[i]
                      if prev == x:
                          continue
                      if x > remaining:
                          break
                      path.append(x)
                      backtrack(i + 1, remaining - x, path)
                      path.pop()
                      prev = x

              backtrack(0, target, [])
              return set(normalized) == set(expected)

