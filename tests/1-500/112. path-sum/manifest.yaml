oracle:
  python3:
    call: "Checker().hasPathSum(root, targetSum, {result})"
    checker: |
      class Checker:
          def hasPathSum(self, root, targetSum, result):
              if not isinstance(result, bool):
                  return False
              if root is None or root == []:
                  return result is False
              if not isinstance(root, list):
                  return False

              def dfs(i, acc):
                  if i >= len(root) or root[i] is None:
                      return False
                  acc += root[i]
                  left = 2 * i + 1
                  right = 2 * i + 2
                  has_left = left < len(root) and root[left] is not None
                  has_right = right < len(root) and root[right] is not None
                  if not has_left and not has_right:
                      return acc == targetSum
                  return dfs(left, acc) or dfs(right, acc)

              return result == dfs(0, 0)
