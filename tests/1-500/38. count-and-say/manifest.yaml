oracle:
  python3:
    call: Checker().countAndSay(n, {result})
    checker:
      "class Checker:\n    def countAndSay(self, n, result):\n        if not\
      \ isinstance(result, str):\n            return False\n        expected = \"\
      1\"\n        for _ in range(2, n + 1):\n            next_value = []\n      \
      \      i = 0\n            while i < len(expected):\n                j = i\n\
      \                while j < len(expected) and expected[j] == expected[i]:\n \
      \                   j += 1\n                next_value.append(str(j - i))\n\
      \                next_value.append(expected[i])\n                i = j\n   \
      \         expected = \"\".join(next_value)\n        return result == expected\n"
