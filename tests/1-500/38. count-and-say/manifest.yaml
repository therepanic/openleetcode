judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().countAndSay(n, {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, result):\n        if\
      \ isinstance(result, str):\n            try:\n                result = json.loads(result)\n\
      \            except Exception:\n                pass\n        return result\n\
      \    def countAndSay(self, n, result):\n        result = self._norm(result)\n\
      \        def get_seq(n):\n            if n == 1: return \"1\"\n            prev\
      \ = get_seq(n - 1)\n            res, i = \"\", 0\n            while i < len(prev):\n\
      \                count = 1\n                while i + 1 < len(prev) and prev[i]\
      \ == prev[i + 1]:\n                    i += 1\n                    count +=\
      \ 1\n                res += str(count) + prev[i]\n                i += 1\n \
      \           return res\n        return get_seq(n) == result\n"
seed: 42
