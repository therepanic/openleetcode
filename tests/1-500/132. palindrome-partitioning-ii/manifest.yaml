entry:
  id: 132
  title: "palindrome-partitioning-ii"
  params:
    s:
      type: "string"
  call:
    cpp: "Solution().minCut({s})"
    rust: "Solution::min_cut({s})"
    python3: "Solution().minCut({s})"
    python2: "Solution().minCut({s})"
    ruby: "min_cut({s})"
    java: "new Solution().minCut({s})"
    csharp: "new Solution().MinCut({s})"
    kotlin: "Solution().minCut({s})"
    go: "minCut({s})"
    dart: "Solution().minCut({s})"
    swift: "Solution().minCut({s})"
    typescript: "minCut({s})"
judge:
  type: "exact"
limits:
  time_ms: 2000
  memory_mb: 512
oracle:
  python3:
    call: "Checker().minCut(s, {result})"
    checker: |
      import copy


      from typing import *
      from collections import *
      import copy
      import json
      import math
      import bisect
      import heapq
      import itertools
      import functools

      class Solution:
          def minCut(self, s: str) -> int:
              n = len(s)
              is_pal = [[False] * n for _ in range(n)]
              for end in range(n):
                  for start in range(end + 1):
                      if s[start] == s[end] and (end - start <= 2 or is_pal[start + 1][end - 1]):
                          is_pal[start][end] = True

              dp = [0] * n
              for i in range(n):
                  if is_pal[0][i]:
                      dp[i] = 0
                  else:
                      dp[i] = i
                      for j in range(i):
                          if is_pal[j + 1][i]:
                              dp[i] = min(dp[i], dp[j] + 1)
              return dp[n - 1]


      def array_to_list_node_local(values):
          dummy = ListNode(0)
          tail = dummy
          for value in values:
              tail.next = ListNode(value)
              tail = tail.next
          return dummy.next

      def array_to_tree_node_local(values):
          if not values:
              return None
          root = TreeNode(values[0])
          queue = deque([root])
          index = 1
          while queue and index < len(values):
              node = queue.popleft()
              if index < len(values) and values[index] is not None:
                  node.left = TreeNode(values[index])
                  queue.append(node.left)
              index += 1
              if index < len(values) and values[index] is not None:
                  node.right = TreeNode(values[index])
                  queue.append(node.right)
              index += 1
          return root

      def list_node_to_array_local(node):
          out = []
          seen = 0
          while node is not None and seen < 100000:
              out.append(node.val)
              node = node.next
              seen += 1
          return out

      def tree_node_to_array_local(root):
          if root is None:
              return []
          out = []
          q = deque([root])
          while q:
              node = q.popleft()
              if node is None:
                  out.append(None)
                  continue
              out.append(node.val)
              q.append(node.left)
              q.append(node.right)
          while out and out[-1] is None:
              out.pop()
          return out

      def deep_sort(value):
          if isinstance(value, list):
              normalized = [deep_sort(item) for item in value]
              return sorted(normalized, key=lambda item: json.dumps(item, sort_keys=True))
          if isinstance(value, dict):
              return {key: deep_sort(val) for key, val in sorted(value.items())}
          return value

      def normalize_expected(value):
          kind = "int"
          if kind == "list_node":
              return list_node_to_array_local(value)
          if kind == "tree_node":
              return tree_node_to_array_local(value)
          return value

      def normalize_actual(value):
          return value

      def prepare_input(value, kind):
          if kind == "tree_node":
              return array_to_tree_node_local(value)
          if kind == "list_node":
              return array_to_list_node_local(value)
          return copy.deepcopy(value)

      class Checker:
          def minCut(self, s, result):
              prepared_s = prepare_input(s, "string")
              expected = Solution().minCut(prepared_s)
              expected = normalize_expected(expected)
              actual = normalize_actual(result)
              return deep_sort(expected) == deep_sort(actual)
