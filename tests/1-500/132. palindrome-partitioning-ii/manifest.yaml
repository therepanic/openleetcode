oracle:
  python3:
    call: Checker().minCut(s, {result})
    checker: "class Checker:\n    def minCut(self, s, result):\n        if not isinstance(result, int):\n            return False\n        n = len(s)\n        pal = [[False] * n for _ in range(n)]\n        dp = [0] * n\n        for i in range(n):\n            dp[i] = i\n            for j in range(i + 1):\n                if s[j] == s[i] and (i - j <= 1 or pal[j + 1][i - 1]):\n                    pal[j][i] = True\n                    dp[i] = 0 if j == 0 else min(dp[i], dp[j - 1] + 1)\n        return result == dp[-1]\n"
