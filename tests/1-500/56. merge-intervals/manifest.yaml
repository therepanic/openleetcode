entry:
  id: 56
  title: merge-intervals
  params:
    intervals:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().merge({intervals})"
    rust: "Solution::merge({intervals})"
    python3: "Solution().merge({intervals})"
    python2: "Solution().merge({intervals})"
    ruby: "merge({intervals})"
    java: "new Solution().merge({intervals})"
    csharp: "new Solution().Merge({intervals})"
    kotlin: "Solution().merge({intervals})"
    go: "merge({intervals})"
    dart: "Solution().merge({intervals})"
    swift: "Solution().merge({intervals})"
    typescript: "merge({intervals})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().merge(intervals, {result})"
    checker: |
      class Checker:
          def merge(self, intervals, result):
              if not isinstance(result, list):
                  return False
              if any(not isinstance(interval, list) or len(interval) != 2 for interval in result):
                  return False
              if any(not isinstance(x, int) for interval in result for x in interval):
                  return False
              for interval in result:
                  if interval[0] > interval[1]:
                      return False
              if any(intervals[i][0] > intervals[i][1] for i in range(len(intervals))):
                  return False
              sorted_intervals = sorted([list(interval) for interval in intervals])
              merged = []
              for start, end in sorted_intervals:
                  if not merged or start > merged[-1][1]:
                      merged.append([start, end])
                  else:
                      merged[-1][1] = max(merged[-1][1], end)
              return result == merged
seed: 56
