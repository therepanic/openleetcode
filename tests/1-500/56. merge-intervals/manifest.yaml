  "title": "merge-intervals"
  "call":
    "cpp": "Solution().merge(lv(vector<vector<int>>{ {intervals} }))"
    "rust": "Solution::merge(vec![{intervals}])"
    "python3": "Solution().merge([{intervals}])"
    "python2": "Solution().merge([{intervals}])"
    "ruby": "merge([{intervals}])"
    "java": "new Solution().merge(new int[][]{ {intervals} })"
    "csharp": "new Solution().Merge(new int[][]{ {intervals} })"
    "kotlin": "Solution().merge(arrayOf({intervals}))"
    "go": "merge([][]int{ {intervals} })"
    "dart": "Solution().merge([{intervals}])"
    "swift": "Solution().merge([{intervals}])"
    "typescript": "merge([{intervals}])"
"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().check([{intervals}], {result})"
    "checker":
      "import json\nclass Checker:\n    def check(self, intervals, result):\n\
      \        try:\n            result = json.loads(result) if isinstance(result,\
      \ str) else result\n        except Exception:\n            return False\n  \
      \      if isinstance(result, list) and len(result) == 1 and isinstance(result[0],\
      \ list):\n            result = result[0]\n        intervals = [sorted(i) for\
      \ i in intervals]\n        result = [sorted(i) for i in result]\n        intervals.sort()\n\
      \        merged = []\n        if not intervals: return result == []\n      \
      \  prev = intervals[0]\n        for i in range(1, len(intervals)):\n       \
      \     if intervals[i][0] <= prev[1]:\n                prev[1] = max(prev[1],\
      \ intervals[i][1])\n            else:\n                merged.append(prev)\n\
      \                prev = intervals[i]\n        merged.append(prev)\n        return\
      \ sorted(merged) == sorted(result)\n"
"seed": 42
