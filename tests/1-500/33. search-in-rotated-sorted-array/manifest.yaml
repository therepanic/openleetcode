entry:
  id: 33
  title: search-in-rotated-sorted-array
  call:
    cpp: Solution().search({nums}, {target})
    rust: Solution::search({nums}, {target})
    python3: Solution().search({nums}, {target})
    python2: Solution().search({nums}, {target})
    ruby: search({nums}, {target})
    java: new Solution().search({nums}, {target})
    csharp: new Solution().Search({nums}, {target})
    kotlin: Solution().search({nums}, {target})
    go: search({nums}, {target})
    dart: Solution().search({nums}, {target})
    swift: Solution().search({nums}, {target})
    typescript: search({nums}, {target})
  params:
    nums:
      type: array
      items:
        type: int
    target:
      type: int
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().search({nums}, {target}, {result})
    checker: |
      class Checker:
          def search(self, nums, target, result):
              try:
                  if isinstance(result, str):
                      value = result.strip()
                      if len(value) >= 2 and ((value[0] == value[-1] == '"') or (value[0] == value[-1] == "'")):
                          value = value[1:-1]
                      if value.isdigit() or (value.startswith('-') and value[1:].isdigit()):
                          result = int(value)
                  expected = -1
                  for i, v in enumerate(nums):
                      if v == target:
                          expected = i
                          break
                  return result == expected
              except:
                  return False
seed: 42
