"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().divide({dividend}, {divisor}, {result})"
    "checker":
      "import json\nclass Checker:\n    def divide(self, dividend, divisor,\
      \ result):\n        try:\n            result = json.loads(result) if isinstance(result,\
      \ str) else result\n        except Exception:\n            return False\n  \
      \      expected = int(dividend / divisor)\n        if expected > 2**31 - 1:\n\
      \            expected = 2**31 - 1\n        elif expected < -2**31:\n       \
      \     expected = -2**31\n        return result == expected\n"
"seed": 42
