entry:
  id: 29
  title: divide-two-integers
  params:
    dividend:
      type: int
    divisor:
      type: int
  call:
    cpp: "Solution().divide({dividend}, {divisor})"
    rust: "Solution::divide({dividend}, {divisor})"
    python3: "Solution().divide({dividend}, {divisor})"
    python2: "Solution().divide({dividend}, {divisor})"
    ruby: "divide({dividend}, {divisor})"
    java: "new Solution().divide({dividend}, {divisor})"
    csharp: "new Solution().Divide({dividend}, {divisor})"
    kotlin: "Solution().divide({dividend}, {divisor})"
    go: "divide({dividend}, {divisor})"
    dart: "Solution().divide({dividend}, {divisor})"
    swift: "Solution().divide({dividend}, {divisor})"
    typescript: "divide({dividend}, {divisor})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().divide(dividend, divisor, {result})"
    checker: |
      class Checker:
          def divide(self, dividend, divisor, result):
              if not isinstance(result, int):
                  return False
              if divisor == 0:
                  return False
              expected = int(dividend / divisor)
              if dividend == -(2**31) and divisor == -1:
                  expected = 2**31 - 1
              if expected < -(2**31):
                  expected = -(2**31)
              if expected > 2**31 - 1:
                  expected = 2**31 - 1
              return result == expected
seed: 29
