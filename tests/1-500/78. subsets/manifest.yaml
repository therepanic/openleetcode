    "python3": "Solution().subsets([{nums}])"
    "python2": "Solution().subsets([{nums}])"
    "ruby": "subsets([{nums}])"
    "java": "new Solution().subsets(new int[]{ {nums} })"
    "csharp": "new Solution().Subsets(new int[]{ {nums} })"
    "kotlin": "Solution().subsets(intArrayOf({nums}))"
    "go": "subsets([]int{ {nums} })"
