      type: array
      items:
        type: int
  call:
    cpp: "Solution().subsets({nums})"
    rust: "Solution::subsets({nums})"
    python3: "Solution().subsets({nums})"
    python2: "Solution().subsets({nums})"
    ruby: "subsets({nums})"
    java: "new Solution().subsets({nums})"
    csharp: "new Solution().Subsets({nums})"
    kotlin: "Solution().subsets({nums})"
    go: "subsets({nums})"
    dart: "Solution().subsets({nums})"
    swift: "Solution().subsets({nums})"
    typescript: "subsets({nums})"
judge:
  type: ignore_order
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().subsets(nums, {result})"
    checker: |
      class Checker:
          def subsets(self, nums, result):
              nums = list(nums)
              expected = []
              n = len(nums)
              for mask in range(1 << n):
                  cur = []
                  for i in range(n):
                      if mask & (1 << i):
                          cur.append(nums[i])
                  expected.append(tuple(cur))
              got = [tuple(x) for x in result]
              return sorted(got) == sorted(expected)
seed: 78
