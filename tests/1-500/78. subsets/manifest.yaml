    "typescript": "subsets([{nums}])"
"judge":
  "type": "ignore_order"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().check([{nums}], {result})"
    "checker":
      "import json\nclass Checker:\n    def check(self, nums, result):\n\
      \        try:\n            result = json.loads(result) if isinstance(result,\
      \ str) else result\n        except Exception:\n            return False\n  \
      \      try:\n            n = len(nums)\n            if len(result) != 2**n:\n\
      \                return False\n            res_set = set()\n            for\
      \ combo in result:\n                res_set.add(tuple(sorted(combo)))\n    \
      \        if len(res_set) != 2**n:\n                return False\n          \
      \  for combo in res_set:\n                for x in combo:\n                \
      \    if x not in nums:\n                        return False\n            return\
      \ True\n        except:\n            return False\n"
"seed": 42
