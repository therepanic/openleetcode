      type: int
    n:
      type: int
  call:
    cpp: "Solution().uniquePaths({m}, {n})"
    rust: "Solution::unique_paths({m}, {n})"
    python3: "Solution().uniquePaths({m}, {n})"
    python2: "Solution().uniquePaths({m}, {n})"
    ruby: "unique_paths({m}, {n})"
    java: "new Solution().uniquePaths({m}, {n})"
    csharp: "new Solution().UniquePaths({m}, {n})"
    kotlin: "Solution().uniquePaths({m}, {n})"
    go: "uniquePaths({m}, {n})"
    dart: "Solution().uniquePaths({m}, {n})"
    swift: "Solution().uniquePaths({m}, {n})"
    typescript: "uniquePaths({m}, {n})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().uniquePaths(m, n, {result})"
    checker: |
      from math import comb

      class Checker:
          def uniquePaths(self, m, n, result):
              if not isinstance(result, int):
                  return False
              if m < 1 or n < 1:
                  return False
              expected = comb(m + n - 2, m - 1)
              return result == expected
seed: 62
