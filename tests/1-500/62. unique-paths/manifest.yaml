"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().uniquePaths({m}, {n}, {result})"
    "checker":
      "import json\nimport math\nclass Checker:\n    def uniquePaths(self,\
      \ m, n, result):\n        try:\n            result = json.loads(result) if isinstance(result,\
      \ str) else result\n        except Exception:\n            return False\n  \
      \      expected = math.comb(m + n - 2, m - 1)\n        return result == expected\n"
"seed": 42
