entry:
  id: 6
  title: "zigzag-conversion"
  params:
    s:
      type: string
    numRows:
      type: int
  call:
    cpp: "Solution().convert({s}, {numRows})"
    rust: "Solution::convert({s}, {numRows})"
    python3: "Solution().convert({s}, {numRows})"
    python2: "Solution().convert({s}, {numRows})"
    ruby: "convert({s}, {numRows})"
    java: "new Solution().convert({s}, {numRows})"
    csharp: "new Solution().Convert({s}, {numRows})"
    kotlin: "Solution().convert({s}, {numRows})"
    go: "convert({s}, {numRows})"
    dart: "Solution().convert({s}, {numRows})"
    swift: "Solution().convert({s}, {numRows})"
    typescript: "convert({s}, {numRows})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().convert(s, numRows, {result})"
    checker: |
      class Checker:
          def convert(self, s: str, numRows: int, result: str) -> bool:
              if not isinstance(result, str):
                  return False
              if numRows == 1 or numRows >= len(s):
                  return result == s
              idx, direction = 0, 1
              rows = [""] * numRows
              for ch in s:
                  rows[idx] += ch
                  if idx == 0:
                      direction = 1
                  elif idx == numRows - 1:
                      direction = -1
                  idx += direction
              return result == "".join(rows)

seed: 6

