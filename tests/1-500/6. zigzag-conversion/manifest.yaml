entry:
  id: 6
  title: zigzag-conversion
  call:
    cpp: Solution().convert("{s}", {numRows})
    rust: Solution::convert("{s}".to_string(), {numRows})
    python3: Solution().convert("{s}", {numRows})
    python2: Solution().convert("{s}", {numRows})
    ruby: convert("{s}", {numRows})
    java: new Solution().convert("{s}", {numRows})
    csharp: new Solution().Convert("{s}", {numRows})
    kotlin: Solution().convert("{s}", {numRows})
    go: convert("{s}", {numRows})
    dart: Solution().convert("{s}", {numRows})
    swift: Solution().convert("{s}", {numRows})
    typescript: convert("{s}", {numRows})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().convert("{s}", {numRows}, {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, result):\n        if\
      \ isinstance(result, str):\n            try:\n                result = json.loads(result)\n\
      \            except Exception:\n                pass\n            if isinstance(result,\
      \ str):\n                low = result.strip().lower()\n                if low\
      \ == 'true':\n                    return True\n                if low == 'false':\n\
      \                    return False\n                if low.lstrip('-').isdigit():\n\
      \                    return int(low)\n        return result\n\n    def convert(self,\
      \ s, numRows, result):\n        result = self._norm(result)\n        if numRows\
      \ == 1 or numRows >= len(s):\n            return result == s\n        idx, d\
      \ = 0, 1\n        rows = [''] * numRows\n        for char in s:\n          \
      \  rows[idx] += char\n            if idx == 0:\n                d = 1\n    \
      \        elif idx == numRows - 1:\n                d = -1\n            idx +=\
      \ d\n        return result == ''.join(rows)\n"
seed: 42
