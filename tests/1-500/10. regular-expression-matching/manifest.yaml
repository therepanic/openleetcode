entry:
  id: 10
  title: regular-expression-matching
  params:
    s:
      type: string
    p:
      type: string
  call:
    cpp: Solution().isMatch({s}, {p})
    rust: Solution::is_match({s}.to_string(), {p}.to_string())
    python3: Solution().isMatch({s}, {p})
    python2: Solution().isMatch({s}, {p})
    ruby: is_match({s}, {p})
    java: new Solution().isMatch({s}, {p})
    csharp: new Solution().IsMatch({s}, {p})
    kotlin: Solution().isMatch({s}, {p})
    go: isMatch({s}, {p})
    dart: Solution().isMatch({s}, {p})
    swift: Solution().isMatch({s}, {p})
    typescript: isMatch({s}, {p})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().isMatch(s, p, {result})
    checker: |
      class Checker:
          def isMatch(self, s, p, result):
              m, n = len(s), len(p)
              dp = [[False] * (n + 1) for _ in range(m + 1)]
              dp[0][0] = True

              for j in range(1, n + 1):
                  if p[j - 1] == "*":
                      dp[0][j] = dp[0][j - 2]

              for i in range(1, m + 1):
                  for j in range(1, n + 1):
                      if p[j - 1] in {s[i - 1], "."}:
                          dp[i][j] = dp[i - 1][j - 1]
                      elif p[j - 1] == "*":
                          dp[i][j] = dp[i][j - 2]
                          if p[j - 2] in {s[i - 1], "."}:
                              dp[i][j] = dp[i][j] or dp[i - 1][j]

              return dp[m][n] == result
seed: 10
tests:
  - name: example 1
    in:
      s: aa
      p: a
    out: false
  - name: example 2
    in:
      s: aa
      p: a*
    out: true
  - name: example 3
    in:
      s: ab
      p: .*
    out: true
  - name: empty string empty pattern
    in:
      s: ""
      p: ""
    out: true
  - name: empty string literal
    in:
      s: ""
      p: a
    out: false
  - name: empty string star zero
    in:
      s: ""
      p: a*
    out: true
  - name: empty string chain zeros
    in:
      s: ""
      p: a*b*c*
    out: true
  - name: one char dot
    in:
      s: a
      p: .
    out: true
  - name: one char literal mismatch
    in:
      s: a
      p: b
    out: false
  - name: one char star zero
    in:
      s: a
      p: ab*
    out: true
  - name: one char star many
    in:
      s: aaaa
      p: a*
    out: true
  - name: exact literal match
    in:
      s: abc
      p: abc
    out: true
  - name: exact literal mismatch
    in:
      s: abc
      p: abd
    out: false
  - name: dot middle
    in:
      s: abc
      p: a.c
    out: true
  - name: dot mismatch
    in:
      s: abc
      p: a.d
    out: false
  - name: star after dot
    in:
      s: abcd
      p: .*d
    out: true
  - name: star after dot mismatch
    in:
      s: abcd
      p: .*e
    out: false
  - name: repeated literal with star
    in:
      s: aaab
      p: a*b
    out: true
  - name: repeated literal fails
    in:
      s: aaac
      p: a*b
    out: false
  - name: multiple starred groups
    in:
      s: aab
      p: c*a*b
    out: true
  - name: multiple starred groups fail
    in:
      s: mississippi
      p: mis*is*p*.
    out: false
  - name: canonical tricky true
    in:
      s: mississippi
      p: mis*is*ip*.
    out: true
  - name: star can be zero
    in:
      s: ab
      p: ab*c*
    out: true
  - name: trailing literal required
    in:
      s: ab
      p: ab.*c
    out: false
  - name: prefix not enough
    in:
      s: abcdef
      p: abc
    out: false
  - name: pattern longer through stars
    in:
      s: a
      p: ab*c*
    out: true
  - name: adjacent stars pass
    in:
      s: abbbcd
      p: ab*cd
    out: true
  - name: adjacent stars fail
    in:
      s: abbbce
      p: ab*cd
    out: false
  - name: dot star consumes all
    in:
      s: xyz
      p: .*
    out: true
  - name: dot star followed by literal
    in:
      s: xyz
      p: .*z
    out: true
  - name: dot star followed by wrong literal
    in:
      s: xyz
      p: .*a
    out: false
  - name: long repeated literal match
    in:
      s: aaaaaaaaaaaaaab
      p: a*a*a*a*a*a*a*a*a*b
    out: true
  - name: long repeated literal mismatch
    in:
      s: aaaaaaaaaaaaaac
      p: a*a*a*a*a*a*a*a*a*b
    out: false
  - name: zero length via stars
    in:
      s: ""
      p: c*d*e*f*
    out: true
  - name: star with partial fallback
    in:
      s: aaaab
      p: a*ab
    out: true
  - name: star with partial fallback fail
    in:
      s: aaaac
      p: a*ab
    out: false
  - name: all dots exact length
    in:
      s: abcde
      p: .....
    out: true
  - name: all dots too short
    in:
      s: abcd
      p: .....
    out: false
  - name: complex nested choice
    in:
      s: baaaab
      p: b.*a*b
    out: true
  - name: complex nested choice fail
    in:
      s: baaaac
      p: b.*a*b
    out: false
