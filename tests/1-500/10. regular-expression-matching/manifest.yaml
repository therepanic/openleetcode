entry:
  id: 10
  title: regular-expression-matching
  call:
    cpp: Solution().isMatch("{s}", "{p}")
    rust: Solution::is_match("{s}".to_string(), "{p}".to_string())
    python3: Solution().isMatch("{s}", "{p}")
    python2: Solution().isMatch("{s}", "{p}")
    ruby: is_match("{s}", "{p}")
    java: new Solution().isMatch("{s}", "{p}")
    csharp: new Solution().IsMatch("{s}", "{p}")
    kotlin: Solution().isMatch("{s}", "{p}")
    go: isMatch("{s}", "{p}")
    dart: Solution().isMatch("{s}", "{p}")
    swift: Solution().isMatch("{s}", "{p}")
    typescript: isMatch("{s}", "{p}")
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().isMatch("{s}", "{p}", {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, result):\n        if\
      \ isinstance(result, str):\n            try:\n                result = json.loads(result)\n\
      \            except Exception:\n                pass\n            if isinstance(result,\
      \ str):\n                low = result.strip().lower()\n                if low\
      \ == 'true':\n                    return True\n                if low == 'false':\n\
      \                    return False\n                if low.lstrip('-').isdigit():\n\
      \                    return int(low)\n        return result\n\n    def isMatch(self,\
      \ s, p, result):\n        result = self._norm(result)\n        m, n = len(s),\
      \ len(p)\n        dp = [[False] * (n + 1) for _ in range(m + 1)]\n        dp[0][0]\
      \ = True\n        for j in range(1, n + 1):\n            if p[j - 1] == '*':\n\
      \                dp[0][j] = dp[0][j - 2]\n        for i in range(1, m + 1):\n\
      \            for j in range(1, n + 1):\n                if p[j - 1] in {s[i\
      \ - 1], '.'}:\n                    dp[i][j] = dp[i - 1][j - 1]\n           \
      \     elif p[j - 1] == '*':\n                    dp[i][j] = dp[i][j - 2]\n \
      \                   if p[j - 2] in {s[i - 1], '.'}:\n                      \
      \  dp[i][j] = dp[i][j] or dp[i - 1][j]\n        return dp[m][n] == result\n"
seed: 42
tests:
  - name: example 1
    in:
      s: aa
      p: a
    out: false
  - name: example 2
    in:
      s: aa
      p: a*
    out: true
  - name: example 3
    in:
      s: ab
      p: .*
    out: true
  - name: empty pattern
    in:
      s: a
      p: ""
    out: false
  - name: dot match
    in:
      s: ab
      p: .b
    out: true
  - name: star zero match
    in:
      s: a
      p: ab*
    out: true
  - name: complex star
    in:
      s: aaa
      p: a*a
    out: true
  - name: complex chain
    in:
      s: abccccc
      p: ab.*c
    out: true
  - name: dot star
    in:
      s: xyz
      p: .*
    out: true
  - name: multiple stars
    in:
      s: aab
      p: c*a*b
    out: true
  - name: no match end
    in:
      s: mississippi
      p: missis*ip*p
    out: false
  - name: long match
    in:
      s: aaaaaaaaaaaaaab
      p: a*a*a*a*a*a*a*a*a*b
    out: true
  - name: single char dots
    in:
      s: z
      p: .
    out: true
  - name: dot and star
    in:
      s: abcd
      p: .*d
    out: true
  - name: pattern longer than string
    in:
      s: a
      p: ab*c*
    out: true
  - name: mismatched structure
    in:
      s: ab
      p: .*c
    out: false
  - name: star repeating dot
    in:
      s: abc
      p: .*.*c
    out: true
  - name: literal match
    in:
      s: abc
      p: abc
    out: true
  - name: too many chars
    in:
      s: abcd
      p: abc
    out: false
  - name: prefix match
    in:
      s: abc
      p: ab
    out: false
  - name: empty star
    in:
      s: aaa
      p: b*aaa
    out: true
  - name: generated 1
    in:
      s: abc
      p: a*b*c*
  - name: generated 2
    in:
      s: a
      p: .*..*
  - name: generated 3
    in:
      s: abcdef
      p: a*b*c*d*e*f*
  - name: generated 4
    in:
      s: mississippi
      p: mi.*si.*pi
  - name: generated 5
    in:
      s: aaaaa
      p: a*a*a*a*a*
