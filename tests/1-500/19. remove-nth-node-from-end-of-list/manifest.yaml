    head:
      type: list_node
    n:
      type: int
  call:
    cpp: "listNodeToArray(Solution().removeNthFromEnd({head}, {n}))"
    rust: "ListNode::list_node_to_array(Solution::remove_nth_from_end({head}, {n}))"
    python3: "list_node_to_array(Solution().removeNthFromEnd({head}, {n}))"
    python2: "list_node_to_array(Solution().removeNthFromEnd({head}, {n}))"
    ruby: "list_node_to_array(remove_nth_from_end({head}, {n}))"
    java: "ListNode.listNodeToArray(new Solution().removeNthFromEnd({head}, {n}))"
    csharp: "ListNode.ListNodeToArray(new Solution().RemoveNthFromEnd({head}, {n}))"
    kotlin: "listNodeToArray(Solution().removeNthFromEnd({head}, {n}))"
    go: "listNodeToArray(removeNthFromEnd({head}, {n}))"
    dart: "list_node_to_array(Solution().removeNthFromEnd({head}, {n}))"
    swift: "list_node_to_array(Solution().removeNthFromEnd({head}, {n}))"
    typescript: "listNodeToArray(removeNthFromEnd({head}, {n}))"
judge:
  type: "exact"
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: "Checker().removeNthFromEnd(head, n, {result})"
    checker: |
      class Checker:
          def removeNthFromEnd(self, head, n, result) -> bool:
              vals = []
              cur = head
              steps = 0
              while cur is not None and steps <= 1000:
                  vals.append(cur.val)
                  cur = cur.next
                  steps += 1
              if cur is not None:
                  return False
              if not isinstance(result, list):
                  return False
              if len(vals) == 0 or not (1 <= n <= len(vals)):
                  return False
              expected = vals[:len(vals) - n] + vals[len(vals) - n + 1:]
              return result == expected
seed: 19019
