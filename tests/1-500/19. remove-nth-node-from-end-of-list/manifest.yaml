  params:
    head:
      type: list_node
    n:
      type: int
"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().check([{head}], {n}, {result})"
    "checker":
      "import json\nclass Checker:\n    def check(self, head, n, result):\n        try:\n            result = json.loads(result)
      if isinstance(result, str) else result\n        except Exception:\n            return False\n        expected = list(head)\n\
      \        idx = len(expected) - n\n        if idx < 0 or idx >= len(expected):\n            return False\n        expected.pop(idx)\n\
      \        return expected == result\n"
"seed": 42
