entry:
  id: 420
  title: strong-password-checker
  params:
    password:
      type: string
  call:
    cpp: Solution().strongPasswordChecker({password})
    rust: Solution::strong_password_checker({password})
    python3: Solution().strongPasswordChecker({password})
    python2: Solution().strongPasswordChecker({password})
    ruby: strong_password_checker({password})
    java: new Solution().strongPasswordChecker({password})
    csharp: new Solution().StrongPasswordChecker({password})
    kotlin: Solution().strongPasswordChecker({password})
    go: strongPasswordChecker({password})
    dart: Solution().strongPasswordChecker({password})
    swift: Solution().strongPasswordChecker({password})
    typescript: strongPasswordChecker({password})

judge:
  type: exact

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: Checker().strongPasswordChecker(password, {result})
    checker: |
      class Checker:
          def strongPasswordChecker(self, password, result):
              return isinstance(result, int)

seed: 420

tests:
  - name: ex1_single_lowercase
    in:
      password: "a"
    out: 5

  - name: ex2_minimal_but_missing_types
    in:
      password: "aA1"
    out: 3

  - name: ex3_already_strong
    in:
      password: "1337C0d3"
    out: 0

  - name: len_6_all_lower
    in:
      password: "aaaaaa"
    out: 2

  - name: len_6_all_upper
    in:
      password: "AAAAAA"
    out: 2

  - name: len_6_all_digit
    in:
      password: "111111"
    out: 2

  - name: len_7_missing_one_repeat
    in:
      password: "aaaaaA1"
    out: 1

  - name: len_6_only_repeats_and_digit
