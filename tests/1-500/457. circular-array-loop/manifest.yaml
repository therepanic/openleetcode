entry:
  id: 457
  title: circular-array-loop
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().circularArrayLoop({nums})"
    rust: "Solution::circular_array_loop({nums})"
    python3: "Solution().circularArrayLoop({nums})"
    python2: "Solution().circularArrayLoop({nums})"
    ruby: "circular_array_loop({nums})"
    java: "new Solution().circularArrayLoop({nums})"
    csharp: "new Solution().CircularArrayLoop({nums})"
    kotlin: "Solution().circularArrayLoop({nums})"
    go: "circularArrayLoop({nums})"
    dart: "Solution().circularArrayLoop({nums})"
    swift: "Solution().circularArrayLoop({nums})"
    typescript: "circularArrayLoop({nums})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(nums, {result})"
    checker: |
      from typing import Any

      class Checker:
          def check(self, nums: Any, result: Any) -> bool:
              return isinstance(result, bool)
seed: 457457
tests:
  - name: example_1
    in:
      nums: [2, -1, 1, 2, 2]
    out: true
  - name: example_2
    in:
      nums: [-1, -2, -3, -4, -5, 6]
    out: false
  - name: example_3
    in:
      nums: [1, -1, 5, 1, 4]
    out: true
  - name: single_positive_self_loop
    in:
      nums: [1]
    out: false
  - name: single_negative_self_loop
    in:
      nums: [-1]
    out: false
  - name: two_elements_opposite
    in:
      nums: [1, -1]
    out: false
  - name: two_elements_same_positive
    in:
      nums: [1, 1]
    out: true
  - name: two_elements_same_negative
    in:
      nums: [-1, -1]
    out: true
  - name: small_positive_cycle
