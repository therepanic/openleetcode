entry:
  id: 393
  title: utf-8-validation
  params:
    data:
      type: array
      items:
        type: int
  call:
    cpp: Solution().validUtf8({data})
    rust: Solution::valid_utf8({data})
    python3: Solution().validUtf8({data})
    python2: Solution().validUtf8({data})
    ruby: valid_utf8({data})
    java: new Solution().validUtf8({data})
    csharp: new Solution().ValidUtf8({data})
    kotlin: Solution().validUtf8({data})
    go: validUtf8({data})
    dart: Solution().validUtf8({data})
    swift: Solution().validUtf8({data})
    typescript: validUtf8({data})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(data, {result})"
    checker: |
      class Checker:
          def check(self, data, result):
              i = 0
              n = len(data)
              while i < n:
                  b = data[i]
                  if b < 0 or b > 255:
                      return result is False
                  if b >> 7 == 0:
                      need = 0
                  elif b >> 5 == 0b110:
                      need = 1
                  elif b >> 4 == 0b1110:
                      need = 2
                  elif b >> 3 == 0b11110:
                      need = 3
                  else:
                      return result is False
                  if i + need >= n:
                      return result is False
                  for j in range(1, need + 1):
                      if data[i + j] < 0 or data[i + j] > 255 or data[i + j] >> 6 != 0b10:
                          return result is False
                  i += need + 1
              return result is True
seed: 393
