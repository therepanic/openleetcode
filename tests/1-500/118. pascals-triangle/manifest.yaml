entry:
  id: 118
  title: pascals-triangle
  params:
    numRows:
      type: int
  call:
    cpp: "Solution().generate({numRows})"
    rust: "Solution::generate({numRows})"
    python3: "Solution().generate({numRows})"
    python2: "Solution().generate({numRows})"
    ruby: "generate({numRows})"
    java: "new Solution().generate({numRows})"
    csharp: "new Solution().Generate({numRows})"
    kotlin: "Solution().generate({numRows})"
    go: "generate({numRows})"
    dart: "Solution().generate({numRows})"
    swift: "Solution().generate({numRows})"
    typescript: "generate({numRows})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().generate(numRows, {result})"
    checker: |
      class Checker:
          def generate(self, numRows, result):
              if not isinstance(result, list):
                  return False
              if numRows < 1 or numRows > 30:
                  return False
              if len(result) != numRows:
                  return False
              for i, row in enumerate(result):
                  if not isinstance(row, list):
                      return False
                  if len(row) != i + 1:
                      return False
                  if row[0] != 1 or row[-1] != 1:
                      return False
                  for j in range(1, len(row) - 1):
                      if row[j] != result[i - 1][j - 1] + result[i - 1][j]:
                          return False
              return result[0] == [1]
seed: 118
