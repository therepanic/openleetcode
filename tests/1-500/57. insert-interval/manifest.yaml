entry:
  id: 57
  title: insert-interval
  call:
    cpp: Solution().insert({intervals}, {newInterval})
    rust: Solution::insert({intervals}, {newInterval})
    python3: Solution().insert({intervals}, {newInterval})
    python2: Solution().insert({intervals}, {newInterval})
    ruby: insert({intervals}, {newInterval})
    java: new Solution().insert({intervals}, {newInterval})
    csharp: new Solution().Insert({intervals}, {newInterval})
    kotlin: Solution().insert({intervals}, {newInterval})
    go: insert({intervals}, {newInterval})
    dart: Solution().insert({intervals}, {newInterval})
    swift: Solution().insert({intervals}, {newInterval})
    typescript: insert({intervals}, {newInterval})
  params:
    intervals:
      type: array
      items:
        type: array
        items:
          type: int
    newInterval:
      type: array
      items:
        type: int
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: insert(intervals, newInterval, {result})
    checker: |
      import json

      def insert(intervals, newInterval, result):
          try:
              result = json.loads(result) if isinstance(result, str) else result
          except Exception:
              return False
          res = []
          i = 0
          n = len(intervals)
          new_start, new_end = newInterval
          while i < n and intervals[i][1] < new_start:
              res.append(intervals[i])
              i += 1
          while i < n and intervals[i][0] <= new_end:
              new_start = min(new_start, intervals[i][0])
              new_end = max(new_end, intervals[i][1])
              i += 1
          res.append([new_start, new_end])
          while i < n:
              res.append(intervals[i])
              i += 1
          return res == result
seed: 42
