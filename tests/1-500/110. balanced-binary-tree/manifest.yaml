entry:
  id: 110
  title: balanced-binary-tree
  params:
    root:
      type: tree_node
  call:
    cpp: Solution().isBalanced({root})
    rust: Solution::is_balanced({root})
    python3: Solution().isBalanced({root})
    python2: Solution().isBalanced({root})
    ruby: is_balanced({root})
    java: new Solution().isBalanced({root})
    csharp: new Solution().IsBalanced({root})
    kotlin: Solution().isBalanced({root})
    go: isBalanced({root})
    dart: Solution().isBalanced({root})
    swift: Solution().isBalanced({root})
    typescript: isBalanced({root})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().isBalanced(root, {result})
    checker:
      "class Checker:\n    def isBalanced(self, root, result):\n        def\
      \ height(idx):\n            if idx >= len(root) or root[idx] is None:\n    \
      \            return 0\n            left = height(2 * idx + 1)\n            if\
      \ left == -1:\n                return -1\n            right = height(2 * idx\
      \ + 2)\n            if right == -1 or abs(left - right) > 1:\n             \
      \   return -1\n            return max(left, right) + 1\n\n        if root is\
      \ None or root == []:\n            return result is True\n        if not isinstance(root,\
      \ list):\n            return False\n        return isinstance(result, bool)\
      \ and result == (height(0) != -1)\n"
seed: 110
