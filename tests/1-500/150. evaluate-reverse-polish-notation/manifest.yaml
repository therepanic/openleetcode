entry:
  id: 150
  title: "evaluate-reverse-polish-notation"
  params:
    tokens:
      type: array
      items:
        type: string
  call:
    cpp: "Solution().evalRPN({tokens})"
    rust: "Solution::eval_rpn({tokens})"
    python3: "Solution().evalRPN({tokens})"
    python2: "Solution().evalRPN({tokens})"
    ruby: "eval_rpn({tokens})"
    java: "new Solution().evalRPN({tokens})"
    csharp: "new Solution().EvalRPN({tokens})"
    kotlin: "Solution().evalRPN({tokens})"
    go: "evalRPN({tokens})"
    dart: "Solution().evalRPN({tokens})"
    swift: "Solution().evalRPN({tokens})"
    typescript: "evalRPN({tokens})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().evalRPN(tokens, {result})"
    checker: |
      class Checker:
          def evalRPN(self, tokens, result):
              if not isinstance(result, int):
                  return False
              stack = []
              for token in tokens:
                  if token in {"+", "-", "*", "/"}:
                      if len(stack) < 2:
                          return False
                      a = stack.pop()
                      b = stack.pop()
                      if token == "+":
                          stack.append(b + a)
                      elif token == "-":
                          stack.append(b - a)
                      elif token == "*":
                          stack.append(b * a)
                      else:
                          stack.append(int(b / a))
                  else:
                      try:
                          stack.append(int(token))
                      except Exception:
                          return False
              return len(stack) == 1 and stack[0] == result

seed: 150

