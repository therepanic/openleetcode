entry:
  id: 190
  title: reverse-bits
  params:
    n:
      type: int
  call:
    cpp: "Solution().reverseBits({n})"
    rust: "Solution::reverse_bits({n})"
    python3: "Solution().reverseBits({n})"
    python2: "Solution().reverseBits({n})"
    ruby: "reverse_bits({n})"
    java: "new Solution().reverseBits({n})"
    csharp: "new Solution().ReverseBits({n})"
    kotlin: "Solution().reverseBits({n})"
    go: "reverseBits({n})"
    dart: "Solution().reverseBits({n})"
    swift: "Solution().reverseBits({n})"
    typescript: "reverseBits({n})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().reverseBits(n, {result})"
    checker: |
      class Checker:
          def reverseBits(self, n, result):
              if not isinstance(n, int) or not isinstance(result, int):
                  return False
              if n < 0 or n > 2147483646 or (n & 1) != 0:
                  return False
              expected = 0
              x = n
              for _ in range(32):
                  expected = (expected << 1) | (x & 1)
                  x >>= 1
              return result == expected
seed: 190
