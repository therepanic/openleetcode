entry:
  id: 396
  title: rotate-function
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: Solution().maxRotateFunction({nums})
    rust: Solution::max_rotate_function({nums})
    python3: Solution().maxRotateFunction({nums})
    python2: Solution().maxRotateFunction({nums})
    ruby: max_rotate_function({nums})
    java: new Solution().maxRotateFunction({nums})
    csharp: new Solution().MaxRotateFunction({nums})
    kotlin: Solution().maxRotateFunction({nums})
    go: maxRotateFunction({nums})
    dart: Solution().maxRotateFunction({nums})
    swift: Solution().maxRotateFunction({nums})
    typescript: maxRotateFunction({nums})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(nums, {result})"
    checker: |
      class Checker:
          def check(self, nums, result):
              n = len(nums)
              if n == 0:
                  return result == 0
              best = None
              for k in range(n):
                  total = 0
                  for i in range(n):
                      total += i * nums[(i - k) % n]
                  if best is None or total > best:
                      best = total
              return result == best
seed: 42
