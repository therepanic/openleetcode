oracle:
  python3:
    call: "Checker().canFinish(numCourses, prerequisites, {result})"
    checker: |
      import copy

      from collections import deque
      from typing import List


      class Solution:
          def canFinish(self, numCourses: int, prerequisites: List[List[int]]) -> bool:
              graph = [[] for _ in range(numCourses)]
              indegree = [0] * numCourses
              for course, pre in prerequisites:
                  graph[pre].append(course)
                  indegree[course] += 1

              queue = deque(i for i in range(numCourses) if indegree[i] == 0)
              seen = 0
              while queue:
                  node = queue.popleft()
                  seen += 1
                  for nxt in graph[node]:
                      indegree[nxt] -= 1
                      if indegree[nxt] == 0:
                          queue.append(nxt)
              return seen == numCourses

      def array_to_list_node_local(values):
          dummy = ListNode(0)
          tail = dummy
          for value in values:
              tail.next = ListNode(value)
              tail = tail.next
          return dummy.next

      def array_to_tree_node_local(values):
          if not values:
              return None
          root = TreeNode(values[0])
          queue = deque([root])
          index = 1
          while queue and index < len(values):
              node = queue.popleft()
              if index < len(values) and values[index] is not None:
                  node.left = TreeNode(values[index])
                  queue.append(node.left)
              index += 1
              if index < len(values) and values[index] is not None:
                  node.right = TreeNode(values[index])
                  queue.append(node.right)
              index += 1
          return root

      def list_node_to_array_local(node):
          out = []
          seen = 0
          while node is not None and seen < 100000:
              out.append(node.val)
              node = node.next
              seen += 1
          return out

      def tree_node_to_array_local(root):
          if root is None:
              return []
          out = []
          q = deque([root])
          while q:
              node = q.popleft()
              if node is None:
                  out.append(None)
                  continue
              out.append(node.val)
              q.append(node.left)
              q.append(node.right)
          while out and out[-1] is None:
              out.pop()
          return out

      def deep_sort(value):
          if isinstance(value, list):
              normalized = [deep_sort(item) for item in value]
              return sorted(normalized, key=lambda item: json.dumps(item, sort_keys=True))
          if isinstance(value, dict):
              return {key: deep_sort(val) for key, val in sorted(value.items())}
          return value

      def normalize_expected(value):
          kind = "bool"
          if kind == "list_node":
              return list_node_to_array_local(value)
          if kind == "tree_node":
              return tree_node_to_array_local(value)
          return value

      def normalize_actual(value):
          return value

      def prepare_input(value, kind):
          if kind == "tree_node":
              return array_to_tree_node_local(value)
          if kind == "list_node":
              return array_to_list_node_local(value)
          return copy.deepcopy(value)

      class Checker:
          def canFinish(self, numCourses, prerequisites, result):
              prepared_numCourses = prepare_input(numCourses, "int"); prepared_prerequisites = prepare_input(prerequisites, "array[array[int]]")
              expected = Solution().canFinish(prepared_numCourses, prepared_prerequisites)
              expected = normalize_expected(expected)
              actual = normalize_actual(result)
              return deep_sort(expected) == deep_sort(actual)
