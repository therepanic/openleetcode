entry:
  id: 498
  title: "diagonal-traverse"
  params:
    mat:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().findDiagonalOrder({mat})"
    rust: "Solution::find_diagonal_order({mat})"
    python3: "Solution().findDiagonalOrder({mat})"
    python2: "Solution().findDiagonalOrder({mat})"
    ruby: "find_diagonal_order({mat})"
    java: "new Solution().findDiagonalOrder({mat})"
    csharp: "new Solution().FindDiagonalOrder({mat})"
    kotlin: "Solution().findDiagonalOrder({mat})"
    go: "findDiagonalOrder({mat})"
    dart: "Solution().findDiagonalOrder({mat})"
    swift: "Solution().findDiagonalOrder({mat})"
    typescript: "findDiagonalOrder({mat})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 512

oracle:
  python3:
    call: "Checker().check(mat, {result})"
    checker: |
      class Checker:
          def check(self, mat, result):
              if not mat or not mat[0]:
                  return result == []
              m = len(mat)
              n = len(mat[0])
              expected = []
              row = 0
              col = 0
              for _ in range(m * n):
                  expected.append(mat[row][col])
                  if (row + col) % 2 == 0:
                      if col == n - 1:
                          row += 1
                      elif row == 0:
                          col += 1
                      else:
                          row -= 1
                          col += 1
                  else:
                      if row == m - 1:
                          col += 1
                      elif col == 0:
                          row += 1
                      else:
                          row += 1
                          col -= 1
              return result == expected

seed: 498

