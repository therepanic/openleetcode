    "checker":
      "import json\nclass Checker:\n    def climbStairs(self, n, result):\n\
      \        try:\n            result = json.loads(result) if isinstance(result,\
      \ str) else result\n        except Exception:\n            return False\n  \
      \      if n == 1: return result == 1\n        if n == 2: return result == 2\n\
      \        a, b = 1, 2\n        for _ in range(3, n + 1):\n            a, b =\
      \ b, a + b\n        return result == b\n"
