entry:
  id: 70
  title: climbing-stairs
  params:
    n:
      type: int
  call:
    cpp: "Solution().climbStairs({n})"
    rust: "Solution::climb_stairs({n})"
    python3: "Solution().climbStairs({n})"
    python2: "Solution().climbStairs({n})"
    ruby: "climb_stairs({n})"
    java: "new Solution().climbStairs({n})"
    csharp: "new Solution().ClimbStairs({n})"
    kotlin: "Solution().climbStairs({n})"
    go: "climbStairs({n})"
    dart: "Solution().climbStairs({n})"
    swift: "Solution().climbStairs({n})"
    typescript: "climbStairs({n})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().climbStairs(n, {result})"
    checker: |
      class Checker:
          def climbStairs(self, n, result):
              if not isinstance(n, int) or n < 0:
                  return False
              if n <= 3:
                  return result == n

              prev2 = 2
              prev1 = 3
              cur = 0
              for _ in range(3, n):
                  cur = prev1 + prev2
                  prev2 = prev1
                  prev1 = cur
              return result == cur
seed: 70
