judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().largestNumber(nums, {result})"
    checker: |
      class Checker:
          def largestNumber(self, nums, result):
              arr = list(map(str, nums))
              from functools import cmp_to_key

              def cmp(a, b):
                  ab = a + b
                  ba = b + a
                  if ab > ba:
                      return -1
                  if ab < ba:
                      return 1
                  return 0

              arr.sort(key=cmp_to_key(cmp))
              expected = "0" if arr[0] == "0" else "".join(arr)
              return result == expected
seed: 179
