entry:
  id: 52
  title: n-queens-ii
  params:
    n:
      type: int
  call:
    cpp: "Solution().totalNQueens({n})"
    rust: "Solution::total_n_queens({n})"
    python3: "Solution().totalNQueens({n})"
    python2: "Solution().totalNQueens({n})"
    ruby: "total_n_queens({n})"
    java: "new Solution().totalNQueens({n})"
    csharp: "new Solution().TotalNQueens({n})"
    kotlin: "Solution().totalNQueens({n})"
    go: "totalNQueens({n})"
    dart: "Solution().totalNQueens({n})"
    swift: "Solution().totalNQueens({n})"
    typescript: "totalNQueens({n})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().totalNQueens(n, {result})"
    checker: |
      class Checker:
          def totalNQueens(self, n, result):
              return isinstance(result, int) and result == Solution().totalNQueens(n)
seed: 52
