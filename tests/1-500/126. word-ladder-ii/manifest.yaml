oracle:
  python3:
    call: Checker().findLadders(beginWord, endWord, wordList, {result})
    checker:
      "from collections import deque\n\nclass Checker:\n    def findLadders(self, beginWord, endWord, wordList, result):\n        if not isinstance(result, list):\n            return False\n        words = set(wordList)\n        if endWord not in words:\n            return result == []\n\n        def neighbors(word):\n            for i in range(len(word)):\n                prefix = word[:i]\n                suffix = word[i + 1:]\n                for code in range(ord('a'), ord('z') + 1):\n                    cand = prefix + chr(code) + suffix\n                    if cand in words:\n                        yield cand\n\n        dist = {beginWord: 0}\n        queue = deque([beginWord])\n        while queue:\n            word = queue.popleft()\n            if word == endWord:\n                break\n            for nxt in neighbors(word):\n                if nxt not in dist:\n                    dist[nxt] = dist[word] + 1\n                    queue.append(nxt)\n\n        if endWord not\
      \ in dist:\n            return result == []\n\n        shortest = dist[endWord] + 1\n        expected = set()\n\n        def build(path, word):\n            if word == endWord:\n                expected.add(tuple(path))\n                return\n            for nxt in neighbors(word):\n                if dist.get(nxt) == dist[word] + 1:\n                    path.append(nxt)\n                    build(path, nxt)\n                    path.pop()\n\n        build([beginWord], beginWord)\n\n        seen = set()\n        for path in result:\n            if not isinstance(path, list) or tuple(path) in seen:\n                return False\n            seen.add(tuple(path))\n            if len(path) != shortest or path[0] != beginWord or path[-1] != endWord:\n                return False\n            for i, word in enumerate(path):\n                if not isinstance(word, str):\n                    return False\n                if i > 0 and word not in words:\n                    return False\n\
      \                if i > 0:\n                    diff = sum(1 for a, b in zip(path[i - 1], word) if a != b)\n                    if diff != 1:\n                        return False\n\n        return seen == expected\n"
