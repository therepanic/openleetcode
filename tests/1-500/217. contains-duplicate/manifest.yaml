entry:
  id: 217
  title: "contains-duplicate"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().containsDuplicate({nums})"
    rust: "Solution::contains_duplicate({nums})"
    python3: "Solution().containsDuplicate({nums})"
    python2: "Solution().containsDuplicate({nums})"
    ruby: "contains_duplicate({nums})"
    java: "new Solution().containsDuplicate({nums})"
    csharp: "new Solution().ContainsDuplicate({nums})"
    kotlin: "Solution().containsDuplicate({nums})"
    go: "containsDuplicate({nums})"
    dart: "Solution().containsDuplicate({nums})"
    swift: "Solution().containsDuplicate({nums})"
    typescript: "containsDuplicate({nums})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().check(nums, {result})"
    checker: |
      from typing import Any

      class Checker:
          def check(self, nums: Any, result: Any) -> bool:
              return isinstance(result, bool)

seed: 217217

