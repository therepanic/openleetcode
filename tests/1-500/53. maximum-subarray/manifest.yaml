entry:
  id: 53
  title: maximum-subarray
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().maxSubArray({nums})"
    rust: "Solution::max_sub_array({nums})"
    python3: "Solution().maxSubArray({nums})"
    python2: "Solution().maxSubArray({nums})"
    ruby: "max_sub_array({nums})"
    java: "new Solution().maxSubArray({nums})"
    csharp: "new Solution().MaxSubArray({nums})"
    kotlin: "Solution().maxSubArray({nums})"
    go: "maxSubArray({nums})"
    dart: "Solution().maxSubArray({nums})"
    swift: "Solution().maxSubArray({nums})"
    typescript: "maxSubArray({nums})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().maxSubArray(nums, {result})"
    checker: |
      class Checker:
          def maxSubArray(self, nums, result):
              best = nums[0]
              cur = 0
              for n in nums:
                  if cur < 0:
                      cur = 0
                  cur += n
                  if cur > best:
                      best = cur
              return result == best
seed: 53
