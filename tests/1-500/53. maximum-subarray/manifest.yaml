entry:
  id: 53
  title: maximum-subarray
  call:
    cpp: Solution().maxSubArray(lv(vector<int>{ {nums} }))
    rust: Solution::max_sub_array(vec![{nums}])
    python3: Solution().maxSubArray([{nums}])
    python2: Solution().maxSubArray([{nums}])
    ruby: max_sub_array([{nums}])
    java: new Solution().maxSubArray(new int[]{ {nums} })
    csharp: new Solution().MaxSubArray(new int[]{ {nums} })
    kotlin: Solution().maxSubArray(intArrayOf({nums}))
    go: maxSubArray([]int{ {nums} })
    dart: Solution().maxSubArray([{nums}])
    swift: Solution().maxSubArray([{nums}])
    typescript: maxSubArray([{nums}])
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().maxSubArray([{nums}], {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, result):\n        if\
      \ isinstance(result, str):\n            try:\n                result = json.loads(result)\n\
      \            except Exception:\n                pass\n            if isinstance(result,\
      \ str):\n                low = result.strip().lower()\n                if low\
      \ == 'true':\n                    return True\n                if low == 'false':\n\
      \                    return False\n                if low.lstrip('-').isdigit():\n\
      \                    return int(low)\n        return result\n\n    def maxSubArray(self,\
      \ nums, result):\n        result = self._norm(result)\n        res = float('-inf')\n\
      \        total = 0\n        for n in nums:\n            total += n\n       \
      \     res = max(res, total)\n            if total < 0:\n                total\
      \ = 0\n        return res == result\n"
seed: 42
