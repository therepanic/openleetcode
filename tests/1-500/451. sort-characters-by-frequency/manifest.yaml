entry:
  id: 451
  title: sort-characters-by-frequency
  params:
    s:
      type: string
  call:
    cpp: Solution().frequencySort({s})
    rust: Solution::frequency_sort({s})
    python3: Solution().frequencySort({s})
    python2: Solution().frequencySort({s})
    ruby: frequency_sort({s})
    java: new Solution().frequencySort({s})
    csharp: new Solution().FrequencySort({s})
    kotlin: Solution().frequencySort({s})
    go: frequencySort({s})
    dart: Solution().frequencySort({s})
    swift: Solution().frequencySort({s})
    typescript: frequencySort({s})

judge:
  type: ignore_order

limits:
  time_ms: 2000
  memory_mb: 512

oracle:
  python3:
    call: Checker().frequencySort(s, {result})
    checker: |
      from collections import Counter

      class Checker:
          def frequencySort(self, s, result):
              if not isinstance(result, str):
                  return False
              if len(result) != len(s):
                  return False
              if Counter(result) != Counter(s):
                  return False
              if not result:
                  return False
              counts = Counter(result)
              i = 0
              prev = None
              while i < len(result):
                  ch = result[i]
                  freq = counts[ch]
                  if prev is not None and freq > prev:
                      return False
                  j = i
                  while j < len(result) and result[j] == ch:
                      j += 1
                  if j - i != freq:
                      return False
                  prev = freq
                  i = j
              return True

seed: 451

