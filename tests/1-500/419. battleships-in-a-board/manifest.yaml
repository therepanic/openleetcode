entry:
  id: 419
  title: battleships-in-a-board
  params:
    board:
      type: array
      items:
        type: array
        items:
          type: string
  call:
    cpp: "Solution().countBattleships({board})"
    rust: "Solution::count_battleships({board})"
    python3: "Solution().countBattleships({board})"
    python2: "Solution().countBattleships({board})"
    ruby: "count_battleships({board})"
    java: "new Solution().countBattleships({board})"
    csharp: "new Solution().CountBattleships({board})"
    kotlin: "Solution().countBattleships({board})"
    go: "countBattleships({board})"
    dart: "Solution().countBattleships({board})"
    swift: "Solution().countBattleships({board})"
    typescript: "countBattleships({board})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().countBattleships(board, {result})"
    checker: |
      class Checker:
          def countBattleships(self, board, result):
              expected = sum(
                  board[i][j] == 'X' and
                  (i == 0 or board[i - 1][j] == '.') and
                  (j == 0 or board[i][j - 1] == '.')
                  for i in range(len(board))
                  for j in range(len(board[0]))
              )
              return result == expected
seed: 419
