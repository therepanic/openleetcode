  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(root, key, {result})"
    checker: |
      class Checker:
          def _array_to_tree(self, arr):
              if arr is None or arr == []:
                  return None
              if not isinstance(arr, list):
                  return arr
              nodes = [None if v is None else {"val": v, "left": None, "right": None} for v in arr]
              kids = nodes[::-1]
              root = kids.pop()
              for node in nodes:
                  if node is not None:
                      if kids:
                          node["left"] = kids.pop()
                      if kids:
                          node["right"] = kids.pop()
              return root

          def _left(self, node):
              return node.get("left") if isinstance(node, dict) else getattr(node, "left", None)

          def _right(self, node):
              return node.get("right") if isinstance(node, dict) else getattr(node, "right", None)

          def _val(self, node):
              return node.get("val") if isinstance(node, dict) else getattr(node, "val", None)

          def _inorder(self, node, values):
              if node is None:
                  return True
              if not self._inorder(self._left(node), values):
                  return False
              values.append(self._val(node))
              if not self._inorder(self._right(node), values):
                  return False
              return True

          def _is_bst(self, node, lo, hi):
              if node is None:
                  return True
              val = self._val(node)
              if val is None or val <= lo or val >= hi:
                  return False
              return self._is_bst(self._left(node), lo, val) and self._is_bst(self._right(node), val, hi)

          def check(self, root, key, result):
              result = self._array_to_tree(result)
              if result is None:
                  result_values = []
                  result_ok = True
              else:
                  result_values = []
                  result_ok = self._is_bst(result, float('-inf'), float('inf'))
                  if not result_ok:
                      return False
                  if not self._inorder(result, result_values):
                      return False

              original_values = []
              if root is not None and not self._inorder(root, original_values):
                  return False

              if key in original_values:
                  original_values.remove(key)

              return result_values == original_values
