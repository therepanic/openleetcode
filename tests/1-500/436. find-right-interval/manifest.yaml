entry:
  id: 436
  title: find-right-interval
  params:
    intervals:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().findRightInterval({intervals})
    rust: Solution::find_right_interval({intervals})
    python3: Solution().findRightInterval({intervals})
    python2: Solution().findRightInterval({intervals})
    ruby: find_right_interval({intervals})
    java: new Solution().findRightInterval({intervals})
    csharp: new Solution().FindRightInterval({intervals})
    kotlin: Solution().findRightInterval({intervals})
    go: findRightInterval({intervals})
    dart: Solution().findRightInterval({intervals})
    swift: Solution().findRightInterval({intervals})
    typescript: findRightInterval({intervals})

judge:
  type: exact

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: Checker().findRightInterval(intervals, {result})
    checker: |
      from bisect import bisect_left
      from typing import Any, List

      class Checker:
          def findRightInterval(self, intervals: List[List[int]], result: Any) -> bool:
              if not isinstance(result, list) or len(result) != len(intervals):
                  return False
              starts = sorted((interval[0], i) for i, interval in enumerate(intervals))
              sorted_starts = [s for s, _ in starts]
              expected = []
              for interval in intervals:
                  pos = bisect_left(sorted_starts, interval[1])
                  expected.append(-1 if pos == len(starts) else starts[pos][1])
              return result == expected

