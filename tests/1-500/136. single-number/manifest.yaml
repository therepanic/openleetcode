entry:
  id: 136
  title: single-number
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: Solution().singleNumber({nums})
    rust: Solution::single_number({nums})
    python3: Solution().singleNumber({nums})
    python2: Solution().singleNumber({nums})
    ruby: single_number({nums})
    java: new Solution().singleNumber({nums})
    csharp: new Solution().SingleNumber({nums})
    kotlin: Solution().singleNumber({nums})
    go: singleNumber({nums})
    dart: Solution().singleNumber({nums})
    swift: Solution().singleNumber({nums})
    typescript: singleNumber({nums})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: Checker().singleNumber(nums, {result})
    checker: "class Checker:\n    def singleNumber(self, nums, result):\n        if not isinstance(result, int):\n            return False\n        xor = 0\n        for n in nums:\n            if not isinstance(n, int):\n                return False\n            xor ^= n\n        return result == xor\n"
seed: 136
