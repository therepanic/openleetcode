  id: 312
  title: "burst-balloons"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().maxCoins({nums})"
    rust: "Solution::max_coins({nums})"
    python3: "Solution().maxCoins({nums})"
    python2: "Solution().maxCoins({nums})"
    ruby: "max_coins({nums})"
    java: "new Solution().maxCoins({nums})"
    csharp: "new Solution().MaxCoins({nums})"
    kotlin: "Solution().maxCoins({nums})"
    go: "maxCoins({nums})"
    dart: "Solution().maxCoins({nums})"
    swift: "Solution().maxCoins({nums})"
    typescript: "maxCoins({nums})"
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 512
oracle:
  python3:
    call: "Checker().maxCoins(nums, {result})"
    checker: |
      class Checker:
          def maxCoins(self, nums: List[int], result: Any) -> bool:
              balloons = [1] + nums + [1]
              n = len(balloons)
              dp = [[0] * n for _ in range(n)]
              for length in range(2, n):
                  for left in range(0, n - length):
                      right = left + length
                      best = 0
                      for k in range(left + 1, right):
                          total = balloons[left] * balloons[k] * balloons[right] + dp[left][k] + dp[k][right]
                          if total > best:
                              best = total
                      dp[left][right] = best
              return result == dp[0][n - 1]
seed: 312
