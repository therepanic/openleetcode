entry:
  id: 363
  title: max-sum-of-rectangle-no-larger-than-k
  params:
    matrix:
      type: array
      items:
        type: array
        items:
          type: int
    k:
      type: int
  call:
    cpp: "Solution().maxSumSubmatrix({matrix}, {k})"
    rust: "Solution::max_sum_submatrix({matrix}, {k})"
    python3: "Solution().maxSumSubmatrix({matrix}, {k})"
    python2: "Solution().maxSumSubmatrix({matrix}, {k})"
    ruby: "max_sum_submatrix({matrix}, {k})"
    java: "new Solution().maxSumSubmatrix({matrix}, {k})"
    csharp: "new Solution().MaxSumSubmatrix({matrix}, {k})"
    kotlin: "Solution().maxSumSubmatrix({matrix}, {k})"
    go: "maxSumSubmatrix({matrix}, {k})"
    dart: "Solution().maxSumSubmatrix({matrix}, {k})"
    swift: "Solution().maxSumSubmatrix({matrix}, {k})"
    typescript: "maxSumSubmatrix({matrix}, {k})"
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 512
oracle:
  python3:
    call: "Checker().maxSumSubmatrix(matrix, k, {result})"
    checker: |
      class Checker:
          def maxSumSubmatrix(self, matrix, k, result):
              m = len(matrix)
              n = len(matrix[0])
              best = float('-inf')
              for top in range(m):
                  col = [0] * n
                  for bottom in range(top, m):
                      for c in range(n):
                          col[c] += matrix[bottom][c]
                      for left in range(n):
                          s = 0
                          for right in range(left, n):
                              s += col[right]
                              if s <= k and s > best:
                                  best = s
              return result == best
seed: 363
