entry:
  id: 188
  title: "best-time-to-buy-and-sell-stock-iv"
  params:
    k:
      type: int
    prices:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().maxProfit({k}, {prices})"
    rust: "Solution::max_profit({k}, {prices})"
    python3: "Solution().maxProfit({k}, {prices})"
    python2: "Solution().maxProfit({k}, {prices})"
    ruby: "max_profit({k}, {prices})"
    java: "new Solution().maxProfit({k}, {prices})"
    csharp: "new Solution().MaxProfit({k}, {prices})"
    kotlin: "Solution().maxProfit({k}, {prices})"
    go: "maxProfit({k}, {prices})"
    dart: "Solution().maxProfit({k}, {prices})"
    swift: "Solution().maxProfit({k}, {prices})"
    typescript: "maxProfit({k}, {prices})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().maxProfit(k, prices, {result})"
    checker: |
      class Checker:
          def maxProfit(self, k, prices, result) -> bool:
              if not isinstance(result, int):
                  return False
              n = len(prices)
              if k < 0 or n < 0:
                  return False
              if k == 0 or n < 2:
                  return result == 0
              if k >= n // 2:
                  expected = sum(max(0, prices[i] - prices[i - 1]) for i in range(1, n))
                  return result == expected
              hold = [-(10**18)] * (k + 1)
              free = [0] * (k + 1)
              for price in prices:
                  for t in range(1, k + 1):
                      hold[t] = max(hold[t], free[t - 1] - price)
                      free[t] = max(free[t], hold[t] + price)
              expected = max(free)
              return result == expected

seed: 188

