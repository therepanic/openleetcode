entry:
  id: 165
  title: "compare-version-numbers"
  params:
    version1:
      type: "string"
    version2:
      type: "string"
  call:
    cpp: "Solution().compareVersion({version1}, {version2})"
    rust: "Solution::compare_version({version1}, {version2})"
    python3: "Solution().compareVersion({version1}, {version2})"
    python2: "Solution().compareVersion({version1}, {version2})"
    ruby: "compare_version({version1}, {version2})"
    java: "new Solution().compareVersion({version1}, {version2})"
    csharp: "new Solution().CompareVersion({version1}, {version2})"
    kotlin: "Solution().compareVersion({version1}, {version2})"
    go: "compareVersion({version1}, {version2})"
    dart: "Solution().compareVersion({version1}, {version2})"
    swift: "Solution().compareVersion({version1}, {version2})"
    typescript: "compareVersion({version1}, {version2})"
judge:
  type: "exact"
limits:
  time_ms: 2000
  memory_mb: 512
oracle:
  python3:
    call: "Checker().compareVersion(version1, version2, {result})"
    checker: |
      import copy


      from typing import *
      from collections import *
      import copy
      import json
      import math
      import bisect
      import heapq
      import itertools
      import functools

      class Solution(object):
          def compareVersion(self, version1, version2):
              v1 = list(map(int, version1.split('.')))
              v2 = list(map(int, version2.split('.')))

              while len(v1) < len(v2):
                  v1.append(0)
              while len(v2) < len(v1):
                  v2.append(0)

              for a, b in zip(v1, v2):
                  if a < b:
                      return -1
                  elif a > b:
                      return 1

              return 0


      def array_to_list_node_local(values):
          dummy = ListNode(0)
          tail = dummy
          for value in values:
              tail.next = ListNode(value)
              tail = tail.next
          return dummy.next

      def array_to_tree_node_local(values):
          if not values:
              return None
          root = TreeNode(values[0])
          queue = deque([root])
          index = 1
          while queue and index < len(values):
              node = queue.popleft()
              if index < len(values) and values[index] is not None:
                  node.left = TreeNode(values[index])
                  queue.append(node.left)
              index += 1
              if index < len(values) and values[index] is not None:
                  node.right = TreeNode(values[index])
                  queue.append(node.right)
              index += 1
          return root

      def list_node_to_array_local(node):
          out = []
          seen = 0
          while node is not None and seen < 100000:
              out.append(node.val)
              node = node.next
              seen += 1
          return out

      def tree_node_to_array_local(root):
          if root is None:
              return []
          out = []
          q = deque([root])
          while q:
              node = q.popleft()
              if node is None:
                  out.append(None)
                  continue
              out.append(node.val)
              q.append(node.left)
              q.append(node.right)
          while out and out[-1] is None:
              out.pop()
          return out

      def deep_sort(value):
          if isinstance(value, list):
              normalized = [deep_sort(item) for item in value]
              return sorted(normalized, key=lambda item: json.dumps(item, sort_keys=True))
          if isinstance(value, dict):
              return {key: deep_sort(val) for key, val in sorted(value.items())}
          return value

      def normalize_expected(value):
          kind = "int"
          if kind == "list_node":
              return list_node_to_array_local(value)
          if kind == "tree_node":
              return tree_node_to_array_local(value)
          return value

      def normalize_actual(value):
          return value

      def prepare_input(value, kind):
          if kind == "tree_node":
              return array_to_tree_node_local(value)
          if kind == "list_node":
              return array_to_list_node_local(value)
          return copy.deepcopy(value)

      class Checker:
          def compareVersion(self, version1, version2, result):
              prepared_version1 = prepare_input(version1, "string"); prepared_version2 = prepare_input(version2, "string")
              expected = Solution().compareVersion(prepared_version1, prepared_version2)
              expected = normalize_expected(expected)
              actual = normalize_actual(result)
              return deep_sort(expected) == deep_sort(actual)
