entry:
  id: 90
  title: "subsets-ii"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().subsetsWithDup({nums})"
    rust: "Solution::subsets_with_dup({nums})"
    python3: "Solution().subsetsWithDup({nums})"
    python2: "Solution().subsetsWithDup({nums})"
    ruby: "subsets_with_dup({nums})"
    java: "new Solution().subsetsWithDup({nums})"
    csharp: "new Solution().SubsetsWithDup({nums})"
    kotlin: "Solution().subsetsWithDup({nums})"
    go: "subsetsWithDup({nums})"
    dart: "Solution().subsetsWithDup({nums})"
    swift: "Solution().subsetsWithDup({nums})"
    typescript: "subsetsWithDup({nums})"
judge:
  type: "ignore_order"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().subsetsWithDup(nums, {result})"
    checker: |
      class Checker:
          def subsetsWithDup(self, nums, result):
              nums = sorted(nums)
              expected = []
              def bt(i, cur):
                  expected.append(tuple(cur))
                  for j in range(i, len(nums)):
                      if j > i and nums[j] == nums[j - 1]:
                          continue
                      cur.append(nums[j]); bt(j + 1, cur); cur.pop()
              bt(0, [])
              got = [tuple(x) for x in result] if isinstance(result, list) else None
              return got is not None and sorted(got) == sorted(expected)
seed: 90
