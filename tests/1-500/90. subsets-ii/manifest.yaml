"judge":
  "type": "ignore_order"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().subsetsWithDup(nums, {result})"
    "checker":
      "import json\nclass Checker:\n    def subsetsWithDup(self, nums, result):\n        try:\n            result
      = json.loads(result) if isinstance(result, str) else result\n        except Exception:\n            return False\n \
      \       def get_subsets(arr):\n            arr.sort()\n            res = []\n            def backtrack(start, path):\n\
      \                res.append(list(path))\n                for i in range(start, len(arr)):\n                    if i
      > start and arr[i] == arr[i-1]:\n                        continue\n                    path.append(arr[i])\n       \
      \             backtrack(i+1, path)\n                    path.pop()\n            backtrack(0, [])\n            return
      res\n        expected = get_subsets(nums)\n        import collections\n        def count_subsets(subsets):\n       \
      \     normalized = []\n            for s in subsets:\n                normalized.append(tuple(sorted(s)))\n        \
      \    return collections.Counter(normalized)\n        return count_subsets(result) == count_subsets(expected)\n"
"seed": 42
