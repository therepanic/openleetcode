entry:
  id: 402
  title: remove-k-digits
  params:
    num:
      type: string
    k:
      type: int
  call:
    cpp: Solution().removeKdigits({num}, {k})
    rust: Solution::remove_kdigits({num}, {k})
    python3: Solution().removeKdigits({num}, {k})
    python2: Solution().removeKdigits({num}, {k})
    ruby: remove_kdigits({num}, {k})
    java: new Solution().RemoveKdigits({num}, {k})
    csharp: new Solution().RemoveKdigits({num}, {k})
    kotlin: Solution().removeKdigits({num}, {k})
    go: removeKdigits({num}, {k})
    dart: Solution().removeKdigits({num}, {k})
    swift: Solution().removeKdigits({num}, {k})
    typescript: removeKdigits({num}, {k})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().removeKdigits(num, k, {result})
    checker: |
      class Checker:
          def removeKdigits(self, num, k, result):
              if not isinstance(num, str) or not isinstance(k, int) or not isinstance(result, str):
                  return False
              if not num or not num.isdigit():
                  return False
              if k < 1 or k > len(num):
                  return False
              if len(num) > 1 and num[0] == '0':
                  return False
              stack = []
              kk = k
              for ch in num:
                  while kk and stack and stack[-1] > ch:
                      stack.pop()
                      kk -= 1
                  stack.append(ch)
              expected = ''.join(stack[:len(stack) - kk]).lstrip('0') or '0'
              if result == '':
                  return False
              return result == expected and (result == '0' or result[0] != '0')
seed: 402
