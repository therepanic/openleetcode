entry:
  id: 97
  title: interleaving-string
  params:
    s1:
      type: string
    s2:
      type: string
    s3:
      type: string
  call:
    cpp: "Solution().isInterleave({s1}, {s2}, {s3})"
    rust: "Solution::is_interleave({s1}, {s2}, {s3})"
    python3: "Solution().isInterleave({s1}, {s2}, {s3})"
    python2: "Solution().isInterleave({s1}, {s2}, {s3})"
    ruby: "is_interleave({s1}, {s2}, {s3})"
    java: "new Solution().isInterleave({s1}, {s2}, {s3})"
    csharp: "new Solution().IsInterleave({s1}, {s2}, {s3})"
    kotlin: "Solution().isInterleave({s1}, {s2}, {s3})"
    go: "isInterleave({s1}, {s2}, {s3})"
    dart: "Solution().isInterleave({s1}, {s2}, {s3})"
    swift: "Solution().isInterleave({s1}, {s2}, {s3})"
    typescript: "isInterleave({s1}, {s2}, {s3})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(s1, s2, s3, {result})"
    checker: |
      import json
      class Checker:
          def check(self, s1, s2, s3, res):
              try:
                  res = json.loads(res) if isinstance(res, str) else res
              except Exception:
                  return False
              m, n = len(s1), len(s2)
              if m + n != len(s3):
                  return res is False
              dp = [False] * (n + 1)
              dp[0] = True
              for j in range(1, n + 1):
                  dp[j] = dp[j - 1] and s2[j - 1] == s3[j - 1]
              for i in range(1, m + 1):
                  dp[0] = dp[0] and s1[i - 1] == s3[i - 1]
                  for j in range(1, n + 1):
                      dp[j] = (dp[j] and s1[i - 1] == s3[i + j - 1]) or (dp[j - 1] and s2[j - 1] == s3[i + j - 1])
              return res == dp[n]
seed: 42
