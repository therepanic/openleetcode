"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": 'Checker().check("{s1}", "{s2}", "{s3}", {result})'
    "checker":
      "import json\nclass Checker:\n    def check(self, s1, s2, s3, res):\n\
      \        try:\n            res = json.loads(res) if isinstance(res, str) else\
      \ res\n        except Exception:\n            return False\n        if len(s1)\
      \ + len(s2) != len(s3):\n            return res == False\n        dp = [False]\
      \ * (len(s2) + 1)\n        dp[0] = True\n        for j in range(1, len(s2) +\
      \ 1):\n            dp[j] = dp[j - 1] and s2[j - 1] == s3[j - 1]\n        for\
      \ i in range(1, len(s1) + 1):\n            dp[0] = dp[0] and s1[i - 1] == s3[i\
      \ - 1]\n            for j in range(1, len(s2) + 1):\n                dp[j] =\
      \ (dp[j] and s1[i-1] == s3[i+j-1]) or (dp[j-1] and s2[j-1] == s3[i+j-1])\n \
      \       return res == dp[len(s2)]\n"
"seed": 42
