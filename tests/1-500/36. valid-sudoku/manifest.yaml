  call:
    cpp: Solution().isValidSudoku({board})
    rust: Solution::is_valid_sudoku({board})
    python3: Solution().isValidSudoku({board})
    python2: Solution().isValidSudoku({board})
    ruby: is_valid_sudoku({board})
    java: new Solution().isValidSudoku({board})
    csharp: new Solution().IsValidSudoku({board})
    kotlin: Solution().isValidSudoku({board})
    go: isValidSudoku({board})
    dart: Solution().isValidSudoku({board})
    swift: Solution().isValidSudoku({board})
    typescript: isValidSudoku({board})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().isValidSudoku(board, {result})
    checker:
      "class Checker:\n    def isValidSudoku(self, board, result):\n      \
      \  rows = [set() for _ in range(9)]\n        cols = [set() for _ in range(9)]\n\
      \        boxes = [set() for _ in range(9)]\n        expected = True\n      \
      \  for i in range(9):\n            if len(board[i]) != 9:\n                return\
      \ False\n            for j in range(9):\n                cell = board[i][j]\n\
      \                if cell == \".\":\n                    continue\n         \
      \       if not isinstance(cell, str) or len(cell) != 1 or cell < \"1\" or cell\
      \ > \"9\":\n                    return False\n                box = (i // 3)\
      \ * 3 + (j // 3)\n                if cell in rows[i] or cell in cols[j] or cell\
      \ in boxes[box]:\n                    expected = False\n                   \
      \ break\n                rows[i].add(cell)\n                cols[j].add(cell)\n\
      \                boxes[box].add(cell)\n            if not expected:\n      \
      \          break\n        return result == expected\n"
seed: 36
