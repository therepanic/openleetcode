"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().isValidSudoku([{board}], {result})"
    "checker": "class Checker:\n    def isValidSudoku(self, board, result) -> bool:\n        def check():\n            rows = [[False] * 9 for _ in range(9)]\n            cols = [[False] * 9 for _ in range(9)]\n            boxes = [[False] * 9 for _ in range(9)]\n            for i in range(9):\n                for j in range(9):\n                    if board[i][j] != '.':\n                        num = int(board[i][j]) - 1\n                        box = (i // 3) * 3 + (j // 3)\n                        if rows[i][num] or cols[j][num] or boxes[box][num]:\n                            return False\n                        rows[i][num] = cols[j][num] = boxes[box][num] = True\n            return True\n        return check() == result\n"
"seed": 42
