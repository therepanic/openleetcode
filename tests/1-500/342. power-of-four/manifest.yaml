entry:
  id: 342
  title: power-of-four
  params:
    n:
      type: int
  call:
    cpp: "Solution().isPowerOfFour({n})"
    rust: "Solution::is_power_of_four({n})"
    python3: "Solution().isPowerOfFour({n})"
    python2: "Solution().isPowerOfFour({n})"
    ruby: "is_power_of_four({n})"
    java: "new Solution().isPowerOfFour({n})"
    csharp: "new Solution().IsPowerOfFour({n})"
    kotlin: "Solution().isPowerOfFour({n})"
    go: "isPowerOfFour({n})"
    dart: "Solution().isPowerOfFour({n})"
    swift: "Solution().isPowerOfFour({n})"
    typescript: "isPowerOfFour({n})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().isPowerOfFour(n, {result})"
    checker: |
      class Checker:
          def isPowerOfFour(self, n, result):
              return result == (n > 0 and n.bit_count() == 1 and (n - 1) % 3 == 0)
seed: 342
