"entry":
  "id": 55
  "title": "jump-game"
  "call":
    "cpp": "Solution().canJump({nums})"
    "rust": "Solution::can_jump({nums})"
    "python3": "Solution().canJump({nums})"
    "python2": "Solution().canJump({nums})"
    "ruby": "can_jump({nums})"
    "java": "new Solution().canJump({nums})"
    "csharp": "new Solution().CanJump({nums})"
    "kotlin": "Solution().canJump({nums})"
    "go": "canJump({nums})"
    "dart": "Solution().canJump({nums})"
    "swift": "Solution().canJump({nums})"
    "typescript": "canJump({nums})"
  params:
    nums:
      type: array
      items:
        type: int
"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().canJump({nums}, {result})"
    "checker":
      "import json\nclass Checker:\n    def canJump(self, nums, result):\n        try:\n            result = json.loads(result)
      if isinstance(result, str) else result\n        except Exception:\n            return False\n        goal = 0\n    \
      \    for i, n in enumerate(nums):\n            if goal < i:\n                expected = False\n                return
      result == expected\n            goal = max(goal, n + i)\n            if goal >= len(nums) - 1:\n                expected
      = True\n                return result == expected\n        expected = False\n        return result == expected\n"
"seed": 42
