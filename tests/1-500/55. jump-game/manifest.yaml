entry:
  id: 55
  title: jump-game
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().canJump({nums})"
    rust: "Solution::can_jump({nums})"
    python3: "Solution().canJump({nums})"
    python2: "Solution().canJump({nums})"
    ruby: "can_jump({nums})"
    java: "new Solution().canJump({nums})"
    csharp: "new Solution().CanJump({nums})"
    kotlin: "Solution().canJump({nums})"
    go: "canJump({nums})"
    dart: "Solution().canJump({nums})"
    swift: "Solution().canJump({nums})"
    typescript: "canJump({nums})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 64
oracle:
  python3:
    call: "Checker().canJump(nums, {result})"
    checker: |
      class Checker:
          def canJump(self, nums, result):
              goal = 0
              for i, n in enumerate(nums):
                  if i > goal:
                      return result is False
                  if i + n > goal:
                      goal = i + n
                  if goal >= len(nums) - 1:
                      return result is True
              return result is False
seed: 55
