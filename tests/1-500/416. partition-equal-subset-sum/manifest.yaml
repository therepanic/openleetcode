entry:
  id: 416
  title: partition-equal-subset-sum
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().canPartition({nums})"
    rust: "Solution::can_partition({nums})"
    python3: "Solution().canPartition({nums})"
    python2: "Solution().canPartition({nums})"
    ruby: "can_partition({nums})"
    java: "new Solution().canPartition({nums})"
    csharp: "new Solution().CanPartition({nums})"
    kotlin: "Solution().canPartition({nums})"
    go: "canPartition({nums})"
    dart: "Solution().canPartition({nums})"
    swift: "Solution().canPartition({nums})"
    typescript: "canPartition({nums})"
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: "Checker().canPartition(nums, {result})"
    checker: |
      class Checker:
          def canPartition(self, nums, result):
              if not isinstance(result, bool):
                  return False
              total_sum = sum(nums)
              if total_sum % 2 != 0:
                  return result is False
              target = total_sum // 2
              dp = [False] * (target + 1)
              dp[0] = True
              for num in nums:
                  for curr_sum in range(target, num - 1, -1):
                      dp[curr_sum] = dp[curr_sum] or dp[curr_sum - num]
              return result == dp[target]
seed: 416
