entry:
  id: 83
  title: remove-duplicates-from-sorted-list
  call:
    cpp: listNodeToArray(Solution().deleteDuplicates({head}))
    rust: ListNode::list_node_to_array(Solution::delete_duplicates({head}))
    python3: list_node_to_array(Solution().deleteDuplicates({head}))
    python2: list_node_to_array(Solution().deleteDuplicates({head}))
    ruby: list_node_to_array(delete_duplicates({head}))
    java: ListNode.listNodeToArray(new Solution().deleteDuplicates({head}))
    csharp: ListNode.ListNodeToArray(new Solution().DeleteDuplicates({head}))
    kotlin: listNodeToArray(Solution().deleteDuplicates({head}))
    go: listNodeToArray(deleteDuplicates({head}))
    dart: list_node_to_array(Solution().deleteDuplicates({head}))
    swift: list_node_to_array(Solution().deleteDuplicates({head}))
    typescript: listNodeToArray(deleteDuplicates({head}))
  params:
    head:
      type: list_node
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(head, {result})
    checker:
      "import json\n\nclass Checker:\n    def check(self, head, result):\n        expected = sorted(list(set(head)))\n\
      \        try:\n            got = json.loads(result) if isinstance(result, str) else result\n        except Exception:\n\
      \            return False\n        return got == expected\n"
seed: 42
tests:
  - name: example 1
    in:
      head:
        - 1
        - 1
        - 2
    out:
      - 1
      - 2
  - name: example 2
    in:
      head:
        - 1
        - 1
        - 2
        - 3
        - 3
    out:
      - 1
      - 2
      - 3
  - name: empty list
    in:
      head: []
    out: []
  - name: single node
    in:
      head:
        - 1
    out:
      - 1
  - name: all duplicates
    in:
      head:
        - 1
        - 1
        - 1
        - 1
        - 1
    out:
      - 1
  - name: two distinct nodes
    in:
      head:
        - 1
        - 2
    out:
      - 1
      - 2
  - name: alternating duplicates
    in:
      head:
        - 1
        - 1
        - 2
        - 2
        - 3
        - 3
    out:
      - 1
      - 2
      - 3
  - name: no duplicates at start
    in:
      head:
        - 1
        - 2
        - 2
        - 3
    out:
      - 1
      - 2
      - 3
  - name: no duplicates at end
    in:
      head:
        - 1
        - 1
        - 2
        - 3
    out:
      - 1
      - 2
      - 3
  - name: negative values
    in:
      head:
        - -10
        - -10
        - -5
        - -5
        - 0
        - 1
    out:
      - -10
      - -5
      - 0
      - 1
  - name: mixed range
    in:
      head:
        - -100
        - -100
        - 0
        - 0
        - 100
        - 100
    out:
      - -100
      - 0
      - 100
  - name: long chain of same values
    in:
      head:
        - 5
        - 5
        - 5
        - 5
        - 5
        - 5
        - 5
        - 5
        - 5
    out:
      - 5
  - name: two sets of long repeats
    in:
      head:
        - 1
        - 1
        - 1
        - 2
        - 2
        - 2
    out:
      - 1
      - 2
  - name: many small distinct increments
    in:
      head:
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
        - 7
        - 8
        - 9
    out:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
      - 9
  - name: scattered duplicates
    in:
      head:
        - 1
        - 2
        - 2
        - 3
        - 4
        - 4
        - 5
    out:
      - 1
      - 2
      - 3
      - 4
      - 5
  - name: max range values
    in:
      head:
        - -100
        - -90
        - -90
        - 90
        - 100
        - 100
    out:
      - -100
      - -90
      - 90
      - 100
  - name: duplicates at edges
    in:
      head:
        - 1
        - 1
        - 2
        - 3
        - 4
        - 4
    out:
      - 1
      - 2
      - 3
      - 4
  - name: large input 1
    in:
      head:
        gen: array
        len:
          gen: int
          min: 250
          max: 300
        of:
          gen: int
          min: -100
          max: 100
        sorted: true
        distinct: false
  - name: large input 2
    in:
      head:
        gen: array
        len:
          gen: int
          min: 300
          max: 300
        of:
          gen: int
          min: -50
          max: 50
        sorted: true
        distinct: false
  - name: generated 1
