entry:
  id: 152
  title: maximum-product-subarray
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().maxProduct({nums})"
    rust: "Solution::max_product({nums})"
    python3: "Solution().maxProduct({nums})"
    python2: "Solution().maxProduct({nums})"
    ruby: "max_product({nums})"
    java: "new Solution().maxProduct({nums})"
    csharp: "new Solution().MaxProduct({nums})"
    kotlin: "Solution().maxProduct({nums})"
    go: "maxProduct({nums})"
    dart: "Solution().maxProduct({nums})"
    swift: "Solution().maxProduct({nums})"
    typescript: "maxProduct({nums})"

judge:
  type: exact

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().maxProduct(nums, {result})"
    checker: |
      class Checker:
          def maxProduct(self, nums, result):
              if not isinstance(nums, list) or not nums:
                  return False
              if any((not isinstance(x, int)) for x in nums):
                  return False
              if any(x < -10 or x > 10 for x in nums):
                  return False

              best = nums[0]
              cur_max = 1
              cur_min = 1
              for n in nums:
                  temp = cur_max * n
                  cur_max = max(temp, cur_min * n, n)
                  cur_min = min(temp, cur_min * n, n)
                  best = max(best, cur_max)
              return result == best

seed: 152

