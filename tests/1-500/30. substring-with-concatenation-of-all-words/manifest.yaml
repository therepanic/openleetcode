entry:
  id: 30
  title: substring-with-concatenation-of-all-words
  call:
    cpp: Solution().findSubstring({s}, {words})
    rust: Solution::find_substring({s}, {words})
    python3: Solution().findSubstring({s}, {words})
    python2: Solution().findSubstring({s}, {words})
    ruby: find_substring({s}, {words})
    java: new Solution().findSubstring({s}, {words})
    csharp: new Solution().FindSubstring({s}, {words})
    kotlin: Solution().findSubstring({s}, {words})
    go: findSubstring({s}, {words})
    dart: Solution().findSubstring({s}, {words})
    swift: Solution().findSubstring({s}, {words})
    typescript: findSubstring({s}, {words})
  params:
    s:
      type: string
    words:
      type: array
      items:
        type: string
judge:
  type: ignore_order
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(s, words, {result})
    checker:
      "from collections import Counter\nclass Checker:\n    def check(self, s, words, result):\n        if not s or
      not words: return result == []\n        c = len(words)\n        wl = len(words[0])\n        target = Counter(words)\n\
      \        actual = []\n        for i in range(len(s) - c * wl + 1):\n            sub = s[i:i + c * wl]\n            chunks
      = [sub[j:j + wl] for j in range(0, len(sub), wl)]\n            if Counter(chunks) == target:\n                actual.append(i)\n\
      \        return sorted(result) == sorted(actual)\n"
seed: 42
tests:
  - name: example 1
    in:
      s: barfoothefoobarman
      words:
        - foo
        - bar
    out:
      - 0
      - 9
  - name: example 2
    in:
      s: wordgoodgoodgoodbestword
      words:
        - word
        - good
        - best
        - word
    out: []
  - name: example 3
    in:
      s: barfoofoobarthefoobarman
      words:
        - bar
        - foo
        - the
    out:
      - 6
      - 9
      - 12
  - name: single word full match
    in:
      s: abc
      words:
        - abc
    out:
      - 0
  - name: single word multiple matches
    in:
      s: abcabc
      words:
        - abc
    out:
      - 0
      - 3
  - name: no match
    in:
      s: aaaaa
      words:
        - aa
        - aa
    out:
      - 0
      - 1
  - name: empty and short strings
    in:
      s: abcd
      words:
        - ab
        - cd
    out:
      - 0
  - name: interleaved
    in:
      s: abbcbb
      words:
        - ab
        - bc
    out:
      - 0
  - name: overlap test
    in:
      s: ababab
      words:
        - ab
        - ab
    out:
      - 0
      - 2
  - name: large number of words
    in:
      s: abcabcabc
      words:
        - abc
        - abc
    out:
      - 0
      - 3
  - name: prefix match
    in:
      s: abcd
      words:
        - a
        - b
        - c
    out:
      - 0
  - name: suffix match
    in:
      s: deabc
      words:
        - a
        - b
        - c
    out:
      - 2
  - name: varying word repetition
    in:
