entry:
  id: 30
  title: substring-with-concatenation-of-all-words
  params:
    s:
      type: string
    words:
      type: array
      items:
        type: string
  call:
    cpp: "Solution().findSubstring({s}, {words})"
    rust: "Solution::find_substring({s}, {words})"
    python3: "Solution().findSubstring({s}, {words})"
    python2: "Solution().findSubstring({s}, {words})"
    ruby: "find_substring({s}, {words})"
    java: "new Solution().findSubstring({s}, {words})"
    csharp: "new Solution().FindSubstring({s}, {words})"
    kotlin: "Solution().findSubstring({s}, {words})"
    go: "findSubstring({s}, {words})"
    dart: "Solution().findSubstring({s}, {words})"
    swift: "Solution().findSubstring({s}, {words})"
    typescript: "findSubstring({s}, {words})"

judge:
  type: ignore_order

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().check(s, words, {result})"
    checker: |
      from collections import Counter, defaultdict

      class Checker:
          def check(self, s, words, result):
              if not isinstance(result, list):
                  return False
              if any(not isinstance(x, int) for x in result):
                  return False
              if len(result) != len(set(result)):
                  return False

              if not s or not words:
                  return result == []

              word_len = len(words[0])
              if word_len == 0:
                  return False
              if any(len(w) != word_len for w in words):
                  return False

              word_count = len(words)
              target = Counter(words)
              expected = []

              for offset in range(word_len):
                  left = offset
                  right = offset
                  window = defaultdict(int)
                  used = 0

                  while right + word_len <= len(s):
                      word = s[right:right + word_len]
                      right += word_len

                      if word in target:
                          window[word] += 1
                          used += 1
                          while window[word] > target[word]:
                              left_word = s[left:left + word_len]
                              window[left_word] -= 1
                              left += word_len
                              used -= 1
                          if used == word_count:
                              expected.append(left)
                              left_word = s[left:left + word_len]
                              window[left_word] -= 1
                              left += word_len
                              used -= 1
                      else:
                          window.clear()
                          used = 0
                          left = right

              return sorted(result) == sorted(expected)

seed: 30

