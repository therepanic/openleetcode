entry:
  id: 345
  title: reverse-vowels-of-a-string
  params:
    s:
      type: string
  call:
    cpp: "Solution().reverseVowels({s})"
    rust: "Solution::reverse_vowels({s})"
    python3: "Solution().reverseVowels({s})"
    python2: "Solution().reverseVowels({s})"
    ruby: "reverse_vowels({s})"
    java: "new Solution().reverseVowels({s})"
    csharp: "new Solution().ReverseVowels({s})"
    kotlin: "Solution().reverseVowels({s})"
    go: "reverseVowels({s})"
    dart: "Solution().reverseVowels({s})"
    swift: "Solution().reverseVowels({s})"
    typescript: "reverseVowels({s})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().reverseVowels(s, {result})"
    checker: |

      class Checker:
          def reverseVowels(self, s, result):
              vowels = set("aeiouAEIOU")
              if not isinstance(result, str):
                  return False
              if len(result) != len(s):
                  return False
              s_vowels = [c for c in s if c in vowels]
              result_vowels = [c for c in result if c in vowels]
              if s_vowels[::-1] != result_vowels:
                  return False
              for a, b in zip(s, result):
                  if a not in vowels and a != b:
                      return False
              return True
seed: 345
