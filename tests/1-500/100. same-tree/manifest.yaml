entry:
  id: 100
  title: same-tree
  call:
    cpp: Solution().isSameTree({p}, {q})
    rust: Solution::is_same_tree({p}, {q})
    python3: Solution().isSameTree({p}, {q})
    python2: Solution().isSameTree({p}, {q})
    ruby: is_same_tree({p}, {q})
    java: new Solution().isSameTree({p}, {q})
    csharp: new Solution().IsSameTree({p}, {q})
    kotlin: Solution().isSameTree({p}, {q})
    go: isSameTree({p}, {q})
    dart: Solution().isSameTree({p}, {q})
    swift: Solution().isSameTree({p}, {q})
    typescript: isSameTree({p}, {q})
  params:
    p:
      type: tree_node
    q:
      type: tree_node
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().isSameTree({p}, {q}, {result})
    checker: "class Checker:\n    def isSameTree(self, p_arr, q_arr, result):\n        return result == (p_arr == q_arr)\n"
seed: 42
tests:
  - name: Example 1
    in:
      p:
        - 1
        - 2
        - 3
      q:
        - 1
        - 2
        - 3
    out: true
  - name: Example 2
    in:
      p:
        - 1
        - 2
      q:
        - 1
        -
        - 2
    out: false
  - name: Example 3
    in:
      p:
        - 1
        - 2
        - 1
      q:
        - 1
        - 1
        - 2
    out: false
  - name: Empty trees
    in:
      p: []
      q: []
    out: true
  - name: One empty one full
    in:
      p: []
      q:
        - 1
    out: false
  - name: Single node same
    in:
      p:
        - 1
      q:
        - 1
    out: true
  - name: Single node different
    in:
      p:
        - 1
      q:
        - 2
    out: false
  - name: Left skewed identical
    in:
      p:
        - 1
        - 2
        -
        - 3
      q:
        - 1
        - 2
        -
        - 3
    out: true
  - name: Left skewed different
    in:
      p:
        - 1
        - 2
        -
        - 3
      q:
        - 1
        - 2
        -
        - 4
    out: false
  - name: Right skewed identical
    in:
      p:
        - 1
        -
        - 2
        -
        - 3
      q:
        - 1
        -
        - 2
        -
        - 3
    out: true
  - name: Max values
    in:
      p:
        - 10000
        - 10000
      q:
        - 10000
        - 10000
    out: true
  - name: Min values
    in:
      p:
        - -10000
        - -10000
      q:
        - -10000
        - -10000
    out: true
  - name: Large tree identical
    in:
      p:
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
        - 7
      q:
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
        - 7
    out: true
  - name: Large tree different
    in:
      p:
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
        - 7
      q:
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
        - 8
    out: false
  - name: Structurally different
    in:
      p:
        - 1
        - 2
      q:
        - 1
        - 2
        - 3
    out: false
  - name: Negative values
    in:
      p:
        - -1
        - -2
        - -3
      q:
        - -1
        - -2
        - -3
    out: true
  - name: Mixed positive negative
    in:
      p:
        - 1
        - -2
        - 3
      q:
        - 1
        - -2
        - 3
    out: true
  - name: Null intermediate
    in:
      p:
        - 1
        -
        - 2
        - 3
      q:
        - 1
        -
        - 2
        - 3
    out: true
  - name: Different structure with same vals
    in:
      p:
        - 1
        - 2
      q:
        - 1
        - 1
        - 2
    out: false
  - name: Full depth 3 right
    in:
      p:
        - 1
        -
        - 2
        -
        - 3
        -
        - 4
      q:
        - 1
        -
        - 2
        -
        - 3
        -
        - 4
    out: true
  - name: Generative test 1
    in:
      p:
        - 1
        - 0
        - 1
        - 0
        - 1
      q:
        - 1
        - 0
        - 1
        - 0
        - 1
    out: true
  - name: Generative test 2
    in:
      p:
        - 10
        - 5
        - 15
      q:
        - 10
        - 5
        - 16
    out: false
  - name: Generative test 3
    in:
      p:
        - 0
        - 0
        - 0
      q:
        - 0
        - 0
        - 0
    out: true
  - name: Generative test 4
    in:
      p:
        - 5
        -
        - 6
        -
        - 7
      q:
        - 5
        -
        - 6
        -
        - 7
    out: true
  - name: Generative test 5
    in:
      p:
        - 100
        - 200
      q:
        - 100
        - 200
        - 300
    out: false
