entry:
  id: 100
  title: same-tree
  call:
    cpp:
      Solution().isSameTree(toTreeNode(lv(vector<optional<int>>{ {p} })), toTreeNode(lv(vector<optional<int>>{
      {q} })))
    rust: Solution::is_same_tree(TreeNode::to_tree_node(vec![{p}]), TreeNode::to_tree_node(vec![{q}]))
    python3: Solution().isSameTree(to_tree_node([{p}]), to_tree_node([{q}]))
    python2: Solution().isSameTree(to_tree_node([{p}]), to_tree_node([{q}]))
    ruby: is_same_tree(to_tree_node([{p}]), to_tree_node([{q}]))
    java:
      new Solution().isSameTree(TreeNode.toTreeNode(new Integer[]{ {p} }), TreeNode.toTreeNode(new
      Integer[]{ {q} }))
    csharp:
      new Solution().IsSameTree(TreeNode.ToTreeNode(new int?[]{ {p} }), TreeNode.ToTreeNode(new
      int?[]{ {q} }))
    kotlin: Solution().isSameTree(toTreeNode(arrayOf({p})), toTreeNode(arrayOf({q})))
    go:
      isSameTree(toTreeNode([]interface{}{ {p} }), toTreeNode([]interface{}{ {q}
      }))
    dart: Solution().isSameTree(to_tree_node([{p}]), to_tree_node([{q}]))
    swift: Solution().isSameTree(to_tree_node([{p}]), to_tree_node([{q}]))
    typescript: isSameTree(toTreeNode([{p}]), toTreeNode([{q}]))
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().isSameTree([{p}], [{q}], {result})
    checker:
      "class Checker:\n    def isSameTree(self, p_arr, q_arr, result):\n  \
      \      return result == (p_arr == q_arr)\n"
seed: 42
tests:
  - name: Example 1
    in:
      p:
        - 1
        - 2
        - 3
      q:
        - 1
        - 2
        - 3
    out: true
  - name: Example 2
    in:
      p:
        - 1
        - 2
      q:
        - 1
        - null
        - 2
    out: false
  - name: Example 3
    in:
      p:
        - 1
        - 2
        - 1
      q:
        - 1
        - 1
        - 2
    out: false
  - name: Empty trees
    in:
      p: []
      q: []
    out: true
  - name: One empty one full
    in:
      p: []
      q:
        - 1
    out: false
  - name: Single node same
    in:
      p:
        - 1
      q:
        - 1
    out: true
  - name: Single node different
    in:
      p:
        - 1
      q:
        - 2
    out: false
  - name: Left skewed identical
    in:
      p:
        - 1
        - 2
        - null
        - 3
      q:
        - 1
        - 2
        - null
        - 3
    out: true
  - name: Left skewed different
    in:
      p:
        - 1
        - 2
        - null
        - 3
      q:
        - 1
        - 2
        - null
        - 4
    out: false
  - name: Right skewed identical
    in:
      p:
        - 1
        - null
        - 2
        - null
        - 3
      q:
        - 1
        - null
        - 2
        - null
        - 3
    out: true
  - name: Max values
    in:
      p:
        - 10000
        - 10000
      q:
        - 10000
        - 10000
    out: true
  - name: Min values
    in:
      p:
        - -10000
        - -10000
      q:
        - -10000
        - -10000
    out: true
  - name: Large tree identical
    in:
      p:
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
        - 7
      q:
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
        - 7
    out: true
  - name: Large tree different
    in:
      p:
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
        - 7
      q:
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
        - 8
    out: false
  - name: Structurally different
    in:
      p:
        - 1
        - 2
      q:
        - 1
        - 2
        - 3
    out: false
  - name: Negative values
    in:
      p:
        - -1
        - -2
        - -3
      q:
        - -1
        - -2
        - -3
    out: true
  - name: Mixed positive negative
    in:
      p:
        - 1
        - -2
        - 3
      q:
        - 1
        - -2
        - 3
    out: true
  - name: Null intermediate
    in:
      p:
        - 1
        - null
        - 2
        - 3
      q:
        - 1
        - null
        - 2
        - 3
    out: true
  - name: Different structure with same vals
    in:
      p:
        - 1
        - 2
      q:
        - 1
        - 1
        - 2
    out: false
  - name: Full depth 3 right
    in:
      p:
        - 1
        - null
        - 2
        - null
        - 3
        - null
        - 4
      q:
        - 1
        - null
        - 2
        - null
        - 3
        - null
        - 4
    out: true
  - name: Generative test 1
    in:
      p:
        - 1
        - 0
        - 1
        - 0
        - 1
      q:
        - 1
        - 0
        - 1
        - 0
        - 1
    out: true
  - name: Generative test 2
    in:
      p:
        - 10
        - 5
        - 15
      q:
        - 10
        - 5
        - 16
    out: false
  - name: Generative test 3
    in:
      p:
        - 0
        - 0
        - 0
      q:
        - 0
        - 0
        - 0
    out: true
  - name: Generative test 4
    in:
      p:
        - 5
        - null
        - 6
        - null
        - 7
      q:
        - 5
        - null
        - 6
        - null
        - 7
    out: true
  - name: Generative test 5
    in:
      p:
        - 100
        - 200
      q:
        - 100
        - 200
        - 300
    out: false
