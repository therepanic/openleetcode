entry:
  id: 100
  title: "same-tree"
  params:
    p:
      type: tree_node
    q:
      type: tree_node
  call:
    cpp: "Solution().isSameTree({p}, {q})"
    rust: "Solution::is_same_tree({p}, {q})"
    python3: "Solution().isSameTree({p}, {q})"
    python2: "Solution().isSameTree({p}, {q})"
    ruby: "is_same_tree({p}, {q})"
    java: "new Solution().isSameTree({p}, {q})"
    csharp: "new Solution().IsSameTree({p}, {q})"
    kotlin: "Solution().isSameTree({p}, {q})"
    go: "isSameTree({p}, {q})"
    dart: "Solution().isSameTree({p}, {q})"
    swift: "Solution().isSameTree({p}, {q})"
    typescript: "isSameTree({p}, {q})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check({result})"
    checker: |
      class Checker:
          def check(self, result):
              return isinstance(result, bool)
seed: 42
tests:
  - name: example_1
    in:
      p: [1, 2, 3]
      q: [1, 2, 3]
    out: true
  - name: example_2
    in:
      p: [1, 2]
      q: [1, null, 2]
    out: false
  - name: example_3
    in:
      p: [1, 2, 1]
      q: [1, 1, 2]
    out: false
  - name: empty
    in:
      p: []
      q: []
    out: true
  - name: one_empty
    in:
      p: []
      q: [1]
    out: false
  - name: single_same
    in:
      p: [1]
      q: [1]
    out: true
  - name: single_diff
    in:
      p: [1]
      q: [2]
    out: false
  - name: left_skew_same
    in:
      p: [1, 2, null, 3]
      q: [1, 2, null, 3]
    out: true
  - name: left_skew_diff
    in:
      p: [1, 2, null, 3]
      q: [1, 2, null, 4]
    out: false
  - name: right_skew_same
    in:
      p: [1, null, 2, null, 3]
      q: [1, null, 2, null, 3]
    out: true
  - name: right_skew_diff
    in:
      p: [1, null, 2]
      q: [1, null, 3]
    out: false
  - name: max_values
    in:
      p: [10000, 10000]
      q: [10000, 10000]
    out: true
  - name: min_values
    in:
      p: [-10000, -10000]
      q: [-10000, -10000]
    out: true
  - name: structure_diff
    in:
      p: [1, 2]
      q: [1, 2, 3]
    out: false
  - name: negative_same
    in:
      p: [-1, -2, -3]
      q: [-1, -2, -3]
    out: true
  - name: mixed_same
    in:
      p: [1, -2, 3]
      q: [1, -2, 3]
    out: true
  - name: null_intermediate_same
    in:
      p: [1, null, 2, 3]
      q: [1, null, 2, 3]
    out: true
  - name: different_structure_same_vals
    in:
      p: [1, 2]
      q: [1, 1, 2]
    out: false
  - name: full_depth_right_same
    in:
      p: [1, null, 2, null, 3, null, 4]
      q: [1, null, 2, null, 3, null, 4]
    out: true
  - name: deep_right_diff
    in:
      p: [1, null, 2, null, 3, null, 4]
      q: [1, null, 2, null, 3, null, 5]
    out: false
  - name: balanced_same
    in:
      p: [4, 2, 6, 1, 3, 5, 7]
      q: [4, 2, 6, 1, 3, 5, 7]
    out: true
  - name: balanced_root_diff
    in:
      p: [4, 2, 6, 1, 3, 5, 7]
      q: [5, 2, 6, 1, 3, 5, 7]
    out: false
  - name: balanced_leaf_diff
    in:
      p: [4, 2, 6, 1, 3, 5, 7]
      q: [4, 2, 6, 1, 3, 5, 8]
    out: false
  - name: left_chain_same
    in:
      p: [1, 2, null, 3, null, 4]
      q: [1, 2, null, 3, null, 4]
    out: true
  - name: left_chain_diff
    in:
      p: [1, 2, null, 3, null, 4]
      q: [1, 2, null, 3, null, 5]
    out: false
  - name: right_chain_same
    in:
      p: [1, null, 2, null, 3, null, 4]
      q: [1, null, 2, null, 3, null, 4]
    out: true
  - name: right_chain_extra_null
    in:
      p: [1, null, 2]
      q: [1, null, 2, null, 3]
    out: false
  - name: root_left_only_same
    in:
      p: [10, 5]
      q: [10, 5]
    out: true
  - name: root_right_only_same
    in:
      p: [10, null, 5]
      q: [10, null, 5]
    out: true
  - name: root_left_only_diff
    in:
      p: [10, 5]
      q: [10, 6]
    out: false
  - name: root_right_only_diff
    in:
      p: [10, null, 5]
      q: [10, null, 6]
    out: false
  - name: asymmetric_shape_same_vals
    in:
      p: [1, 2, 3]
      q: [1, 2, 3, null, 4]
    out: false
  - name: mirrored_shape_same_vals
    in:
      p: [1, 2, 3, 4]
      q: [1, 2, 3, null, null, null, 4]
    out: false
  - name: deep_equal_with_nulls
    in:
      p: [8, 4, 12, 2, 6, 10, 14, 1, null, 5, 7, 9, 11, 13, 15]
      q: [8, 4, 12, 2, 6, 10, 14, 1, null, 5, 7, 9, 11, 13, 15]
    out: true
  - name: deep_leaf_mismatch
    in:
      p: [8, 4, 12, 2, 6, 10, 14, 1, null, 5, 7, 9, 11, 13, 15]
      q: [8, 4, 12, 2, 6, 10, 14, 1, null, 5, 7, 9, 11, 13, 16]
    out: false
  - name: wide_sparse_same
    in:
      p: [1, 2, 3, null, 4, null, 5, null, null, 6]
      q: [1, 2, 3, null, 4, null, 5, null, null, 6]
    out: true
  - name: wide_sparse_diff
    in:
      p: [1, 2, 3, null, 4, null, 5, null, null, 6]
      q: [1, 2, 3, null, 4, null, 5, null, null, 7]
    out: false
  - name: two_node_swap_like
    in:
      p: [1, 2]
      q: [1, null, 2]
    out: false
  - name: same_values_different_depth
    in:
      p: [1, 2, null, 3]
      q: [1, null, 2, null, 3]
    out: false
  - name: almost_same_last_branch
    in:
      p: [2, 1, 3, null, null, 4, 5]
      q: [2, 1, 3, null, null, 4, 6]
    out: false
  - name: exact_large_symmetric
    in:
      p: [0, -1, 1, -2, null, null, 2]
      q: [0, -1, 1, -2, null, null, 2]
    out: true
