entry:
  id: 28
  title: find-the-index-of-the-first-occurrence-in-a-string
  call:
    cpp: Solution().strStr("{haystack}", "{needle}")
    rust: Solution::str_str("{haystack}".to_string(), "{needle}".to_string())
    python3: Solution().strStr("{haystack}", "{needle}")
    python2: Solution().strStr("{haystack}", "{needle}")
    ruby: str_str("{haystack}", "{needle}")
    java: new Solution().strStr("{haystack}", "{needle}")
    csharp: new Solution().StrStr("{haystack}", "{needle}")
    kotlin: Solution().strStr("{haystack}", "{needle}")
    go: strStr("{haystack}", "{needle}")
    dart: Solution().strStr("{haystack}", "{needle}")
    swift: Solution().strStr("{haystack}", "{needle}")
    typescript: strStr("{haystack}", "{needle}")
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().strStr("{haystack}", "{needle}", {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, result):\n        if\
      \ isinstance(result, str):\n            try:\n                result = json.loads(result)\n\
      \            except Exception:\n                pass\n            if isinstance(result,\
      \ str):\n                low = result.strip().lower()\n                if low\
      \ == 'true':\n                    return True\n                if low == 'false':\n\
      \                    return False\n                if low.lstrip('-').isdigit():\n\
      \                    return int(low)\n        return result\n\n    def strStr(self,\
      \ h, n, res):\n        res = self._norm(res)\n        return h.find(n) == res\n"
seed: 42
tests:
  - name: example 1
    in:
      haystack: sadbutsad
      needle: sad
    out: 0
  - name: example 2
    in:
      haystack: leetcode
      needle: leeto
    out: -1
  - name: single char match
    in:
      haystack: a
      needle: a
    out: 0
  - name: single char mismatch
    in:
      haystack: a
      needle: b
    out: -1
  - name: needle same as haystack
    in:
      haystack: abc
      needle: abc
    out: 0
  - name: needle longer than haystack
    in:
      haystack: abc
      needle: abcd
    out: -1
  - name: find at end
    in:
      haystack: mississippi
      needle: pi
    out: 9
  - name: find in middle
    in:
      haystack: hello
      needle: ll
    out: 2
  - name: overlapping
    in:
      haystack: aaaaa
      needle: aa
    out: 0
  - name: repeated characters
    in:
      haystack: abacaba
      needle: aba
    out: 0
  - name: no occurrence
    in:
      haystack: abcdef
      needle: g
    out: -1
  - name: needle at index 1
    in:
      haystack: banana
      needle: ana
    out: 1
  - name: large haystack, found at end
    in:
      haystack: a
      needle: a
    seed: 101
  - name: large haystack, not found
    in:
      haystack: abcdefghijklmnopqrstuvwxyz
      needle: abc
    out: 0
  - name: needle at start
    in:
      haystack: xyz
      needle: x
    out: 0
  - name: very long haystack small needle
    in:
      haystack: a
      needle: a
    seed: 202
  - name: random string generated 1
    in:
      haystack:
        gen: str
        len:
          gen: int
          min: 10
          max: 20
        alphabet: abc
      needle: bba
  - name: random string generated 2
    in:
      haystack:
        gen: str
        len:
          gen: int
          min: 10
          max: 20
        alphabet: xy
      needle: xy
  - name: random string generated 3
    in:
