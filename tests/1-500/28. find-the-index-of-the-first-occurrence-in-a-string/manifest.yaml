entry:
  id: 28
  title: find-the-index-of-the-first-occurrence-in-a-string
  params:
    haystack:
      type: string
    needle:
      type: string
  call:
    cpp: "Solution().strStr({haystack}, {needle})"
    rust: "Solution::str_str({haystack}, {needle})"
    python3: "Solution().strStr({haystack}, {needle})"
    python2: "Solution().strStr({haystack}, {needle})"
    ruby: "str_str({haystack}, {needle})"
    java: "new Solution().strStr({haystack}, {needle})"
    csharp: "new Solution().StrStr({haystack}, {needle})"
    kotlin: "Solution().strStr({haystack}, {needle})"
    go: "strStr({haystack}, {needle})"
    dart: "Solution().strStr({haystack}, {needle})"
    swift: "Solution().strStr({haystack}, {needle})"
    typescript: "strStr({haystack}, {needle})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 128
oracle:
  python3:
    call: "Checker().strStr(haystack, needle, {result})"
    checker: |
      class Checker:
          def strStr(self, haystack, needle, result):
              if not isinstance(haystack, str):
                  return False
              if not isinstance(needle, str):
                  return False
              if not isinstance(result, int):
                  return False
              if any(not ('a' <= ch <= 'z') for ch in haystack):
                  return False
              if any(not ('a' <= ch <= 'z') for ch in needle):
                  return False
              if not (1 <= len(haystack) <= 10000):
                  return False
              if not (1 <= len(needle) <= 10000):
                  return False
              expected = haystack.find(needle)
              return result == expected
seed: 28
tests:
  - name: example-1
    in:
      haystack: sadbutsad
      needle: sad
    out: 0
  - name: example-2
    in:
      haystack: leetcode
      needle: leeto
    out: -1
  - name: needle-equals-haystack
    in:
      haystack: aaaaa
      needle: aaaaa
    out: 0
  - name: single-char-first-position
    in:
      haystack: abcde
      needle: a
    out: 0
  - name: single-char-middle-position
    in:
      haystack: abcde
      needle: c
    out: 2
  - name: single-char-last-position
    in:
      haystack: abcde
      needle: e
    out: 4
  - name: not-present-simple
    in:
      haystack: abcde
      needle: f
    out: -1
  - name: repeated-prefix
    in:
      haystack: aaaab
      needle: aaab
    out: 1
  - name: repeated-overlap
    in:
      haystack: mississippi
      needle: issip
    out: 4
  - name: embedded-at-end
    in:
      haystack: zzzzzabc
      needle: abc
    out: 5
