        ]
    out: ["Alaska", "Dad", "Type", "Row"]
  - name: "mixed_many_valids"
    in:
      words: ["MOM", "Dad", "sSs", "qwerty", "ASDF", "zxcvbn", "UiOp", "JKL"]
    out: ["Dad", "sSs", "qwerty", "ASDF", "zxcvbn", "UiOp", "JKL"]
  - name: "edge_letters"
    in:
      words: ["q", "a", "z", "p", "l", "m"]
    out: ["q", "a", "z", "p", "l", "m"]
  - name: "edge_mixed_boundary"
    in:
      words: ["qp", "al", "zm", "qa", "az", "pm", "lz"]
    out: ["qp", "al", "zm"]
