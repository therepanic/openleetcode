entry:
  id: 18
  title: 4sum
  call:
    cpp: Solution().fourSum({nums}, {target})
    rust: Solution::four_sum({nums}, {target})
    python3: Solution().fourSum({nums}, {target})
    python2: Solution().fourSum({nums}, {target})
    ruby: four_sum({nums}, {target})
    java: new Solution().fourSum({nums}, {target})
    csharp: new Solution().FourSum({nums}, {target})
    kotlin: Solution().fourSum({nums}, {target})
    go: fourSum({nums}, {target})
    dart: Solution().fourSum({nums}, {target})
    swift: Solution().fourSum({nums}, {target})
    typescript: fourSum({nums}, {target})
  params:
    nums:
      type: array
      items:
        type: int
    target:
      type: int
judge:
  type: ignore_order
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check({nums}, {target}, {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, result):\n        if isinstance(result, str):\n           \
      \ try:\n                result = json.loads(result)\n            except Exception:\n                pass\n        return
      result\n\n    def check(self, nums, target, result):\n        result = self._norm(result)\n        def get_sorted(quad):\n\
      \            return sorted(quad)\n        seen = set()\n        for quad in result:\n            if len(quad) != 4:\n\
      \                return False\n            if sum(quad) != target:\n                return False\n            seen.add(tuple(get_sorted(quad)))\n\
      \        nums.sort()\n        expected = []\n        n = len(nums)\n        for i in range(n - 3):\n            if i
      > 0 and nums[i] == nums[i - 1]:\n                continue\n            for j in range(i + 1, n - 2):\n             \
      \   if j > i + 1 and nums[j] == nums[j - 1]:\n                    continue\n                l, r = j + 1, n - 1\n  \
      \              while l < r:\n                    s = nums[i] + nums[j] + nums[l] + nums[r]\n                    if s
      == target:\n                        expected.append(tuple(sorted([nums[i], nums[j], nums[l], nums[r]])))\n         \
      \               l += 1\n                        r -= 1\n                        while l < r and nums[l] == nums[l -
      1]:\n                            l += 1\n                        while l < r and nums[r] == nums[r + 1]:\n         \
      \                   r -= 1\n                    elif s < target:\n                        l += 1\n                 \
      \   else:\n                        r -= 1\n        return len(seen) == len(expected) and all(q in seen for q in expected)\n"
seed: 42
