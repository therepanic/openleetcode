  memory_mb: 512
oracle:
  python3:
    call: "Checker().fourSum(nums, target, {result})"
    checker: |
      class Checker:
          def fourSum(self, nums, target, result):
              if not isinstance(result, list):
                  return False

              normalized = []
              seen = set()
              for quad in result:
                  if not isinstance(quad, list) or len(quad) != 4:
                      return False
                  if any(not isinstance(x, int) for x in quad):
                      return False
                  if quad != sorted(quad):
                      return False
                  t = tuple(quad)
                  if t in seen:
                      return False
                  seen.add(t)
                  if sum(quad) != target:
                      return False
                  normalized.append(t)

              nums = sorted(nums)
              expected = set()
              n = len(nums)
              for i in range(n - 3):
                  if i > 0 and nums[i] == nums[i - 1]:
                      continue
                  for j in range(i + 1, n - 2):
                      if j > i + 1 and nums[j] == nums[j - 1]:
                          continue
                      left = j + 1
                      right = n - 1
                      while left < right:
                          s = nums[i] + nums[j] + nums[left] + nums[right]
                          if s == target:
                              expected.add((nums[i], nums[j], nums[left], nums[right]))
                              left += 1
                              right -= 1
                              while left < right and nums[left] == nums[left - 1]:
                                  left += 1
                              while left < right and nums[right] == nums[right + 1]:
                                  right -= 1
                          elif s < target:
                              left += 1
                          else:
                              right -= 1

              return set(normalized) == expected
