entry:
  id: 72
  title: edit-distance
  call:
    cpp: Solution().minDistance({word1}, {word2})
    rust: Solution::min_distance({word1}, {word2})
    python3: Solution().minDistance({word1}, {word2})
    python2: Solution().minDistance({word1}, {word2})
    ruby: min_distance({word1}, {word2})
    java: new Solution().minDistance({word1}, {word2})
    csharp: new Solution().MinDistance({word1}, {word2})
    kotlin: Solution().minDistance({word1}, {word2})
    go: minDistance({word1}, {word2})
    dart: Solution().minDistance({word1}, {word2})
    swift: Solution().minDistance({word1}, {word2})
    typescript: minDistance({word1}, {word2})
  params:
    word1:
      type: string
    word2:
      type: string
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: minDistance(word1, word2, {result})
    checker: |
      import json

      def minDistance(word1, word2, result):
          try:
              result = json.loads(result) if isinstance(result, str) else result
          except Exception:
              return False
          m, n = len(word1), len(word2)
          dp = [[0] * (n + 1) for _ in range(m + 1)]
          for i in range(m + 1):
              dp[i][0] = i
          for j in range(n + 1):
              dp[0][j] = j
          for i in range(1, m + 1):
              for j in range(1, n + 1):
                  if word1[i - 1] == word2[j - 1]:
                      dp[i][j] = dp[i - 1][j - 1]
                  else:
                      dp[i][j] = 1 + min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1])
          return result == dp[m][n]
seed: 42
