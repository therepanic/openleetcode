entry:
  id: 72
  title: edit-distance
  params:
    word1:
      type: string
    word2:
      type: string
  call:
    cpp: "Solution().minDistance({word1}, {word2})"
    rust: "Solution::min_distance({word1}, {word2})"
    python3: "Solution().minDistance({word1}, {word2})"
    python2: "Solution().minDistance({word1}, {word2})"
    ruby: "min_distance({word1}, {word2})"
    java: "new Solution().minDistance({word1}, {word2})"
    csharp: "new Solution().MinDistance({word1}, {word2})"
    kotlin: "Solution().minDistance({word1}, {word2})"
    go: "minDistance({word1}, {word2})"
    dart: "Solution().minDistance({word1}, {word2})"
    swift: "Solution().minDistance({word1}, {word2})"
    typescript: "minDistance({word1}, {word2})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().minDistance(word1, word2, {result})"
    checker: |
      class Checker:
          def minDistance(self, word1, word2, result):
              return isinstance(result, int) and result >= 0
seed: 72
tests:
  - name: example_1
    in:
      word1: horse
      word2: ros
    out: 3
  - name: example_2
    in:
      word1: intention
      word2: execution
    out: 5
  - name: both_empty
    in:
      word1: ""
      word2: ""
    out: 0
  - name: left_empty
    in:
      word1: ""
      word2: abc
    out: 3
  - name: right_empty
    in:
      word1: kitten
      word2: ""
    out: 6
  - name: identical
    in:
      word1: algorithm
      word2: algorithm
    out: 0
  - name: single_replace
    in:
      word1: a
      word2: b
    out: 1
  - name: single_insert
    in:
      word1: a
      word2: ab
    out: 1
  - name: single_delete
    in:
      word1: ab
      word2: a
    out: 1
  - name: all_replace
    in:
      word1: abc
      word2: xyz
    out: 3
  - name: shared_prefix
    in:
      word1: prefix
      word2: preform
    out: 3
  - name: shared_suffix
    in:
      word1: swimming
      word2: thing
    out: 5
  - name: classic_case_1
    in:
      word1: saturday
      word2: sunday
    out: 3
  - name: classic_case_2
    in:
      word1: distance
      word2: editing
    out: 5
  - name: repeated_chars
    in:
      word1: aaaaa
      word2: aaa
    out: 2
  - name: repeated_chars_2
    in:
      word1: aaaab
      word2: baaaa
    out: 2
  - name: insertion_only
    in:
      word1: abc
      word2: abcdef
    out: 3
  - name: deletion_only
    in:
      word1: abcdef
      word2: abc
    out: 3
  - name: alternating
    in:
      word1: ababab
      word2: bababa
    out: 2
  - name: transposed_like
    in:
      word1: abcde
      word2: abced
    out: 2
  - name: disjoint_short
    in:
      word1: abc
      word2: defg
    out: 4
  - name: one_char_to_longer
    in:
      word1: z
      word2: zzzzz
    out: 4
  - name: long_shared_prefix
    in:
      word1: aaaaaaaaaab
      word2: aaaaaaaaaac
    out: 1
  - name: long_shared_suffix
    in:
      word1: baaaaaaaaaa
      word2: caaaaaaaaaa
    out: 1
  - name: near_max_insertions
    in:
      word1: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      word2: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
    out: 100
  - name: near_max_prefix_diff
    in:
      word1: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      word2: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaabbbb
    out: 4
  - name: near_max_suffix_diff
    in:
      word1: bbbbccccddddaaaaeeeeffffgggghhhhiiiijjjjkkkkllllmmmmnnnnooooppppqqqqrrrrssss
      word2: bbbbccccddddzzzzeeeeffffgggghhhhiiiijjjjkkkkllllmmmmnnnnooooppppqqqqrrrrssss
    out: 4
  - name: max_length_same
    in:
      word1: abcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcde
      word2: abcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcde
    out: 0
  - name: max_length_diff_1
    in:
      word1: abcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcde
      word2: bcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdf
    out: 2
  - name: max_length_diff_2
    in:
      word1: qwertyuiopasdfghjklzxcvbnmqwertyuiopasdfghjklzxcvbnmqwertyuiopasdfghjklzxcvbnmqwertyuiopasdfghjklzxcvbnm
      word2: qwertyuiopasdfghjklzxcvbnmqwertyuiopasdfghjklzxcvbnmqwertyuiopasdfghjklzxcvbnmqwertyuiopasdfghjklzxcvbna
    out: 1
  - name: case_small
    in:
      word1: abc
      word2: axc
    out: 1
  - name: case_mixed
    in:
      word1: sunday
      word2: saturday
    out: 3
  - name: case_long_insert_delete
    in:
      word1: abcdefghij
      word2: abxyzcdefghij
    out: 3
  - name: case_long_replace
    in:
      word1: kittencat
      word2: sittingat
    out: 3
  - name: case_short_cross
    in:
      word1: abcde
      word2: fghij
    out: 5
