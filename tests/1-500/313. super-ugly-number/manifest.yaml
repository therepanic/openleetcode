  title: super-ugly-number
  params:
    n:
      type: int
    primes:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().nthSuperUglyNumber({n}, {primes})"
    rust: "Solution::nth_super_ugly_number({n}, {primes})"
    python3: "Solution().nthSuperUglyNumber({n}, {primes})"
    python2: "Solution().nthSuperUglyNumber({n}, {primes})"
    ruby: "nth_super_ugly_number({n}, {primes})"
    java: "new Solution().nthSuperUglyNumber({n}, {primes})"
    csharp: "new Solution().NthSuperUglyNumber({n}, {primes})"
    kotlin: "Solution().nthSuperUglyNumber({n}, {primes})"
    go: "nthSuperUglyNumber({n}, {primes})"
    dart: "Solution().nthSuperUglyNumber({n}, {primes})"
    swift: "Solution().nthSuperUglyNumber({n}, {primes})"
    typescript: "nthSuperUglyNumber({n}, {primes})"
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 300
oracle:
  python3:
    call: "Checker().nthSuperUglyNumber(n, primes, {result})"
    checker: |
      class Checker:
          def nthSuperUglyNumber(self, n, primes, result):
              if not isinstance(n, int) or not isinstance(primes, list) or not isinstance(result, int):
                  return False
              if n < 1 or len(primes) < 1:
                  return False
              if primes != sorted(primes) or len(set(primes)) != len(primes):
                  return False
              if any((not isinstance(p, int) or p < 2) for p in primes):
                  return False
              ugly = [1] * n
              idx = [0] * len(primes)
              val = primes[:]
              for i in range(1, n):
                  m = min(val)
                  ugly[i] = m
                  for j, p in enumerate(primes):
                      if val[j] == m:
                          idx[j] += 1
                          val[j] = ugly[idx[j]] * p
              return ugly[-1] == result
seed: 313
