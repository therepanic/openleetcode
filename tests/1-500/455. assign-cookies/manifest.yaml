entry:
  id: 455
  title: assign-cookies
  params:
    g:
      type: array
      items:
        type: int
    s:
      type: array
      items:
        type: int
  call:
    cpp: Solution().findContentChildren({g}, {s})
    rust: Solution::find_content_children({g}, {s})
    python3: Solution().findContentChildren({g}, {s})
    python2: Solution().findContentChildren({g}, {s})
    ruby: find_content_children({g}, {s})
    java: new Solution().findContentChildren({g}, {s})
    csharp: new Solution().FindContentChildren({g}, {s})
    kotlin: Solution().findContentChildren({g}, {s})
    go: findContentChildren({g}, {s})
    dart: Solution().findContentChildren({g}, {s})
    swift: Solution().findContentChildren({g}, {s})
    typescript: findContentChildren({g}, {s})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().findContentChildren(g, s, {result})
    checker: |
      class Checker:
          def findContentChildren(self, g, s, result):
              if not isinstance(result, int):
                  return False
              if result < 0:
                  return False
              g2 = sorted(list(g))
              s2 = sorted(list(s))
              i = 0
              j = 0
              expected = 0
              while i < len(g2) and j < len(s2):
                  if s2[j] >= g2[i]:
                      expected += 1
                      i += 1
                  j += 1
              return result == expected
seed: 455
