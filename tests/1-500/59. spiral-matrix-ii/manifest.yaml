"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().check({n}, {result})"
    "checker":
      "import json\nclass Checker:\n    def check(self, n, matrix):\n   \
      \     try:\n            matrix = json.loads(matrix) if isinstance(matrix, str)\
      \ else matrix\n        except Exception:\n            return False\n       \
      \ if isinstance(matrix, list) and len(matrix) == 1 and isinstance(matrix[0],\
      \ list):\n            matrix = matrix[0]\n        if len(matrix) != n or any(len(row)\
      \ != n for row in matrix):\n            return False\n        flat = [val for\
      \ row in matrix for val in row]\n        if sorted(flat) != list(range(1, n\
      \ * n + 1)):\n            return False\n        x, y, dx, dy = 0, 0, 1, 0\n\
      \        res = [[0 for _ in range(n)] for _ in range(n)]\n        for i in range(n\
      \ * n):\n            res[y][x] = i + 1\n            if not 0 <= x + dx < n or\
      \ not 0 <= y + dy < n or res[y+dy][x+dx] != 0:\n                dx, dy = -dy,\
      \ dx\n            x += dx\n            y += dy\n        return matrix == res\n"
"seed": 42
