entry:
  id: 227
  title: "basic-calculator-ii"
  params:
    s:
      type: string
  call:
    cpp: "Solution().calculate({s})"
    rust: "Solution::calculate({s})"
    python3: "Solution().calculate({s})"
    python2: "Solution().calculate({s})"
    ruby: "calculate({s})"
    java: "new Solution().calculate({s})"
    csharp: "new Solution().Calculate({s})"
    kotlin: "Solution().calculate({s})"
    go: "calculate({s})"
    dart: "Solution().calculate({s})"
    swift: "Solution().calculate({s})"
    typescript: "calculate({s})"
judge:
  type: "exact"
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: "Checker().calculate(s, {result})"
    checker: |
      class Checker:
          def calculate(self, s, result):
              return isinstance(result, int)
seed: 227
tests:
  - name: "ex1"
    in:
      s: "3+2*2"
    out: 7
  - name: "ex2"
    in:
      s: " 3/2 "
    out: 1
  - name: "ex3"
    in:
      s: " 3+5 / 2 "
    out: 5
  - name: "simple_add_mul"
    in:
      s: "2+3*4"
    out: 14
  - name: "simple_mul_add"
    in:
      s: "2*3+4"
    out: 10
  - name: "division_floor_toward_zero"
    in:
      s: "14/3"
    out: 4
  - name: "division_chain"
    in:
      s: "14/3*3"
    out: 12
  - name: "leading_trailing_spaces"
    in:
      s: "  14  /  3  "
    out: 4
  - name: "subtract_then_divide"
    in:
      s: "14-3/2"
    out: 13
  - name: "zero_literal"
    in:
      s: "0"
    out: 0
  - name: "single_number"
    in:
      s: "42"
    out: 42
  - name: "left_to_right_add_sub"
    in:
      s: "1-1+1"
    out: 1
  - name: "add_chain"
    in:
      s: "1+2+3+4+5"
    out: 15
  - name: "mul_chain"
    in:
      s: "1*2*3*4*5"
    out: 120
  - name: "division_chain_small"
    in:
      s: "100/3"
    out: 33
  - name: "division_chain_twice"
    in:
      s: "1000/9/9"
    out: 12
  - name: "division_then_mul"
    in:
      s: "1000/9*9"
    out: 999
  - name: "subtraction_before_mul"
    in:
      s: "10-3*2"
    out: 4
  - name: "mixed_ops_1"
    in:
      s: "10-3*2+5"
    out: 9
  - name: "mixed_ops_2"
    in:
      s: "10-3*2+5/2"
    out: 6
  - name: "truncates_negative_result"
    in:
      s: "7-8/3"
    out: 5
  - name: "plus_then_division"
    in:
      s: "7+8/3"
    out: 9
  - name: "mul_div_mix"
    in:
      s: "18/4*2"
    out: 8
  - name: "double_space_noise"
    in:
      s: "12+34*5-6/4"
    out: 181
  - name: "double_space_noise_2"
    in:
      s: "12+34*5-6/5"
    out: 181
  - name: "big_positive"
    in:
      s: "1000000000+1000000000-1"
    out: 1999999999
  - name: "int32_max"
    in:
      s: "2147483647"
    out: 2147483647
  - name: "int32_max_minus_one"
    in:
      s: "2147483647-1"
    out: 2147483646
  - name: "int32_max_div_two"
    in:
      s: "2147483647/2"
    out: 1073741823
  - name: "int32_boundary_combo"
    in:
      s: "2147483646/2+1"
    out: 1073741824
  - name: "mixed_high_precedence"
    in:
      s: "50/7+6*3-2"
    out: 23
  - name: "mixed_high_precedence_2"
    in:
      s: "50/7+6*3-2*5+8/3"
    out: 17
  - name: "subtract_divide_multiply"
    in:
      s: "14-14/3*3"
    out: 2
  - name: "large_stress_1"
    in:
      s: "99999*1+1"
    out: 100000
  - name: "large_stress_2"
    in:
      s: "1000-1-2-3-4-5"
    out: 985
