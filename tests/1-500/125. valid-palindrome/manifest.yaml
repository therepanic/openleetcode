entry:
  id: 125
  title: valid-palindrome
  params:
    s:
      type: string
  call:
    cpp: Solution().isPalindrome({s})
    rust: Solution::is_palindrome({s})
    python3: Solution().isPalindrome({s})
    python2: Solution().isPalindrome({s})
    ruby: is_palindrome({s})
    java: new Solution().isPalindrome({s})
    csharp: new Solution().IsPalindrome({s})
    kotlin: Solution().isPalindrome({s})
    go: isPalindrome({s})
    dart: Solution().isPalindrome({s})
    swift: Solution().isPalindrome({s})
    typescript: isPalindrome({s})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().isPalindrome(s, {result})
    checker: "class Checker:\n    def isPalindrome(self, s, result):\n        filtered = \"\".join(c.lower() for c in s if c.isalnum())\n        return result == (filtered == filtered[::-1])\n"
seed: 125
tests:
