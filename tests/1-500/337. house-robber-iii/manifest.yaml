entry:
  id: 337
  title: "house-robber-iii"
  params:
    root:
      type: tree_node
  call:
    cpp: "Solution().rob({root})"
    rust: "Solution::rob({root})"
    python3: "Solution().rob({root})"
    python2: "Solution().rob({root})"
    ruby: "rob({root})"
    java: "new Solution().rob({root})"
    csharp: "new Solution().Rob({root})"
    kotlin: "Solution().rob({root})"
    go: "rob({root})"
    dart: "Solution().rob({root})"
    swift: "Solution().rob({root})"
    typescript: "rob({root})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().rob(root, {result})"
    checker: |
      class Checker:
          def rob(self, root, result):
              if isinstance(root, list):
                  root = self._build_tree(root)

              def dfs(node):
                  if node is None:
                      return 0, 0
                  take_left, skip_left = dfs(node.left)
                  take_right, skip_right = dfs(node.right)
                  take = node.val + skip_left + skip_right
                  skip = max(take_left, skip_left) + max(take_right, skip_right)
                  return take, skip

              expected = max(dfs(root))
              return isinstance(result, int) and result == expected

          def _build_tree(self, values):
              if not values:
                  return None
              nodes = [None if v is None else TreeNode(v) for v in values]
              child = 1
              for node in nodes:
                  if node is None:
                      continue
                  if child < len(nodes):
                      node.left = nodes[child]
                      child += 1
                  if child < len(nodes):
                      node.right = nodes[child]
                      child += 1
              return nodes[0]
seed: 337
