entry:
  id: 447
  title: "number-of-boomerangs"
  params:
    points:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().numberOfBoomerangs({points})"
    rust: "Solution::number_of_boomerangs({points})"
    python3: "Solution().numberOfBoomerangs({points})"
    python2: "Solution().numberOfBoomerangs({points})"
    ruby: "number_of_boomerangs({points})"
    java: "new Solution().numberOfBoomerangs({points})"
    csharp: "new Solution().NumberOfBoomerangs({points})"
    kotlin: "Solution().numberOfBoomerangs({points})"
    go: "numberOfBoomerangs({points})"
    dart: "Solution().numberOfBoomerangs({points})"
    swift: "Solution().numberOfBoomerangs({points})"
    typescript: "numberOfBoomerangs({points})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().check(points, {result})"
    checker: |
      class Checker:
          def check(self, points, result):
              from collections import defaultdict

              expected = 0
              for p in points:
                  distances = defaultdict(int)
                  for q in points:
                      d = (p[0] - q[0]) ** 2 + (p[1] - q[1]) ** 2
                      distances[d] += 1
                  for count in distances.values():
                      expected += count * (count - 1)
              return result == expected

seed: 447

