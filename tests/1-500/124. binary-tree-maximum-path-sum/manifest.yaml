entry:
  id: 124
  title: binary-tree-maximum-path-sum
  params:
    root:
      type: tree_node
  call:
    cpp: Solution().maxPathSum({root})
    rust: Solution::max_path_sum({root})
    python3: Solution().maxPathSum({root})
    python2: Solution().maxPathSum({root})
    ruby: max_path_sum({root})
    java: new Solution().maxPathSum({root})
    csharp: new Solution().MaxPathSum({root})
    kotlin: Solution().maxPathSum({root})
    go: maxPathSum({root})
    dart: Solution().maxPathSum({root})
    swift: Solution().maxPathSum({root})
    typescript: maxPathSum({root})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().maxPathSum(root, {result})
    checker: |
      class Checker:
          def maxPathSum(self, root, result):
              if not isinstance(result, int):
                  return False

              best = -10**18

              def dfs(node):
                  nonlocal best
                  if node is None:
                      return 0
                  left = max(dfs(node.left), 0)
                  right = max(dfs(node.right), 0)
                  best = max(best, node.val + left + right)
                  return node.val + max(left, right)

              dfs(root)
              return result == best
seed: 124
