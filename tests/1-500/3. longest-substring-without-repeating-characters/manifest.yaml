entry:
  id: 3
  title: "longest-substring-without-repeating-characters"
  params:
    s:
      type: string
  call:
    cpp: "Solution().lengthOfLongestSubstring({s})"
    rust: "Solution::length_of_longest_substring({s})"
    python3: "Solution().lengthOfLongestSubstring({s})"
    python2: "Solution().lengthOfLongestSubstring({s})"
    ruby: "length_of_longest_substring({s})"
    java: "new Solution().lengthOfLongestSubstring({s})"
    csharp: "new Solution().LengthOfLongestSubstring({s})"
    kotlin: "Solution().lengthOfLongestSubstring({s})"
    go: "lengthOfLongestSubstring({s})"
    dart: "Solution().lengthOfLongestSubstring({s})"
    swift: "Solution().lengthOfLongestSubstring({s})"
    typescript: "lengthOfLongestSubstring({s})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().lengthOfLongestSubstring(s, {result})"
    checker: |
      class Checker:
          def lengthOfLongestSubstring(self, s, result):
              if not isinstance(result, int):
                  return False
              last_seen = {}
              start = 0
              best = 0
              for end, ch in enumerate(s):
                  if ch in last_seen and last_seen[ch] >= start:
                      start = last_seen[ch] + 1
                  best = max(best, end - start + 1)
                  last_seen[ch] = end
              return result == best

seed: 3

