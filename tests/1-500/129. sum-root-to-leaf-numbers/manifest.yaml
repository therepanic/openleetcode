entry:
  id: 129
  title: sum-root-to-leaf-numbers
  params:
    root:
      type: tree_node
  call:
    cpp: Solution().sumNumbers({root})
    rust: Solution::sum_numbers({root})
    python3: Solution().sumNumbers({root})
    python2: Solution().sumNumbers({root})
    ruby: sum_numbers({root})
    java: new Solution().sumNumbers({root})
    csharp: new Solution().SumNumbers({root})
    kotlin: Solution().sumNumbers({root})
    go: sumNumbers({root})
    dart: Solution().sumNumbers({root})
    swift: Solution().sumNumbers({root})
    typescript: sumNumbers({root})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().sumNumbers(root, {result})
    checker: "class Node:\n    def __init__(self, val=0, left=None, right=None):\n        self.val = val\n        self.left = left\n        self.right = right\n\nclass Checker:\n    def _to_tree(self, root):\n        if root is None or root == []:\n            return None\n        if hasattr(root, 'val'):\n            return root\n        if not isinstance(root, list) or not root or root[0] is None:\n            return None\n        tree_root = Node(root[0])\n        queue = [tree_root]\n        i = 1\n        while queue and i < len(root):\n            node = queue.pop(0)\n            if i < len(root) and root[i] is not None:\n                node.left = Node(root[i])\n                queue.append(node.left)\n            i += 1\n            if i < len(root) and root[i] is not None:\n                node.right = Node(root[i])\n                queue.append(node.right)\n            i += 1\n        return tree_root\n\n    def sumNumbers(self, root, result):\n        if not isinstance(result, int):\n            return False\n        root = self._to_tree(root)\n        def dfs(node, current):\n            if node is None:\n                return 0\n            current = current * 10 + node.val\n            if node.left is None and node.right is None:\n                return current\n            return dfs(node.left, current) + dfs(node.right, current)\n        return result == dfs(root, 0)\n"
seed: 129
