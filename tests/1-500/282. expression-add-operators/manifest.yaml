entry:
  id: 282
  title: expression-add-operators
  params:
    num:
      type: string
    target:
      type: int
  call:
    cpp: "Solution().addOperators({num}, {target})"
    rust: "Solution::add_operators({num}, {target})"
    python3: "Solution().addOperators({num}, {target})"
    python2: "Solution().addOperators({num}, {target})"
    ruby: "add_operators({num}, {target})"
    java: "new Solution().addOperators({num}, {target})"
    csharp: "new Solution().AddOperators({num}, {target})"
    kotlin: "Solution().addOperators({num}, {target})"
    go: "addOperators({num}, {target})"
    dart: "Solution().addOperators({num}, {target})"
    swift: "Solution().addOperators({num}, {target})"
    typescript: "addOperators({num}, {target})"

judge:
  type: ignore_order

limits:
  time_ms: 2000
  memory_mb: 300

oracle:
  python3:
    call: "Checker().addOperators(num, target, {result})"
    checker: |
      from typing import Any, List

      class Checker:
          def addOperators(self, num: str, target: int, result: Any) -> bool:
              if not isinstance(result, list) or any(not isinstance(x, str) for x in result):
                  return False

              expected = set()
              n = len(num)

              def dfs(idx: int, path: str, curr: int, prev: int) -> None:
                  if idx == n:
                      if curr == target:
                          expected.add(path)
                      return
                  for i in range(idx, n):
                      if i > idx and num[idx] == "0":
                          break
                      part = num[idx : i + 1]
                      val = int(part)
                      if idx == 0:
                          dfs(i + 1, part, val, val)
                      else:
                          dfs(i + 1, path + "+" + part, curr + val, val)
                          dfs(i + 1, path + "-" + part, curr - val, -val)
                          dfs(i + 1, path + "*" + part, (curr - prev) + prev * val, prev * val)

              dfs(0, "", 0, 0)
              return set(result) == expected

seed: 282

