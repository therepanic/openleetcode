entry:
  id: 338
  title: counting-bits
  params:
    n:
      type: int
  call:
    cpp: "Solution().countBits({n})"
    rust: "Solution::count_bits({n})"
    python3: "Solution().countBits({n})"
    python2: "Solution().countBits({n})"
    ruby: "count_bits({n})"
    java: "new Solution().countBits({n})"
    csharp: "new Solution().CountBits({n})"
    kotlin: "Solution().countBits({n})"
    go: "countBits({n})"
    dart: "Solution().countBits({n})"
    swift: "Solution().countBits({n})"
    typescript: "countBits({n})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().countBits(n, {result})"
    checker: |
      class Checker:
          def countBits(self, n, result):
              if not isinstance(n, int):
                  return False
              if n < 0 or n > 100000:
                  return False
              if not isinstance(result, list):
                  return False
              if len(result) != n + 1:
                  return False
              for i, v in enumerate(result):
                  if not isinstance(v, int):
                      return False
                  if v < 0:
                      return False
                  if v != i.bit_count():
                      return False
              return True
seed: 338
