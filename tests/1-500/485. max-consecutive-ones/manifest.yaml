      items:
        type: int
  call:
    cpp: Solution().findMaxConsecutiveOnes({nums})
    rust: Solution::find_max_consecutive_ones({nums})
    python3: Solution().findMaxConsecutiveOnes({nums})
    python2: Solution().findMaxConsecutiveOnes({nums})
    ruby: find_max_consecutive_ones({nums})
    java: new Solution().findMaxConsecutiveOnes({nums})
    csharp: new Solution().FindMaxConsecutiveOnes({nums})
    kotlin: Solution().findMaxConsecutiveOnes({nums})
    go: findMaxConsecutiveOnes({nums})
    dart: Solution().findMaxConsecutiveOnes({nums})
    swift: Solution().findMaxConsecutiveOnes({nums})
    typescript: findMaxConsecutiveOnes({nums})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: Checker().findMaxConsecutiveOnes(nums, {result})
    checker: |
      class Checker:
          def findMaxConsecutiveOnes(self, nums, result):
              if not isinstance(result, int):
                  return False
              best = 0
              current = 0
              for value in nums:
                  if value == 1:
                      current += 1
                      if current > best:
                          best = current
                  else:
                      current = 0
              return result == best
