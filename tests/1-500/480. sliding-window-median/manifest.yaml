entry:
  id: 480
  title: "sliding-window-median"
  params:
    nums:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: "Solution().medianSlidingWindow({nums}, {k})"
    rust: "Solution::median_sliding_window({nums}, {k})"
    python3: "Solution().medianSlidingWindow({nums}, {k})"
    python2: "Solution().medianSlidingWindow({nums}, {k})"
    ruby: "median_sliding_window({nums}, {k})"
    java: "new Solution().medianSlidingWindow({nums}, {k})"
    csharp: "new Solution().MedianSlidingWindow({nums}, {k})"
    kotlin: "Solution().medianSlidingWindow({nums}, {k})"
    go: "medianSlidingWindow({nums}, {k})"
    dart: "Solution().medianSlidingWindow({nums}, {k})"
    swift: "Solution().medianSlidingWindow({nums}, {k})"
    typescript: "medianSlidingWindow({nums}, {k})"
judge:
  type: "exact"
limits:
  time_ms: 4000
  memory_mb: 512
oracle:
  python3:
    call: "Checker().check(nums, k, {result})"
    checker: |
      import heapq
      from typing import Any, List

      class DualHeap:
          def __init__(self, k: int):
              self.small = []
              self.large = []
              self.delayed = {}
              self.k = k
              self.small_size = 0
              self.large_size = 0

          def prune(self, heap):
              while heap:
                  num = -heap[0] if heap is self.small else heap[0]
                  if self.delayed.get(num, 0) == 0:
                      break
                  self.delayed[num] -= 1
                  if self.delayed[num] == 0:
                      del self.delayed[num]
                  heapq.heappop(heap)

          def make_balance(self):
              if self.small_size > self.large_size + 1:
                  heapq.heappush(self.large, -heapq.heappop(self.small))
                  self.small_size -= 1
                  self.large_size += 1
                  self.prune(self.small)
              elif self.small_size < self.large_size:
                  heapq.heappush(self.small, -heapq.heappop(self.large))
                  self.small_size += 1
                  self.large_size -= 1
                  self.prune(self.large)

          def insert(self, num: int):
              if not self.small or num <= -self.small[0]:
                  heapq.heappush(self.small, -num)
                  self.small_size += 1
              else:
                  heapq.heappush(self.large, num)
                  self.large_size += 1
              self.make_balance()

          def erase(self, num: int):
              self.delayed[num] = self.delayed.get(num, 0) + 1
              if num <= -self.small[0]:
                  self.small_size -= 1
                  if num == -self.small[0]:
                      self.prune(self.small)
              else:
                  self.large_size -= 1
                  if self.large and num == self.large[0]:
                      self.prune(self.large)
              self.make_balance()

          def median(self) -> float:
              if self.k % 2 == 1:
                  return float(-self.small[0])
              return (-self.small[0] + self.large[0]) / 2.0

      class Checker:
          def check(self, nums: List[int], k: int, result: Any) -> bool:
              if not isinstance(result, list):
                  return False
              expected_len = len(nums) - k + 1
              if expected_len < 0 or len(result) != expected_len:
                  return False
              if expected_len == 0:
                  return result == []
              for value in result:
                  if not isinstance(value, (int, float)):
                      return False

              dh = DualHeap(k)
              for i in range(k):
                  dh.insert(nums[i])

              if abs(float(result[0]) - dh.median()) > 1e-5:
                  return False

              idx = 1
              for i in range(k, len(nums)):
                  dh.insert(nums[i])
                  dh.erase(nums[i - k])
                  if abs(float(result[idx]) - dh.median()) > 1e-5:
                      return False
                  idx += 1
              return True
seed: 480
tests:
  - name: "example_1"
    in:
      nums: [1, 3, -1, -3, 5, 3, 6, 7]
      k: 3
    out:
      - 1.0
      - -1.0
      - -1.0
      - 3.0
      - 5.0
      - 6.0
  - name: "example_2"
