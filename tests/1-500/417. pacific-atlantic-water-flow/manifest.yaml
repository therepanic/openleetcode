entry:
  id: 417
  title: pacific-atlantic-water-flow
  params:
    heights:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().pacificAtlantic({heights})"
    rust: "Solution::pacific_atlantic({heights})"
    python3: "Solution().pacificAtlantic({heights})"
    python2: "Solution().pacificAtlantic({heights})"
    ruby: "pacific_atlantic({heights})"
    java: "new Solution().pacificAtlantic({heights})"
    csharp: "new Solution().PacificAtlantic({heights})"
    kotlin: "Solution().pacificAtlantic({heights})"
    go: "pacificAtlantic({heights})"
    dart: "Solution().pacificAtlantic({heights})"
    swift: "Solution().pacificAtlantic({heights})"
    typescript: "pacificAtlantic({heights})"

judge:
  type: "ignore_order"

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().pacificAtlantic(heights, {result})"
    checker: |
      class Checker:
          def pacificAtlantic(self, heights, result):
              if not isinstance(result, list):
                  return False
              if not heights or not heights[0]:
                  return result == []

              m = len(heights)
              n = len(heights[0])
              for row in heights:
                  if not isinstance(row, list) or len(row) != n:
                      return False

              seen = set()
              for cell in result:
                  if not isinstance(cell, list) or len(cell) != 2:
                      return False
                  r, c = cell
                  if not isinstance(r, int) or not isinstance(c, int):
                      return False
                  if r < 0 or r >= m or c < 0 or c >= n:
                      return False
                  seen.add((r, c))
              if len(seen) != len(result):
                  return False

              def reachable(starts):
                  stack = list(starts)
                  visited = set(starts)
                  while stack:
                      r, c = stack.pop()
                      h = heights[r][c]
                      if r > 0 and (r - 1, c) not in visited and heights[r - 1][c] >= h:
                          visited.add((r - 1, c))
                          stack.append((r - 1, c))
                      if r + 1 < m and (r + 1, c) not in visited and heights[r + 1][c] >= h:
                          visited.add((r + 1, c))
                          stack.append((r + 1, c))
                      if c > 0 and (r, c - 1) not in visited and heights[r][c - 1] >= h:
                          visited.add((r, c - 1))
                          stack.append((r, c - 1))
                      if c + 1 < n and (r, c + 1) not in visited and heights[r][c + 1] >= h:
                          visited.add((r, c + 1))
                          stack.append((r, c + 1))
                  return visited

              pacific = reachable([(0, c) for c in range(n)] + [(r, 0) for r in range(m)])
              atlantic = reachable([(m - 1, c) for c in range(n)] + [(r, n - 1) for r in range(m)])
              expected = pacific & atlantic
              return seen == expected

seed: 417

