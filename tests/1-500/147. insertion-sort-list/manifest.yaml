judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().insertionSortList(head, {result})
    checker: "class Checker:\n    def insertionSortList(self, head, result):\n        if head is None:\n            expected = []\n        else:\n            expected = list(head)\n        if not isinstance(result, list):\n            return False\n        return result == sorted(expected)\n"
seed: 147
