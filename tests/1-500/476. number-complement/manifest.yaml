entry:
  id: 476
  title: number-complement
  params:
    num:
      type: int
  call:
    cpp: Solution().findComplement({num})
    rust: Solution::find_complement({num})
    python3: Solution().findComplement({num})
    python2: Solution().findComplement({num})
    ruby: find_complement({num})
    java: new Solution().findComplement({num})
    csharp: new Solution().FindComplement({num})
    kotlin: Solution().findComplement({num})
    go: findComplement({num})
    dart: Solution().findComplement({num})
    swift: Solution().findComplement({num})
    typescript: findComplement({num})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(num, {result})
    checker: |
      class Checker:
          def check(self, num, result):
              if not isinstance(num, int) or not isinstance(result, int):
                  return False
              if num < 1 or num >= 2 ** 31:
                  return False
              bit = 1
              curr = num
              expected = num
              while curr > 0:
                  expected ^= bit
                  bit <<= 1
                  curr >>= 1
              return expected == result
seed: 476
