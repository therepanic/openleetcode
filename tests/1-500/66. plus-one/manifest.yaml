  params:
    digits:
      type: array
      items:
        type: int
"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().plusOne({digits}, {result})"
    "checker":
      "import json\nclass Checker:\n    def plusOne(self, digits, result):\n        try:\n            result = json.loads(result)
      if isinstance(result, str) else result\n        except Exception:\n            return False\n        expected = int(\"\
      \".join(map(str, digits))) + 1\n        return result == [int(d) for d in str(expected)]\n"
"seed": 42
