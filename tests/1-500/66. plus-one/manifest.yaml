entry:
  id: 66
  title: plus-one
  params:
    digits:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().plusOne({digits})"
    rust: "Solution::plus_one({digits})"
    python3: "Solution().plusOne({digits})"
    python2: "Solution().plusOne({digits})"
    ruby: "plus_one({digits})"
    java: "new Solution().plusOne({digits})"
    csharp: "new Solution().PlusOne({digits})"
    kotlin: "Solution().plusOne({digits})"
    go: "plusOne({digits})"
    dart: "Solution().plusOne({digits})"
    swift: "Solution().plusOne({digits})"
    typescript: "plusOne({digits})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(digits, {result})"
    checker: |
      class Checker:
          def check(self, digits, result):
              expected = digits[:]
              for i in range(len(expected) - 1, -1, -1):
                  if expected[i] + 1 != 10:
                      expected[i] += 1
                      return result == expected
                  expected[i] = 0

              return result == [1] + expected
seed: 66
tests:
