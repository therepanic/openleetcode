      type: array
      items:
        type: int
  call:
    cpp: Solution().candy({ratings})
    rust: Solution::candy({ratings})
    python3: Solution().candy({ratings})
    python2: Solution().candy({ratings})
    ruby: candy({ratings})
    java: new Solution().candy({ratings})
    csharp: new Solution().Candy({ratings})
    kotlin: Solution().candy({ratings})
    go: candy({ratings})
    dart: Solution().candy({ratings})
    swift: Solution().candy({ratings})
    typescript: candy({ratings})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().candy(ratings, {result})
    checker: "from typing import Any, List\n\nclass Checker:\n    def candy(self, ratings: List[int], result: Any) -> bool:\n        if not isinstance(result, int):\n            return False\n        n = len(ratings)\n        if n == 0:\n            return False\n        candies = [1] * n\n        for i in range(1, n):\n            if ratings[i] > ratings[i - 1]:\n                candies[i] = candies[i - 1] + 1\n        total = candies[-1]\n        for i in range(n - 1, 0, -1):\n            if ratings[i - 1] > ratings[i]:\n                candies[i - 1] = max(candies[i - 1], candies[i] + 1)\n            total += candies[i - 1]\n        return total == result\n"
seed: 135
