  title: binary-tree-preorder-traversal
  params:
    root:
      type: tree_node
  call:
    cpp: Solution().preorderTraversal({root})
    rust: Solution::preorder_traversal({root})
    python3: Solution().preorderTraversal({root})
    python2: Solution().preorderTraversal({root})
    ruby: preorder_traversal({root})
    java: new Solution().preorderTraversal({root})
    csharp: new Solution().PreorderTraversal({root})
    kotlin: Solution().preorderTraversal({root})
    go: preorderTraversal({root})
    dart: Solution().preorderTraversal({root})
    swift: Solution().preorderTraversal({root})
    typescript: preorderTraversal({root})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().preorderTraversal(root, {result})
    checker:
      "class Checker:\n    def _to_tree(self, root):\n        if root is None or hasattr(root, \"val\"):\n            return root\n        if not isinstance(root, list) or not root or root[0] is None:\n            return None\n        class Node:\n            def __init__(self, val=0, left=None, right=None):\n                self.val = val\n                self.left = left\n                self.right = right\n        tree_root = Node(root[0])\n        queue = [tree_root]\n        i = 1\n        while queue and i < len(root):\n            node = queue.pop(0)\n            if i < len(root) and root[i] is not None:\n                node.left = Node(root[i])\n                queue.append(node.left)\n            i += 1\n            if i < len(root) and root[i] is not None:\n                node.right = Node(root[i])\n                queue.append(node.right)\n            i += 1\n        return tree_root\n\n    def preorderTraversal(self, root, result):\n        if not isinstance(result,\
      \ list):\n            return False\n        root = self._to_tree(root)\n        expected = []\n        def dfs(node):\n            if node is None:\n                return\n            expected.append(node.val)\n            dfs(node.left)\n            dfs(node.right)\n        dfs(root)\n        return expected == result\n"
seed: 144
