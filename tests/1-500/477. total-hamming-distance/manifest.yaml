  title: total-hamming-distance
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().totalHammingDistance({nums})"
    rust: "Solution::total_hamming_distance({nums})"
    python3: "Solution().totalHammingDistance({nums})"
    python2: "Solution().totalHammingDistance({nums})"
    ruby: "total_hamming_distance({nums})"
    java: "new Solution().totalHammingDistance({nums})"
    csharp: "new Solution().TotalHammingDistance({nums})"
    kotlin: "Solution().totalHammingDistance({nums})"
    go: "totalHammingDistance({nums})"
    dart: "Solution().totalHammingDistance({nums})"
    swift: "Solution().totalHammingDistance({nums})"
    typescript: "totalHammingDistance({nums})"

judge:
  type: exact

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().check(nums, {result})"
    checker: |
      class Checker:
          def check(self, nums, result):
              if not isinstance(nums, list) or not isinstance(result, int):
                  return False
              if len(nums) < 1:
                  return False
              for x in nums:
                  if not isinstance(x, int) or x < 0 or x > 10**9:
                      return False
              expected = 0
              n = len(nums)
              for bit in range(32):
                  ones = 0
                  for x in nums:
                      ones += (x >> bit) & 1
                  expected += ones * (n - ones)
              return result == expected

seed: 477

