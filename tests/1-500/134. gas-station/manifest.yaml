    rust: "Solution::can_complete_circuit({gas}, {cost})"
    python3: "Solution().canCompleteCircuit({gas}, {cost})"
    python2: "Solution().canCompleteCircuit({gas}, {cost})"
    ruby: "can_complete_circuit({gas}, {cost})"
    java: "new Solution().canCompleteCircuit({gas}, {cost})"
    csharp: "new Solution().CanCompleteCircuit({gas}, {cost})"
    kotlin: "Solution().canCompleteCircuit({gas}, {cost})"
    go: "canCompleteCircuit({gas}, {cost})"
    dart: "Solution().canCompleteCircuit({gas}, {cost})"
