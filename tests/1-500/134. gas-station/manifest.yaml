oracle:
  python3:
    call: Checker().canCompleteCircuit(gas, cost, {result})
    checker: "class Checker:\n    def canCompleteCircuit(self, gas, cost, result):\n        if not isinstance(result, int) or len(gas) != len(cost) or not gas:\n            return False\n        total = 0\n        tank = 0\n        start = 0\n        for i, (g, c) in enumerate(zip(gas, cost)):\n            diff = g - c\n            total += diff\n            tank += diff\n            if tank < 0:\n                start = i + 1\n                tank = 0\n        expected = -1 if total < 0 else start\n        return result == expected\n"
