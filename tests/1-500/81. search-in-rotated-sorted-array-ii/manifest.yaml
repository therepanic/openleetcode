"entry":
  "id": 81
  "title": "search-in-rotated-sorted-array-ii"
  "call":
    "cpp": "Solution().search(lv(vector<int>{ {nums} }), {target})"
    "rust": "Solution::search(vec![{nums}], {target})"
    "python3": "Solution().search([{nums}], {target})"
    "python2": "Solution().search([{nums}], {target})"
    "ruby": "search([{nums}], {target})"
    "java": "new Solution().search(new int[]{ {nums} }, {target})"
    "csharp": "new Solution().Search(new int[]{ {nums} }, {target})"
    "kotlin": "Solution().search(intArrayOf({nums}), {target})"
    "go": "search([]int{ {nums} }, {target})"
    "dart": "Solution().search([{nums}], {target})"
    "swift": "Solution().search([{nums}], {target})"
    "typescript": "search([{nums}], {target})"
"judge":
  "type": "exact"
"limits":
  "time_ms": 2000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().search([{nums}], {target}, {result})"
    "checker":
      "import json\nclass Checker:\n    def search(self, nums, target, result):\n\
      \        try:\n            result = json.loads(result) if isinstance(result,\
      \ str) else result\n        except Exception:\n            return False\n  \
      \      return (target in nums) == result\n"
"seed": 42
