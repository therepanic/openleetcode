      target: 3
    out: true
  - name: many_duplicates_absent
    in:
      nums: [2, 2, 2, 3, 4, 2]
      target: 1
    out: false
  - name: negative_values_present
    in:
      nums: [0, 1, 1, 2, -4, -3, -2, -1, 0]
      target: -3
    out: true
  - name: negative_values_absent
    in:
      nums: [0, 1, 1, 2, -4, -3, -2, -1, 0]
      target: 5
