      nums: [3, 1, 1, 1, 2, 3]
      target: 2
    out: true
  - name: duplicates_middle_absent
    in:
      nums: [3, 1, 1, 1, 2, 3]
      target: 4
    out: false
  - name: pivot_boundary_present
    in:
