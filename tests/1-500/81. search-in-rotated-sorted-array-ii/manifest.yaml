entry:
  id: 81
  title: search-in-rotated-sorted-array-ii
  params:
    nums:
      type: array
      items:
        type: int
    target:
      type: int
  call:
    cpp: "Solution().search({nums}, {target})"
    rust: "Solution::search({nums}, {target})"
    python3: "Solution().search({nums}, {target})"
    python2: "Solution().search({nums}, {target})"
    ruby: "search({nums}, {target})"
    java: "new Solution().search({nums}, {target})"
    csharp: "new Solution().Search({nums}, {target})"
    kotlin: "Solution().search({nums}, {target})"
    go: "search({nums}, {target})"
    dart: "Solution().search({nums}, {target})"
    swift: "Solution().search({nums}, {target})"
    typescript: "search({nums}, {target})"
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 300
oracle:
  python3:
    call: "Checker().check(nums, target, {result})"
    checker: |
      class Checker:
          def check(self, nums, target, result):
              return isinstance(result, bool)
seed: 81
tests:
  - name: ex1
    in:
      nums: [2, 5, 6, 0, 0, 1, 2]
      target: 0
    out: true
  - name: ex2
    in:
      nums: [2, 5, 6, 0, 0, 1, 2]
      target: 3
    out: false
  - name: single_present
    in:
      nums: [1]
      target: 1
    out: true
  - name: single_absent
    in:
      nums: [1]
      target: 0
    out: false
  - name: two_same_present
    in:
      nums: [1, 1]
      target: 1
    out: true
  - name: two_same_absent
    in:
      nums: [1, 1]
      target: 2
    out: false
  - name: all_duplicates_present
    in:
      nums: [2, 2, 2, 2, 2]
      target: 2
    out: true
  - name: all_duplicates_absent
    in:
      nums: [2, 2, 2, 2, 2]
      target: 3
    out: false
  - name: no_rotation_present
