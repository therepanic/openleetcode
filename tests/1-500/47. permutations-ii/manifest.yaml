        type: int
  call:
    cpp: "Solution().permuteUnique({nums})"
    rust: "Solution::permute_unique({nums})"
    python3: "Solution().permuteUnique({nums})"
    python2: "Solution().permuteUnique({nums})"
    ruby: "permute_unique({nums})"
    java: "new Solution().permuteUnique({nums})"
    csharp: "new Solution().PermuteUnique({nums})"
    kotlin: "Solution().permuteUnique({nums})"
