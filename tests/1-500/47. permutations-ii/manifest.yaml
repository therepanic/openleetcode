entry:
  id: 47
  title: permutations-ii
  call:
    cpp: Solution().permuteUnique({nums})
    rust: Solution::permute_unique({nums})
    python3: Solution().permuteUnique({nums})
    python2: Solution().permuteUnique({nums})
    ruby: permute_unique({nums})
    java: new Solution().permuteUnique({nums})
    csharp: new Solution().PermuteUnique({nums})
    kotlin: Solution().permuteUnique({nums})
    go: permuteUnique({nums})
    dart: Solution().permuteUnique({nums})
    swift: Solution().permuteUnique({nums})
    typescript: permuteUnique({nums})
  params:
    nums:
      type: array
      items:
        type: int
judge:
  type: ignore_order
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(nums, {result})
    checker:
      "import json\nimport itertools\nclass Checker:\n    def _norm(self, out):\n        if isinstance(out, str):\n\
      \            try:\n                out = json.loads(out)\n            except Exception:\n                pass\n    \
      \    return out\n\n    def check(self, nums, out):\n        out = self._norm(out)\n        target = list(set(itertools.permutations(nums)))\n\
      \        if len(out) != len(target): return False\n        out_sorted = sorted([list(p) for p in out])\n        target_sorted
      = sorted([list(p) for p in target])\n        return out_sorted == target_sorted\n"
seed: 42
