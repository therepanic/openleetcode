judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().permuteUnique(nums, {result})"
    checker: |
      from collections import Counter
      from math import factorial

      class Checker:
          def permuteUnique(self, nums, result):
              if not isinstance(result, list):
                  return False

              n = len(nums)
              counts = Counter(nums)
              expected = factorial(n)
              for c in counts.values():
                  expected //= factorial(c)

              seen = set()
              for perm in result:
                  if not isinstance(perm, list):
                      return False
                  if len(perm) != n:
                      return False
                  if Counter(perm) != counts:
                      return False
                  seen.add(tuple(perm))

              return len(seen) == expected and len(result) == expected
seed: 47
