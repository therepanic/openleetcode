entry:
  id: 148
  title: "sort-list"
  params:
    head:
      type: list_node
  call:
    cpp: "listNodeToArray(Solution().sortList({head}))"
    rust: "ListNode::list_node_to_array(Solution::sort_list({head}))"
    python3: "list_node_to_array(Solution().sortList({head}))"
    python2: "list_node_to_array(Solution().sortList({head}))"
    ruby: "list_node_to_array(sort_list({head}))"
    java: "ListNode.listNodeToArray(new Solution().sortList({head}))"
    csharp: "ListNode.ListNodeToArray(new Solution().SortList({head}))"
    kotlin: "listNodeToArray(Solution().sortList({head}))"
    go: "listNodeToArray(sortList({head}))"
    dart: "list_node_to_array(Solution().sortList({head}))"
    swift: "list_node_to_array(Solution().sortList({head}))"
    typescript: "listNodeToArray(sortList({head}))"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 300

oracle:
  python3:
    call: "Checker().sortList(head, {result})"
    checker: |
      class Checker:
          def sortList(self, head, result):
              if head is None:
                  expected = []
              else:
                  expected = list(head)
              if not isinstance(result, list):
                  return False
              return result == sorted(expected)

seed: 148

