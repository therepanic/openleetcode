entry:
  id: 106
  title: Construct Binary Tree from Inorder and Postorder Traversal
  params:
    inorder:
      type: array
      items:
        type: int
    postorder:
      type: array
      items:
        type: int
  call:
    cpp: "treeNodeToArray(Solution().buildTree({inorder}, {postorder}))"
    rust: "TreeNode::tree_node_to_array(Solution::build_tree({inorder}, {postorder}))"
    python3: "tree_node_to_array(Solution().buildTree({inorder}, {postorder}))"
    python2: "tree_node_to_array(Solution().buildTree({inorder}, {postorder}))"
    ruby: "tree_node_to_array(build_tree({inorder}, {postorder}))"
    java: "TreeNode.treeNodeToArray(new Solution().buildTree({inorder}, {postorder}))"
    csharp: "TreeNode.TreeNodeToArray(new Solution().BuildTree({inorder}, {postorder}))"
    kotlin: "treeNodeToArray(Solution().buildTree({inorder}, {postorder}))"
    go: "treeNodeToArray(buildTree({inorder}, {postorder}))"
    dart: "tree_node_to_array(Solution().buildTree({inorder}, {postorder}))"
    swift: "tree_node_to_array(Solution().buildTree({inorder}, {postorder}))"
    typescript: "treeNodeToArray(buildTree({inorder}, {postorder}))"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().buildTree(inorder, postorder, {result})"
    checker: |
      class Checker:
          def buildTree(self, inorder, postorder, result):
              if not isinstance(result, list):
                  return False
              if not inorder and not postorder:
                  return result == []
              if len(inorder) != len(postorder):
                  return False
              if len(result) == 0:
                  return False

              nodes = []
              for value in result:
                  if value is None:
                      nodes.append(None)
                  elif isinstance(value, int):
                      nodes.append({"val": value, "left": None, "right": None})
                  else:
                      return False

              if nodes[0] is None:
                  return False

              queue = [0]
              idx = 1
              while queue and idx < len(nodes):
                  cur = queue.pop(0)
                  if nodes[cur] is None:
                      continue
                  if idx < len(nodes):
                      nodes[cur]["left"] = idx if nodes[idx] is not None else None
                      if nodes[idx] is not None:
                          queue.append(idx)
                      idx += 1
                  if idx < len(nodes):
                      nodes[cur]["right"] = idx if nodes[idx] is not None else None
                      if nodes[idx] is not None:
                          queue.append(idx)
                      idx += 1

              def inorder_walk(i):
                  if i is None:
                      return []
                  return inorder_walk(nodes[i]["left"]) + [nodes[i]["val"]] + inorder_walk(nodes[i]["right"])

              def postorder_walk(i):
                  if i is None:
                      return []
                  return postorder_walk(nodes[i]["left"]) + postorder_walk(nodes[i]["right"]) + [nodes[i]["val"]]

              return inorder_walk(0) == inorder and postorder_walk(0) == postorder
seed: 106
