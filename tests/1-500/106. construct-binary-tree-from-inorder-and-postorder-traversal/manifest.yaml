entry:
  id: 106
  title: "construct-binary-tree-from-inorder-and-postorder-traversal"
  params:
    inorder:
      type: "array"
      items:
        type: "int"
    postorder:
      type: "array"
      items:
        type: "int"
  call:
    cpp: "treeNodeToArray(Solution().buildTree({inorder}, {postorder}))"
    rust: "TreeNode::tree_node_to_array(Solution::build_tree({inorder}, {postorder}))"
    python3: "tree_node_to_array(Solution().buildTree({inorder}, {postorder}))"
    python2: "tree_node_to_array(Solution().buildTree({inorder}, {postorder}))"
    ruby: "tree_node_to_array(build_tree({inorder}, {postorder}))"
    java: "TreeNode.treeNodeToArray(new Solution().buildTree({inorder}, {postorder}))"
    csharp: "TreeNode.TreeNodeToArray(new Solution().BuildTree({inorder}, {postorder}))"
    kotlin: "treeNodeToArray(Solution().buildTree({inorder}, {postorder}))"
    go: "treeNodeToArray(buildTree({inorder}, {postorder}))"
    dart: "tree_node_to_array(Solution().buildTree({inorder}, {postorder}))"
    swift: "tree_node_to_array(Solution().buildTree({inorder}, {postorder}))"
    typescript: "treeNodeToArray(buildTree({inorder}, {postorder}))"
judge:
  type: "exact"
limits:
  time_ms: 2000
  memory_mb: 512
oracle:
  python3:
    call: "Checker().buildTree(inorder, postorder, {result})"
    checker: |
      import copy


      from typing import *
      from collections import *
      import copy
      import json
      import math
      import bisect
      import heapq
      import itertools
      import functools

      # Definition for a binary tree node.
      # class TreeNode:
      #     def __init__(self, val=0, left=None, right=None):
      #         self.val = val
      #         self.left = left
      #         self.right = right

      class StateNode:
          def __init__(self, val):
              self.val = val
              self.left = None
              self.right = None


      class Solution:

          def buildTree(self, inorder, postorder):

              idxMap = {}

              for i in range(len(inorder)):
                  idxMap[inorder[i]] = i


              def buildState(l, r):

                  if l > r:
                      return None

                  rootVal = postorder.pop()

                  node = StateNode(rootVal)

                  mid = idxMap[rootVal]

                  node.right = buildState(mid + 1, r)
                  node.left = buildState(l, mid - 1)

                  return node


              def convert(node):

                  if not node:
                      return None

                  root = TreeNode(node.val)

                  root.left = convert(node.left)
                  root.right = convert(node.right)

                  return root


              stateRoot = buildState(0, len(inorder) - 1)

              return convert(stateRoot)


      def array_to_list_node_local(values):
          dummy = ListNode(0)
          tail = dummy
          for value in values:
              tail.next = ListNode(value)
              tail = tail.next
          return dummy.next

      def array_to_tree_node_local(values):
          if not values:
              return None
          root = TreeNode(values[0])
          queue = deque([root])
          index = 1
          while queue and index < len(values):
              node = queue.popleft()
              if index < len(values) and values[index] is not None:
                  node.left = TreeNode(values[index])
                  queue.append(node.left)
              index += 1
              if index < len(values) and values[index] is not None:
                  node.right = TreeNode(values[index])
                  queue.append(node.right)
              index += 1
          return root

      def list_node_to_array_local(node):
          out = []
          seen = 0
          while node is not None and seen < 100000:
              out.append(node.val)
              node = node.next
              seen += 1
          return out

      def tree_node_to_array_local(root):
          if root is None:
              return []
          out = []
          q = deque([root])
          while q:
              node = q.popleft()
              if node is None:
                  out.append(None)
                  continue
              out.append(node.val)
              q.append(node.left)
              q.append(node.right)
          while out and out[-1] is None:
              out.pop()
          return out

      def deep_sort(value):
          if isinstance(value, list):
              normalized = [deep_sort(item) for item in value]
              return sorted(normalized, key=lambda item: json.dumps(item, sort_keys=True))
          if isinstance(value, dict):
              return {key: deep_sort(val) for key, val in sorted(value.items())}
          return value

      def normalize_expected(value):
          kind = "tree_node"
          if kind == "list_node":
              return list_node_to_array_local(value)
          if kind == "tree_node":
              return tree_node_to_array_local(value)
          return value

      def normalize_actual(value):
          return value

      def prepare_input(value, kind):
          if kind == "tree_node":
              return array_to_tree_node_local(value)
          if kind == "list_node":
              return array_to_list_node_local(value)
          return copy.deepcopy(value)

      class Checker:
          def buildTree(self, inorder, postorder, result):
              prepared_inorder = prepare_input(inorder, "array[int]"); prepared_postorder = prepare_input(postorder, "array[int]")
              expected = Solution().buildTree(prepared_inorder, prepared_postorder)
              expected = normalize_expected(expected)
              actual = normalize_actual(result)
              return deep_sort(expected) == deep_sort(actual)
