entry:
  id: 98
  title: validate-binary-search-tree
  call:
    cpp: Solution().isValidBST({root})
    rust: Solution::is_valid_bst({root})
    python3: Solution().isValidBST({root})
    python2: Solution().isValidBST({root})
    ruby: is_valid_bst({root})
    java: new Solution().isValidBST({root})
    csharp: new Solution().IsValidBST({root})
    kotlin: Solution().isValidBST({root})
    go: isValidBST({root})
    dart: Solution().isValidBST({root})
    swift: Solution().isValidBST({root})
    typescript: isValidBST({root})
  params:
    root:
      type: tree_node
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().isValidBST(root, {result})
    checker:
      "class Checker:\n    def isValidBST(self, root_arr, result):\n        def is_bst(arr, idx, min_v, max_v):\n \
      \           if idx >= len(arr) or arr[idx] is None:\n                return True\n            val = arr[idx]\n     \
      \       if not (min_v < val < max_v):\n                return False\n            left = 2 * idx + 1\n            right
      = 2 * idx + 2\n            return (is_bst(arr, left, min_v, val) and \n                    is_bst(arr, right, val, max_v))\n\
      \        expected = is_bst(root_arr, 0, float('-inf'), float('inf'))\n        return expected == result\n"
seed: 42
