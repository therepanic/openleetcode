oracle:
  python3:
    call: Checker().isValidBST(root, {result})
    checker: "class Checker:\n    def _check(self, arr, idx, lo, hi):\n        if\
      \ idx >= len(arr) or arr[idx] is None:\n            return True\n        val\
      \ = arr[idx]\n        if not (lo < val < hi):\n            return False\n  \
      \      return self._check(arr, 2 * idx + 1, lo, val) and self._check(arr, 2\
      \ * idx + 2, val, hi)\n\n    def isValidBST(self, root, result):\n        return\
      \ result == self._check(root, 0, float(\"-inf\"), float(\"inf\"))\n"
