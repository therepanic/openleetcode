entry:
  id: 98
  title: validate-binary-search-tree
  call:
    cpp: Solution().isValidBST(toTreeNode(lv(vector<optional<int>>{ {root} })))
    rust: Solution::is_valid_bst(TreeNode::to_tree_node(vec![{root}]))
    python3: Solution().isValidBST(to_tree_node([{root}]))
    python2: Solution().isValidBST(to_tree_node([{root}]))
    ruby: is_valid_bst(to_tree_node([{root}]))
    java: new Solution().isValidBST(TreeNode.toTreeNode(new Integer[]{ {root} }))
    csharp: new Solution().IsValidBST(TreeNode.ToTreeNode(new int?[]{ {root} }))
    kotlin: Solution().isValidBST(toTreeNode(arrayOf({root})))
    go: isValidBST(toTreeNode([]interface{}{ {root} }))
    dart: Solution().isValidBST(to_tree_node([{root}]))
    swift: Solution().isValidBST(to_tree_node([{root}]))
    typescript: isValidBST(toTreeNode([{root}]))
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().isValidBST([{root}], {result})
    checker:
      "class Checker:\n    def isValidBST(self, root_arr, result):\n      \
      \  def is_bst(arr, idx, min_v, max_v):\n            if idx >= len(arr) or arr[idx]\
      \ is None:\n                return True\n            val = arr[idx]\n      \
      \      if not (min_v < val < max_v):\n                return False\n       \
      \     left = 2 * idx + 1\n            right = 2 * idx + 2\n            return\
      \ (is_bst(arr, left, min_v, val) and \n                    is_bst(arr, right,\
      \ val, max_v))\n        expected = is_bst(root_arr, 0, float('-inf'), float('inf'))\n\
      \        return expected == result\n"
seed: 42
tests:
  - name: Example 1
    in:
      root:
        - 2
        - 1
        - 3
    out: true
  - name: Example 2
    in:
      root:
        - 5
        - 1
        - 4
        - null
        - null
        - 3
        - 6
    out: false
  - name: Single node
    in:
      root:
        - 1
    out: true
  - name: Two nodes valid
    in:
      root:
        - 1
        - null
        - 2
    out: true
  - name: Two nodes invalid
    in:
      root:
        - 1
        - 2
        - null
    out: false
