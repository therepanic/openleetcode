"entry":
  "id": 92
  "title": "reverse-linked-list-ii"
  "call":
    "cpp":
      "listNodeToArray(Solution().reverseBetween(toListNode(lv(vector<int>{ {head}\
      \ })), {left}, {right}))"
    "rust":
      "ListNode::list_node_to_array(Solution::reverse_between(ListNode::to_list_node(vec![{head}]),\
      \ {left}, {right}))"
    "python3":
      "list_node_to_array(Solution().reverseBetween(to_list_node([{head}]),\
      \ {left}, {right}))"
    "python2":
      "list_node_to_array(Solution().reverseBetween(to_list_node([{head}]),\
      \ {left}, {right}))"
    "ruby": "list_node_to_array(reverse_between(to_list_node([{head}]), {left}, {right}))"
    "java":
      "ListNode.listNodeToArray(new Solution().reverseBetween(ListNode.toListNode(new\
      \ int[]{ {head} }), {left}, {right}))"
    "csharp":
      "ListNode.ListNodeToArray(new Solution().ReverseBetween(ListNode.ToListNode(new\
      \ int[]{ {head} }), {left}, {right}))"
    "kotlin":
      "listNodeToArray(Solution().reverseBetween(toListNode(intArrayOf({head})),\
      \ {left}, {right}))"
    "go": "listNodeToArray(reverseBetween(toListNode([]int{ {head} }), {left}, {right}))"
    "dart":
      "list_node_to_array(Solution().reverseBetween(to_list_node([{head}]),\
      \ {left}, {right}))"
    "swift":
      "list_node_to_array(Solution().reverseBetween(to_list_node([{head}]),\
      \ {left}, {right}))"
    "typescript": "listNodeToArray(reverseBetween(toListNode([{head}]), {left}, {right}))"
"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().reverse_between([{head}], {left}, {right}, {result})"
    "checker":
      "class Checker:\n    def reverse_between(self, head, left, right, result):\n\
      \        if left == right:\n            return head == result\n        arr =\
      \ list(head)\n        sub = arr[left-1:right]\n        arr[left-1:right] = sub[::-1]\n\
      \        return arr == result\n"
"seed": 42
