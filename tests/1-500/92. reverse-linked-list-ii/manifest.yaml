entry:
  id: 92
  title: "reverse-linked-list-ii"
  params:
    head:
      type: list_node
    left:
      type: int
    right:
      type: int
  call:
    cpp: "listNodeToArray(Solution().reverseBetween({head}, {left}, {right}))"
    rust: "ListNode::list_node_to_array(Solution::reverse_between({head}, {left}, {right}))"
    python3: "list_node_to_array(Solution().reverseBetween({head}, {left}, {right}))"
    python2: "list_node_to_array(Solution().reverseBetween({head}, {left}, {right}))"
    ruby: "list_node_to_array(reverse_between({head}, {left}, {right}))"
    java: "ListNode.listNodeToArray(new Solution().reverseBetween({head}, {left}, {right}))"
    csharp: "ListNode.ListNodeToArray(new Solution().ReverseBetween({head}, {left}, {right}))"
    kotlin: "listNodeToArray(Solution().reverseBetween({head}, {left}, {right}))"
    go: "listNodeToArray(reverseBetween({head}, {left}, {right}))"
    dart: "list_node_to_array(Solution().reverseBetween({head}, {left}, {right}))"
    swift: "list_node_to_array(Solution().reverseBetween({head}, {left}, {right}))"
    typescript: "listNodeToArray(reverseBetween({head}, {left}, {right}))"
judge:
  type: "exact"
limits:
  time_ms: 200
  memory_mb: 256
oracle:
  python3:
    call: "Checker().reverseBetween(head, left, right, {result})"
    checker: |
      class Checker:
          def reverseBetween(self, head, left, right, result):
              arr = list(head)
              arr[left - 1:right] = reversed(arr[left - 1:right])
              return result == arr
seed: 92
