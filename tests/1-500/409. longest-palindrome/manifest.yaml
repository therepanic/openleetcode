entry:
  id: 409
  title: longest-palindrome
  params:
    s:
      type: string
  call:
    cpp: Solution().longestPalindrome({s})
    rust: Solution::longest_palindrome({s})
    python3: Solution().longestPalindrome({s})
    python2: Solution().longestPalindrome({s})
    ruby: longest_palindrome({s})
    java: new Solution().longestPalindrome({s})
    csharp: new Solution().LongestPalindrome({s})
    kotlin: Solution().longestPalindrome({s})
    go: longestPalindrome({s})
    dart: Solution().longestPalindrome({s})
    swift: Solution().longestPalindrome({s})
    typescript: longestPalindrome({s})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(s, {result})
    checker: |
      class Checker:
          def check(self, s, result):
              if not isinstance(result, int):
                  return False
              if result < 1 or result > len(s):
                  return False
              counts = {}
              for c in s:
                  counts[c] = counts.get(c, 0) + 1
              expected = 0
              odd = False
              for freq in counts.values():
                  if freq % 2 == 0:
                      expected += freq
                  else:
                      expected += freq - 1
                      odd = True
              expected += 1 if odd else 0
              return result == expected
seed: 409
