entry:
  id: 11
  title: container-with-most-water
  call:
    cpp: Solution().maxArea(lv(vector<int>{ {height} }))
    rust: Solution::max_area(vec![{height}])
    python3: Solution().maxArea([{height}])
    python2: Solution().maxArea([{height}])
    ruby: max_area([{height}])
    java: new Solution().maxArea(new int[]{ {height} })
    csharp: new Solution().MaxArea(new int[]{ {height} })
    kotlin: Solution().maxArea(intArrayOf({height}))
    go: maxArea([]int{ {height} })
    dart: Solution().maxArea([{height}])
    swift: Solution().maxArea([{height}])
    typescript: maxArea([{height}])
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().maxArea([{height}], {result})
    checker:
      "class Checker:\n    def maxArea(self, height, expected):\n        l,\
      \ r = 0, len(height) - 1\n        actual = 0\n        while l < r:\n       \
      \     actual = max(actual, min(height[l], height[r]) * (r - l))\n          \
      \  if height[l] < height[r]: l += 1\n            else: r -= 1\n        return\
      \ actual == expected\n"
seed: 42
