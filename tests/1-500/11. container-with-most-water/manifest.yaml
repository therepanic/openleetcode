entry:
  id: 11
  title: container-with-most-water
  params:
    height:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().maxArea({height})"
    rust: "Solution::max_area({height})"
    python3: "Solution().maxArea({height})"
    python2: "Solution().maxArea({height})"
    ruby: "max_area({height})"
    java: "new Solution().maxArea({height})"
    csharp: "new Solution().MaxArea({height})"
    kotlin: "Solution().maxArea({height})"
    go: "maxArea({height})"
    dart: "Solution().maxArea({height})"
    swift: "Solution().maxArea({height})"
    typescript: "maxArea({height})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().maxArea({height}, {result})"
    checker: |
      class Checker:
          def maxArea(self, height, result):
              left = 0
              right = len(height) - 1
              best = 0

              while left < right:
                  best = max(best, min(height[left], height[right]) * (right - left))
                  if height[left] < height[right]:
                      left += 1
                  else:
                      right -= 1

              return best == result
seed: 11
