oracle:
  python3:
    call: Checker().numTrees({n}, {result})
    checker:
      "class Checker:\n    def numTrees(self, n, result):\n        try:\n \
      \           result = int(result)\n        except Exception:\n            return\
      \ False\n        dp = [0] * (n + 1)\n        dp[0] = 1\n        dp[1] = 1\n\
      \        for i in range(2, n + 1):\n            for j in range(1, i + 1):\n\
      \                dp[i] += dp[j - 1] * dp[i - j]\n        return dp[n] == result\n"
seed: 42
