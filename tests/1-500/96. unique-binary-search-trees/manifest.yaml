oracle:
  python3:
    call: Checker().numTrees(n, {result})
    checker: "class Checker:\n    def numTrees(self, n, result):\n        try:\n \
      \           result = int(result)\n        except Exception:\n            return\
      \ False\n        dp = [0] * (n + 1)\n        dp[0] = 1\n        if n >= 1:\n\
      \            dp[1] = 1\n        for nodes in range(2, n + 1):\n            total\
      \ = 0\n            for root in range(1, nodes + 1):\n                total +=\
      \ dp[root - 1] * dp[nodes - root]\n            dp[nodes] = total\n        return\
      \ dp[n] == result\n"
seed: 42
