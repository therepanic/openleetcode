entry:
  id: 76
  title: minimum-window-substring
  call:
    cpp: Solution().minWindow("{s}", "{t}")
    rust: Solution::min_window("{s}".to_string(), "{t}".to_string())
    python3: Solution().minWindow("{s}", "{t}")
    python2: Solution().minWindow("{s}", "{t}")
    ruby: min_window("{s}", "{t}")
    java: new Solution().minWindow("{s}", "{t}")
    csharp: new Solution().MinWindow("{s}", "{t}")
    kotlin: Solution().minWindow("{s}", "{t}")
    go: minWindow("{s}", "{t}")
    dart: Solution().minWindow("{s}", "{t}")
    swift: Solution().minWindow("{s}", "{t}")
    typescript: minWindow("{s}", "{t}")
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().minWindow("{s}", "{t}", {result})
    checker:
      "import json\nfrom collections import Counter\nclass Checker:\n    def\
      \ _norm(self, result):\n        if isinstance(result, str):\n            try:\n\
      \                result = json.loads(result)\n            except Exception:\n\
      \                pass\n            if isinstance(result, str) and len(result)\
      \ >= 2 and result[0] == '\"' and result[-1] == '\"':\n                result\
      \ = result[1:-1]\n        return result\n\n    def minWindow(self, s, t, result):\n\
      \        result = self._norm(result)\n        def is_valid(sub, t_map):\n  \
      \          sub_map = Counter(sub)\n            for char, count in t_map.items():\n\
      \                if sub_map[char] < count:\n                    return False\n\
      \            return True\n        t_map = Counter(t)\n        if result == \"\
      \":\n            for i in range(len(s)):\n                for j in range(i,\
      \ len(s)):\n                    if is_valid(s[i:j+1], t_map):\n            \
      \            return False\n            return True\n        if not is_valid(result,\
      \ t_map):\n            return False\n        return True\n"
seed: 42
