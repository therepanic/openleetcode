oracle:
  python3:
    call: Checker().wordBreak(s, wordDict, {result})
    checker: "class Checker:\n    def wordBreak(self, s, wordDict, result):\n        if not isinstance(result, bool):\n            return False\n        words = set(wordDict)\n        dp = [False] * (len(s) + 1)\n        dp[0] = True\n        for i in range(1, len(s) + 1):\n            for j in range(i):\n                if dp[j] and s[j:i] in words:\n                    dp[i] = True\n                    break\n        return result == dp[-1]\n"
