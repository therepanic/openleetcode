entry:
  id: 235
  title: "lowest-common-ancestor-of-a-binary-search-tree"
  params:
    root:
      type: tree_node
    p:
      type: int
    q:
      type: int
  call:
    cpp: "treeNodeToArray(Solution().lowestCommonAncestor({root}, new TreeNode({p}), new TreeNode({q})))"
    rust: "TreeNode::tree_node_to_array(Solution::lowest_common_ancestor({root}, Some(Rc::new(RefCell::new(TreeNode::new({p})))), Some(Rc::new(RefCell::new(TreeNode::new({q}))))))"
    python3: "tree_node_to_array(Solution().lowestCommonAncestor({root}, TreeNode({p}), TreeNode({q})))"
    python2: "tree_node_to_array(Solution().lowestCommonAncestor({root}, TreeNode({p}), TreeNode({q})))"
    ruby: "tree_node_to_array(lowest_common_ancestor({root}, TreeNode.new({p}), TreeNode.new({q})))"
    java: "TreeNode.treeNodeToArray(new Solution().lowestCommonAncestor({root}, new TreeNode({p}), new TreeNode({q})))"
    csharp: "TreeNode.TreeNodeToArray(new Solution().LowestCommonAncestor({root}, new TreeNode({p}), new TreeNode({q})))"
    kotlin: "treeNodeToArray(Solution().lowestCommonAncestor({root}, TreeNode({p}), TreeNode({q})))"
    go: "treeNodeToArray(lowestCommonAncestor({root}, &TreeNode{Val: {p}}, &TreeNode{Val: {q}}))"
    dart: "tree_node_to_array(Solution().lowestCommonAncestor({root}, TreeNode({p}), TreeNode({q})))"
    swift: "tree_node_to_array(Solution().lowestCommonAncestor({root}, TreeNode({p}), TreeNode({q})))"
    typescript: "treeNodeToArray(lowestCommonAncestor({root}, new TreeNode({p}), new TreeNode({q})))"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().lowestCommonAncestor(root, p, q, {result})"
    checker: |
      from typing import Any

      class Checker:
          def lowestCommonAncestor(self, root, p, q, result: Any) -> bool:
              if result is None or root is None or p is None or q is None:
                  return False
              if isinstance(root, list):
                  root = self._build_tree(root)
              lo = min(p, q)
              hi = max(p, q)
              node = root
              while node is not None:
                  if hi < node.val:
                      node = node.left
                  elif lo > node.val:
                      node = node.right
                  else:
                      expected = self._serialize(node)
                      if isinstance(result, list):
                          return result == expected
                      if isinstance(result, dict):
                          return self._serialize(self._from_dict(result)) == expected
                      return hasattr(result, "val") and result.val == node.val
              return False

          def _build_tree(self, data):
              if not data:
                  return None
              nodes = []
              for v in data:
                  nodes.append(None if v is None else TreeNode(v))
              kids = nodes[::-1]
              root = kids.pop()
              for node in nodes:
                  if node is not None:
                      if kids:
                          node.left = kids.pop()
                      if kids:
                          node.right = kids.pop()
              return root

          def _serialize(self, node):
              if node is None:
                  return []
              out = []
              queue = [node]
              while queue:
                  cur = queue.pop(0)
                  if cur is None:
                      out.append(None)
                      continue
                  out.append(cur.val)
                  queue.append(cur.left)
                  queue.append(cur.right)
              while out and out[-1] is None:
                  out.pop()
              return out

          def _from_dict(self, data):
              if data is None:
                  return None
              node = TreeNode(data["val"])
              node.left = self._from_dict(data.get("left"))
              node.right = self._from_dict(data.get("right"))
              return node

