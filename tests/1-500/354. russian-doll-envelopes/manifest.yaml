  memory_mb: 300
oracle:
  python3:
    call: "Checker().maxEnvelopes(envelopes, {result})"
    checker: |
      from bisect import bisect_left
      from typing import Any, List

      class Checker:
          def maxEnvelopes(self, envelopes: List[List[int]], result: Any) -> bool:
              if not isinstance(result, int):
                  return False
              envs = [list(e) for e in envelopes]
              envs.sort(key=lambda x: (x[0], -x[1]))
              lis = []
              for _, h in envs:
                  i = bisect_left(lis, h)
                  if i == len(lis):
                      lis.append(h)
                  else:
                      lis[i] = h
              return result == len(lis)
