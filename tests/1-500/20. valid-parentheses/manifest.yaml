entry:
  id: 20
  title: valid-parentheses
  params:
    s:
      type: string
  call:
    cpp: Solution().isValid({s})
    rust: Solution::is_valid({s}.to_string())
    python3: Solution().isValid({s})
    python2: Solution().isValid({s})
    ruby: is_valid({s})
    java: new Solution().isValid({s})
    csharp: new Solution().IsValid({s})
    kotlin: Solution().isValid({s})
    go: isValid({s})
    dart: Solution().isValid({s})
    swift: Solution().isValid({s})
    typescript: isValid({s})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().isValid(s, {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, result):\n        if\
      \ isinstance(result, str):\n            try:\n                result = json.loads(result)\n\
      \            except Exception:\n                pass\n            if isinstance(result,\
      \ str):\n                low = result.strip().lower()\n                if low\
      \ == 'true':\n                    return True\n                if low == 'false':\n\
      \                    return False\n                if low.lstrip('-').isdigit():\n\
      \                    return int(low)\n        return result\n\n    def isValid(self,\
      \ s, result):\n        result = self._norm(result)\n        stack = []\n   \
      \     mapping = {')': '(', '}': '{', ']': '['}\n        for char in s:\n   \
      \         if char in mapping:\n                top_element = stack.pop() if\
      \ stack else '#'\n                if mapping[char] != top_element:\n       \
      \             return result == False\n            else:\n                stack.append(char)\n\
      \        return result == (not stack)\n"
seed: 42
tests:
