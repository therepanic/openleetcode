entry:
  id: 20
  title: valid-parentheses
  params:
    s:
      type: string
  call:
    cpp: "Solution().isValid({s})"
    rust: "Solution::is_valid({s})"
    python3: "Solution().isValid({s})"
    python2: "Solution().isValid({s})"
    ruby: "is_valid({s})"
    java: "new Solution().isValid({s})"
    csharp: "new Solution().IsValid({s})"
    kotlin: "Solution().isValid({s})"
    go: "isValid({s})"
    dart: "Solution().isValid({s})"
    swift: "Solution().isValid({s})"
    typescript: "isValid({s})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().isValid(s, {result})"
    checker: |
      class Checker:
          def isValid(self, s, result):
              if not isinstance(result, bool):
                  return False
              stack = []
              pairs = {')': '(', ']': '[', '}': '{'}
              for ch in s:
                  if ch in '([{':
                      stack.append(ch)
                  elif not stack or stack.pop() != pairs.get(ch):
                      return False
              expected = not stack
              return result == expected
seed: 20
tests:
  - name: Example 1
    in:
      s: "()"
    out: true
  - name: Example 2
    in:
      s: "()[]{}"
    out: true
  - name: Example 3
    in:
      s: "(]"
    out: false
  - name: Example 4
    in:
      s: "([])"
    out: true
  - name: Example 5
    in:
      s: "([)]"
    out: false
  - name: Single open parenthesis
    in:
      s: "("
    out: false
  - name: Single close parenthesis
    in:
      s: ")"
    out: false
  - name: Two pairs
    in:
      s: "()()"
    out: true
  - name: Three bracket types
    in:
      s: "[]{}()"
    out: true
  - name: Wrong close order
    in:
      s: "({)}"
    out: false
  - name: Nested valid
    in:
      s: "({[]})"
    out: true
  - name: Nested invalid
    in:
      s: "(([]){})]"
    out: false
  - name: Deep valid
    in:
      s: "({[()()]})"
    out: true
  - name: Deep invalid
    in:
      s: "({[()()]}]"
    out: false
  - name: Interleaved valid
    in:
      s: "[({})]"
    out: true
  - name: Interleaved invalid
    in:
      s: "[({)]}"
    out: false
  - name: Starts with close
    in:
      s: "](){}"
    out: false
  - name: Ends with open
    in:
      s: "()[]{"
    out: false
  - name: Mixed small valid
    in:
      s: "{[]}"
    out: true
  - name: Mixed small invalid
    in:
      s: "{[}]"
    out: false
  - name: Alternating valid
    in:
      s: "({})[]"
    out: true
  - name: Alternating invalid
    in:
      s: "({}][)"
    out: false
  - name: Close too early
    in:
      s: "((())"
    out: false
  - name: Extra close at end
    in:
      s: "(()))"
    out: false
  - name: Multiple groups valid
    in:
      s: "(()[]){}"
    out: true
  - name: Multiple groups invalid
    in:
      s: "(()[)]{}"
    out: false
  - name: Braces first
    in:
      s: "{}[]()"
    out: true
  - name: Mixed grouping valid
    in:
      s: "{[()]}[]"
    out: true
  - name: Long valid repeated pattern
    in:
      s: "()[]{}()[]{}()[]{}()[]{}()[]{}()[]{}()[]{}()[]{}()[]{}()[]{}"
    out: true
  - name: Long invalid repeated pattern
    in:
      s: "()[]{}()[]{}()[]{}()[]{}()[]{}()[]{}()[]{}()[]{}()[]{}()[]{}]"
    out: false
  - name: Long valid nested blocks
    in:
      s: "{{{{[[[[((((()))))]]]]}}}}"
    out: true
  - name: Long invalid nested blocks
    in:
      s: "{{{{[[[[((((()))))]]]]}}}]"
    out: false
  - name: Early mismatch after prefix
    in:
      s: "([{}])("
    out: false
  - name: Prefix then bad close
    in:
      s: "([{}])]"
    out: false
  - name: Valid complex mixture
    in:
      s: "{[()()]}({[]})"
    out: true
  - name: Invalid complex mixture
    in:
      s: "{[()()]}({[}])"
    out: false
  - name: Longer balanced repetition
    in:
      s: "()"
    out: true
  - name: Longer imbalanced repetition
    in:
      s: "(()"
    out: false
