    in:
      s: ()
    out: true
  - name: example 2
    in:
      s: ()[]{}
    out: true
  - name: example 3
    in:
      s: (]
    out: false
  - name: example 4
    in:
      s: ([])
    out: true
  - name: example 5
    in:
      s: ([)]
    out: false
  - name: single pair small
    in:
      s: "{}"
    out: true
  - name: single mismatch
    in:
      s: (]
    out: false
  - name: nested deep
    in:
      s: (((((((())))))))
    out: true
  - name: complex valid
    in:
      s: "{[()()]}"
    out: true
  - name: starts with closer
    in:
      s: "}{"
    out: false
  - name: ends with opener
