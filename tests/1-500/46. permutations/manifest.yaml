  id: 46
  title: permutations
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().permute({nums})"
    rust: "Solution::permute({nums})"
    python3: "Solution().permute({nums})"
    python2: "Solution().permute({nums})"
    ruby: "permute({nums})"
    java: "new Solution().permute({nums})"
    csharp: "new Solution().Permute({nums})"
    kotlin: "Solution().permute({nums})"
    go: "permute({nums})"
    dart: "Solution().permute({nums})"
    swift: "Solution().permute({nums})"
    typescript: "permute({nums})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().permute(nums, {result})"
    checker: |
      class Checker:
          def permute(self, nums, result):
              if not isinstance(result, list):
                  return False

              n = len(nums)
              expected_count = 1
              for i in range(2, n + 1):
                  expected_count *= i

              seen = set()
              for perm in result:
                  if not isinstance(perm, list) or len(perm) != n:
                      return False
                  if any(not isinstance(x, int) for x in perm):
                      return False
                  if sorted(perm) != sorted(nums):
                      return False
                  tup = tuple(perm)
                  if tup in seen:
                      return False
                  seen.add(tup)

              if len(seen) != expected_count:
                  return False

              return seen == {tuple(p) for p in __import__("itertools").permutations(nums)}
seed: 46
