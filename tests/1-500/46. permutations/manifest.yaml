entry:
  id: 46
  title: permutations
  call:
    cpp: Solution().permute(lv(vector<int>{ {nums} }))
    rust: Solution::permute(vec![{nums}])
    python3: Solution().permute([{nums}])
    python2: Solution().permute([{nums}])
    ruby: permute([{nums}])
    java: new Solution().permute(new int[]{ {nums} })
    csharp: new Solution().Permute(new int[]{ {nums} })
    kotlin: Solution().permute(intArrayOf({nums}))
    go: permute([]int{ {nums} })
    dart: Solution().permute([{nums}])
    swift: Solution().permute([{nums}])
    typescript: permute([{nums}])
judge:
  type: ignore_order
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check([{nums}], {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, result):\n        if\
      \ isinstance(result, str):\n            try:\n                result = json.loads(result)\n\
      \            except Exception:\n                pass\n        return result\n\
      \n    def check(self, nums, result):\n        result = self._norm(result)\n\
      \        import itertools\n        expected = [list(p) for p in itertools.permutations(nums)]\n\
      \        if len(result) != len(expected): return False\n        return sorted([sorted(x)\
      \ for x in result]) == sorted([sorted(x) for x in expected])\n"
seed: 42
