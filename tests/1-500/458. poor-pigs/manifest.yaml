judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().poorPigs(buckets, minutesToDie, minutesToTest, {result})"
    checker: |
      class Checker:
          def poorPigs(self, buckets, minutesToDie, minutesToTest, result):
              if not isinstance(result, int):
                  return False
              if buckets < 1 or minutesToDie < 1 or minutesToTest < minutesToDie:
                  return False
              base = minutesToTest // minutesToDie + 1
              expected = 0
              capacity = 1
              while capacity < buckets:
                  capacity *= base
                  expected += 1
              return result == expected
seed: 458
