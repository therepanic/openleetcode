entry:
  id: 473
  title: matchsticks-to-square
  params:
    matchsticks:
      type: array
      items:
        type: int
  call:
    cpp: Solution().makesquare({matchsticks})
    rust: Solution::makesquare({matchsticks})
    python3: Solution().makesquare({matchsticks})
    python2: Solution().makesquare({matchsticks})
    ruby: makesquare({matchsticks})
    java: new Solution().makesquare({matchsticks})
    csharp: new Solution().Makesquare({matchsticks})
    kotlin: Solution().makesquare({matchsticks})
    go: makesquare({matchsticks})
    dart: Solution().makesquare({matchsticks})
    swift: Solution().makesquare({matchsticks})
    typescript: makesquare({matchsticks})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: Checker().makesquare(matchsticks, {result})
    checker: |
      class Checker:
          def makesquare(self, matchsticks, result):
              return isinstance(result, bool)
seed: 473
tests:
  - name: ex1_true
    in:
      matchsticks: [1, 1, 2, 2, 2]
    out: true
  - name: ex2_false
    in:
      matchsticks: [3, 3, 3, 3, 4]
    out: false
  - name: single_one_false
    in:
      matchsticks: [1]
    out: false
  - name: single_large_false
    in:
      matchsticks: [100000000]
    out: false
  - name: two_equal_false
    in:
      matchsticks: [5, 5]
    out: false
  - name: three_equal_false
    in:
      matchsticks: [2, 2, 2]
    out: false
  - name: four_equal_true
    in:
      matchsticks: [1, 1, 1, 1]
    out: true
  - name: four_unequal_false
    in:
      matchsticks: [1, 1, 1, 2]
    out: false
  - name: all_twos_true
