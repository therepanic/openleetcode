entry:
  id: 368
  title: largest-divisible-subset
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: Solution().largestDivisibleSubset({nums})
    rust: Solution::largest_divisible_subset({nums})
    python3: Solution().largestDivisibleSubset({nums})
    python2: Solution().largestDivisibleSubset({nums})
    ruby: largest_divisible_subset({nums})
    java: new Solution().largestDivisibleSubset({nums})
    csharp: new Solution().LargestDivisibleSubset({nums})
    kotlin: Solution().largestDivisibleSubset({nums})
    go: largestDivisibleSubset({nums})
    dart: Solution().largestDivisibleSubset({nums})
    swift: Solution().largestDivisibleSubset({nums})
    typescript: largestDivisibleSubset({nums})

judge:
  type: exact

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: Checker().largestDivisibleSubset(nums, {result})
    checker: |
      class Checker:
          def largestDivisibleSubset(self, nums, result):
              if not isinstance(nums, list) or not isinstance(result, list):
                  return False
              if len(nums) == 0:
                  return False
              if len(set(nums)) != len(nums):
                  return False
              input_set = set(nums)
              if len(result) == 0:
                  return False
              if any(x not in input_set for x in result):
                  return False
              if len(set(result)) != len(result):
                  return False
              for i in range(len(result)):
                  for j in range(i + 1, len(result)):
                      a = result[i]
                      b = result[j]
                      if a % b != 0 and b % a != 0:
                          return False
              nums = sorted(nums)
              dp = [1] * len(nums)
              best = 1
              for i in range(len(nums)):
                  for j in range(i):
                      if nums[i] % nums[j] == 0 and dp[i] < dp[j] + 1:
                          dp[i] = dp[j] + 1
                  if dp[i] > best:
                      best = dp[i]
              return len(result) == best

