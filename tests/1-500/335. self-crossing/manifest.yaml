entry:
  id: 335
  title: self-crossing
  params:
    distance:
      type: array
      items:
        type: int
  call:
    cpp: Solution().isSelfCrossing({distance})
    rust: Solution::is_self_crossing({distance})
    python3: Solution().isSelfCrossing({distance})
    python2: Solution().isSelfCrossing({distance})
    ruby: is_self_crossing({distance})
    java: new Solution().isSelfCrossing({distance})
    csharp: new Solution().IsSelfCrossing({distance})
    kotlin: Solution().isSelfCrossing({distance})
    go: isSelfCrossing({distance})
    dart: Solution().isSelfCrossing({distance})
    swift: Solution().isSelfCrossing({distance})
    typescript: isSelfCrossing({distance})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(distance, {result})
    checker: "class Checker:\n    def check(self, distance, result):\n        if not isinstance(result, bool):\n            return False\n        for i in range(3, len(distance)):\n            if distance[i] >= distance[i - 2] and distance[i - 1] <= distance[i - 3]:\n                return result is True\n            if i >= 4:\n                if distance[i - 1] == distance[i - 3] and distance[i] + distance[i - 4] >= distance[i - 2]:\n                    return result is True\n            if i >= 5:\n                if (distance[i - 2] > distance[i - 4] and\n                    distance[i] >= distance[i - 2] - distance[i - 4] and\n                    distance[i - 1] >= distance[i - 3] - distance[i - 5] and\n                    distance[i - 1] <= distance[i - 3]):\n                    return result is True\n        return result is False\n"
seed: 335
