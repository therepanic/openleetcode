entry:
  id: 423
  title: reconstruct-original-digits-from-english
  params:
    s:
      type: string
  call:
    cpp: Solution().originalDigits({s})
    rust: Solution::original_digits({s})
    python3: Solution().originalDigits({s})
    python2: Solution().originalDigits({s})
    ruby: original_digits({s})
    java: new Solution().originalDigits({s})
    csharp: new Solution().OriginalDigits({s})
    kotlin: Solution().originalDigits({s})
    go: originalDigits({s})
    dart: Solution().originalDigits({s})
    swift: Solution().originalDigits({s})
    typescript: originalDigits({s})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(s, {result})"
    checker: |
      class Checker:
          WORDS = {
              '0': 'zero',
              '1': 'one',
              '2': 'two',
              '3': 'three',
              '4': 'four',
              '5': 'five',
              '6': 'six',
              '7': 'seven',
              '8': 'eight',
              '9': 'nine',
          }

          def check(self, s, result):
              if not isinstance(result, str):
                  return False
              if ''.join(sorted(result)) != result:
                  return False
              if any(ch < '0' or ch > '9' for ch in result):
                  return False
              from collections import Counter
              letters = Counter()
              for digit in result:
                  letters.update(self.WORDS[digit])
              return letters == Counter(s)
