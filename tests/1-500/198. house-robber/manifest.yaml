    dart: "Solution().rob({nums})"
    swift: "Solution().rob({nums})"
    typescript: "rob({nums})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(nums, {result})"
    checker: |
      class Checker:
          def check(self, nums, result):
              prev = 0
              curr = 0
              for num in nums:
                  prev, curr = curr, max(curr, prev + num)
              return result == curr
