  id: 198
  title: "house-robber"
  params:
    nums:
      type: "array"
      items:
        type: "int"
  call:
    cpp: "Solution().rob({nums})"
    rust: "Solution::rob({nums})"
    python3: "Solution().rob({nums})"
    python2: "Solution().rob({nums})"
    ruby: "rob({nums})"
    java: "new Solution().rob({nums})"
    csharp: "new Solution().Rob({nums})"
    kotlin: "Solution().rob({nums})"
    go: "rob({nums})"
    dart: "Solution().rob({nums})"
    swift: "Solution().rob({nums})"
    typescript: "rob({nums})"
