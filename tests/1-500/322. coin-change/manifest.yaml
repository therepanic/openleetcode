entry:
  id: 322
  title: "coin-change"
  params:
    coins:
      type: array
      items:
        type: int
    amount:
      type: int
  call:
    cpp: "Solution().coinChange({coins}, {amount})"
    rust: "Solution::coin_change({coins}, {amount})"
    python3: "Solution().coinChange({coins}, {amount})"
    python2: "Solution().coinChange({coins}, {amount})"
    ruby: "coin_change({coins}, {amount})"
    java: "new Solution().coinChange({coins}, {amount})"
    csharp: "new Solution().CoinChange({coins}, {amount})"
    kotlin: "Solution().coinChange({coins}, {amount})"
    go: "coinChange({coins}, {amount})"
    dart: "Solution().coinChange({coins}, {amount})"
    swift: "Solution().coinChange({coins}, {amount})"
    typescript: "coinChange({coins}, {amount})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().check(coins, amount, {result})"
    checker: |
      class Checker:
          def check(self, coins, amount, result):
              if not isinstance(result, int):
                  return False

              dp = [amount + 1] * (amount + 1)
              dp[0] = 0

              for i in range(1, amount + 1):
                  for coin in coins:
                      if i - coin >= 0:
                          dp[i] = min(dp[i], 1 + dp[i - coin])

              expected = dp[amount] if dp[amount] != amount + 1 else -1
              return result == expected

seed: 322322

