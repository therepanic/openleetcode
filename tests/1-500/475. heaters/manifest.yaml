entry:
  id: 475
  title: heaters
  params:
    houses:
      type: array
      items:
        type: int
    heaters:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().findRadius({houses}, {heaters})"
    rust: "Solution::find_radius({houses}, {heaters})"
    python3: "Solution().findRadius({houses}, {heaters})"
    python2: "Solution().findRadius({houses}, {heaters})"
    ruby: "find_radius({houses}, {heaters})"
    java: "new Solution().findRadius({houses}, {heaters})"
    csharp: "new Solution().FindRadius({houses}, {heaters})"
    kotlin: "Solution().findRadius({houses}, {heaters})"
    go: "findRadius({houses}, {heaters})"
    dart: "Solution().findRadius({houses}, {heaters})"
    swift: "Solution().findRadius({houses}, {heaters})"
    typescript: "findRadius({houses}, {heaters})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().findRadius(houses, heaters, {result})"
    checker: |
      class Checker:
          def findRadius(self, houses, heaters, result):
              if not isinstance(result, int):
                  return False
              if not isinstance(houses, list) or not isinstance(heaters, list):
                  return False
              if len(houses) < 1 or len(heaters) < 1:
                  return False
              if len(houses) > 30000 or len(heaters) > 30000:
                  return False
              for x in houses:
                  if not isinstance(x, int) or x < 1 or x > 1000000000:
                      return False
              for x in heaters:
                  if not isinstance(x, int) or x < 1 or x > 1000000000:
                      return False
              expected = 0
              hs = sorted(houses)
              ht = sorted(heaters)
              for house in hs:
                  left = 0
                  right = len(ht) - 1
                  while left < right:
                      mid = (left + right) // 2
                      if ht[mid] < house:
                          left = mid + 1
                      else:
                          right = mid
                  dist = abs(ht[left] - house)
                  if left > 0:
                      alt = abs(ht[left - 1] - house)
                      if alt < dist:
                          dist = alt
                  if dist > expected:
                      expected = dist
              return result == expected
