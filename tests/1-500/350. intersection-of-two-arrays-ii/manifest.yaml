entry:
  id: 350
  title: "intersection-of-two-arrays-ii"
  params:
    nums1:
      type: array
      items:
        type: int
    nums2:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().intersect({nums1}, {nums2})"
    rust: "Solution::intersect({nums1}, {nums2})"
    python3: "Solution().intersect({nums1}, {nums2})"
    python2: "Solution().intersect({nums1}, {nums2})"
    ruby: "intersect({nums1}, {nums2})"
    java: "new Solution().intersect({nums1}, {nums2})"
    csharp: "new Solution().Intersect({nums1}, {nums2})"
    kotlin: "Solution().intersect({nums1}, {nums2})"
    go: "intersect({nums1}, {nums2})"
    dart: "Solution().intersect({nums1}, {nums2})"
    swift: "Solution().intersect({nums1}, {nums2})"
    typescript: "intersect({nums1}, {nums2})"
judge:
  type: "ignore_order"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(nums1, nums2, {result})"
    checker: |
      from collections import Counter

      class Checker:
          def check(self, nums1, nums2, result):
              if not isinstance(result, list):
                  return False
              if any(not isinstance(x, int) for x in result):
                  return False
              expected = Counter(nums1) & Counter(nums2)
              return Counter(result) == expected
seed: 350350
