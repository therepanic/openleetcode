entry:
  id: 32
  title: longest-valid-parentheses
  params:
    s:
      type: string
  call:
    cpp: Solution().longestValidParentheses({s})
    rust: Solution::longest_valid_parentheses({s})
    python3: Solution().longestValidParentheses({s})
    python2: Solution().longestValidParentheses({s})
    ruby: longest_valid_parentheses({s})
    java: new Solution().longestValidParentheses({s})
    csharp: new Solution().LongestValidParentheses({s})
    kotlin: Solution().longestValidParentheses({s})
    go: longestValidParentheses({s})
    dart: Solution().longestValidParentheses({s})
    swift: Solution().longestValidParentheses({s})
    typescript: longestValidParentheses({s})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().longestValidParentheses(s, {result})"
    checker: |
      class Checker:
          def longestValidParentheses(self, s, result):
              if not isinstance(result, int):
                  return False
              if result < 0 or result > len(s):
                  return False
              return result % 2 == 0
seed: 32
