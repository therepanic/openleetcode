entry:
  id: 32
  title: longest-valid-parentheses
  call:
    cpp: Solution().longestValidParentheses("{s}")
    rust: Solution::longest_valid_parentheses("{s}".to_string())
    python3: Solution().longestValidParentheses("{s}")
    python2: Solution().longestValidParentheses("{s}")
    ruby: longest_valid_parentheses("{s}")
    java: new Solution().longestValidParentheses("{s}")
    csharp: new Solution().LongestValidParentheses("{s}")
    kotlin: Solution().longestValidParentheses("{s}")
    go: longestValidParentheses("{s}")
    dart: Solution().longestValidParentheses("{s}")
    swift: Solution().longestValidParentheses("{s}")
    typescript: longestValidParentheses("{s}")
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().longestValidParentheses("{s}", {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, result):\n        if\
      \ isinstance(result, str):\n            try:\n                result = json.loads(result)\n\
      \            except Exception:\n                pass\n            if isinstance(result,\
      \ str):\n                low = result.strip().lower()\n                if low\
      \ == 'true':\n                    return True\n                if low == 'false':\n\
      \                    return False\n                if low.lstrip('-').isdigit():\n\
      \                    return int(low)\n        return result\n\n    def longestValidParentheses(self,\
      \ s: str, result: int) -> bool:\n        result = self._norm(result)\n     \
      \   stack = [-1]\n        max_len = 0\n        for i, char in enumerate(s):\n\
      \            if char == \"(\":\n                stack.append(i)\n          \
      \  else:\n                stack.pop()\n                if not stack:\n     \
      \               stack.append(i)\n                else:\n                   \
      \ max_len = max(max_len, i - stack[-1])\n        return result == max_len\n"
seed: 42
