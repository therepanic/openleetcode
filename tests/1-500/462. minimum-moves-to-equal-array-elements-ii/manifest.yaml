entry:
  id: 462
  title: "minimum-moves-to-equal-array-elements-ii"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().minMoves2({nums})"
    rust: "Solution::min_moves2({nums})"
    python3: "Solution().minMoves2({nums})"
    python2: "Solution().minMoves2({nums})"
    ruby: "min_moves2({nums})"
    java: "new Solution().minMoves2({nums})"
    csharp: "new Solution().MinMoves2({nums})"
    kotlin: "Solution().minMoves2({nums})"
    go: "minMoves2({nums})"
    dart: "Solution().minMoves2({nums})"
    swift: "Solution().minMoves2({nums})"
    typescript: "minMoves2({nums})"
judge:
  type: "exact"
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: "Checker().minMoves2(nums, {result})"
    checker: |
      from typing import Any, List

      class Checker:
          def minMoves2(self, nums: List[int], result: Any) -> bool:
              if not isinstance(result, int):
                  return False
              if not nums:
                  return False
              nums_sorted = sorted(nums)
              median = nums_sorted[len(nums_sorted) // 2]
              expected = sum(abs(num - median) for num in nums_sorted)
              return result == expected
seed: 462
