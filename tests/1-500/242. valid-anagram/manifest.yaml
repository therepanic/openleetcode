entry:
  id: 242
  title: valid-anagram
  params:
    s:
      type: string
    t:
      type: string
  call:
    cpp: Solution().isAnagram({s}, {t})
    rust: Solution::is_anagram({s}, {t})
    python3: Solution().isAnagram({s}, {t})
    python2: Solution().isAnagram({s}, {t})
    ruby: is_anagram({s}, {t})
    java: new Solution().isAnagram({s}, {t})
    csharp: new Solution().IsAnagram({s}, {t})
    kotlin: Solution().isAnagram({s}, {t})
    go: isAnagram({s}, {t})
    dart: Solution().isAnagram({s}, {t})
    swift: Solution().isAnagram({s}, {t})
    typescript: isAnagram({s}, {t})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().isAnagram(s, t, {result})
    checker:
      "from collections import Counter\nfrom typing import Any\n\nclass Checker:\n\
      \    def isAnagram(self, s: Any, t: Any, result: Any) -> bool:\n        if not\
      \ isinstance(result, bool):\n            return False\n        if not isinstance(s,\
      \ str) or not isinstance(t, str):\n            return False\n        return\
      \ result == (len(s) == len(t) and Counter(s) == Counter(t))\n"
seed: 242
tests:
  - name: example-1
    in:
      s: anagram
      t: nagaram
    out: true
  - name: example-2
    in:
      s: rat
      t: car
    out: false
  - name: single-character-match
    in:
      s: a
      t: a
    out: true
  - name: single-character-mismatch
    in:
      s: a
      t: b
    out: false
  - name: two-characters-swapped
    in:
      s: ab
      t: ba
    out: true
  - name: two-characters-one-different
    in:
      s: ab
      t: ac
    out: false
  - name: repeated-letters-match
    in:
      s: aabbcc
      t: abcabc
    out: true
  - name: repeated-letters-mismatch
    in:
      s: aabbcc
      t: aabbcd
    out: false
  - name: different-length-shorter
    in:
      s: abcd
      t: abc
    out: false
  - name: different-length-longer
    in:
      s: abc
      t: abcd
    out: false
  - name: all-same-letter-match
    in:
      s: aaaaaa
      t: aaaaaa
    out: true
  - name: all-same-letter-mismatch
    in:
      s: aaaaaa
      t: aaaaab
    out: false
  - name: permutation-with-extra-repetition
    in:
      s: abca
      t: aabc
    out: true
  - name: missing-one-occurrence
    in:
      s: abca
      t: abcc
    out: false
  - name: sorted-versus-reversed
    in:
      s: abcdefgh
      t: hgfedcba
    out: true
  - name: close-but-not-anagram-1
    in:
      s: listen
      t: silent
    out: true
  - name: close-but-not-anagram-2
    in:
      s: triangle
      t: integral
    out: true
  - name: close-but-not-anagram-3
    in:
      s: apple
      t: pplea
    out: true
  - name: close-but-not-anagram-4
    in:
      s: apple
      t: appee
    out: false
  - name: alternating-pattern-match
    in:
      s: abababab
      t: babaabab
    out: true
  - name: alternating-pattern-mismatch
    in:
      s: abababab
      t: babaabac
    out: false
  - name: long-run-and-single-diff
    in:
      s: zzzzzzzzzzzzzzzzzzzzazzzzzzzzzzzzzzzzzzzz
      t: zzzzzzzzzzzzzzzzzzzzazzzzzzzzzzzzzzzzzzzz
    out: true
  - name: long-run-and-single-diff-false
    in:
      s: zzzzzzzzzzzzzzzzzzzzazzzzzzzzzzzzzzzzzzzz
      t: zzzzzzzzzzzzzzzzzzzzazzzzzzzzzzzzzzzzzzza
    out: false
  - name: boundary-letters-lower-half
    in:
      s: abcxyz
      t: zyxcba
    out: true
  - name: boundary-letters-lower-half-false
    in:
      s: abcxyz
      t: zyxcbb
    out: false
  - name: many-repeats-match
    in:
      s: qqqqqwwwww
      t: wwwwwqqqqq
    out: true
  - name: many-repeats-mismatch
    in:
      s: qqqqqwwwww
      t: wwwwwqqqqr
    out: false
  - name: palindromic-anagram
    in:
      s: abccba
      t: cbaabc
    out: true
  - name: palindromic-non-anagram
    in:
      s: abccba
      t: cbaabd
    out: false
  - name: long-max-size-match-1
    in:
      s: abcdefghijklmnopqrstuvwxyz
      t: zyxwvutsrqponmlkjihgfedcba
    out: true
  - name: long-max-size-match-2
    in:
      s: 
      t: 
    out: true
  - name: long-max-size-mismatch-1
    in:
      s: 
      t: 
    out: false
  - name: long-max-size-mismatch-2
    in:
      s: 
      t: 
    out: false
  - name: repeated-alphabet-match
    in:
      s: zyxwvutsrqponmlkjihgfedcba
      t: abcdefghijklmnopqrstuvwxyz
    out: true
  - name: repeated-alphabet-mismatch
    in:
      s: zyxwvutsrqponmlkjihgfedcba
      t: abcdefghijklmnopqrstuvwxyy
    out: false
  - name: near-limit-short-repetition
    in:
      s: aaaaaaaaaabbbbbbbbbbccccccccccdddddddddd
      t: ddddddddddccccccccccbbbbbbbbbbaaaaaaaaaa
    out: true
  - name: near-limit-short-repetition-false
    in:
      s: aaaaaaaaaabbbbbbbbbbccccccccccdddddddddd
      t: ddddddddddccccccccccbbbbbbbbbbbaaaaaaaaa
    out: false
  - name: generated-large-length-mismatch
    in:
      s:
        gen: "str"
        len:
          gen: "int"
          min: 50000
          max: 50000
        alphabet: abcdefghijklmnopqrstuvwxyz
      t:
        gen: "str"
        len:
          gen: "int"
          min: 49999
          max: 49999
        alphabet: abcdefghijklmnopqrstuvwxyz
    seed: 242001
  - name: generated-large-disjoint-alphabets
    in:
      s:
        gen: "str"
        len:
          gen: "int"
          min: 50000
          max: 50000
        alphabet: a
      t:
        gen: "str"
        len:
          gen: "int"
          min: 50000
          max: 50000
        alphabet: b
    seed: 242003
  - name: generated-medium-length-mismatch
    in:
      s:
        gen: "str"
        len:
          gen: "int"
          min: 1000
          max: 1000
        alphabet: abc
      t:
        gen: "str"
        len:
          gen: "int"
          min: 999
          max: 999
        alphabet: abc
    seed: 242005
