oracle:
  python3:
    call: "Checker().fractionToDecimal(numerator, denominator, {result})"
    checker: |
      import copy


      from typing import *
      from collections import *
      import copy
      import json
      import math
      import bisect
      import heapq
      import itertools
      import functools

      class Solution(object):
          def fractionToDecimal(self, numerator, denominator):
              if not numerator:
                  return "0"

              result = []
              if (numerator < 0) ^ (denominator < 0):
                  result.append("-")

              num = abs(numerator)
              den = abs(denominator)

              result.append(str(num // den))
              num %= den

              if not num:
                  return "".join(result)

              result.append(".")
              seen = {}

              while num:
                  if num in seen:
                      result.insert(seen[num], "(")
                      result.append(")")
                      break
                  seen[num] = len(result)
                  num *= 10
                  result.append(str(num // den))
                  num %= den

              return "".join(result)


      def array_to_list_node_local(values):
          dummy = ListNode(0)
          tail = dummy
          for value in values:
              tail.next = ListNode(value)
              tail = tail.next
          return dummy.next

      def array_to_tree_node_local(values):
          if not values:
              return None
          root = TreeNode(values[0])
          queue = deque([root])
          index = 1
          while queue and index < len(values):
              node = queue.popleft()
              if index < len(values) and values[index] is not None:
                  node.left = TreeNode(values[index])
                  queue.append(node.left)
              index += 1
              if index < len(values) and values[index] is not None:
                  node.right = TreeNode(values[index])
                  queue.append(node.right)
              index += 1
          return root

      def list_node_to_array_local(node):
          out = []
          seen = 0
          while node is not None and seen < 100000:
              out.append(node.val)
              node = node.next
              seen += 1
          return out

      def tree_node_to_array_local(root):
          if root is None:
              return []
          out = []
          q = deque([root])
          while q:
              node = q.popleft()
              if node is None:
                  out.append(None)
                  continue
              out.append(node.val)
              q.append(node.left)
              q.append(node.right)
          while out and out[-1] is None:
              out.pop()
          return out

      def deep_sort(value):
          if isinstance(value, list):
              normalized = [deep_sort(item) for item in value]
              return sorted(normalized, key=lambda item: json.dumps(item, sort_keys=True))
          if isinstance(value, dict):
              return {key: deep_sort(val) for key, val in sorted(value.items())}
          return value

      def normalize_expected(value):
          kind = "string"
          if kind == "list_node":
              return list_node_to_array_local(value)
          if kind == "tree_node":
              return tree_node_to_array_local(value)
          return value

      def normalize_actual(value):
          return value

      def prepare_input(value, kind):
          if kind == "tree_node":
              return array_to_tree_node_local(value)
          if kind == "list_node":
              return array_to_list_node_local(value)
          return copy.deepcopy(value)

      class Checker:
          def fractionToDecimal(self, numerator, denominator, result):
              prepared_numerator = prepare_input(numerator, "int"); prepared_denominator = prepare_input(denominator, "int")
              expected = Solution().fractionToDecimal(prepared_numerator, prepared_denominator)
              expected = normalize_expected(expected)
              actual = normalize_actual(result)
              return deep_sort(expected) == deep_sort(actual)
