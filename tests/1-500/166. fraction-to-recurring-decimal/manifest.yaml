entry:
  id: 166
  title: fraction-to-recurring-decimal
  params:
    numerator:
      type: int
    denominator:
      type: int
  call:
    cpp: Solution().fractionToDecimal({numerator}, {denominator})
    rust: Solution::fraction_to_decimal({numerator}, {denominator})
    python3: Solution().fractionToDecimal({numerator}, {denominator})
    python2: Solution().fractionToDecimal({numerator}, {denominator})
    ruby: fraction_to_decimal({numerator}, {denominator})
    java: new Solution().fractionToDecimal({numerator}, {denominator})
    csharp: new Solution().FractionToDecimal({numerator}, {denominator})
    kotlin: Solution().fractionToDecimal({numerator}, {denominator})
    go: fractionToDecimal({numerator}, {denominator})
    dart: Solution().fractionToDecimal({numerator}, {denominator})
    swift: Solution().fractionToDecimal({numerator}, {denominator})
    typescript: fractionToDecimal({numerator}, {denominator})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().fractionToDecimal(numerator, denominator, {result})
    checker: "class Checker:\n    def fractionToDecimal(self, numerator, denominator, result):\n        if numerator == 0:\n            return result == \"0\"\n\n        parts = []\n        if (numerator < 0) ^ (denominator < 0):\n            parts.append(\"-\")\n\n        num = abs(numerator)\n        den = abs(denominator)\n\n        parts.append(str(num // den))\n        num %= den\n\n        if num == 0:\n            return result == \"\".join(parts)\n\n        parts.append(\".\")\n        seen = {}\n\n        while num:\n            if num in seen:\n                parts.insert(seen[num], \"(\")\n                parts.append(\")\")\n                break\n            seen[num] = len(parts)\n            num *= 10\n            parts.append(str(num // den))\n            num %= den\n\n        return result == \"\".join(parts)\n"
seed: 166
