entry:
  id: 240
  title: search-a-2d-matrix-ii
  params:
    matrix:
      type: array
      items:
        type: array
        items:
          type: int
    target:
      type: int
  call:
    cpp: Solution().searchMatrix({matrix}, {target})
    rust: Solution::search_matrix({matrix}, {target})
    python3: Solution().searchMatrix({matrix}, {target})
    python2: Solution().searchMatrix({matrix}, {target})
    ruby: search_matrix({matrix}, {target})
    java: new Solution().searchMatrix({matrix}, {target})
    csharp: new Solution().SearchMatrix({matrix}, {target})
    kotlin: Solution().searchMatrix({matrix}, {target})
    go: searchMatrix({matrix}, {target})
    dart: Solution().searchMatrix({matrix}, {target})
    swift: Solution().searchMatrix({matrix}, {target})
    typescript: searchMatrix({matrix}, {target})

judge:
  type: exact

limits:
  time_ms: 1000
  memory_mb: 300

oracle:
  python3:
    call: Checker().searchMatrix(matrix, target, {result})
    checker: |
      from typing import Any, List

      class Checker:
          def searchMatrix(self, matrix: List[List[int]], target: int, result: Any) -> bool:
              if not isinstance(result, bool):
                  return False
              if not isinstance(matrix, list) or not matrix:
                  return False
              row_len = None
              for row in matrix:
                  if not isinstance(row, list) or not row:
                      return False
                  if row_len is None:
                      row_len = len(row)
                  elif len(row) != row_len:
                      return False
                  for x in row:
                      if not isinstance(x, int):
                          return False
              for row in matrix:
                  for a, b in zip(row, row[1:]):
                      if a > b:
                          return False
              for c in range(row_len):
                  for r in range(len(matrix) - 1):
                      if matrix[r][c] > matrix[r + 1][c]:
                          return False
              expected = any(target in row for row in matrix)
              return result == expected

seed: 240240

