entry:
  id: 221
  title: "maximal-square"
  params:
    matrix:
      type: array
      items:
        type: array
        items:
          type: string
  call:
    cpp: "Solution().maximalSquare({matrix})"
    rust: "Solution::maximal_square({matrix})"
    python3: "Solution().maximalSquare({matrix})"
    python2: "Solution().maximalSquare({matrix})"
    ruby: "maximal_square({matrix})"
    java: "new Solution().maximalSquare({matrix})"
    csharp: "new Solution().MaximalSquare({matrix})"
    kotlin: "Solution().maximalSquare({matrix})"
    go: "maximalSquare({matrix})"
    dart: "Solution().maximalSquare({matrix})"
    swift: "Solution().maximalSquare({matrix})"
    typescript: "maximalSquare({matrix})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 300

oracle:
  python3:
    call: "Checker().maximalSquare(matrix, {result})"
    checker: |
      from typing import Any, List

      class Checker:
          def maximalSquare(self, matrix: List[List[str]], result: Any) -> bool:
              if not isinstance(result, int):
                  return False
              if not matrix or not matrix[0]:
                  return False
              rows = len(matrix)
              cols = len(matrix[0])
              for row in matrix:
                  if not isinstance(row, list) or len(row) != cols:
                      return False
                  for cell in row:
                      if cell not in ("0", "1"):
                          return False

              dp = [[0] * (cols + 1) for _ in range(rows + 1)]
              best = 0
              for r in range(rows - 1, -1, -1):
                  for c in range(cols - 1, -1, -1):
                      if matrix[r][c] == "1":
                          dp[r][c] = 1 + min(dp[r + 1][c], dp[r][c + 1], dp[r + 1][c + 1])
                          best = max(best, dp[r][c])
              return result == best * best

