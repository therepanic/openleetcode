entry:
  id: 35
  title: search-insert-position
  call:
    cpp: "Solution().searchInsert({nums}, {target})"
    rust: "Solution::search_insert({nums}, {target})"
    python3: "Solution().searchInsert({nums}, {target})"
    python2: "Solution().searchInsert({nums}, {target})"
    ruby: "search_insert({nums}, {target})"
    java: "new Solution().searchInsert({nums}, {target})"
    csharp: "new Solution().SearchInsert({nums}, {target})"
    kotlin: "Solution().searchInsert({nums}, {target})"
    go: "searchInsert({nums}, {target})"
    dart: "Solution().searchInsert({nums}, {target})"
    swift: "Solution().searchInsert({nums}, {target})"
    typescript: "searchInsert({nums}, {target})"

  params:
    nums:
      type: array
      items:
        type: int
    target:
      type: int
judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().searchInsert({nums}, {target}, {result})"
    checker: |
      class Checker:
          def searchInsert(self, nums, target, result):
              ans = 0
              for x in nums:
                  if x < target:
                      ans += 1
                  else:
                      break
              return result == ans

seed: 42

tests:
  - name: "Example 1"
    in:
      nums: [1, 3, 5, 6]
      target: 5
    out: 2
  - name: "Example 2"
    in:
      nums: [1, 3, 5, 6]
      target: 2
    out: 1
  - name: "Example 3"
    in:
      nums: [1, 3, 5, 6]
      target: 7
    out: 4
  - name: "Insert at beginning"
    in:
      nums: [3, 5, 7]
      target: 1
    out: 0
  - name: "Insert at end"
    in:
      nums: [1, 3, 5]
      target: 8
    out: 3
  - name: "Single element found"
    in:
      nums: [5]
      target: 5
    out: 0
  - name: "Single element missing before"
    in:
      nums: [5]
      target: 2
    out: 0
  - name: "Single element missing after"
    in:
      nums: [5]
      target: 8
    out: 1
  - name: "Empty array logic (not possible by constraint, but checking logic)"
    in:
      nums: [1]
      target: 0
    out: 0
  - name: "All negative values"
    in:
