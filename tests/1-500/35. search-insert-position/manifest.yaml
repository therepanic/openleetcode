      type: array
      items:
        type: int
    target:
      type: int
  call:
    cpp: "Solution().searchInsert({nums}, {target})"
    rust: "Solution::search_insert({nums}, {target})"
    python3: "Solution().searchInsert({nums}, {target})"
    python2: "Solution().searchInsert({nums}, {target})"
    ruby: "search_insert({nums}, {target})"
    java: "new Solution().searchInsert({nums}, {target})"
    csharp: "new Solution().SearchInsert({nums}, {target})"
    kotlin: "Solution().searchInsert({nums}, {target})"
    go: "searchInsert({nums}, {target})"
    dart: "Solution().searchInsert({nums}, {target})"
    swift: "Solution().searchInsert({nums}, {target})"
    typescript: "searchInsert({nums}, {target})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(nums, target, {result})"
    checker: |
      class Checker:
          def check(self, nums, target, result):
              expected = 0
              while expected < len(nums) and nums[expected] < target:
                  expected += 1
              return result == expected
seed: 35
