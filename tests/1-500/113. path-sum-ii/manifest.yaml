judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().pathSum(root, targetSum, {result})"
    checker: |
      class Checker:
          def pathSum(self, root, targetSum, result):
              if not isinstance(result, list):
                  return False
              for path in result:
                  if not isinstance(path, list) or not all(isinstance(v, int) for v in path):
                      return False
              if root is None or root == []:
                  return result == []
              if not isinstance(root, list):
                  return False

              expected = []

              def dfs(i, acc, path):
                  if i >= len(root) or root[i] is None:
                      return
                  val = root[i]
                  path.append(val)
                  acc += val
                  left = 2 * i + 1
                  right = 2 * i + 2
                  has_left = left < len(root) and root[left] is not None
                  has_right = right < len(root) and root[right] is not None
                  if not has_left and not has_right:
                      if acc == targetSum:
                          expected.append(path[:])
                  else:
                      dfs(left, acc, path)
                      dfs(right, acc, path)
                  path.pop()

              dfs(0, 0, [])
              return sorted(result) == sorted(expected)
seed: 113
