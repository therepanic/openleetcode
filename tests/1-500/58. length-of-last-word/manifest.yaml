entry:
  id: 58
  title: length-of-last-word
  call:
    cpp: Solution().lengthOfLastWord({s})
    rust: Solution::length_of_last_word({s})
    python3: Solution().lengthOfLastWord({s})
    python2: Solution().lengthOfLastWord({s})
    ruby: length_of_last_word({s})
    java: new Solution().lengthOfLastWord({s})
    csharp: new Solution().LengthOfLastWord({s})
    kotlin: Solution().lengthOfLastWord({s})
    go: lengthOfLastWord({s})
    dart: Solution().lengthOfLastWord({s})
    swift: Solution().lengthOfLastWord({s})
    typescript: lengthOfLastWord({s})
  params:
    s:
      type: string
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: lengthOfLastWord(s, {result})
    checker: |
      import json

      def lengthOfLastWord(s, result):
          try:
              result = json.loads(result) if isinstance(result, str) else result
          except Exception:
              return False
          words = s.split()
          expected = len(words[-1]) if words else 0
          return expected == result
seed: 42
tests:
  - name: Example 1
    in:
      s: Hello World
    out: 5
  - name: Example 2
    in:
      s: "   fly me   to   the moon  "
    out: 4
  - name: Example 3
    in:
      s: luffy is still joyboy
    out: 6
  - name: Single word
    in:
      s: a
    out: 1
  - name: Single word with spaces
    in:
      s: "   hello   "
    out: 5
  - name: Two words
    in:
      s: ab cd
    out: 2
  - name: Only spaces
    in:
      s: "          "
    out: 0
  - name: Long trailing spaces
    in:
      s: "word      "
    out: 4
  - name: Leading spaces
    in:
      s: "  word"
    out: 4
  - name: Mixed spaces
    in:
      s: " a b c d e "
    out: 1
  - name: All same characters
    in:
      s: aaaaa
    out: 5
  - name: Multiple words joined
    in:
      s: longestwordinthesentence
    out: 24
  - name: Max length constraint
    in:
      s: a
    out: 1
  - name: Large random string test 1
    in:
      s:
        gen: str
        len: 5000
        alphabet: a b
  - name: Large random string test 2
    in:
      s:
        gen: str
        len: 10000
        alphabet: "z "
  - name: Only alphabet
    in:
      s: abcdefghijklmnopqrstuvwxyz
    out: 26
  - name: Uppercase words
    in:
      s: HELLO WORLD
    out: 5
  - name: Mixed case
    in:
      s: Hello wOrLd
    out: 5
  - name: Words with space in middle
    in:
      s: a b
    out: 1
  - name: Trailing space edge
    in:
      s: "abc "
    out: 3
  - name: Leading space edge
    in:
      s: " abc"
    out: 3
  - name: Multiple trailing spaces
    in:
      s: "abc   "
    out: 3
  - name: Multiple internal spaces
    in:
      s: abc    def
    out: 3
  - name: Shortest valid input
    in:
      s: z
    out: 1
  - name: Generated alphanumeric spaces
    in:
      s:
        gen: str
        len: 100
        alphabet: "ab "
  - name: Trailing space buffer
    in:
      s: "a                  "
    out: 1
