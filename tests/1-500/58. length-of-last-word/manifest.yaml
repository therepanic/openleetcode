entry:
  id: 58
  title: length-of-last-word
  params:
    s:
      type: string
  call:
    cpp: Solution().lengthOfLastWord({s})
    rust: Solution::length_of_last_word({s})
    python3: Solution().lengthOfLastWord({s})
    python2: Solution().lengthOfLastWord({s})
    ruby: length_of_last_word({s})
    java: new Solution().lengthOfLastWord({s})
    csharp: new Solution().LengthOfLastWord({s})
    kotlin: Solution().lengthOfLastWord({s})
    go: lengthOfLastWord({s})
    dart: Solution().lengthOfLastWord({s})
    swift: Solution().lengthOfLastWord({s})
    typescript: lengthOfLastWord({s})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().lengthOfLastWord(s, {result})
    checker: |
      import json

      class Checker:
          def lengthOfLastWord(self, s, result):
              try:
                  result = json.loads(result) if isinstance(result, str) else result
              except Exception:
                  return False
              if not isinstance(s, str):
                  return False
              if not isinstance(result, int):
                  return False
              if any(ch not in "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz " for ch in s):
                  return False
              if len(s) < 1 or len(s) > 10000:
                  return False
              words = s.split()
              expected = len(words[-1]) if words else 0
              return expected == result
seed: 58
tests:
  - name: Example 1
    in:
      s: Hello World
    out: 5
  - name: Example 2
    in:
      s: "   fly me   to   the moon  "
    out: 4
  - name: Example 3
    in:
      s: luffy is still joyboy
    out: 6
