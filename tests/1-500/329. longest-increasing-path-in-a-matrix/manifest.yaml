entry:
  id: 329
  title: longest-increasing-path-in-a-matrix
  params:
    matrix:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().longestIncreasingPath({matrix})"
    rust: "Solution::longest_increasing_path({matrix})"
    python3: "Solution().longestIncreasingPath({matrix})"
    python2: "Solution().longestIncreasingPath({matrix})"
    ruby: "longest_increasing_path({matrix})"
    java: "new Solution().longestIncreasingPath({matrix})"
    csharp: "new Solution().LongestIncreasingPath({matrix})"
    kotlin: "Solution().longestIncreasingPath({matrix})"
    go: "longestIncreasingPath({matrix})"
    dart: "Solution().longestIncreasingPath({matrix})"
    swift: "Solution().longestIncreasingPath({matrix})"
    typescript: "longestIncreasingPath({matrix})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().longestIncreasingPath(matrix, {result})"
    checker: |
      class Checker:
          def longestIncreasingPath(self, matrix, result):
              if not matrix or not matrix[0]:
                  return False

              rows = len(matrix)
              cols = len(matrix[0])
              dp = [[0] * cols for _ in range(rows)]

              def dfs(i, j):
                  if dp[i][j]:
                      return dp[i][j]

                  value = matrix[i][j]
                  best = 1
                  if i > 0 and matrix[i - 1][j] > value:
                      best = max(best, 1 + dfs(i - 1, j))
                  if i + 1 < rows and matrix[i + 1][j] > value:
                      best = max(best, 1 + dfs(i + 1, j))
                  if j > 0 and matrix[i][j - 1] > value:
                      best = max(best, 1 + dfs(i, j - 1))
                  if j + 1 < cols and matrix[i][j + 1] > value:
                      best = max(best, 1 + dfs(i, j + 1))

                  dp[i][j] = best
                  return best

              expected = 0
              for i in range(rows):
                  for j in range(cols):
                      expected = max(expected, dfs(i, j))

              return result == expected
seed: 329
