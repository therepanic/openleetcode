entry:
  id: 376
  title: wiggle-subsequence
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: Solution().wiggleMaxLength({nums})
    rust: Solution::wiggle_max_length({nums})
    python3: Solution().wiggleMaxLength({nums})
    python2: Solution().wiggleMaxLength({nums})
    ruby: wiggle_max_length({nums})
    java: new Solution().wiggleMaxLength({nums})
    csharp: new Solution().WiggleMaxLength({nums})
    kotlin: Solution().wiggleMaxLength({nums})
    go: wiggleMaxLength({nums})
    dart: Solution().wiggleMaxLength({nums})
    swift: Solution().wiggleMaxLength({nums})
    typescript: wiggleMaxLength({nums})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().wiggleMaxLength(nums, {result})"
    checker: |
      class Checker:
          def wiggleMaxLength(self, nums, result):
              if not isinstance(result, int):
                  return False
              if len(nums) < 2:
                  return result == len(nums)
              up = 1
              down = 1
              for i in range(1, len(nums)):
                  if nums[i] > nums[i - 1]:
                      up = down + 1
                  elif nums[i] < nums[i - 1]:
                      down = up + 1
              expected = up if up > down else down
              return result == expected
seed: 376
