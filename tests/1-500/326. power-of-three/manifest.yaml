judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().isPowerOfThree(n, {result})"
    checker: |
      class Checker:
          def isPowerOfThree(self, n, result):
              if n <= 0:
                  return result is False
              while n % 3 == 0:
                  n //= 3
              return result == (n == 1)
