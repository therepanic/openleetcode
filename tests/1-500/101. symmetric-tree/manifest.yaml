entry:
  id: 101
  title: "symmetric-tree"
  params:
    root:
      type: tree_node
  call:
    cpp: "Solution().isSymmetric({root})"
    rust: "Solution::is_symmetric({root})"
    python3: "Solution().isSymmetric({root})"
    python2: "Solution().isSymmetric({root})"
    ruby: "is_symmetric({root})"
    java: "new Solution().isSymmetric({root})"
    csharp: "new Solution().IsSymmetric({root})"
    kotlin: "Solution().isSymmetric({root})"
    go: "isSymmetric({root})"
    dart: "Solution().isSymmetric({root})"
    swift: "Solution().isSymmetric({root})"
    typescript: "isSymmetric({root})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().isSymmetric(root, {result})"
    checker: |
      class Checker:
          def isSymmetric(self, root, result) -> bool:
              if not isinstance(result, bool):
                  return False
              if root is None or root == []:
                  return result is True
              if not isinstance(root, list):
                  return False

              def mirror(i, j):
                  left_exists = i < len(root) and root[i] is not None
                  right_exists = j < len(root) and root[j] is not None
                  if not left_exists or not right_exists:
                      return left_exists == right_exists
                  if root[i] != root[j]:
                      return False
                  return mirror(2 * i + 1, 2 * j + 2) and mirror(2 * i + 2, 2 * j + 1)

              return result == mirror(1, 2)

seed: 101

