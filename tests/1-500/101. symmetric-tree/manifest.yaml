entry:
  id: 101
  title: "symmetric-tree"
  params:
    root:
      type: "tree_node"
  call:
    cpp: "Solution().isSymmetric({root})"
    rust: "Solution::is_symmetric({root})"
    python3: "Solution().isSymmetric({root})"
    python2: "Solution().isSymmetric({root})"
    ruby: "is_symmetric({root})"
    java: "new Solution().isSymmetric({root})"
    csharp: "new Solution().IsSymmetric({root})"
    kotlin: "Solution().isSymmetric({root})"
    go: "isSymmetric({root})"
    dart: "Solution().isSymmetric({root})"
    swift: "Solution().isSymmetric({root})"
    typescript: "isSymmetric({root})"
judge:
  type: "exact"
limits:
  time_ms: 2000
  memory_mb: 512
oracle:
  python3:
    call: "Checker().isSymmetric(root, {result})"
    checker: |
      import copy

      from typing import Optional

      class Solution:
          def isSymmetric(self, root: Optional[TreeNode]) -> bool:
              def mirror(left: Optional[TreeNode], right: Optional[TreeNode]) -> bool:
                  if left is None or right is None:
                      return left is right
                  return (
                      left.val == right.val
                      and mirror(left.left, right.right)
                      and mirror(left.right, right.left)
                  )

              return True if root is None else mirror(root.left, root.right)

      def array_to_list_node_local(values):
          dummy = ListNode(0)
          tail = dummy
          for value in values:
              tail.next = ListNode(value)
              tail = tail.next
          return dummy.next

      def array_to_tree_node_local(values):
          if not values:
              return None
          root = TreeNode(values[0])
          queue = deque([root])
          index = 1
          while queue and index < len(values):
              node = queue.popleft()
              if index < len(values) and values[index] is not None:
                  node.left = TreeNode(values[index])
                  queue.append(node.left)
              index += 1
              if index < len(values) and values[index] is not None:
                  node.right = TreeNode(values[index])
                  queue.append(node.right)
              index += 1
          return root

      def list_node_to_array_local(node):
          out = []
          seen = 0
          while node is not None and seen < 100000:
              out.append(node.val)
              node = node.next
              seen += 1
          return out

      def tree_node_to_array_local(root):
          if root is None:
              return []
          out = []
          q = deque([root])
          while q:
              node = q.popleft()
              if node is None:
                  out.append(None)
                  continue
              out.append(node.val)
              q.append(node.left)
              q.append(node.right)
          while out and out[-1] is None:
              out.pop()
          return out

      def deep_sort(value):
          if isinstance(value, list):
              normalized = [deep_sort(item) for item in value]
              return sorted(normalized, key=lambda item: json.dumps(item, sort_keys=True))
          if isinstance(value, dict):
              return {key: deep_sort(val) for key, val in sorted(value.items())}
          return value

      def normalize_expected(value):
          kind = "bool"
          if kind == "list_node":
              return list_node_to_array_local(value)
          if kind == "tree_node":
              return tree_node_to_array_local(value)
          return value

      def normalize_actual(value):
          return value

      def prepare_input(value, kind):
          if kind == "tree_node":
              return array_to_tree_node_local(value)
          if kind == "list_node":
              return array_to_list_node_local(value)
          return copy.deepcopy(value)

      class Checker:
          def isSymmetric(self, root, result):
              prepared_root = prepare_input(root, "tree_node")
              expected = Solution().isSymmetric(prepared_root)
              expected = normalize_expected(expected)
              actual = normalize_actual(result)
              return deep_sort(expected) == deep_sort(actual)
