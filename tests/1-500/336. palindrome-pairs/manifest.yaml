judge:
  type: ignore_order
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(words, {result})"
    checker: |
      class Checker:
          def check(self, words, result):
              if not isinstance(result, list):
                  return False
              seen = set()
              normalized = []
              for item in result:
                  if (
                      not isinstance(item, list)
                      or len(item) != 2
                      or not all(isinstance(x, int) for x in item)
                  ):
                      return False
                  pair = (item[0], item[1])
                  if pair in seen:
                      return False
                  seen.add(pair)
                  normalized.append(pair)

              n = len(words)
              expected = set()
              for i in range(n):
                  for j in range(n):
                      if i != j and words[i] + words[j] == (words[i] + words[j])[::-1]:
                          expected.add((i, j))

              return seen == expected
