entry:
  id: 467
  title: unique-substrings-in-wraparound-string
  params:
    s:
      type: string
  call:
    cpp: "Solution().findSubstringInWraproundString({s})"
    rust: "Solution::find_substring_in_wrapround_string({s})"
    python3: "Solution().findSubstringInWraproundString({s})"
    python2: "Solution().findSubstringInWraproundString({s})"
    ruby: "find_substring_in_wrapround_string({s})"
    java: "new Solution().findSubstringInWraproundString({s})"
    csharp: "new Solution().FindSubstringInWraproundString({s})"
    kotlin: "Solution().findSubstringInWraproundString({s})"
    go: "findSubstringInWraproundString({s})"
    dart: "Solution().findSubstringInWraproundString({s})"
    swift: "Solution().findSubstringInWraproundString({s})"
    typescript: "findSubstringInWraproundString({s})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(s, {result})"
    checker: |
      class Checker:
          def check(self, s, result):
              if not isinstance(result, int):
                  return False
              counts = [0] * 26
              streak = 0
              for i, ch in enumerate(s):
                  if i > 0 and (ord(ch) - ord(s[i - 1])) % 26 == 1:
                      streak += 1
                  else:
                      streak = 1
                  idx = ord(ch) - ord('a')
                  if streak > counts[idx]:
                      counts[idx] = streak
              expected = sum(counts)
              return result == expected
seed: 467
