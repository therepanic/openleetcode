entry:
  id: 464
  title: "can-i-win"
  params:
    maxChoosableInteger:
      type: int
    desiredTotal:
      type: int
  call:
    cpp: "Solution().canIWin({maxChoosableInteger}, {desiredTotal})"
    rust: "Solution::can_i_win({maxChoosableInteger}, {desiredTotal})"
    python3: "Solution().canIWin({maxChoosableInteger}, {desiredTotal})"
    python2: "Solution().canIWin({maxChoosableInteger}, {desiredTotal})"
    ruby: "can_i_win({maxChoosableInteger}, {desiredTotal})"
    java: "new Solution().canIWin({maxChoosableInteger}, {desiredTotal})"
    csharp: "new Solution().CanIWin({maxChoosableInteger}, {desiredTotal})"
    kotlin: "Solution().canIWin({maxChoosableInteger}, {desiredTotal})"
    go: "canIWin({maxChoosableInteger}, {desiredTotal})"
    dart: "Solution().canIWin({maxChoosableInteger}, {desiredTotal})"
    swift: "Solution().canIWin({maxChoosableInteger}, {desiredTotal})"
    typescript: "canIWin({maxChoosableInteger}, {desiredTotal})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 300

oracle:
  python3:
    call: "Checker().canIWin(maxChoosableInteger, desiredTotal, {result})"
    checker: |
      class Checker:
          def canIWin(self, maxChoosableInteger, desiredTotal, result):
              if not isinstance(result, bool):
                  return False

              if desiredTotal <= 0:
                  return result is True

              if maxChoosableInteger * (maxChoosableInteger + 1) // 2 < desiredTotal:
                  return result is False

              memo = {}

              def can_win(mask, total):
                  key = (mask, total)
                  if key in memo:
                      return memo[key]
                  for i in range(maxChoosableInteger):
                      bit = 1 << i
                      if mask & bit:
                          continue
                      pick = i + 1
                      if pick >= total or not can_win(mask | bit, total - pick):
                          memo[key] = True
                          return True
                  memo[key] = False
                  return False

              return result is can_win(0, desiredTotal)

seed: 464

