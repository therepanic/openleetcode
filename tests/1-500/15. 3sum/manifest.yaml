      - - -2
        - 0
        - 2
      - - -2
        - 1
        - 1
      - - -1
        - -1
        - 2
      - - -1
        - 0
        - 1
  - name: Alternating sign
    in:
      nums:
        - 5
        - -5
        - 5
        - -5
        - 5
        - -5
    out: []
  - name: Large test 2
    in:
      nums:
        gen: array
        len: 2500
        of:
          gen: int
          min: -50000
          max: 50000
  - name: Triplets with same values
    in:
      nums:
        - -2
        - -2
        - 4
        - 4
    out:
