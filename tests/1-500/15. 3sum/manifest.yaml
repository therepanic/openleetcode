oracle:
  python3:
    call: Checker().threeSum(nums, {result})
    checker: |
      class Checker:
          def threeSum(self, nums, result):
              if not isinstance(result, list):
                  return False

              seen = set()
              actual = set()
              for triplet in result:
                  if not isinstance(triplet, list) or len(triplet) != 3:
                      return False
                  if any(not isinstance(x, int) for x in triplet):
                      return False
                  if triplet != sorted(triplet):
                      return False
                  if triplet[0] + triplet[1] + triplet[2] != 0:
                      return False
                  tup = tuple(triplet)
                  if tup in seen:
                      return False
                  seen.add(tup)
                  actual.add(tup)

              nums_sorted = sorted(nums)
              expected = set()
              n = len(nums_sorted)
              for i in range(n - 2):
                  if i > 0 and nums_sorted[i] == nums_sorted[i - 1]:
                      continue
                  j, k = i + 1, n - 1
                  while j < k:
                      total = nums_sorted[i] + nums_sorted[j] + nums_sorted[k]
                      if total == 0:
                          expected.add((nums_sorted[i], nums_sorted[j], nums_sorted[k]))
                          j += 1
                          k -= 1
                          while j < k and nums_sorted[j] == nums_sorted[j - 1]:
                              j += 1
                      elif total < 0:
                          j += 1
                      else:
                          k -= 1

              return actual == expected
seed: 15
