      - - 0
        - 0
        - 0
  - name: Boundary mixed
    in:
      nums:
        - -100000
        - -100000
        - 100000
        - 100000
    out: []
  - name: Reflective inputs
    in:
      nums:
        - -2
        - -1
        - 0
        - 1
        - 2
    out:
      - - -2
        - 0
        - 2
      - - -1
        - 0
        - 1
