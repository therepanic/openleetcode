        - -100
        - -50
        - 0
        - 50
        - 100
    out:
      - - -100
        - 0
        - 100
      - - -50
        - 0
        - 50
  - name: Multiple identical positive combinations
    in:
      nums:
        - -4
        - 2
        - 2
        - 2
        - 2
    out:
      - - -4
        - 2
        - 2
  - name: Only positive
    in:
      nums:
        - 1
        - 2
        - 3
        - 4
        - 5
    out: []
  - name: Only negative
    in:
      nums:
        - -1
        - -2
        - -3
        - -4
    out: []
  - name: Single solution set
    in:
