entry:
  id: 15
  title: 3sum
  call:
    cpp: Solution().threeSum({nums})
    rust: Solution::three_sum({nums})
    python3: Solution().threeSum({nums})
    python2: Solution().threeSum({nums})
    ruby: three_sum({nums})
    java: new Solution().threeSum({nums})
    csharp: new Solution().ThreeSum({nums})
    kotlin: Solution().threeSum({nums})
    go: threeSum({nums})
    dart: Solution().threeSum({nums})
    swift: Solution().threeSum({nums})
    typescript: threeSum({nums})
  params:
    nums:
      type: array
      items:
        type: int
judge:
  type: ignore_order
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check({nums}, {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, result):\n        if isinstance(result, str):\n           \
      \ try:\n                result = json.loads(result)\n            except Exception:\n                pass\n        return
      result\n\n    def check(self, nums, result):\n        result = self._norm(result)\n        nums.sort()\n        expected
      = []\n        n = len(nums)\n        for i in range(n - 2):\n            if i > 0 and nums[i] == nums[i - 1]:\n    \
      \            continue\n            j, k = i + 1, n - 1\n            while j < k:\n                s = nums[i] + nums[j]
      + nums[k]\n                if s == 0:\n                    expected.append([nums[i], nums[j], nums[k]])\n          \
      \          j += 1\n                    k -= 1\n                    while j < k and nums[j] == nums[j - 1]:\n       \
      \                 j += 1\n                elif s < 0:\n                    j += 1\n                else:\n         \
      \           k -= 1\n        res_sorted = sorted([sorted(x) for x in result])\n        exp_sorted = sorted([sorted(x)
      for x in expected])\n        return res_sorted == exp_sorted\n"
seed: 42
tests:
  - name: Example 1
    in:
      nums:
        - -1
        - 0
        - 1
        - 2
        - -1
        - -4
    out:
      - - -1
        - -1
        - 2
      - - -1
        - 0
        - 1
  - name: Example 2
    in:
      nums:
        - 0
        - 1
        - 1
    out: []
  - name: Example 3
    in:
      nums:
        - 0
        - 0
        - 0
    out:
      - - 0
        - 0
        - 0
  - name: All zeros
    in:
      nums:
        - 0
        - 0
        - 0
        - 0
        - 0
    out:
      - - 0
        - 0
        - 0
  - name: Empty triplets
    in:
      nums:
        - -5
        - -2
        - 10
    out: []
  - name: Minimum length triplet
    in:
      nums:
        - -1
        - 0
        - 1
    out:
      - - -1
        - 0
        - 1
  - name: Large values boundary
    in:
      nums:
        - -100000
        - 0
        - 100000
    out:
      - - -100000
        - 0
        - 100000
  - name: Duplicates everywhere
    in:
      nums:
        - -1
        - -1
        - -1
        - 1
        - 1
        - 1
        - 0
        - 0
        - 0
    out:
      - - -1
        - 0
        - 1
      - - 0
        - 0
        - 0
  - name: Negative sum result
    in:
      nums:
        - -5
        - -5
        - 10
        - -2
        - -8
        - 10
        - -5
        - 15
    out:
      - - -8
        - -2
        - 10
      - - -5
        - -5
        - 10
  - name: Mixed order
    in:
      nums:
        - 1
        - -1
        - 2
        - -2
        - 3
        - -3
    out:
      - - -3
        - 1
        - 2
      - - -2
        - -1
        - 3
  - name: Max constraints small values
    in:
      nums:
        gen: array
        len: 3000
        of:
          gen: int
          min: -10
          max: 10
  - name: Large scale test
    in:
      nums:
        gen: array
        len: 2000
        of:
          gen: int
          min: -100000
          max: 100000
  - name: Sparse zero presence
