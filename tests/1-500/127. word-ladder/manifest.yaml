  memory_mb: 512
oracle:
  python3:
    call: "Checker().ladderLength(beginWord, endWord, wordList, {result})"
    checker: |
      import copy

      from typing import List

      from collections import deque


      class Solution:
          def ladderLength(self, beginWord: str, endWord: str, wordList: List[str]) -> int:
              word_set = set(wordList)
              if endWord not in word_set:
                  return 0

              queue = deque([(beginWord, 1)])
              while queue:
                  word, steps = queue.popleft()
                  if word == endWord:
                      return steps

                  for i in range(len(word)):
                      prefix = word[:i]
                      suffix = word[i + 1 :]
                      for code in range(ord("a"), ord("z") + 1):
                          candidate = prefix + chr(code) + suffix
                          if candidate in word_set:
                              word_set.remove(candidate)
                              queue.append((candidate, steps + 1))

              return 0

      def array_to_list_node_local(values):
          dummy = ListNode(0)
          tail = dummy
          for value in values:
              tail.next = ListNode(value)
              tail = tail.next
          return dummy.next

      def array_to_tree_node_local(values):
          if not values:
              return None
          root = TreeNode(values[0])
          queue = deque([root])
          index = 1
          while queue and index < len(values):
              node = queue.popleft()
              if index < len(values) and values[index] is not None:
                  node.left = TreeNode(values[index])
                  queue.append(node.left)
              index += 1
              if index < len(values) and values[index] is not None:
                  node.right = TreeNode(values[index])
                  queue.append(node.right)
              index += 1
          return root

      def list_node_to_array_local(node):
          out = []
          seen = 0
          while node is not None and seen < 100000:
              out.append(node.val)
              node = node.next
              seen += 1
          return out

      def tree_node_to_array_local(root):
          if root is None:
              return []
          out = []
          q = deque([root])
          while q:
              node = q.popleft()
              if node is None:
                  out.append(None)
                  continue
              out.append(node.val)
              q.append(node.left)
              q.append(node.right)
          while out and out[-1] is None:
              out.pop()
          return out

      def deep_sort(value):
          if isinstance(value, list):
              normalized = [deep_sort(item) for item in value]
              return sorted(normalized, key=lambda item: json.dumps(item, sort_keys=True))
          if isinstance(value, dict):
              return {key: deep_sort(val) for key, val in sorted(value.items())}
          return value

      def normalize_expected(value):
          kind = "int"
          if kind == "list_node":
              return list_node_to_array_local(value)
          if kind == "tree_node":
              return tree_node_to_array_local(value)
          return value

      def normalize_actual(value):
          return value

      def prepare_input(value, kind):
          if kind == "tree_node":
              return array_to_tree_node_local(value)
          if kind == "list_node":
              return array_to_list_node_local(value)
          return copy.deepcopy(value)

      class Checker:
          def ladderLength(self, beginWord, endWord, wordList, result):
              prepared_beginWord = prepare_input(beginWord, "string"); prepared_endWord = prepare_input(endWord, "string"); prepared_wordList = prepare_input(wordList, "array[string]")
              expected = Solution().ladderLength(prepared_beginWord, prepared_endWord, prepared_wordList)
              expected = normalize_expected(expected)
              actual = normalize_actual(result)
              return deep_sort(expected) == deep_sort(actual)
seed: 127
