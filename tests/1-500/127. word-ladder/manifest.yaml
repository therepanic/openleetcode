    rust: "Solution::ladder_length({beginWord}, {endWord}, {wordList})"
    python3: "Solution().ladderLength({beginWord}, {endWord}, {wordList})"
    python2: "Solution().ladderLength({beginWord}, {endWord}, {wordList})"
    ruby: "ladder_length({beginWord}, {endWord}, {wordList})"
    java: "new Solution().ladderLength({beginWord}, {endWord}, {wordList})"
    csharp: "new Solution().LadderLength({beginWord}, {endWord}, {wordList})"
    kotlin: "Solution().ladderLength({beginWord}, {endWord}, {wordList})"
