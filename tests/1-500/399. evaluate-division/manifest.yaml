entry:
  id: 399
  title: evaluate-division
  params:
    equations:
      type: array
      items:
        type: array
        items:
          type: string
    values:
      type: array
      items:
        type: float
    queries:
      type: array
      items:
        type: array
        items:
          type: string
  call:
    cpp: "Solution().calcEquation({equations}, {values}, {queries})"
    rust: "Solution::calc_equation({equations}, {values}, {queries})"
    python3: "Solution().calcEquation({equations}, {values}, {queries})"
    python2: "Solution().calcEquation({equations}, {values}, {queries})"
    ruby: "calc_equation({equations}, {values}, {queries})"
    java: "new Solution().calcEquation({equations}, {values}, {queries})"
    csharp: "new Solution().CalcEquation({equations}, {values}, {queries})"
    kotlin: "Solution().calcEquation({equations}, {values}, {queries})"
    go: "calcEquation({equations}, {values}, {queries})"
    dart: "Solution().calcEquation({equations}, {values}, {queries})"
    swift: "Solution().calcEquation({equations}, {values}, {queries})"
    typescript: "calcEquation({equations}, {values}, {queries})"
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().calcEquation(equations, values, queries, {result})"
    checker: |
      class Checker:
          def calcEquation(self, equations, values, queries, result):
              if not isinstance(result, list) or len(result) != len(queries):
                  return False
              g = {}
              for pair, value in zip(equations, values):
                  if not isinstance(pair, list) or len(pair) != 2:
                      return False
                  a, b = pair
                  g.setdefault(a, {})[b] = value
                  g.setdefault(b, {})[a] = 1.0 / value

              def expected(x, y):
                  if x not in g or y not in g:
                      return -1.0
                  stack = [(x, 1.0)]
                  seen = set()
                  while stack:
                      node, ratio = stack.pop()
                      if node == y:
                          return ratio
                      if node in seen:
                          continue
                      seen.add(node)
                      for nxt, weight in g[node].items():
                          if nxt not in seen:
                              stack.append((nxt, ratio * weight))
                  return -1.0

              for (a, b), actual in zip(queries, result):
                  if not isinstance(actual, (int, float)):
                      return False
                  exp = expected(a, b)
                  if exp == -1.0:
                      if actual != -1.0:
                          return False
                  else:
                      if abs(actual - exp) > 1e-9:
                          return False
              return True
seed: 399
