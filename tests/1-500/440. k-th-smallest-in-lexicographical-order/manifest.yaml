entry:
  id: 440
  title: "k-th-smallest-in-lexicographical-order"
  params:
    n:
      type: int
    k:
      type: int
  call:
    cpp: "Solution().findKthNumber({n}, {k})"
    rust: "Solution::find_kth_number({n}, {k})"
    python3: "Solution().findKthNumber({n}, {k})"
    python2: "Solution().findKthNumber({n}, {k})"
    ruby: "find_kth_number({n}, {k})"
    java: "new Solution().findKthNumber({n}, {k})"
    csharp: "new Solution().FindKthNumber({n}, {k})"
    kotlin: "Solution().findKthNumber({n}, {k})"
    go: "findKthNumber({n}, {k})"
    dart: "Solution().findKthNumber({n}, {k})"
    swift: "Solution().findKthNumber({n}, {k})"
    typescript: "findKthNumber({n}, {k})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().findKthNumber(n, k, {result})"
    checker: |
      class Checker:
          def findKthNumber(self, n, k, result):
              if not isinstance(result, int):
                  return False
              if not (1 <= k <= n <= 1000000000):
                  return False
              curr = 1
              kk = k - 1

              def count(prefix, limit):
                  cur = prefix
                  nxt = prefix + 1
                  total = 0
                  while cur <= limit:
                      total += min(limit + 1, nxt) - cur
                      cur *= 10
                      nxt *= 10
                  return total

              while kk > 0:
                  c = count(curr, n)
                  if c <= kk:
                      curr += 1
                      kk -= c
                  else:
                      curr *= 10
                      kk -= 1
              return curr == result

seed: 440

