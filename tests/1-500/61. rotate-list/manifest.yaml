entry:
  id: 61
  title: rotate-list
  params:
    head:
      type: list_node
    k:
      type: int
  call:
    cpp: "listNodeToArray(Solution().rotateRight({head}, {k}))"
    rust: "ListNode::list_node_to_array(Solution::rotate_right({head}, {k}))"
    python3: "list_node_to_array(Solution().rotateRight({head}, {k}))"
    python2: "list_node_to_array(Solution().rotateRight({head}, {k}))"
    ruby: "list_node_to_array(rotate_right({head}, {k}))"
    java: "ListNode.listNodeToArray(new Solution().rotateRight({head}, {k}))"
    csharp: "ListNode.ListNodeToArray(new Solution().RotateRight({head}, {k}))"
    kotlin: "listNodeToArray(Solution().rotateRight({head}, {k}))"
    go: "listNodeToArray(rotateRight({head}, {k}))"
    dart: "list_node_to_array(Solution().rotateRight({head}, {k}))"
    swift: "list_node_to_array(Solution().rotateRight({head}, {k}))"
    typescript: "listNodeToArray(rotateRight({head}, {k}))"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().rotateRight(head, k, {result})"
    checker: |
      class Checker:
          def rotateRight(self, head, k, result):
              vals = list(head)
              if not isinstance(result, list):
                  return False
              n = len(vals)
              if n == 0:
                  return result == []
              shift = k % n
              if shift == 0:
                  expected = vals
              else:
                  expected = vals[-shift:] + vals[:-shift]
              return result == expected
seed: 61
