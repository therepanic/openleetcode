entry:
  id: 61
  title: rotate-list
  call:
    cpp: listNodeToArray(Solution().rotateRight({head}, {k}))
    rust: ListNode::list_node_to_array(Solution::rotate_right({head}, {k} as i32))
    python3: list_node_to_array(Solution().rotateRight({head}, {k}))
    python2: list_node_to_array(Solution().rotateRight({head}, {k}))
    ruby: list_node_to_array(rotate_right({head}, {k}))
    java: ListNode.listNodeToArray(new Solution().rotateRight({head}, {k}))
    csharp: ListNode.ListNodeToArray(new Solution().RotateRight({head}, {k}))
    kotlin: listNodeToArray(Solution().rotateRight({head}, {k}))
    go: listNodeToArray(rotateRight({head}, {k}))
    dart: list_node_to_array(Solution().rotateRight({head}, {k}))
    swift: list_node_to_array(Solution().rotateRight({head}, {k}))
    typescript: listNodeToArray(rotateRight({head}, {k}))
  params:
    head:
      type: list_node
    k:
      type: int
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: check(head, k, {result})
    checker: |
      import json

      def check(head, k, result):
          try:
              result = json.loads(result) if isinstance(result, str) else result
          except Exception:
              return False
          if not head:
              return result == []
          n = len(head)
          k %= n
          if k == 0:
              return result == head
          expected = head[n-k:] + head[:n-k]
          return result == expected
seed: 42
tests:
  - name: Example 1
    in:
      head:
        - 1
        - 2
        - 3
        - 4
        - 5
      k: 2
    out:
      - 4
      - 5
      - 1
      - 2
      - 3
  - name: Example 2
    in:
      head:
        - 0
        - 1
        - 2
      k: 4
    out:
      - 2
      - 0
      - 1
  - name: Empty list
    in:
      head: []
      k: 1
    out: []
  - name: Single node k=0
    in:
      head:
        - 1
      k: 0
    out:
      - 1
  - name: Single node k=10
    in:
