entry:
  id: 228
  title: summary-ranges
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().summaryRanges({nums})"
    rust: "Solution::summary_ranges({nums})"
    python3: "Solution().summaryRanges({nums})"
    python2: "Solution().summaryRanges({nums})"
    ruby: "summary_ranges({nums})"
    java: "new Solution().summaryRanges({nums})"
    csharp: "new Solution().SummaryRanges({nums})"
    kotlin: "Solution().summaryRanges({nums})"
    go: "summaryRanges({nums})"
    dart: "Solution().summaryRanges({nums})"
    swift: "Solution().summaryRanges({nums})"
    typescript: "summaryRanges({nums})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().summaryRanges(nums, {result})"
    checker: |
      class Checker:
          def summaryRanges(self, nums, result):
              expected = []
              i = 0
              while i < len(nums):
                  start = nums[i]
                  j = i
                  while j + 1 < len(nums) and nums[j + 1] == nums[j] + 1:
                      j += 1
                  if nums[j] == start:
                      expected.append(str(start))
                  else:
                      expected.append(f"{start}->{nums[j]}")
                  i = j + 1
              return result == expected
seed: 228
tests:
