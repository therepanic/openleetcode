entry:
  id: 120
  title: triangle
  params:
    triangle:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().minimumTotal({triangle})"
    rust: "Solution::minimum_total({triangle})"
    python3: "Solution().minimumTotal({triangle})"
    python2: "Solution().minimumTotal({triangle})"
    ruby: "minimum_total({triangle})"
    java: "new Solution().minimumTotal({triangle})"
    csharp: "new Solution().MinimumTotal({triangle})"
    kotlin: "Solution().minimumTotal({triangle})"
    go: "minimumTotal({triangle})"
    dart: "Solution().minimumTotal({triangle})"
    swift: "Solution().minimumTotal({triangle})"
    typescript: "minimumTotal({triangle})"

judge:
  type: exact

limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: "Checker().minimumTotal(triangle, {result})"
    checker: |
      class Checker:
          def minimumTotal(self, triangle, result):
              if not isinstance(result, int) or not isinstance(triangle, list) or not triangle:
                  return False
              dp = triangle[-1][:]
              for row in range(len(triangle) - 2, -1, -1):
                  for col in range(len(triangle[row])):
                      dp[col] = triangle[row][col] + min(dp[col], dp[col + 1])
              return result == dp[0]

seed: 120

