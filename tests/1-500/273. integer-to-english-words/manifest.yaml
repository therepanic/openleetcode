entry:
  id: 273
  title: integer-to-english-words
  params:
    num:
      type: int
  call:
    cpp: "Solution().numberToWords({num})"
    rust: "Solution::number_to_words({num})"
    python3: "Solution().numberToWords({num})"
    python2: "Solution().numberToWords({num})"
    ruby: "number_to_words({num})"
    java: "new Solution().numberToWords({num})"
    csharp: "new Solution().NumberToWords({num})"
    kotlin: "Solution().numberToWords({num})"
    go: "numberToWords({num})"
    dart: "Solution().numberToWords({num})"
    swift: "Solution().numberToWords({num})"
    typescript: "numberToWords({num})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().numberToWords(num, {result})"
    checker: |
      class Checker:
          ones = [
              "Zero",
              "One",
              "Two",
              "Three",
              "Four",
              "Five",
              "Six",
              "Seven",
              "Eight",
              "Nine",
              "Ten",
              "Eleven",
              "Twelve",
              "Thirteen",
              "Fourteen",
              "Fifteen",
              "Sixteen",
              "Seventeen",
              "Eighteen",
              "Nineteen",
          ]

          tens = [
              "Zero",
              "Ten",
              "Twenty",
              "Thirty",
              "Forty",
              "Fifty",
              "Sixty",
              "Seventy",
              "Eighty",
              "Ninety",
          ]

          magnitudes = [
              "",
              "Thousand",
              "Million",
              "Billion",
          ]

          def chunk_to_words(self, n: int) -> str:
              parts = []
              if n >= 100:
                  parts.append(self.ones[n // 100])
                  parts.append("Hundred")
                  n %= 100
              if n >= 20:
                  parts.append(self.tens[n // 10])
                  n %= 10
              if 0 < n < 20:
                  parts.append(self.ones[n])
              return " ".join(parts)

          def numberToWords(self, num: int, result: str) -> bool:
              if not isinstance(result, str):
                  return False

              if num == 0:
                  return result == "Zero"

              parts = []
              group = 0
              while num > 0:
                  chunk = num % 1000
                  if chunk != 0:
                      words = self.chunk_to_words(chunk)
                      magnitude = self.magnitudes[group]
                      if magnitude:
                          parts.append(words + " " + magnitude)
                      else:
                          parts.append(words)
                  num //= 1000
                  group += 1

              expected = " ".join(reversed(parts))
              return result == expected
seed: 273
