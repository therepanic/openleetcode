entry:
  id: 105
  title: construct-binary-tree-from-preorder-and-inorder-traversal
  params:
    preorder:
      type: array
      items:
        type: int
    inorder:
      type: array
      items:
        type: int
  call:
    cpp: "treeNodeToArray(Solution().buildTree({preorder}, {inorder}))"
    rust: "TreeNode::tree_node_to_array(Solution::build_tree({preorder}, {inorder}))"
    python3: "tree_node_to_array(Solution().buildTree({preorder}, {inorder}))"
    python2: "tree_node_to_array(Solution().buildTree({preorder}, {inorder}))"
    ruby: "tree_node_to_array(build_tree({preorder}, {inorder}))"
    java: "TreeNode.treeNodeToArray(new Solution().buildTree({preorder}, {inorder}))"
    csharp: "TreeNode.TreeNodeToArray(new Solution().BuildTree({preorder}, {inorder}))"
    kotlin: "treeNodeToArray(Solution().buildTree({preorder}, {inorder}))"
    go: "treeNodeToArray(buildTree({preorder}, {inorder}))"
    dart: "tree_node_to_array(Solution().buildTree({preorder}, {inorder}))"
    swift: "tree_node_to_array(Solution().buildTree({preorder}, {inorder}))"
    typescript: "treeNodeToArray(buildTree({preorder}, {inorder}))"
judge:
