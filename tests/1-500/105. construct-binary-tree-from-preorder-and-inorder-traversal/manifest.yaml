  memory_mb: 300
oracle:
  python3:
    call: "Checker().buildTree(preorder, inorder, {result})"
    checker: |
      from typing import List, Optional, Any

      class Checker:
          def buildTree(self, preorder: List[int], inorder: List[int], result: Any) -> bool:
              if len(preorder) != len(inorder):
                  return False

              def serialize(node):
                  out = []
                  queue = [node]
                  while queue:
                      cur = queue.pop(0)
                      if cur is None:
                          out.append(None)
                          continue
                      out.append(cur.val)
                      queue.append(cur.left)
                      queue.append(cur.right)
                  while out and out[-1] is None:
                      out.pop()
                  return out

              def preorder_walk(node):
                  if node is None:
                      return []
                  return [node.val] + preorder_walk(node.left) + preorder_walk(node.right)

              def inorder_walk(node):
                  if node is None:
                      return []
                  return inorder_walk(node.left) + [node.val] + inorder_walk(node.right)

              return serialize(result) == result_to_array(result) and preorder_walk(result) == preorder and inorder_walk(result) == inorder

      def result_to_array(node):
          if node is None:
              return []
          out = []
          queue = [node]
          while queue:
              cur = queue.pop(0)
              if cur is None:
                  out.append(None)
                  continue
              out.append(cur.val)
              queue.append(cur.left)
              queue.append(cur.right)
          while out and out[-1] is None:
              out.pop()
          return out
