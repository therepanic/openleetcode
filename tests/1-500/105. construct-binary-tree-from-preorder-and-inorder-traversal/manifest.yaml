    rust: "TreeNode::tree_node_to_array(Solution::build_tree({preorder}, {inorder}))"
    python3: "tree_node_to_array(Solution().buildTree({preorder}, {inorder}))"
    python2: "tree_node_to_array(Solution().buildTree({preorder}, {inorder}))"
    ruby: "tree_node_to_array(build_tree({preorder}, {inorder}))"
    java: "TreeNode.treeNodeToArray(new Solution().buildTree({preorder}, {inorder}))"
    csharp: "TreeNode.TreeNodeToArray(new Solution().BuildTree({preorder}, {inorder}))"
    kotlin: "treeNodeToArray(Solution().buildTree({preorder}, {inorder}))"
    go: "treeNodeToArray(buildTree({preorder}, {inorder}))"
    dart: "tree_node_to_array(Solution().buildTree({preorder}, {inorder}))"
    swift: "tree_node_to_array(Solution().buildTree({preorder}, {inorder}))"
    typescript: "treeNodeToArray(buildTree({preorder}, {inorder}))"
judge:
  type: "exact"
limits:
  time_ms: 2000
  memory_mb: 512
oracle:
  python3:
    call: "Checker().buildTree(preorder, inorder, {result})"
    checker: |
      import copy

      from typing import List, Optional

      class Solution:
          def buildTree(self, preorder: List[int], inorder: List[int]) -> Optional[TreeNode]:
              index = {value: i for i, value in enumerate(inorder)}
              preorder_index = 0

              def build(left: int, right: int) -> Optional[TreeNode]:
                  nonlocal preorder_index
                  if left > right:
                      return None

                  root_val = preorder[preorder_index]
                  preorder_index += 1
                  root = TreeNode(root_val)
                  mid = index[root_val]
                  root.left = build(left, mid - 1)
                  root.right = build(mid + 1, right)
                  return root

              return build(0, len(inorder) - 1)

      def array_to_list_node_local(values):
          dummy = ListNode(0)
          tail = dummy
          for value in values:
              tail.next = ListNode(value)
              tail = tail.next
          return dummy.next

      def array_to_tree_node_local(values):
          if not values:
              return None
          root = TreeNode(values[0])
          queue = deque([root])
          index = 1
          while queue and index < len(values):
              node = queue.popleft()
              if index < len(values) and values[index] is not None:
                  node.left = TreeNode(values[index])
                  queue.append(node.left)
              index += 1
              if index < len(values) and values[index] is not None:
                  node.right = TreeNode(values[index])
                  queue.append(node.right)
              index += 1
          return root

      def list_node_to_array_local(node):
          out = []
          seen = 0
          while node is not None and seen < 100000:
              out.append(node.val)
              node = node.next
              seen += 1
          return out

      def tree_node_to_array_local(root):
          if root is None:
              return []
          out = []
          q = deque([root])
          while q:
              node = q.popleft()
              if node is None:
                  out.append(None)
                  continue
              out.append(node.val)
              q.append(node.left)
              q.append(node.right)
          while out and out[-1] is None:
              out.pop()
          return out

      def deep_sort(value):
          if isinstance(value, list):
              normalized = [deep_sort(item) for item in value]
              return sorted(normalized, key=lambda item: json.dumps(item, sort_keys=True))
          if isinstance(value, dict):
              return {key: deep_sort(val) for key, val in sorted(value.items())}
          return value

      def normalize_expected(value):
          kind = "tree_node"
          if kind == "list_node":
              return list_node_to_array_local(value)
          if kind == "tree_node":
              return tree_node_to_array_local(value)
          return value

      def normalize_actual(value):
          return value

      def prepare_input(value, kind):
          if kind == "tree_node":
              return array_to_tree_node_local(value)
          if kind == "list_node":
              return array_to_list_node_local(value)
          return copy.deepcopy(value)

      class Checker:
          def buildTree(self, preorder, inorder, result):
              prepared_preorder = prepare_input(preorder, "array[int]"); prepared_inorder = prepare_input(inorder, "array[int]")
              expected = Solution().buildTree(prepared_preorder, prepared_inorder)
              expected = normalize_expected(expected)
              actual = normalize_actual(result)
              return deep_sort(expected) == deep_sort(actual)
