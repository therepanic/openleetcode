judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().isAdditiveNumber(num, {result})"
    checker: |
      class Checker:
          def isAdditiveNumber(self, num, result):
              if not isinstance(result, bool):
                  return False

              def add_strings(a, b):
                  i, j = len(a) - 1, len(b) - 1
                  carry = 0
                  out = []
                  while i >= 0 or j >= 0 or carry:
                      s = carry
                      if i >= 0:
                          s += ord(a[i]) - 48
                          i -= 1
                      if j >= 0:
                          s += ord(b[j]) - 48
                          j -= 1
                      out.append(chr(48 + (s % 10)))
                      carry = s // 10
                  return ''.join(reversed(out))

              n = len(num)
              expected = False
              for i in range(1, n):
                  if num[0] == '0' and i > 1:
                      break
                  for j in range(i + 1, n):
                      if num[i] == '0' and j > i + 1:
                          break
                      a = num[:i]
                      b = num[i:j]
                      k = j
                      count = 2
                      while k < n:
                          c = add_strings(a, b)
                          if not num.startswith(c, k):
                              break
                          k += len(c)
                          a, b = b, c
                          count += 1
                      if k == n and count >= 3:
                          expected = True
                          return result == expected
              return result == expected
seed: 306306
