  id: 306
  title: additive-number
  params:
    num:
      type: string
  call:
    cpp: "Solution().isAdditiveNumber({num})"
    rust: "Solution::is_additive_number({num}.to_string())"
    python3: "Solution().isAdditiveNumber({num})"
    python2: "Solution().isAdditiveNumber({num})"
    ruby: "is_additive_number({num})"
    java: "new Solution().isAdditiveNumber({num})"
    csharp: "new Solution().IsAdditiveNumber({num})"
    kotlin: "Solution().isAdditiveNumber({num})"
    go: "isAdditiveNumber({num})"
    dart: "Solution().isAdditiveNumber({num})"
    swift: "Solution().isAdditiveNumber({num})"
