entry:
  id: 331
  title: verify-preorder-serialization-of-a-binary-tree
  params:
    preorder:
      type: string
  call:
    cpp: "Solution().isValidSerialization({preorder})"
    rust: "Solution::is_valid_serialization({preorder})"
    python3: "Solution().isValidSerialization({preorder})"
    python2: "Solution().isValidSerialization({preorder})"
    ruby: "is_valid_serialization({preorder})"
    java: "new Solution().isValidSerialization({preorder})"
    csharp: "new Solution().IsValidSerialization({preorder})"
    kotlin: "Solution().isValidSerialization({preorder})"
    go: "isValidSerialization({preorder})"
    dart: "Solution().isValidSerialization({preorder})"
    swift: "Solution().isValidSerialization({preorder})"
    typescript: "isValidSerialization({preorder})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().isValidSerialization(preorder, {result})"
    checker: |
      class Checker:
          def isValidSerialization(self, preorder, result):
              slots = 1
              for node in preorder.split(','):
                  slots -= 1
                  if slots < 0:
                      return result is False
                  if node != '#':
                      slots += 2
              return result == (slots == 0)
seed: 331
