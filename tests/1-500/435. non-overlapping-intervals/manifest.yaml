entry:
  id: 435
  title: non-overlapping-intervals
  params:
    intervals:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().eraseOverlapIntervals({intervals})"
    rust: "Solution::erase_overlap_intervals({intervals})"
    python3: "Solution().eraseOverlapIntervals({intervals})"
    python2: "Solution().eraseOverlapIntervals({intervals})"
    ruby: "erase_overlap_intervals({intervals})"
    java: "new Solution().eraseOverlapIntervals({intervals})"
    csharp: "new Solution().EraseOverlapIntervals({intervals})"
    kotlin: "Solution().eraseOverlapIntervals({intervals})"
    go: "eraseOverlapIntervals({intervals})"
    dart: "Solution().eraseOverlapIntervals({intervals})"
    swift: "Solution().eraseOverlapIntervals({intervals})"
    typescript: "eraseOverlapIntervals({intervals})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(intervals, {result})"
    checker: |
      class Checker:
          def check(self, intervals, result):
              if not isinstance(result, int):
                  return False
              if result < 0:
                  return False
              if not isinstance(intervals, list) or len(intervals) == 0:
                  return False
              for interval in intervals:
                  if not isinstance(interval, list) or len(interval) != 2:
                      return False
                  if not all(isinstance(x, int) for x in interval):
                      return False
                  if interval[0] >= interval[1]:
                      return False
              return True
seed: 435
