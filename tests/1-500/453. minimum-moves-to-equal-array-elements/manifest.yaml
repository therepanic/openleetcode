entry:
  id: 453
  title: "minimum-moves-to-equal-array-elements"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().minMoves({nums})"
    rust: "Solution::min_moves({nums})"
    python3: "Solution().minMoves({nums})"
    python2: "Solution().minMoves({nums})"
    ruby: "min_moves({nums})"
    java: "new Solution().minMoves({nums})"
    csharp: "new Solution().MinMoves({nums})"
    kotlin: "Solution().minMoves({nums})"
    go: "minMoves({nums})"
    dart: "Solution().minMoves({nums})"
    swift: "Solution().minMoves({nums})"
    typescript: "minMoves({nums})"
judge:
  type: "exact"
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: "Checker().minMoves(nums, {result})"
    checker: |
      class Checker:
          def minMoves(self, nums, result) -> bool:
              if not isinstance(nums, list):
                  return False
              if not isinstance(result, int):
                  return False
              if len(nums) == 0:
                  return False
              expected = sum(nums) - len(nums) * min(nums)
              return result == expected
seed: 453
