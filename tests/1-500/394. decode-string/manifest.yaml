  id: 394
  title: decode-string
  params:
    s:
      type: string
  call:
    cpp: "Solution().decodeString({s})"
    rust: "Solution::decodeString({s})"
    python3: "Solution().decodeString({s})"
    python2: "Solution().decodeString({s})"
    ruby: "decodeString({s})"
    java: "new Solution().decodeString({s})"
    csharp: "new Solution().DecodeString({s})"
    kotlin: "Solution().decodeString({s})"
    go: "decodeString({s})"
    dart: "Solution().decodeString({s})"
    swift: "Solution().decodeString({s})"
    typescript: "decodeString({s})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().decodeString(s, {result})"
    checker: |
      class Checker:
          def decodeString(self, s, result):
              i = 0

              def decode():
                  nonlocal i
                  res = []
                  num = 0
                  while i < len(s):
                      c = s[i]
                      if c.isdigit():
                          num = num * 10 + int(c)
                          i += 1
                      elif c == '[':
                          i += 1
                          inner = decode()
                          res.append(inner * num)
                          num = 0
                      elif c == ']':
                          i += 1
                          return ''.join(res)
                      else:
                          res.append(c)
                          i += 1
                  return ''.join(res)

              expected = decode()
              return expected == result
seed: 394
