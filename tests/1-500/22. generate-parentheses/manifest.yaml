judge:
  type: ignore_order
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check({n}, {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, result):\n        if\
      \ isinstance(result, str):\n            try:\n                result = json.loads(result)\n\
      \            except Exception:\n                pass\n        return result\n\
      \n    def check(self, n, result):\n        result = self._norm(result)\n   \
      \     if not isinstance(result, list): return False\n        def is_valid(s):\n\
      \            count = 0\n            for char in s:\n                if char\
      \ == '(':\n                    count += 1\n                else:\n         \
      \           count -= 1\n                if count < 0:\n                    return\
      \ False\n            return count == 0\n        def catalan(n):\n          \
      \  if n <= 1:\n                return 1\n            res = 0\n            for\
      \ i in range(n):\n                res += catalan(i) * catalan(n - 1 - i)\n \
      \           return res\n        if len(result) != catalan(n): return False\n\
      \        return all(is_valid(s) for s in result) and len(set(result)) == len(result)\n"
seed: 42
