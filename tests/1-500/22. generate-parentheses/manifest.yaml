entry:
  id: 22
  title: generate-parentheses
  params:
    n:
      type: int
  call:
    cpp: Solution().generateParenthesis({n})
    rust: Solution::generate_parenthesis({n})
    python3: Solution().generateParenthesis({n})
    python2: Solution().generateParenthesis({n})
    ruby: generate_parenthesis({n})
    java: new Solution().generateParenthesis({n})
    csharp: new Solution().GenerateParenthesis({n})
    kotlin: Solution().generateParenthesis({n})
    go: generateParenthesis({n})
    dart: Solution().generateParenthesis({n})
    swift: Solution().generateParenthesis({n})
    typescript: generateParenthesis({n})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().generateParenthesis(n, {result})
    checker: |
      class Checker:
          def generateParenthesis(self, n, result):
              if not isinstance(result, list):
                  return False
              if any(not isinstance(x, str) for x in result):
                  return False

              expected = []

              def backtrack(s, open_count, close_count):
                  if open_count == n and close_count == n:
                      expected.append(s)
                      return
                  if open_count < n:
                      backtrack(s + "(", open_count + 1, close_count)
                  if close_count < open_count:
                      backtrack(s + ")", open_count, close_count + 1)

              backtrack("", 0, 0)
              return sorted(result) == sorted(expected) and len(result) == len(set(result))
seed: 22
