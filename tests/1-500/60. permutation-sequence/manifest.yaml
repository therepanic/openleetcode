"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().getPermutation({n}, {k}, {result})"
    "checker":
      "import json\nclass Checker:\n    def getPermutation(self, n, k, result):\n\
      \        try:\n            result = json.loads(result) if isinstance(result,\
      \ str) else result\n        except Exception:\n            return False\n  \
      \      nums = [i for i in range(1, n + 1)]\n        k -= 1\n        factorial\
      \ = [1] * n\n        for i in range(1, n):\n            factorial[i] = factorial[i\
      \ - 1] * i\n        res = []\n        for i in range(n - 1, -1, -1):\n     \
      \       idx = k // factorial[i]\n            k %= factorial[i]\n           \
      \ res.append(str(nums.pop(idx)))\n        return \"\".join(res) == str(result)\n"
"seed": 42
