entry:
  id: 60
  title: permutation-sequence
  call:
    cpp: Solution().getPermutation({n}, {k})
    rust: Solution::get_permutation({n}, {k})
    python3: Solution().getPermutation({n}, {k})
    python2: Solution().getPermutation({n}, {k})
    ruby: get_permutation({n}, {k})
    java: new Solution().getPermutation({n}, {k})
    csharp: new Solution().GetPermutation({n}, {k})
    kotlin: Solution().getPermutation({n}, {k})
    go: getPermutation({n}, {k})
    dart: Solution().getPermutation({n}, {k})
    swift: Solution().getPermutation({n}, {k})
    typescript: getPermutation({n}, {k})
  params:
    n:
      type: int
    k:
      type: int
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: getPermutation(n, k, {result})
    checker: |
      import json

      def getPermutation(n, k, result):
          try:
              result = json.loads(result) if isinstance(result, str) else result
          except Exception:
              return False
          nums = [i for i in range(1, n + 1)]
          k -= 1
          factorial = [1] * n
          for i in range(1, n):
              factorial[i] = factorial[i - 1] * i
          res = []
          for i in range(n - 1, -1, -1):
              idx = k // factorial[i]
              k %= factorial[i]
              res.append(str(nums.pop(idx)))
          return ''.join(res) == str(result)
seed: 42
