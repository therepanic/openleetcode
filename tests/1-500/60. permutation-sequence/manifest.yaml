entry:
  id: 60
  title: permutation-sequence
  params:
    n:
      type: int
    k:
      type: int
  call:
    cpp: "Solution().getPermutation({n}, {k})"
    rust: "Solution::get_permutation({n}, {k})"
    python3: "Solution().getPermutation({n}, {k})"
    python2: "Solution().getPermutation({n}, {k})"
    ruby: "get_permutation({n}, {k})"
    java: "new Solution().getPermutation({n}, {k})"
    csharp: "new Solution().GetPermutation({n}, {k})"
    kotlin: "Solution().getPermutation({n}, {k})"
    go: "getPermutation({n}, {k})"
    dart: "Solution().getPermutation({n}, {k})"
    swift: "Solution().getPermutation({n}, {k})"
    typescript: "getPermutation({n}, {k})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().getPermutation(n, k, {result})"
    checker: |
      class Checker:
          def getPermutation(self, n, k, result):
              if not isinstance(result, str):
                  return False
              if len(result) != n:
                  return False
              expected = [str(i) for i in range(1, n + 1)]
              if sorted(result) != expected:
                  return False
              nums = expected[:]
              factorial = [1] * (n + 1)
              for i in range(1, n + 1):
                  factorial[i] = factorial[i - 1] * i
              k -= 1
              res = []
              for remaining in range(n, 0, -1):
                  block = factorial[remaining - 1]
                  idx = k // block
                  k %= block
                  res.append(nums.pop(idx))
              return "".join(res) == result
seed: 60
