"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().multiply(num1, num2, {result})"
    "checker":
      "import json\n\nclass Checker:\n    def multiply(self, num1, num2,\
      \ result):\n        try:\n            result = json.loads(result) if isinstance(result,\
      \ str) else result\n        except Exception:\n            return False\n  \
      \      return str(int(num1) * int(num2)) == str(result)\n"
"seed": 42
