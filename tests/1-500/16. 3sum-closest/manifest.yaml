entry:
  id: 16
  title: 3sum-closest
  params:
    nums:
      type: array
      items:
        type: int
    target:
      type: int
  call:
    cpp: "Solution().threeSumClosest({nums}, {target})"
    rust: "Solution::three_sum_closest({nums}, {target})"
    python3: "Solution().threeSumClosest({nums}, {target})"
    python2: "Solution().threeSumClosest({nums}, {target})"
    ruby: "three_sum_closest({nums}, {target})"
    java: "new Solution().threeSumClosest({nums}, {target})"
    csharp: "new Solution().ThreeSumClosest({nums}, {target})"
    kotlin: "Solution().threeSumClosest({nums}, {target})"
    go: "threeSumClosest({nums}, {target})"
    dart: "Solution().threeSumClosest({nums}, {target})"
    swift: "Solution().threeSumClosest({nums}, {target})"
    typescript: "threeSumClosest({nums}, {target})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().threeSumClosest(nums, target, {result})"
    checker: |
      class Checker:
          def threeSumClosest(self, nums, target, result):
              if not isinstance(result, int):
                  return False
              if len(nums) < 3:
                  return False

              nums = sorted(nums)
              best = nums[0] + nums[1] + nums[2]

              for i in range(len(nums) - 2):
                  left = i + 1
                  right = len(nums) - 1

                  while left < right:
                      total = nums[i] + nums[left] + nums[right]

                      if abs(target - total) < abs(target - best):
                          best = total

                      if total == target:
                          best = target
                          left = right
                          break
                      elif total < target:
                          left += 1
                      else:
                          right -= 1

              return best == result
seed: 16
