entry:
  id: 16
  title: 3sum-closest
  call:
    cpp: Solution().threeSumClosest(lv(vector<int>{ {nums} }), {target})
    rust: Solution::three_sum_closest(vec![{nums}], {target})
    python3: Solution().threeSumClosest([{nums}], {target})
    python2: Solution().threeSumClosest([{nums}], {target})
    ruby: three_sum_closest([{nums}], {target})
    java: new Solution().threeSumClosest(new int[]{ {nums} }, {target})
    csharp: new Solution().ThreeSumClosest(new int[]{ {nums} }, {target})
    kotlin: Solution().threeSumClosest(intArrayOf({nums}), {target})
    go: threeSumClosest([]int{ {nums} }, {target})
    dart: Solution().threeSumClosest([{nums}], {target})
    swift: Solution().threeSumClosest([{nums}], {target})
    typescript: threeSumClosest([{nums}], {target})
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().threeSumClosest([{nums}], {target}, {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, result):\n        if\
      \ isinstance(result, str):\n            try:\n                result = json.loads(result)\n\
      \            except Exception:\n                pass\n            if isinstance(result,\
      \ str):\n                low = result.strip().lower()\n                if low\
      \ == 'true':\n                    return True\n                if low == 'false':\n\
      \                    return False\n                if low.lstrip('-').isdigit():\n\
      \                    return int(low)\n        return result\n\n    def threeSumClosest(self,\
      \ nums, target, result):\n        result = self._norm(result)\n        n = len(nums)\n\
      \        best = float('inf')\n        actual_closest = 0\n        for i in range(n):\n\
      \            for j in range(i + 1, n):\n                for k in range(j + 1,\
      \ n):\n                    s = nums[i] + nums[j] + nums[k]\n               \
      \     if abs(target - s) < best:\n                        best = abs(target\
      \ - s)\n                        actual_closest = s\n        return result ==\
      \ actual_closest\n"
seed: 42
