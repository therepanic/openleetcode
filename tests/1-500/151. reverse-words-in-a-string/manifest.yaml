entry:
  id: 151
  title: reverse-words-in-a-string
  params:
    s:
      type: string
  call:
    cpp: Solution().reverseWords({s})
    rust: Solution::reverse_words({s})
    python3: Solution().reverseWords({s})
    python2: Solution().reverseWords({s})
    ruby: reverse_words({s})
    java: new Solution().reverseWords({s})
    csharp: new Solution().ReverseWords({s})
    kotlin: Solution().reverseWords({s})
    go: reverseWords({s})
    dart: Solution().reverseWords({s})
    swift: Solution().reverseWords({s})
    typescript: reverseWords({s})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().reverseWords(s, {result})
    checker: "class Checker:\n    def reverseWords(self, s, result):\n        expected = \" \".join(reversed(s.split()))\n        return result == expected\n"
seed: 151
tests:
  - name: example1
    in:
      s: the sky is blue
    out: blue is sky the
  - name: example2
    in:
      s: "  hello world  "
    out: world hello
  - name: example3
    in:
      s: a good   example
    out: example good a
  - name: single_word
    in:
      s: leetcode
    out: leetcode
  - name: one_letter
    in:
      s: a
    out: a
  - name: two_words
    in:
      s: hello world
    out: world hello
  - name: leading_spaces
    in:
      s: "   hello world"
    out: world hello
  - name: trailing_spaces
    in:
      s: "hello world   "
    out: world hello
  - name: both_sides_spaces
    in:
      s: "   hello world   "
    out: world hello
  - name: many_internal_spaces
    in:
      s: a   b    c     d
    out: d c b a
  - name: multiple_words_simple
    in:
      s: this is a test
    out: test a is this
  - name: mixed_case
    in:
      s: AbC dEf Ghi
    out: Ghi dEf AbC
  - name: digits_only_words
    in:
      s: 123 4567 89
    out: 89 4567 123
  - name: mixed_alnum
    in:
      s: a1 b2 c3
    out: c3 b2 a1
  - name: single_char_words
    in:
      s: x y z
    out: z y x
  - name: two_word_with_extra_spaces
    in:
      s: "  ab   cd  "
    out: cd ab
  - name: repeated_word
    in:
      s: repeat repeat repeat
    out: repeat repeat repeat
  - name: punctuation_absent
    in:
      s: abc def ghi jkl
    out: jkl ghi def abc
  - name: longer_sentence1
    in:
      s: keep calm and code on
    out: on code and calm keep
  - name: longer_sentence2
    in:
      s: open leetcode local testing
    out: testing local leetcode open
  - name: spaces_between_every_word
    in:
      s: one  two   three    four
    out: four three two one
  - name: alternating_case
    in:
      s: aA Bb Cc Dd
    out: Dd Cc Bb aA
  - name: numbers_and_letters
    in:
      s: z9 9z y8 8y
    out: 8y y8 9z z9
  - name: many_single_letter_words
    in:
      s: m n o p q r s t
    out: t s r q p o n m
  - name: word_lengths_vary
    in:
      s: a ab abc abcd abcde
    out: abcde abcd abc ab a
  - name: all_uppercase
    in:
      s: ALPHA BETA GAMMA
    out: GAMMA BETA ALPHA
  - name: all_lowercase
    in:
      s: alpha beta gamma
    out: gamma beta alpha
  - name: mixed_spacing_pattern1
    in:
      s: "  a  bb   ccc    dddd     "
    out: dddd ccc bb a
  - name: mixed_spacing_pattern2
    in:
      s: word1    word2 word3
    out: word3 word2 word1
  - name: long_word_short_words
    in:
      s: supercalifragilisticexpialidocious a bb ccc
    out: ccc bb a supercalifragilisticexpialidocious
  - name: edge_leading_trailing_many_spaces
    in:
      s: "     alpha   beta    gamma     "
    out: gamma beta alpha
  - name: edge_single_word_with_spaces
    in:
      s: "      solo      "
    out: solo
  - name: repeated_numbers
    in:
      s: 10 20 30 40 50
    out: 50 40 30 20 10
  - name: mixed_words_and_numbers
    in:
      s: a1b2 c3d4 e5f6
    out: e5f6 c3d4 a1b2
  - name: final_small_case
    in:
      s: one
    out: one
  - name: extra_short_case
    in:
      s: go
    out: go
  - name: generated_spacey_small
    seed: 151001
    in:
      s:
        gen: str
        len:
          gen: int
          min: 32
          max: 64
        alphabet: " abcd"
  - name: generated_spacey_large
    seed: 151002
    in:
      s:
        gen: str
        len:
          gen: int
          min: 20000
          max: 20000
        alphabet: " abcdefghijklmnopqrstuvwxyz"
