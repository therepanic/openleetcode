entry:
  id: 315
  title: count-of-smaller-numbers-after-self
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().countSmaller({nums})"
    rust: "Solution::count_smaller({nums})"
    python3: "Solution().countSmaller({nums})"
    python2: "Solution().countSmaller({nums})"
    ruby: "count_smaller({nums})"
    java: "new Solution().countSmaller({nums})"
    csharp: "new Solution().CountSmaller({nums})"
    kotlin: "Solution().countSmaller({nums})"
    go: "countSmaller({nums})"
    dart: "Solution().countSmaller({nums})"
    swift: "Solution().countSmaller({nums})"
    typescript: "countSmaller({nums})"
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 512
oracle:
  python3:
    call: "Checker().countSmaller(nums, {result})"
    checker: |
      from typing import Any, List

      class Checker:
          def _expected(self, nums: List[int]) -> List[int]:
              values = sorted(set(nums))
              index = {v: i + 1 for i, v in enumerate(values)}
              bit = [0] * (len(values) + 2)

              def add(i: int, delta: int) -> None:
                  while i < len(bit):
                      bit[i] += delta
                      i += i & -i

              def sum_(i: int) -> int:
                  s = 0
                  while i > 0:
                      s += bit[i]
                      i -= i & -i
                  return s

              ans = []
              for x in reversed(nums):
                  ix = index[x]
                  ans.append(sum_(ix - 1))
                  add(ix, 1)
              ans.reverse()
              return ans

          def countSmaller(self, nums: Any, result: Any) -> bool:
              if not isinstance(nums, list) or not isinstance(result, list):
                  return False
              if len(result) != len(nums):
                  return False
              if any(not isinstance(x, int) for x in nums):
                  return False
              if any(not isinstance(x, int) for x in result):
                  return False
              if any(x < 0 or x > len(nums) for x in result):
                  return False
              return result == self._expected(nums)
seed: 315315
