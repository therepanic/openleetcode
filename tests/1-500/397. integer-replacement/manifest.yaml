entry:
  id: 397
  title: integer-replacement
  params:
    n:
      type: int
  call:
    cpp: Solution().integerReplacement({n})
    rust: Solution::integer_replacement({n})
    python3: Solution().integerReplacement({n})
    python2: Solution().integerReplacement({n})
    ruby: integer_replacement({n})
    java: new Solution().integerReplacement({n})
    csharp: new Solution().IntegerReplacement({n})
    kotlin: Solution().integerReplacement({n})
    go: integerReplacement({n})
    dart: Solution().integerReplacement({n})
    swift: Solution().integerReplacement({n})
    typescript: integerReplacement({n})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().integerReplacement(n, {result})
    checker: |
      import json

      class Checker:
          def integerReplacement(self, n, result):
              try:
                  result = json.loads(result) if isinstance(result, str) else result
              except Exception:
                  return False
              if not isinstance(result, int):
                  return False
              def helper(x):
                  if x == 1:
                      return 0
                  if x % 2 == 0:
                      return 1 + helper(x // 2)
                  return 1 + min(helper(x - 1), helper(x + 1))
              return result == helper(n)
seed: 42
