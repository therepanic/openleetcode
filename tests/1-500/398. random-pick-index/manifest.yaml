entry:
  id: 398
  title: random-pick-index
  params:
    nums:
      type: array
      items:
        type: int
    target:
      type: int
  call:
    cpp: "Solution({nums}).pick({target})"
    rust: "Solution::new({nums}).pick({target})"
    python3: "Solution({nums}).pick({target})"
    python2: "Solution({nums}).pick({target})"
    ruby: "Solution.new({nums}).pick({target})"
    java: "new Solution({nums}).pick({target})"
    csharp: "new Solution({nums}).Pick({target})"
    kotlin: "Solution({nums}).pick({target})"
    go: "Constructor({nums}).Pick({target})"
    dart: "Solution({nums}).pick({target})"
    swift: "Solution({nums}).pick({target})"
    typescript: "new Solution({nums}).pick({target})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(nums, target, {result})"
    checker: |
      class Checker:
          def check(self, nums, target, result):
              if not isinstance(result, int):
                  return False
              if result < 0 or result >= len(nums):
                  return False
              return nums[result] == target
seed: 398
