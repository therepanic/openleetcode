judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(head, {result})
    checker: |
      import json

      class Checker:
          def check(self, head, result):
              try:
                  got = json.loads(result) if isinstance(result, str) else result
              except Exception:
                  return False
              if not isinstance(got, list):
                  return False
              expected = []
              for i in range(0, len(head), 2):
                  if i + 1 < len(head):
                      expected.append(head[i + 1])
                      expected.append(head[i])
                  else:
                      expected.append(head[i])
              return got == expected
