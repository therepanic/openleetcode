"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().check([{head}], {result})"
    "checker":
      "import json\nclass Checker:\n  def check(self, head, res):\n    def\
      \ to_list(arr):\n      head = cur = None\n      for x in arr:\n        if not\
      \ head: head = cur = [x, None]\n        else:\n          cur[1] = [x, None]\n\
      \          cur = cur[1]\n      return head\n    def from_list(node):\n     \
      \ res = []\n      while node:\n        res.append(node[0])\n        node = node[1]\n\
      \      return res\n    \n    def ref(h):\n      if not h or not h[1]: return\
      \ h\n      s = h[1]\n      h[1] = ref(s[1])\n      s[1] = h\n      return s\n\
      \      \n    try:\n      res = json.loads(res) if isinstance(res, str) else\
      \ res\n    except Exception:\n      return False\n    if isinstance(res, list)\
      \ and len(res) == 1 and isinstance(res[0], list):\n      res = res[0]\n    return\
      \ from_list(ref(to_list(head))) == res\n"
