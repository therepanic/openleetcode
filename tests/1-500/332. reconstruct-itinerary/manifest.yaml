entry:
  id: 332
  title: reconstruct-itinerary
  params:
    tickets:
      type: array
      items:
        type: array
        items:
          type: string
  call:
    cpp: "Solution().findItinerary({tickets})"
    rust: "Solution::find_itinerary({tickets})"
    python3: "Solution().findItinerary({tickets})"
    python2: "Solution().findItinerary({tickets})"
    ruby: "find_itinerary({tickets})"
    java: "new Solution().findItinerary({tickets})"
    csharp: "new Solution().FindItinerary({tickets})"
    kotlin: "Solution().findItinerary({tickets})"
    go: "findItinerary({tickets})"
    dart: "Solution().findItinerary({tickets})"
    swift: "Solution().findItinerary({tickets})"
    typescript: "findItinerary({tickets})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().findItinerary(tickets, {result})"
    checker: |
      from collections import defaultdict
      class Checker:
          def findItinerary(self, tickets, result):
              if not isinstance(result, list) or not result or result[0] != "JFK" or len(result) != len(tickets) + 1:
                  return False
              for airport in result:
                  if not isinstance(airport, str) or len(airport) != 3 or not airport.isupper():
                      return False
              graph = defaultdict(list)
              for departure, arrival in sorted(tickets, reverse=True):
                  graph[departure].append(arrival)
              st = ["JFK"]
              expected = []
              while st:
                  if graph[st[-1]]:
                      st.append(graph[st[-1]].pop())
                  else:
                      expected.append(st.pop())
              expected.reverse()
              return result == expected
seed: 332
