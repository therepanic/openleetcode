entry:
  id: 448
  title: "find-all-numbers-disappeared-in-an-array"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().findDisappearedNumbers({nums})"
    rust: "Solution::find_disappeared_numbers({nums})"
    python3: "Solution().findDisappearedNumbers({nums})"
    python2: "Solution().findDisappearedNumbers({nums})"
    ruby: "find_disappeared_numbers({nums})"
    java: "new Solution().findDisappearedNumbers({nums})"
    csharp: "new Solution().FindDisappearedNumbers({nums})"
    kotlin: "Solution().findDisappearedNumbers({nums})"
    go: "findDisappearedNumbers({nums})"
    dart: "Solution().findDisappearedNumbers({nums})"
    swift: "Solution().findDisappearedNumbers({nums})"
    typescript: "findDisappearedNumbers({nums})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().check(nums, {result})"
    checker: |
      class Checker:
          def check(self, nums, result):
              if not isinstance(result, list):
                  return False
              n = len(nums)
              expected = [i for i in range(1, n + 1) if i not in set(nums)]
              return result == expected

seed: 448

