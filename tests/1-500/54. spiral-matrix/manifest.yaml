entry:
  id: 54
  title: spiral-matrix
  params:
    matrix:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().spiralOrder({matrix})"
    rust: "Solution::spiral_order({matrix})"
    python3: "Solution().spiralOrder({matrix})"
    python2: "Solution().spiralOrder({matrix})"
    ruby: "spiral_order({matrix})"
    java: "new Solution().spiralOrder({matrix})"
    csharp: "new Solution().SpiralOrder({matrix})"
    kotlin: "Solution().spiralOrder({matrix})"
    go: "spiralOrder({matrix})"
    dart: "Solution().spiralOrder({matrix})"
    swift: "Solution().spiralOrder({matrix})"
    typescript: "spiralOrder({matrix})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().spiralOrder(matrix, {result})"
    checker: |
      class Checker:
          def spiralOrder(self, matrix, result):
              if not isinstance(result, list):
                  return False

              expected = []
              top, bottom = 0, len(matrix) - 1
              left, right = 0, len(matrix[0]) - 1

              while left <= right and top <= bottom:
                  for col in range(left, right + 1):
                      expected.append(matrix[top][col])
                  top += 1

                  for row in range(top, bottom + 1):
                      expected.append(matrix[row][right])
                  right -= 1

                  if top <= bottom:
                      for col in range(right, left - 1, -1):
                          expected.append(matrix[bottom][col])
                      bottom -= 1

                  if left <= right:
                      for row in range(bottom, top - 1, -1):
                          expected.append(matrix[row][left])
                      left += 1

              return expected == result
seed: 54
