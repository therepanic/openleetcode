entry:
  id: 54
  title: spiral-matrix
  call:
    cpp: Solution().spiralOrder({matrix})
    rust: Solution::spiral_order({matrix})
    python3: Solution().spiralOrder({matrix})
    python2: Solution().spiralOrder({matrix})
    ruby: spiral_order({matrix})
    java: new Solution().spiralOrder({matrix})
    csharp: new Solution().SpiralOrder({matrix})
    kotlin: Solution().spiralOrder({matrix})
