    dart: Solution().spiralOrder({matrix})
    swift: Solution().spiralOrder({matrix})
    typescript: spiralOrder({matrix})
  params:
    matrix:
      type: array
      items:
        type: array
        items:
          type: int
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().spiralOrder({matrix}, {result})
    checker:
      "class Checker:\n    def spiralOrder(self, matrix, result):\n        rows, cols = len(matrix), len(matrix[0])\n\
      \        x, y, dx, dy = 0, 0, 1, 0\n        expected = []\n        m = [row[:] for row in matrix]\n        for _ in
      range(rows * cols):\n            expected.append(m[y][x])\n            m[y][x] = None\n            if not 0 <= x + dx
      < cols or not 0 <= y + dy < rows or m[y+dy][x+dx] is None:\n                dx, dy = -dy, dx\n            x += dx\n\
      \            y += dy\n        return result == expected\n"
seed: 42
