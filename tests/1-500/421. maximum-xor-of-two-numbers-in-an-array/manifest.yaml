entry:
  id: 421
  title: maximum-xor-of-two-numbers-in-an-array
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: Solution().findMaximumXOR({nums})
    rust: Solution::find_maximum_xor({nums})
    python3: Solution().findMaximumXOR({nums})
    python2: Solution().findMaximumXOR({nums})
    ruby: find_maximum_xor({nums})
    java: new Solution().findMaximumXOR({nums})
    csharp: new Solution().FindMaximumXOR({nums})
    kotlin: Solution().findMaximumXOR({nums})
    go: findMaximumXOR({nums})
    dart: Solution().findMaximumXOR({nums})
    swift: Solution().findMaximumXOR({nums})
    typescript: findMaximumXOR({nums})

judge:
  type: exact

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: Checker().findMaximumXOR(nums, {result})
    checker: |
      class Checker:
          def findMaximumXOR(self, nums, result):
              if not isinstance(nums, list) or not isinstance(result, int):
                  return False
              if len(nums) < 1 or len(nums) > 200000:
                  return False
              for x in nums:
                  if not isinstance(x, int) or x < 0 or x > 2147483647:
                      return False
              mx_bit = max(nums).bit_length()
              trie = [[-1, -1]]

              def insert(num):
                  node = 0
                  for i in range(mx_bit - 1, -1, -1):
                      bit = (num >> i) & 1
                      nxt = trie[node][bit]
                      if nxt == -1:
                          nxt = len(trie)
                          trie[node][bit] = nxt
                          trie.append([-1, -1])
                      node = nxt

              def best_xor(num):
                  node = 0
                  ans = 0
                  for i in range(mx_bit - 1, -1, -1):
                      bit = (num >> i) & 1
                      opp = 1 - bit
                      if trie[node][opp] != -1:
                          ans |= 1 << i
                          node = trie[node][opp]
                      else:
                          node = trie[node][bit]
                  return ans

              for num in nums:
                  insert(num)

              expected = 0
              for num in nums:
                  expected = max(expected, best_xor(num))
              return result == expected

seed: 421

