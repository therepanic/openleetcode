entry:
  id: 468
  title: validate-ip-address
  params:
    queryIP:
      type: string
  call:
    cpp: Solution().validIPAddress({queryIP})
    rust: Solution::valid_ip_address({queryIP})
    python3: Solution().validIPAddress({queryIP})
    python2: Solution().validIPAddress({queryIP})
    ruby: valid_ip_address({queryIP})
    java: new Solution().validIPAddress({queryIP})
    csharp: new Solution().ValidIPAddress({queryIP})
    kotlin: Solution().validIPAddress({queryIP})
    go: validIPAddress({queryIP})
    dart: Solution().validIPAddress({queryIP})
    swift: Solution().validIPAddress({queryIP})
    typescript: validIPAddress({queryIP})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().validIPAddress(queryIP, {result})
    checker: |
      from typing import Any

      class Checker:
          def validIPAddress(self, queryIP: Any, result: Any) -> bool:
              if not isinstance(queryIP, str) or not isinstance(result, str):
                  return False
              if result not in {"IPv4", "IPv6", "Neither"}:
                  return False

              def is_ipv4(ip: str) -> bool:
                  if ip.count(".") != 3:
                      return False
                  parts = ip.split(".")
                  if len(parts) != 4:
                      return False
                  for p in parts:
                      if not p.isdigit():
                          return False
                      if p != "0" and p.startswith("0"):
                          return False
                      if not 0 <= int(p) <= 255:
                          return False
                  return True

              def is_ipv6(ip: str) -> bool:
                  if ip.count(":") != 7:
                      return False
                  parts = ip.split(":")
                  if len(parts) != 8:
                      return False
                  hexdigits = "0123456789abcdefABCDEF"
                  for p in parts:
                      if not (1 <= len(p) <= 4):
                          return False
                      if any(c not in hexdigits for c in p):
                          return False
                  return True

              expected = "IPv4" if is_ipv4(queryIP) else "IPv6" if is_ipv6(queryIP) else "Neither"
              return result == expected
seed: 468
