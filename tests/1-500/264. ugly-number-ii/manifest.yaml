entry:
  id: 264
  title: ugly-number-ii
  params:
    n:
      type: int
  call:
    cpp: Solution().nthUglyNumber({n})
    rust: Solution::nth_ugly_number({n})
    python3: Solution().nthUglyNumber({n})
    python2: Solution().nthUglyNumber({n})
    ruby: nth_ugly_number({n})
    java: new Solution().nthUglyNumber({n})
    csharp: new Solution().NthUglyNumber({n})
    kotlin: Solution().nthUglyNumber({n})
    go: nthUglyNumber({n})
    dart: Solution().nthUglyNumber({n})
    swift: Solution().nthUglyNumber({n})
    typescript: nthUglyNumber({n})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: Checker().nthUglyNumber(n, {result})
    checker: |
      class Checker:
          def __init__(self):
              self.values = [1]
              i = j = k = 0
              while len(self.values) < 1690:
                  m = min(self.values[i] * 2, self.values[j] * 3, self.values[k] * 5)
                  self.values.append(m)
                  if m == self.values[i] * 2:
                      i += 1
                  if m == self.values[j] * 3:
                      j += 1
                  if m == self.values[k] * 5:
                      k += 1

          def nthUglyNumber(self, n, result):
              if not isinstance(result, int):
                  return False
              if not isinstance(n, int) or n < 1 or n > 1690:
                  return False
              return result == self.values[n - 1]
seed: 264
