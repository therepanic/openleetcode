entry:
  id: 202
  title: "happy-number"
  params:
    n:
      type: int
  call:
    cpp: "Solution().isHappy({n})"
    rust: "Solution::is_happy({n})"
    python3: "Solution().isHappy({n})"
    python2: "Solution().isHappy({n})"
    ruby: "is_happy({n})"
    java: "new Solution().isHappy({n})"
    csharp: "new Solution().IsHappy({n})"
    kotlin: "Solution().isHappy({n})"
    go: "isHappy({n})"
    dart: "Solution().isHappy({n})"
    swift: "Solution().isHappy({n})"
    typescript: "isHappy({n})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 128

oracle:
  python3:
    call: "Checker().isHappy(n, {result})"
    checker: |
      class Checker:
          def isHappy(self, n, result) -> bool:
              if not isinstance(result, bool):
                  return False

              seen = set()
              while n != 1 and n not in seen:
                  seen.add(n)
                  total = 0
                  while n > 0:
                      digit = n % 10
                      total += digit * digit
                      n //= 10
                  n = total

              return result == (n == 1)

seed: 202

