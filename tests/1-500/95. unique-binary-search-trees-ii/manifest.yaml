"oracle":
  "python3":
    "call": "Checker().check({n}, {result})"
    "checker":
      "import json\nclass Checker:\n    def tree_to_list(self, root):\n \
      \       if not root: return []\n        res, q = [], [root]\n        while q:\n\
      \            node = q.pop(0)\n            if node:\n                res.append(node.val)\n\
      \                q.append(node.left)\n                q.append(node.right)\n\
      \            else:\n                res.append(None)\n        while res and\
      \ res[-1] is None: res.pop()\n        return res\n    def check(self, n, result):\n\
      \        # Logic: number of BSTs with n nodes is Catalan number C_n\n      \
      \  try:\n            result = json.loads(result) if isinstance(result, str)\
      \ else result\n        except Exception:\n            return False\n       \
      \ if isinstance(result, list) and len(result) == 1 and isinstance(result[0],\
      \ list):\n            result = result[0]\n        catalan = [1]\n        for\
      \ i in range(1, n + 1):\n            total = 0\n            for j in range(i):\n\
      \                total += catalan[j] * catalan[i - 1 - j]\n            catalan.append(total)\n\
      \        return len(result) == catalan[n]\n"
