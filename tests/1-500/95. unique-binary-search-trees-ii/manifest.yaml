judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(n, {result})"
    checker: |
      class Checker:
          def _cat(self, n):
              dp = [0] * (n + 1)
              dp[0] = 1
              for i in range(1, n + 1):
                  total = 0
                  for left in range(i):
                      total += dp[left] * dp[i - 1 - left]
                  dp[i] = total
              return dp[n]

          def _build(self, arr):
              if not arr:
                  return None
              nodes = [None if v is None else {"v": v, "l": None, "r": None} for v in arr]
              kids = nodes[1:]
              for node in nodes:
                  if node is not None:
                      if kids:
                          node["l"] = kids.pop(0)
                      if kids:
                          node["r"] = kids.pop(0)
              return nodes[0]

          def _inorder(self, node, vals):
              if node is None:
                  return
              self._inorder(node["l"], vals)
              vals.append(node["v"])
              self._inorder(node["r"], vals)

          def _sig(self, arr):
              return tuple(arr)

          def check(self, n, result):
              if not isinstance(result, list) or len(result) != self._cat(n):
                  return False

              seen = set()
              for tree in result:
                  if not isinstance(tree, list) or not tree:
                      return False
                  sig = self._sig(tree)
                  if sig in seen:
                      return False
                  seen.add(sig)
                  root = self._build(tree)
                  vals = []
                  self._inorder(root, vals)
                  if vals != list(range(1, n + 1)):
                      return False
              return True
seed: 42
