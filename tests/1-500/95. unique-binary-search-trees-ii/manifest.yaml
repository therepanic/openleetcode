    cpp: "treeNodesArrayToVector(Solution().generateTrees({n}))"
    rust: "Solution::generate_trees({n}).into_iter().map(TreeNode::tree_node_to_array).collect::<Vec<_>>()"
    python3: "[tree_node_to_array(t) for t in Solution().generateTrees({n})]"
    python2: "[tree_node_to_array(t) for t in Solution().generateTrees({n})]"
    ruby: "generate_trees({n}).map { |e| tree_node_to_array(e) }"
    java: "TreeNode.treeNodesArrayToArrayList(new Solution().generateTrees({n}))"
    csharp: "TreeNode.TreeNodeListToArrayList(new Solution().GenerateTrees({n}))"
    kotlin: "generateTrees({n}).map { treeNodeToArray(it) }"
    go: "treesToArrays(generateTrees({n}))"
    dart: "generateTrees({n}).map((e) => tree_node_to_array(e)).toList()"
