entry:
  id: 241
  title: different-ways-to-add-parentheses
  params:
    expression:
      type: string
  call:
    cpp: "Solution().diffWaysToCompute({expression})"
    rust: "Solution::diff_ways_to_compute({expression})"
    python3: "Solution().diffWaysToCompute({expression})"
    python2: "Solution().diffWaysToCompute({expression})"
    ruby: "diff_ways_to_compute({expression})"
    java: "new Solution().diffWaysToCompute({expression})"
    csharp: "new Solution().DiffWaysToCompute({expression})"
    kotlin: "Solution().diffWaysToCompute({expression})"
    go: "diffWaysToCompute({expression})"
    dart: "Solution().diffWaysToCompute({expression})"
    swift: "Solution().diffWaysToCompute({expression})"
    typescript: "diffWaysToCompute({expression})"

judge:
  type: "ignore_order"

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().diffWaysToCompute(expression, {result})"
    checker: |
      from collections import Counter

      class Checker:
          def diffWaysToCompute(self, expression, result):
              if not isinstance(result, list):
                  return False
              if any(not isinstance(x, int) for x in result):
                  return False

              def solve(expr):
                  if expr.isdigit():
                      return [int(expr)]

                  res = []
                  for i, ch in enumerate(expr):
                      if ch in '+-*':
                          left = solve(expr[:i])
                          right = solve(expr[i + 1:])
                          for a in left:
                              for b in right:
                                  if ch == '+':
                                      res.append(a + b)
                                  elif ch == '-':
                                      res.append(a - b)
                                  else:
                                      res.append(a * b)
                  return res

              return Counter(result) == Counter(solve(expression))

