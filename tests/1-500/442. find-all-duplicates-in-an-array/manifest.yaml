entry:
  id: 442
  title: find-all-duplicates-in-an-array
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: Solution().findDuplicates({nums})
    rust: Solution::find_duplicates({nums})
    python3: Solution().findDuplicates({nums})
    python2: Solution().findDuplicates({nums})
    ruby: find_duplicates({nums})
    java: new Solution().findDuplicates({nums})
    csharp: new Solution().FindDuplicates({nums})
    kotlin: Solution().findDuplicates({nums})
    go: findDuplicates({nums})
    dart: Solution().findDuplicates({nums})
    swift: Solution().findDuplicates({nums})
    typescript: findDuplicates({nums})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: Checker().findDuplicates(nums, {result})
    checker: |
      from typing import Any, List

      class Checker:
          def findDuplicates(self, nums: List[int], result: Any) -> bool:
              if not isinstance(result, list):
                  return False
              n = len(nums)
              if any((not isinstance(x, int)) for x in result):
                  return False
              seen = [0] * (n + 1)
              for x in nums:
                  if not isinstance(x, int) or x < 1 or x > n:
                      return False
                  seen[x] += 1
                  if seen[x] > 2:
                      return False
              expected = [i for i in range(1, n + 1) if seen[i] == 2]
              return result == expected
