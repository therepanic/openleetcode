entry:
  id: 404
  title: "sum-of-left-leaves"
  params:
    root:
      type: tree_node
  call:
    cpp: "Solution().sumOfLeftLeaves({root})"
    rust: "Solution::sum_of_left_leaves({root})"
    python3: "Solution().sumOfLeftLeaves({root})"
    python2: "Solution().sumOfLeftLeaves({root})"
    ruby: "sum_of_left_leaves({root})"
    java: "new Solution().SumOfLeftLeaves({root})"
