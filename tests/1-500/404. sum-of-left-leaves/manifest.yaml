    kotlin: "Solution().sumOfLeftLeaves({root})"
    go: "sumOfLeftLeaves({root})"
    dart: "Solution().sumOfLeftLeaves({root})"
    swift: "Solution().sumOfLeftLeaves({root})"
    typescript: "sumOfLeftLeaves({root})"
judge:
  type: "exact"
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: "Checker().sumOfLeftLeaves(root, {result})"
    checker: |
      from typing import Any

      class Checker:
          def sumOfLeftLeaves(self, root: Any, result: Any) -> bool:
              return isinstance(result, int)
