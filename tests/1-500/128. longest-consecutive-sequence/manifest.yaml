oracle:
  python3:
    call: Checker().longestConsecutive(nums, {result})
    checker: "class Checker:\n    def longestConsecutive(self, nums, result):\n        if not isinstance(result, int):\n            return False\n        seen = set(nums)\n        best = 0\n        for num in seen:\n            if num - 1 not in seen:\n                cur = num\n                length = 1\n                while cur + 1 in seen:\n                    cur += 1\n                    length += 1\n                if length > best:\n                    best = length\n        return result == best\n"
