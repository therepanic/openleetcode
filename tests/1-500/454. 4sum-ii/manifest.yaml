judge:
  type: "exact"
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: "Checker().fourSumCount(nums1, nums2, nums3, nums4, {result})"
    checker: |
      class Checker:
          def fourSumCount(self, nums1, nums2, nums3, nums4, result):
              if not isinstance(result, int):
                  return False
              expected = 0
              for a in nums1:
                  for b in nums2:
                      for c in nums3:
                          for d in nums4:
                              if a + b + c + d == 0:
                                  expected += 1
              return result == expected
