entry:
  id: 218
  title: "the-skyline-problem"
  params:
    buildings:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().getSkyline({buildings})"
    rust: "Solution::get_skyline({buildings})"
    python3: "Solution().getSkyline({buildings})"
    python2: "Solution().getSkyline({buildings})"
    ruby: "get_skyline({buildings})"
    java: "new Solution().getSkyline({buildings})"
    csharp: "new Solution().GetSkyline({buildings})"
    kotlin: "Solution().getSkyline({buildings})"
    go: "getSkyline({buildings})"
    dart: "Solution().getSkyline({buildings})"
    swift: "Solution().getSkyline({buildings})"
    typescript: "getSkyline({buildings})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 300

oracle:
  python3:
    call: "Checker().getSkyline(buildings, {result})"
    checker: |
      from typing import Any, List, Tuple

      class Checker:
          def getSkyline(self, buildings: List[List[int]], result: Any) -> bool:
              if not isinstance(result, list):
                  return False
              for point in result:
                  if not isinstance(point, list) or len(point) != 2:
                      return False
                  if any(not isinstance(v, int) for v in point):
                      return False

              expected = self._skyline(buildings)
              return result == expected

          def _skyline(self, buildings: List[List[int]]) -> List[List[int]]:
              events: List[Tuple[int, int]] = []
              for building in buildings:
                  if not isinstance(building, list) or len(building) != 3:
                      return []
                  L, R, H = building
                  if not all(isinstance(v, int) for v in building):
                      return []
                  if not (0 <= L < R and H >= 1):
                      return []
                  events.append((L, -H))
                  events.append((R, H))

              events.sort()
              import heapq

              live = [0]
              removed = {}
              result = []
              prev = 0

              for x, h in events:
                  if h < 0:
                      heapq.heappush(live, h)
                  else:
                      removed[-h] = removed.get(-h, 0) + 1
                  while live[0] in removed:
                      top = live[0]
                      heapq.heappop(live)
                      removed[top] -= 1
                      if removed[top] == 0:
                          del removed[top]
                  curr = -live[0]
                  if curr != prev:
                      result.append([x, curr])
                      prev = curr
              return result

