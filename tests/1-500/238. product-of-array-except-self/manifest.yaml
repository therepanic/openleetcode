entry:
  id: 238
  title: product-of-array-except-self
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().productExceptSelf({nums})"
    rust: "Solution::product_except_self({nums})"
    python3: "Solution().productExceptSelf({nums})"
    python2: "Solution().productExceptSelf({nums})"
    ruby: "product_except_self({nums})"
    java: "new Solution().productExceptSelf({nums})"
    csharp: "new Solution().ProductExceptSelf({nums})"
    kotlin: "Solution().productExceptSelf({nums})"
    go: "productExceptSelf({nums})"
    dart: "Solution().productExceptSelf({nums})"
    swift: "Solution().productExceptSelf({nums})"
    typescript: "productExceptSelf({nums})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().productExceptSelf(nums, {result})"
    checker: |
      class Checker:
          def productExceptSelf(self, nums, result):
              if not isinstance(result, list):
                  return False
              if len(result) != len(nums):
                  return False
              n = len(nums)
              expected = [1] * n
              prefix = 1
              for i, x in enumerate(nums):
                  expected[i] = prefix
                  prefix *= x
              suffix = 1
              for i in range(n - 1, -1, -1):
                  expected[i] *= suffix
                  suffix *= nums[i]
              for i in range(n):
                  if result[i] != expected[i]:
                      return False
              return True
seed: 238
