entry:
  id: 299
  title: bulls-and-cows
  params:
    secret:
      type: string
    guess:
      type: string
  call:
    cpp: Solution().getHint({secret}, {guess})
    rust: Solution::get_hint({secret}, {guess})
    python3: Solution().getHint({secret}, {guess})
    python2: Solution().getHint({secret}, {guess})
    ruby: get_hint({secret}, {guess})
    java: new Solution().getHint({secret}, {guess})
    csharp: new Solution().GetHint({secret}, {guess})
    kotlin: Solution().getHint({secret}, {guess})
    go: getHint({secret}, {guess})
    dart: Solution().getHint({secret}, {guess})
    swift: Solution().getHint({secret}, {guess})
    typescript: getHint({secret}, {guess})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().getHint(secret, guess, {result})
    checker:
      "from collections import Counter\nfrom typing import Any\n\nclass Checker:\n\
      \    def getHint(self, secret: Any, guess: Any, result: Any) -> bool:\n    \
      \    if not isinstance(secret, str) or not isinstance(guess, str):\n       \
      \     return False\n        if not isinstance(result, str):\n            return\
      \ False\n        if len(secret) != len(guess):\n            return False\n \
      \       bulls = sum(a == b for a, b in zip(secret, guess))\n        counts =\
      \ Counter(secret)\n        cows = 0\n        for ch, gc in Counter(guess).items():\n\
      \            cows += min(counts.get(ch, 0), gc)\n        cows -= bulls\n   \
      \     return result == f\"{bulls}A{cows}B\"\n"
seed: 299
