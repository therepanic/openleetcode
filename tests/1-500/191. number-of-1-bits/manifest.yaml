      type: int
  call:
    cpp: "Solution().hammingWeight({n})"
    rust: "Solution::hamming_weight({n})"
    python3: "Solution().hammingWeight({n})"
    python2: "Solution().hammingWeight({n})"
    ruby: "hamming_weight({n})"
    java: "new Solution().hammingWeight({n})"
    csharp: "new Solution().HammingWeight({n})"
    kotlin: "Solution().hammingWeight({n})"
    go: "hammingWeight({n})"
    dart: "Solution().hammingWeight({n})"
    swift: "Solution().hammingWeight({n})"
    typescript: "hammingWeight({n})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().hammingWeight(n, {result})"
    checker: |
      class Checker:
          def hammingWeight(self, n, result):
              if not isinstance(n, int) or not isinstance(result, int):
                  return False
              if n < 1 or n > 2147483647:
                  return False
              count = 0
              x = n
              while x:
                  count += x & 1
                  x >>= 1
              return result == count
seed: 191
