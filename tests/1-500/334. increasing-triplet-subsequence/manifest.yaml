      type: array
      items:
        type: int
  call:
    cpp: "Solution().increasingTriplet({nums})"
    rust: "Solution::increasing_triplet({nums})"
    python3: "Solution().increasingTriplet({nums})"
    python2: "Solution().increasingTriplet({nums})"
    ruby: "increasing_triplet({nums})"
    java: "new Solution().increasingTriplet({nums})"
    csharp: "new Solution().IncreasingTriplet({nums})"
