judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().increasingTriplet(nums, {result})"
    checker: |
      class Checker:
          def increasingTriplet(self, nums, result):
              first = float('inf')
              second = float('inf')
              expected = False
              for x in nums:
                  if x <= first:
                      first = x
                  elif x <= second:
                      second = x
                  else:
                      expected = True
                      break
              return expected == result
