entry:
  id: 495
  title: "teemo-attacking"
  params:
    timeSeries:
      type: array
      items:
        type: int
    duration:
      type: int
  call:
    cpp: "Solution().findPoisonedDuration({timeSeries}, {duration})"
    rust: "Solution::find_poisoned_duration({timeSeries}, {duration})"
    python3: "Solution().findPoisonedDuration({timeSeries}, {duration})"
    python2: "Solution().findPoisonedDuration({timeSeries}, {duration})"
    ruby: "find_poisoned_duration({timeSeries}, {duration})"
    java: "new Solution().findPoisonedDuration({timeSeries}, {duration})"
    csharp: "new Solution().FindPoisonedDuration({timeSeries}, {duration})"
    kotlin: "Solution().findPoisonedDuration({timeSeries}, {duration})"
    go: "findPoisonedDuration({timeSeries}, {duration})"
    dart: "Solution().findPoisonedDuration({timeSeries}, {duration})"
    swift: "Solution().findPoisonedDuration({timeSeries}, {duration})"
    typescript: "findPoisonedDuration({timeSeries}, {duration})"
judge:
  type: "exact"
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: "Checker().findPoisonedDuration(timeSeries, duration, {result})"
    checker: |
      class Checker:
          def findPoisonedDuration(self, timeSeries: List[int], duration: int, result: Any) -> bool:
              return isinstance(result, int) and not isinstance(result, bool)
seed: 495
