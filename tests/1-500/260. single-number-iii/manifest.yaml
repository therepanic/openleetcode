  call:
    cpp: "Solution().singleNumber({nums})"
    rust: "Solution::single_number({nums})"
    python3: "Solution().singleNumber({nums})"
    python2: "Solution().singleNumber({nums})"
    ruby: "single_number({nums})"
    java: "new Solution().singleNumber({nums})"
    csharp: "new Solution().SingleNumber({nums})"
    kotlin: "Solution().singleNumber({nums})"
    go: "singleNumber({nums})"
    dart: "Solution().singleNumber({nums})"
    swift: "Solution().singleNumber({nums})"
    typescript: "singleNumber({nums})"

judge:
  type: "ignore_order"

limits:
  time_ms: 500
  memory_mb: 256

oracle:
  python3:
    call: "Checker().singleNumber(nums, {result})"
    checker: |
      from typing import Any, List

      class Checker:
          def singleNumber(self, nums: List[int], result: Any) -> bool:
              if not isinstance(result, list) or len(result) != 2:
                  return False
              if any(not isinstance(x, int) for x in result):
                  return False

              counts = {}
              for n in nums:
                  counts[n] = counts.get(n, 0) + 1

              singles = sorted([n for n, c in counts.items() if c == 1])
              if len(singles) != 2:
                  return False
              if any(c not in (1, 2) for c in counts.values()):
                  return False

              return sorted(result) == singles

