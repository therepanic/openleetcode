judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: Checker().constructRectangle(area, {result})
    checker: |
      import math

      class Checker:
          def constructRectangle(self, area, result):
              if not isinstance(result, list) or len(result) != 2:
                  return False
              l, w = result
              if not isinstance(l, int) or not isinstance(w, int):
                  return False
              if l < w:
                  return False
              if l * w != area:
                  return False
              x = int(math.isqrt(area))
              while x > 0 and area % x != 0:
                  x -= 1
              return l == area // x and w == x
