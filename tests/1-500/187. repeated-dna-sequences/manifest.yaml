entry:
  id: 187
  title: repeated-dna-sequences
  params:
    s:
      type: string
  call:
    cpp: Solution().findRepeatedDnaSequences({s})
    rust: Solution::find_repeated_dna_sequences({s})
    python3: Solution().findRepeatedDnaSequences({s})
    python2: Solution().findRepeatedDnaSequences({s})
    ruby: find_repeated_dna_sequences({s})
    java: new Solution().findRepeatedDnaSequences({s})
    csharp: new Solution().FindRepeatedDnaSequences({s})
    kotlin: Solution().findRepeatedDnaSequences({s})
    go: findRepeatedDnaSequences({s})
    dart: Solution().findRepeatedDnaSequences({s})
    swift: Solution().findRepeatedDnaSequences({s})
    typescript: findRepeatedDnaSequences({s})
judge:
  type: ignore_order
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().findRepeatedDnaSequences(s, {result})
    checker: |
      class Checker:
          def findRepeatedDnaSequences(self, s, result):
              def repeated_sequences(text):
                  seen = {}
                  repeated = []
                  for i in range(len(text) - 9):
                      seq = text[i:i + 10]
                      if seq not in seen:
                          seen[seq] = 1
                      elif seen[seq] == 1:
                          repeated.append(seq)
                          seen[seq] = 2
                  return repeated

              if not isinstance(result, list):
                  return False
              if any(not isinstance(x, str) for x in result):
                  return False
              if any(len(x) != 10 for x in result):
                  return False
              if any(set(x) - set("ACGT") for x in result):
                  return False

              expected = repeated_sequences(s)
              return sorted(result) == sorted(expected) and len(result) == len(set(result))
seed: 187
