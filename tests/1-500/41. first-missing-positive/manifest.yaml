  "title": "first-missing-positive"
  "call":
    "cpp": "Solution().firstMissingPositive({nums})"
    "rust": "Solution::first_missing_positive({nums})"
    "python3": "Solution().firstMissingPositive({nums})"
    "python2": "Solution().firstMissingPositive({nums})"
