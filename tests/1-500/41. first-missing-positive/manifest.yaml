  params:
    nums:
      type: array
      items:
        type: int
"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().check({nums}, {result})"
    "checker":
      "import json\nclass Checker:\n    def check(self, nums, res):\n        try:\n            res = json.loads(res)
      if isinstance(res, str) else res\n        except Exception:\n            return False\n        s = set(nums)\n     \
      \   i = 1\n        while i in s:\n            i += 1\n        return res == i\n"
"seed": 42
