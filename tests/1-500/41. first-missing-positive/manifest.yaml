entry:
  id: 41
  title: first-missing-positive
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: Solution().firstMissingPositive({nums})
    rust: Solution::first_missing_positive({nums})
    python3: Solution().firstMissingPositive({nums})
    python2: Solution().firstMissingPositive({nums})
    ruby: first_missing_positive({nums})
    java: new Solution().firstMissingPositive({nums})
    csharp: new Solution().FirstMissingPositive({nums})
    kotlin: Solution().firstMissingPositive({nums})
    go: firstMissingPositive({nums})
    dart: Solution().firstMissingPositive({nums})
    swift: Solution().firstMissingPositive({nums})
    typescript: firstMissingPositive({nums})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(nums, {result})
    checker: |
      class Checker:
          def check(self, nums, result):
              if not isinstance(result, int):
                  return False
              if result <= 0:
                  return False
              seen = set(nums)
              if result in seen:
                  return False
              for value in range(1, result):
                  if value not in seen:
                      return False
              return True
seed: 41
