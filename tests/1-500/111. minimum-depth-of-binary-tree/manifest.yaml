entry:
  id: 111
  title: minimum-depth-of-binary-tree
  params:
    root:
      type: tree_node
  call:
    cpp: Solution().minDepth({root})
    rust: Solution::min_depth({root})
    python3: Solution().minDepth({root})
    python2: Solution().minDepth({root})
    ruby: min_depth({root})
    java: new Solution().minDepth({root})
    csharp: new Solution().MinDepth({root})
    kotlin: Solution().minDepth({root})
    go: minDepth({root})
    dart: Solution().minDepth({root})
    swift: Solution().minDepth({root})
    typescript: minDepth({root})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().minDepth(root, {result})
    checker:
      "class Checker:\n    def minDepth(self, root, result):\n        def solve(idx):\n\
      \            if idx >= len(root) or root[idx] is None:\n                return\
      \ 0\n            left = 2 * idx + 1\n            right = 2 * idx + 2\n     \
      \       has_left = left < len(root) and root[left] is not None\n           \
      \ has_right = right < len(root) and root[right] is not None\n            if\
      \ not has_left and not has_right:\n                return 1\n            if\
      \ not has_left:\n                return 1 + solve(right)\n            if not\
      \ has_right:\n                return 1 + solve(left)\n            return 1 +\
      \ min(solve(left), solve(right))\n\n        if root is None or root == []:\n\
      \            return result == 0\n        if not isinstance(root, list):\n  \
      \          return False\n        return isinstance(result, int) and result ==\
      \ solve(0)\n"
seed: 111
