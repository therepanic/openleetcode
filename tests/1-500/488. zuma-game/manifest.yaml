entry:
  id: 488
  title: zuma-game
  params:
    board:
      type: string
    hand:
      type: string
  call:
    cpp: "Solution().findMinStep({board}, {hand})"
    rust: "Solution::find_min_step({board}, {hand})"
    python3: "Solution().findMinStep({board}, {hand})"
    python2: "Solution().findMinStep({board}, {hand})"
    ruby: "find_min_step({board}, {hand})"
    java: "new Solution().findMinStep({board}, {hand})"
    csharp: "new Solution().FindMinStep({board}, {hand})"
    kotlin: "Solution().findMinStep({board}, {hand})"
    go: "findMinStep({board}, {hand})"
    dart: "Solution().findMinStep({board}, {hand})"
    swift: "Solution().findMinStep({board}, {hand})"
    typescript: "findMinStep({board}, {hand})"
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 512
oracle:
  python3:
    call: "Checker().findMinStep(board, hand, {result})"
    checker: |
      class Checker:
          def findMinStep(self, board, hand, result):
              return type(result) is int
seed: 488
