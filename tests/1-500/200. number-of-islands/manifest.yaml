entry:
  id: 200
  title: number-of-islands
  params:
    grid:
      type: array
      items:
        type: array
        items:
          type: string
  call:
    cpp: Solution().numIslands({grid})
    rust: Solution::num_islands({grid})
    python3: Solution().numIslands({grid})
    python2: Solution().numIslands({grid})
    ruby: num_islands({grid})
    java: new Solution().numIslands({grid})
    csharp: new Solution().NumIslands({grid})
    kotlin: Solution().numIslands({grid})
    go: numIslands({grid})
    dart: Solution().numIslands({grid})
    swift: Solution().numIslands({grid})
    typescript: numIslands({grid})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 300
oracle:
  python3:
    call: Checker().numIslands(grid, {result})
    checker: |
      class Checker:
          def numIslands(self, grid, result):
              if not isinstance(result, int):
                  return False
              if not isinstance(grid, list):
                  return False
              grid = [[str(cell) for cell in row] for row in grid]
              if not grid or not isinstance(grid, list) or not grid[0]:
                  return result == 0
              rows = len(grid)
              cols = len(grid[0])
              seen = set()
              def dfs(r, c):
                  stack = [(r, c)]
                  while stack:
                      x, y = stack.pop()
                      if (x, y) in seen:
                          continue
                      if x < 0 or x >= rows or y < 0 or y >= cols:
                          continue
                      if grid[x][y] != "1":
                          continue
                      seen.add((x, y))
                      stack.append((x + 1, y))
                      stack.append((x - 1, y))
                      stack.append((x, y + 1))
                      stack.append((x, y - 1))
              count = 0
              for r in range(rows):
                  if not isinstance(grid[r], list) or len(grid[r]) != cols:
                      return False
                  for c in range(cols):
                      if grid[r][c] == "1" and (r, c) not in seen:
                          count += 1
                          dfs(r, c)
              return result == count
seed: 200
