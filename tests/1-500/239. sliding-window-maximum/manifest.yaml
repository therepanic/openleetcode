entry:
  id: 239
  title: "sliding-window-maximum"
  params:
    nums:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: "Solution().maxSlidingWindow({nums}, {k})"
    rust: "Solution::max_sliding_window({nums}, {k})"
    python3: "Solution().maxSlidingWindow({nums}, {k})"
    python2: "Solution().maxSlidingWindow({nums}, {k})"
    ruby: "max_sliding_window({nums}, {k})"
    java: "new Solution().maxSlidingWindow({nums}, {k})"
    csharp: "new Solution().MaxSlidingWindow({nums}, {k})"
    kotlin: "Solution().maxSlidingWindow({nums}, {k})"
    go: "maxSlidingWindow({nums}, {k})"
    dart: "Solution().maxSlidingWindow({nums}, {k})"
    swift: "Solution().maxSlidingWindow({nums}, {k})"
    typescript: "maxSlidingWindow({nums}, {k})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 300

oracle:
  python3:
    call: "Checker().check(nums, k, {result})"
    checker: |
      from collections import deque
      from typing import Any, List

      class Checker:
          def check(self, nums: List[int], k: int, result: Any) -> bool:
              if not isinstance(nums, list) or not isinstance(k, int):
                  return False
              if k < 1 or k > len(nums):
                  return False
              if not isinstance(result, list):
                  return False
              if len(result) != len(nums) - k + 1:
                  return False
              if any(not isinstance(x, int) for x in result):
                  return False

              expected = []
              q = deque()
              for idx, num in enumerate(nums):
                  while q and q[-1] < num:
                      q.pop()
                  q.append(num)
                  if idx >= k and nums[idx - k] == q[0]:
                      q.popleft()
                  if idx >= k - 1:
                      expected.append(q[0])
              return result == expected

seed: 239239

