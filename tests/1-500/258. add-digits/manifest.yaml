    swift: Solution().addDigits({num})
    typescript: addDigits({num})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(num, {result})"
    checker: |
      from typing import Any

      class Checker:
          def check(self, num: Any, result: Any) -> bool:
              if not isinstance(num, int) or not isinstance(result, int):
                  return False
              if num == 0:
                  expected = 0
              else:
                  expected = 1 + (num - 1) % 9
              return result == expected
