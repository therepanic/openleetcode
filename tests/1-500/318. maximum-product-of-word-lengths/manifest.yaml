entry:
  id: 318
  title: maximum-product-of-word-lengths
  params:
    words:
      type: array
      items:
        type: string
  call:
    cpp: Solution().maxProduct({words})
    rust: Solution::max_product({words})
    python3: Solution().maxProduct({words})
    python2: Solution().maxProduct({words})
    ruby: max_product({words})
    java: new Solution().maxProduct({words})
    csharp: new Solution().MaxProduct({words})
    kotlin: Solution().maxProduct({words})
    go: maxProduct({words})
    dart: Solution().maxProduct({words})
    swift: Solution().maxProduct({words})
    typescript: maxProduct({words})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(words, {result})
    checker: |
      from typing import Any, List

      class Checker:
          def check(self, words: Any, result: Any) -> bool:
              if not isinstance(words, list) or not isinstance(result, int):
                  return False
              if len(words) < 2:
                  return False
              bitmasks = []
              for w in words:
                  if not isinstance(w, str):
                      return False
                  if not (1 <= len(w) <= 1000):
                      return False
                  mask = 0
                  seen = set()
                  for ch in w:
                      if not isinstance(ch, str) or len(ch) != 1 or not ('a' <= ch <= 'z'):
                          return False
                      if ch not in seen:
                          seen.add(ch)
                          mask |= 1 << (ord(ch) - ord('a'))
                  bitmasks.append(mask)
              expected = 0
              for i in range(len(words)):
                  for j in range(i + 1, len(words)):
                      if bitmasks[i] & bitmasks[j] == 0:
                          expected = max(expected, len(words[i]) * len(words[j]))
              return result == expected
seed: 318
