entry:
  id: 84
  title: largest-rectangle-in-histogram
  params:
    heights:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().largestRectangleArea({heights})"
    rust: "Solution::largest_rectangle_area({heights})"
    python3: "Solution().largestRectangleArea({heights})"
    python2: "Solution().largestRectangleArea({heights})"
    ruby: "largest_rectangle_area({heights})"
    java: "new Solution().largestRectangleArea({heights})"
    csharp: "new Solution().LargestRectangleArea({heights})"
    kotlin: "Solution().largestRectangleArea({heights})"
    go: "largestRectangleArea({heights})"
    dart: "Solution().largestRectangleArea({heights})"
    swift: "Solution().largestRectangleArea({heights})"
    typescript: "largestRectangleArea({heights})"
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 300
oracle:
  python3:
    call: "Checker().check(heights, {result})"
    checker: |
      class Checker:
          def check(self, heights, result):
              return isinstance(result, int)
seed: 84
tests:
  - name: ex1
    in:
      heights: [2, 1, 5, 6, 2, 3]
    out: 10
  - name: ex2
    in:
      heights: [2, 4]
    out: 4
  - name: single_zero
    in:
      heights: [0]
    out: 0
  - name: single_one
    in:
      heights: [1]
    out: 1
  - name: all_equal
    in:
      heights: [2, 2, 2, 2]
    out: 8
  - name: increasing
    in:
      heights: [1, 2, 3, 4, 5]
    out: 9
  - name: decreasing
    in:
      heights: [5, 4, 3, 2, 1]
    out: 9
  - name: valley
    in:
      heights: [2, 1, 2]
    out: 3
  - name: plateau
    in:
      heights: [3, 3, 3]
    out: 9
  - name: zeros_split
    in:
      heights: [2, 0, 2]
    out: 2
  - name: zeros_all
    in:
      heights: [0, 0, 0, 0]
    out: 0
  - name: classic_peak
    in:
      heights: [6, 2, 5, 4, 5, 1, 6]
    out: 12
  - name: alternating
    in:
      heights: [2, 1, 2, 1, 2, 1, 2]
    out: 7
  - name: long_flat
    in:
      heights: [4, 4, 4, 4, 4, 4]
    out: 24
  - name: small_pit
    in:
      heights: [4, 2, 0, 3, 2, 5]
    out: 6
  - name: max_height_single
    in:
      heights: [10000]
    out: 10000
  - name: max_height_pair
    in:
      heights: [10000, 10000]
    out: 20000
  - name: max_height_mixed
    in:
      heights: [10000, 1, 10000]
    out: 10000
  - name: left_growing
    in:
      heights: [1, 3, 2, 1, 2]
    out: 5
  - name: right_growing
    in:
      heights: [2, 1, 3, 3, 2]
    out: 6
  - name: peak_with_zero_end
    in:
      heights: [1, 2, 3, 0]
    out: 4
  - name: peak_with_zero_start
    in:
      heights: [0, 3, 2, 1]
    out: 4
  - name: repeated_blocks
    in:
      heights: [1, 1, 2, 2, 1, 1]
    out: 6
  - name: mid_plateau
    in:
      heights: [2, 4, 4, 4, 2]
    out: 12
  - name: wide_low_bar
    in:
      heights: [1, 1, 1, 1, 1, 1, 1]
    out: 7
  - name: tall_middle
    in:
      heights: [1, 2, 100, 2, 1]
    out: 100
  - name: mixed_large_small
    in:
      heights: [100, 1, 100, 1, 100]
    out: 100
  - name: randomish_1
    in:
      heights: [3, 6, 5, 7, 4, 8, 1, 0, 9]
    out: 20
  - name: randomish_2
    in:
      heights: [2, 3, 2, 3, 2, 3, 2]
    out: 14
  - name: small_single_peak
    in:
      heights: [2, 1, 2, 3, 1]
    out: 5
  - name: strict_small
    in:
      heights: [1, 2, 1, 2, 1]
    out: 5
  - name: broad_plateau
    in:
      heights: [5, 5, 5, 1, 5, 5, 5]
    out: 15
  - name: max_area_from_edges
    in:
      heights: [9, 8, 7, 8, 9]
    out: 35
  - name: low_high_low
    in:
      heights: [1, 10000, 1]
    out: 10000
  - name: double_peak
    in:
      heights: [4, 2, 0, 4, 2, 4]
    out: 6
  - name: descending_tail
    in:
      heights: [6, 5, 4, 3, 2, 1, 1]
    out: 12
