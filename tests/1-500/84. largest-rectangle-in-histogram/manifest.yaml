        type: int
"judge":
  "type": "exact"
"limits":
  "time_ms": 2000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().largestRectangleArea({heights}, {result})"
    "checker":
      "class Checker:\n    def largestRectangleArea(self, heights, result):\n        try:\n            result = int(result)\n\
      \        except Exception:\n            return False\n        n = len(heights)\n        left, right = [-1] * n, [n]
      * n\n        stack = []\n        for i in range(n):\n            while stack and heights[stack[-1]] >= heights[i]:\n\
      \                stack.pop()\n            left[i] = stack[-1] if stack else -1\n            stack.append(i)\n      \
      \  stack.clear()\n        for i in range(n - 1, -1, -1):\n            while stack and heights[stack[-1]] >= heights[i]:\n\
      \                stack.pop()\n            right[i] = stack[-1] if stack else n\n            stack.append(i)\n      \
      \  max_area = 0\n        for i in range(n):\n            max_area = max(max_area, heights[i] * (right[i] - left[i] -
      1))\n        return max_area == result\n"
"seed": 42
