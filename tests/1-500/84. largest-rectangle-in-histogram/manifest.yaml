  "title": "largest-rectangle-in-histogram"
  "call":
    "cpp": "Solution().largestRectangleArea({heights})"
    "rust": "Solution::largest_rectangle_area({heights})"
    "python3": "Solution().largestRectangleArea({heights})"
    "python2": "Solution().largestRectangleArea({heights})"
    "ruby": "largest_rectangle_area({heights})"
    "java": "new Solution().largestRectangleArea({heights})"
    "csharp": "new Solution().LargestRectangleArea({heights})"
    "kotlin": "Solution().largestRectangleArea({heights})"
    "go": "largestRectangleArea({heights})"
    "dart": "Solution().largestRectangleArea({heights})"
