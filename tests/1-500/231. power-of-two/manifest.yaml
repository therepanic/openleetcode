entry:
  id: 231
  title: power-of-two
  params:
    n:
      type: int
  call:
    cpp: Solution().isPowerOfTwo({n})
    rust: Solution::is_power_of_two({n})
    python3: Solution().isPowerOfTwo({n})
    python2: Solution().isPowerOfTwo({n})
    ruby: is_power_of_two({n})
    java: new Solution().isPowerOfTwo({n})
    csharp: new Solution().IsPowerOfTwo({n})
    kotlin: Solution().isPowerOfTwo({n})
    go: isPowerOfTwo({n})
    dart: Solution().isPowerOfTwo({n})
    swift: Solution().isPowerOfTwo({n})
    typescript: isPowerOfTwo({n})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(n, {result})"
    checker: |
      from typing import Any

      class Checker:
          def check(self, n: Any, result: Any) -> bool:
              return isinstance(result, bool)
