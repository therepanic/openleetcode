  call:
    cpp: Solution().isPalindrome({head})
    rust: Solution::is_palindrome({head})
    python3: Solution().isPalindrome({head})
    python2: Solution().isPalindrome({head})
    ruby: is_palindrome({head})
    java: new Solution().isPalindrome({head})
    csharp: new Solution().IsPalindrome({head})
    kotlin: Solution().isPalindrome({head})
