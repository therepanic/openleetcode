judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().isPalindrome(head, {result})
    checker: |
      from typing import Any

      class Checker:
          def isPalindrome(self, head: Any, result: Any) -> bool:
              if not isinstance(result, bool):
                  return False

              def to_values(node: Any) -> list:
                  if node is None:
                      return []
                  if hasattr(node, "val") and hasattr(node, "next"):
                      values = []
                      seen = 0
                      while node is not None:
                          values.append(node.val)
                          node = node.next
                          seen += 1
                          if seen > 100000:
                              return []
                      return values
                  if isinstance(node, list) or isinstance(node, tuple):
                      if len(node) == 0:
                          return []
                      if len(node) == 2 and not all(isinstance(x, (int, bool, float, str)) for x in node):
                          return [node[0]] + to_values(node[1])
                      return list(node)
                  return []

              values = to_values(head)
              return result == (values == values[::-1])
