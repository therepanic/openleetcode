entry:
  id: 410
  title: split-array-largest-sum
  params:
    nums:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: "Solution().splitArray({nums}, {k})"
    rust: "Solution::split_array({nums}, {k})"
    python3: "Solution().splitArray({nums}, {k})"
    python2: "Solution().splitArray({nums}, {k})"
    ruby: "split_array({nums}, {k})"
    java: "new Solution().splitArray({nums}, {k})"
    csharp: "new Solution().SplitArray({nums}, {k})"
    kotlin: "Solution().splitArray({nums}, {k})"
    go: "splitArray({nums}, {k})"
    dart: "Solution().splitArray({nums}, {k})"
    swift: "Solution().splitArray({nums}, {k})"
    typescript: "splitArray({nums}, {k})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().splitArray(nums, k, {result})"
    checker: |
      class Checker:
          def splitArray(self, nums, k, result):
              if not isinstance(result, int):
                  return False
              low = max(nums)
              high = sum(nums)
              ans = high
              while low <= high:
                  mid = low + (high - low) // 2
                  groups = 1
                  curr = 0
                  for num in nums:
                      if curr + num > mid:
                          groups += 1
                          curr = num
                      else:
                          curr += num
                  if groups <= k:
                      ans = mid
                      high = mid - 1
                  else:
                      low = mid + 1
              return result == ans
seed: 410
