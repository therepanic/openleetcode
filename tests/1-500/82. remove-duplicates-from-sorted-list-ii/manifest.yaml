"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().verify(head, {result})"
    "checker":
      "import json\nclass Checker:\n    def verify(self, input_arr, result_arr):\n        from collections import
      Counter\n        try:\n            result_arr = json.loads(result_arr) if isinstance(result_arr, str) else result_arr\n\
      \        except Exception:\n            return False\n        counts = Counter(input_arr)\n        expected = [x for
      x in input_arr if counts[x] == 1]\n        if isinstance(result_arr, list) and len(result_arr) == 1 and isinstance(result_arr[0],
      list):\n            result_arr = result_arr[0]\n        return expected == result_arr\n"
"seed": 42
