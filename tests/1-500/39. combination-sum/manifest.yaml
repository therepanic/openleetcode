judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().combinationSum(candidates, target, {result})"
    checker: |
      class Checker:
          def combinationSum(self, candidates, target, result):
              if not isinstance(result, list):
                  return False
              cand_set = set(candidates)
              if len(cand_set) != len(candidates):
                  return False
              normalized = []
              seen = set()
              for comb in result:
                  if not isinstance(comb, list):
                      return False
                  if any(not isinstance(x, int) for x in comb):
                      return False
                  if any(x not in cand_set for x in comb):
                      return False
                  if sum(comb) != target:
                      return False
                  key = tuple(sorted(comb))
                  if key in seen:
                      return False
                  seen.add(key)
                  normalized.append(key)
              expected = []
              candidates = sorted(candidates)

              def dfs(start, path, total):
                  if total == target:
                      expected.append(tuple(path))
                      return
                  for i in range(start, len(candidates)):
                      v = candidates[i]
                      nt = total + v
                      if nt > target:
                          break
                      path.append(v)
                      dfs(i, path, nt)
                      path.pop()

              dfs(0, [], 0)
              return set(normalized) == set(expected)
seed: 39
