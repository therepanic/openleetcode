entry:
  id: 39
  title: combination-sum
  call:
    cpp: Solution().combinationSum({candidates}, {target})
    rust: Solution::combination_sum({candidates}, {target})
    python3: Solution().combinationSum({candidates}, {target})
    python2: Solution().combinationSum({candidates}, {target})
    ruby: combination_sum({candidates}, {target})
    java: new Solution().combinationSum({candidates}, {target})
    csharp: new Solution().CombinationSum({candidates}, {target})
    kotlin: Solution().combinationSum({candidates}, {target})
    go: combinationSum({candidates}, {target})
    dart: Solution().combinationSum({candidates}, {target})
    swift: Solution().combinationSum({candidates}, {target})
    typescript: combinationSum({candidates}, {target})
  params:
    candidates:
      type: array
      items:
        type: int
    target:
      type: int
judge:
  type: ignore_order
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(candidates, target, {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, result):\n        if isinstance(result, str):\n           \
      \ try:\n                result = json.loads(result)\n            except Exception:\n                pass\n        return
      result\n\n    def check(self, candidates, target, result):\n        result = self._norm(result)\n        if not isinstance(result,
      list): return False\n        seen = set()\n        for comb in result:\n            if sum(comb) != target: return False\n\
      \            for x in comb:\n                if x not in candidates: return False\n            seen.add(tuple(sorted(comb)))\n\
      \        def get_all(target_val, start_idx):\n            if target_val == 0: return [[]]\n            if target_val
      < 0 or start_idx == len(candidates): return []\n            res = []\n            for i in range(start_idx, len(candidates)):\n\
      \                for sub in get_all(target_val - candidates[i], i):\n                    res.append([candidates[i]]
      + sub)\n            return res\n        expected = [tuple(sorted(c)) for c in get_all(target, 0)]\n        return len(result)
      == len(expected) and all(tuple(sorted(c)) in expected for c in result)\n"
seed: 42
