entry:
  id: 403
  title: frog-jump
  params:
    stones:
      type: array
      items:
        type: int
  call:
    cpp: Solution().canCross({stones})
    rust: Solution::can_cross({stones})
    python3: Solution().canCross({stones})
    python2: Solution().canCross({stones})
    ruby: can_cross({stones})
    java: new Solution().canCross({stones})
    csharp: new Solution().CanCross({stones})
    kotlin: Solution().canCross({stones})
    go: canCross({stones})
    dart: Solution().canCross({stones})
    swift: Solution().canCross({stones})
    typescript: canCross({stones})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().canCross(stones, {result})
    checker: |
      class Checker:
          def canCross(self, stones, result):
              if not isinstance(stones, list) or len(stones) < 2:
                  return False
              if not isinstance(result, bool):
                  return False
              if stones[0] != 0:
                  return False
              if any(not isinstance(x, int) for x in stones):
                  return False
              if any(stones[i] >= stones[i + 1] for i in range(len(stones) - 1)):
                  return False
              dp = {stone: set() for stone in stones}
              dp[0] = {0}
              for stone in stones:
                  for jump in dp[stone]:
                      for jump_distance in (jump - 1, jump, jump + 1):
                          if jump_distance > 0 and stone + jump_distance in dp:
                              dp[stone + jump_distance].add(jump_distance)
              expected = len(dp[stones[-1]]) > 0
              return result is expected
seed: 403
