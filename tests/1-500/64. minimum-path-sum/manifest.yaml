  "title": "minimum-path-sum"
  "call":
    "cpp": "Solution().minPathSum({grid})"
    "rust": "Solution::min_path_sum({grid})"
    "python3": "Solution().minPathSum({grid})"
    "python2": "Solution().minPathSum({grid})"
    "ruby": "min_path_sum({grid})"
    "java": "new Solution().minPathSum({grid})"
    "csharp": "new Solution().MinPathSum({grid})"
    "kotlin": "Solution().minPathSum({grid})"
    "go": "minPathSum({grid})"
    "dart": "Solution().minPathSum({grid})"
    "swift": "Solution().minPathSum({grid})"
    "typescript": "minPathSum({grid})"
  params:
    grid:
      type: array
      items:
        type: array
        items:
          type: int
"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().minPathSum({grid}, {result})"
    "checker":
      "import json\nclass Checker:\n    def minPathSum(self, grid, result):\n        try:\n            result = json.loads(result)
      if isinstance(result, str) else result\n        except Exception:\n            return False\n        m, n = len(grid),
      len(grid[0])\n        dp = [[0] * n for _ in range(m)]\n        dp[0][0] = grid[0][0]\n        for i in range(1, m):
      dp[i][0] = dp[i - 1][0] + grid[i][0]\n        for j in range(1, n): dp[0][j] = dp[0][j - 1] + grid[0][j]\n        for
      i in range(1, m):\n            for j in range(1, n):\n                dp[i][j] = min(dp[i - 1][j], dp[i][j - 1]) + grid[i][j]\n\
      \        return dp[m - 1][n - 1] == result\n"
"seed": 42
