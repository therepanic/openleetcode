entry:
  id: 64
  title: minimum-path-sum
  params:
    grid:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().minPathSum({grid})"
    rust: "Solution::min_path_sum({grid})"
    python3: "Solution().minPathSum({grid})"
    python2: "Solution().minPathSum({grid})"
    ruby: "min_path_sum({grid})"
    java: "new Solution().minPathSum({grid})"
    csharp: "new Solution().MinPathSum({grid})"
    kotlin: "Solution().minPathSum({grid})"
    go: "minPathSum({grid})"
    dart: "Solution().minPathSum({grid})"
    swift: "Solution().minPathSum({grid})"
    typescript: "minPathSum({grid})"

judge:
  type: exact

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().check({result})"
    checker: |
      class Checker:
          def check(self, result):
              return isinstance(result, int)

seed: 64

