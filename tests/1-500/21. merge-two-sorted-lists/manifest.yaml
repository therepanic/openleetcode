      l1:
        gen: array
        len:
          gen: int
          min: 1
          max: 20
        of:
          gen: int
          min: 0
          max: 20
        sorted: true
      l2:
        gen: array
        len:
          gen: int
          min: 1
          max: 20
        of:
          gen: int
          min: 0
          max: 20
        sorted: true
  - name: generated 2
