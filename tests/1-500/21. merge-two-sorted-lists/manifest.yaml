    swift: "list_node_to_array(Solution().mergeTwoLists({l1}, {l2}))"
    typescript: "listNodeToArray(mergeTwoLists({l1}, {l2}))"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check([{l1}], [{l2}], {result})"
    checker: |
      import json

      class Checker:
          def check(self, l1, l2, res):
              expected = sorted(l1 + l2)
              try:
                  got = json.loads(res) if isinstance(res, str) else res
              except Exception:
                  return False
              return got == expected
seed: 42
