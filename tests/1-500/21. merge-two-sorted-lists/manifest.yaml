entry:
  id: 21
  title: merge-two-sorted-lists
  call:
    cpp: listNodeToArray(Solution().mergeTwoLists({l1}, {l2}))
    rust: ListNode::list_node_to_array(Solution::merge_two_lists({l1}, {l2}))
    python3: list_node_to_array(Solution().mergeTwoLists({l1}, {l2}))
    python2: list_node_to_array(Solution().mergeTwoLists({l1}, {l2}))
    ruby: list_node_to_array(merge_two_lists({l1}, {l2}))
    java: ListNode.listNodeToArray(new Solution().mergeTwoLists({l1}, {l2}))
    csharp: ListNode.ListNodeToArray(new Solution().MergeTwoLists({l1}, {l2}))
    kotlin: listNodeToArray(Solution().mergeTwoLists({l1}, {l2}))
    go: listNodeToArray(mergeTwoLists({l1}, {l2}))
    dart: list_node_to_array(Solution().mergeTwoLists({l1}, {l2}))
    swift: list_node_to_array(Solution().mergeTwoLists({l1}, {l2}))
    typescript: listNodeToArray(mergeTwoLists({l1}, {l2}))
  params:
    l1:
      type: list_node
    l2:
      type: list_node
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check([{l1}], [{l2}], {result})
    checker:
      "import json\n\nclass Checker:\n    def check(self, l1, l2, res):\n        expected = sorted(l1 + l2)\n     \
      \   try:\n            got = json.loads(res) if isinstance(res, str) else res\n        except Exception:\n          \
      \  return False\n        return got == expected\n"
seed: 42
tests:
  - name: example 1
    in:
      l1:
        - 1
        - 2
        - 4
      l2:
        - 1
        - 3
        - 4
    out:
      - 1
      - 1
      - 2
      - 3
      - 4
      - 4
  - name: example 2
    in:
      l1: []
      l2: []
    out: []
  - name: example 3
    in:
      l1: []
      l2:
        - 0
    out:
      - 0
  - name: single elements
    in:
      l1:
        - 1
      l2:
        - 2
    out:
      - 1
      - 2
  - name: l1 empty
    in:
      l1: []
      l2:
        - 1
        - 5
        - 10
    out:
      - 1
      - 5
      - 10
  - name: l2 empty
    in:
      l1:
        - 1
        - 2
      l2: []
    out:
      - 1
      - 2
  - name: duplicates
    in:
      l1:
        - 1
        - 1
      l2:
        - 1
        - 1
    out:
      - 1
      - 1
      - 1
      - 1
  - name: overlapping
    in:
      l1:
        - 1
        - 3
        - 5
      l2:
        - 2
        - 4
        - 6
    out:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
  - name: negative values
    in:
      l1:
        - -10
        - -5
        - 0
      l2:
        - -8
        - -2
        - 2
    out:
      - -10
      - -8
      - -5
      - -2
      - 0
      - 2
  - name: max constraints
    in:
      l1:
        - -100
        - -100
        - 100
      l2:
        - -100
        - 50
        - 100
    out:
      - -100
      - -100
      - -100
      - 50
      - 100
      - 100
  - name: generated 1
