entry:
  id: 4
  title: median-of-two-sorted-arrays
  params:
    nums1:
      type: array
      items:
        type: int
    nums2:
      type: array
      items:
        type: int
  call:
    cpp: Solution().findMedianSortedArrays({nums1}, {nums2})
    rust: Solution::find_median_sorted_arrays({nums1}, {nums2})
    python3: Solution().findMedianSortedArrays({nums1}, {nums2})
    python2: Solution().findMedianSortedArrays({nums1}, {nums2})
    ruby: find_median_sorted_arrays({nums1}, {nums2})
    java: new Solution().findMedianSortedArrays({nums1}, {nums2})
    csharp: new Solution().FindMedianSortedArrays({nums1}, {nums2})
    kotlin: Solution().findMedianSortedArrays({nums1}, {nums2})
    go: findMedianSortedArrays({nums1}, {nums2})
    dart: Solution().findMedianSortedArrays({nums1}, {nums2})
    swift: Solution().findMedianSortedArrays({nums1}, {nums2})
    typescript: findMedianSortedArrays({nums1}, {nums2})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().findMedianSortedArrays(nums1, nums2, {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, result):\n        if\
      \ isinstance(result, str):\n            try:\n                result = json.loads(result)\n\
      \            except Exception:\n                pass\n        return result\n\
      \n    def findMedianSortedArrays(self, nums1, nums2, result):\n        result\
      \ = self._norm(result)\n        merged = sorted(nums1 + nums2)\n        n =\
      \ len(merged)\n        if n % 2 == 1:\n            expected = float(merged[n\
      \ // 2])\n        else:\n            expected = (merged[n // 2 - 1] + merged[n\
      \ // 2]) / 2.0\n        return abs(result - expected) < 1e-6\n"
seed: 42
tests:
  - name: example 1
    in:
      nums1:
        - 1
        - 3
      nums2:
        - 2
    out: 2.0
  - name: example 2
    in:
      nums1:
        - 1
        - 2
      nums2:
        - 3
        - 4
    out: 2.5
  - name: empty nums1
    in:
      nums1: []
      nums2:
        - 1
    out: 1.0
  - name: empty nums2
    in:
      nums1:
        - 2
      nums2: []
    out: 2.0
  - name: single element each
    in:
      nums1:
        - 1
      nums2:
        - 2
    out: 1.5
  - name: identical elements
    in:
      nums1:
        - 1
        - 1
      nums2:
        - 1
        - 1
    out: 1.0
  - name: nums1 shorter
    in:
      nums1:
        - 1
        - 2
      nums2:
        - 3
        - 4
        - 5
        - 6
    out: 3.5
  - name: nums2 shorter
    in:
      nums1:
        - 1
        - 5
        - 8
      nums2:
        - 2
        - 3
    out: 3.0
  - name: nums1 all smaller than nums2
    in:
      nums1:
        - 1
        - 2
      nums2:
        - 3
        - 4
    out: 2.5
  - name: interleaved
    in:
      nums1:
        - 1
        - 3
        - 5
      nums2:
        - 2
        - 4
        - 6
    out: 3.5
  - name: negative values
    in:
      nums1:
        - -5
        - -3
      nums2:
        - -4
        - -2
    out: -3.5
  - name: mixed negative and positive
    in:
      nums1:
        - -10
        - 5
      nums2:
        - -2
        - 10
    out: 1.5
  - name: large values
    in:
      nums1:
        - 100000
        - 200000
      nums2:
        - 300000
        - 400000
    out: 250000.0
  - name: boundary values
    in:
      nums1:
        - -1000000
      nums2:
        - 1000000
    out: 0.0
  - name: even length total
    in:
      nums1:
        - 1
        - 2
        - 3
      nums2:
        - 4
        - 5
        - 6
    out: 3.5
  - name: odd length total
    in:
      nums1:
        - 1
        - 2
      nums2:
        - 3
        - 4
        - 5
    out: 3.0
  - name: gen short arrays
    in:
      nums1:
        gen: array
        len:
          gen: int
          min: 1
          max: 10
        of:
          gen: int
          min: 0
          max: 100
        sorted: true
      nums2:
