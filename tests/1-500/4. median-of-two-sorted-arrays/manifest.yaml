        len:
          gen: int
          min: 1
          max: 10
        of:
          gen: int
          min: 0
          max: 100
        sorted: true
  - name: gen medium arrays
    in:
      nums1:
        gen: array
        len:
          gen: int
          min: 50
          max: 100
        of:
          gen: int
          min: -500
          max: 500
        sorted: true
      nums2:
        gen: array
        len:
          gen: int
          min: 50
          max: 100
        of:
          gen: int
          min: -500
          max: 500
        sorted: true
  - name: gen large arrays
    in:
      nums1:
        gen: array
        len:
          gen: int
          min: 900
          max: 1000
        of:
          gen: int
          min: -1000000
          max: 1000000
        sorted: true
      nums2:
        gen: array
