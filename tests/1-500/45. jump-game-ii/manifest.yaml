entry:
  id: 45
  title: jump-game-ii
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().jump({nums})"
    rust: "Solution::jump({nums})"
    python3: "Solution().jump({nums})"
    python2: "Solution().jump({nums})"
    ruby: "jump({nums})"
    java: "new Solution().jump({nums})"
    csharp: "new Solution().Jump({nums})"
    kotlin: "Solution().jump({nums})"
    go: "jump({nums})"
    dart: "Solution().jump({nums})"
    swift: "Solution().jump({nums})"
    typescript: "jump({nums})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().jump(nums, {result})"
    checker: |
      class Checker:
          def jump(self, nums, result):
              if not isinstance(result, int):
                  return False
              n = len(nums)
              if n <= 1:
                  return result == 0
              jumps = 0
              curr_end = 0
              max_reach = 0
              for i in range(n - 1):
                  if i > max_reach:
                      return False
                  max_reach = max(max_reach, i + nums[i])
                  if i == curr_end:
                      jumps += 1
                      curr_end = max_reach
                      if curr_end >= n - 1:
                          break
              return result == jumps
seed: 45
