entry:
  id: 45
  title: jump-game-ii
  call:
    cpp: Solution().jump(lv(vector<int>{ {nums} }))
    rust: Solution::jump(vec![{nums}])
    python3: Solution().jump([{nums}])
    python2: Solution().jump([{nums}])
    ruby: jump([{nums}])
    java: new Solution().jump(new int[]{ {nums} })
    csharp: new Solution().Jump(new int[]{ {nums} })
    kotlin: Solution().jump(intArrayOf({nums}))
    go: jump([]int{ {nums} })
    dart: Solution().jump([{nums}])
    swift: Solution().jump([{nums}])
    typescript: jump([{nums}])
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().jump([{nums}], {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, result):\n        if\
      \ isinstance(result, str):\n            try:\n                result = json.loads(result)\n\
      \            except Exception:\n                pass\n            if isinstance(result,\
      \ str):\n                low = result.strip().lower()\n                if low\
      \ == 'true':\n                    return True\n                if low == 'false':\n\
      \                    return False\n                if low.lstrip('-').isdigit():\n\
      \                    return int(low)\n        return result\n\n    def jump(self,\
      \ nums, result):\n        result = self._norm(result)\n        n = len(nums)\n\
      \        if n <= 1: return result == 0\n        jumps = 0\n        curr_end\
      \ = 0\n        max_reach = 0\n        for i in range(n - 1):\n            max_reach\
      \ = max(max_reach, i + nums[i])\n            if i == curr_end:\n           \
      \     jumps += 1\n                curr_end = max_reach\n        return jumps\
      \ == result\n"
seed: 42
