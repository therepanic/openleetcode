entry:
  id: 230
  title: "kth-smallest-element-in-a-bst"
  params:
    root:
      type: tree_node
    k:
      type: int
  call:
    cpp: "Solution().kthSmallest({root}, {k})"
    rust: "Solution::kth_smallest({root}, {k})"
    python3: "Solution().kthSmallest({root}, {k})"
    python2: "Solution().kthSmallest({root}, {k})"
    ruby: "kth_smallest({root}, {k})"
    java: "new Solution().kthSmallest({root}, {k})"
    csharp: "new Solution().KthSmallest({root}, {k})"
    kotlin: "Solution().kthSmallest({root}, {k})"
    go: "kthSmallest({root}, {k})"
    dart: "Solution().kthSmallest({root}, {k})"
    swift: "Solution().kthSmallest({root}, {k})"
    typescript: "kthSmallest({root}, {k})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 300

oracle:
  python3:
    call: "Checker().kthSmallest(root, k, {result})"
    checker: |
      class Checker:
          def kthSmallest(self, root, k, result):
              def inorder(node):
                  if not node:
                      return []
                  return inorder(node.left) + [node.val] + inorder(node.right)

              vals = inorder(root)
              return isinstance(result, int) and 1 <= k <= len(vals) and result == vals[k - 1]

seed: 230

