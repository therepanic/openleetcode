"judge":
  "type": "ignore_order"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().restoreIpAddresses(s, {result})"
    "checker":
      "class Checker:\n    def restoreIpAddresses(self, s, result):\n   \
      \     def is_valid(ip):\n            parts = ip.split('.')\n            if len(parts)\
      \ != 4: return False\n            for p in parts:\n                if not p.isdigit()\
      \ or (len(p) > 1 and p[0] == '0') or int(p) > 255:\n                    return\
      \ False\n            return True\n        if not isinstance(result, list): return\
      \ False\n        recreated = \"\".join(s.split('.')) if False else \"\".join([p\
      \ for ip in result for p in ip.split('.')])\n        for ip in result:\n   \
      \         if not is_valid(ip) or \"\".join(ip.split('.')) != s:\n          \
      \      return False\n        return True\n"
"seed": 42
