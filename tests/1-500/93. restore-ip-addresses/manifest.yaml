entry:
  id: 93
  title: restore-ip-addresses
  params:
    s:
      type: string
  call:
    cpp: "Solution().restoreIpAddresses({s})"
    rust: "Solution::restore_ip_addresses({s})"
    python3: "Solution().restoreIpAddresses({s})"
    python2: "Solution().restoreIpAddresses({s})"
    ruby: "restore_ip_addresses({s})"
    java: "new Solution().restoreIpAddresses({s})"
    csharp: "new Solution().RestoreIpAddresses({s})"
    kotlin: "Solution().restoreIpAddresses({s})"
    go: "restoreIpAddresses({s})"
    dart: "Solution().restoreIpAddresses({s})"
    swift: "Solution().restoreIpAddresses({s})"
    typescript: "restoreIpAddresses({s})"
judge:
  type: ignore_order
limits:
  time_ms: 500
  memory_mb: 256
oracle:
  python3:
    call: "Checker().restoreIpAddresses(s, {result})"
    checker: |
      class Checker:
          def restoreIpAddresses(self, s, result):
              if not isinstance(s, str) or not isinstance(result, list):
                  return False

              def valid_ip(ip):
                  parts = ip.split(".")
                  if len(parts) != 4:
                      return False
                  for part in parts:
                      if not part or len(part) > 3:
                          return False
                      if len(part) > 1 and part[0] == "0":
                          return False
                      if not part.isdigit():
                          return False
                      value = int(part)
                      if value < 0 or value > 255:
                          return False
                  return True

              expected = set()
              n = len(s)
              for a in range(1, 4):
                  for b in range(1, 4):
                      for c in range(1, 4):
                          d = n - a - b - c
                          if 1 <= d <= 3:
                              parts = [s[:a], s[a:a + b], s[a + b:a + b + c], s[a + b + c:]]
                              if all(part and (len(part) == 1 or part[0] != "0") and int(part) <= 255 for part in parts):
                                  expected.add(".".join(parts))

              if len(result) != len(set(result)):
                  return False
              if any(not isinstance(item, str) or not valid_ip(item) for item in result):
                  return False
              return set(result) == expected
seed: 93
