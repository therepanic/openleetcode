judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().addStrings(num1, num2, {result})"
    checker: |
      class Checker:
          def addStrings(self, num1, num2, result):
              if not isinstance(num1, str) or not isinstance(num2, str):
                  return False
              if not isinstance(result, str):
                  return False

              i, j = len(num1) - 1, len(num2) - 1
              carry = 0
              digits = []

              while i >= 0 or j >= 0 or carry:
                  d1 = ord(num1[i]) - ord('0') if i >= 0 else 0
                  d2 = ord(num2[j]) - ord('0') if j >= 0 else 0
                  total = d1 + d2 + carry
                  digits.append(chr(total % 10 + ord('0')))
                  carry = total // 10
                  i -= 1
                  j -= 1

              expected = ''.join(reversed(digits))
              return result == expected
seed: 415
