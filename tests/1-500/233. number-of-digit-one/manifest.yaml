judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().countDigitOne(n, {result})"
    checker: |
      class Checker:
          def countDigitOne(self, n, result):
              if not isinstance(result, int):
                  return False
              count = 0
              factor = 1
              while factor <= n:
                  lower = n % factor
                  cur = (n // factor) % 10
                  higher = n // (factor * 10)
                  if cur == 0:
                      count += higher * factor
                  elif cur == 1:
                      count += higher * factor + lower + 1
                  else:
                      count += (higher + 1) * factor
                  factor *= 10
              return result == count
seed: 233
