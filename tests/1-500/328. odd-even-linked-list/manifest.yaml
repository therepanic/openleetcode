judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(head, {result})
    checker: |
      from typing import Any, List

      class Checker:
          def _to_values(self, node: Any) -> List[int]:
              if node is None:
                  return []
              if isinstance(node, (list, tuple)):
                  return list(node)
              values = []
              seen = 0
              while node is not None:
                  if not hasattr(node, "val") or not hasattr(node, "next"):
                      return []
                  values.append(node.val)
                  node = node.next
                  seen += 1
                  if seen > 200000:
                      return []
              return values

          def check(self, head: Any, result: Any) -> bool:
              src = self._to_values(head)
              got = self._to_values(result)
              if len(src) != len(got):
                  return False
              expected = src[::2] + src[1::2]
              return got == expected
