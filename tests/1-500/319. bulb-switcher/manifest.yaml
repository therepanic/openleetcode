entry:
  id: 319
  title: "bulb-switcher"
  params:
    n:
      type: int
  call:
    cpp: "Solution().bulbSwitch({n})"
    rust: "Solution::bulb_switch({n})"
    python3: "Solution().bulbSwitch({n})"
    python2: "Solution().bulbSwitch({n})"
    ruby: "bulb_switch({n})"
    java: "new Solution().bulbSwitch({n})"
    csharp: "new Solution().BulbSwitch({n})"
    kotlin: "Solution().bulbSwitch({n})"
    go: "bulbSwitch({n})"
    dart: "Solution().bulbSwitch({n})"
    swift: "Solution().bulbSwitch({n})"
    typescript: "bulbSwitch({n})"

judge:
  type: "exact"

limits:
  time_ms: 100
  memory_mb: 128

oracle:
  python3:
    call: "Checker().check(n, {result})"
    checker: |
      from typing import Any
      from math import isqrt

      class Checker:
          def check(self, n: Any, result: Any) -> bool:
              if not isinstance(n, int) or not isinstance(result, int):
                  return False
              if n < 0:
                  return False
              expected = isqrt(n)
              return result == expected

seed: 319319

