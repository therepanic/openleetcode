entry:
  id: 12
  title: integer-to-roman
  call:
    cpp: Solution().intToRoman({num})
    rust: Solution::int_to_roman({num})
    python3: Solution().intToRoman({num})
    python2: Solution().intToRoman({num})
    ruby: int_to_roman({num})
    java: new Solution().intToRoman({num})
    csharp: new Solution().IntToRoman({num})
    kotlin: Solution().intToRoman({num})
    go: intToRoman({num})
    dart: Solution().intToRoman({num})
    swift: Solution().intToRoman({num})
    typescript: intToRoman({num})
  params:
    num:
      type: int
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check({num}, {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, result):\n        if\
      \ isinstance(result, str):\n            try:\n                result = json.loads(result)\n\
      \            except Exception:\n                pass\n            if isinstance(result,\
      \ str):\n                low = result.strip().lower()\n                if low\
      \ == 'true':\n                    return True\n                if low == 'false':\n\
      \                    return False\n                if low.lstrip('-').isdigit():\n\
      \                    return int(low)\n        return result\n\n    def check(self,\
      \ num, result):\n        result = self._norm(result)\n        M = ['', 'M',\
      \ 'MM', 'MMM']\n        C = ['', 'C', 'CC', 'CCC', 'CD', 'D', 'DC', 'DCC', 'DCCC',\
      \ 'CM']\n        X = ['', 'X', 'XX', 'XXX', 'XL', 'L', 'LX', 'LXX', 'LXXX',\
      \ 'XC']\n        I = ['', 'I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII',\
      \ 'IX']\n        expected = M[num // 1000] + C[num % 1000 // 100] + X[num %\
      \ 100 // 10] + I[num % 10]\n        return result == expected\n"
seed: 42
