entry:
  id: 68
  title: text-justification
  params:
    words:
      type: array
      items:
        type: string
    maxWidth:
      type: int
  call:
    cpp: "Solution().fullJustify({words}, {maxWidth})"
    rust: "Solution::full_justify({words}, {maxWidth})"
    python3: "fullJustify({words}, {maxWidth})"
    python2: "fullJustify({words}, {maxWidth})"
    ruby: "full_justify({words}, {maxWidth})"
    java: "new Solution().fullJustify({words}, {maxWidth})"
    csharp: "new Solution().FullJustify({words}, {maxWidth})"
    kotlin: "Solution().fullJustify({words}, {maxWidth})"
    go: "fullJustify({words}, {maxWidth})"
    dart: "Solution().fullJustify({words}, {maxWidth})"
    swift: "Solution().fullJustify({words}, {maxWidth})"
    typescript: "fullJustify({words}, {maxWidth})"

judge:
  type: exact

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "fullJustify(words, maxWidth)"
    checker: |
      class Checker:
          def fullJustify(self, words, maxWidth, result):
              return result is not None

seed: 68

tests:
  - name: example_1
    in:
      words:
        - This
        - is
        - an
        - example
        - of
        - text
        - justification.
      maxWidth: 16
    out:
      - "This    is    an"
      - "example  of text"
      - "justification.  "
  - name: example_2
    in:
      words:
        - What
        - must
        - be
        - acknowledgment
        - shall
        - be
      maxWidth: 16
    out:
      - "What   must   be"
      - "acknowledgment  "
      - "shall be        "
  - name: example_3
    in:
      words:
        - Science
        - is
        - what
        - we
        - understand
        - well
        - enough
        - to
        - explain
        - to
        - a
        - computer.
        - Art
        - is
        - everything
        - else
        - we
        - do
      maxWidth: 20
    out:
      - "Science  is  what we"
      - "understand      well"
      - "enough to explain to"
      - "a  computer.  Art is"
      - "everything  else  we"
      - "do                  "
  - name: single_word_exact_width
    in:
      words:
        - hello
      maxWidth: 5
    out:
      - "hello"
  - name: single_word_padded
    in:
      words:
        - hello
      maxWidth: 10
    out:
      - "hello     "
  - name: two_words_exact_fit
    in:
      words:
        - ab
        - cd
      maxWidth: 5
    out:
      - "ab cd"
  - name: two_words_need_padding_last_line
    in:
      words:
        - ab
        - cd
      maxWidth: 6
    out:
      - "ab cd "
  - name: uneven_distribution_one_extra
    in:
      words:
        - a
        - b
        - c
        - d
      maxWidth: 6
    out:
      - "a  b c"
      - "d     "
  - name: uneven_distribution_two_extras
    in:
      words:
        - a
        - b
        - c
        - d
      maxWidth: 7
    out:
      - "a b c d"
  - name: all_single_char_tight
    in:
      words:
        - a
        - b
        - c
        - d
        - e
      maxWidth: 3
    out:
      - "a b"
      - "c d"
      - "e  "
  - name: exact_line_boundary
    in:
      words:
        - abc
        - de
        - f
        - gh
      maxWidth: 6
    out:
      - "abc de"
      - "f gh  "
  - name: last_line_left_justified_many_words
    in:
      words:
        - one
        - two
        - three
      maxWidth: 11
    out:
      - "one     two"
      - "three      "
  - name: long_word_with_small_followups
    in:
      words:
        - supercalifragilistic
        - is
        - fun
      maxWidth: 20
    out:
      - "supercalifragilistic"
      - "is fun              "
  - name: punctuation_words
    in:
      words:
        - hello,
        - world!
        - yes?
      maxWidth: 13
    out:
      - "hello, world!"
      - "yes?         "
  - name: many_single_letter_words_width_four
    in:
      words:
        - a
        - b
        - c
        - d
        - e
        - f
        - g
      maxWidth: 4
    out:
      - "a  b"
      - "c  d"
      - "e  f"
      - "g   "
  - name: width_one_single_char_words
    in:
      words:
        - a
        - b
        - c
      maxWidth: 1
    out:
      - "a"
      - "b"
      - "c"
  - name: width_two_simple
    in:
      words:
        - a
        - b
        - c
      maxWidth: 2
    out:
      - "a "
      - "b "
      - "c "
  - name: fit_three_words_exact
    in:
      words:
        - ab
        - c
        - de
      maxWidth: 7
    out:
      - "ab c de"
  - name: fit_three_words_with_padding
    in:
      words:
        - ab
        - c
        - de
      maxWidth: 8
    out:
      - "ab c de "
  - name: alternating_lengths
    in:
      words:
        - a
        - bb
        - c
        - ddd
        - e
        - ff
      maxWidth: 8
    out:
      - "a  bb  c"
      - "ddd e ff"
  - name: exact_fit_across_multiple_lines
    in:
      words:
        - abc
        - def
        - gh
        - ijk
        - l
      maxWidth: 7
    out:
      - "abc def"
      - "gh  ijk"
      - "l      "
  - name: single_line_many_words
    in:
      words:
        - a
        - bb
        - ccc
        - d
      maxWidth: 12
    out:
      - "a bb ccc d  "
  - name: single_word_maxwidth_twenty
    in:
      words:
        - abcdefghijklmnopqrst
      maxWidth: 20
    out:
      - "abcdefghijklmnopqrst"
  - name: multiple_one_word_lines
    in:
      words:
        - abcdefghij
        - klmnopqrst
        - uvwxyz
      maxWidth: 10
    out:
      - "abcdefghij"
      - "klmnopqrst"
      - "uvwxyz    "
  - name: greedy_pack_boundary
    in:
      words:
        - aa
        - bb
        - ccc
        - d
        - ee
        - fff
      maxWidth: 9
    out:
      - "aa bb ccc"
      - "d ee fff "
  - name: spaces_left_heavier
    in:
      words:
        - a
        - b
        - c
        - d
        - e
      maxWidth: 9
    out:
      - "a b c d e"
  - name: many_words_short_width
    in:
      words:
        - a
        - b
        - c
        - d
        - e
        - f
        - g
        - h
      maxWidth: 5
    out:
      - "a b c"
      - "d e f"
      - "g h  "
  - name: exact_justified_last_line
    in:
      words:
        - what
        - must
        - be
      maxWidth: 12
    out:
      - "what must be"
  - name: final_line_single_word_padding
    in:
      words:
        - aa
        - b
        - c
      maxWidth: 4
    out:
      - "aa b"
      - "c   "
  - name: long_mix_small_width
    in:
      words:
        - a
        - bc
        - d
        - ef
        - g
        - hi
      maxWidth: 5
    out:
      - "a  bc"
      - "d  ef"
      - "g hi "
  - name: boundary_three_lines
    in:
      words:
        - abc
        - d
        - ef
        - ghij
        - k
      maxWidth: 8
    out:
      - "abc d ef"
      - "ghij k  "
  - name: max_width_hundred_single_line
    in:
      words:
        - lorem
        - ipsum
        - dolor
        - sit
        - amet
      maxWidth: 100
    out:
      - "lorem ipsum dolor sit amet                                                                          "
  - name: max_width_hundred_multi_line
    in:
      words:
        - a
        - bb
        - ccc
        - dddd
        - eeeee
        - ffffff
      maxWidth: 100
    out:
      - "a bb ccc dddd eeeee ffffff                                                                          "
  - name: near_max_word_lengths
    in:
      words:
        - abcdefghijklmnopqrst
        - uvwxyzabcdefghijklmn
        - opqrstuvwxyzabcdefgh
      maxWidth: 20
    out:
      - "abcdefghijklmnopqrst"
      - "uvwxyzabcdefghijklmn"
      - "opqrstuvwxyzabcdefgh"
  - name: many_short_words_fill_exactly
    in:
      words:
        - a
        - b
        - c
        - d
        - e
        - f
        - g
        - h
        - i
        - j
      maxWidth: 10
    out:
      - "a  b c d e"
      - "f g h i j "
  - name: uneven_last_line_padding
    in:
      words:
        - abc
        - de
        - f
        - gh
        - i
      maxWidth: 8
    out:
      - "abc de f"
      - "gh i    "
