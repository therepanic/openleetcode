"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().fullJustify(words, maxWidth, {result})"
    "checker":
      "class Checker:\n    def fullJustify(self, words, maxWidth, result):\n\
      \        def solve(words, maxWidth):\n            res = []\n            i =\
      \ 0\n            n = len(words)\n            while i < n:\n                j\
      \ = i\n                line_len = 0\n                while j < n and line_len\
      \ + len(words[j]) + (j - i) <= maxWidth:\n                    line_len += len(words[j])\n\
      \                    j += 1\n                space_count = maxWidth - line_len\n\
      \                gaps = j - i - 1\n                line = ''\n             \
      \   if j == n or gaps == 0:\n                    for k in range(i, j):\n   \
      \                     line += words[k] + (' ' if k != j - 1 else '')\n     \
      \               line += ' ' * (maxWidth - len(line))\n                else:\n\
      \                    space_each = space_count // gaps\n                    extra\
      \ = space_count % gaps\n                    for k in range(i, j):\n        \
      \                line += words[k]\n                        if k != j - 1:\n\
      \                            to_add = space_each + (1 if extra > 0 else 0)\n\
      \                            line += ' ' * to_add\n                        \
      \    if extra > 0:\n                                extra -= 1\n           \
      \     res.append(line)\n                i = j\n            return res\n    \
      \    return solve(words, maxWidth) == result\n"
"seed": 42
