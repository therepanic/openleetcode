entry:
  id: 140
  title: "word-break-ii"
  params:
    s:
      type: "string"
    wordDict:
      type: "array"
      items:
        type: "string"
  call:
    cpp: "Solution().wordBreak({s}, {wordDict})"
    rust: "Solution::word_break({s}, {wordDict})"
    python3: "Solution().wordBreak({s}, {wordDict})"
    python2: "Solution().wordBreak({s}, {wordDict})"
    ruby: "word_break({s}, {wordDict})"
    java: "new Solution().wordBreak({s}, {wordDict})"
    csharp: "new Solution().WordBreak({s}, {wordDict})"
    kotlin: "Solution().wordBreak({s}, {wordDict})"
    go: "wordBreak({s}, {wordDict})"
    dart: "Solution().wordBreak({s}, {wordDict})"
    swift: "Solution().wordBreak({s}, {wordDict})"
    typescript: "wordBreak({s}, {wordDict})"
judge:
  type: "exact"
limits:
  time_ms: 2000
  memory_mb: 512
oracle:
  python3:
    call: "Checker().wordBreak(s, wordDict, {result})"
    checker: |
      import copy


      from typing import *
      from collections import *
      import copy
      import json
      import math
      import bisect
      import heapq
      import itertools
      import functools

      def fun(s,dc,memo):
          if(s in memo):
              return memo[s]
          ans=[]
          if(dc[s]==1):
              ans=[s]
          for i in range(1,len(s)):
              if(dc[s[:i]]==1):
                  a=fun(s[i:],dc,memo)
                  for x in a:
                      ans.append(s[:i]+" "+x)
          memo[s]=ans
          return ans
      class Solution:
          def wordBreak(self, s: str, wordDict: List[str]) -> List[str]:
              dc=defaultdict(lambda:0)
              for a in wordDict:
                  dc[a]=1
              return(fun(s,dc,{}))


      def array_to_list_node_local(values):
          dummy = ListNode(0)
          tail = dummy
          for value in values:
              tail.next = ListNode(value)
              tail = tail.next
          return dummy.next

      def array_to_tree_node_local(values):
          if not values:
              return None
          root = TreeNode(values[0])
          queue = deque([root])
          index = 1
          while queue and index < len(values):
              node = queue.popleft()
              if index < len(values) and values[index] is not None:
                  node.left = TreeNode(values[index])
                  queue.append(node.left)
              index += 1
              if index < len(values) and values[index] is not None:
                  node.right = TreeNode(values[index])
                  queue.append(node.right)
              index += 1
          return root

      def list_node_to_array_local(node):
          out = []
          seen = 0
          while node is not None and seen < 100000:
              out.append(node.val)
              node = node.next
              seen += 1
          return out

      def tree_node_to_array_local(root):
          if root is None:
              return []
          out = []
          q = deque([root])
          while q:
              node = q.popleft()
              if node is None:
                  out.append(None)
                  continue
              out.append(node.val)
              q.append(node.left)
              q.append(node.right)
          while out and out[-1] is None:
              out.pop()
          return out

      def deep_sort(value):
          if isinstance(value, list):
              normalized = [deep_sort(item) for item in value]
              return sorted(normalized, key=lambda item: json.dumps(item, sort_keys=True))
          if isinstance(value, dict):
              return {key: deep_sort(val) for key, val in sorted(value.items())}
          return value

      def normalize_expected(value):
          kind = "array[string]"
          if kind == "list_node":
              return list_node_to_array_local(value)
          if kind == "tree_node":
              return tree_node_to_array_local(value)
          return value

      def normalize_actual(value):
          return value

      def prepare_input(value, kind):
          if kind == "tree_node":
              return array_to_tree_node_local(value)
          if kind == "list_node":
              return array_to_list_node_local(value)
          return copy.deepcopy(value)

      class Checker:
          def wordBreak(self, s, wordDict, result):
              prepared_s = prepare_input(s, "string"); prepared_wordDict = prepare_input(wordDict, "array[string]")
              expected = Solution().wordBreak(prepared_s, prepared_wordDict)
              expected = normalize_expected(expected)
              actual = normalize_actual(result)
              return deep_sort(expected) == deep_sort(actual)
seed: 140
