entry:
  id: 131
  title: palindrome-partitioning
  params:
    s:
      type: string
  call:
    cpp: Solution().partition({s})
    rust: Solution::partition({s})
    python3: Solution().partition({s})
    python2: Solution().partition({s})
    ruby: partition({s})
    java: new Solution().partition({s})
    csharp: new Solution().Partition({s})
    kotlin: Solution().partition({s})
    go: partition({s})
    dart: Solution().partition({s})
    swift: Solution().partition({s})
    typescript: partition({s})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: Checker().partition(s, {result})
    checker:
      "from typing import Any, List\n\nclass Checker:\n    def partition(self, s: str, result: Any) -> bool:\n        if not isinstance(result, list):\n            return False\n\n        expected = set()\n\n        def build(idx: int, path: List[str]) -> None:\n            if idx == len(s):\n                expected.add(tuple(path))\n                return\n            for end in range(idx + 1, len(s) + 1):\n                piece = s[idx:end]\n                if piece == piece[::-1]:\n                    path.append(piece)\n                    build(end, path)\n                    path.pop()\n\n        build(0, [])\n\n        seen = set()\n        for partition in result:\n            if not isinstance(partition, list):\n                return False\n            if tuple(partition) in seen:\n                return False\n            seen.add(tuple(partition))\n            if \"\".join(partition) != s:\n                return False\n            for piece in partition:\n          \
      \      if not isinstance(piece, str):\n                    return False\n                if piece == \"\" or piece != piece[::-1]:\n                    return False\n\n        return seen == expected\n"
seed: 131131
