entry:
  id: 167
  title: "two-sum-ii-input-array-is-sorted"
  params:
    numbers:
      type: array
      items:
        type: int
    target:
      type: int
  call:
    cpp: "Solution().twoSum({numbers}, {target})"
    rust: "Solution::two_sum({numbers}, {target})"
    python3: "Solution().twoSum({numbers}, {target})"
    python2: "Solution().twoSum({numbers}, {target})"
    ruby: "two_sum({numbers}, {target})"
    java: "new Solution().twoSum({numbers}, {target})"
    csharp: "new Solution().TwoSum({numbers}, {target})"
    kotlin: "Solution().twoSum({numbers}, {target})"
    go: "twoSum({numbers}, {target})"
    dart: "Solution().twoSum({numbers}, {target})"
    swift: "Solution().twoSum({numbers}, {target})"
    typescript: "twoSum({numbers}, {target})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().twoSum(numbers, target, {result})"
    checker: "class Checker:\n    def twoSum(self, numbers, target, result) -> bool:\n        if not isinstance(result, list) or len(result) != 2:\n            return False\n        i, j = result\n        if not isinstance(i, int) or not isinstance(j, int):\n            return False\n        if i < 1 or j < 1 or i >= j or j > len(numbers):\n            return False\n        return numbers[i - 1] + numbers[j - 1] == target\n"

seed: 167

