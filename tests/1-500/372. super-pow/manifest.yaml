entry:
  id: 372
  title: super-pow
  params:
    a:
      type: int
    b:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().superPow({a}, {b})"
    rust: "Solution::super_pow({a}, {b})"
    python3: "Solution().superPow({a}, {b})"
    python2: "Solution().superPow({a}, {b})"
    ruby: "super_pow({a}, {b})"
    java: "new Solution().superPow({a}, {b})"
    csharp: "new Solution().SuperPow({a}, {b})"
    kotlin: "Solution().superPow({a}, {b})"
    go: "superPow({a}, {b})"
    dart: "Solution().superPow({a}, {b})"
    swift: "Solution().superPow({a}, {b})"
    typescript: "superPow({a}, {b})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(a, b, {result})"
    checker: |
      class Checker:
          def check(self, a, b, result):
              if not isinstance(a, int):
                  return False
              if not isinstance(b, list) or not (1 <= len(b) <= 2000):
                  return False
              if not isinstance(result, int):
                  return False
              if any((not isinstance(d, int)) or d < 0 or d > 9 for d in b):
                  return False
              if b[0] == 0:
                  return False
              mod = 1337
              expected = 1
              base = a % mod
              for d in b:
                  expected = pow(expected, 10, mod) * pow(base, d, mod) % mod
              return result == expected
seed: 372
