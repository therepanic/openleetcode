entry:
  id: 13
  title: roman-to-integer
  params:
    s:
      type: string
  call:
    cpp: Solution().romanToInt({s})
    rust: Solution::roman_to_int({s})
    python3: Solution().romanToInt({s})
    python2: Solution().romanToInt({s})
    ruby: roman_to_int({s})
    java: new Solution().romanToInt({s})
    csharp: new Solution().RomanToInt({s})
    kotlin: Solution().romanToInt({s})
    go: romanToInt({s})
    dart: Solution().romanToInt({s})
    swift: Solution().romanToInt({s})
    typescript: romanToInt({s})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().romanToInt(s, {result})
    checker: |
      class Checker:
          def romanToInt(self, s, result):
              roman = {
                  "I": 1,
                  "V": 5,
                  "X": 10,
                  "L": 50,
                  "C": 100,
                  "D": 500,
                  "M": 1000,
              }
              if not isinstance(result, int):
                  return False
              if not (1 <= len(s) <= 15):
                  return False
              if any(ch not in roman for ch in s):
                  return False
              total = 0
              for a, b in zip(s, s[1:]):
                  if roman[a] < roman[b]:
                      total -= roman[a]
                  else:
                      total += roman[a]
              total += roman[s[-1]]
              return 1 <= total <= 3999 and total == result
seed: 13
