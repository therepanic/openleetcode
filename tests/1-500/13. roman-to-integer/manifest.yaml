entry:
  id: 13
  title: roman-to-integer
  call:
    cpp: Solution().romanToInt({s})
    rust: Solution::roman_to_int(String::from({s}))
    python3: Solution().romanToInt({s})
    python2: Solution().romanToInt({s})
    ruby: roman_to_int({s})
    java: new Solution().romanToInt({s})
    csharp: new Solution().RomanToInt({s})
    kotlin: Solution().romanToInt({s})
    go: romanToInt({s})
    dart: Solution().romanToInt({s})
    swift: Solution().romanToInt({s})
    typescript: romanToInt({s})
  params:
    s:
      type: string
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(s, {result})
    checker:
      "class Checker:\n    def check(self, s, result):\n        roman = {'I':\
      \ 1, 'V': 5, 'X': 10, 'L': 50, 'C': 100, 'D': 500, 'M': 1000}\n        res =\
      \ 0\n        for i in range(len(s)):\n            if i + 1 < len(s) and roman[s[i]]\
      \ < roman[s[i+1]]:\n                res -= roman[s[i]]\n            else:\n\
      \                res += roman[s[i]]\n        return res == result\n"
seed: 42
