entry:
  id: 452
  title: minimum-number-of-arrows-to-burst-balloons
  params:
    points:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().findMinArrowShots({points})"
    rust: "Solution::find_min_arrow_shots({points})"
    python3: "Solution().findMinArrowShots({points})"
    python2: "Solution().findMinArrowShots({points})"
    ruby: "find_min_arrow_shots({points})"
    java: "new Solution().findMinArrowShots({points})"
    csharp: "new Solution().FindMinArrowShots({points})"
    kotlin: "Solution().findMinArrowShots({points})"
    go: "findMinArrowShots({points})"
    dart: "Solution().findMinArrowShots({points})"
    swift: "Solution().findMinArrowShots({points})"
    typescript: "findMinArrowShots({points})"
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(points, {result})"
    checker: |
      class Checker:
          def check(self, points, result):
              if not isinstance(result, int):
                  return False
              if result < 1:
                  return False
              intervals = [list(p) for p in points]
              if not intervals:
                  return False
              intervals.sort(key=lambda x: x[1])
              arrows = 1
              end = intervals[0][1]
              for start, finish in intervals:
                  if start > end:
                      arrows += 1
                      end = finish
              return arrows == result
seed: 42
