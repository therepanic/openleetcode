entry:
  id: 123
  title: best-time-to-buy-and-sell-stock-iii
  params:
    prices:
      type: array
      items:
        type: int
  call:
    cpp: Solution().maxProfit({prices})
    rust: Solution::max_profit({prices})
    python3: Solution().maxProfit({prices})
    python2: Solution().maxProfit({prices})
    ruby: max_profit({prices})
    java: new Solution().maxProfit({prices})
    csharp: new Solution().MaxProfit({prices})
    kotlin: Solution().maxProfit({prices})
    go: maxProfit({prices})
    dart: Solution().maxProfit({prices})
    swift: Solution().maxProfit({prices})
    typescript: maxProfit({prices})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().maxProfit(prices, {result})
    checker: "class Checker:\n    def maxProfit(self, prices, result):\n        buy1 = -prices[0]\n        sell1 = 0\n        buy2 = -prices[0]\n        sell2 = 0\n\n        for price in prices[1:]:\n            buy1 = max(buy1, -price)\n            sell1 = max(sell1, buy1 + price)\n            buy2 = max(buy2, sell1 - price)\n            sell2 = max(sell2, buy2 + price)\n\n        return sell2 == result\n"
seed: 123
