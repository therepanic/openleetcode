entry:
  id: 365
  title: water-and-jug-problem
  params:
    x:
      type: int
    y:
      type: int
    target:
      type: int
  call:
    cpp: "Solution().canMeasureWater({x}, {y}, {target})"
    rust: "Solution::can_measure_water({x}, {y}, {target})"
    python3: "Solution().canMeasureWater({x}, {y}, {target})"
    python2: "Solution().canMeasureWater({x}, {y}, {target})"
    ruby: "can_measure_water({x}, {y}, {target})"
    java: "new Solution().canMeasureWater({x}, {y}, {target})"
    csharp: "new Solution().CanMeasureWater({x}, {y}, {target})"
    kotlin: "Solution().canMeasureWater({x}, {y}, {target})"
    go: "canMeasureWater({x}, {y}, {target})"
    dart: "Solution().canMeasureWater({x}, {y}, {target})"
    swift: "Solution().canMeasureWater({x}, {y}, {target})"
    typescript: "canMeasureWater({x}, {y}, {target})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().canMeasureWater(x, y, target, {result})"
    checker: |
      from math import gcd

      class Checker:
          def canMeasureWater(self, x, y, target, result):
              if not isinstance(result, bool):
                  return False
              if any(type(v) is not int for v in (x, y, target)):
                  return False
              if x < 1 or y < 1 or target < 1:
                  return False
              expected = target <= x + y and target % gcd(x, y) == 0
              return result is expected
seed: 365
