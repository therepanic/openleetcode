judge:
  type: "exact"
limits:
  time_ms: 2000
  memory_mb: 300
oracle:
  python3:
    call: "Checker().reversePairs(nums, {result})"
    checker: |
      from typing import Any, List

      class Checker:
          def reversePairs(self, nums: List[int], result: Any) -> bool:
              if not isinstance(result, int):
                  return False

              def count(arr: List[int]) -> int:
                  def sort_count(lo: int, hi: int) -> int:
                      if hi - lo <= 1:
                          return 0
                      mid = (lo + hi) // 2
                      total = sort_count(lo, mid) + sort_count(mid, hi)
                      j = mid
                      for i in range(lo, mid):
                          while j < hi and arr[i] > 2 * arr[j]:
                              j += 1
                          total += j - mid
                      merged = []
                      i, j = lo, mid
                      while i < mid and j < hi:
                          if arr[i] <= arr[j]:
                              merged.append(arr[i])
                              i += 1
                          else:
                              merged.append(arr[j])
                              j += 1
                      merged.extend(arr[i:mid])
                      merged.extend(arr[j:hi])
                      arr[lo:hi] = merged
                      return total

                  return sort_count(0, len(arr))

              return result == count(list(nums))
