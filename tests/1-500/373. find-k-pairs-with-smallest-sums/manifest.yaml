    rust: "Solution::k_smallest_pairs({nums1}, {nums2}, {k})"
    python3: "Solution().kSmallestPairs({nums1}, {nums2}, {k})"
    python2: "Solution().kSmallestPairs({nums1}, {nums2}, {k})"
    ruby: "k_smallest_pairs({nums1}, {nums2}, {k})"
    java: "new Solution().kSmallestPairs({nums1}, {nums2}, {k})"
    csharp: "new Solution().KSmallestPairs({nums1}, {nums2}, {k})"
    kotlin: "Solution().kSmallestPairs({nums1}, {nums2}, {k})"
    go: "kSmallestPairs({nums1}, {nums2}, {k})"
    dart: "Solution().kSmallestPairs({nums1}, {nums2}, {k})"
    swift: "Solution().kSmallestPairs({nums1}, {nums2}, {k})"
    typescript: "kSmallestPairs({nums1}, {nums2}, {k})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 300

oracle:
  python3:
    call: "Checker().kSmallestPairs(nums1, nums2, k, {result})"
    checker: |
      import heapq
      from typing import Any, List

      class Checker:
          def kSmallestPairs(self, nums1: List[int], nums2: List[int], k: int, result: Any) -> bool:
              if not isinstance(nums1, list) or not isinstance(nums2, list) or not isinstance(k, int):
                  return False
              if k < 1 or len(nums1) < 1 or len(nums2) < 1:
                  return False
              if len(nums1) > 100000 or len(nums2) > 100000 or k > 10000:
                  return False
              if any(not isinstance(x, int) for x in nums1) or any(not isinstance(x, int) for x in nums2):
                  return False
              if any(nums1[i] > nums1[i + 1] for i in range(len(nums1) - 1)):
                  return False
              if any(nums2[i] > nums2[i + 1] for i in range(len(nums2) - 1)):
                  return False
              if k > len(nums1) * len(nums2):
                  return False
              if not isinstance(result, list):
                  return False
              if any(not isinstance(p, list) or len(p) != 2 or any(not isinstance(x, int) for x in p) for p in result):
                  return False

              expected = []
              heap = []
              visited = set()
              heapq.heappush(heap, (nums1[0] + nums2[0], 0, 0))
              visited.add((0, 0))
              while heap and len(expected) < k:
                  _, i, j = heapq.heappop(heap)
                  expected.append([nums1[i], nums2[j]])
                  if j + 1 < len(nums2) and (i, j + 1) not in visited:
                      visited.add((i, j + 1))
                      heapq.heappush(heap, (nums1[i] + nums2[j + 1], i, j + 1))
                  if i + 1 < len(nums1) and (i + 1, j) not in visited:
                      visited.add((i + 1, j))
                      heapq.heappush(heap, (nums1[i + 1] + nums2[j], i + 1, j))
              return result == expected

seed: 373373

