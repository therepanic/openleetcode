"entry":
  "id": 79
  "title": "word-search"
  "call":
    "cpp": "Solution().exist({board}, {word})"
    "rust": "Solution::exist({board}, {word})"
    "python3": "Solution().exist({board}, {word})"
    "python2": "Solution().exist({board}, {word})"
    "ruby": "exist({board}, {word})"
    "java": "new Solution().exist({board}, {word})"
    "csharp": "new Solution().Exist({board}, {word})"
    "kotlin": "Solution().exist({board}, {word})"
    "go": "exist({board}, {word})"
    "dart": "Solution().exist({board}, {word})"
    "swift": "Solution().exist({board}, {word})"
    "typescript": "exist({board}, {word})"
  params:
    board:
      type: array
      items:
        type: array
        items:
          type: char
    word:
      type: string
"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().exist(board, word, {result})"
    "checker":
      "class Checker:\n    def exist(self, board, word, result):\n        rows, cols = len(board), len(board[0])\n\
      \        def dfs(r, c, index):\n            if index == len(word): return True\n            if r < 0 or r >= rows or
      c < 0 or c >= cols or board[r][c] != word[index]: return False\n            temp = board[r][c]\n            board[r][c]
      = \"#\"\n            found = dfs(r+1, c, index+1) or dfs(r-1, c, index+1) or dfs(r, c+1, index+1) or dfs(r, c-1, index+1)\n\
      \            board[r][c] = temp\n            return found\n        for r in range(rows):\n            for c in range(cols):\n\
      \                if dfs(r, c, 0): return result == True\n        return result == False\n"
"seed": 42
