    "typescript": "exist({board}, {word})"
"judge":
  "type": "exact"
"limits":
  "time_ms": 2000
  "memory_mb": 300
"oracle":
  "python3":
    "call": "Checker().check(board, word, {result})"
    "checker":
      "class Checker:\n    def check(self, board, word, result):\n      \
      \  return isinstance(result, bool)\n"
