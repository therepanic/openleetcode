  "call":
    "cpp": "Solution().exist({board}, {word})"
    "rust": "Solution::exist({board}, {word})"
    "python3": "Solution().exist({board}, {word})"
    "python2": "Solution().exist({board}, {word})"
    "ruby": "exist({board}, {word})"
    "java": "new Solution().exist({board}, {word})"
    "csharp": "new Solution().Exist({board}, {word})"
    "kotlin": "Solution().exist({board}, {word})"
    "go": "exist({board}, {word})"
