entry:
  id: 483
  title: smallest-good-base
  params:
    n:
      type: string
  call:
    cpp: Solution().smallestGoodBase({n})
    rust: Solution::smallest_good_base({n})
    python3: Solution().smallestGoodBase({n})
    python2: Solution().smallestGoodBase({n})
    ruby: smallest_good_base({n})
    java: new Solution().smallestGoodBase({n})
    csharp: new Solution().SmallestGoodBase({n})
    kotlin: Solution().smallestGoodBase({n})
    go: smallestGoodBase({n})
    dart: Solution().smallestGoodBase({n})
    swift: Solution().smallestGoodBase({n})
    typescript: smallestGoodBase({n})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 300
oracle:
  python3:
    call: Checker().smallestGoodBase(n, {result})
    checker: |
      class Checker:
          def smallestGoodBase(self, n, result):
              if not isinstance(result, str):
                  return False
              if not result.isdigit():
                  return False
              target = int(n)
              base = int(result)
              if base < 2:
                  return False
              value = 1
              term = 1
              for _ in range(60):
                  term *= base
                  value += term
                  if value == target:
                      break
                  if value > target:
                      return False
              else:
                  return False

              for k in range(2, base):
                  total = 1
                  term = 1
                  while total < target:
                      term *= k
                      total += term
                  if total == target:
                      return False
              return True
seed: 483
