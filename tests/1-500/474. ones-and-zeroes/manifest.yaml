entry:
  id: 474
  title: ones-and-zeroes
  params:
    strs:
      type: array
      items:
        type: string
    m:
      type: int
    n:
      type: int
  call:
    cpp: "Solution().findMaxForm({strs}, {m}, {n})"
    rust: "Solution::find_max_form({strs}, {m}, {n})"
    python3: "Solution().findMaxForm({strs}, {m}, {n})"
    python2: "Solution().findMaxForm({strs}, {m}, {n})"
    ruby: "find_max_form({strs}, {m}, {n})"
    java: "new Solution().findMaxForm({strs}, {m}, {n})"
    csharp: "new Solution().FindMaxForm({strs}, {m}, {n})"
    kotlin: "Solution().findMaxForm({strs}, {m}, {n})"
    go: "findMaxForm({strs}, {m}, {n})"
    dart: "Solution().findMaxForm({strs}, {m}, {n})"
    swift: "Solution().findMaxForm({strs}, {m}, {n})"
    typescript: "findMaxForm({strs}, {m}, {n})"
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: "Checker().findMaxForm(strs, m, n, {result})"
    checker: |
      class Checker:
          def findMaxForm(self, strs, m, n, result):
              return isinstance(result, int)
seed: 474
