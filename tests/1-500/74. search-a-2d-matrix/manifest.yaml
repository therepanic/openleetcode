entry:
  id: 74
  title: search-a-2d-matrix
  call:
    cpp: Solution().searchMatrix(lv(vector<vector<int>>{ {matrix} }), {target})
    rust: Solution::search_matrix(vec![{matrix}], {target})
    python3: Solution().searchMatrix([{matrix}], {target})
    python2: Solution().searchMatrix([{matrix}], {target})
    ruby: search_matrix([{matrix}], {target})
    java: new Solution().searchMatrix(new int[][]{ {matrix} }, {target})
    csharp: new Solution().SearchMatrix(new int[][]{ {matrix} }, {target})
    kotlin: Solution().searchMatrix(arrayOf({matrix}), {target})
    go: searchMatrix([][]int{ {matrix} }, {target})
    dart: Solution().searchMatrix([{matrix}], {target})
    swift: Solution().searchMatrix([{matrix}], {target})
    typescript: searchMatrix([{matrix}], {target})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().searchMatrix([{matrix}], {target}, {result})
    checker:
      "class Checker:\n    def searchMatrix(self, matrix, target, result):\n\
      \        flat = [val for row in matrix for val in row]\n        return (target\
      \ in flat) == result\n"
seed: 42
tests:
  - name: Example 1
    in:
      matrix:
        - - 1
          - 3
          - 5
          - 7
        - - 10
          - 11
          - 16
          - 20
        - - 23
          - 30
          - 34
          - 60
      target: 3
    out: true
  - name: Example 2
    in:
      matrix:
        - - 1
          - 3
          - 5
          - 7
        - - 10
          - 11
          - 16
          - 20
        - - 23
          - 30
          - 34
          - 60
      target: 13
    out: false
  - name: Single row single element found
    in:
      matrix:
        - - 1
      target: 1
    out: true
  - name: Single row single element not found
    in:
      matrix:
        - - 1
      target: 0
    out: false
  - name: Min boundary negative
    in:
      matrix:
        - - -10000
          - -5000
      target: -10000
    out: true
  - name: Max boundary positive
    in:
      matrix:
        - - 5000
          - 10000
      target: 10000
    out: true
  - name: Target between elements
    in:
      matrix:
        - - 1
          - 5
        - - 10
          - 15
      target: 7
    out: false
  - name: Target smaller than all
    in:
      matrix:
        - - 10
          - 20
        - - 30
          - 40
      target: 5
    out: false
  - name: Target larger than all
    in:
      matrix:
        - - 10
          - 20
        - - 30
          - 40
      target: 50
    out: false
