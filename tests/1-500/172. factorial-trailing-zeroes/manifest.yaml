judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().trailingZeroes(n, {result})
    checker: "class Checker:\n    def trailingZeroes(self, n, result):\n        if not isinstance(result, int):\n            return False\n        expected = 0\n        divisor = 5\n        while n >= divisor:\n            expected += n // divisor\n            divisor *= 5\n        return result == expected\n"
