  title: "factorial-trailing-zeroes"
  params:
    n:
      type: "int"
  call:
    cpp: "Solution().trailingZeroes({n})"
    rust: "Solution::trailing_zeroes({n})"
    python3: "Solution().trailingZeroes({n})"
    python2: "Solution().trailingZeroes({n})"
    ruby: "trailing_zeroes({n})"
