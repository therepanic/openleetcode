entry:
  id: 42
  title: trapping-rain-water
  params:
    height:
      type: array
      items:
        type: int
  call:
    cpp: Solution().trap({height})
    rust: Solution::trap({height})
    python3: Solution().trap({height})
    python2: Solution().trap({height})
    ruby: trap({height})
    java: new Solution().trap({height})
    csharp: new Solution().Trap({height})
    kotlin: Solution().trap({height})
    go: trap({height})
    dart: Solution().trap({height})
    swift: Solution().trap({height})
    typescript: trap({height})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
seed: 42
oracle:
  python3:
    call: Checker().trap(height, {result})
    checker: |
      class Checker:
          def trap(self, height, result):
              if not isinstance(result, int):
                  return False
              if len(height) < 1:
                  return False
              start = 0
              end = len(height) - 1
              left_max = 0
              right_max = 0
              total = 0
              while start < end:
                  left_max = max(left_max, height[start])
                  right_max = max(right_max, height[end])
                  if left_max < right_max:
                      total += left_max - height[start]
                      start += 1
                  else:
                      total += right_max - height[end]
                      end -= 1
              return total == result
