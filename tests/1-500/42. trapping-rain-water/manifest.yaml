entry:
  id: 42
  title: trapping-rain-water
  call:
    cpp: Solution().trap(lv(vector<int>{ {height} }))
    rust: Solution::trap(vec![{height}])
    python3: Solution().trap([{height}])
    python2: Solution().trap([{height}])
    ruby: trap([{height}])
    java: new Solution().trap(new int[]{ {height} })
    csharp: new Solution().Trap(new int[]{ {height} })
    kotlin: Solution().trap(intArrayOf({height}))
    go: trap([]int{ {height} })
    dart: Solution().trap([{height}])
    swift: Solution().trap([{height}])
    typescript: trap([{height}])
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().trap([{height}], {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, result):\n        if\
      \ isinstance(result, str):\n            try:\n                result = json.loads(result)\n\
      \            except Exception:\n                pass\n            if isinstance(result,\
      \ str):\n                low = result.strip().lower()\n                if low\
      \ == 'true':\n                    return True\n                if low == 'false':\n\
      \                    return False\n                if low.lstrip('-').isdigit():\n\
      \                    return int(low)\n        return result\n\n    def trap(self,\
      \ height, expected):\n        expected = self._norm(expected)\n        start,\
      \ end = 0, len(height) - 1\n        left_max, right_max, total = 0, 0, 0\n \
      \       while start < end:\n            left_max = max(left_max, height[start])\n\
      \            right_max = max(right_max, height[end])\n            if left_max\
      \ < right_max:\n                total += left_max - height[start]\n        \
      \        start += 1\n            else:\n                total += right_max -\
      \ height[end]\n                end -= 1\n        return total == expected\n"
seed: 42
