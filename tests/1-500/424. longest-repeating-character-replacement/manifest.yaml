entry:
  id: 424
  title: "longest-repeating-character-replacement"
  params:
    s:
      type: string
    k:
      type: int
  call:
    cpp: "Solution().characterReplacement({s}, {k})"
    rust: "Solution::character_replacement({s}, {k})"
    python3: "Solution().characterReplacement({s}, {k})"
    python2: "Solution().characterReplacement({s}, {k})"
    ruby: "character_replacement({s}, {k})"
    java: "new Solution().characterReplacement({s}, {k})"
    csharp: "new Solution().CharacterReplacement({s}, {k})"
    kotlin: "Solution().characterReplacement({s}, {k})"
    go: "characterReplacement({s}, {k})"
    dart: "Solution().characterReplacement({s}, {k})"
    swift: "Solution().characterReplacement({s}, {k})"
    typescript: "characterReplacement({s}, {k})"
judge:
  type: "exact"
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: "Checker().characterReplacement(s, k, {result})"
    checker: |
      class Checker:
          def characterReplacement(self, s, k, result):
              return isinstance(result, int) and not isinstance(result, bool) and 0 <= result <= len(s)
seed: 424
