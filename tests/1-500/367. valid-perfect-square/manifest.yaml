    swift: Solution().isPerfectSquare({num})
    typescript: isPerfectSquare({num})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().isPerfectSquare(num, {result})
    checker: |
      class Checker:
          def isPerfectSquare(self, num, result):
              if not isinstance(result, bool):
                  return False
              if num < 1:
                  return False
              left, right = 1, num
              while left <= right:
                  mid = (left + right) // 2
                  sq = mid * mid
                  if sq == num:
                      return result is True
                  if sq < num:
                      left = mid + 1
                  else:
                      right = mid - 1
              return result is False
