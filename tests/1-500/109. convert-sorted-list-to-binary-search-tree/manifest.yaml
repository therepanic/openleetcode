entry:
  id: 109
  title: "convert-sorted-list-to-binary-search-tree"
  params:
    head:
      type: list_node
  call:
    cpp: "treeNodeToArray(Solution().sortedListToBST({head}))"
    rust: "TreeNode::tree_node_to_array(Solution::sorted_list_to_bst({head}))"
    python3: "tree_node_to_array(Solution().sortedListToBST({head}))"
    python2: "tree_node_to_array(Solution().sortedListToBST({head}))"
    ruby: "tree_node_to_array(sorted_list_to_bst({head}))"
    java: "TreeNode.treeNodeToArray(new Solution().sortedListToBST({head}))"
    csharp: "TreeNode.TreeNodeToArray(new Solution().SortedListToBST({head}))"
    kotlin: "treeNodeToArray(Solution().sortedListToBST({head}))"
    go: "treeNodeToArray(sortedListToBST({head}))"
    dart: "tree_node_to_array(Solution().sortedListToBST({head}))"
    swift: "tree_node_to_array(Solution().sortedListToBST({head}))"
    typescript: "treeNodeToArray(sortedListToBST({head}))"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().sortedListToBST(head, {result})"
    checker: |
      class Checker:
          def sortedListToBST(self, head, result):
              if head is None:
                  values = []
              elif isinstance(head, list):
                  values = list(head)
              else:
                  values = []
                  seen = 0
                  node = head
                  while node is not None:
                      if isinstance(node, dict):
                          values.append(node.get("val"))
                          node = node.get("next")
                      else:
                          values.append(getattr(node, "val", None))
                          node = getattr(node, "next", None)
                      seen += 1
                      if seen > 20000:
                          return False
              if not isinstance(result, list):
                  return False
              if not result:
                  return values == []
              if not result or result[0] is None:
                  return False

              def validate(i):
                  if i >= len(result) or result[i] is None:
                      return 0, True, []
                  val = result[i]
                  if not isinstance(val, int):
                      return 0, False, []
                  left_h, left_ok, left_vals = validate(2 * i + 1)
                  if not left_ok:
                      return 0, False, []
                  right_h, right_ok, right_vals = validate(2 * i + 2)
                  if not right_ok or abs(left_h - right_h) > 1:
                      return 0, False, []
                  return max(left_h, right_h) + 1, True, left_vals + [val] + right_vals

              _, ok, inorder = validate(0)
              return ok and inorder == values
