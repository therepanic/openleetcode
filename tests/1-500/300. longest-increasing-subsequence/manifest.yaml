entry:
  id: 300
  title: "longest-increasing-subsequence"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().lengthOfLIS({nums})"
    rust: "Solution::length_of_lis({nums})"
    python3: "Solution().lengthOfLIS({nums})"
    python2: "Solution().lengthOfLIS({nums})"
    ruby: "length_of_lis({nums})"
    java: "new Solution().lengthOfLIS({nums})"
    csharp: "new Solution().LengthOfLIS({nums})"
    kotlin: "Solution().lengthOfLIS({nums})"
    go: "lengthOfLIS({nums})"
    dart: "Solution().lengthOfLIS({nums})"
    swift: "Solution().lengthOfLIS({nums})"
    typescript: "lengthOfLIS({nums})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(nums, {result})"
    checker: |
      from typing import Any, List

      class Checker:
          def check(self, nums: List[int], result: Any) -> bool:
              if not isinstance(result, int):
                  return False
              if not isinstance(nums, list) or len(nums) < 1:
                  return False
              if len(nums) > 2500:
                  return False
              if any(not isinstance(x, int) or x < -10000 or x > 10000 for x in nums):
                  return False
              return 1 <= result <= len(nums)
seed: 300300
