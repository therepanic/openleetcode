judge:
  type: exact

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().check(n, {result})"
    checker: |
      class Checker:
          def check(self, n, result):
              if not isinstance(n, int) or not isinstance(result, int):
                  return False
              if n < 0 or n > 8:
                  return False
              if n == 0:
                  return result == 1
              expected = 10
              current = 9
              for i in range(2, n + 1):
                  current *= 10 - (i - 1)
                  expected += current
              return result == expected

