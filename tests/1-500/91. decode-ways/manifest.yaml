      "type": "string"
"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().numDecodings(s, {result})"
    "checker":
      "class Checker:\n    def numDecodings(self, s, result):\n        if\
      \ not s: return result == 0\n        n = len(s)\n        dp = [0] * (n + 1)\n\
      \        dp[0] = 1\n        for i in range(1, n + 1):\n            if s[i-1]\
      \ != '0':\n                dp[i] += dp[i-1]\n            if i > 1 and '10' <=\
      \ s[i-2:i] <= '26':\n                dp[i] += dp[i-2]\n        return result\
      \ == dp[n]\n"
"seed": 42
