entry:
  id: 91
  title: "decode-ways"
  params:
    s:
      type: string
  call:
    cpp: "Solution().numDecodings({s})"
    rust: "Solution::num_decodings({s})"
    python3: "Solution().numDecodings({s})"
    python2: "Solution().numDecodings({s})"
    ruby: "num_decodings({s})"
    java: "new Solution().numDecodings({s})"
    csharp: "new Solution().NumDecodings({s})"
    kotlin: "Solution().numDecodings({s})"
    go: "numDecodings({s})"
    dart: "Solution().numDecodings({s})"
    swift: "Solution().numDecodings({s})"
    typescript: "numDecodings({s})"
judge:
  type: "exact"
limits:
  time_ms: 200
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check({result})"
    checker: |
      class Checker:
          def check(self, result):
              return isinstance(result, int)
seed: 91
