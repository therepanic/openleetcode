oracle:
  python3:
    call: Checker().addBinary(a, b, {result})
    checker: "class Checker:\n    def addBinary(self, a, b, result):\n        if not\
      \ isinstance(a, str) or not isinstance(b, str) or not isinstance(result, str):\n\
      \            return False\n        if not a or not b or not result:\n      \
      \      return False\n        if any(ch not in \"01\" for ch in a):\n       \
      \     return False\n        if any(ch not in \"01\" for ch in b):\n        \
      \    return False\n        if any(ch not in \"01\" for ch in result):\n    \
      \        return False\n        return result == bin(int(a, 2) + int(b, 2))[2:]\n"
