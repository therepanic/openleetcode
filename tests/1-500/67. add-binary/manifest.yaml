entry:
  id: 67
  title: add-binary
  params:
    a:
      type: string
    b:
      type: string
  call:
    cpp: Solution().addBinary({a}, {b})
    rust: Solution::add_binary({a}, {b})
    python3: Solution().addBinary({a}, {b})
    python2: Solution().addBinary({a}, {b})
    ruby: add_binary({a}, {b})
    java: new Solution().addBinary({a}, {b})
    csharp: new Solution().AddBinary({a}, {b})
    kotlin: Solution().addBinary({a}, {b})
    go: addBinary({a}, {b})
    dart: Solution().addBinary({a}, {b})
    swift: Solution().addBinary({a}, {b})
    typescript: addBinary({a}, {b})
judge:
  type: exact
limits:
