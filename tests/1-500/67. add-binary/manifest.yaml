"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": 'Checker().addBinary("{a}", "{b}", {result})'
    "checker":
      "import json\nclass Checker:\n    def addBinary(self, a, b, result):\n\
      \        try:\n            result = json.loads(result) if isinstance(result,\
      \ str) else result\n        except Exception:\n            return False\n  \
      \      return bin(int(a, 2) + int(b, 2))[2:] == result\n"
"seed": 42
