    in:
      nums: [5, 5, 5, 5, 5, 5, 5]
    out: 5
  - name: all-equal-negative
    in:
      nums: [-2, -2, -2, -2]
    out: -2
  - name: min-middle-small
    in:
      nums: [2, 2, 2, 3, 4, 0, 1, 2]
    out: 0
  - name: min-middle-medium
    in:
      nums: [4, 5, 6, 7, 0, 1, 2, 4, 4]
    out: 0
  - name: duplicates-around-pivot
    in:
      nums: [10, 10, 10, 1, 10, 10]
    out: 1
  - name: small-rot-1
    in:
      nums: [9, 1, 3, 5, 7]
    out: 1
  - name: small-rot-2
    in:
      nums: [3, 5, 7, 9, 1]
