entry:
  id: 154
  title: find-minimum-in-rotated-sorted-array-ii
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().findMin({nums})"
    rust: "Solution::find_min({nums})"
    python3: "Solution().findMin({nums})"
    python2: "Solution().findMin({nums})"
    ruby: "find_min({nums})"
    java: "new Solution().findMin({nums})"
    csharp: "new Solution().FindMin({nums})"
    kotlin: "Solution().findMin({nums})"
    go: "findMin({nums})"
    dart: "Solution().findMin({nums})"
    swift: "Solution().findMin({nums})"
    typescript: "findMin({nums})"

judge:
  type: exact

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().findMin(nums, {result})"
    checker: |
      class Checker:
          def findMin(self, nums, result):
              return isinstance(result, int) and result == min(nums)

seed: 154

tests:
  - name: example-1
    in:
      nums: [1, 3, 5]
    out: 1
  - name: example-2
    in:
      nums: [2, 2, 2, 0, 1]
    out: 0
  - name: single-pos
    in:
      nums: [7]
    out: 7
  - name: single-neg
    in:
      nums: [-5]
    out: -5
  - name: two-same
    in:
      nums: [4, 4]
    out: 4
  - name: two-rotated
    in:
      nums: [2, 1]
    out: 1
  - name: already-sorted-no-dup
    in:
      nums: [1, 2, 3, 4, 5]
    out: 1
  - name: already-sorted-dups
    in:
      nums: [1, 1, 1, 1, 1]
    out: 1
  - name: min-at-start
    in:
      nums: [0, 1, 2, 3, 4]
    out: 0
  - name: min-at-end
    in:
      nums: [1, 2, 3, 4, 0]
    out: 0
  - name: classic-rot-dup
    in:
      nums: [3, 3, 1, 3]
    out: 1
  - name: dup-tail
    in:
      nums: [1, 1, 1, 0, 1]
    out: 0
  - name: dup-head
    in:
      nums: [1, 0, 1, 1, 1]
    out: 0
