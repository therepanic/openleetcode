entry:
  id: 102
  title: binary-tree-level-order-traversal
  params:
    root:
      type: tree_node
  call:
    cpp: Solution().levelOrder({root})
    rust: Solution::level_order({root})
    python3: Solution().levelOrder({root})
    python2: Solution().levelOrder({root})
    ruby: level_order({root})
    java: new Solution().levelOrder({root})
    csharp: new Solution().LevelOrder({root})
    kotlin: Solution().levelOrder({root})
    go: levelOrder({root})
    dart: Solution().levelOrder({root})
    swift: Solution().levelOrder({root})
    typescript: levelOrder({root})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().levelOrder(root, {result})
    checker:
      "class Checker:\n    def levelOrder(self, root, result):\n        if\
      \ root is None or root == []:\n            return result == []\n        if not\
      \ isinstance(root, list):\n            return False\n        expected = []\n\
      \        queue = [0]\n        while queue:\n            level = []\n       \
      \     next_queue = []\n            for idx in queue:\n                if idx\
      \ >= len(root) or root[idx] is None:\n                    continue\n       \
      \         level.append(root[idx])\n                left = 2 * idx + 1\n    \
      \            right = 2 * idx + 2\n                if left < len(root) and root[left]\
      \ is not None:\n                    next_queue.append(left)\n              \
      \  if right < len(root) and root[right] is not None:\n                    next_queue.append(right)\n\
      \            if not level:\n                break\n            expected.append(level)\n\
      \            queue = next_queue\n        return result == expected\n"
seed: 102
