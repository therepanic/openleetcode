entry:
  id: 50
  title: powx-n
  params:
    x:
      type: double
    n:
      type: int
  call:
    cpp: Solution().myPow({x}, {n})
    rust: Solution::my_pow({x}, {n})
    python3: Solution().myPow({x}, {n})
    python2: Solution().myPow({x}, {n})
    ruby: my_pow({x}, {n})
    java: new Solution().myPow({x}, {n})
    csharp: new Solution().MyPow({x}, {n})
    kotlin: Solution().myPow({x}, {n})
    go: myPow({x}, {n})
    dart: Solution().myPow({x}, {n})
    swift: Solution().myPow({x}, {n})
    typescript: myPow({x}, {n})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().myPow(x, n, {result})
    checker: |
      import math

      class Checker:
          def myPow(self, x, n, result):
              if math.isnan(result) or math.isinf(result):
                  return False
              if x == 0:
                  expected = 0.0
              elif n == 0:
                  expected = 1.0
              elif x == 1:
                  expected = 1.0
              elif x == -1:
                  expected = 1.0 if n % 2 == 0 else -1.0
              else:
                  expected = math.pow(x, n)
              return math.isclose(result, expected, rel_tol=1e-9, abs_tol=1e-9)
seed: 50
