entry:
  id: 50
  title: powx-n
  call:
    cpp: Solution().myPow({x}, {n})
    rust: Solution::my_pow({x}, {n})
    python3: Solution().myPow({x}, {n})
    python2: Solution().myPow({x}, {n})
    ruby: my_pow({x}, {n})
    java: new Solution().myPow({x}, {n})
    csharp: new Solution().MyPow({x}, {n})
    kotlin: Solution().myPow({x}, {n})
    go: myPow({x}, {n})
    dart: Solution().myPow({x}, {n})
    swift: Solution().myPow({x}, {n})
    typescript: myPow({x}, {n})
  params:
    x:
      type: double
    n:
      type: int
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: check(x, n, {result})
    checker: |
      import json

      def check(x, n, result):
          try:
              result = json.loads(result) if isinstance(result, str) else result
          except Exception:
              return False
          expected = pow(x, n)
          return abs(expected - result) < 1e-7
seed: 42
tests:
  - name: example 1
    in:
      x: 2.0
      n: 10
  - name: example 2
    in:
      x: 2.1
      n: 3
  - name: example 3
    in:
      x: 2.0
      n: -2
