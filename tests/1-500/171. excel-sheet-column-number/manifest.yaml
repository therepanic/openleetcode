entry:
  id: 171
  title: excel-sheet-column-number
  params:
    columnTitle:
      type: string
  call:
    cpp: Solution().titleToNumber({columnTitle})
    rust: Solution::title_to_number({columnTitle})
    python3: Solution().titleToNumber({columnTitle})
    python2: Solution().titleToNumber({columnTitle})
    ruby: title_to_number({columnTitle})
    java: new Solution().titleToNumber({columnTitle})
    csharp: new Solution().TitleToNumber({columnTitle})
    kotlin: Solution().titleToNumber({columnTitle})
    go: titleToNumber({columnTitle})
    dart: Solution().titleToNumber({columnTitle})
    swift: Solution().titleToNumber({columnTitle})
    typescript: titleToNumber({columnTitle})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: Checker().titleToNumber(columnTitle, {result})
    checker: "class Checker:\n    def titleToNumber(self, columnTitle: str, result: object) -> bool:\n        if not isinstance(result, int):\n            return False\n\n        value = 0\n        for ch in columnTitle:\n            if not isinstance(ch, str) or len(ch) != 1 or not ('A' <= ch <= 'Z'):\n                return False\n            value = value * 26 + (ord(ch) - ord('A') + 1)\n\n        return value == result\n"
seed: 171171
