entry:
  id: 438
  title: find-all-anagrams-in-a-string
  params:
    s:
      type: string
    p:
      type: string
  call:
    cpp: Solution().findAnagrams({s}, {p})
    rust: Solution::find_anagrams({s}, {p})
    python3: Solution().findAnagrams({s}, {p})
    python2: Solution().findAnagrams({s}, {p})
    ruby: find_anagrams({s}, {p})
    java: new Solution().findAnagrams({s}, {p})
    csharp: new Solution().FindAnagrams({s}, {p})
    kotlin: Solution().findAnagrams({s}, {p})
    go: findAnagrams({s}, {p})
    dart: Solution().findAnagrams({s}, {p})
    swift: Solution().findAnagrams({s}, {p})
    typescript: findAnagrams({s}, {p})

judge:
  type: ignore_order

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: Checker().findAnagrams(s, p, {result})
    checker: |
      from typing import Any, List

      class Checker:
          def findAnagrams(self, s: str, p: str, result: Any) -> bool:
              if not isinstance(result, list):
                  return False
              if not all(isinstance(x, int) for x in result):
                  return False
              n1 = len(s)
              n2 = len(p)
              if n1 < n2:
                  return result == []
              need = [0] * 26
              for ch in p:
                  need[ord(ch) - 97] += 1
              expected = []
              for i in range(n1 - n2 + 1):
                  window = [0] * 26
                  for ch in s[i:i + n2]:
                      window[ord(ch) - 97] += 1
                  if window == need:
                      expected.append(i)
              return sorted(result) == expected

seed: 438

