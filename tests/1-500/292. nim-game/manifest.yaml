entry:
  id: 292
  title: "nim-game"
  params:
    n:
      type: int
  call:
    cpp: "Solution().canWinNim({n})"
    rust: "Solution::can_win_nim({n})"
    python3: "Solution().canWinNim({n})"
    python2: "Solution().canWinNim({n})"
    ruby: "can_win_nim({n})"
    java: "new Solution().canWinNim({n})"
    csharp: "new Solution().CanWinNim({n})"
    kotlin: "Solution().canWinNim({n})"
    go: "canWinNim({n})"
    dart: "Solution().canWinNim({n})"
    swift: "Solution().canWinNim({n})"
    typescript: "canWinNim({n})"

judge:
  type: "exact"

limits:
  time_ms: 100
  memory_mb: 128

oracle:
  python3:
    call: "Checker().check(n, {result})"
    checker: |
      class Checker:
          def check(self, n, result):
              return isinstance(result, bool) and result == (n % 4 != 0)

