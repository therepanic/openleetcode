entry:
  id: 400
  title: "nth-digit"
  params:
    n:
      type: int
  call:
    cpp: "Solution().findNthDigit({n})"
    rust: "Solution::find_nth_digit({n})"
    python3: "Solution().findNthDigit({n})"
    python2: "Solution().findNthDigit({n})"
    ruby: "find_nth_digit({n})"
    java: "new Solution().findNthDigit({n})"
    csharp: "new Solution().FindNthDigit({n})"
    kotlin: "Solution().findNthDigit({n})"
    go: "findNthDigit({n})"
    dart: "Solution().findNthDigit({n})"
    swift: "Solution().findNthDigit({n})"
    typescript: "findNthDigit({n})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().check(n, {result})"
    checker: |
      class Checker:
          def check(self, n, result):
              return isinstance(result, int) and 0 <= result <= 9

seed: 400

