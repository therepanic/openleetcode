entry:
  id: 434
  title: "number-of-segments-in-a-string"
  params:
    s:
      type: string
  call:
    cpp: "Solution().countSegments({s})"
    rust: "Solution::count_segments({s})"
    python3: "Solution().countSegments({s})"
    python2: "Solution().countSegments({s})"
    ruby: "count_segments({s})"
    java: "new Solution().countSegments({s})"
    csharp: "new Solution().CountSegments({s})"
    kotlin: "Solution().countSegments({s})"
    go: "countSegments({s})"
    dart: "Solution().countSegments({s})"
    swift: "Solution().countSegments({s})"
    typescript: "countSegments({s})"
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: "Checker().countSegments(s, {result})"
    checker: |
      class Checker:
          def countSegments(self, s, result) -> bool:
              return isinstance(result, int) and result == sum(
                  1 for i, ch in enumerate(s)
                  if ch != ' ' and (i == 0 or s[i - 1] == ' ')
              )
seed: 434
