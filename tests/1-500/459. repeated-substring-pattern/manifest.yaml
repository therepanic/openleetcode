entry:
  id: 459
  title: repeated-substring-pattern
  params:
    s:
      type: string
  call:
    cpp: "Solution().repeatedSubstringPattern({s})"
    rust: "Solution::repeatedSubstringPattern({s})"
    python3: "Solution().repeatedSubstringPattern({s})"
    python2: "Solution().repeatedSubstringPattern({s})"
    ruby: "repeatedSubstringPattern({s})"
    java: "new Solution().repeatedSubstringPattern({s})"
    csharp: "new Solution().RepeatedSubstringPattern({s})"
    kotlin: "Solution().repeatedSubstringPattern({s})"
    go: "repeatedSubstringPattern({s})"
    dart: "Solution().repeatedSubstringPattern({s})"
    swift: "Solution().repeatedSubstringPattern({s})"
    typescript: "repeatedSubstringPattern({s})"

judge:
  type: exact

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().repeatedSubstringPattern(s, {result})"
    checker: |
      class Checker:
          def repeatedSubstringPattern(self, s, result):
              n = len(s)
              expected = False
              for length in range(1, n // 2 + 1):
                  if n % length == 0:
                      piece = s[:length]
                      if piece * (n // length) == s:
                          expected = True
                          break
              return result == expected

seed: 459

