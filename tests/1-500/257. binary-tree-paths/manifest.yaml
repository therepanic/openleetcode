entry:
  id: 257
  title: "binary-tree-paths"
  params:
    root:
      type: tree_node
  call:
    cpp: "Solution().binaryTreePaths({root})"
    rust: "Solution::binary_tree_paths({root})"
    python3: "Solution().binaryTreePaths({root})"
    python2: "Solution().binaryTreePaths({root})"
    ruby: "binary_tree_paths({root})"
    java: "new Solution().binaryTreePaths({root})"
    csharp: "new Solution().BinaryTreePaths({root})"
    kotlin: "Solution().binaryTreePaths({root})"
    go: "binaryTreePaths({root})"
    dart: "Solution().binaryTreePaths({root})"
    swift: "Solution().binaryTreePaths({root})"
    typescript: "binaryTreePaths({root})"

judge:
  type: "ignore_order"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().binaryTreePaths(root, {result})"
    checker: |
      from typing import Any, List

      class Checker:
          def binaryTreePaths(self, root: Any, result: Any) -> bool:
              if not isinstance(result, list):
                  return False

              if not isinstance(root, list) or not root:
                  return False

              class Node:
                  def __init__(self, val):
                      self.val = val
                      self.left = None
                      self.right = None

              nodes = [None if value is None else Node(value) for value in root]
              kids = nodes[1:]
              for node in nodes:
                  if node is not None:
                      if kids:
                          node.left = kids.pop(0)
                      if kids:
                          node.right = kids.pop(0)

              expected = []

              def dfs(node, path):
                  if node is None:
                      return
                  val = node.val
                  next_path = f"{path}->{val}" if path else str(val)
                  if node.left is None and node.right is None:
                      expected.append(next_path)
                      return
                  dfs(node.left, next_path)
                  dfs(node.right, next_path)

              dfs(nodes[0], "")
              return sorted(expected) == sorted(result) and all(isinstance(x, str) for x in result)

seed: 257

