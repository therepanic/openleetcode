entry:
  id: 8
  title: string-to-integer-atoi
  params:
    s:
      type: string
  call:
    cpp: "Solution().myAtoi({s})"
    rust: "Solution::my_atoi({s})"
    python3: "Solution().myAtoi({s})"
    python2: "Solution().myAtoi({s})"
    ruby: "my_atoi({s})"
    java: "new Solution().myAtoi({s})"
    csharp: "new Solution().MyAtoi({s})"
    kotlin: "Solution().myAtoi({s})"
    go: "myAtoi({s})"
    dart: "Solution().myAtoi({s})"
    swift: "Solution().myAtoi({s})"
    typescript: "myAtoi({s})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(result, expected)"
    checker: |
      class Checker:
          def check(self, result, expected):
              return result == expected
seed: 8
tests:
  - name: example_1
    in:
      s: "42"
    out: 42
  - name: example_2
    in:
      s: " -042"
    out: -42
  - name: example_3
    in:
      s: "1337c0d3"
    out: 1337
  - name: example_4
    in:
      s: "0-1"
    out: 0
  - name: example_5
    in:
      s: "words and 987"
    out: 0
  - name: empty_string
    in:
      s: ""
    out: 0
  - name: spaces_only
    in:
      s: "    "
    out: 0
  - name: single_zero
    in:
      s: "0"
    out: 0
  - name: leading_zeros
    in:
      s: "0000000000012345678"
    out: 12345678
  - name: positive_sign
    in:
      s: "+1"
    out: 1
  - name: negative_sign
    in:
      s: "-1"
    out: -1
  - name: sign_only_plus
    in:
      s: "+"
    out: 0
  - name: sign_only_minus
    in:
      s: "-"
    out: 0
  - name: sign_then_space
    in:
      s: "+ 1"
    out: 0
  - name: space_before_number
    in:
      s: "   123"
    out: 123
  - name: space_before_negative
    in:
      s: "   -123"
    out: -123
  - name: plus_with_leading_zeros
    in:
      s: "   +00099"
    out: 99
  - name: minus_with_leading_zeros
    in:
      s: "   -00099"
    out: -99
  - name: stops_at_letters
    in:
      s: "4193 with words"
    out: 4193
  - name: stops_at_dot
    in:
      s: "3.14159"
    out: 3
  - name: stops_at_internal_sign
    in:
      s: "12-34"
    out: 12
  - name: stops_at_internal_plus
    in:
      s: "12+34"
    out: 12
  - name: non_digit_prefix
    in:
      s: "abc123"
    out: 0
  - name: sign_after_text
    in:
      s: "abc-123"
    out: 0
  - name: whitespace_and_text
    in:
      s: "   words"
    out: 0
  - name: max_int_exact
    in:
      s: "2147483647"
    out: 2147483647
  - name: max_int_overflow_by_one
    in:
      s: "2147483648"
    out: 2147483647
  - name: max_int_overflow_with_spaces
    in:
      s: "   2147483648"
    out: 2147483647
  - name: min_int_exact
    in:
      s: "-2147483648"
    out: -2147483648
  - name: min_int_underflow_by_one
    in:
      s: "-2147483649"
    out: -2147483648
  - name: min_int_underflow_with_spaces
    in:
      s: "   -2147483649"
    out: -2147483648
  - name: max_int_with_trailing_words
    in:
      s: "2147483647 and more"
    out: 2147483647
  - name: many_leading_spaces
    in:
      s: "          7"
    out: 7
  - name: many_spaces_then_sign_and_zero
    in:
      s: "          -000000000000000000000000000000000000000000000001"
    out: -1
  - name: huge_positive_clamp
    in:
      s: "99999999999999999999999999999999999999999999999999999999"
    out: 2147483647
  - name: huge_negative_clamp
    in:
      s: "-99999999999999999999999999999999999999999999999999999999"
    out: -2147483648
  - name: mixed_alpha_numeric_prefix
    in:
      s: "  -0012a42"
    out: -12
  - name: plus_then_digits_then_text
    in:
      s: "+00000000000000000000000000000000000000000000000000000000042xyz"
    out: 42
  - name: zero_followed_by_minus
    in:
      s: "00000-42"
    out: 0
  - name: minus_followed_by_plus
    in:
      s: "-+12"
    out: 0
