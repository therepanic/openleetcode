entry:
  id: 8
  title: string-to-integer-atoi
  call:
    cpp: Solution().myAtoi("{s}")
    rust: Solution::my_atoi("{s}".to_string())
    python3: Solution().myAtoi("{s}")
    python2: Solution().myAtoi("{s}")
    ruby: my_atoi("{s}")
    java: new Solution().myAtoi("{s}")
    csharp: new Solution().MyAtoi("{s}")
    kotlin: Solution().myAtoi("{s}")
    go: myAtoi("{s}")
    dart: Solution().myAtoi("{s}")
    swift: Solution().myAtoi("{s}")
    typescript: myAtoi("{s}")
judge:
  type: exact
limits:
  time_ms: 100
  memory_mb: 64
oracle:
  python3:
    call: Checker().myAtoi("{s}", {result})
    checker:
      "class Checker:\n    def myAtoi(self, s, result):\n        s = s.strip()\n\
      \        if not s:\n            val = 0\n        else:\n            sign = 1\n\
      \            i = 0\n            if s[0] == '-': sign = -1; i = 1\n         \
      \   elif s[0] == '+': i = 1\n            res = 0\n            while i < len(s)\
      \ and s[i].isdigit():\n                res = res * 10 + int(s[i])\n        \
      \        i += 1\n            val = sign * res\n            if val > 2**31 -\
      \ 1: val = 2**31 - 1\n            if val < -2**31: val = -2**31\n        return\
      \ val == result\n"
seed: 42
tests:
  - name: Example 1
    in:
      s: "42"
    out: 42
  - name: Example 2
    in:
      s: " -042"
    out: -42
  - name: Example 3
    in:
      s: 1337c0d3
    out: 1337
  - name: Example 4
    in:
      s: 0-1
    out: 0
  - name: Example 5
    in:
      s: words and 987
    out: 0
  - name: Positive Overload
    in:
      s: "99999999999999999"
    out: 2147483647
  - name: Negative Overload
    in:
      s: "-99999999999999999"
    out: -2147483648
  - name: Just Positive Max
    in:
      s: "2147483647"
    out: 2147483647
  - name: Just Negative Min
    in:
      s: "-2147483648"
    out: -2147483648
  - name: Spaces Only
    in:
      s: "   "
    out: 0
  - name: Empty String
    in:
      s: ""
    out: 0
  - name: Plus Sign Only
    in:
      s: +
    out: 0
  - name: Minus Sign Only
    in:
      s: "-"
    out: 0
  - name: Leading Zeros
    in:
      s: "00000000000123"
    out: 123
  - name: Word Before Number
    in:
      s: abc 123
    out: 0
  - name: Number Start With Plus
    in:
      s: "+987"
    out: 987
  - name: Decimal Point
    in:
      s: "3.14159"
    out: 3
  - name: Negative Decimal
    in:
      s: "-3.14159"
    out: -3
  - name: Double Sign
    in:
      s: ++1
    out: 0
  - name: Sign Followed By Alpha
    in:
      s: -a1
    out: 0
  - name: Max Int Plus One
    in:
      s: "2147483648"
    out: 2147483647
  - name: Min Int Minus One
    in:
      s: "-2147483649"
    out: -2147483648
  - name: Zero After Whitespace
    in:
      s: "  0000 000"
    out: 0
  - name: Long Number Near Bound
    in:
      s: "2147483646"
    out: 2147483646
  - name: Very Long Leading
    in:
      s: "00000000000000000000000000000000000000000000000001"
    out: 1
  - name: Large Noise
    in:
      s: "  -00000000000000000000000088"
    out: -88
  - name: Generated Mixed 1
    in:
      s: "  +00000000000000000000123a"
    out: 123
  - name: Generated Mixed 2
    in:
      s: abcde12345
    out: 0
  - name: Generated Large Limit Overflow
    in:
      s: "99999999999999999999999999"
    out: 2147483647
  - name: Generated Min Small
    in:
      s: "-1"
    out: -1
