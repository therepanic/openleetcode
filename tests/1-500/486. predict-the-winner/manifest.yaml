entry:
  id: 486
  title: predict-the-winner
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: Solution().predictTheWinner({nums})
    rust: Solution::predict_the_winner({nums})
    python3: Solution().predictTheWinner({nums})
    python2: Solution().predictTheWinner({nums})
    ruby: predict_the_winner({nums})
    java: new Solution().predictTheWinner({nums})
    csharp: new Solution().PredictTheWinner({nums})
    kotlin: Solution().predictTheWinner({nums})
    go: predictTheWinner({nums})
    dart: Solution().predictTheWinner({nums})
    swift: Solution().predictTheWinner({nums})
    typescript: predictTheWinner({nums})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().predictTheWinner(nums, {result})
    checker: |
      class Checker:
          def _norm(self, result):
              if isinstance(result, str):
                  low = result.strip().lower()
                  if low == "true":
                      return True
                  if low == "false":
                      return False
              return result

          def predictTheWinner(self, nums, result):
              result = self._norm(result)
              n = len(nums)
              dp = [[0] * n for _ in range(n)]
              for i in range(n):
                  dp[i][i] = nums[i]
              for length in range(2, n + 1):
                  for left in range(0, n - length + 1):
                      right = left + length - 1
                      take_left = nums[left] - dp[left + 1][right]
                      take_right = nums[right] - dp[left][right - 1]
                      dp[left][right] = max(take_left, take_right)
              expected = dp[0][n - 1] >= 0
              return expected == result
seed: 486
