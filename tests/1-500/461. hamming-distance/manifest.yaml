entry:
  id: 461
  title: hamming-distance
  params:
    x:
      type: int
    y:
      type: int
  call:
    cpp: "Solution().hammingDistance({x}, {y})"
    rust: "Solution::hamming_distance({x}, {y})"
    python3: "Solution().hammingDistance({x}, {y})"
    python2: "Solution().hammingDistance({x}, {y})"
    ruby: "hamming_distance({x}, {y})"
    java: "new Solution().hammingDistance({x}, {y})"
    csharp: "new Solution().HammingDistance({x}, {y})"
    kotlin: "Solution().hammingDistance({x}, {y})"
    go: "hammingDistance({x}, {y})"
    dart: "Solution().hammingDistance({x}, {y})"
    swift: "Solution().hammingDistance({x}, {y})"
    typescript: "hammingDistance({x}, {y})"

judge:
  type: exact

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().check(x, y, {result})"
    checker: |
      class Checker:
          def check(self, x, y, result):
              if not isinstance(x, int) or not isinstance(y, int):
                  return False
              if x < 0 or y < 0 or x > 2147483647 or y > 2147483647:
                  return False
              if not isinstance(result, int):
                  return False
              expected = (x ^ y).bit_count()
              return result == expected

seed: 461

