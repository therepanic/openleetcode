entry:
  id: 23
  title: merge-k-sorted-lists
  params:
    lists:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp:
      ([&](auto lists){ return listNodeToArray(Solution().mergeKLists(lists));
      })(toLinkedLists({lists}))
    rust: ListNode::list_node_to_array(Solution::merge_k_lists(ListNode::to_list_nodes({lists})))
    python3: list_node_to_array(Solution().mergeKLists([to_list_node(l) for l in {lists}]))
    python2: list_node_to_array(Solution().mergeKLists([to_list_node(l) for l in {lists}]))
    ruby: list_node_to_array(merge_k_lists({lists}.map { |l| to_list_node(l) }))
    java: ListNode.listNodeToArray(new Solution().mergeKLists(ListNode.toListNodes({lists})))
    csharp: ListNode.ListNodeToArray(new Solution().MergeKLists(ListNode.ToListNodes({lists})))
    kotlin: listNodeToArray(Solution().mergeKLists(toLinkedLists({lists})))
    go: listNodeToArray(mergeKLists(toListNodes({lists})))
    dart: list_node_to_array(Solution().mergeKLists(to_list_nodes({lists})))
    swift: list_node_to_array(Solution().mergeKLists(to_list_nodes({lists})))
    typescript: listNodeToArray(mergeKLists(toListNodes({lists})))
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(lists, {result})
    checker:
      "import json\n\nclass Checker:\n    def check(self, lists, result):\n\
      \        expected = []\n        for values in lists:\n            if not isinstance(values,\
      \ list):\n                return False\n            expected.extend(values)\n\
      \        expected.sort()\n        try:\n            got = json.loads(result)\
      \ if isinstance(result, str) else result\n        except Exception:\n      \
      \      return False\n        if isinstance(got, list) and len(got) == 1 and\
      \ isinstance(got[0], list):\n            got = got[0]\n        return got ==\
      \ expected\n"
seed: 23
