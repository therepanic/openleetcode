"judge":
  "type": "exact"
"limits":
  "time_ms": 2000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().check([{lists}], {result})"
    "checker":
      "import json\nclass Checker:\n    def check(self, lists, result):\n\
      \        try:\n            result = json.loads(result) if isinstance(result,\
      \ str) else result\n        except Exception:\n            return False\n  \
      \      expected = []\n        for l in lists:\n            expected.extend(l)\n\
      \        expected.sort()\n        if isinstance(result, list) and len(result)\
      \ == 1 and isinstance(result[0], list):\n            result = result[0]\n  \
      \      return result == expected\n"
