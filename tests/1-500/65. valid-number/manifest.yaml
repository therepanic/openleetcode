entry:
  id: 65
  title: valid-number
  params:
    s:
      type: string
  call:
    cpp: Solution().isNumber({s})
    rust: Solution::is_number({s})
    python3: Solution().isNumber({s})
    python2: Solution().isNumber({s})
    ruby: is_number({s})
    java: new Solution().isNumber({s})
    csharp: new Solution().IsNumber({s})
    kotlin: Solution().isNumber({s})
    go: isNumber({s})
    dart: Solution().isNumber({s})
    swift: Solution().isNumber({s})
    typescript: isNumber({s})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().isNumber(s, {result})"
    checker: |
      class Checker:
          def isNumber(self, s, result):
              if not isinstance(result, bool):
                  return False

              num_seen = False
              dot_seen = False
              e_seen = False
              num_after_e = True

              for i, c in enumerate(s):
                  if c.isdigit():
                      num_seen = True
                      num_after_e = True
                  elif c == ".":
                      if dot_seen or e_seen:
                          return False
                      dot_seen = True
                  elif c in ("e", "E"):
                      if e_seen or not num_seen:
                          return False
                      e_seen = True
                      num_after_e = False
                  elif c in ("+", "-"):
                      if i > 0 and s[i - 1] not in ("e", "E"):
                          return False
                  else:
                      return False

              expected = num_seen and num_after_e
              return result == expected
seed: 65
tests:
