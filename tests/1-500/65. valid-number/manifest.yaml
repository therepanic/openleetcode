entry:
  id: 65
  title: valid-number
  call:
    cpp: Solution().isNumber({s})
    rust: Solution::is_number({s})
    python3: Solution().isNumber({s})
    python2: Solution().isNumber({s})
    ruby: is_number({s})
    java: new Solution().isNumber({s})
    csharp: new Solution().IsNumber({s})
    kotlin: Solution().isNumber({s})
    go: isNumber({s})
    dart: Solution().isNumber({s})
    swift: Solution().isNumber({s})
    typescript: isNumber({s})
  params:
    s:
      type: string
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: isNumber(s, {result})
    checker:
      "def isNumber(s, result): def check(str_val): try: if any(c in str_val\
      \ for c in ['e', 'E']): parts = str_val.replace('E', 'e').split('e') if len(parts)\
      \ != 2: return False return _is_dec(parts[0]) and _is_int(parts[1]) return _is_dec(str_val)\
      \ except Exception: return False return result == check(s)\ndef _is_int(s):\
      \ if not s: return False if s[0] in ['+', '-']: s = s[1:] return s.isdigit()\n\
      def _is_dec(s): if not s: return False if s[0] in ['+', '-']: s = s[1:] if '.'\
      \ not in s: return s.isdigit() parts = s.split('.') if len(parts) != 2: return\
      \ False l, r = parts[0], parts[1] if not l and not r: return False if l and\
      \ not l.isdigit(): return False if r and not r.isdigit(): return False return\
      \ True "
seed: 42
tests:
  - name: ex1
    in:
      s: "0"
    out: true
  - name: ex2
    in:
      s: e
    out: false
  - name: ex3
    in:
      s: .
    out: false
  - name: plus_sign
    in:
      s: "+3.14"
    out: true
  - name: minus_decimal
    in:
      s: "-0.1"
    out: true
  - name: dot_trailing
