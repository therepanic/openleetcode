entry:
  id: 371
  title: sum-of-two-integers
  params:
    a:
      type: int
    b:
      type: int
  call:
    cpp: "Solution().getSum({a}, {b})"
    rust: "Solution::get_sum({a}, {b})"
    python3: "Solution().getSum({a}, {b})"
    python2: "Solution().getSum({a}, {b})"
    ruby: "get_sum({a}, {b})"
    java: "new Solution().getSum({a}, {b})"
    csharp: "new Solution().GetSum({a}, {b})"
    kotlin: "Solution().getSum({a}, {b})"
    go: "getSum({a}, {b})"
    dart: "Solution().getSum({a}, {b})"
    swift: "Solution().getSum({a}, {b})"
    typescript: "getSum({a}, {b})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(a, b, {result})"
    checker: |
      class Checker:
          def check(self, a, b, result):
              if not isinstance(a, int):
                  return False
              if not isinstance(b, int):
                  return False
              if not isinstance(result, int):
                  return False
              expected = a + b
              return result == expected
seed: 371
