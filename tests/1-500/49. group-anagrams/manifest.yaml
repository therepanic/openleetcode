"entry":
  "id": 49
  "title": "group-anagrams"
  "call":
    "cpp": "Solution().groupAnagrams({strs})"
    "rust": "Solution::group_anagrams({strs})"
    "python3": "Solution().groupAnagrams({strs})"
    "python2": "Solution().groupAnagrams({strs})"
    "ruby": "group_anagrams({strs})"
    "java": "new Solution().groupAnagrams({strs})"
    "csharp": "new Solution().GroupAnagrams({strs})"
    "kotlin": "Solution().groupAnagrams({strs})"
    "go": "groupAnagrams({strs})"
    "dart": "Solution().groupAnagrams({strs})"
    "swift": "Solution().groupAnagrams({strs})"
    "typescript": "groupAnagrams({strs})"
  params:
    strs:
      type: array
      items:
        type: string
"judge":
  "type": "ignore_order"
"limits":
  "time_ms": 2000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().groupAnagrams(strs, {result})"
    "checker":
      "from collections import defaultdict\nclass Checker:\n    def groupAnagrams(self, strs, result):\n        def
      sort_str(s):\n            return \"\".join(sorted(s))\n        d = defaultdict(list)\n        for s in strs:\n     \
      \       d[sort_str(s)].append(s)\n        expected = sorted([sorted(v) for v in d.values()])\n        actual = sorted([sorted(v)
      for v in result])\n        return expected == actual\n"
"seed": 42
"tests":
  - "name": "Example 1"
    "in":
      "strs":
        - "eat"
        - "tea"
        - "tan"
        - "ate"
        - "nat"
        - "bat"
    "out":
      - - "bat"
      - - "nat"
        - "tan"
      - - "ate"
        - "eat"
        - "tea"
  - "name": "Example 2"
    "in":
      "strs":
        - ""
    "out":
      - - ""
  - "name": "Example 3"
    "in":
      "strs":
        - "a"
    "out":
      - - "a"
  - "name": "Two elements same"
    "in":
      "strs":
        - "abc"
        - "abc"
    "out":
      - - "abc"
        - "abc"
  - "name": "Two elements anagrams"
    "in":
      "strs":
        - "ab"
        - "ba"
    "out":
      - - "ab"
        - "ba"
  - "name": "Different lengths"
    "in":
      "strs":
        - "a"
        - "ab"
        - "abc"
    "out":
      - - "a"
      - - "ab"
      - - "abc"
  - "name": "All same"
    "in":
      "strs":
        - "x"
        - "x"
        - "x"
        - "x"
    "out":
      - - "x"
        - "x"
        - "x"
        - "x"
  - "name": "Large anagram groups"
    "in":
      "strs":
        - "a"
        - "b"
        - "a"
        - "b"
        - "a"
        - "b"
    "out":
      - - "a"
        - "a"
        - "a"
      - - "b"
        - "b"
        - "b"
  - "name": "Empty strings"
    "in":
      "strs":
        - ""
        - ""
    "out":
      - - ""
        - ""
  - "name": "Varied alphabet"
    "in":
      "strs":
        - "aa"
        - "bb"
        - "ab"
        - "ba"
        - "a"
    "out":
      - - "aa"
      - - "bb"
      - - "ab"
        - "ba"
      - - "a"
  - "name": "Many single chars"
    "in":
      "strs":
        - "d"
        - "c"
        - "b"
        - "a"
    "out":
      - - "d"
      - - "c"
      - - "b"
      - - "a"
  - "name": "Mixed length and anagrams"
    "in":
      "strs":
        - "abc"
        - "cba"
        - "cab"
        - "b"
        - "a"
    "out":
      - - "abc"
        - "cba"
        - "cab"
      - - "b"
      - - "a"
  - "name": "Complex single letter cases"
    "in":
      "strs":
        - "z"
        - "z"
        - "z"
        - "a"
        - "a"
    "out":
      - - "z"
        - "z"
        - "z"
      - - "a"
        - "a"
  - "name": "Palindrome variation"
    "in":
      "strs":
        - "aba"
        - "baa"
        - "aab"
    "out":
      - - "aba"
        - "baa"
        - "aab"
  - "name": "Double letters"
    "in":
      "strs":
        - "aabb"
        - "bbaa"
        - "abab"
        - "abba"
    "out":
      - - "aabb"
        - "bbaa"
        - "abab"
        - "abba"
  - "name": "No common chars"
    "in":
      "strs":
        - "abc"
        - "def"
        - "ghi"
    "out":
      - - "abc"
      - - "def"
      - - "ghi"
  - "name": "Long sequence same"
    "in":
      "strs":
        - "abcde"
        - "abcde"
        - "abcde"
    "out":
      - - "abcde"
        - "abcde"
        - "abcde"
