entry:
  id: 49
  title: "group-anagrams"
  params:
    strs:
      type: array
      items:
        type: string
  call:
    cpp: "Solution().groupAnagrams({strs})"
    rust: "Solution::group_anagrams({strs})"
    python3: "Solution().groupAnagrams({strs})"
    python2: "Solution().groupAnagrams({strs})"
    ruby: "group_anagrams({strs})"
    java: "new Solution().groupAnagrams({strs})"
    csharp: "new Solution().GroupAnagrams({strs})"
    kotlin: "Solution().groupAnagrams({strs})"
    go: "groupAnagrams({strs})"
    dart: "Solution().groupAnagrams({strs})"
    swift: "Solution().groupAnagrams({strs})"
    typescript: "groupAnagrams({strs})"

judge:
  type: "ignore_order"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().groupAnagrams(strs, {result})"
    checker: |
      from collections import Counter

      class Checker:
          def groupAnagrams(self, strs, result):
              if not isinstance(result, list):
                  return False

              input_counts = Counter(strs)
              output_counts = Counter()
              groups = Counter()

              for group in result:
                  if not isinstance(group, list) or len(group) == 0:
                      return False

                  for word in group:
                      if not isinstance(word, str):
                          return False
                      output_counts[word] += 1

                  signature = "".join(sorted(group[0]))
                  for word in group[1:]:
                      if "".join(sorted(word)) != signature:
                          return False

                  groups[tuple(sorted(group))] += 1

              if output_counts != input_counts:
                  return False

              expected_groups = Counter()
              buckets = {}
              for word in strs:
                  signature = "".join(sorted(word))
                  buckets.setdefault(signature, []).append(word)

              for bucket in buckets.values():
                  expected_groups[tuple(sorted(bucket))] += 1

              return groups == expected_groups

seed: 49

