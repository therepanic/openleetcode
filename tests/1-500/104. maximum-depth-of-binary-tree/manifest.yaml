      type: tree_node
  call:
    cpp: Solution().maxDepth({root})
    rust: Solution::max_depth({root})
    python3: Solution().maxDepth({root})
    python2: Solution().maxDepth({root})
    ruby: max_depth({root})
    java: new Solution().maxDepth({root})
    csharp: new Solution().MaxDepth({root})
    kotlin: Solution().maxDepth({root})
    go: maxDepth({root})
    dart: Solution().maxDepth({root})
    swift: Solution().maxDepth({root})
    typescript: maxDepth({root})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().maxDepth(root, {result})
    checker: |
      class Checker:
          def maxDepth(self, root_arr, result):
              def depth(idx):
                  if idx >= len(root_arr) or root_arr[idx] is None:
                      return 0
                  return 1 + max(depth(2 * idx + 1), depth(2 * idx + 2))

              return depth(0) == result
seed: 104
