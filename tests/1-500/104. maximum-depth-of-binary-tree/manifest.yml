entry:
  id: 104
  title: "maximum-depth-of-binary-tree"
  call:
    cpp: "Solution().maxDepth(toTreeNode(lv(vector<optional<int>>{ {root} })))"
    rust: "Solution::max_depth(TreeNode::to_tree_node(vec![{root}]))"
    python3: "Solution().maxDepth(to_tree_node([{root}]))"
    python2: "Solution().maxDepth(to_tree_node([{root}]))"
    ruby: "Solution.new.max_depth(to_tree_node([{root}]))"
    java: "new Solution().maxDepth(TreeNode.toTreeNode(new Integer[] { {root} }))"
    csharp: "new Solution().MaxDepth(TreeNode.ToTreeNode(new int?[]{ {root} }))"
    kotlin: "Solution().maxDepth(toTreeNode(arrayOf({root})))"
    go: "maxDepth(toTreeNode([]interface{}{ {root} }))"
    dart: "Solution().maxDepth(to_tree_node([{root}]))"
    swift: "Solution().maxDepth(to_tree_node([{root}]))"
    typescript: "maxDepth(toTreeNode([{root}]))"

judge:
  type: "exact"

limits:
  time_ms: 500
  memory_mb: 512

oracle:
  python3:
    call: "Checker().maxDepth([{root}], {result})"
    checker: |
      import json
      from typing import Optional, List

      class TreeNode:
          def __init__(self, val=0, left=None, right=None):
              self.val = val
              self.left = left
              self.right = right

      class Checker:
          def maxDepth(self, root: List[Optional[int]], result: str) -> bool:
              def build_tree(data: List[Optional[int]]) -> Optional[TreeNode]:
                  if not data or data[0] is None:
                      return None
                  from collections import deque
                  root_node = TreeNode(data[0])
                  q = deque([root_node])
                  i = 1
                  while q and i < len(data):
                      node = q.popleft()
                      if data[i] is not None:
                          node.left = TreeNode(data[i])
                          q.append(node.left)
                      i += 1
                      if i < len(data) and data[i] is not None:
                          node.right = TreeNode(data[i])
                          q.append(node.right)
                      i += 1
                  return root_node

              def compute_depth(node: Optional[TreeNode]) -> int:
                  if not node:
                      return 0
                  return 1 + max(compute_depth(node.left), compute_depth(node.right))

              try:
                  result_int = int(result.strip())
              except:
                  return False

              tree = build_tree(root)
              expected = compute_depth(tree)
              return result_int == expected

seed: 42

