entry:
  id: 77
  title: combinations
  params:
    n:
      type: int
    k:
      type: int
  call:
    cpp: Solution().combine({n}, {k})
    rust: Solution::combine({n}, {k})
    python3: Solution().combine({n}, {k})
    python2: Solution().combine({n}, {k})
    ruby: combine({n}, {k})
    java: new Solution().combine({n}, {k})
    csharp: new Solution().Combine({n}, {k})
    kotlin: Solution().combine({n}, {k})
    go: combine({n}, {k})
    dart: Solution().combine({n}, {k})
    swift: Solution().combine({n}, {k})
    typescript: combine({n}, {k})
judge:
  type: ignore_order
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(n, k, {result})
    checker:
      "import json\nimport math\n\nclass Checker:\n    def check(self, n, k,\
      \ result):\n        try:\n            res = json.loads(result) if isinstance(result,\
      \ str) else result\n            res_set = set(tuple(sorted(x)) for x in res)\n\
      \            if len(res_set) != len(res):\n                return False\n  \
      \          if len(res_set) != math.comb(n, k):\n                return False\n\
      \            for comb in res_set:\n                if len(comb) != k:\n    \
      \                return False\n                if min(comb) < 1 or max(comb)\
      \ > n:\n                    return False\n                if len(set(comb))\
      \ != k:\n                    return False\n            return True\n       \
      \ except Exception:\n            return False\n"
seed: 42
