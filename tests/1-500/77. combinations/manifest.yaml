entry:
  id: 77
  title: combinations
  params:
    n:
      type: int
    k:
      type: int
  call:
    cpp: "Solution().combine({n}, {k})"
    rust: "Solution::combine({n}, {k})"
    python3: "Solution().combine({n}, {k})"
    python2: "Solution().combine({n}, {k})"
    ruby: "combine({n}, {k})"
    java: "new Solution().combine({n}, {k})"
    csharp: "new Solution().Combine({n}, {k})"
    kotlin: "Solution().combine({n}, {k})"
    go: "combine({n}, {k})"
    dart: "Solution().combine({n}, {k})"
    swift: "Solution().combine({n}, {k})"
    typescript: "combine({n}, {k})"
judge:
  type: ignore_order
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().combine(n, k, {result})"
    checker: |
      class Checker:
          def combine(self, n, k, result):
              expected = []
              cur = []

              def dfs(start):
                  if len(cur) == k:
                      expected.append(tuple(cur))
                      return
                  for i in range(start, n + 1):
                      cur.append(i)
                      dfs(i + 1)
                      cur.pop()

              dfs(1)
              got = [tuple(x) for x in result]
              return sorted(got) == sorted(expected)
seed: 77
