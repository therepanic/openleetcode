judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().numberOfArithmeticSlices(nums, {result})
    checker: |
      from collections import defaultdict

      class Checker:
          def numberOfArithmeticSlices(self, nums, result):
              if not isinstance(result, int):
                  return False
              n = len(nums)
              total_count = 0
              dp = [defaultdict(int) for _ in range(n)]
              for i in range(1, n):
                  for j in range(i):
                      diff = nums[i] - nums[j]
                      dp[i][diff] += 1
                      if diff in dp[j]:
                          dp[i][diff] += dp[j][diff]
                          total_count += dp[j][diff]
              return result == total_count
seed: 446
