entry:
  id: 391
  title: "perfect-rectangle"
  params:
    rectangles:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().isRectangleCover({rectangles})"
    rust: "Solution::isRectangleCover({rectangles})"
    python3: "Solution().isRectangleCover({rectangles})"
    python2: "Solution().isRectangleCover({rectangles})"
    ruby: "isRectangleCover({rectangles})"
    java: "new Solution().isRectangleCover({rectangles})"
    csharp: "new Solution().IsRectangleCover({rectangles})"
    kotlin: "Solution().isRectangleCover({rectangles})"
    go: "isRectangleCover({rectangles})"
    dart: "Solution().isRectangleCover({rectangles})"
    swift: "Solution().isRectangleCover({rectangles})"
    typescript: "isRectangleCover({rectangles})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 512

oracle:
  python3:
    call: "Checker().check(rectangles, {result})"
    checker: |
      class Checker:
          def check(self, rectangles, result):
              if not rectangles:
                  return result is False
              area = 0
              corners = set()
              min_x = min(r[0] for r in rectangles)
              min_y = min(r[1] for r in rectangles)
              max_x = max(r[2] for r in rectangles)
              max_y = max(r[3] for r in rectangles)
              for x1, y1, x2, y2 in rectangles:
                  if x1 >= x2 or y1 >= y2:
                      return result is False
                  area += (x2 - x1) * (y2 - y1)
                  for pt in ((x1, y1), (x1, y2), (x2, y1), (x2, y2)):
                      if pt in corners:
                          corners.remove(pt)
                      else:
                          corners.add(pt)
              expected = {
                  (min_x, min_y),
                  (min_x, max_y),
                  (max_x, min_y),
                  (max_x, max_y),
              }
              ok = area == (max_x - min_x) * (max_y - min_y) and corners == expected
              return result == ok

seed: 391

tests:
  - name: sample-1
    in:
      rectangles:
        elemType: "int"
        value:
          - [1, 1, 3, 3]
          - [3, 1, 4, 2]
          - [3, 2, 4, 4]
          - [1, 3, 2, 4]
          - [2, 3, 3, 4]
    out: true
