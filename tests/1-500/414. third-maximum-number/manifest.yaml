entry:
  id: 414
  title: "third-maximum-number"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().thirdMax({nums})"
    rust: "Solution::third_max({nums})"
    python3: "Solution().thirdMax({nums})"
    python2: "Solution().thirdMax({nums})"
    ruby: "third_max({nums})"
    java: "new Solution().thirdMax({nums})"
    csharp: "new Solution().ThirdMax({nums})"
    kotlin: "Solution().thirdMax({nums})"
    go: "thirdMax({nums})"
    dart: "Solution().thirdMax({nums})"
    swift: "Solution().thirdMax({nums})"
    typescript: "thirdMax({nums})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().thirdMax(nums, {result})"
    checker: |
      class Checker:
          def thirdMax(self, nums, result):
              if not isinstance(result, int):
                  return False
              distinct = sorted(set(nums), reverse=True)
              expected = distinct[2] if len(distinct) >= 3 else distinct[0]
              return result == expected

seed: 414

