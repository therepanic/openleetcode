judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 64
oracle:
  python3:
    call: Checker().convertToTitle(columnNumber, {result})
    checker: "class Checker:\n    def convertToTitle(self, columnNumber, result):\n        expected = \"\"\n        n = columnNumber\n        while n > 0:\n            n -= 1\n            expected = chr((n % 26) + ord(\"A\")) + expected\n            n //= 26\n        return result == expected\n"
