entry:
  id: 25
  title: reverse-nodes-in-k-group
  call:
    cpp: listNodeToArray(Solution().reverseKGroup({head}, {k}))
    rust: ListNode::list_node_to_array(Solution::reverse_k_group({head}, {k}))
    python3: list_node_to_array(Solution().reverseKGroup({head}, {k}))
    python2: list_node_to_array(Solution().reverseKGroup({head}, {k}))
    ruby: list_node_to_array(reverse_k_group({head}, {k}))
    java: ListNode.listNodeToArray(new Solution().reverseKGroup({head}, {k}))
    csharp: ListNode.ListNodeToArray(new Solution().ReverseKGroup({head}, {k}))
    kotlin: listNodeToArray(Solution().reverseKGroup({head}, {k}))
    go: listNodeToArray(reverseKGroup({head}, {k}))
    dart: list_node_to_array(Solution().reverseKGroup({head}, {k}))
    swift: list_node_to_array(Solution().reverseKGroup({head}, {k}))
    typescript: listNodeToArray(reverseKGroup({head}, {k}))
  params:
    head:
      type: list_node
    k:
      type: int
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check([{head}], {k}, {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, result):\n        if isinstance(result, str):\n           \
      \ try:\n                result = json.loads(result)\n            except Exception:\n                pass\n        return
      result\n\n    def check(self, head, k, output):\n        output = self._norm(output)\n        def to_list(arr):\n  \
      \          if not arr: return None\n            head = ListNode(arr[0])\n            curr = head\n            for i
      in range(1, len(arr)):\n                curr.next = ListNode(arr[i])\n                curr = curr.next\n           \
      \ return head\n        def from_list(node):\n            res = []\n            while node:\n                res.append(node.val)\n\
      \                node = node.next\n            return res\n        n = len(head)\n        expected = list(head)\n  \
      \      for i in range(0, (n // k) * k, k):\n            expected[i:i+k] = reversed(expected[i:i+k])\n        return
      from_list(to_list(output)) == expected\n"
seed: 42
tests:
  - name: Example 1
    in:
      head:
        - 1
        - 2
        - 3
        - 4
        - 5
      k: 2
    out:
      - 2
      - 1
      - 4
      - 3
      - 5
