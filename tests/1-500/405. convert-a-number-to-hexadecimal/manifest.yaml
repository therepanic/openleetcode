entry:
  id: 405
  title: "convert-a-number-to-hexadecimal"
  params:
    num:
      type: int
  call:
    cpp: "Solution().toHex({num})"
    rust: "Solution::to_hex({num})"
    python3: "Solution().toHex({num})"
    python2: "Solution().toHex({num})"
    ruby: "to_hex({num})"
    java: "new Solution().toHex({num})"
    csharp: "new Solution().ToHex({num})"
    kotlin: "Solution().toHex({num})"
    go: "toHex({num})"
    dart: "Solution().toHex({num})"
    swift: "Solution().toHex({num})"
    typescript: "toHex({num})"
judge:
  type: "exact"
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: "Checker().toHex(num, {result})"
    checker: |
      class Checker:
          def toHex(self, num, result):
              if not isinstance(result, str):
                  return False
              if num == 0:
                  return result == "0"
              if num < 0:
                  num += 2**32
              digits = "0123456789abcdef"
              expected = []
              while num:
                  expected.append(digits[num & 15])
                  num //= 16
              return result == "".join(reversed(expected))
seed: 405
