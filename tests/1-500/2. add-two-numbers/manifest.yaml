      toListNode(intArrayOf({l2}))))
    go:
      listNodeToArray(addTwoNumbers(toListNode([]int{ {l1} }), toListNode([]int{
      {l2} })))
    dart: list_node_to_array(Solution().addTwoNumbers(to_list_node([{l1}]), to_list_node([{l2}])))
    swift: list_node_to_array(Solution().addTwoNumbers(to_list_node([{l1}]), to_list_node([{l2}])))
    typescript: listNodeToArray(addTwoNumbers(toListNode([{l1}]), toListNode([{l2}])))
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check([{l1}], [{l2}], {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, res):\n        if isinstance(res,\
      \ str):\n            try:\n                res = json.loads(res)\n         \
      \   except Exception:\n                pass\n        return res\n\n    def check(self,\
      \ l1, l2, res):\n        res = self._norm(res)\n        def to_int(arr):\n \
      \           return sum(d * (10**i) for i, d in enumerate(arr))\n        def\
      \ to_arr(n):\n            if n == 0: return [0]\n            out = []\n    \
      \        while n > 0:\n                out.append(n % 10)\n                n\
      \ //= 10\n            return out\n        return to_arr(to_int(l1) + to_int(l2))\
      \ == res\n"
seed: 42
