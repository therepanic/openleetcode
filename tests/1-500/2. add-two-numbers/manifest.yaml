      int[]{ {l1} }), ListNode.toListNode(new int[]{ {l2} })))
    csharp:
      ListNode.ListNodeToArray(new Solution().AddTwoNumbers(ListNode.ToListNode(new
      int[]{ {l1} }), ListNode.ToListNode(new int[]{ {l2} })))
    kotlin:
