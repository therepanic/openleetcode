judge:
  type: exact

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().addTwoNumbers(l1, l2, {result})"
    checker: |
      class Checker:
          def addTwoNumbers(self, l1, l2, result) -> bool:
              def to_digits(node):
                  digits = []
                  seen = 0
                  while node is not None:
                      if not hasattr(node, 'val') or not hasattr(node, 'next'):
                          return None
                      val = node.val
                      if not isinstance(val, int) or val < 0 or val > 9:
                          return None
                      digits.append(val)
                      node = node.next
                      seen += 1
                      if seen > 200:
                          return None
                  return digits

              a = to_digits(l1)
              b = to_digits(l2)
              r = to_digits(result)
              if a is None or b is None or r is None:
                  return False

              i = 0
              carry = 0
              expected = []
              while i < len(a) or i < len(b) or carry:
                  x = a[i] if i < len(a) else 0
                  y = b[i] if i < len(b) else 0
                  total = x + y + carry
                  expected.append(total % 10)
                  carry = total // 10
                  i += 1
              return r == expected

seed: 2002

