entry:
  id: 2
  title: "add-two-numbers"
  call:
    python3: "listNodeToArray(Solution().addTwoNumbers(toListNode([{l1}]), toListNode([{l2}])))"
    ruby: "list_node_to_array(add_two_numbers(to_list_node([{l1}]), to_list_node([{l2}])))"
    java: "ListNode.listNodeToArray(new Solution().addTwoNumbers(ListNode.toListNode(new int[]{ {l1} }), ListNode.toListNode(new int[]{ {l2} })))"
    kotlin: "listNodeToArray(Solution().addTwoNumbers(toListNode(intArrayOf({l1})), toListNode(intArrayOf({l2}))))"
    go: "listNodeToArray(addTwoNumbers(toListNode([]int{ {l1} }), toListNode([]int{ {l2} })))"
    dart: "listNodeToArray(Solution().addTwoNumbers(toListNode([{l1}]), toListNode([{l2}])))"
    swift: "listNodeToArray(Solution().addTwoNumbers(toListNode([{l1}]), toListNode([{l2}])))"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().addTwoNumbers([{l1}], [{l2}], {result})"
    checker: |
      import json
      from typing import List, Optional

      class ListNode:
          def __init__(self, val=0, next=None):
              self.val = val
              self.next = next

      class Checker:
          def addTwoNumbers(self, l1: List[int], l2: List[int], result: str) -> bool:
              try:
                  output = json.loads(result)
              except:
                  return False
              if not isinstance(output, list):
                  return False
              for x in output:
                  if not isinstance(x, int) or not (0 <= x <= 9):
                      return False

              def to_linked_list(nums):
                  dummy = ListNode(0)
                  curr = dummy
                  for num in nums:
                      curr.next = ListNode(num)
                      curr = curr.next
                  return dummy.next

              def to_array(head):
                  arr = []
                  while head:
                      arr.append(head.val)
                      head = head.next
                  return arr

              list1 = to_linked_list(l1)
              list2 = to_linked_list(l2)

              dummy = ListNode(0)
              curr = dummy
              carry = 0
              p1, p2 = list1, list2
              while p1 or p2 or carry:
                  x = p1.val if p1 else 0
                  y = p2.val if p2 else 0
                  total = x + y + carry
                  carry = total // 10
                  curr.next = ListNode(total % 10)
                  curr = curr.next
                  p1 = p1.next if p1 else None
                  p2 = p2.next if p2 else None

              expected = to_array(dummy.next)
              return output == expected

seed: 42

