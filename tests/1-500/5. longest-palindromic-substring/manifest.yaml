entry:
  id: 5
  title: longest-palindromic-substring
  call:
    cpp: Solution().longestPalindrome("{s}")
    rust: Solution::longest_palindrome("{s}".to_string())
    python3: Solution().longestPalindrome("{s}")
    python2: Solution().longestPalindrome("{s}")
    ruby: longest_palindrome("{s}")
    java: new Solution().longestPalindrome("{s}")
    csharp: new Solution().LongestPalindrome("{s}")
    kotlin: Solution().longestPalindrome("{s}")
    go: longestPalindrome("{s}")
    dart: Solution().longestPalindrome("{s}")
    swift: Solution().longestPalindrome("{s}")
    typescript: longestPalindrome("{s}")
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check("{s}", {result})
    checker:
      "class Checker:\n    def check(self, s, result):\n        if isinstance(result,\
      \ str):\n            stripped = result.strip()\n            if len(stripped)\
      \ >= 2 and stripped[0] == '\"' and stripped[-1] == '\"':\n                result\
      \ = stripped[1:-1]\n        if not result or result not in s:\n            return\
      \ False\n        if result != result[::-1]:\n            return False\n    \
      \    n = len(s)\n        def get_len(l, r):\n            while l >= 0 and r\
      \ < n and s[l] == s[r]:\n                l -= 1\n                r += 1\n  \
      \          return r - l - 1\n        max_l = 0\n        for i in range(n):\n\
      \            max_l = max(max_l, get_len(i, i), get_len(i, i + 1))\n        return\
      \ len(result) == max_l\n"
seed: 42
tests:
  - name: basic babad
    in:
      s: babad
    judge:
      type: exact
  - name: basic cbbd
    in:
      s: cbbd
    judge:
      type: exact
  - name: single char
    in:
      s: a
    judge:
      type: exact
  - name: two chars identical
    in:
      s: aa
    judge:
      type: exact
  - name: two chars different
    in:
      s: ab
    judge:
      type: exact
  - name: all identical
    in:
      s: aaaaa
    judge:
      type: exact
