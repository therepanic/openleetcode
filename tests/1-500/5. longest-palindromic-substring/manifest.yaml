entry:
  id: 5
  title: longest-palindromic-substring
  params:
    s:
      type: string
  call:
    cpp: Solution().longestPalindrome({s})
    rust: Solution::longest_palindrome({s})
    python3: Solution().longestPalindrome({s})
    python2: Solution().longestPalindrome({s})
    ruby: longest_palindrome({s})
    java: new Solution().longestPalindrome({s})
    csharp: new Solution().LongestPalindrome({s})
    kotlin: Solution().longestPalindrome({s})
    go: longestPalindrome({s})
    dart: Solution().longestPalindrome({s})
    swift: Solution().longestPalindrome({s})
    typescript: longestPalindrome({s})

judge:
  type: exact

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: Checker().longestPalindrome(s, {result})
    checker: |
      class Checker:
          def longestPalindrome(self, s, result):
              if not isinstance(result, str):
                  return False
              if len(result) == 0 or len(result) > len(s):
                  return False
              if result not in s:
                  return False
              if result != result[::-1]:
                  return False

              def best_length(text):
                  best = 1
                  n = len(text)
                  for center in range(n):
                      left = right = center
                      while left >= 0 and right < n and text[left] == text[right]:
                          best = max(best, right - left + 1)
                          left -= 1
                          right += 1
                      left = center
                      right = center + 1
                      while left >= 0 and right < n and text[left] == text[right]:
                          best = max(best, right - left + 1)
                          left -= 1
                          right += 1
                  return best

              return len(result) == best_length(s)

