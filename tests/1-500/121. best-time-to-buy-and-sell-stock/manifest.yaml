oracle:
  python3:
    call: Checker().maxProfit(prices, {result})
    checker: "class Checker:\n    def maxProfit(self, prices, result):\n        if not isinstance(result, int) or not prices:\n            return False\n        best = 0\n        low = prices[0]\n        for price in prices[1:]:\n            if price - low > best:\n                best = price - low\n            if price < low:\n                low = price\n        return result == best\n"
