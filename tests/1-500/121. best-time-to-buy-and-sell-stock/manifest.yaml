  id: 121
  title: "best-time-to-buy-and-sell-stock"
  params:
    prices:
      type: "array"
      items:
        type: "int"
  call:
    cpp: "Solution().maxProfit({prices})"
    rust: "Solution::max_profit({prices})"
    python3: "Solution().maxProfit({prices})"
    python2: "Solution().maxProfit({prices})"
    ruby: "max_profit({prices})"
    java: "new Solution().maxProfit({prices})"
    csharp: "new Solution().MaxProfit({prices})"
    kotlin: "Solution().maxProfit({prices})"
    go: "maxProfit({prices})"
    dart: "Solution().maxProfit({prices})"
    swift: "Solution().maxProfit({prices})"
    typescript: "maxProfit({prices})"
judge:
  type: "exact"
limits:
  time_ms: 2000
  memory_mb: 512
oracle:
  python3:
    call: "Checker().maxProfit(prices, {result})"
    checker: |
      import copy


      from typing import *
      from collections import *
      import copy
      import json
      import math
      import bisect
      import heapq
      import itertools
      import functools

      class Solution:
          def maxProfit(self, prices):
              left = 0  # Buy
              right = 1  # Sell
              max_profit = 0
              while right < len(prices):
                  current_profit = prices[right] - prices[left]
                  if prices[left] < prices[right]:
                      max_profit = max(current_profit, max_profit)
                  else:
                      left = right
                  right += 1
              return max_profit


      def array_to_list_node_local(values):
          dummy = ListNode(0)
          tail = dummy
          for value in values:
              tail.next = ListNode(value)
              tail = tail.next
          return dummy.next

      def array_to_tree_node_local(values):
          if not values:
              return None
          root = TreeNode(values[0])
          queue = deque([root])
          index = 1
          while queue and index < len(values):
              node = queue.popleft()
              if index < len(values) and values[index] is not None:
                  node.left = TreeNode(values[index])
                  queue.append(node.left)
              index += 1
              if index < len(values) and values[index] is not None:
                  node.right = TreeNode(values[index])
                  queue.append(node.right)
              index += 1
          return root

      def list_node_to_array_local(node):
          out = []
          seen = 0
          while node is not None and seen < 100000:
              out.append(node.val)
              node = node.next
              seen += 1
          return out

      def tree_node_to_array_local(root):
          if root is None:
              return []
          out = []
          q = deque([root])
          while q:
              node = q.popleft()
              if node is None:
                  out.append(None)
                  continue
              out.append(node.val)
              q.append(node.left)
              q.append(node.right)
          while out and out[-1] is None:
              out.pop()
          return out

      def deep_sort(value):
          if isinstance(value, list):
              normalized = [deep_sort(item) for item in value]
              return sorted(normalized, key=lambda item: json.dumps(item, sort_keys=True))
          if isinstance(value, dict):
              return {key: deep_sort(val) for key, val in sorted(value.items())}
          return value

      def normalize_expected(value):
          kind = "int"
          if kind == "list_node":
              return list_node_to_array_local(value)
          if kind == "tree_node":
              return tree_node_to_array_local(value)
          return value

      def normalize_actual(value):
          return value

      def prepare_input(value, kind):
          if kind == "tree_node":
              return array_to_tree_node_local(value)
          if kind == "list_node":
              return array_to_list_node_local(value)
          return copy.deepcopy(value)

      class Checker:
          def maxProfit(self, prices, result):
              prepared_prices = prepare_input(prices, "array[int]")
              expected = Solution().maxProfit(prepared_prices)
              expected = normalize_expected(expected)
              actual = normalize_actual(result)
              return deep_sort(expected) == deep_sort(actual)
seed: 121
