judge:
  type: exact
limits:
  time_ms: 10000
  memory_mb: 256
oracle:
  python3:
    call: Checker().countPrimes(n, {result})
    checker: |
      class Checker:
          def countPrimes(self, n, result) -> bool:
              if not isinstance(result, int):
                  return False
              if n < 2:
                  return result == 0

              sieve = bytearray(b'\x01') * n
              sieve[0] = 0
              sieve[1] = 0

              i = 2
              while i * i < n:
                  if sieve[i]:
                      for j in range(i * i, n, i):
                          sieve[j] = 0
                  i += 1

              return result == sum(sieve)
