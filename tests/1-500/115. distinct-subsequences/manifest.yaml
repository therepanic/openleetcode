entry:
  id: 115
  title: "distinct-subsequences"
  params:
    s:
      type: "string"
    t:
      type: "string"
  call:
    cpp: "Solution().numDistinct({s}, {t})"
    rust: "Solution::num_distinct({s}, {t})"
    python3: "Solution().numDistinct({s}, {t})"
    python2: "Solution().numDistinct({s}, {t})"
    ruby: "num_distinct({s}, {t})"
    java: "new Solution().numDistinct({s}, {t})"
    csharp: "new Solution().NumDistinct({s}, {t})"
    kotlin: "Solution().numDistinct({s}, {t})"
    go: "numDistinct({s}, {t})"
    dart: "Solution().numDistinct({s}, {t})"
    swift: "Solution().numDistinct({s}, {t})"
    typescript: "numDistinct({s}, {t})"
judge:
  type: "exact"
limits:
  time_ms: 2000
  memory_mb: 512
oracle:
  python3:
    call: "Checker().numDistinct(s, t, {result})"
    checker: |
      import copy


      from typing import *
      from collections import *
      import copy
      import json
      import math
      import bisect
      import heapq
      import itertools
      import functools

      class Solution:
          def numDistinct(self, s: str, t: str) -> int:
              if len(t) > len(s):
                  return 0

              memo = {}

              def dfs(i, j):
                  if i == len(s) or j == len(t) or len(s) - i < len(t) - j:
                      return int(j == len(t))
                  if (i, j) in memo:
                      return memo[(i, j)]

                  ans = dfs(i + 1, j)
                  if s[i] == t[j]:
                      ans += dfs(i + 1, j + 1)
                  memo[(i, j)] = ans
                  return ans

              return dfs(0, 0)


      def array_to_list_node_local(values):
          dummy = ListNode(0)
          tail = dummy
          for value in values:
              tail.next = ListNode(value)
              tail = tail.next
          return dummy.next

      def array_to_tree_node_local(values):
          if not values:
              return None
          root = TreeNode(values[0])
          queue = deque([root])
          index = 1
          while queue and index < len(values):
              node = queue.popleft()
              if index < len(values) and values[index] is not None:
                  node.left = TreeNode(values[index])
                  queue.append(node.left)
              index += 1
              if index < len(values) and values[index] is not None:
                  node.right = TreeNode(values[index])
                  queue.append(node.right)
              index += 1
          return root

      def list_node_to_array_local(node):
          out = []
          seen = 0
          while node is not None and seen < 100000:
              out.append(node.val)
              node = node.next
              seen += 1
          return out

      def tree_node_to_array_local(root):
          if root is None:
              return []
          out = []
          q = deque([root])
          while q:
              node = q.popleft()
              if node is None:
                  out.append(None)
                  continue
              out.append(node.val)
              q.append(node.left)
              q.append(node.right)
          while out and out[-1] is None:
              out.pop()
          return out

      def deep_sort(value):
          if isinstance(value, list):
              normalized = [deep_sort(item) for item in value]
              return sorted(normalized, key=lambda item: json.dumps(item, sort_keys=True))
          if isinstance(value, dict):
              return {key: deep_sort(val) for key, val in sorted(value.items())}
          return value

      def normalize_expected(value):
          kind = "int"
          if kind == "list_node":
              return list_node_to_array_local(value)
          if kind == "tree_node":
              return tree_node_to_array_local(value)
          return value

      def normalize_actual(value):
          return value

      def prepare_input(value, kind):
          if kind == "tree_node":
              return array_to_tree_node_local(value)
          if kind == "list_node":
              return array_to_list_node_local(value)
          return copy.deepcopy(value)

      class Checker:
          def numDistinct(self, s, t, result):
              prepared_s = prepare_input(s, "string"); prepared_t = prepare_input(t, "string")
              expected = Solution().numDistinct(prepared_s, prepared_t)
              expected = normalize_expected(expected)
              actual = normalize_actual(result)
              return deep_sort(expected) == deep_sort(actual)
