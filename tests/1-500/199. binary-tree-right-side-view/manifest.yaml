  title: binary-tree-right-side-view
  params:
    root:
      type: tree_node
  call:
    cpp: Solution().rightSideView({root})
    rust: Solution::right_side_view({root})
    python3: Solution().rightSideView({root})
    python2: Solution().rightSideView({root})
    ruby: right_side_view({root})
    java: new Solution().rightSideView({root})
    csharp: new Solution().RightSideView({root})
    kotlin: Solution().rightSideView({root})
    go: rightSideView({root})
    dart: Solution().rightSideView({root})
    swift: Solution().rightSideView({root})
    typescript: rightSideView({root})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().rightSideView(root, {result})
    checker:
      "from collections import deque\n\nclass Node:\n    def __init__(self, val=0, left=None, right=None):\n        self.val = val\n        self.left = left\n        self.right = right\n\nclass Checker:\n    def _to_tree(self, root):\n        if root is None or root == []:\n            return None\n        if hasattr(root, \"val\"):\n            return root\n        if not isinstance(root, list) or not root or root[0] is None:\n            return None\n        tree_root = Node(root[0])\n        queue = [tree_root]\n        i = 1\n        while queue and i < len(root):\n            node = queue.pop(0)\n            if i < len(root) and root[i] is not None:\n                node.left = Node(root[i])\n                queue.append(node.left)\n            i += 1\n            if i < len(root) and root[i] is not None:\n                node.right = Node(root[i])\n                queue.append(node.right)\n            i += 1\n        return tree_root\n\n    def rightSideView(self, root, result):\n\
      \        if not isinstance(result, list):\n            return False\n        root = self._to_tree(root)\n        if root is None:\n            return result == []\n        expected = []\n        queue = deque([root])\n        while queue:\n            rightmost = None\n            for _ in range(len(queue)):\n                node = queue.popleft()\n                rightmost = node.val\n                if node.left is not None:\n                    queue.append(node.left)\n                if node.right is not None:\n                    queue.append(node.right)\n            expected.append(rightmost)\n        return result == expected\n"
seed: 199
