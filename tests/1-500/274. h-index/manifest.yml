entry:
  id: 274
  title: h-index
  params:
    citations:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().hIndex({citations})"
    rust: "Solution::h_index({citations})"
    python3: "Solution().hIndex({citations})"
    python2: "Solution().hIndex({citations})"
    ruby: "h_index({citations})"
    java: "new Solution().hIndex({citations})"
    csharp: "new Solution().HIndex({citations})"
    kotlin: "Solution().hIndex({citations})"
    go: "hIndex({citations})"
    dart: "Solution().hIndex({citations})"
    swift: "Solution().hIndex({citations})"
    typescript: "hIndex({citations})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(citations, {result})"
    checker: |
      class Checker:
          def check(self, citations, result):
              if not isinstance(result, int):
                  return False
              if result < 0 or result > len(citations):
                  return False
              h = result
              at_least_h = sum(1 for c in citations if c >= h)
              if at_least_h < h:
                  return False
              if h == len(citations):
                  return True
              at_least_next = sum(1 for c in citations if c >= h + 1)
              return at_least_next < h + 1
seed: 274274
