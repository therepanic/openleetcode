entry:
  id: 44
  title: wildcard-matching
  params:
    s:
      type: string
    p:
      type: string
  call:
    cpp: "Solution().isMatch({s}, {p})"
    rust: "Solution::is_match({s}, {p})"
    python3: "Solution().isMatch({s}, {p})"
    python2: "Solution().isMatch({s}, {p})"
    ruby: "is_match({s}, {p})"
    java: "new Solution().isMatch({s}, {p})"
    csharp: "new Solution().IsMatch({s}, {p})"
    kotlin: "Solution().isMatch({s}, {p})"
    go: "isMatch({s}, {p})"
    dart: "Solution().isMatch({s}, {p})"
    swift: "Solution().isMatch({s}, {p})"
    typescript: "isMatch({s}, {p})"
judge:
  type: exact
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().is_match(s, p, {result})"
    checker: |
      class Checker:
          def is_match(self, s, p, result):
              return isinstance(result, bool)
seed: 44
tests:
  - name: example_1
    in:
      s: aa
      p: a
    out: false
  - name: example_2
    in:
      s: aa
      p: "*"
    out: true
  - name: example_3
    in:
      s: cb
      p: "?a"
    out: false
  - name: both_empty
    in:
      s: ""
      p: ""
    out: true
  - name: empty_string_single_star
    in:
      s: ""
      p: "*"
    out: true
  - name: empty_string_double_star
    in:
      s: ""
      p: "**"
    out: true
  - name: empty_string_question
    in:
      s: ""
      p: "?"
    out: false
  - name: empty_pattern_nonempty_string
    in:
      s: a
      p: ""
    out: false
  - name: exact_literal_match
    in:
      s: abc
      p: abc
    out: true
  - name: exact_literal_mismatch
    in:
      s: abc
      p: abd
    out: false
  - name: single_question_match
    in:
      s: a
      p: "?"
    out: true
  - name: single_question_mismatch_length
    in:
      s: ab
      p: "?"
    out: false
  - name: star_matches_many
    in:
      s: abcdef
      p: "a*"
    out: true
  - name: star_matches_none
    in:
      s: a
      p: "a*"
    out: true
  - name: star_in_middle
    in:
      s: abcdef
      p: "ab*ef"
    out: true
  - name: star_in_middle_fail
    in:
      s: abcdef
      p: "ab*eg"
    out: false
  - name: question_and_star
    in:
      s: abcde
      p: "a?c*e"
    out: true
  - name: question_and_star_fail
    in:
      s: abcde
      p: "a?d*e"
    out: false
  - name: leading_star
    in:
      s: abcde
      p: "*cde"
    out: true
  - name: trailing_star
    in:
      s: abcde
      p: "abc*"
    out: true
  - name: multiple_stars_collapse
    in:
      s: abcde
      p: "a**b***cde"
    out: true
  - name: multiple_stars_collapse_fail
    in:
      s: abcde
      p: "a**b***cdf"
    out: false
  - name: alternating_wildcards_true
    in:
      s: axbycz
      p: "a?*?*z"
    out: true
  - name: alternating_wildcards_false
    in:
      s: axbycz
      p: "a?*?*y"
    out: false
  - name: all_questions_exact_length
    in:
      s: abcdef
      p: "??????"
    out: true
  - name: all_questions_too_short
    in:
      s: abcdef
      p: "?????"
    out: false
  - name: star_only_nonempty
    in:
      s: zzzzz
      p: "*"
    out: true
  - name: star_then_literal_prefix
    in:
      s: zzzabc
      p: "*abc"
    out: true
  - name: star_then_literal_suffix_fail
    in:
      s: zzzabc
      p: "*abd"
    out: false
  - name: many_small_segments
    in:
      s: mississippi
      p: "m*is*is*ip*i"
    out: true
  - name: many_small_segments_fail
    in:
      s: mississippi
      p: "m*is*is*ip*iz"
    out: false
  - name: prefix_suffix_with_question
    in:
      s: openleetcode
      p: "o?en*code"
    out: true
  - name: prefix_suffix_with_question_true
    in:
      s: openleetcode
      p: "o?en*codee"
    out: false
  - name: long_all_literal_match
    in:
      s: 
      p: 
    out: true
  - name: long_all_literal_mismatch
    in:
      s: 
      p: 
    out: false
  - name: long_star_middle_true
    in:
      s: 
      p: abcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyz*
    out: true
  - name: long_star_middle_false
    in:
      s: 
      p: abcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyzabcdefghijklmnopqrstuvwxyz*
    out: false
  - name: long_questions_true
    in:
      s: 
      p: "????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????"
    out: false
  - name: long_questions_false
    in:
      s: 
      p: "???????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????????"
    out: false
  - name: long_many_stars_true
    in:
      s: 
      p: "*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*a*"
    out: true
