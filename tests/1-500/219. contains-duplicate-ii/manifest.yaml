entry:
  id: 219
  title: contains-duplicate-ii
  params:
    nums:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: Solution().containsNearbyDuplicate({nums}, {k})
    rust: Solution::contains_nearby_duplicate({nums}, {k})
    python3: Solution().containsNearbyDuplicate({nums}, {k})
    python2: Solution().containsNearbyDuplicate({nums}, {k})
    ruby: contains_nearby_duplicate({nums}, {k})
    java: new Solution().containsNearbyDuplicate({nums}, {k})
    csharp: new Solution().ContainsNearbyDuplicate({nums}, {k})
    kotlin: Solution().containsNearbyDuplicate({nums}, {k})
    go: containsNearbyDuplicate({nums}, {k})
    dart: Solution().containsNearbyDuplicate({nums}, {k})
    swift: Solution().containsNearbyDuplicate({nums}, {k})
    typescript: containsNearbyDuplicate({nums}, {k})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().containsNearbyDuplicate(nums, k, {result})
    checker: |
      class Checker:
          def containsNearbyDuplicate(self, nums, k, result):
              if not isinstance(result, bool):
                  return False

              window_set = set()
              for i, value in enumerate(nums):
                  if i > k:
                      window_set.remove(nums[i - k - 1])
                  if value in window_set:
                      return result is True
                  window_set.add(value)

              return result is False
seed: 219
