entry:
  id: 9
  title: palindrome-number
  params:
    x:
      type: int
  call:
    cpp: Solution().isPalindrome({x})
    rust: Solution::is_palindrome({x})
    python3: Solution().isPalindrome({x})
    python2: Solution().isPalindrome({x})
    ruby: is_palindrome({x})
    java: new Solution().isPalindrome({x})
    csharp: new Solution().IsPalindrome({x})
    kotlin: Solution().isPalindrome({x})
    go: isPalindrome({x})
    dart: Solution().isPalindrome({x})
    swift: Solution().isPalindrome({x})
    typescript: isPalindrome({x})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().isPalindrome(x, {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, result):\n        if\
      \ isinstance(result, str):\n            try:\n                result = json.loads(result)\n\
      \            except Exception:\n                pass\n            if isinstance(result,\
      \ str):\n                low = result.strip().lower()\n                if low\
      \ == 'true':\n                    return True\n                if low == 'false':\n\
      \                    return False\n                if low.lstrip('-').isdigit():\n\
      \                    return int(low)\n        return result\n\n    def isPalindrome(self,\
      \ x, result):\n        result = self._norm(result)\n        s = str(x)\n   \
      \     return (s == s[::-1]) == result\n"
seed: 42
tests:
  - name: Example 1
    in:
      x: 121
    out: true
  - name: Example 2
    in:
      x: -121
    out: false
  - name: Example 3
    in:
      x: 10
    out: false
  - name: Zero
    in:
      x: 0
    out: true
  - name: Single positive digit
    in:
      x: 7
    out: true
  - name: Negative single digit
    in:
      x: -5
    out: false
  - name: Boundary positive max
    in:
      x: 2147483647
    out: false
  - name: Boundary negative min
    in:
      x: -2147483648
    out: false
  - name: Large palindrome
    in:
      x: 123454321
    out: true
  - name: Large non-palindrome
    in:
      x: 123456789
    out: false
  - name: Multiple of 10 not zero
