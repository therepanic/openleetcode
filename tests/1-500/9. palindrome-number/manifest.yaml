entry:
  id: 9
  title: palindrome-number
  params:
    x:
      type: int
  call:
    cpp: "Solution().isPalindrome({x})"
    rust: "Solution::is_palindrome({x})"
    python3: "Solution().isPalindrome({x})"
    python2: "Solution().isPalindrome({x})"
    ruby: "is_palindrome({x})"
    java: "new Solution().isPalindrome({x})"
    csharp: "new Solution().IsPalindrome({x})"
    kotlin: "Solution().isPalindrome({x})"
    go: "isPalindrome({x})"
    dart: "Solution().isPalindrome({x})"
    swift: "Solution().isPalindrome({x})"
    typescript: "isPalindrome({x})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().isPalindrome(x, {result})"
    checker: |
      class Checker:
          def isPalindrome(self, x, result):
              if not isinstance(result, bool):
                  return False
              if x < 0:
                  expected = False
              else:
                  num = x
                  rev = 0
                  while num != 0:
                      rev = rev * 10 + num % 10
                      num //= 10
                  expected = rev == x
              return result == expected
seed: 9
tests:
  - name: Example 1
    in:
      x: 121
    out: true
  - name: Example 2
    in:
      x: -121
    out: false
  - name: Example 3
