judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(n, {result})"
    checker: |
      class Checker:
          def check(self, n, result):
              if not isinstance(n, int):
                  return False
              if not isinstance(result, int):
                  return False
              if n < 2 or n > 58:
                  return False
              if n == 2:
                  expected = 1
              elif n == 3:
                  expected = 2
              else:
                  threes = n // 3
                  remainder = n % 3
                  if remainder == 1:
                      threes -= 1
                      remainder = 4
                  elif remainder == 0:
                      remainder = 1
                  expected = (3 ** threes) * remainder
              return result == expected
