      "import json\nclass Checker:\n    def mySqrt(self, x, result):\n  \
      \      try:\n            result = json.loads(result) if isinstance(result, str)\
      \ else result\n        except Exception:\n            return False\n       \
      \ if result < 0: return False\n        if result * result > x: return False\n\
      \        if (result + 1) * (result + 1) <= x: return False\n        return True\n"
