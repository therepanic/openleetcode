judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(x, {result})"
    checker: |
      class Checker:
          def check(self, x, result):
              if not isinstance(result, int):
                  return False
              if result < 0:
                  return False
              return result * result <= x < (result + 1) * (result + 1)
