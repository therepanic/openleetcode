limits:
  time_ms: 120000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(n, {result})"
    checker: |
      class Checker:
          def check(self, n, result):
              expected = {
                  1: 9,
                  2: 987,
                  3: 123,
                  4: 597,
                  5: 677,
                  6: 1218,
                  7: 877,
                  8: 475,
              }
              return result == expected.get(n)
