entry:
  id: 395
  title: longest-substring-with-at-least-k-repeating-characters
  params:
    s:
      type: string
    k:
      type: int
  call:
    cpp: "Solution().longestSubstring({s}, {k})"
    rust: "Solution::longestSubstring({s}, {k})"
    python3: "Solution().longestSubstring({s}, {k})"
    python2: "Solution().longestSubstring({s}, {k})"
    ruby: "longestSubstring({s}, {k})"
    java: "new Solution().longestSubstring({s}, {k})"
    csharp: "new Solution().longestSubstring({s}, {k})"
    kotlin: "Solution().longestSubstring({s}, {k})"
    go: "longestSubstring({s}, {k})"
    dart: "Solution().longestSubstring({s}, {k})"
    swift: "Solution().longestSubstring({s}, {k})"
    typescript: "longestSubstring({s}, {k})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().longestSubstring(s, k, {result})"
    checker: |
      class Checker:
          def longestSubstring(self, s, k, result):
              n = len(s)
              best = 0
              for i in range(n + 1):
                  freq = [0] * 26
                  for j in range(i, n):
                      idx = ord(s[j]) - ord('a')
                      freq[idx] += 1
                      ok = True
                      for count in freq:
                          if 0 < count < k:
                              ok = False
                              break
                      if ok:
                          best = max(best, j - i + 1)
              return result == best
seed: 395
