entry:
  id: 263
  title: ugly-number
  params:
    n:
      type: int
  call:
    cpp: "Solution().isUgly({n})"
    rust: "Solution::is_ugly({n})"
    python3: "Solution().isUgly({n})"
    python2: "Solution().isUgly({n})"
    ruby: "is_ugly({n})"
    java: "new Solution().isUgly({n})"
    csharp: "new Solution().IsUgly({n})"
    kotlin: "Solution().isUgly({n})"
    go: "isUgly({n})"
    dart: "Solution().isUgly({n})"
    swift: "Solution().isUgly({n})"
    typescript: "isUgly({n})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().isUgly(n, {result})"
    checker: |
      class Checker:
          def isUgly(self, n, result):
              if not isinstance(n, int) or isinstance(n, bool):
                  return False
              if not isinstance(result, bool):
                  return False
              expected = self._is_ugly(n)
              return result == expected

          def _is_ugly(self, n):
              if n <= 0:
                  return False
              for p in (2, 3, 5):
                  while n % p == 0:
                      n //= p
              return n == 1
seed: 263
