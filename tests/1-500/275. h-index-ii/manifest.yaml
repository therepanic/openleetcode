entry:
  id: 275
  title: h-index-ii
  params:
    citations:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().hIndex({citations})"
    rust: "Solution::h_index({citations})"
    python3: "Solution().hIndex({citations})"
    python2: "Solution().hIndex({citations})"
    ruby: "h_index({citations})"
    java: "new Solution().hIndex({citations})"
    csharp: "new Solution().HIndex({citations})"
    kotlin: "Solution().hIndex({citations})"
    go: "hIndex({citations})"
    dart: "Solution().hIndex({citations})"
    swift: "Solution().hIndex({citations})"
    typescript: "hIndex({citations})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().hIndex(citations, {result})"
    checker: |
      class Checker:
          def hIndex(self, citations, result):
              if not isinstance(result, int):
                  return False
              n = len(citations)
              if result < 0 or result > n:
                  return False
              if any(citations[i] > citations[i + 1] for i in range(n - 1)):
                  return False
              cnt = sum(1 for c in citations if c >= result)
              if cnt < result:
                  return False
              if result < n and sum(1 for c in citations if c >= result + 1) >= result + 1:
                  return False
              return True
seed: 275
