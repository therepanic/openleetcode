"entry":
  "id": 86
  "title": "partition-list"
  "call":
    "cpp": "listNodeToArray(Solution().partition({head}, {x}))"
    "rust": "ListNode::list_node_to_array(Solution::partition({head}, {x}))"
    "python3": "list_node_to_array(Solution().partition({head}, {x}))"
    "python2": "list_node_to_array(Solution().partition({head}, {x}))"
    "ruby": "list_node_to_array(partition({head}, {x}))"
    "java": "ListNode.listNodeToArray(new Solution().partition({head}, {x}))"
    "csharp": "ListNode.ListNodeToArray(new Solution().Partition({head}, {x}))"
    "kotlin": "listNodeToArray(Solution().partition({head}, {x}))"
    "go": "listNodeToArray(partition({head}, {x}))"
    "dart": "list_node_to_array(Solution().partition({head}, {x}))"
    "swift": "list_node_to_array(Solution().partition({head}, {x}))"
    "typescript": "listNodeToArray(partition({head}, {x}))"
  params:
    head:
      type: list_node
    x:
      type: int
"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().check(head, x, {result})"
    "checker":
      "class Checker:\n    def check(self, head, x, result):\n        small = [v for v in head if v < x]\n      \
      \  large = [v for v in head if v >= x]\n        return result == (small + large)\n"
"seed": 42
