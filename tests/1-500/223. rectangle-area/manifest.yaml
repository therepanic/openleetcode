judge:
  type: exact

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().computeArea(ax1, ay1, ax2, ay2, bx1, by1, bx2, by2, result)"
    checker: |
      class Checker:
          def computeArea(self, ax1, ay1, ax2, ay2, bx1, by1, bx2, by2, result):
              area1 = (ax2 - ax1) * (ay2 - ay1)
              area2 = (bx2 - bx1) * (by2 - by1)
              overlap_width = max(0, min(ax2, bx2) - max(ax1, bx1))
              overlap_height = max(0, min(ay2, by2) - max(ay1, by1))
              expected = area1 + area2 - overlap_width * overlap_height
              return result == expected

