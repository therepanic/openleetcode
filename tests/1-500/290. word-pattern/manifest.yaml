entry:
  id: 290
  title: "word-pattern"
  params:
    pattern:
      type: string
    s:
      type: string
  call:
    cpp: "Solution().wordPattern({pattern}, {s})"
    rust: "Solution::word_pattern({pattern}, {s})"
    python3: "Solution().wordPattern({pattern}, {s})"
    python2: "Solution().wordPattern({pattern}, {s})"
    ruby: "word_pattern({pattern}, {s})"
    java: "new Solution().wordPattern({pattern}, {s})"
    csharp: "new Solution().WordPattern({pattern}, {s})"
    kotlin: "Solution().wordPattern({pattern}, {s})"
    go: "wordPattern({pattern}, {s})"
    dart: "Solution().wordPattern({pattern}, {s})"
    swift: "Solution().wordPattern({pattern}, {s})"
    typescript: "wordPattern({pattern}, {s})"
judge:
  type: "exact"
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: "Checker().wordPattern(pattern, s, {result})"
    checker: |
      class Checker:
          def wordPattern(self, pattern, s, result):
              return isinstance(result, bool)
seed: 290
tests:
  - name: "example_true"
    in:
      pattern: "abba"
      s: "dog cat cat dog"
    out: true
  - name: "example_false_word_reuse"
    in:
      pattern: "abba"
      s: "dog cat cat fish"
    out: false
  - name: "example_false_length"
    in:
      pattern: "aaaa"
      s: "dog cat cat dog"
    out: false
  - name: "single_match"
    in:
      pattern: "a"
      s: "z"
    out: true
  - name: "single_mismatch"
    in:
      pattern: "a"
      s: "z y"
    out: false
  - name: "two_unique"
    in:
      pattern: "ab"
      s: "one two"
    out: true
  - name: "two_same_word"
    in:
      pattern: "ab"
      s: "one one"
    out: false
  - name: "two_same_pattern"
    in:
      pattern: "aa"
      s: "one two"
    out: false
  - name: "repeated_bijection_valid"
    in:
      pattern: "abcabc"
      s: "red blue green red blue green"
    out: true
  - name: "repeated_bijection_invalid_word"
    in:
      pattern: "abcabc"
      s: "red blue green red blue yellow"
    out: false
  - name: "repeated_bijection_invalid_pattern"
    in:
      pattern: "abcabc"
      s: "red blue green red red green"
    out: false
  - name: "alternating_valid"
    in:
      pattern: "abab"
      s: "dog cat dog cat"
    out: true
  - name: "alternating_invalid_overlap"
    in:
      pattern: "abab"
      s: "dog cat dog dog"
    out: false
  - name: "all_unique_valid"
    in:
      pattern: "abcd"
      s: "a b c d"
    out: true
  - name: "all_unique_invalid_repeat_word"
    in:
      pattern: "abcd"
      s: "a b c a"
    out: false
  - name: "all_same_pattern_valid"
    in:
      pattern: "aaaa"
      s: "same same same same"
    out: true
  - name: "all_same_pattern_invalid_distinct_words"
    in:
      pattern: "aaaa"
      s: "same same same different"
    out: false
  - name: "pattern_more_chars"
    in:
      pattern: "abcde"
      s: "one two three four"
    out: false
  - name: "words_more_items"
    in:
      pattern: "ab"
      s: "one two three"
    out: false
  - name: "case_sensitive_words"
    in:
      pattern: "ab"
      s: "Dog dog"
    out: true
  - name: "case_sensitive_pattern"
    in:
      pattern: "Aa"
      s: "one one"
    out: false
  - name: "symbols_as_words"
    in:
      pattern: "abca"
      s: "x1 x2 x3 x1"
    out: true
  - name: "symbols_as_words_invalid"
    in:
      pattern: "abca"
      s: "x1 x2 x3 x2"
    out: false
  - name: "longer_pattern_valid"
    in:
      pattern: "xyzxyz"
      s: "alpha beta gamma alpha beta gamma"
    out: true
  - name: "longer_pattern_invalid"
    in:
      pattern: "xyzxyz"
      s: "alpha beta gamma alpha beta delta"
    out: false
  - name: "many_repeated_words_invalid"
    in:
      pattern: "abcdef"
      s: "q q q q q q"
    out: false
  - name: "many_repeated_pattern_valid"
    in:
      pattern: "zzzzzz"
      s: "q q q q q q"
    out: true
  - name: "prefix_collision_invalid"
    in:
      pattern: "abca"
      s: "dog dog cat dog"
    out: false
  - name: "near_miss_length_valid"
    in:
      pattern: "abc"
      s: "one two three"
    out: true
  - name: "near_miss_length_invalid"
    in:
      pattern: "abc"
      s: "one two"
    out: false
  - name: "mixed_reuse_valid"
    in:
      pattern: "paper"
      s: "title apple title title apple"
    out: false
  - name: "mixed_reuse_false_bijection"
    in:
      pattern: "paper"
      s: "title apple title title title"
    out: false
  - name: "classic_valid_2"
    in:
      pattern: "abc"
      s: "dog cat fish"
    out: true
  - name: "classic_invalid_word_alias"
    in:
      pattern: "abc"
      s: "dog cat dog"
    out: false
  - name: "valid_long_repetition"
    in:
      pattern: "ababab"
      s: "red blue red blue red blue"
    out: true
  - name: "invalid_long_repetition"
    in:
      pattern: "ababab"
      s: "red blue red blue red green"
    out: false
