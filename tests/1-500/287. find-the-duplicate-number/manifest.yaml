entry:
  id: 287
  title: "find-the-duplicate-number"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().findDuplicate({nums})"
    rust: "Solution::find_duplicate({nums})"
    python3: "Solution().findDuplicate({nums})"
    python2: "Solution().findDuplicate({nums})"
    ruby: "find_duplicate({nums})"
    java: "new Solution().findDuplicate({nums})"
    csharp: "new Solution().FindDuplicate({nums})"
    kotlin: "Solution().findDuplicate({nums})"
    go: "findDuplicate({nums})"
    dart: "Solution().findDuplicate({nums})"
    swift: "Solution().findDuplicate({nums})"
    typescript: "findDuplicate({nums})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().check(nums, {result})"
    checker: |
      from typing import Any, List

      class Checker:
          def check(self, nums: List[int], result: Any) -> bool:
              if not isinstance(result, int):
                  return False
              n = len(nums) - 1
              if len(nums) < 2:
                  return False
              if any(not isinstance(x, int) for x in nums):
                  return False
              if any(x < 1 or x > n for x in nums):
                  return False
              counts = {}
              for x in nums:
                  counts[x] = counts.get(x, 0) + 1
              duplicates = [x for x, c in counts.items() if c > 1]
              if len(duplicates) != 1:
                  return False
              return result == duplicates[0]

seed: 287287

