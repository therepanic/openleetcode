entry:
  id: 71
  title: simplify-path
  params:
    path:
      type: string
  call:
    cpp: "Solution().simplifyPath({path})"
    rust: "Solution::simplify_path({path})"
    python3: "Solution().simplifyPath({path})"
    python2: "Solution().simplifyPath({path})"
    ruby: "simplify_path({path})"
    java: "new Solution().simplifyPath({path})"
    csharp: "new Solution().SimplifyPath({path})"
    kotlin: "Solution().simplifyPath({path})"
    go: "simplifyPath({path})"
    dart: "Solution().simplifyPath({path})"
    swift: "Solution().simplifyPath({path})"
    typescript: "simplifyPath({path})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().simplifyPath(path, {result})"
    checker: |
      class Checker:
          def simplifyPath(self, path, result):
              return isinstance(result, str) and result.startswith("/")
seed: 71
tests:
  - name: example_1
    in:
      path: "/home/"
    out: "/home"
  - name: example_2
    in:
      path: "/home//foo/"
    out: "/home/foo"
  - name: example_3
    in:
      path: "/home/user/Documents/../Pictures"
    out: "/home/user/Pictures"
  - name: example_4
    in:
      path: "/../"
    out: "/"
  - name: example_5
    in:
      path: "/.../a/../b/c/../d/./"
    out: "/.../b/d"
  - name: root_only
    in:
      path: "/"
    out: "/"
  - name: single_dot_segments
    in:
      path: "/./././"
    out: "/"
  - name: double_dot_segments
    in:
      path: "/a/b/c/../../"
    out: "/a"
  - name: consecutive_slashes
    in:
      path: "/a//b////c/d//././/.."
    out: "/a/b/c"
  - name: leading_parent_clamped
    in:
      path: "/../../../../x"
    out: "/x"
  - name: dots_are_names
    in:
      path: "/.../..../....."
    out: "/.../..../....."
  - name: mixed_parent_and_names
    in:
      path: "/a/.../b/../c"
    out: "/a/.../c"
  - name: underscore_and_digits
    in:
      path: "/_1/2_3/./4../.."
    out: "/_1/2_3"
  - name: trailing_cleanup
    in:
      path: "/a/b/c/."
    out: "/a/b/c"
  - name: deep_backtrack_to_root
    in:
      path: "/a/b/c/d/e/f/../../../../../"
    out: "/a"
  - name: repeated_empty_components
    in:
      path: "//////"
    out: "/"
  - name: file_like_name
    in:
      path: "/dir/file.txt"
    out: "/dir/file.txt"
  - name: name_with_many_dots
    in:
      path: "/a/..hidden/....hidden/.."
    out: "/a/..hidden"
  - name: mixed_empty_and_parent
    in:
      path: "/a//./b/../c//"
    out: "/a/c"
  - name: parent_from_single_dir
    in:
      path: "/a/.."
    out: "/"
  - name: long_chain_1
    in:
      path: "/a/b/c/d/e/f/g/h/i/j"
    out: "/a/b/c/d/e/f/g/h/i/j"
  - name: long_chain_2
    in:
      path: "/a/b/c/../../x/y/z/../w"
    out: "/a/x/y/w"
  - name: repeated_parent_after_names
    in:
      path: "/usr/bin/../lib/./python3/../../share"
    out: "/usr/share"
  - name: mixed_valid_and_invalid_dots
    in:
      path: "/./.../../....//.//.."
    out: "/"
  - name: collapse_to_root
    in:
      path: "/a/../b/../c/../"
    out: "/"
  - name: many_segments
    in:
      path: "/a/b/../../../../c"
    out: "/c"
  - name: name_resembling_parent
    in:
      path: "/..a/../b"
    out: "/b"
  - name: leading_and_trailing_noise
    in:
      path: "//./.././../x/."
    out: "/x"
  - name: number_segments
    in:
      path: "/123/456/../789"
    out: "/123/789"
  - name: underscore_segments
    in:
      path: "/_/_/../__"
    out: "/_/__"
  - name: path_with_spreadout_parents
    in:
      path: "/a/../b/../c/../d"
    out: "/d"
  - name: dots_and_names_mix
    in:
      path: "/a.b/./c..d/../e..."
    out: "/a.b/e..."
  - name: many_slashes_and_names
    in:
      path: "/a////b////c////d"
    out: "/a/b/c/d"
  - name: backtrack_after_root_guard
    in:
      path: "/../x/../../y"
    out: "/y"
  - name: longish_flat_path
    in:
      path: "/alpha/beta/gamma/delta/epsilon"
    out: "/alpha/beta/gamma/delta/epsilon"
