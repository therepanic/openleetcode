entry:
  id: 71
  title: simplify-path
  call:
    cpp: Solution().simplifyPath({path})
    rust: Solution::simplify_path({path})
    python3: Solution().simplifyPath({path})
    python2: Solution().simplifyPath({path})
    ruby: simplify_path({path})
    java: new Solution().simplifyPath({path})
    csharp: new Solution().SimplifyPath({path})
    kotlin: Solution().simplifyPath({path})
    go: simplifyPath({path})
    dart: Solution().simplifyPath({path})
    swift: Solution().simplifyPath({path})
    typescript: simplifyPath({path})
  params:
    path:
      type: string
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: simplifyPath(path, {result})
    checker: |
      import json

      def simplifyPath(path, result):
          if isinstance(result, str):
              try:
                  result = json.loads(result)
              except Exception:
                  pass
          components = [c for c in path.split('/') if c and c != '.']
          st = []
          for comp in components:
              if comp == '..':
                  if st:
                      st.pop()
              else:
                  st.append(comp)
          return result == '/' + '/'.join(st)
seed: 42
tests:
  - name: Example 1
    in:
      path: /home/
  - name: Example 2
    in:
      path: /home//foo/
  - name: Example 3
    in:
      path: /home/user/Documents/../Pictures
  - name: Example 4
    in:
      path: /../
  - name: Example 5
    in:
      path: /.../a/../b/c/../d/./
  - name: Root
    in:
      path: /
  - name: Multiple dots
    in:
      path: /.../..../.....
  - name: Dots and parent
    in:
      path: /a/./b/../../c/
  - name: Redundant parent at root
    in:
      path: /../../../../
  - name: Complex mixture
    in:
      path: /a/b/c/.././././././
  - name: Very long name
    in:
      path: /abc/def/ghi/jkl/mno/pqr/stu/vwx/yzz
  - name: End with dots
    in:
      path: /a/b/..
  - name: Starts with dots
    in:
      path: /../a/b
  - name: Multiple slashes
    in:
      path: //////////////////a
  - name: Dot directory
    in:
      path: /a/./b/./c/./d/
  - name: Parent mix
    in:
      path: /a/..//b/..//c/../
  - name: Underscores and digits
    in:
      path: /a_1/b_2/c3/d4/../e5
  - name: Only dots
    in:
      path: /././././.
  - name: Deep nesting
    in:
      path: /a/b/c/d/e/f/g/h/i/j/k/l
  - name: Deep nesting with backtracks
    in:
      path: /a/b/c/d/e/../f/../g/../h
  - name: Leading dot
    in:
      path: ./a
  - name: Trailing dots
    in:
      path: /a/b...
  - name: Many consecutive slashes at end
    in:
      path: /a/b/////////
  - name: Large path 1
    in:
      path: /a/b/c/d/e/f/g/h/i/j/k/l/m/n/o/p/q/r/s/t/u/v/w/x/y/z/../
  - name: Large path 2
    in:
      path: /a/b/c/d/e/f/g/h/i/j/k/l/m/n/o/p/q/r/s/t/u/v/w/x/y/z/../../../../../../
