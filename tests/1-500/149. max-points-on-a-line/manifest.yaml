  memory_mb: 512
oracle:
  python3:
    call: "Checker().maxPoints(points, {result})"
    checker: |
      import copy

      from typing import List

      from collections import defaultdict
      from math import gcd


      class Solution:
          def maxPoints(self, points: List[List[int]]) -> int:
              n = len(points)
              if n <= 2:
                  return n

              best = 0
              for i in range(n):
                  slopes = defaultdict(int)
                  duplicates = 1
                  local_best = 0
                  x1, y1 = points[i]
                  for j in range(i + 1, n):
                      x2, y2 = points[j]
                      dx = x2 - x1
                      dy = y2 - y1
                      if dx == 0 and dy == 0:
                          duplicates += 1
                          continue
                      g = gcd(dx, dy)
                      dx //= g
                      dy //= g
                      if dx < 0:
                          dx = -dx
                          dy = -dy
                      elif dx == 0:
                          dy = 1
                      elif dy == 0:
                          dx = 1
                      slopes[(dx, dy)] += 1
                      local_best = max(local_best, slopes[(dx, dy)])
                  best = max(best, local_best + duplicates)
              return best

      def array_to_list_node_local(values):
          dummy = ListNode(0)
          tail = dummy
          for value in values:
              tail.next = ListNode(value)
              tail = tail.next
          return dummy.next

      def array_to_tree_node_local(values):
          if not values:
              return None
          root = TreeNode(values[0])
          queue = deque([root])
          index = 1
          while queue and index < len(values):
              node = queue.popleft()
              if index < len(values) and values[index] is not None:
                  node.left = TreeNode(values[index])
                  queue.append(node.left)
              index += 1
              if index < len(values) and values[index] is not None:
                  node.right = TreeNode(values[index])
                  queue.append(node.right)
              index += 1
          return root

      def list_node_to_array_local(node):
          out = []
          seen = 0
          while node is not None and seen < 100000:
              out.append(node.val)
              node = node.next
              seen += 1
          return out

      def tree_node_to_array_local(root):
          if root is None:
              return []
          out = []
          q = deque([root])
          while q:
              node = q.popleft()
              if node is None:
                  out.append(None)
                  continue
              out.append(node.val)
              q.append(node.left)
              q.append(node.right)
          while out and out[-1] is None:
              out.pop()
          return out

      def deep_sort(value):
          if isinstance(value, list):
              normalized = [deep_sort(item) for item in value]
              return sorted(normalized, key=lambda item: json.dumps(item, sort_keys=True))
          if isinstance(value, dict):
              return {key: deep_sort(val) for key, val in sorted(value.items())}
          return value

      def normalize_expected(value):
          kind = "int"
          if kind == "list_node":
              return list_node_to_array_local(value)
          if kind == "tree_node":
              return tree_node_to_array_local(value)
          return value

      def normalize_actual(value):
          return value

      def prepare_input(value, kind):
          if kind == "tree_node":
              return array_to_tree_node_local(value)
          if kind == "list_node":
              return array_to_list_node_local(value)
          return copy.deepcopy(value)

      class Checker:
          def maxPoints(self, points, result):
              prepared_points = prepare_input(points, "array[array[int]]")
              expected = Solution().maxPoints(prepared_points)
              expected = normalize_expected(expected)
              actual = normalize_actual(result)
              return deep_sort(expected) == deep_sort(actual)
