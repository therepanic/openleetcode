entry:
  id: 149
  title: max-points-on-a-line
  params:
    points:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().maxPoints({points})
    rust: Solution::max_points({points})
    python3: Solution().maxPoints({points})
    python2: Solution().maxPoints({points})
    ruby: max_points({points})
    java: new Solution().maxPoints({points})
    csharp: new Solution().MaxPoints({points})
    kotlin: Solution().maxPoints({points})
    go: maxPoints({points})
    dart: Solution().maxPoints({points})
    swift: Solution().maxPoints({points})
    typescript: maxPoints({points})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().maxPoints(points, {result})
    checker:
      "from collections import defaultdict\nfrom math import gcd\n\nclass Checker:\n    def maxPoints(self, points, result):\n        n = len(points)\n        if n <= 2:\n            return result == n\n\n        best = 0\n        for i in range(n):\n            slopes = defaultdict(int)\n            duplicates = 1\n            local_best = 0\n            x1, y1 = points[i]\n            for j in range(i + 1, n):\n                x2, y2 = points[j]\n                dx = x2 - x1\n                dy = y2 - y1\n                if dx == 0 and dy == 0:\n                    duplicates += 1\n                    continue\n                g = gcd(dx, dy)\n                dx //= g\n                dy //= g\n                if dx < 0:\n                    dx = -dx\n                    dy = -dy\n                elif dx == 0:\n                    dy = 1\n                elif dy == 0:\n                    dx = 1\n                slopes[(dx, dy)] += 1\n                local_best = max(local_best,\
      \ slopes[(dx, dy)])\n            best = max(best, local_best + duplicates)\n        return result == best\n"
seed: 149
