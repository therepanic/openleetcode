entry:
  id: 201
  title: bitwise-and-of-numbers-range
  params:
    left:
      type: int
    right:
      type: int
  call:
    cpp: Solution().rangeBitwiseAnd({left}, {right})
    rust: Solution::range_bitwise_and({left}, {right})
    python3: Solution().rangeBitwiseAnd({left}, {right})
    python2: Solution().rangeBitwiseAnd({left}, {right})
    ruby: range_bitwise_and({left}, {right})
    java: new Solution().rangeBitwiseAnd({left}, {right})
    csharp: new Solution().RangeBitwiseAnd({left}, {right})
    kotlin: Solution().rangeBitwiseAnd({left}, {right})
    go: rangeBitwiseAnd({left}, {right})
    dart: Solution().rangeBitwiseAnd({left}, {right})
    swift: Solution().rangeBitwiseAnd({left}, {right})
    typescript: rangeBitwiseAnd({left}, {right})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().rangeBitwiseAnd(left, right, result)
    checker: |
      class Checker:
          def rangeBitwiseAnd(self, left, right, result):
              shift = 0
              expected_left = left
              expected_right = right
              while expected_left < expected_right:
                  expected_left >>= 1
                  expected_right >>= 1
                  shift += 1
              expected = expected_left << shift
              return expected == result
seed: 201
