entry:
  id: 51
  title: n-queens
  params:
    n:
      type: int
  call:
    cpp: "Solution().solveNQueens({n})"
    rust: "Solution::solve_n_queens({n})"
    python3: "Solution().solveNQueens({n})"
    python2: "Solution().solveNQueens({n})"
    ruby: "solve_n_queens({n})"
    java: "new Solution().solveNQueens({n})"
    csharp: "new Solution().SolveNQueens({n})"
    kotlin: "Solution().solveNQueens({n})"
    go: "solveNQueens({n})"
    dart: "Solution().solveNQueens({n})"
    swift: "Solution().solveNQueens({n})"
    typescript: "solveNQueens({n})"
judge:
  type: ignore_order
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().solveNQueens(n, {result})"
    checker: |
      class Checker:
          def solveNQueens(self, n, result):
              if not isinstance(n, int):
                  return False
              if not isinstance(result, list):
                  return False

              expected = self._solve(n)
              actual = self._normalize(result, n)
              return actual is not None and actual == expected

          def _solve(self, n):
              res = []
              cols = [False] * n
              diag1 = [False] * (2 * n)
              diag2 = [False] * (2 * n)
              board = [["."] * n for _ in range(n)]

              def backtrack(row):
                  if row == n:
                      res.append(tuple("".join(r) for r in board))
                      return
                  for col in range(n):
                      d1 = row + col
                      d2 = row - col + n - 1
                      if cols[col] or diag1[d1] or diag2[d2]:
                          continue
                      cols[col] = diag1[d1] = diag2[d2] = True
                      board[row][col] = "Q"
                      backtrack(row + 1)
                      board[row][col] = "."
                      cols[col] = diag1[d1] = diag2[d2] = False

              backtrack(0)
              return tuple(sorted(res))

          def _normalize(self, result, n):
              normalized = []
              for board in result:
                  if not isinstance(board, list) or len(board) != n:
                      return None
                  rows = []
                  queen_count = 0
                  seen_cols = set()
                  diag1 = set()
                  diag2 = set()
                  for i, row in enumerate(board):
                      if not isinstance(row, str) or len(row) != n:
                          return None
                      if row.count("Q") != 1:
                          return None
                      j = row.index("Q")
                      if row[j] != "Q":
                          return None
                      queen_count += 1
                      if j in seen_cols or (i + j) in diag1 or (i - j) in diag2:
                          return None
                      seen_cols.add(j)
                      diag1.add(i + j)
                      diag2.add(i - j)
                      rows.append(row)
                  if queen_count != n:
                      return None
                  normalized.append(tuple(rows))
              return tuple(sorted(normalized))
seed: 51
