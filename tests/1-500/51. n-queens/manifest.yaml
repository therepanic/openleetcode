    "rust": "Solution::solve_n_queens({n})"
    "python3": "Solution().solveNQueens({n})"
    "python2": "Solution().solveNQueens({n})"
    "ruby": "solve_n_queens({n})"
    "java": "new Solution().solveNQueens({n})"
    "csharp": "new Solution().SolveNQueens({n})"
    "kotlin": "Solution().solveNQueens({n})"
    "go": "solveNQueens({n})"
    "dart": "Solution().solveNQueens({n})"
    "swift": "Solution().solveNQueens({n})"
    "typescript": "solveNQueens({n})"
"judge":
  "type": "ignore_order"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().check({n}, {result})"
    "checker":
      "import json\nclass Checker:\n  def check(self, n, result):\n    try:\n\
      \      result = json.loads(result) if isinstance(result, str) else result\n\
      \    except Exception:\n      return False\n    if not isinstance(result, list):\
      \ return False\n    if n == 1: return result == [[\"Q\"]]\n    if n < 4: return\
      \ result == []\n    seen = set()\n    for board in result:\n      if len(board)\
      \ != n or any(len(row) != n for row in board): return False\n      board_tuple\
      \ = tuple(board)\n      if board_tuple in seen: return False\n      seen.add(board_tuple)\n\
      \      queens = []\n      for r in range(n):\n        for c in range(n):\n \
      \         if board[r][c] == 'Q': queens.append((r, c))\n      if len(queens)\
      \ != n: return False\n      for i in range(n):\n        for j in range(i + 1,\
      \ n):\n          r1, c1 = queens[i]\n          r2, c2 = queens[j]\n        \
      \  if r1 == r2 or c1 == c2 or abs(r1 - r2) == abs(c1 - c2): return False\n \
      \   return True\n"
"seed": 42
"tests":
