entry:
  id: 85
  title: "maximal-rectangle"
  params:
    matrix:
      type: array
      items:
        type: array
        items:
          type: char
  call:
    cpp: "Solution().maximalRectangle({matrix})"
    rust: "Solution::maximal_rectangle({matrix})"
    python3: "Solution().maximalRectangle({matrix})"
    python2: "Solution().maximalRectangle({matrix})"
    ruby: "maximal_rectangle({matrix})"
    java: "new Solution().maximalRectangle({matrix})"
    csharp: "new Solution().MaximalRectangle({matrix})"
    kotlin: "Solution().maximalRectangle({matrix})"
    go: "maximalRectangle({matrix})"
    dart: "Solution().maximalRectangle({matrix})"
    swift: "Solution().maximalRectangle({matrix})"
    typescript: "maximalRectangle({matrix})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().maximalRectangle(matrix, {result})"
    checker: |
      class Checker:
          def maximalRectangle(self, matrix, result):
              if isinstance(result, float) and result.is_integer():
                  result = int(result)
              if not isinstance(result, int):
                  return False

              rows = len(matrix)
              cols = len(matrix[0])

              heights = [0] * cols
              best = 0

              for row in matrix:
                  for c, ch in enumerate(row):
                      if ch == "1":
                          heights[c] += 1
                      else:
                          heights[c] = 0

                  stack = []
                  extended = heights + [0]

                  for i, h in enumerate(extended):
                      while stack and extended[stack[-1]] > h:
                          height = extended[stack.pop()]
                          left = stack[-1] if stack else -1
                          width = i - left - 1
                          best = max(best, height * width)
                      stack.append(i)

              return result == best

seed: 85085

