"entry":
  "id": 85
  "title": "maximal-rectangle"
  "call":
    "cpp": "Solution().maximalRectangle(lv(vector<vector<char>>{ {matrix} }))"
    "rust": "Solution::maximal_rectangle(vec![{matrix}])"
    "python3": "Solution().maximalRectangle([{matrix}])"
    "python2": "Solution().maximalRectangle([{matrix}])"
    "ruby": "maximal_rectangle([{matrix}])"
    "java": "new Solution().maximalRectangle(new char[][]{ {matrix} })"
    "csharp": "new Solution().MaximalRectangle(new char[][]{ {matrix} })"
    "kotlin": "Solution().maximalRectangle(arrayOf({matrix}))"
    "go": "maximalRectangle([][]byte{ {matrix} })"
    "dart": "Solution().maximalRectangle([{matrix}])"
    "swift": "Solution().maximalRectangle([{matrix}])"
    "typescript": "maximalRectangle([{matrix}])"
"judge":
  "type": "exact"
"limits":
  "time_ms": 2000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().run([{matrix}], {result})"
    "checker":
      "class Checker:\n    def run(self, matrix, result):\n        if not\
      \ matrix or not matrix[0]: return result == 0\n        M, N = len(matrix), len(matrix[0])\n\
      \        m = [[int(matrix[i][j]) for j in range(N)] for i in range(M)]\n   \
      \     ans = 0\n        for i in range(M):\n            for j in range(1, N):\n\
      \                if m[i][j] == 1: m[i][j] += m[i][j-1]\n        for i in range(M):\n\
      \            for j in range(N):\n                w = float('inf')\n        \
      \        for k in range(i, -1, -1):\n                    w = min(w, m[k][j])\n\
      \                    if w == 0: break\n                    ans = max(ans, w\
      \ * (i - k + 1))\n        return ans == result\n"
"seed": 42
