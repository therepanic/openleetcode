entry:
  id: 482
  title: license-key-formatting
  params:
    s:
      type: string
    k:
      type: int
  call:
    cpp: "Solution().licenseKeyFormatting({s}, {k})"
    rust: "Solution::license_key_formatting({s}, {k})"
    python3: "Solution().licenseKeyFormatting({s}, {k})"
    python2: "Solution().licenseKeyFormatting({s}, {k})"
    ruby: "license_key_formatting({s}, {k})"
    java: "new Solution().licenseKeyFormatting({s}, {k})"
    csharp: "new Solution().LicenseKeyFormatting({s}, {k})"
    kotlin: "Solution().licenseKeyFormatting({s}, {k})"
    go: "licenseKeyFormatting({s}, {k})"
    dart: "Solution().licenseKeyFormatting({s}, {k})"
    swift: "Solution().licenseKeyFormatting({s}, {k})"
    typescript: "licenseKeyFormatting({s}, {k})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().licenseKeyFormatting(s, k, {result})"
    checker: |
      class Checker:
          def licenseKeyFormatting(self, s, k, result):
              chars = [ch.upper() for ch in s if ch != '-']
              if not chars:
                  return False
              first = len(chars) % k
              parts = []
              idx = 0
              if first:
                  parts.append(''.join(chars[:first]))
                  idx = first
              while idx < len(chars):
                  parts.append(''.join(chars[idx:idx + k]))
                  idx += k
              return result == '-'.join(parts)
seed: 482
