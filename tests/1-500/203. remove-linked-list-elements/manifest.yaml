    java: "ListNode.listNodeToArray(new Solution().removeElements({head}, {val}))"
    csharp: "ListNode.ListNodeToArray(new Solution().RemoveElements({head}, {val}))"
    kotlin: "listNodeToArray(Solution().removeElements({head}, {val}))"
