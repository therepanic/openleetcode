judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().removeElements(head, val, {result})"
    checker: |
      class Checker:
          def removeElements(self, head, val, result):
              def to_array(node):
                  if isinstance(node, list):
                      return node
                  values = []
                  seen = 0
                  while node is not None:
                      if isinstance(node, dict):
                          node_val = node.get("val")
                          node = node.get("next")
                      else:
                          node_val = getattr(node, "val", None)
                          node = getattr(node, "next", None)
                      values.append(node_val)
                      seen += 1
                      if seen > 20000:
                          return None
                  return values

              if head is None:
                  expected = []
              else:
                  expected = [x for x in list(head) if x != val]

              actual = to_array(result)
              return actual == expected
