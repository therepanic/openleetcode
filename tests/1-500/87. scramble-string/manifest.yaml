"judge":
  "type": "exact"
"limits":
  "time_ms": 2000
  "memory_mb": 256
"oracle":
  "python3":
    "call": 'Checker().isScramble("{s1}", "{s2}", {result})'
    "checker":
      "class Checker:\n    def isScramble(self, s1, s2, result):\n      \
      \  def solve(a, b):\n            if a == b: return True\n            if sorted(a)\
      \ != sorted(b): return False\n            for i in range(1, len(a)):\n     \
      \           if (solve(a[:i], b[:i]) and solve(a[i:], b[i:])) or \\\n       \
      \            (solve(a[:i], b[-i:]) and solve(a[i:], b[:-i])):\n            \
      \        return True\n            return False\n        return solve(s1, s2)\
      \ == result\n"
"seed": 42
