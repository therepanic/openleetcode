entry:
  id: 87
  title: "scramble-string"
  params:
    s1:
      type: string
    s2:
      type: string
  call:
    cpp: "Solution().isScramble({s1}, {s2})"
    rust: "Solution::is_scramble({s1}, {s2})"
    python3: "Solution().isScramble({s1}, {s2})"
    python2: "Solution().isScramble({s1}, {s2})"
    ruby: "is_scramble({s1}, {s2})"
    java: "new Solution().isScramble({s1}, {s2})"
    csharp: "new Solution().IsScramble({s1}, {s2})"
    kotlin: "Solution().isScramble({s1}, {s2})"
    go: "isScramble({s1}, {s2})"
    dart: "Solution().isScramble({s1}, {s2})"
    swift: "Solution().isScramble({s1}, {s2})"
    typescript: "isScramble({s1}, {s2})"
judge:
  type: "exact"
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().isScramble(s1, s2, {result})"
    checker: |
      class Checker:
          def isScramble(self, s1, s2, result):
              return isinstance(result, bool)
seed: 87
tests:
  - name: example_1
    in:
      s1: "great"
      s2: "rgeat"
    out: true
  - name: example_2
    in:
      s1: "abcde"
      s2: "caebd"
    out: false
  - name: example_3
    in:
      s1: "a"
      s2: "a"
    out: true
  - name: equal
    in:
      s1: "abc"
      s2: "abc"
    out: true
  - name: swap_two
    in:
      s1: "ab"
      s2: "ba"
    out: true
  - name: anagram_false
    in:
      s1: "abcd"
      s2: "bdac"
    out: false
