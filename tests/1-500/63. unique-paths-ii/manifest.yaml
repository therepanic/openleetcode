judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().uniquePathsWithObstacles(obstacleGrid, {result})"
    checker: |
      class Checker:
          def uniquePathsWithObstacles(self, obstacleGrid, result):
              m = len(obstacleGrid)
              n = len(obstacleGrid[0])
              if obstacleGrid[0][0] == 1:
                  return result == 0
              dp = [[0] * n for _ in range(m)]
              dp[0][0] = 1
              for i in range(m):
                  for j in range(n):
                      if obstacleGrid[i][j] == 1:
                          dp[i][j] = 0
                      else:
                          if i > 0:
                              dp[i][j] += dp[i - 1][j]
                          if j > 0:
                              dp[i][j] += dp[i][j - 1]
              return result == dp[m - 1][n - 1]

seed: 63

