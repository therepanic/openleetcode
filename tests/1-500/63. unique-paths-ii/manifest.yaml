    python2: "Solution().uniquePathsWithObstacles({obstacleGrid})"
    ruby: "unique_paths_with_obstacles({obstacleGrid})"
    java: "new Solution().uniquePathsWithObstacles({obstacleGrid})"
    csharp: "new Solution().UniquePathsWithObstacles({obstacleGrid})"
    kotlin: "Solution().uniquePathsWithObstacles({obstacleGrid})"
    go: "uniquePathsWithObstacles({obstacleGrid})"
    dart: "Solution().uniquePathsWithObstacles({obstacleGrid})"
