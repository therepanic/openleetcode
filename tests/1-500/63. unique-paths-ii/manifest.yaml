"oracle":
  "python3":
    "call": "Checker().uniquePathsWithObstacles({grid}, {result})"
    "checker":
      "import json\nclass Checker:\n    def uniquePathsWithObstacles(self, grid, result):\n        try:\n       \
      \     result = json.loads(result) if isinstance(result, str) else result\n        except Exception:\n            return
      False\n        m, n = len(grid), len(grid[0])\n        dp = [[0] * n for _ in range(m)]\n        if grid[0][0] == 1:
      return result == 0\n        dp[0][0] = 1\n        for i in range(m):\n            for j in range(n):\n             \
      \   if grid[i][j] == 1: dp[i][j] = 0\n                else:\n                    if i > 0: dp[i][j] += dp[i-1][j]\n\
      \                    if j > 0: dp[i][j] += dp[i][j-1]\n        return result == dp[m-1][n-1]\n"
"seed": 42
