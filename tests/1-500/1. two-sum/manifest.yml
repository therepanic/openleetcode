entry:
  id: 1
  title: "two-sum"
  call:
    python3: "Solution().twoSum([{nums}], {target})"
    python: "Solution().twoSum([{nums}], {target})"
    ruby: "two_sum([{nums}], {target})"
    java: "new Solution().twoSum(new int[] { {nums} }, {target})"
    kotlin: "Solution().twoSum(intArrayOf({nums}), {target})"
    go: "twoSum([]int{ {nums} }, {target})"
    dart: "Solution().twoSum([{nums}], {target})"

judge:
  type: "ignore_order"

seed: 2000

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().twoSum([{nums}], {target}, {result})"
    checker: |
      import json
      from typing import List
      class Checker:
          def twoSum(self, nums: List[int], target: int, result: str) -> bool:
              indices = json.loads(result)
              if not isinstance(indices, list) or len(indices) != 2:
                  return False
              i, j = indices
              if i == j:
                  return False
              if not (0 <= i < len(nums) and 0 <= j < len(nums)):
                  return False
              return nums[i] + nums[j] == target

tests:
  - name: "ex1_basic"
    judge: { type: "ignore_order" }
    call:
      python3: "print(to_json(Solution().twoSum([{nums}], {target})))"
      python: "print(to_json(Solution().twoSum([{nums}], {target})))"
      ruby: "puts to_json(two_sum([{nums}], {target}))"
      java: "System.out.println(Json.toString(new Solution().twoSum(new int[] { {nums} }, {target})));"
      kotlin: "println(Json.toJson(Solution().twoSum(intArrayOf({nums}), {target})))"
      go: "fmt.Print(toJson(twoSum([]int{ {nums} }, {target})))"
    in: { nums: [2, 7, 11, 15], target: 9 }
    out: [0, 1]

  - name: "ex2_basic"
