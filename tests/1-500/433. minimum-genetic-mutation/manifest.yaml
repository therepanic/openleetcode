entry:
  id: 433
  title: minimum-genetic-mutation
  params:
    startGene:
      type: string
    endGene:
      type: string
    bank:
      type: array
      items:
        type: string
  call:
    cpp: Solution().minMutation({startGene}, {endGene}, {bank})
    rust: Solution::min_mutation({startGene}, {endGene}, {bank})
    python3: Solution().minMutation({startGene}, {endGene}, {bank})
    python2: Solution().minMutation({startGene}, {endGene}, {bank})
    ruby: min_mutation({startGene}, {endGene}, {bank})
    java: new Solution().minMutation({startGene}, {endGene}, {bank})
    csharp: new Solution().MinMutation({startGene}, {endGene}, {bank})
    kotlin: Solution().minMutation({startGene}, {endGene}, {bank})
    go: minMutation({startGene}, {endGene}, {bank})
    dart: Solution().minMutation({startGene}, {endGene}, {bank})
    swift: Solution().minMutation({startGene}, {endGene}, {bank})
    typescript: minMutation({startGene}, {endGene}, {bank})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().minMutation(startGene, endGene, {result})
    checker: |
      class Checker:
          def minMutation(self, startGene, endGene, result):
              return isinstance(result, int)
seed: 433
tests:
  - name: example-1
    in:
      startGene: AACCGGTT
      endGene: AACCGGTA
      bank:
        - AACCGGTA
    out: 1
  - name: example-2
    in:
      startGene: AACCGGTT
      endGene: AAACGGTA
      bank:
        - AACCGGTA
        - AACCGCTA
        - AAACGGTA
    out: 2
  - name: same-start-end-1
    in:
      startGene: AACCGGTT
      endGene: AACCGGTT
      bank: []
    out: 0
  - name: same-start-end-2
    in:
      startGene: AAAAAAAA
      endGene: AAAAAAAA
      bank:
        - CAAAAAAA
        - GAAAAAAA
    out: 0
  - name: direct-step-a
    in:
      startGene: AAAAACCC
      endGene: AAAACCCC
      bank:
        - AAAACCCC
    out: 1
  - name: direct-step-b
    in:
      startGene: CCGGTTAA
      endGene: CCGGTTAT
      bank:
        - CCGGTTAT
        - CCGGTTAA
    out: 1
  - name: two-step-chain-a
    in:
      startGene: AACCGGTT
      endGene: AACCGTTA
      bank:
        - AACCGGTA
        - AACCGTTA
    out: 2
  - name: two-step-chain-b
    in:
      startGene: AAAAACCC
      endGene: AAAACCCA
      bank:
        - AAAACCCC
        - AAAACCCA
    out: 2
  - name: three-step-chain-a
    in:
      startGene: AAAAACCC
      endGene: AACCCCCC
      bank:
        - AAAACCCC
        - AAACCCCC
        - AACCCCCC
    out: 3
  - name: three-step-chain-b
    in:
      startGene: AAAAAAAA
      endGene: TTTTAAAA
      bank:
        - TAAAAAAA
        - TTAAAAAA
        - TTTAAAAA
        - TTTTAAAA
    out: 4
  - name: not-in-bank-1
    in:
      startGene: AACCGGTT
      endGene: AACCGGTA
      bank: []
    out: -1
  - name: not-in-bank-2
    in:
      startGene: AACCGGTT
      endGene: AAACGGTA
      bank:
        - AACCGGTA
        - AACCGCTA
    out: -1
  - name: unreachable-1
    in:
      startGene: AAAAACCC
      endGene: AACCCCCC
      bank:
        - AAAACCCA
        - AAACCCCA
        - AACCCCCA
    out: -1
  - name: unreachable-2
    in:
      startGene: AAAAAAAA
      endGene: CCCCCCCC
      bank:
        - AAAAACCC
        - AAAACCCC
        - AAACCCCC
        - AACCCCCC
    out: -1
  - name: bank-has-end-but-no-path-1
    in:
      startGene: AAAAACCC
      endGene: AACCCCCC
      bank:
        - AAAACCCA
        - AAAACCAC
        - AACCCCCC
    out: -1
  - name: bank-has-end-but-no-path-2
    in:
      startGene: TTTTTTTT
      endGene: TTTTTTTA
      bank:
        - TTTTTTTA
        - TTTTTTAA
        - TTTTTAAA
    out: 1
  - name: branched-shortest-1
    in:
      startGene: AACCGGTT
      endGene: AAACGGTA
      bank:
        - AACCGGTA
        - AACCGCTA
        - AAACGGTA
        - AAACGGTA
    out: 2
  - name: branched-shortest-2
    in:
      startGene: AAAAAAAC
      endGene: CAAAAAAC
      bank:
        - CAAAAAAC
        - CAAAAAAT
        - CAAAAACT
        - GAAAAAAC
    out: 1
  - name: repeated-branching-1
    in:
      startGene: AAAAAAAA
      endGene: AAAAACCC
      bank:
        - AAAAAAAA
        - AAAAACAA
        - AAAAACCA
        - AAAAACCC
        - AAAAGAAA
        - AAAAGCAA
    out: 3
  - name: repeated-branching-2
    in:
      startGene: GGGGGGGG
      endGene: GGGGAAGG
      bank:
        - GGGGGGGA
        - GGGGGAGA
        - GGGGAAGA
        - GGGGAAGG
        - GGGGGAGG
    out: 2
  - name: one-mutation-away-but-end-missing-1
    in:
      startGene: ACGTACGT
      endGene: ACGTACGA
      bank:
        - ACGTACGG
        - ACGTACGC
    out: -1
  - name: one-mutation-away-but-end-missing-2
    in:
      startGene: TGCATGCA
      endGene: TGCATGCG
      bank:
        - TGCATGCC
        - TGCATGCT
    out: -1
  - name: small-bank-1
    in:
      startGene: AAAAACCC
      endGene: CAAACCCC
      bank:
        - AAAACCCC
        - CAAACCCC
    out: 2
  - name: small-bank-2
    in:
      startGene: AAAAACCC
      endGene: AAAAACCG
      bank:
        - AAAAACCG
    out: 1
  - name: detour-needed-1
    in:
      startGene: AAAAACCC
      endGene: AAACCCCA
      bank:
        - AAAACCCC
        - AAACCCCC
        - AAACCCCA
        - AAAACCCA
    out: 3
  - name: detour-needed-2
    in:
      startGene: AACCGGTT
      endGene: CACCGGTT
      bank:
        - CACCGGTT
        - AACCGGTA
        - AACCGCTA
    out: 1
  - name: isolated-end-1
    in:
      startGene: AACCGGTT
      endGene: TTTTTTTT
      bank:
        - AACCGGTA
        - AACCGCTA
        - AAACGGTA
        - TTTTTTTT
    out: -1
  - name: isolated-end-2
    in:
      startGene: CCCCCCCC
      endGene: CCCCCCCA
      bank:
        - CCCCCCCG
        - CCCCCCGG
        - CCCCCCAA
        - CCCCCCCA
    out: 1
  - name: no-bank-given
    in:
      startGene: GATTACAA
      endGene: GATTACAG
      bank: []
    out: -1
  - name: same-with-bank-1
    in:
      startGene: GATTACAA
      endGene: GATTACAA
      bank:
        - GATTACAG
        - GATTACAC
    out: 0
  - name: same-with-bank-2
    in:
      startGene: TTTTGGGG
      endGene: TTTTGGGG
      bank:
        - TTTTGGGA
        - TTTTGGGC
        - TTTTGGGT
    out: 0
  - name: longer-path-1
    in:
      startGene: AAAAAAAA
      endGene: AAAATTTT
      bank:
        - AAAATAAA
        - AAAATTAA
        - AAAATTTA
        - AAAATTTT
    out: 4
  - name: longer-path-2
    in:
      startGene: CCCCGGGG
      endGene: CCGGGGGG
      bank:
        - CCCGGGGG
        - CCGGGGGG
        - CCCCGGGA
        - CCCCGGGC
    out: 2
  - name: end-present-multiple-options-1
    in:
      startGene: AACCGGTT
      endGene: AACCGGTC
      bank:
        - AACCGGTC
        - AACCGGTA
        - AACCGGTT
        - AACCGGAT
    out: 1
  - name: end-present-multiple-options-2
    in:
      startGene: ACGTACGT
      endGene: ACGTTCGT
      bank:
        - ACGTTCGT
        - ACGTACGA
        - ACGTACGG
        - ACGTCCGT
    out: 1
  - name: path-with-decoy-1
    in:
      startGene: AAAAAAAC
      endGene: AAAAAACC
      bank:
        - AAAAAAAC
        - AAAAAACC
        - AAAAAAGC
        - AAAAAATC
    out: 1
  - name: path-with-decoy-2
    in:
      startGene: TTTAAAAA
      endGene: TTTCCCAA
      bank:
        - TTTCAAAA
        - TTTCCAAA
        - TTTCCCAA
        - TTTAAAAA
        - TTTCAAAT
    out: 3
