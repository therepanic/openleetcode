entry:
  id: 375
  title: "guess-number-higher-or-lower-ii"
  params:
    n:
      type: int
  call:
    cpp: "Solution().getMoneyAmount({n})"
    rust: "Solution::get_money_amount({n})"
    python3: "Solution().getMoneyAmount({n})"
    python2: "Solution().getMoneyAmount({n})"
    ruby: "get_money_amount({n})"
    java: "new Solution().getMoneyAmount({n})"
    csharp: "new Solution().GetMoneyAmount({n})"
    kotlin: "Solution().getMoneyAmount({n})"
    go: "getMoneyAmount({n})"
    dart: "Solution().getMoneyAmount({n})"
    swift: "Solution().getMoneyAmount({n})"
    typescript: "getMoneyAmount({n})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().check(n, {result})"
    checker: |
      class Checker:
          def check(self, n, result):
              if not isinstance(n, int) or not isinstance(result, int):
                  return False
              if n < 1:
                  return False
              dp = [[0] * (n + 1) for _ in range(n + 1)]
              for length in range(2, n + 1):
                  for start in range(n - length + 1, 0, -1):
                      end = start + length - 1
                      best = float("inf")
                      for pivot in range(start, end + 1):
                          left = dp[start][pivot - 1] if pivot > start else 0
                          right = dp[pivot + 1][end] if pivot < end else 0
                          best = min(best, pivot + max(left, right))
                      dp[start][end] = best
              return result == dp[1][n]
seed: 375
