entry:
  id: 226
  title: invert-binary-tree
  params:
    root:
      type: tree_node
  call:
    cpp: treeNodeToArray(Solution().invertTree({root}))
    rust: TreeNode::tree_node_to_array(Solution::invert_tree({root}))
    python3: tree_node_to_array(Solution().invertTree({root}))
    python2: tree_node_to_array(Solution().invertTree({root}))
    ruby: tree_node_to_array(invert_tree({root}))
    java: TreeNode.treeNodeToArray(new Solution().invertTree({root}))
    csharp: TreeNode.TreeNodeToArray(new Solution().InvertTree({root}))
    kotlin: treeNodeToArray(Solution().invertTree({root}))
    go: treeNodeToArray(invertTree({root}))
    dart: tree_node_to_array(Solution().invertTree({root}))
    swift: tree_node_to_array(Solution().invertTree({root}))
    typescript: treeNodeToArray(invertTree({root}))
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().invertTree(root, {result})
    checker:
      "class Checker:\n    def invertTree(self, root_arr, result):\n      \
      \  if not root_arr:\n            return result == []\n\n        nodes = [None\
      \ if v is None else [v, None, None] for v in root_arr]\n        if not nodes[0]:\n\
      \            return result == []\n\n        queue = [nodes[0]]\n        idx\
      \ = 1\n        for node in queue:\n            if idx < len(nodes):\n      \
      \          node[1] = nodes[idx]\n                idx += 1\n            if idx\
      \ < len(nodes):\n                node[2] = nodes[idx]\n                idx +=\
      \ 1\n            if node[1]:\n                queue.append(node[1])\n      \
      \      if node[2]:\n                queue.append(node[2])\n\n        def invert(node):\n\
      \            if not node:\n                return None\n            node[1],\
      \ node[2] = invert(node[2]), invert(node[1])\n            return node\n\n  \
      \      def serialize(node):\n            if not node:\n                return\
      \ []\n            out = []\n            queue = [node]\n            while queue:\n\
      \                cur = queue.pop(0)\n                if cur is None:\n     \
      \               out.append(None)\n                    continue\n           \
      \     out.append(cur[0])\n                queue.append(cur[1])\n           \
      \     queue.append(cur[2])\n            while out and out[-1] is None:\n   \
      \             out.pop()\n            return out\n\n        return serialize(invert(nodes[0]))\
      \ == result\n"
seed: 226
