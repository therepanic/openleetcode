entry:
  id: 94
  title: "binary-tree-inorder-traversal"
  params:
    root:
      type: tree_node
  call:
    cpp: "Solution().inorderTraversal({root})"
    rust: "Solution::inorder_traversal({root})"
    python3: "Solution().inorderTraversal({root})"
    python2: "Solution().inorderTraversal({root})"
    ruby: "inorderTraversal({root})"
    java: "new Solution().inorderTraversal({root})"
    csharp: "new Solution().InorderTraversal({root})"
    kotlin: "Solution().inorderTraversal({root})"
    go: "inorderTraversal({root})"
    dart: "Solution().inorderTraversal({root})"
    swift: "Solution().inorderTraversal({root})"
    typescript: "inorderTraversal({root})"
judge:
  type: "exact"
limits:
  time_ms: 200
  memory_mb: 256
oracle:
  python3:
    call: "Checker().inorderTraversal(root, {result})"
    checker: |
      class Checker:
          def inorderTraversal(self, root, result):
              ans = []
              def dfs(node):
                  if node is None:
                      return
                  dfs(node.left)
                  ans.append(node.val)
                  dfs(node.right)
              dfs(root)
              return ans == result
seed: 94
