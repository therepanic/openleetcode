"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().inorderTraversal([{root}], {result})"
    "checker":
      "import json\nclass Checker:\n  def inorderTraversal(self, root_arr,\
      \ result):\n      try:\n          result = json.loads(result) if isinstance(result,\
      \ str) else result\n      except Exception:\n          return False\n      def\
      \ get_inorder(arr, i):\n          if i >= len(arr) or arr[i] is None:\n    \
      \          return []\n          return get_inorder(arr, 2*i + 1) + [arr[i]]\
      \ + get_inorder(arr, 2*i + 2)\n      return get_inorder(root_arr, 0) == result\n"
"seed": 42
