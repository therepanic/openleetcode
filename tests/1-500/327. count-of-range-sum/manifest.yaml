entry:
  id: 327
  title: "count-of-range-sum"
  params:
    nums:
      type: array
      items:
        type: int
    lower:
      type: int
    upper:
      type: int
  call:
    cpp: "Solution().countRangeSum({nums}, {lower}, {upper})"
    rust: "Solution::count_range_sum({nums}, {lower}, {upper})"
    python3: "Solution().countRangeSum({nums}, {lower}, {upper})"
    python2: "Solution().countRangeSum({nums}, {lower}, {upper})"
    ruby: "count_range_sum({nums}, {lower}, {upper})"
    java: "new Solution().countRangeSum({nums}, {lower}, {upper})"
    csharp: "new Solution().CountRangeSum({nums}, {lower}, {upper})"
    kotlin: "Solution().countRangeSum({nums}, {lower}, {upper})"
    go: "countRangeSum({nums}, {lower}, {upper})"
    dart: "Solution().countRangeSum({nums}, {lower}, {upper})"
    swift: "Solution().countRangeSum({nums}, {lower}, {upper})"
    typescript: "countRangeSum({nums}, {lower}, {upper})"

judge:
  type: "exact"

limits:
  time_ms: 1500
  memory_mb: 256

oracle:
  python3:
    call: "Checker().check(nums, lower, upper, {result})"
    checker: |
      class Checker:
          def check(self, nums, lower, upper, result):
              if not isinstance(result, int):
                  return False
              if not isinstance(nums, list):
                  return False
              if not isinstance(lower, int) or not isinstance(upper, int):
                  return False
              if lower > upper:
                  return False

              prefix = [0]
              total = 0
              for x in nums:
                  if not isinstance(x, int):
                      return False
                  total += x
                  prefix.append(total)

              def sort_count(arr):
                  n = len(arr)
                  if n <= 1:
                      return arr, 0
                  mid = n // 2
                  left, left_count = sort_count(arr[:mid])
                  right, right_count = sort_count(arr[mid:])
                  count = left_count + right_count

                  lo = 0
                  hi = 0
                  for value in left:
                      while lo < len(right) and right[lo] - value < lower:
                          lo += 1
                      while hi < len(right) and right[hi] - value <= upper:
                          hi += 1
                      count += hi - lo

                  merged = []
                  i = 0
                  j = 0
                  while i < len(left) and j < len(right):
                      if left[i] <= right[j]:
                          merged.append(left[i])
                          i += 1
                      else:
                          merged.append(right[j])
                          j += 1
                  if i < len(left):
                      merged.extend(left[i:])
                  if j < len(right):
                      merged.extend(right[j:])
                  return merged, count

              expected = sort_count(prefix)[1]
              return result == expected

seed: 327

