  title: "majority-element"
  params:
    nums:
      type: "array"
      items:
        type: "int"
  call:
    cpp: "Solution().majorityElement({nums})"
    rust: "Solution::majority_element({nums})"
    python3: "Solution().majorityElement({nums})"
    python2: "Solution().majorityElement({nums})"
    ruby: "majority_element({nums})"
    java: "new Solution().majorityElement({nums})"
    csharp: "new Solution().MajorityElement({nums})"
    kotlin: "Solution().majorityElement({nums})"
    go: "majorityElement({nums})"
