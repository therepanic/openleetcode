"entry":
  "id": 34
  "title": "find-first-and-last-position-of-element-in-sorted-array"
  "call":
    "cpp": "Solution().searchRange({nums}, {target})"
    "rust": "Solution::search_range({nums}, {target})"
    "python3": "Solution().searchRange({nums}, {target})"
    "python2": "Solution().searchRange({nums}, {target})"
    "ruby": "search_range({nums}, {target})"
    "java": "new Solution().searchRange({nums}, {target})"
    "csharp": "new Solution().SearchRange({nums}, {target})"
    "kotlin": "Solution().searchRange({nums}, {target})"
    "go": "searchRange({nums}, {target})"
    "dart": "Solution().searchRange({nums}, {target})"
    "swift": "Solution().searchRange({nums}, {target})"
    "typescript": "searchRange({nums}, {target})"
  params:
    nums:
      type: array
      items:
        type: int
    target:
      type: int
"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().searchRange({nums}, {target}, {result})"
    "checker":
      "import json\n\nclass Checker:\n    def searchRange(self, nums, target, result):\n        first = -1\n    \
      \    last = -1\n        for i, val in enumerate(nums):\n            if val == target:\n                if first == -1:\n\
      \                    first = i\n                last = i\n        try:\n            got = json.loads(result) if isinstance(result,
      str) else result\n        except Exception:\n            return False\n        return got == [first, last]\n"
"seed": 42
