    rust: "Solution::get_max_repetitions({s1}, {n1}, {s2}, {n2})"
    python3: "Solution.countTheRepetitions({s1}, {n1}, {s2}, {n2})"
    python2: "Solution.countTheRepetitions({s1}, {n1}, {s2}, {n2})"
    ruby: "get_max_repetitions({s1}, {n1}, {s2}, {n2})"
    java: "new Solution().getMaxRepetitions({s1}, {n1}, {s2}, {n2})"
    csharp: "new Solution().GetMaxRepetitions({s1}, {n1}, {s2}, {n2})"
    kotlin: "Solution().getMaxRepetitions({s1}, {n1}, {s2}, {n2})"
    go: "getMaxRepetitions({s1}, {n1}, {s2}, {n2})"
    dart: "Solution().getMaxRepetitions({s1}, {n1}, {s2}, {n2})"
    swift: "Solution().getMaxRepetitions({s1}, {n1}, {s2}, {n2})"
    typescript: "getMaxRepetitions({s1}, {n1}, {s2}, {n2})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().countTheRepetitions(s1, n1, s2, n2, {result})"
    checker: |
      class Checker:
          def countTheRepetitions(self, s1, n1, s2, n2, result):
              def solve(S, n1, T, n2):
                  m, n = len(S), len(T)
                  if m * n1 < n * n2:
                      return 0
                  j = 0
                  cnt = 0
                  k = 0
                  seen = {}
                  while k < n1:
                      for ch in S:
                          if ch == T[j]:
                              j += 1
                              if j == n:
                                  cnt += 1
                                  j = 0
                      k += 1
                      if j in seen:
                          prev_cnt, prev_k = seen[j]
                          period_k = k - prev_k
                          period_cnt = cnt - prev_cnt
                          if period_cnt == 0:
                              break
                          remaining = n1 - k
                          cycles = remaining // period_k
                          cnt += cycles * period_cnt
                          k += cycles * period_k
                      else:
                          seen[j] = (cnt, k)
                  return cnt // n2

              return isinstance(result, int) and result == solve(s1, n1, s2, n2)

seed: 466

