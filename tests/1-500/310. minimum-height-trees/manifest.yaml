entry:
  id: 310
  title: "minimum-height-trees"
  params:
    n:
      type: int
    edges:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().findMinHeightTrees({n}, {edges})"
    rust: "Solution::find_min_height_trees({n}, {edges})"
    python3: "Solution().findMinHeightTrees({n}, {edges})"
    python2: "Solution().findMinHeightTrees({n}, {edges})"
    ruby: "find_min_height_trees({n}, {edges})"
    java: "new Solution().findMinHeightTrees({n}, {edges})"
    csharp: "new Solution().FindMinHeightTrees({n}, {edges})"
    kotlin: "Solution().findMinHeightTrees({n}, {edges})"
    go: "findMinHeightTrees({n}, {edges})"
    dart: "Solution().findMinHeightTrees({n}, {edges})"
    swift: "Solution().findMinHeightTrees({n}, {edges})"
    typescript: "findMinHeightTrees({n}, {edges})"

judge:
  type: "ignore_order"

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().check(n, edges, {result})"
    checker: |
      from collections import deque

      class Checker:
          def check(self, n, edges, result):
              if not isinstance(n, int) or n < 1:
                  return False
              if not isinstance(edges, list):
                  return False
              if not isinstance(result, list):
                  return False

              normalized = []
              seen = set()
              for x in result:
                  if not isinstance(x, int):
                      return False
                  if x < 0 or x >= n:
                      return False
                  if x in seen:
                      return False
                  seen.add(x)
                  normalized.append(x)

              if n == 1:
                  return normalized == [0] and edges == []

              graph = [[] for _ in range(n)]
              for edge in edges:
                  if not isinstance(edge, list) or len(edge) != 2:
                      return False
                  a, b = edge
                  if not isinstance(a, int) or not isinstance(b, int):
                      return False
                  if a < 0 or a >= n or b < 0 or b >= n or a == b:
                      return False
                  graph[a].append(b)
                  graph[b].append(a)

              leaves = deque(i for i in range(n) if len(graph[i]) <= 1)
              remaining = n
              while remaining > 2:
                  leaf_count = len(leaves)
                  remaining -= leaf_count
                  for _ in range(leaf_count):
                      leaf = leaves.popleft()
                      if not graph[leaf]:
                          continue
                      neighbor = graph[leaf].pop()
                      graph[neighbor].remove(leaf)
                      if len(graph[neighbor]) == 1:
                          leaves.append(neighbor)

              expected = sorted(leaves) if leaves else [0]
              return sorted(normalized) == expected

