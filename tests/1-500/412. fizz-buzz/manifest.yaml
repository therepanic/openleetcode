entry:
  id: 412
  title: fizz-buzz
  params:
    n:
      type: int
  call:
    cpp: "Solution().fizzBuzz({n})"
    rust: "Solution::fizz_buzz({n})"
    python3: "Solution().fizzBuzz({n})"
    python2: "Solution().fizzBuzz({n})"
    ruby: "fizz_buzz({n})"
    java: "new Solution().fizzBuzz({n})"
    csharp: "new Solution().FizzBuzz({n})"
    kotlin: "Solution().fizzBuzz({n})"
    go: "fizzBuzz({n})"
    dart: "Solution().fizzBuzz({n})"
    swift: "Solution().fizzBuzz({n})"
    typescript: "fizzBuzz({n})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().fizzBuzz(n, {result})"
    checker: |
      class Checker:
          def fizzBuzz(self, n, result):
              if not isinstance(result, list) or len(result) != n:
                  return False
              expected = []
              for i in range(1, n + 1):
                  if i % 15 == 0:
                      expected.append("FizzBuzz")
                  elif i % 3 == 0:
                      expected.append("Fizz")
                  elif i % 5 == 0:
                      expected.append("Buzz")
                  else:
                      expected.append(str(i))
              return result == expected
seed: 412
