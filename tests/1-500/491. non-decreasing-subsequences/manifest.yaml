entry:
  id: 491
  title: non-decreasing-subsequences
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: Solution().findSubsequences({nums})
    rust: Solution::find_subsequences({nums})
    python3: Solution().findSubsequences({nums})
    python2: Solution().findSubsequences({nums})
    ruby: find_subsequences({nums})
    java: new Solution().findSubsequences({nums})
    csharp: new Solution().FindSubsequences({nums})
    kotlin: Solution().findSubsequences({nums})
    go: findSubsequences({nums})
    dart: Solution().findSubsequences({nums})
    swift: Solution().findSubsequences({nums})
    typescript: findSubsequences({nums})
judge:
  type: ignore_order
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().findSubsequences(nums, {result})
    checker: |
      class Checker:
          def findSubsequences(self, nums, result):
              if not isinstance(result, list):
                  return False

              seen = set()
              for subseq in result:
                  if not isinstance(subseq, list) or len(subseq) < 2:
                      return False
                  if any(not isinstance(x, int) for x in subseq):
                      return False
                  if any(subseq[i] > subseq[i + 1] for i in range(len(subseq) - 1)):
                      return False
                  t = tuple(subseq)
                  if t in seen:
                      return False
                  seen.add(t)

              expected = set()

              def backtrack(index, path):
                  if len(path) >= 2:
                      expected.add(tuple(path))
                  used = set()
                  last = path[-1] if path else None
                  for i in range(index, len(nums)):
                      if nums[i] in used:
                          continue
                      if last is None or nums[i] >= last:
                          used.add(nums[i])
                          path.append(nums[i])
                          backtrack(i + 1, path)
                          path.pop()

              backtrack(0, [])
              return seen == expected
seed: 491
