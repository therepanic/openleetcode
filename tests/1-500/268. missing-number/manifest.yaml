entry:
  id: 268
  title: "missing-number"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().missingNumber({nums})"
    rust: "Solution::missing_number({nums})"
    python3: "Solution().missingNumber({nums})"
    python2: "Solution().missingNumber({nums})"
    ruby: "missing_number({nums})"
    java: "new Solution().missingNumber({nums})"
    csharp: "new Solution().MissingNumber({nums})"
    kotlin: "Solution().missingNumber({nums})"
    go: "missingNumber({nums})"
    dart: "Solution().missingNumber({nums})"
    swift: "Solution().missingNumber({nums})"
    typescript: "missingNumber({nums})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().missingNumber(nums, {result})"
    checker: |
      from typing import Any, List

      class Checker:
          def missingNumber(self, nums: List[int], result: Any) -> bool:
              if not isinstance(result, int):
                  return False
              n = len(nums)
              seen = set(nums)
              if len(seen) != len(nums):
                  return False
              if any(not isinstance(x, int) or x < 0 or x > n for x in nums):
                  return False
              expected = set(range(n + 1)) - seen
              return len(expected) == 1 and result == next(iter(expected))

seed: 268268

