entry:
  id: 463
  title: island-perimeter
  params:
    grid:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: Solution().islandPerimeter({grid})
    rust: Solution::island_perimeter({grid})
    python3: Solution().islandPerimeter({grid})
    python2: Solution().islandPerimeter({grid})
    ruby: island_perimeter({grid})
    java: new Solution().islandPerimeter({grid})
    csharp: new Solution().IslandPerimeter({grid})
    kotlin: Solution().islandPerimeter({grid})
    go: islandPerimeter({grid})
    dart: Solution().islandPerimeter({grid})
    swift: Solution().islandPerimeter({grid})
    typescript: islandPerimeter({grid})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().islandPerimeter(grid, {result})
    checker: |
      class Checker:
          def islandPerimeter(self, grid, result):
              if not isinstance(result, int):
                  return False

              rows = len(grid)
              if rows == 0:
                  return False
              cols = len(grid[0])
              if cols == 0:
                  return False

              perimeter = 0
              land_cells = 0
              for r in range(rows):
                  if not isinstance(grid[r], list) or len(grid[r]) != cols:
                      return False
                  for c in range(cols):
                      cell = grid[r][c]
                      if cell not in (0, 1):
                          return False
                      if cell == 1:
                          land_cells += 1
                          if r == 0 or grid[r - 1][c] == 0:
                              perimeter += 1
                          if r == rows - 1 or grid[r + 1][c] == 0:
                              perimeter += 1
                          if c == 0 or grid[r][c - 1] == 0:
                              perimeter += 1
                          if c == cols - 1 or grid[r][c + 1] == 0:
                              perimeter += 1

              return land_cells > 0 and result == perimeter
