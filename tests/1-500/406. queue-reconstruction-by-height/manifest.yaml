      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().reconstructQueue({people})"
    rust: "Solution::reconstruct_queue({people})"
    python3: "Solution().reconstructQueue({people})"
    python2: "Solution().reconstructQueue({people})"
    ruby: "reconstruct_queue({people})"
    java: "new Solution().reconstructQueue({people})"
    csharp: "new Solution().ReconstructQueue({people})"
    kotlin: "Solution().reconstructQueue({people})"
    go: "reconstructQueue({people})"
    dart: "Solution().reconstructQueue({people})"
    swift: "Solution().reconstructQueue({people})"
    typescript: "reconstructQueue({people})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().reconstructQueue(people, {result})"
    checker: |
      from collections import Counter

      class Checker:
          def reconstructQueue(self, people, result):
              if not isinstance(result, list) or len(result) != len(people):
                  return False
              try:
                  in_counts = Counter(tuple(p) for p in people)
                  out_counts = Counter(tuple(p) for p in result)
              except TypeError:
                  return False
              if in_counts != out_counts:
                  return False
              for i, person in enumerate(result):
                  if not isinstance(person, list) or len(person) != 2:
                      return False
                  h, k = person
                  if not isinstance(h, int) or not isinstance(k, int):
                      return False
                  if k < 0 or k >= len(result):
                      return False
                  taller_or_equal = sum(1 for prev in result[:i] if prev[0] >= h)
                  if taller_or_equal != k:
                      return False
              return True
seed: 406
