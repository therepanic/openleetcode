entry:
  id: 349
  title: intersection-of-two-arrays
  params:
    nums1:
      type: array
      items:
        type: int
    nums2:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().intersection({nums1}, {nums2})"
    rust: "Solution::intersection({nums1}, {nums2})"
    python3: "Solution().intersection({nums1}, {nums2})"
    python2: "Solution().intersection({nums1}, {nums2})"
    ruby: "intersection({nums1}, {nums2})"
    java: "new Solution().intersection({nums1}, {nums2})"
    csharp: "new Solution().Intersection({nums1}, {nums2})"
    kotlin: "Solution().intersection({nums1}, {nums2})"
    go: "intersection({nums1}, {nums2})"
    dart: "Solution().intersection({nums1}, {nums2})"
    swift: "Solution().intersection({nums1}, {nums2})"
    typescript: "intersection({nums1}, {nums2})"
judge:
  type: ignore_order
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().intersection(nums1, nums2, {result})"
    checker: |
      class Checker:
          def intersection(self, nums1, nums2, result):
              if not isinstance(result, list):
                  return False
              if len(result) != len(set(result)):
                  return False
              if any(type(x) is not int for x in result):
                  return False
              return set(result) == (set(nums1) & set(nums2))
seed: 349
