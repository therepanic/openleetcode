  id: 164
  title: "maximum-gap"
  params:
    nums:
      type: "array"
      items:
        type: "int"
  call:
    cpp: "Solution().maximumGap({nums})"
    rust: "Solution::maximum_gap({nums})"
    python3: "Solution().maximumGap({nums})"
    python2: "Solution().maximumGap({nums})"
    ruby: "maximum_gap({nums})"
    java: "new Solution().maximumGap({nums})"
    csharp: "new Solution().MaximumGap({nums})"
    kotlin: "Solution().maximumGap({nums})"
    go: "maximumGap({nums})"
    dart: "Solution().maximumGap({nums})"
    swift: "Solution().maximumGap({nums})"
