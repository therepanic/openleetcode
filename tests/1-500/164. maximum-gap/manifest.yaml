  title: maximum-gap
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: Solution().maximumGap({nums})
    rust: Solution::maximum_gap({nums})
    python3: Solution().maximumGap({nums})
    python2: Solution().maximumGap({nums})
    ruby: maximum_gap({nums})
    java: new Solution().maximumGap({nums})
    csharp: new Solution().MaximumGap({nums})
    kotlin: Solution().maximumGap({nums})
    go: maximumGap({nums})
    dart: Solution().maximumGap({nums})
    swift: Solution().maximumGap({nums})
    typescript: maximumGap({nums})
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().maximumGap(nums, {result})
    checker: "class Checker:\n    def maximumGap(self, nums, result):\n        if len(nums) < 2:\n            return result == 0\n        nums = sorted(nums)\n        expected = max(nums[i + 1] - nums[i] for i in range(len(nums) - 1))\n        return result == expected\n"
seed: 164
