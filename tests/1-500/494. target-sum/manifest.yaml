  call:
    cpp: Solution().findTargetSumWays({nums}, {target})
    rust: Solution::find_target_sum_ways({nums}, {target})
    python3: Solution().findTargetSumWays({nums}, {target})
    python2: Solution().findTargetSumWays({nums}, {target})
    ruby: find_target_sum_ways({nums}, {target})
    java: new Solution().findTargetSumWays({nums}, {target})
    csharp: new Solution().FindTargetSumWays({nums}, {target})
    kotlin: Solution().findTargetSumWays({nums}, {target})
    go: findTargetSumWays({nums}, {target})
    dart: Solution().findTargetSumWays({nums}, {target})
    swift: Solution().findTargetSumWays({nums}, {target})
    typescript: findTargetSumWays({nums}, {target})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: Checker().findTargetSumWays(nums, target, {result})
    checker: |
      class Checker:
          def findTargetSumWays(self, nums, target, result):
              if not isinstance(result, int):
                  return False
              total = sum(nums)
              if abs(target) > total or (target + total) % 2 != 0:
                  return result == 0
              subset = (target + total) // 2
              dp = [0] * (subset + 1)
              dp[0] = 1
              for num in nums:
                  for j in range(subset, num - 1, -1):
                      dp[j] += dp[j - num]
              return result == dp[subset]
