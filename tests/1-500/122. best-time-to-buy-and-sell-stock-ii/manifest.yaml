entry:
  id: 122
  title: "best-time-to-buy-and-sell-stock-ii"
  params:
    prices:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().maxProfit({prices})"
    rust: "Solution::max_profit({prices})"
    python3: "Solution().maxProfit({prices})"
    python2: "Solution().maxProfit({prices})"
    ruby: "max_profit({prices})"
    java: "new Solution().maxProfit({prices})"
    csharp: "new Solution().MaxProfit({prices})"
    kotlin: "Solution().maxProfit({prices})"
    go: "maxProfit({prices})"
    dart: "Solution().maxProfit({prices})"
    swift: "Solution().maxProfit({prices})"
    typescript: "maxProfit({prices})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().maxProfit(prices, {result})"
    checker: |
      class Checker:
          def maxProfit(self, prices, result):
              if not isinstance(prices, list):
                  return False
              if not isinstance(result, int):
                  return False
              if any((not isinstance(x, int)) or x < 0 for x in prices):
                  return False
              profit = 0
              for i in range(1, len(prices)):
                  if prices[i] > prices[i - 1]:
                      profit += prices[i] - prices[i - 1]
              return result == profit
seed: 122
