entry:
  id: 443
  title: string-compression
  params:
    chars:
      type: array
      items:
        type: char
  call:
    cpp: Solution().compress({chars})
    rust: ({ let mut chars = {chars}; Solution::compress(&mut chars) })
    python3: Solution().compress({chars})
    python2: Solution().compress({chars})
    ruby: compress({chars})
    java: new Solution().compress({chars})
    csharp: new Solution().Compress({chars})
    kotlin: Solution().compress({chars})
    go: compress({chars})
    dart: Solution().compress({chars})
    swift: ({ var chars = {chars}; return Solution().compress(&chars) }())
    typescript: compress({chars})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: Checker().compress(chars, {result})
    checker: |
      class Checker:
          def compress(self, chars, result):
              return isinstance(result, int)
seed: 443
