  "title": "reverse-integer"
  "call":
    "cpp": "Solution().reverse({x})"
    "rust": "Solution::reverse({x})"
    "python3": "Solution().reverse({x})"
    "python2": "Solution().reverse({x})"
    "ruby": "reverse({x})"
    "java": "new Solution().reverse({x})"
    "csharp": "new Solution().Reverse({x})"
    "kotlin": "Solution().reverse({x})"
    "go": "reverse({x})"
    "dart": "Solution().reverse({x})"
    "swift": "Solution().reverse({x})"
    "typescript": "reverse({x})"
"judge":
  "type": "exact"
"limits":
  "time_ms": 1000
  "memory_mb": 256
"oracle":
  "python3":
    "call": "Checker().reverse({x}, {result})"
    "checker":
      "class Checker:\n    def reverse(self, x, result):\n        s = str(abs(x))\n\
      \        rev = int(s[::-1])\n        if x < 0:\n            rev *= -1\n    \
      \    if rev < -2**31 or rev > 2**31 - 1:\n            return result == 0\n \
      \       return result == rev\n"
"seed": 42
