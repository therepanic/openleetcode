oracle:
  python3:
    call: Checker().singleNumber(nums, {result})
    checker: "class Checker:\n    def singleNumber(self, nums, result):\n        if not isinstance(result, int):\n            return False\n        counts = {}\n        for num in nums:\n            counts[num] = counts.get(num, 0) + 1\n        expected = None\n        for num, count in counts.items():\n            if count % 3 != 0:\n                expected = num\n                break\n        return result == expected\n"
