judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: Checker().calculateMinimumHP(dungeon, {result})
    checker:
      "class Checker:\n    def calculateMinimumHP(self, dungeon, result):\n        if not isinstance(result, int):\n            return False\n        if not isinstance(dungeon, list) or not dungeon or not isinstance(dungeon[0], list):\n            return False\n        if any(not isinstance(row, list) or not row for row in dungeon):\n            return False\n        rows = len(dungeon)\n        cols = len(dungeon[0])\n        if any(len(row) != cols for row in dungeon):\n            return False\n\n        dp = [[0] * cols for _ in range(rows)]\n        dp[-1][-1] = max(1, 1 - dungeon[-1][-1])\n        for r in range(rows - 2, -1, -1):\n            dp[r][cols - 1] = max(1, dp[r + 1][cols - 1] - dungeon[r][cols - 1])\n        for c in range(cols - 2, -1, -1):\n            dp[rows - 1][c] = max(1, dp[rows - 1][c + 1] - dungeon[rows - 1][c])\n        for r in range(rows - 2, -1, -1):\n            for c in range(cols - 2, -1, -1):\n                need = min(dp[r + 1][c], dp[r][c + 1])\
      \ - dungeon[r][c]\n                dp[r][c] = max(1, need)\n        return result == dp[0][0]\n"
seed: 174
