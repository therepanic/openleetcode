oracle:
  python3:
    call: "Checker().calculateMinimumHP(dungeon, {result})"
    checker: |
      import copy

      from typing import List


      class Solution:
          def calculateMinimumHP(self, dungeon: List[List[int]]) -> int:
              rows, cols = len(dungeon), len(dungeon[0])
              dp = [[0] * cols for _ in range(rows)]
              dp[-1][-1] = max(1, 1 - dungeon[-1][-1])

              for r in range(rows - 2, -1, -1):
                  dp[r][cols - 1] = max(1, dp[r + 1][cols - 1] - dungeon[r][cols - 1])
              for c in range(cols - 2, -1, -1):
                  dp[rows - 1][c] = max(1, dp[rows - 1][c + 1] - dungeon[rows - 1][c])

              for r in range(rows - 2, -1, -1):
                  for c in range(cols - 2, -1, -1):
                      need = min(dp[r + 1][c], dp[r][c + 1]) - dungeon[r][c]
                      dp[r][c] = max(1, need)
              return dp[0][0]

      def array_to_list_node_local(values):
          dummy = ListNode(0)
          tail = dummy
          for value in values:
              tail.next = ListNode(value)
              tail = tail.next
          return dummy.next

      def array_to_tree_node_local(values):
          if not values:
              return None
          root = TreeNode(values[0])
          queue = deque([root])
          index = 1
          while queue and index < len(values):
              node = queue.popleft()
              if index < len(values) and values[index] is not None:
                  node.left = TreeNode(values[index])
                  queue.append(node.left)
              index += 1
              if index < len(values) and values[index] is not None:
                  node.right = TreeNode(values[index])
                  queue.append(node.right)
              index += 1
          return root

      def list_node_to_array_local(node):
          out = []
          seen = 0
          while node is not None and seen < 100000:
              out.append(node.val)
              node = node.next
              seen += 1
          return out

      def tree_node_to_array_local(root):
          if root is None:
              return []
          out = []
          q = deque([root])
          while q:
              node = q.popleft()
              if node is None:
                  out.append(None)
                  continue
              out.append(node.val)
              q.append(node.left)
              q.append(node.right)
          while out and out[-1] is None:
              out.pop()
          return out

      def deep_sort(value):
          if isinstance(value, list):
              normalized = [deep_sort(item) for item in value]
              return sorted(normalized, key=lambda item: json.dumps(item, sort_keys=True))
          if isinstance(value, dict):
              return {key: deep_sort(val) for key, val in sorted(value.items())}
          return value

      def normalize_expected(value):
          kind = "int"
          if kind == "list_node":
              return list_node_to_array_local(value)
          if kind == "tree_node":
              return tree_node_to_array_local(value)
          return value

      def normalize_actual(value):
          return value

      def prepare_input(value, kind):
          if kind == "tree_node":
              return array_to_tree_node_local(value)
          if kind == "list_node":
              return array_to_list_node_local(value)
          return copy.deepcopy(value)

      class Checker:
          def calculateMinimumHP(self, dungeon, result):
              prepared_dungeon = prepare_input(dungeon, "array[array[int]]")
              expected = Solution().calculateMinimumHP(prepared_dungeon)
              expected = normalize_expected(expected)
              actual = normalize_actual(result)
              return deep_sort(expected) == deep_sort(actual)
