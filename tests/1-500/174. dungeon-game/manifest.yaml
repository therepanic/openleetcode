  call:
    cpp: Solution().calculateMinimumHP({dungeon})
    rust: Solution::calculate_minimum_hp({dungeon})
    python3: Solution().calculateMinimumHP({dungeon})
    python2: Solution().calculateMinimumHP({dungeon})
    ruby: calculate_minimum_hp({dungeon})
    java: new Solution().calculateMinimumHP({dungeon})
    csharp: new Solution().CalculateMinimumHP({dungeon})
    kotlin: Solution().calculateMinimumHP({dungeon})
    go: calculateMinimumHP({dungeon})
    dart: Solution().calculateMinimumHP({dungeon})
    swift: Solution().calculateMinimumHP({dungeon})
