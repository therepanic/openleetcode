entry:
  id: 496
  title: next-greater-element-i
  params:
    nums1:
      type: array
      items:
        type: int
    nums2:
      type: array
      items:
        type: int
  call:
    cpp: Solution().nextGreaterElement({nums1}, {nums2})
    rust: Solution::next_greater_element({nums1}, {nums2})
    python3: Solution().nextGreaterElement({nums1}, {nums2})
    python2: Solution().nextGreaterElement({nums1}, {nums2})
    ruby: next_greater_element({nums1}, {nums2})
    java: new Solution().nextGreaterElement({nums1}, {nums2})
    csharp: new Solution().NextGreaterElement({nums1}, {nums2})
    kotlin: Solution().nextGreaterElement({nums1}, {nums2})
    go: nextGreaterElement({nums1}, {nums2})
    dart: Solution().nextGreaterElement({nums1}, {nums2})
    swift: Solution().nextGreaterElement({nums1}, {nums2})
    typescript: nextGreaterElement({nums1}, {nums2})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: Checker().nextGreaterElement(nums1, nums2, {result})
    checker: |
      from typing import Any, List

      class Checker:
          def nextGreaterElement(self, nums1: List[int], nums2: List[int], result: Any) -> bool:
              if not isinstance(result, list):
                  return False
              if len(result) != len(nums1):
                  return False
              positions = {}
              for i, num in enumerate(nums2):
                  if num in positions:
                      return False
                  positions[num] = i
              if len(set(nums1)) != len(nums1):
                  return False
              if not set(nums1).issubset(set(nums2)):
                  return False
              for i, num in enumerate(nums1):
                  idx = positions.get(num)
                  if idx is None:
                      return False
                  expected = -1
                  for j in range(idx + 1, len(nums2)):
                      if nums2[j] > num:
                          expected = nums2[j]
                          break
                  if result[i] != expected:
                      return False
              return True
seed: 496
