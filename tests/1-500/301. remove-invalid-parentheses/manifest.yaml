entry:
  id: 301
  title: remove-invalid-parentheses
  params:
    s:
      type: string
  call:
    cpp: Solution().removeInvalidParentheses({s})
    rust: Solution::remove_invalid_parentheses({s})
    python3: Solution().removeInvalidParentheses({s})
    python2: Solution().removeInvalidParentheses({s})
    ruby: remove_invalid_parentheses({s})
    java: new Solution().removeInvalidParentheses({s})
    csharp: new Solution().RemoveInvalidParentheses({s})
    kotlin: Solution().removeInvalidParentheses({s})
    go: removeInvalidParentheses({s})
    dart: Solution().removeInvalidParentheses({s})
    swift: Solution().removeInvalidParentheses({s})
    typescript: removeInvalidParentheses({s})
judge:
  type: ignore_order
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().removeInvalidParentheses(s, {result})
    checker: |
      class Checker:
          def removeInvalidParentheses(self, s, result):
              if not isinstance(result, list):
                  return False
              if any(not isinstance(x, str) for x in result):
                  return False
              if len(result) != len(set(result)):
                  return False

              def is_valid(text):
                  bal = 0
                  for ch in text:
                      if ch == "(":
                          bal += 1
                      elif ch == ")":
                          bal -= 1
                          if bal < 0:
                              return False
                  return bal == 0

              level = {s}
              while True:
                  valid = {x for x in level if is_valid(x)}
                  if valid:
                      return set(result) == valid
                  next_level = set()
                  for text in level:
                      for i, ch in enumerate(text):
                          if ch in "()":
                              next_level.add(text[:i] + text[i + 1:])
                  level = next_level
seed: 301
