entry:
  id: 392
  title: "is-subsequence"
  params:
    s:
      type: string
    t:
      type: string
  call:
    cpp: "Solution().isSubsequence({s}, {t})"
    rust: "Solution::isSubsequence({s}, {t})"
    python3: "Solution().isSubsequence({s}, {t})"
    python2: "Solution().isSubsequence({s}, {t})"
    ruby: "isSubsequence({s}, {t})"
    java: "new Solution().isSubsequence({s}, {t})"
    csharp: "new Solution().IsSubsequence({s}, {t})"
    kotlin: "Solution().isSubsequence({s}, {t})"
    go: "isSubsequence({s}, {t})"
    dart: "Solution().isSubsequence({s}, {t})"
    swift: "Solution().isSubsequence({s}, {t})"
    typescript: "isSubsequence({s}, {t})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().check(s, t, {result})"
    checker: |
      class Checker:
          def check(self, s, t, result):
              def is_subsequence(a, b):
                  i = 0
                  for ch in b:
                      if i < len(a) and a[i] == ch:
                          i += 1
                  return i == len(a)

              return result == is_subsequence(s, t)

seed: 392

