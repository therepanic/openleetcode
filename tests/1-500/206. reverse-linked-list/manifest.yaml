  title: "reverse-linked-list"
  params:
    head:
      type: list_node
  call:
    cpp: "listNodeToArray(Solution().reverseList({head}))"
    rust: "ListNode::list_node_to_array(Solution::reverse_list({head}))"
    python3: "list_node_to_array(Solution().reverseList({head}))"
    python2: "list_node_to_array(Solution().reverseList({head}))"
    ruby: "list_node_to_array(reverse_list({head}))"
    java: "ListNode.listNodeToArray(new Solution().reverseList({head}))"
    csharp: "ListNode.ListNodeToArray(new Solution().ReverseList({head}))"
    kotlin: "listNodeToArray(Solution().reverseList({head}))"
    go: "listNodeToArray(reverseList({head}))"
    dart: "list_node_to_array(Solution().reverseList({head}))"
    swift: "list_node_to_array(Solution().reverseList({head}))"
    typescript: "listNodeToArray(reverseList({head}))"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().reverseList(head, {result})"
    checker: |
      class Checker:
          def reverseList(self, head, result):
              if head is None:
                  expected = []
              else:
                  expected = list(head)[::-1]

              if result is None:
                  actual = []
              elif isinstance(result, list):
                  actual = result
              else:
                  actual = []
                  seen = 0
                  node = result
                  while node is not None:
                      actual.append(getattr(node, "val", None))
                      node = getattr(node, "next", None)
                      seen += 1
                      if seen > 20000:
                          return False

              return actual == expected
