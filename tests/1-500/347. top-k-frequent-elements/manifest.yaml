entry:
  id: 347
  title: top-k-frequent-elements
  params:
    nums:
      type: array
      items:
        type: int
    k:
      type: int
  call:
    cpp: "Solution().topKFrequent({nums}, {k})"
    rust: "Solution::top_k_frequent({nums}, {k})"
    python3: "Solution().topKFrequent({nums}, {k})"
    python2: "Solution().topKFrequent({nums}, {k})"
    ruby: "top_k_frequent({nums}, {k})"
    java: "new Solution().topKFrequent({nums}, {k})"
    csharp: "new Solution().TopKFrequent({nums}, {k})"
    kotlin: "Solution().topKFrequent({nums}, {k})"
    go: "topKFrequent({nums}, {k})"
    dart: "Solution().topKFrequent({nums}, {k})"
    swift: "Solution().topKFrequent({nums}, {k})"
    typescript: "topKFrequent({nums}, {k})"
judge:
  type: ignore_order
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().topKFrequent(nums, k, {result})"
    checker: |
      from collections import Counter

      class Checker:
          def topKFrequent(self, nums, k, result):
              if not isinstance(result, list):
                  return False
              if len(result) != k:
                  return False
              if any(not isinstance(x, int) for x in result):
                  return False
              if len(set(result)) != len(result):
                  return False

              counts = Counter(nums)
              if any(x not in counts for x in result):
                  return False

              ordered = sorted(counts.items(), key=lambda item: (-item[1], item[0]))
              cutoff = ordered[k - 1][1]
              required = {value for value, count in counts.items() if count > cutoff}
              allowed = {value for value, count in counts.items() if count >= cutoff}
              result_set = set(result)
              return required.issubset(result_set) and result_set.issubset(allowed)
seed: 347
