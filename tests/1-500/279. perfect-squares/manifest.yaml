  title: perfect-squares
  params:
    n:
      type: int
  call:
    cpp: "Solution().numSquares({n})"
    rust: "Solution::num_squares({n})"
    python3: "Solution().numSquares({n})"
    python2: "Solution().numSquares({n})"
    ruby: "num_squares({n})"
    java: "new Solution().numSquares({n})"
    csharp: "new Solution().NumSquares({n})"
    kotlin: "Solution().numSquares({n})"
    go: "numSquares({n})"
    dart: "Solution().numSquares({n})"
    swift: "Solution().numSquares({n})"
    typescript: "numSquares({n})"
judge:
  type: exact
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().numSquares(n, {result})"
    checker: |
      import math

      class Checker:
          def numSquares(self, n, result):
              if not isinstance(n, int) or not isinstance(result, int):
                  return False
              if n < 1 or n > 10000:
                  return False
              if result < 1 or result > 4:
                  return False

              x = n
              while x % 4 == 0:
                  x //= 4
              if x % 8 == 7:
                  expected = 4
              else:
                  r = math.isqrt(n)
                  if r * r == n:
                      expected = 1
                  else:
                      is_two = False
                      for a in range(1, r + 1):
                          b2 = n - a * a
                          b = math.isqrt(b2)
                          if b * b == b2:
                              is_two = True
                              break
                      expected = 2 if is_two else 3
              return result == expected
