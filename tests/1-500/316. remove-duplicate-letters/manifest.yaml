entry:
  id: 316
  title: "remove-duplicate-letters"
  params:
    s:
      type: string
  call:
    cpp: "Solution().removeDuplicateLetters({s})"
    rust: "Solution::remove_duplicate_letters({s})"
    python3: "Solution().removeDuplicateLetters({s})"
    python2: "Solution().removeDuplicateLetters({s})"
    ruby: "remove_duplicate_letters({s})"
    java: "new Solution().removeDuplicateLetters({s})"
    csharp: "new Solution().RemoveDuplicateLetters({s})"
    kotlin: "Solution().removeDuplicateLetters({s})"
    go: "removeDuplicateLetters({s})"
    dart: "Solution().removeDuplicateLetters({s})"
    swift: "Solution().removeDuplicateLetters({s})"
    typescript: "removeDuplicateLetters({s})"

judge:
  type: "exact"

limits:
  time_ms: 1000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().check(s, {result})"
    checker: |
      from typing import Any

      class Checker:
          def check(self, s: str, result: Any) -> bool:
              if not isinstance(result, str):
                  return False
              if any(not ('a' <= ch <= 'z') for ch in s):
                  return False
              if any(not ('a' <= ch <= 'z') for ch in result):
                  return False

              seen = set()
              for ch in result:
                  if ch in seen:
                      return False
                  seen.add(ch)

              idx = 0
              for ch in s:
                  if idx < len(result) and ch == result[idx]:
                      idx += 1
              if idx != len(result):
                  return False

              last = {}
              for i, ch in enumerate(s):
                  last[ch] = i
              stack = []
              in_stack = set()
              for i, ch in enumerate(s):
                  if ch in in_stack:
                      continue
                  while stack and ch < stack[-1] and i < last[stack[-1]]:
                      in_stack.remove(stack.pop())
                  stack.append(ch)
                  in_stack.add(ch)
              return ''.join(stack) == result

