entry:
  id: 108
  title: "Convert Sorted Array to Binary Search Tree"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "treeNodeToArray(Solution().sortedArrayToBST({nums}))"
    rust: "TreeNode::tree_node_to_array(Solution::sorted_array_to_bst({nums}))"
    python3: "tree_node_to_array(Solution().sortedArrayToBST({nums}))"
    python2: "tree_node_to_array(Solution().sortedArrayToBST({nums}))"
    ruby: "tree_node_to_array(sorted_array_to_bst({nums}))"
    java: "TreeNode.treeNodeToArray(new Solution().sortedArrayToBST({nums}))"
    csharp: "TreeNode.TreeNodeToArray(new Solution().SortedArrayToBST({nums}))"
    kotlin: "treeNodeToArray(Solution().sortedArrayToBST({nums}))"
    go: "treeNodeToArray(sortedArrayToBST({nums}))"
    dart: "tree_node_to_array(Solution().sortedArrayToBST({nums}))"
    swift: "tree_node_to_array(Solution().sortedArrayToBST({nums}))"
    typescript: "treeNodeToArray(sortedArrayToBST({nums}))"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().sortedArrayToBST(nums, {result})"
    checker: |
      class Checker:
          def sortedArrayToBST(self, nums, result):
              if not isinstance(result, list):
                  return False
              if not nums:
                  return result == []
              if not result or result[0] is None:
                  return False

              def validate(i, low, high):
                  if i >= len(result) or result[i] is None:
                      return 0, True, []
                  val = result[i]
                  if not isinstance(val, int) or not (low < val < high):
                      return 0, False, []
                  lh, lok, lvals = validate(2 * i + 1, low, val)
                  if not lok:
                      return 0, False, []
                  rh, rok, rvals = validate(2 * i + 2, val, high)
                  if not rok or abs(lh - rh) > 1:
                      return 0, False, []
                  return max(lh, rh) + 1, True, lvals + [val] + rvals

              _, ok, inorder_vals = validate(0, float("-inf"), float("inf"))
              return ok and inorder_vals == nums
