  memory_mb: 256
oracle:
  python3:
    call: Checker().check(l1, l2, {result})
    checker: |
      import json

      class Checker:
          def _norm(self, value):
              if isinstance(value, str):
                  try:
                      value = json.loads(value)
                  except Exception:
                      pass
              return value

          def _to_int(self, digits):
              n = 0
              for d in digits:
                  n = n * 10 + d
              return n

          def _to_digits(self, n):
              if n == 0:
                  return [0]
              out = []
              while n > 0:
                  out.append(n % 10)
                  n //= 10
              return out[::-1]

          def check(self, l1, l2, result):
              result = self._norm(result)
              if not isinstance(result, list):
                  return False
              if any((not isinstance(x, int)) or x < 0 or x > 9 for x in result):
                  return False
              if len(result) > 1 and result[0] == 0:
                  return False
              return result == self._to_digits(self._to_int(l1) + self._to_int(l2))
