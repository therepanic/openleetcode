entry:
  id: 103
  title: binary-tree-zigzag-level-order-traversal
  params:
    root:
      type: tree_node
  call:
    cpp: Solution().zigzagLevelOrder({root})
    rust: Solution::zigzag_level_order({root})
    python3: Solution().zigzagLevelOrder({root})
    python2: Solution().zigzagLevelOrder({root})
    ruby: zigzag_level_order({root})
    java: new Solution().zigzagLevelOrder({root})
    csharp: new Solution().ZigzagLevelOrder({root})
    kotlin: Solution().zigzagLevelOrder({root})
    go: zigzagLevelOrder({root})
    dart: Solution().zigzagLevelOrder({root})
    swift: Solution().zigzagLevelOrder({root})
    typescript: zigzagLevelOrder({root})
judge:
  type: exact
limits:
  time_ms: 200
  memory_mb: 300
oracle:
  python3:
    call: Checker().zigzagLevelOrder(root, {result})
    checker:
      "class Checker:\n    def zigzagLevelOrder(self, root, result) -> bool:\n\
      \        if root is None or root == []:\n            return result == []\n \
      \       if not isinstance(root, list):\n            return False\n        expected\
      \ = []\n        queue = [0]\n        left_to_right = True\n        while queue:\n\
      \            level = []\n            next_queue = []\n            for idx in\
      \ queue:\n                if idx >= len(root) or root[idx] is None:\n      \
      \              continue\n                if left_to_right:\n               \
      \     level.append(root[idx])\n                else:\n                    level.insert(0,\
      \ root[idx])\n                left = 2 * idx + 1\n                right = 2\
      \ * idx + 2\n                if left < len(root) and root[left] is not None:\n\
      \                    next_queue.append(left)\n                if right < len(root)\
      \ and root[right] is not None:\n                    next_queue.append(right)\n\
      \            if not level:\n                break\n            expected.append(level)\n\
      \            left_to_right = not left_to_right\n            queue = next_queue\n\
      \        return result == expected\n"
seed: 103
