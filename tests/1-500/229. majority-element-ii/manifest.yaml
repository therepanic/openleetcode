entry:
  id: 229
  title: "majority-element-ii"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().majorityElement({nums})"
    rust: "Solution::majority_element({nums})"
    python3: "Solution().majorityElement({nums})"
    python2: "Solution().majorityElement({nums})"
    ruby: "majority_element({nums})"
    java: "new Solution().majorityElement({nums})"
    csharp: "new Solution().MajorityElement({nums})"
    kotlin: "Solution().majorityElement({nums})"
    go: "majorityElement({nums})"
    dart: "Solution().majorityElement({nums})"
    swift: "Solution().majorityElement({nums})"
    typescript: "majorityElement({nums})"

judge:
  type: "ignore_order"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().majorityElement(nums, {result})"
    checker: |
      from typing import Any, List

      class Checker:
          def majorityElement(self, nums: List[int], result: Any) -> bool:
              if not isinstance(result, list):
                  return False
              if any(not isinstance(x, int) for x in result):
                  return False
              if len(set(result)) != len(result):
                  return False

              n = len(nums)
              threshold = n // 3
              counts = {}
              for num in nums:
                  counts[num] = counts.get(num, 0) + 1

              expected = sorted(num for num, count in counts.items() if count > threshold)
              return sorted(result) == expected

seed: 229229

