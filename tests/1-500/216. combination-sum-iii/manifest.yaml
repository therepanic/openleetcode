oracle:
  python3:
    call: "Checker().combinationSum3(k, n, {result})"
    checker: |
      from typing import Any, List

      class Checker:
          def combinationSum3(self, k: int, n: int, result: Any) -> bool:
              if not isinstance(result, list):
                  return False

              seen = set()
              total_valid = 0
              for combo in result:
                  if not isinstance(combo, list) or len(combo) != k:
                      return False
                  if any(not isinstance(x, int) for x in combo):
                      return False
                  if any(x < 1 or x > 9 for x in combo):
                      return False
                  if any(combo[i] >= combo[i + 1] for i in range(len(combo) - 1)):
                      return False
                  if sum(combo) != n:
                      return False
                  key = tuple(combo)
                  if key in seen:
                      return False
                  seen.add(key)
                  total_valid += 1

              nums = list(range(1, 10))
              expected = []

              def backtrack(start: int, path: List[int], remaining_k: int, remaining_n: int) -> None:
                  if remaining_k == 0:
                      if remaining_n == 0:
                          expected.append(tuple(path))
                      return
                  for i in range(start, 10):
                      if i > remaining_n:
                          break
                      path.append(i)
                      backtrack(i + 1, path, remaining_k - 1, remaining_n - i)
                      path.pop()

              backtrack(1, [], k, n)
              return set(expected) == seen

