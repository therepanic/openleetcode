entry:
  id: 17
  title: "letter-combinations-of-a-phone-number"
  params:
    digits:
      type: string
  call:
    cpp: "Solution().letterCombinations({digits})"
    rust: "Solution::letter_combinations({digits})"
    python3: "Solution().letterCombinations({digits})"
    python2: "Solution().letterCombinations({digits})"
    ruby: "letter_combinations({digits})"
    java: "new Solution().letterCombinations({digits})"
    csharp: "new Solution().LetterCombinations({digits})"
    kotlin: "Solution().letterCombinations({digits})"
    go: "letterCombinations({digits})"
    dart: "Solution().letterCombinations({digits})"
    swift: "Solution().letterCombinations({digits})"
    typescript: "letterCombinations({digits})"

judge:
  type: "ignore_order"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().letterCombinations(digits, {result})"
    checker: |
      from itertools import product

      class Checker:
          def letterCombinations(self, digits, result):
              if not isinstance(result, list):
                  return False
              mapping = {
                  "2": "abc",
                  "3": "def",
                  "4": "ghi",
                  "5": "jkl",
                  "6": "mno",
                  "7": "pqrs",
                  "8": "tuv",
                  "9": "wxyz",
              }
              if not isinstance(digits, str) or not digits:
                  return False
              try:
                  groups = [mapping[d] for d in digits]
              except KeyError:
                  return False
              expected = {"".join(chars) for chars in product(*groups)}
              if len(result) != len(expected):
                  return False
              if any(not isinstance(item, str) for item in result):
                  return False
              if len(set(result)) != len(result):
                  return False
              if set(result) != expected:
                  return False
              return all(len(item) == len(digits) for item in result)

seed: 17

