entry:
  id: 17
  title: letter-combinations-of-a-phone-number
  call:
    cpp: Solution().letterCombinations({digits})
    rust: Solution::letter_combinations({digits}.to_string())
    python3: Solution().letterCombinations({digits})
    python2: Solution().letterCombinations({digits})
    ruby: letter_combinations({digits})
    java: new Solution().letterCombinations({digits})
    csharp: new Solution().LetterCombinations({digits})
    kotlin: Solution().letterCombinations({digits})
    go: letterCombinations({digits})
    dart: Solution().letterCombinations({digits})
    swift: Solution().letterCombinations({digits})
    typescript: letterCombinations({digits})
  params:
    digits:
      type: string
judge:
  type: ignore_order
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: Checker().check(digits, {result})
    checker:
      "import json\nclass Checker:\n    def _norm(self, result):\n        if\
      \ isinstance(result, str):\n            try:\n                result = json.loads(result)\n\
      \            except Exception:\n                pass\n        return result\n\
      \n    def check(self, digits, result):\n        result = self._norm(result)\n\
      \        if not digits:\n            return result == []\n        mapping =\
      \ {'2': 'abc', '3': 'def', '4': 'ghi', '5': 'jkl', '6': 'mno', '7': 'pqrs',\
      \ '8': 'tuv', '9': 'wxyz'}\n        import itertools\n        expected = [''.join(p)\
      \ for p in itertools.product(*(mapping[d] for d in digits))]\n        return\
      \ sorted(result) == sorted(expected)\n"
seed: 42
tests:
  - name: Example 1
    in:
      digits: "23"
    out:
      - ad
      - ae
      - af
      - bd
      - be
      - bf
      - cd
      - ce
      - cf
    judge:
      type: ignore_order
  - name: Example 2
    in:
      digits: "2"
    out:
      - a
      - b
      - c
    judge:
      type: ignore_order
  - name: Single digit 7
