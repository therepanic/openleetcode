entry:
  id: 1507
  title: "reformat-date"
  params:
    date:
      type: string
  call:
    cpp: "Solution().reformatDate({date})"
    rust: "Solution::reformat_date({date})"
    python3: "Solution().reformatDate({date})"
    python2: "Solution().reformatDate({date})"
    ruby: "reformat_date({date})"
    java: "new Solution().reformatDate({date})"
    csharp: "new Solution().ReformatDate({date})"
    kotlin: "Solution().reformatDate({date})"
    go: "reformatDate({date})"
    dart: "Solution().reformatDate({date})"
    swift: "Solution().reformatDate({date})"
    typescript: "reformatDate({date})"

judge:
  type: "exact"

limits:
  time_ms: 200
  memory_mb: 300

oracle:
  python3:
    call: "Checker().reformatDate(date, {result})"
    checker: |
      class Checker:
          def reformatDate(self, date, result):
              parts = date.split()
              if len(parts) != 3 or not isinstance(result, str):
                  return False
              day, month, year = parts
              months = dict(
                  Jan='01', Feb='02', Mar='03', Apr='04',
                  May='05', Jun='06', Jul='07', Aug='08',
                  Sep='09', Oct='10', Nov='11', Dec='12',
              )
              if month not in months or len(year) != 4 or not year.isdigit():
                  return False
              if not 1900 <= int(year) <= 2100:
                  return False
              if len(day) < 3 or day[-2:] not in ('st', 'nd', 'rd', 'th'):
                  return False
              digits = day[:-2]
              if not digits.isdigit() or not 1 <= int(digits) <= 31:
                  return False
              number = int(digits)
              if 10 < number % 100 < 14:
                  suffix = 'th'
              elif number % 10 == 1:
                  suffix = 'st'
              elif number % 10 == 2:
                  suffix = 'nd'
              elif number % 10 == 3:
                  suffix = 'rd'
              else:
                  suffix = 'th'
              if day[-2:] != suffix:
                  return False
              expected = year + '-' + months[month] + '-' + digits.zfill(2)
              return result == expected and len(result) == 10 and result[4] == '-' and result[7] == '-'

