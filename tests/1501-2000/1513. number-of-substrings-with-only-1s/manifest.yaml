entry:
  id: 1513
  title: "number-of-substrings-with-only-1s"
  params:
    s:
      type: string
  call:
    cpp: "Solution().numSub({s})"
    rust: "Solution::num_sub({s})"
    python3: "Solution().numSub({s})"
    python2: "Solution().numSub({s})"
    ruby: "num_sub({s})"
    java: "new Solution().numSub({s})"
    csharp: "new Solution().NumSub({s})"
    kotlin: "Solution().numSub({s})"
    go: "numSub({s})"
    dart: "Solution().numSub({s})"
    swift: "Solution().numSub({s})"
    typescript: "numSub({s})"

judge:
  type: "exact"

limits:
  time_ms: 500
  memory_mb: 300

oracle:
  python3:
    call: "Checker().numSub(s, {result})"
    checker: |
      class Checker:
          def numSub(self, s, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              mod = 1000000007
              expected = 0
              run = 0
              for ch in s:
                  if ch == "1":
                      run += 1
                  else:
                      run = 0
                  expected = (expected + run) % mod
              return result == expected

seed: 1513

