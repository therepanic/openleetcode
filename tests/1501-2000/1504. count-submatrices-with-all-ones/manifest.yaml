entry:
  id: 1504
  title: "count-submatrices-with-all-ones"
  params:
    mat:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    python3: "Solution().numSubmat({mat})"
    python2: "Solution().numSubmat({mat})"
    java: "new Solution().numSubmat({mat})"
    kotlin: "Solution().numSubmat({mat})"
    go: "numSubmat({mat})"
    rust: "Solution::num_submat({mat})"
    cpp: "Solution().numSubmat({mat})"
    csharp: "new Solution().NumSubmat({mat})"
    ruby: "num_submat({mat})"
    dart: "Solution().numSubmat({mat})"
    swift: "Solution().numSubmat({mat})"
    typescript: "numSubmat({mat})"
judge:
  type: "exact"
limits:
  time_ms: 500
  memory_mb: 300
oracle:
  python3:
    call: "Checker().numSubmat(mat, {result})"
    checker: |
      class Checker:
          def numSubmat(self, mat, result):
              if not isinstance(result, int):
                  return False
              total = 0
              for top in range(len(mat)):
                  for bottom in range(top, len(mat)):
                      run = 0
                      for j in range(len(mat[0])):
                          if all(mat[i][j] for i in range(top, bottom + 1)):
                              run += 1
                              total += run
                          else:
                              run = 0
              return result == total
seed: 1504
