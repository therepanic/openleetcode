  title: "number-of-nodes-in-the-sub-tree-with-the-same-label"
  params:
    n:
      type: int
    edges:
      type: array
      items:
        type: array
        items:
          type: int
    labels:
      type: string
  call:
    cpp: "Solution().countSubTrees({n}, {edges}, {labels})"
    rust: "Solution::count_sub_trees({n}, {edges}, {labels})"
    python3: "Solution().countSubTrees({n}, {edges}, {labels})"
    python2: "Solution().countSubTrees({n}, {edges}, {labels})"
    ruby: "count_sub_trees({n}, {edges}, {labels})"
    java: "new Solution().countSubTrees({n}, {edges}, {labels})"
    csharp: "new Solution().CountSubTrees({n}, {edges}, {labels})"
    kotlin: "Solution().countSubTrees({n}, {edges}, {labels})"
    go: "countSubTrees({n}, {edges}, {labels})"
    dart: "Solution().countSubTrees({n}, {edges}, {labels})"
    swift: "Solution().countSubTrees({n}, {edges}, {labels})"
    typescript: "countSubTrees({n}, {edges}, {labels})"

judge:
  type: "exact"

limits:
  time_ms: 4000
  memory_mb: 512

oracle:
  python3:
    call: "Checker().countSubTrees(n, edges, labels, {result})"
    checker: |
      class Checker:
          def countSubTrees(self, n, edges, labels, result):
              graph = [[] for _ in range(n)]
              for a, b in edges:
                  graph[a].append(b)
                  graph[b].append(a)
              expected = [0] * n
              def dfs(node, parent):
                  counts = [0] * 26
                  counts[ord(labels[node]) - 97] = 1
                  for child in graph[node]:
                      if child != parent:
                          child_counts = dfs(child, node)
                          for i in range(26):
                              counts[i] += child_counts[i]
                  expected[node] = counts[ord(labels[node]) - 97]
                  return counts
              dfs(0, -1)
              return result == expected

