    cpp: "Solution().maxProbability({n}, {edges}, {succProb}, {start_node}, {end_node})"
    rust: "Solution::max_probability({n}, {edges}, {succProb}, {start_node}, {end_node})"
    python3: "Solution().maxProbability({n}, {edges}, {succProb}, {start_node}, {end_node})"
    python2: "Solution().maxProbability({n}, {edges}, {succProb}, {start_node}, {end_node})"
    ruby: "max_probability({n}, {edges}, {succProb}, {start_node}, {end_node})"
    java: "new Solution().maxProbability({n}, {edges}, {succProb}, {start_node}, {end_node})"
    csharp: "new Solution().MaxProbability({n}, {edges}, {succProb}, {start_node}, {end_node})"
    kotlin: "Solution().maxProbability({n}, {edges}, {succProb}, {start_node}, {end_node})"
    go: "maxProbability({n}, {edges}, {succProb}, {start_node}, {end_node})"
    dart: "Solution().maxProbability({n}, {edges}, {succProb}, {start_node}, {end_node})"
    swift: "Solution().maxProbability({n}, {edges}, {succProb}, {start_node}, {end_node})"
    typescript: "maxProbability({n}, {edges}, {succProb}, {start_node}, {end_node})"

judge:
  type: "exact"

limits:
  time_ms: 500
  memory_mb: 300

oracle:
  python3:
    call: "Checker().maxProbability(n, edges, succProb, start_node, end_node, {result})"
    checker: |
      import heapq

      class Checker:
          def maxProbability(self, n, edges, probs, start, end, result):
              if not isinstance(result, (int, float)):
                  return False
              graph = [[] for _ in range(n)]
              for (u, v), p in zip(edges, probs):
                  graph[u].append((v, p))
                  graph[v].append((u, p))
              best = [0.0] * n
              best[start] = 1.0
              queue = [(-1.0, start)]
              while queue:
                  neg_prob, node = heapq.heappop(queue)
                  probability = -neg_prob
                  if probability < best[node]:
                      continue
                  if node == end:
                      break
                  for neighbor, edge_prob in graph[node]:
                      candidate = probability * edge_prob
                      if candidate > best[neighbor]:
                          best[neighbor] = candidate
                          heapq.heappush(queue, (-candidate, neighbor))
              return abs(float(result) - best[end]) <= 1e-5

