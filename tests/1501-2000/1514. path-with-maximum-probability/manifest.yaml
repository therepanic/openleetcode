entry:
  id: 1514
  title: "path-with-maximum-probability"
  params:
    n:
      type: int
    edges:
      type: array
      items:
        type: array
        items:
          type: int
    succProb:
      type: array
      items:
        type: double
    start_node:
      type: int
    end_node:
      type: int
