entry:
  id: 1508
  title: "range-sum-of-sorted-subarray-sums"
  params:
    nums:
      type: array
      items:
        type: int
    n:
      type: int
    left:
      type: int
    right:
      type: int
  call:
    cpp: "Solution().rangeSum({nums}, {n}, {left}, {right})"
    rust: "Solution::range_sum({nums}, {n}, {left}, {right})"
    python3: "Solution().rangeSum({nums}, {n}, {left}, {right})"
    python2: "Solution().rangeSum({nums}, {n}, {left}, {right})"
    ruby: "range_sum({nums}, {n}, {left}, {right})"
    java: "new Solution().rangeSum({nums}, {n}, {left}, {right})"
    csharp: "new Solution().RangeSum({nums}, {n}, {left}, {right})"
    kotlin: "Solution().rangeSum({nums}, {n}, {left}, {right})"
    go: "rangeSum({nums}, {n}, {left}, {right})"
    dart: "Solution().rangeSum({nums}, {n}, {left}, {right})"
    swift: "Solution().rangeSum({nums}, {n}, {left}, {right})"
    typescript: "rangeSum({nums}, {n}, {left}, {right})"
judge:
  type: "exact"
limits:
  time_ms: 1000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().rangeSum(nums, n, left, right, {result})"
    checker: |
      class Checker:
          def rangeSum(self, nums, n, left, right, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              values = []
              for i in range(n):
                  total = 0
                  for j in range(i, n):
                      total += nums[j]
                      values.append(total)
              values.sort()
              expected = sum(values[left - 1:right]) % 1000000007
              return result == expected
seed: 1508
