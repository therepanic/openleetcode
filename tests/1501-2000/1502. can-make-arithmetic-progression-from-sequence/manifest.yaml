entry:
  id: 1502
  title: "can-make-arithmetic-progression-from-sequence"
  params:
    arr:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().canMakeArithmeticProgression({arr})"
    rust: "Solution::can_make_arithmetic_progression({arr})"
    python3: "Solution().canMakeArithmeticProgression({arr})"
    python2: "Solution().canMakeArithmeticProgression({arr})"
    ruby: "can_make_arithmetic_progression({arr})"
    java: "new Solution().canMakeArithmeticProgression({arr})"
    csharp: "new Solution().CanMakeArithmeticProgression({arr})"
    kotlin: "Solution().canMakeArithmeticProgression({arr})"
    go: "canMakeArithmeticProgression({arr})"
    dart: "Solution().canMakeArithmeticProgression({arr})"
    swift: "Solution().canMakeArithmeticProgression({arr})"
    typescript: "canMakeArithmeticProgression({arr})"
judge:
  type: exact
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().canMakeArithmeticProgression(arr, {result})"
    checker: |
      class Checker:
          def canMakeArithmeticProgression(self, arr, result):
              values = sorted(arr)
              step = values[1] - values[0]
              expected = all(values[i] - values[i - 1] == step for i in range(2, len(values)))
              return result == expected
seed: 1502
