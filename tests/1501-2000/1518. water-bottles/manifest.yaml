judge:
  type: "exact"
limits:
  time_ms: 500
  memory_mb: 128
oracle:
  python3:
    call: "Checker().numWaterBottles(numBottles, numExchange, {result})"
    checker: |
      class Checker:
          def numWaterBottles(self, numBottles, numExchange, result):
              if not isinstance(result, int) or isinstance(result, bool):
                  return False
              return result == numBottles + (numBottles - 1) // (numExchange - 1)
