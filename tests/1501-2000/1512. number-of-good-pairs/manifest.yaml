entry:
  id: 1512
  title: "number-of-good-pairs"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    python3: "Solution().numIdenticalPairs({nums})"
    python2: "Solution().numIdenticalPairs({nums})"
    java: "new Solution().numIdenticalPairs({nums})"
    kotlin: "Solution().numIdenticalPairs({nums})"
    go: "numIdenticalPairs({nums})"
    rust: "Solution::num_identical_pairs({nums})"
    cpp: "Solution().numIdenticalPairs({nums})"
    csharp: "new Solution().NumIdenticalPairs({nums})"
    ruby: "num_identical_pairs({nums})"
    dart: "Solution().numIdenticalPairs({nums})"
    swift: "Solution().numIdenticalPairs({nums})"
    typescript: "numIdenticalPairs({nums})"
judge:
  type: "exact"
limits:
  time_ms: 300
  memory_mb: 300
oracle:
  python3:
    call: "Checker().numIdenticalPairs(nums, {result})"
    checker: |
      class Checker:
          def numIdenticalPairs(self, nums, result):
              if not isinstance(result, int):
                  return False
              expected = 0
              for i in range(len(nums)):
                  for j in range(i + 1, len(nums)):
                      if nums[i] == nums[j]:
                          expected += 1
              return result == expected
seed: 1512
