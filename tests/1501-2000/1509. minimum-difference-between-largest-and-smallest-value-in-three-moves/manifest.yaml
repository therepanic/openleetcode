entry:
  id: 1509
  title: "minimum-difference-between-largest-and-smallest-value-in-three-moves"
  params:
    nums:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().minDifference({nums})"
    rust: "Solution::min_difference({nums})"
    python3: "Solution().minDifference({nums})"
    python2: "Solution().minDifference({nums})"
    ruby: "min_difference({nums})"
    java: "new Solution().minDifference({nums})"
    csharp: "new Solution().MinDifference({nums})"
    kotlin: "Solution().minDifference({nums})"
    go: "minDifference({nums})"
    dart: "Solution().minDifference({nums})"
    swift: "Solution().minDifference({nums})"
    typescript: "minDifference({nums})"
judge:
  type: "exact"
limits:
  time_ms: 2000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().minDifference(nums, {result})"
    checker: |
      class Checker:
          def minDifference(self, nums, result):
              if len(nums) <= 4:
                  expected = 0
              else:
                  values = sorted(nums)
                  n = len(values)
                  expected = min(values[n - 4] - values[0], values[n - 3] - values[1], values[n - 2] - values[2], values[n - 1] - values[3])
              return result == expected
seed: 1509
