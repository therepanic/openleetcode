entry:
  id: 1505
  title: "minimum-possible-integer-after-at-most-k-adjacent-swaps-on-digits"
  params:
    num:
      type: string
    k:
      type: int
  call:
    cpp: "Solution().minInteger({num}, {k})"
    rust: "Solution::min_integer({num}, {k})"
    python3: "Solution().minInteger({num}, {k})"
    python2: "Solution().minInteger({num}, {k})"
    ruby: "min_integer({num}, {k})"
    java: "new Solution().minInteger({num}, {k})"
    csharp: "new Solution().MinInteger({num}, {k})"
    kotlin: "Solution().minInteger({num}, {k})"
    go: "minInteger({num}, {k})"
    dart: "Solution().minInteger({num}, {k})"
    swift: "Solution().minInteger({num}, {k})"
    typescript: "minInteger({num}, {k})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().minInteger(num, k, {result})"
    checker: |
      class Checker:
          def minInteger(self, num, k, result):
              if not isinstance(result, str) or len(result) != len(num):
                  return False
              positions = [[] for _ in range(10)]
              for i, ch in enumerate(num):
                  positions[ord(ch) - 48].append(i)
              bit = [0] * (len(num) + 1)
              for i in range(1, len(num) + 1):
                  bit[i] += 1
                  j = i + (i & -i)
                  if j <= len(num):
                      bit[j] += bit[i]
              def prefix(i):
                  total = 0
                  while i:
                      total += bit[i]
                      i -= i & -i
                  return total
              def remove(i):
                  while i <= len(num):
                      bit[i] -= 1
                      i += i & -i
              expected = []
              for _ in num:
                  for digit in range(10):
                      if positions[digit]:
                          pos = positions[digit][0]
                          cost = prefix(pos)
                          if cost <= k:
                              k -= cost
                              positions[digit].pop(0)
                              remove(pos + 1)
                              expected.append(str(digit))
                              break
              return result == ''.join(expected)

seed: 1505

