entry:
  id: 1503
  title: "last-moment-before-all-ants-fall-out-of-a-plank"
  params:
    n:
      type: int
    left:
      type: array
      items:
        type: int
    right:
      type: array
      items:
        type: int
  call:
    cpp: "Solution().getLastMoment({n}, {left}, {right})"
    rust: "Solution::get_last_moment({n}, {left}, {right})"
    python3: "Solution().getLastMoment({n}, {left}, {right})"
    python2: "Solution().getLastMoment({n}, {left}, {right})"
    ruby: "get_last_moment({n}, {left}, {right})"
    java: "new Solution().getLastMoment({n}, {left}, {right})"
    csharp: "new Solution().GetLastMoment({n}, {left}, {right})"
    kotlin: "Solution().getLastMoment({n}, {left}, {right})"
    go: "getLastMoment({n}, {left}, {right})"
    dart: "Solution().getLastMoment({n}, {left}, {right})"
    swift: "Solution().getLastMoment({n}, {left}, {right})"
    typescript: "getLastMoment({n}, {left}, {right})"

judge:
  type: "exact"

limits:
  time_ms: 2000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().getLastMoment(n, left, right, {result})"
    checker: |
      class Checker:
          def getLastMoment(self, n, left, right, result):
              expected = max([0] + list(left) + [n - x for x in right])
              return result == expected

seed: 1503

