entry:
  id: 1515
  title: "best-position-for-a-service-centre"
  params:
    positions:
      type: array
      items:
        type: array
        items:
          type: int
  call:
    cpp: "Solution().getMinDistSum({positions})"
    rust: "Solution::get_min_dist_sum({positions})"
    python3: "Solution().getMinDistSum({positions})"
    python2: "Solution().getMinDistSum({positions})"
    ruby: "get_min_dist_sum({positions})"
    java: "new Solution().getMinDistSum({positions})"
    csharp: "new Solution().GetMinDistSum({positions})"
    kotlin: "Solution().getMinDistSum({positions})"
    go: "getMinDistSum({positions})"
    dart: "Solution().getMinDistSum({positions})"
    swift: "Solution().getMinDistSum({positions})"
    typescript: "getMinDistSum({positions})"
judge:
  type: "exact"
limits:
  time_ms: 3000
  memory_mb: 256
oracle:
  python3:
    call: "Checker().getMinDistSum(positions, {result})"
    checker: |
      import math
      class Checker:
          def getMinDistSum(self, positions, result):
              x = sum(p[0] for p in positions) / len(positions)
              y = sum(p[1] for p in positions) / len(positions)
              for _ in range(10000):
                  weights = []
                  coincident = False
                  for px, py in positions:
                      distance = math.hypot(x - px, y - py)
                      if distance < 1e-12:
                          coincident = True
                          break
                      weights.append((px, py, 1.0 / distance))
                  if coincident:
                      break
                  total_weight = sum(w for _, _, w in weights)
                  nx = sum(px * w for px, _, w in weights) / total_weight
                  ny = sum(py * w for _, py, w in weights) / total_weight
                  if math.hypot(nx - x, ny - y) < 1e-10:
                      x, y = nx, ny
                      break
                  x, y = nx, ny
              best = sum(math.hypot(x - px, y - py) for px, py in positions)
              return math.isfinite(result) and abs(result - best) <= 2e-5
