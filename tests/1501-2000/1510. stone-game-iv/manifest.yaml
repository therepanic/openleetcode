    java: "new Solution().winnerSquareGame({n})"
    csharp: "new Solution().WinnerSquareGame({n})"
    kotlin: "Solution().winnerSquareGame({n})"
    go: "winnerSquareGame({n})"
    dart: "Solution().winnerSquareGame({n})"
    swift: "Solution().winnerSquareGame({n})"
    typescript: "winnerSquareGame({n})"

judge:
  type: "exact"

limits:
  time_ms: 3000
  memory_mb: 256

oracle:
  python3:
    call: "Checker().winnerSquareGame(n, {result})"
    checker: |
      class Checker:
          def winnerSquareGame(self, n, result):
              if not isinstance(result, bool):
                  return False
              win = [False] * (n + 1)
              for stones in range(1, n + 1):
                  square = 1
                  while square * square <= stones:
                      if not win[stones - square * square]:
                          win[stones] = True
                          break
                      square += 1
              return result == win[n]

